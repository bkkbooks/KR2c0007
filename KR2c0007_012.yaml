body:
  text: 宋史紀事本末卷十二明馮琦原編陳邦瞻增輯金滅遼神宗熙寧七年十二月遼女真部節度使烏古鼐死子和里布嗣初女真之先蓋古肅愼氏世居混同江之東長白山鴨緑水之源南鄰高麗北接室韋西界渤海鐡甸東憑海後漢謂之伊埒元魏謂之烏濟隋唐謂之默爾根姓拿又號完顔氏於諸部中最微唐貞觀中默爾根朝自是中國始聞其名開元中其酋來朝拜為勃利州刺史遂置黑水部以部長為都督朝廷為置長史監之五代時始稱女真其族分六部有黑水部其民在南者繫籍于遼號熟女真在北者不籍于遼號生女真已而避遼主宗真諱改曰女直又有曰黃頭女真其人戅朴勇鷙謂之和勒博以東沫江之北寧江之東地方千餘里自推豪俠為酋長僻處契丹東北隅宋太祖建隆二年以馬入貢三年四年復遣使貢馬自是不絶太宗淳化二年首領伊勒錦等上言契丹怒其朝貢中國置三柵於海岸每柵置兵三千絶其貢獻之路乞發兵共平三柵太宗降詔撫諭而不為發兵真宗大中祥符三年契丹征高麗道由女真女真復與高麗合兵拒之天禧三年復遣使至自天聖後沒屬契丹不復入貢至烏古鼐能役屬諸部會遼五國烏延部節度使巴延穆爾叛遼遼將致討烏古鼐恐遼兵深入得其山川險易或將圖之乃告遼曰彼可計取也若用兵必將走險非歲月可平也遼從之烏古鼐因襲而擒之以獻遼主遼主召見燕賜加等授生女真部節度使始有官屬紀綱漸立矣然不肯受印繫遼籍其部內舊無鐡鄰國有以甲胄往鬻者必厚價售之得鐵既多因以修弓矢備器械兵勢稍振前後願附者衆至是五國穆延部舍音貝勒復叛遼烏古鼐伐之舍音敗走烏古鼐將見遼邊將自陳敗舍音之功道死子和哩布襲為節度使哲宗元祐七年夏四月遼女真部節度和哩布死弟頗拉淑嗣和哩布生十一子長曰烏里雅蘇一名烏雅舒次曰阿固達曰烏竒邁曰舍音曰烏色曰烏哲曰阿庫納曰實默曰察喇曰烏塔和哩布疾篤呼弟英格謂曰烏雅舒柔善若辦集契丹事阿固達能之遂卒母弟頗拉淑襲為節度使和哩布嚴重多智每戰未嘗被甲襲位之初內外潰叛和哩布乃因敗為功變弱為強遂破和諾克薩達克烏春烏木罕基業始大建官屬統諸部其官之長皆稱貝勒紹聖三年二月生女真節度使頗拉淑死弟英格嗣以兄和卓子薩哈為國相時赫舍哩部阿蘇有異志英格召之阿蘇與部人穆都哩阻兵為難英格自往伐之至阿蘇城阿蘇往訴于遼遼遣使止英格勿攻英格留和卓守阿蘇城而還徽宗崇寧元年冬十月遼將蕭哈里叛遼亡入女真阿克展部遣其族人烏塔噶至女真約同舉兵節度使英格執之時遼主命英格討哈里英格募兵得千餘人兄子阿固達曰有此甲兵何事不可圖也遂次混同江蓋先是女真甲兵未嘗滿千也至是遼兵追哈里者數千人而不能克英格謂遼退爾軍我當獨取哈里遂使阿固達與戰執而殺之因大破其黨函哈里首獻于遼遼主大喜錫豫加等英格自是知遼兵之易與益自肆矣二年冬十月生女真部節度使英格死兄子烏雅舒嗣時高麗復與女真通好女真雖舊屬高麗然不相通者且久會高麗醫者至女真還言于高麗王曰女真居黑水部者部族日強兵益精悍其王乃通使于女真自是來往不阻政和二年二月遼主如春州至混同江釣魚界外生女真酋長在千里內者以故事皆來朝適遇頭魚宴酒半酣遼主命諸酋次第起舞至阿固達辭不能但端立直視遼主諭之再三阿固達終不從他日遼主密諭北院樞密使蕭奉先曰阿固達跋扈如此可托以邊事誅之否則必遺後患奉先曰彼粗人不知禮義且無大過而殺之恐傷向化心設有異志蕞爾小國亦何能為遼主乃止阿固達之弟烏竒邁尼瑪哈瑚實等嘗從遼主獵能呼鹿刺虎搏熊遼主喜加以官爵阿固達歸疑遼主知其異志且以遼主淫酗不恤國政遂稱兵先併旁近部族女真卓克算阿固察拒之阿固達虜其家屬二人走訴咸州詳衮司送北樞密院蕭奉先作常事以聞遼主命送咸州詰責欲使自新後數召阿固達阿固達不至一日率五百騎突入咸州吏民大驚翌日赴詳衮司與卓克算等面折庭下阿固達不屈送所司問狀一夕遁去遣人訴于遼主言詳衮司欲見殺故不敢留自是召不復至矣三年十二月生女真節度使烏雅舒死弟阿固達自稱都貝勒遼使伊實布往謂之曰何故不告喪阿固達曰有喪不能弔而乃以為罪乎四年冬十月女真阿固達叛遼取寧江州先是遼主好畋獵淫酗怠于政事每歲遣使市名鷹海東青于海上道出生女真使者貪縱徴索無藝女真厭苦之及阿蘇奔遼烏雅舒屢以為請遼主不遣阿蘇遂以為辭稍稍拒市鷹使者及阿固達襲位相繼遣蒲嘉努實古納等索阿蘇遼主終不許實古納歸具言遼主驕肆廢弛之狀阿固達乃召其所屬使備衝要建城堡修戎器遼主使侍御伊實布往詰之阿固達曰我小國也事大國不敢廢禮大國德澤不施而逋逃是主以此字小能無望乎若還阿蘇朝貢如故不然城未已也伊實布還遼主遂發渾河北諸軍益東北路統軍司阿固達聞之謂其下曰遼人知我將舉兵集諸路軍備我我必先發制之無為人制乃與薩哈子尼瑪哈等遂集所屬諸部兵以尼楚赫羅索棟摩等為將而使博勒和徴伊蘭路烏古訥兵九月阿固達率兵進次羅和城諸部兵皆會于埒里水得二千五百人數遼之罪告于天地曰世事遼國恪修職貢定烏春烏木罕之亂破蕭哈里之衆有功不省而侵侮是加罪人阿蘇屢請不遣今將問遼之罪天地其監佑之遂命諸將傳梃而誓至遼界遇渤海軍耶律色實墜馬阿固達射殺之阿固達之子鄂特本與數騎陷遼圍中阿固達救之免胄戰或自旁射之阿固達顧見射者一矢而斃謂其下曰盡敵而止衆從之勇氣百倍遼軍大奔蹂踐死者十七八薩該在别部聞之使尼瑪哈及古新來賀勸其稱帝阿固達曰一戰而勝遂稱大號何示人淺也進軍寧江州填塹攻城寧江人自東門出阿固達邀擊盡殪之遼統軍司以聞遼主射鹿于慶州略不介意惟遣海州刺史高仙夀應援而已十月朔寧江州陷遼防禦使藥太師努被獲阿固達隂縱之使招諭遼人遂引兵還初女真部民皆無徭役壯者悉為兵平居則漁畋射獵有警則下令徴之凡步騎之仗糗皆自備焉其部長曰貝勒行兵則稱曰明安穆琨明安猶千夫長穆琨猶百夫長也凡以衆降附者率以明安穆琨之名授之十一月遼主聞寧江州陷召羣臣議漢人行宮副部署蕭圗薩溫曰女真雖小其人勇而善射我兵久不練若遇強敵稍有不利諸部離心不可制矣今莫若大發諸道兵以威壓之北院樞密使蕭達爾丹曰如圗薩溫之謀徒示弱耳但發滑水以北兵足以拒之乃以司空蕭嗣先為東北路都統蕭托卜嘉副之發契丹奚軍三千及中京禁兵等七千屯出河店阿固達率衆來禦未至混同江會夜阿固達方就枕若有扶其首者三寤而起曰神明警我也即鳴鼓舉燧而行黎明至混同江遼兵方壞凌道阿固達選壯士十人擊走之因帥衆繼進遂登岸與遼兵遇會大風起塵埃蔽天阿固達乘風奮擊遼兵潰將士多死其獲免者十有七人樞密使蕭奉先嗣先兄也懼嗣先得罪輒奏東征潰軍所至劫掠若不肆赦恐聚為患遼主從之嗣先但免官而已自是諸軍相謂曰戰則有死無功退則有生無罪故士無鬭志遇敵輒潰阿固達進襲遼蕭迪里于沃稜濼東殺獲甚衆遼人嘗言女真兵滿萬則不可敵至是始滿萬云十二月遼賔祥咸三州及鐵驪部叛降女真鐵驪王奚和哩布未幾逃歸五年春正月壬申朔女真完顔阿固達稱帝國號金先是阿固達既屢勝遼其弟烏竒邁率將佐勸其稱帝阿固達不許阿里罕普嘉努尼瑪哈等復以為言至是阿固達始用鐵州降人楊朴䇿遂稱皇帝即位且曰遼以賓鐵為號取其堅也賓鐵雖堅終亦變壞惟金不變不壞金之色白完顔色尚白况所居在安春水之上於是國號大金建元收國更名旻追尊祖堪布以下皆為帝以烏竒邁為安班貝勒薩哈舍音為烏赫哩貝勒其國語謂尊大者為安班國相之總理者為烏赫哩舍音亦阿固達弟薩哈烏古鼐之孫也尼瑪哈又名為尼堪亦其國語云遼主使僧嘉努持書往金議和使為屬國阿固達遣薩喇復書云若歸叛人阿蘇遷黃龍府於别地然後議之金主自將攻遼黃龍府進薄益州州人走保黃龍金取其餘民而去遼遣都統鄂爾多左副統蕭伊實右副統耶律張嘉努都監蕭色佛哷將騎二十萬步卒七萬戍遼且屯田以為持久計金主聞之率衆趨達嚕噶城登高望遼兵若連雲灌水狀顧謂左右曰遼兵心二而情怯雖多不足畏遂趨高阜為陳摩囉歡以右翼先馳遼左軍左軍却羅索尼楚赫衝遼中堅陷陳力戰尼瑪哈以中軍助之遼兵遂敗金兵乘勢追躡至其營會日已暮圍之黎明遼軍潰圍出金人逐北至阿嚕岡遼步卒盡殪耕具數千皆為金人所獲是役也遼人本欲屯田且戰且守故併其耕具皆失之三月遼使張嘉努等六人齎書使金猶斥阿固達名冀其降金主以為書辭慢侮留五人獨遣張嘉努還報書亦斥遼主名諭遼主降六月遼復遣使如金金主留其使蕭錫喇不遣八月遼主下詔親征女真率蕃漢兵十餘萬出長春路命蕭奉先為御營都統耶律卓諾副之以精兵二萬為先鋒餘分五部北出駱駝口别以漢步騎三萬南出寧江州發數月糧期必滅女真九月金主攻遼黃龍府次混同江無舟以渡金主使一人導前乘赭白馬徑涉曰視吾鞭所指而行諸軍隨之以濟水及馬腹既濟使人測其渡處深無涯涘於是遂克黃龍府遣蕭錫喇還遼曰若歸我叛人阿蘇即當班師遼師渡混同江副都統卓諾與耶律淳妃弟蕭迪里及其甥蕭延留等誘將士亡歸謀迎立淳淳興宗之孫也初昭懷太子得罪道宗欲立淳為太子羣臣諌乃止遼主即位寵待加厚號其父和隆烏為太叔封淳越王留守東京於是卓諾遣迪里以其謀告淳淳曰此非細事主上自有諸王當立北南面諸大臣不來而汝言及此何也密令左右拘之有頃遼主使行宫實逹爾伊遜等持書至備言卓諾之謀淳即斬迪里等携其首單騎詣廣平淳待罪遼主遇之如初卓諾知淳不見聼乃率麾下掠取上京府庫財物至祖州帥其黨告太祖廟數遼主過惡移檄州縣遂結渤海羣盜至數萬趨廣平犯行宫不克北趨降虜山順國女真阿固察以三百騎一戰勝之擒其貴族二百餘人並斬以徇餘得脫者皆奔女真卓諾詐為使者欲奔女真為邏者所獲縳送遼主所腰斬於市十二月金主聞遼主親征乃聚衆以刀𠢐面仰天慟哭曰始與汝等起兵蓋苦契丹殘忍欲自立國今天祚親至奈何非人人死戰恐不能當也不若殺我一族汝等迎降轉禍為福諸軍羅拜曰事已至此惟命是從金主遂帥師迎敵遼主自將至駝門駙馬蕭特默等將騎兵五萬步卒四十萬至沃稜濼金主行次鴨緑與其臣謀曰遼兵號七十萬其鋒不可當吾軍遠來人馬疲乏宜駐於此深溝高壘以待之會獲遼督餉者知遼主以卓諾反西還已二日矣諸將請乘怠擊之遂追遼主及於呼岱巴岡金主曰彼衆我寡兵不可分視其中軍最堅主必在焉敗其中軍可以得志使右翼先戰左翼合而攻之遼兵大潰枕藉相屬百餘里獲輿輦帟幄兵械軍資他寶物馬牛不可勝紀蕭特默焚營而遁金主亦退六年春正月遼東京留守蕭保先嚴酷渤海苦之是月朔夜半有惡少年十餘乘酒執刀踰垣入府刺殺保先户部使大公鼎聞亂即攝留守事與副留守高清明集奚漢兵千人盡捕其衆斬之撫定其民禆將渤海高永昌時以兵三千屯八甔口見遼政日衰金兵方強遂誘渤海并戍卒入遼陽據之旬日之間遠近嚮應有兵八千人因僣號稱隆基元年遼主遣蕭罕嘉努張琳討之夏四月金人攻高永昌殺之遂取遼東京州縣初永昌使人求援于金且曰願并力以取遼金主使呼實布謂永昌曰同力取遼固可東京近地汝輒據之以僣大號則不可若能歸欵當授王爵永昌不從金主乃遣鄂囉帥諸軍攻永昌與遼將張琳等遇戰敗之遂取瀋州永昌大懼率衆拒金遇於活水金師既濟永昌之軍不戰而却遂北至遼陽城下明日永昌盡帥其衆與金戰又大敗遂以五千騎奔長松遼陽人托卜嘉執永昌以獻金主殺之於是遼之東京州縣及南路繫遼女真皆降於金金主以鄂囉為南路都統沃楞知東京事六月遼以耶律淳為元帥七年八月癸亥遼主自燕至隂涼河募遼東人為兵使報怨于女真號曰怨軍凡八營二萬八千餘人屯衛州蒺藜山以渤海鐵州人郭藥師等為帥十二月遼耶律淳遺金咸州都統烏楞古書議和烏楞古告于金主金主猶以歸薩喇及阿蘇為言淳軍至蒺藜山烏楞古及知東京事沃楞等攻顯州襲破遼怨軍帥郭藥師遂進與淳戰淳敗走烏楞古追至哈喇展陂拔顯州於是乾懿豪徴成川惠七州皆降金遼東鐵州人楊朴言于金主曰自古英雄開國必先求大國封册金主從之乃遣使求封册于遼使至遼時遼東諸州盜賊蜂起掠民以充食樞密蕭奉先等勸遼主許之重和元年十二月遼大飢人相食宣和元年三月遼遣使册金阿固達為東懷國皇帝阿固達不受初遼遣耶律訥格如金議和金主復書曰能以兄事朕歲貢方物歸我中京上京興中府三路州縣以親王公主駙馬大臣子孫為質還我行人及元給信符并宋夏高麗往復書詔表牒則可既而訥格復至金使呼圗克衮與俱如遼免取質子及上京興中府所屬州縣裁減歲幣之數且曰必以兄事我册用漢儀如不可勿復遣使遼主從之凡七遣使如金議册禮金乃使烏凌阿贊謨如遼迎册册至金金主以無兄事之語又不稱大金而東懷乃小邦懷其德之義語涉輕侮乃復使贊謨如遼責其册乖體式必如前書所定然後可從八月金製女真字女真初無文字及獲契丹漢人始通契丹漢字金主遂命古新依倣漢人楷字因契丹字制度合本國語製女真字行之後復製女真小字謂古新所製為大字云二年三月遼復遣使如金議册禮金不許先是遼遣蕭實訥哷持册藁如金金遣烏凌阿贊謨持册副本報遼遼以金所定大聖二字與先世稱號同遣實訥哷往議金主怒謂其臣曰遼人屢敗遣使求成惟飾虛詞以為緩師之計當議進兵乃令咸州路統軍司治軍旅修器械將以四月進師令色克留兵一千鎮守棟摩以餘兵來會于渾河和議遂絶五月金主自將攻遼上京以遼使蕭實訥哷宋使趙良嗣從遣降者瑪延持詔諭城中使速降遼主方獵於呼圗哩巴山聞金舉兵命耶律博碩布等選精兵三千以濟師金主進攻且謂實訥哷趙良嗣曰汝可觀吾用兵以卜去就遂臨城督戰諸軍鼓譟而進自旦及已棟摩等以麾下先登克其外城留守托卜嘉以城降良嗣等奉觴為夀皆稱萬歲金主乃還三年二月遼都統耶律伊都叛降金初遼主四子長趙王實訥哷次晉王阿嘍罕次秦王定次許王寧晉王文妃蕭氏所生積有人望女真興兵境內郡縣所失幾半而遼主畋遊不恤忠臣多被踈斥文妃作歌諷諫遼主銜之樞密使蕭奉先元妃之兄而秦王許王之舅也以國人屬意晉王恐秦王不得立因濳圖之文妃姊適耶律達哈拉妹適耶律伊都一日其姊若妹俱會軍前奉先諷人誣文妃與駙馬蕭昱及伊都達哈拉等謀立晉王而尊遼主為太上皇遼主遂誅蕭昱達哈拉等而賜文妃死伊都在軍中聞之大懼即率千餘騎叛降於金遼主遣蕭哈瑪爾等將兵追之及諸閭山縣哈瑪爾等謀曰主上信蕭奉先奉先視吾輩蔑如也伊都乃宗室豪俊當不肯為奉先下若擒伊都他日吾黨皆伊都也不若縱之還即詒曰追不及伊都至金金主見之因詔咸州都統司曰自伊都來灼見遼國事宜已決議親征其治軍以俟師期十一月金侵遼中京初耶律伊都奔金金尼瑪哈言于金主曰遼主失德中外離心今乘其釁可襲取中京天時人事不可失也金主然之羣臣言時方寒金主不聽竟用尼瑪哈計以舍音都統內外諸軍普嘉努尼瑪哈鄂特本斡里雅布富勒呼等副之耶律伊都為鄉導以趨遼中京大定府四年春正月金克遼中京遂下澤州遼主時獵于鴛鴦濼伊都引羅索奄至遼主憂甚樞密使蕭奉先曰伊都乃王子班之苗裔此來欲立甥晉王阿嘍罕耳若為社稷計不惜一子明其罪誅之可不戰而伊都自退矣會耶律薩巴等復謀立阿嘍罕事覺遼主召樞密使蕭達爾丹等議曰反者必以此兒為名若不除去何以獲安達爾丹唯唯遼主乃遣人縊之或勸阿嘍罕亡阿嘍罕曰安忍為蕞爾之軀而失臣子之節遂就死遼主素服三日耶律薩巴等皆伏誅阿嘍罕素有人望諸軍聞其死無不流涕由是人心解體伊都引金兵逼遼主行宫遼主率衛士五千餘騎自鴛鴦濼走雲中遺傳國璽於桑乾河三月金尼瑪哈敗遼奚王于北安州拔其城遣古新略近地獲遼護衛實訥哷知遼上下離心使人報舍音曰遼主窮迫若失機會事難圖矣舍音意未決鄂特本勸從之舍音乃出青嶺尼瑪哈出瓢嶺期會于羊城濼遼主在雲中以金兵為憂蕭奉先猶言女真雖能攻我上京終不能遠離巢穴及聞金師將出嶺西遼主遂趨白水濼尼瑪哈以精兵六千襲之將近行營遼主計不知所出遂乘輕騎入夾山始悟奉先之不忠怒曰汝父子誤我至此殺爾何益恐軍心忿怒爾曹避敵茍安禍必及我其勿從行奉先下馬哭拜而去行未數里左右執其父子縳送金軍金人斬其長子昻以奉先及其次子昱械送金主道遇遼軍奪以歸並賜死蕭達爾丹自知不免亦絶食死丙子遼人立秦晉國王耶律淳為帝初遼主走雲中留南府宰相張琳參知政事李處溫與耶律淳守燕京處溫聞遼主入夾山命令不通即與族弟處能及子奭外假怨軍內結都統蕭幹謀立淳處溫邀張琳白其事琳曰攝政則可即真則不可處溫曰今日之事天意人心已定豈可易也琳不敢執遂與諸大臣耶律達實左企弓虞仲文曹義勇康公弼集蕃漢百官諸軍及父老數萬人詣淳府引唐靈武故事勸進淳不許將出李奭持赭袍被之令百官拜舞山呼淳驚駭再三辭不獲從之羣臣上尊號曰天錫皇帝建元天福以妻蕭氏為德妃妃布延女也加處溫守太尉張琳守太師餘與謀者授官有差改怨軍為常勝軍軍旅之事悉委達實遙降遼主為湘隂王遂據有燕雲中及上京遼西之地遼主所有沙漠以北西南西北路兩招討府諸蕃族而已淳遣使來報免歲幣結好亦遣使奉表於金乞為附庸金人不報耶律達實者太祖八世孫通遼漢字善騎射登進士第纍擢翰林學士承旨遼謂翰林為林牙故稱達實林牙金人攻遼西京大同府遼耿守中救之尼瑪哈摩囉歡鄂特本等繼至尼瑪哈率麾下自其中衝擊使餘兵去馬從旁射之守忠大敗其衆殱焉西京西路州縣部族皆降金夏四月金取遼東勝州獲阿蘇至金金人杖而釋之六月遼耶律淳寢疾聞遼主傳檄天德雲內朔武應蔚等州合諸蕃精騎五萬約以八月入燕并遣人問勞索衣裘茗藥淳甚驚命北南面大臣議李處溫蕭幹等有迎秦王定拒湘隂王之説惟南面行營都部署耶律寧曰天祚果能以諸蕃兵大舉奪燕則是天數未盡豈能拒之否則秦湘父子也安有迎子而拒其父者處溫等以寧扇亂軍心欲殺之淳曰彼忠臣也焉可殺天祚果來吾有死耳復何面目相見耶已而淳疾自知不起密授處溫蕃漢馬步軍都元帥意將屬以後事及蕭幹等召宰執入議處溫稱疾不至隂聚勇士為備紿云奉密旨防他變淳死蕭幹等乃立淳妻為皇太后主軍國事奉遺命遙立秦王定為帝蕭后遂稱制改元德興諡淳為孝章皇帝廟號宣宗葬于燕西之香山蕭后聽政幹以后命召處溫至以時方多難未即加誅但追毁元帥劄子處溫父子懼禍南通童貫欲挾蕭后納土北通于金欲為內應事覺后執處溫問之處溫自陳有定䇿功后曰誤秦晉國王者皆爾父子何功之有併數其前罪惡數十處溫無以對乃賜死臠其子奭而磔之籍其家得錢七萬緡金玉寶器稱是皆為宰相數月間所取也夏主使李良輔將兵三萬救遼金將鄂囉羅索敗之于宣水追至野谷澗水暴至夏人漂沒者不可勝計八月金阿固達襲遼延禧于石輦驛延禧敗走時遼主既失西京及沙漠以南遂奔于額森穆延金舍音使斡里雅布言于金主曰今雲中新定諸路遼兵尚數萬新降之民其心未固諸將望幸軍中金主從之既而聞遼主在天漁濼乃自將精兵萬人襲之普嘉努斡里雅布率兵四千為前鋒晝夜兼行及遼主于石輦驛軍士至者才千人遼兵二萬五千方治營壘普嘉努與諸將議耶律伊都曰我軍未集人馬疲劇未可戰也斡里雅布曰今追及遼主而不亟戰日入而遁則無及矣遂戰短兵接遼兵圍之數重副統軍蕭迪里諭軍中以君臣之義士皆殊死戰遼主謂斡里雅布兵少必敗遂與妃嬪登高阜觀戰伊都指遼主麾蓋以示諸將斡里雅布等遂以騎兵馳赴之遼主望見大驚即遁去遼兵遂潰斡里雅布等還金主曰遼主去不遠盍亟追之斡里雅布追至鄂勒哲依驛遼主棄輜重而遁蕭特烈被執十二月金克遼燕京時金主分三道進兵攻燕遼蕭后五上表于金求立秦王定金主不許遼人遂以徑兵守居庸關金兵至關崖石自崩戍卒多壓死遼人不戰而潰金兵度關而南遼統軍都監果祿等送欵于金金主至燕京遂自南門入使尼楚赫羅索陳于城上金主次城南遼宰相左企弓參政虞仲文康公弼樞密使曹義勇張彥忠劉彥宗等奉表詣金營請罪金主并釋之命守舊職而遣左企弓等撫定燕京諸州縣蕭德妃與蕭幹自古北口趨天德於是遼五京悉為金有五年春正月遼知北院樞密事奚和哩布即箭笴山自立為奚國皇帝改元天復以奚漢渤海三樞密院改東西節度使為二王分司遼主命都統耶律瑪格討之二月遼主奔四部族蕭德妃來見遼主怒殺之追降淳為庶人而赦其黨蕭幹奔奚夏四月金以鄂囉為都統斡里雅布副之使襲遼主于隂山至居庸獲耶律達實鄂囉使斡里雅布尼楚赫羅索等以兵三千分道襲遼主將至青塜遇泥濘不能進斡里雅布以繩繫達實使為鄉導直趨遼主營鄂囉等大軍繼至時遼主往應州其子秦王定許王寧及諸妃女併從臣皆被執盡失輜重萬餘乘惟太保特默格竊遼主次子梁王雅里及長女特哩乘軍亂出赴遼主軍得免鄂囉兵至掃里門為書招遼主遼主自金城來聞金人以所獲東去乃率兵五千餘邀戰于白水濼斡里雅布以兵千餘敗之遼主遁去金人獲遼主長子趙王實訥哷追奔二十餘里盡得其從馬别獲遼牧馬萬四千匹車八千乘遼主使人持兔紐金印偽請降于金而西走雲內斡里雅布復以書招遼主諭以石晉北遷事遼主答書乞為弟若子量賜土地斡里雅布不許五月夏主李乾順遣使請遼主臨其國遼主從之中軍都統蕭迪里等切諫不從遂渡河次于金肅軍北人情惶懼不知所為迪里隂謂耶律元直曰事勢如此億兆離心正我輩效節之秋不早為計奈社稷何乃共劫遼主第二子梁王雅里走西北部三日遂立為帝改元神厯以迪里為樞密使特默格副之奚和哩布為其下所殺金遣使如夏時斡里雅布趨天德聞夏迎護遼主遼主已渡河乃遺書於夏使執送遼主且許割地八月金主阿固達去燕京有疾命尼瑪哈為都統普嘉努鄂囉副之駐兵雲中以備邊而還至部渚濼殂烏赫哩貝勒舍音等請阿固達弟安班貝勒烏竒邁即位更名晟改元天會諡阿固達曰大聖武元皇帝廟號太祖以舍音為安班貝勒鄂特本為烏赫哩貝勒輔政鄂特本阿固達庶長子也冬十月遼雅里死蕭迪里等復立耶律珠拉為帝珠拉興宗孫也十一月遼珠拉及蕭迪里為亂兵所殺六年春正月夏遣巴爾公亮請以事遼之禮稱藩于金且受地尼瑪哈承制割下寨以北隂山以南伊蘇實喇部圗嚕濼西之地與之自是兩國信使不絶秋七月遼主延禧復渡河居於圗魯卜部耶律達實自金來歸遼主責之曰我在汝何敢立淳達實對曰陛下以全國之勢不能一拒敵棄國遠遁使黎民塗炭即立十淳皆太祖子孫豈不勝乞命于他人耶遼主無以答賜酒食而赦之金襲遼主營遼主北走有瑪克實者迎遼主至其部事之甚謹遼主遂得至烏克題埒部遼主得耶律達實及瑪克實之兵自謂有天助再謀出兵收復燕雲達實諫曰向以全師不謀戰備使舉國皆為金有國勢至此而方求戰非計也當飬兵待時而動不可輕舉遼主不從與金人戰敗走山隂七年春正月遼主延禧謀奔夏會黨項舒和倫遣人請遼主臨其地遼主遂趨天德過沙漠金兵忽至遼主徒步走出乘從者馬得脫途次絶糧從者至嚙氷雪以濟飢過天德至夜將宿民家紿曰偵騎其家知之乃叩頭跪而大慟濳宿其家遂趨黨項以舒和倫為西南面招討使總知軍事二月遼主至應州新城東六十里為金將羅索等所獲以歸八月廢延禧為海濱王遼遂亡遼耶律達實稱帝於竒爾瑪勒先是達實以諫遼主不從遂殺北院樞密蕭伊實自立為王率衆西走至哈屯城駐于北庭都護府會西鄙七州十八部諭以興復事得精兵萬餘置官吏立排甲具器械又遺書假道于回鶻王伯勒格伯勒格得書即迎至邸願質子孫為附庸送至境外所過敵者勝之降者安之兵行萬里歸者數國獲牛羊駝馬不可勝計至塔什干西域諸國舉兵十萬號呼拉哈來拒戰達實分所部為三軍進擊大敗之僵尸數十里駐兵塔什干凡九十日回回國王來降貢方物又西行至竒爾瑪勒羣臣共册立達實為帝改元延慶號曰天祐皇帝妻蕭氏為昭德皇后是為西遼復燕雲徽宗政和元年九月遣端明殿學士鄭允中及宦者童貫使遼童貫既得志于西羌遂謂遼亦可圖因請使遼以覘之乃以鄭允中充賀遼主生辰使而以貫副之或言以宦官為上介國無人乎帝曰契丹聞貫破羌故欲見之因使覘其國䇿之善者也遂行冬十月童貫以遼李良嗣來命為祕書丞賜姓趙燕人馬植本遼大族仕至光祿卿行汚而內亂不齒于人童貫使遼道盧溝植夜見其侍吏自言有滅燕之䇿因得見貫貫與語大竒之載與俱歸易姓名曰李良嗣薦諸朝植即獻䇿曰女真恨遼人切骨而天祚荒淫失道本朝若自登萊涉海結好女真與之相約攻遼其國可圖也議者謂祖宗以來雖有此道以其地接諸蕃禁商賈舟車不得行百有餘年矣一旦啓之懼非中國之利不聽帝召問之植對曰遼國必亡陛下念舊民塗炭之苦復中國往昔之疆代天譴謫以治伐亂王師一出必壺漿來迎萬一女真得志事不侔矣帝嘉納之賜姓趙氏以為祕書丞圖燕之議自此始重和元年二月遣武義大夫馬政浮海使金約夾攻遼初建隆中女真嘗自國之蘇州泛海至登州賣馬故道猶存至是有漢人高藥師者泛海來言女真建國屢破遼師登州守臣王師中以聞詔蔡京童貫共議命師中募人同藥師等賫市馬詔以往不能達而還帝乃復委童貫選人使之遂使馬政同藥師由海道如金政言于金主曰主上聞貴朝攻破契丹五十餘城欲與通好共行弔伐若允許後當遣使來議自是始通金好宣和元年春正月金主與尼瑪哈議遣渤海人李善慶女真薩敦持國書并北珠生金等物同馬政來修好詔蔡京等諭以夾攻遼之意善慶等唯唯居十餘日遣政同趙有開賫詔及禮物與善慶等渡海報聘行至登州有開死會諜者言遼已封金主為帝乃詔政勿行止遣平海軍校呼慶送善慶等歸金金主遣慶歸且語之曰吾已獲遼數路汝歸見皇帝果欲結好早示國書若仍用詔決難從也初高麗來求醫帝命二醫往至是歸奏云高麗館醫甚勤日夕引之視其用兵布陳禦敵之方曰聞天子將與女真圖契丹茍存契丹猶足為中國捍邊女真新起不可交也宜早為之備帝聞之不樂安堯臣上言陛下臨御之初嘗下詔求言於是諤士效忠而憸人乃誤陛下加以詆誣之罪使陛下負拒諫之謗故比年天下杜口以言為諱乃者宦寺交結權臣共倡北伐而宰執以下無一人肯為陛下言者臣謂燕雲之役興則邊釁遂開宦寺之權重則皇綱不振昔秦始皇築長城漢武帝通西域隋煬帝遼左之師唐明皇幽薊之寇其失如彼周宣王伐玁狁漢文帝備北邊元帝納賈捐之議光武斥臧宫馬武之謀其得如此藝祖撥亂反正躬擐甲胄當時將相大臣皆所與取天下者豈勇略智力不能下幽燕哉蓋以區區之地契丹所必爭忍使吾民重困鋒鏑章聖澶淵之役與之戰而勝乃聽其和亦欲固本而息民也今童貫深結蔡京同納趙良嗣以為謀主故建平燕之議臣恐異時唇亡齒寒邊境有可乘之釁金人蓄鋭伺隙以逞其欲此臣之所以日夜寒心伏望思祖宗積纍之艱難鑒歷代君臣之得失杜塞邊隙務守舊好無使金人乘間窺中國上以安宗廟下以慰生靈帝然之且以言路久壅宜導以賞豫補承務郎後竟為姦謀所奪二年二月乙亥遣趙良嗣使金先是呼慶自金還具道金主言并持其書來請别遣使通好時童貫密受旨圖燕因建議遣右文殿修撰趙良嗣往仍以市馬為名其實約攻遼以取燕雲之地八月金人來議攻遼及歲幣遣馬政報之初趙良嗣謂金主曰燕本漢地欲夾攻遼使金取中京大定府宋取燕京析津府金主許之遂議歲幣金主因以手札付良嗣約金兵自平地松林趨古北口宋兵自白溝夾攻不然不能從因遣貝勒偕良嗣還以致其言帝使馬政報聘書云大宋皇帝致書于大金皇帝逺承信介特示函書致討契丹當如來約已差童貫勒兵相應彼此兵不得過關歲幣之數同于遼仍約毋聽契丹講和四年三月金人來約夾攻遼命童貫為河北河東路宣撫使屯兵於邊以應之初熙河鈐轄趙隆嘗極言其不可童貫曰君能共此當有殊拜隆曰隆武夫豈敢干賞以敗祖宗二百年之好異時啓釁萬死不足謝責貫不悅鄭居中亦力陳不可謂蔡京曰公為大臣不能守兩國盟約輒造事端誠非廟算京曰上厭歲幣五十萬故爾居中曰公獨不思漢世和戎用兵之費乎使百萬生靈肝腦塗地公實為之由是議寢及金數敗遼兵童貫乃復乞舉兵居中又言不宜幸災而動待其自斃可也時睦寇初平帝亦悔於用兵王黼獨言曰中國與遼雖為兄弟之邦然百餘年間彼之所以開邊慢我者多矣且兼弱攻昧武之善經也今而不取燕雲女真即強中原故地將不復為我有帝遂決意治兵黼於三省置經撫房專治邊事不關樞密括天下丁夫計口出算得錢六千二百萬緡以充用黼又遺童貫書曰太師若北行願盡死力會聞耶律淳自立乃命貫勒兵十五萬巡北邊以應金且招諭幽燕蔡攸副之仍以三䇿付貫如燕人悅而取之因復舊疆土上也耶律淳納欵稱藩次也燕人未服按兵巡邊下也中書舍人宇文虛中上書言臣聞用兵之䇿必先計強弱虛實知彼知己以圖萬全今論財用之多寡指宣撫司所置便為財用有餘若沿邊諸郡帑藏空虛廪食不繼則略而不問論士卒之強弱指宣撫司所駐便言兵甲精鋭若沿邊諸郡士不練習武備刓缺則置而不講夫邊圉無應敵之具軍府無數日之糧雖孫吳復生亦未可舉師是在我者未有萬全之策也用兵之道禦攻者易攻人者難守城者易攻城者難守者在內而攻者在外在內為主而常逸在外為客而常勞逸者必安勞者必危今宣撫司兵約有六萬邊鄙可用不過數千契丹九大王耶律淳者智略輻湊素得士心國主委任信而不疑今欲亟進兵於燕城之下使契丹自西山以輕兵絶吾糧道又自營平以重兵壓我營壘我之糧道不繼而耶律淳者激勵衆心堅城自守則我亦危殆矣是在彼者未有必勝之道也夫在我無萬全之䇿在彼亦未可必勝兹事一舉乃安危存亡之所繫豈可輕議乎且中國與契丹講和今踰百年間有貪婪不過欲得關南十縣而止耳間有傲慢不過對中國使人稍虧禮節而止耳自女真侵削以來向慕本朝一切恭順今舍恭順之契丹不封植拯救為我藩籬而遠踰海外引強悍之女真以為鄰國彼既藉百勝之勢虛喝驕矜不可以禮義服也不可以言説喻也視中國與契丹拏兵不止鏖戰不解勝負未決強弱未分持卞莊兩鬭之説引兵踰古北口撫有悖桀之衆繫纍契丹君臣雄據朔漠貪心不止越逸疆圉憑凌中夏以百年怠惰之兵而當新鋭難敵之旅以寡謀持重久安間逸之將而角逐於血肉之林巧拙異謀勇怯異勢臣恐中國之邊患未有寧息之期也譬猶富人有萬金之産與寒士為鄰欲肆并吞以廣其居乃引強盜而謀曰彼之所處汝居其半彼之所畜汝取其全強盜從之寒士既亡雖有萬金之富日為切鄰強盜所窺欲一夕高枕安卧其可得乎愚見竊以為確喻望陛下思祖宗創業之艱難念邦域百年之盟好下臣此章使百寮廷議儻臣言可採乞降詔旨罷將帥還朝無滋邊隙俾中國衣冠禮義之俗永覩升平天下甚幸書下三省黼讀之大怒捃托他事除集英殿修撰督戰益急而北事始不可收拾矣五月乙亥以蔡攸為河北河東宣撫副使與童貫共勒兵攸童騃不習事謂功業可唾手致陛辭值二美嬪侍帝側攸指而請曰臣成功歸乞以是賞帝笑而弗責庚辰童貫至高陽關用知雄州和詵計降黃榜及旗述弔民伐罪之意且云若有豪傑能以燕京來獻者即除節度使遂命都統制种師道護諸將進兵師道諫曰今日之舉譬如盜入鄰家不能救又乘之而分其室焉無乃不可乎貫不聽分兵為兩道師道總東路兵趨白溝辛興宗總西路兵趨范村癸未耶律淳聞之遣耶律達實蕭幹禦之師道次白溝遼人譟而前擊敗師道前軍統制楊可世于蘭溝甸士卒多傷師道先令人持一大挺自防賴以不大敗丁亥辛興宗亦敗于范村六月己丑种師道退保雄州遼人追擊至城下帝聞兵敗懼甚詔班師遼使來言曰女真之攻本朝亦南朝之所惡也今射一時之利棄百年之好結新起之鄰基他日之禍謂為得計可乎救災恤鄰古今通誼惟大國圖之貫不能對种師道復請許之和貫不答而密劾師道助賊王黼怒責授師道右衛將軍致仕秋七月王黼聞耶律淳死復命童貫蔡攸治兵以河陽三城節度使劉延慶為都統制九月戊午除朝散郎宋昭名昭上書極言遼不可攻金不可鄰異時金必敗盟為中國患乞誅王黼童貫趙良嗣等且曰兩國之誓敗盟者禍及九族陛下以孝理天下其忍忘列聖之靈乎陛下以仁覆天下其忍置河北之民於塗炭之中而使肝腦塗地乎王黼大惡之故除昭名勒停廣南編管己未金人聞童貫舉兵恐朝廷徑取燕而歲幣不可得乃遣特古斯烏頁爾等來議師期帝遣趙良嗣報之且言不負初約己卯遼將郭藥師以涿易二州來降時藥師為遼常勝軍帥留守涿州以蕭后立蕭幹專政國人多二謂所部曰天祚失國女政不綱宋天子重兵壓境此男兒取金印時也遂擁所部八千人奉二州來降童貫受之以聞詔授恩州觀察使以兵𨽻劉延慶冬十月改燕京為燕山府涿易八州並賜名癸巳童貫遣劉延慶郭藥師將兵十萬出雄州以郭藥師為鄉導渡白溝延慶軍無紀律藥師諫曰今大軍拔隊行而不設備若敵人置伏邀擊首尾不相應則望塵奔潰矣不聽至良鄉遼蕭幹率衆來拒延慶與戰而敗遂閉壘不出藥師曰幹兵不過萬人今悉力拒我燕山必虛願得竒兵五千倍道襲之城可得也因請延慶子光世簡師為後繼延慶許之遣大將高世宣楊可世與藥師率兵六千夜半渡盧溝而進質明常勝軍帥甄五臣領五千騎奪迎春門以入藥師等繼至遣人諭蕭后后密報蕭幹幹舉精甲三千還燕巷戰光世渝約不至藥師失援而敗與可世棄馬縋城而出死傷過半世宣死焉延慶營于盧溝南幹分兵斷餉道擒護糧將王淵得漢軍二人蔽其目留帳中夜半偽相語曰吾師三倍漢軍敵之有餘當分左右翼以精兵衝其中左右翼為應舉火為期殱之無遺既言乃隂逸一人歸報延慶聞而信之明旦見火起以為敵至即燒營遁士卒蹂踐死者百餘里幹因縱兵追至涿水而去自熙豐以來所儲軍實殆盡退保雄州燕人知宋之無能為作賦及歌詩以誚之藥師還猶進安遠軍承宣使十一月戊寅金人來議燕地十二月戊子遣趙良嗣復如金初朝廷與金約但求石晉賂契丹故地而不思平營灤三州非晉賂乃劉仁恭獻契丹以求援者既而王黼悔欲併得之金主不肯及趙良嗣往金主使普嘉努責良嗣以出兵失期且云今更不論元約特與燕京薊景檀順涿易六州良嗣言元約山前山後十七州今乃如此信義安在抗辨數四金人不從良嗣乃與其使李靖偕來止許山前六州帝復遣良嗣送之且求營平灤三州庚寅加郭藥師武泰節度使辛卯金克遼燕京時童貫再舉伐燕不克成功懼得罪乃密遣王瓌如金以求如約夾攻金主分三道進兵遂克燕遣騎兵送趙良嗣還且致遼俘五年春正月戊午金遣使來趙良嗣復如金初良嗣至燕與金主議燕京西京之地金主曰若宋必欲平灤等州并燕京不與因以答書先示良嗣讀至燕京用本朝兵力攻下其租稅當輸本朝良嗣因曰租稅隨地豈有與其地而不與其租稅者尼瑪哈曰燕京自我得之則當歸我若不蚤見與請速追涿易之師無留我疆乃遣李靖等與良嗣偕來靖既入對遂見王黼黼謂靖曰租稅非約也上意以交好之故欲以銀絹充之靖復請去年歲幣帝亦特許之故仍命良嗣與靖偕使辛酉以王安中知燕山府郭藥師同知府事時朝廷以金人將歸燕謀帥臣守之左丞王安中請行王黼贊於帝遂授安中慶遠軍節度使河北河東燕山府路宣撫使知燕山府郭藥師為檢校少保同知府事詔藥師入朝禮遇甚厚賜以甲第姬妾張水嬉使觀之命貴戚大臣更互設宴又召對於後苑延春殿藥師拜庭下泣言臣在燕中聞趙皇如在天上不謂今日得望龍顔帝深褒稱之委以守燕對曰願效死又令取天祚以絶燕人之望藥師變色言曰天祚故主也國破出走臣是以降陛下使臣畢命他所不敢辭若使反故主非所以事陛下願以付他人因涕泣如雨帝以為忠解所御珠袍及二金盆以賜藥師出諭其下曰此非吾功汝輩力也即剪盆分給之加檢校少傅歸鎮燕山府路三月己未遣使如金初趙良嗣至燕謂金主曰本朝徇大國多矣豈平灤一事不能相從耶金主曰平灤欲作邊鎮不可得也遂議租稅金主曰燕租六百萬止取一百萬不然還我涿易舊疆及常勝軍我且提兵按邊良嗣曰本朝自以兵下涿易今乃云爾豈無曲直邪且言御筆許十萬至二十萬不敢擅增乃令良嗣歸報金主謂之曰過半月不至吾提兵往矣時左企弓嘗以詩獻金主曰君王莫聽捐燕議一寸山河一寸金故金人欲背初約要求不已良嗣既還金聞遼主謀復故地乃悉斷盧溝北橋梁焚次舍以防之良嗣行至雄州以金書遞奏其略言貴朝兵不克夾攻特用己力下燕所以拘稅今據燕管內每年租六百萬貫良嗣等稱御筆許二十萬以上不敢自專其平灤等州不在許限儻務侵求難終信義仍速追過界之兵王黼欲功之速成乃請復遣良嗣自雄州再往使許遼人舊歲幣四十萬之外每歲更加燕京代稅錢一百萬緡及議畫疆與遣使賀正旦生辰置𣙜場交易金主大喜遂使尼楚赫等持誓書草來許以燕京及六州來歸而山後諸州及西北一帶接連山川不在許與之限帝曲意從之遣盧益趙良嗣等持誓書往至涿州金古新等先索書觀之言其字畫不謹令易之益言帝親書所以示尊崇于大國也金人不聽比至汴京更易者數四金人又言近有燕人趙溫訊等逃出南朝須先還方可議交燕地良嗣諭宣撫司縳送溫訊於金既至尼瑪哈釋其縳而用之金人又求糧良嗣許以二十萬石夏四月癸巳金人使楊璞以誓書及燕京六州來歸其平營灤三州終以非石晉所賂契丹之地不預庚子命童貫蔡攸入燕交割時燕之職官富民金帛子女皆為金人盡掠而去惟存空城而已尼瑪哈猶欲止割涿易金主曰海上之盟不可忘也我死汝則為之乙巳童貫等奏燕城老幼迎謁焚香稱夀庚戌帝曲赦兩河燕雲命即日班師五月庚申以王黼為太傅鄭居中為太保癸亥進封童貫為徐豫國公蔡攸為少師時王黼竭天下之財以北征僅得七空城至是率百官表賀詔以收復燕雲故宰執皆進位而命王黼總治三省事賜玉𢃄以趙良嗣為延康殿學士鄭居中自陳無功不拜六月丙戌遼張玨以平州來歸初遼主之走西山也平州軍亂殺其節度使蕭迪里玨撫安亂者州民推玨領州事耶律淳死玨知遼必亡乃籍壯丁五萬人馬千匹練兵為備蕭德妃遣時立愛知平州玨拒弗納金人入燕京訪玨情狀于康公弼公弼曰玨狂妄寡謀何能為當示以不疑金人遂加玨臨海軍節度仍知平州既而尼瑪哈又欲先下平州擒張玨公弼曰若加兵是趣之叛也公弼請自往覘之玨曰契丹八路七路已降今獨平州存敢有異志所以未解甲者防蕭幹耳厚賂公弼使還公弼還言於尼瑪哈曰彼無足慮也乃升平州為南京加玨試中書平章事判留守事至是金驅遼宰相左企弓虞仲文曹義勇康公弼同燕京大家富民俱東徙燕民流離道路不勝其苦過平州遂入城言於玨曰左企弓不能守燕致吾民流離至此公今臨巨鎮握強兵盡忠於遼使我復歸鄉土人心亦惟公是望玨遂召諸將議皆曰聞天祚兵勢復振出沒漠南公若仗義勤王奉迎天祚以圖興復先責左企弓等叛降之罪而誅之盡歸燕民使復其業而以平州歸宋則宋無不接納平州遂為藩鎮矣即後日金人加兵內用平州之衆外藉宋人之援又何懼焉玨又訪於翰林學士李石亦以為然玨乃遣張謙率五百餘騎傳留守令召左企弓虞仲文曹義勇康公弼至灤河西岸數企弓等十罪皆縊殺之玨仍稱保大三年畫天祚像朝夕謁事必告而後行稱遼官秩榜諭燕人復業恆産為常勝軍所占者悉還之燕民既得歸大悅李石更名安弼偕故三司使高黨至燕京説王安中曰平州形勢之地張玨總練之才足以禦金人安燕境幸招致之無令西迎天祚北合蕭幹也安中深納之令安弼至汴以聞帝以手札付同知燕山府詹度第令羈縻之而度促玨內附玨乃遣張鈞張敦固持書來請降王黼勸帝納之趙良嗣諫曰國家新與金盟如此必失其歡後不可悔不聽良嗣坐削五階而詔安中及詹度厚加安撫與免三年常賦玨聞之自謂得計秋七月童貫致仕以內侍談稹為兩河燕山路宣撫使時貫與蔡攸歸自燕頗失上意王黼梁師成共薦稹代貫交雲中之地稹至太原招朔應尉諸州降人為朔寧軍八月遼蕭幹引兵破景薊州遂攻燕郭藥師與戰破之幹走死初金人既陷燕京幹就奚王府自立為帝國號大奚時奚人飢幹出盧龍嶺攻破景州又敗常勝軍於石門鎮陷薊州寇掠燕城其鋒鋭甚有涉河犯京師之意人情􅍅􅍅頗有謀棄燕者已而藥師大破其衆乘勝窮追過盧龍殺傷大半幹遁去尋為其下所殺傳首京師詔加藥師太尉冬十月詔建平州為太寧軍以張玨為節度使時金人聞玨叛遣棟摩率三千騎攻玨玨率兵拒之於營州棟摩以兵少不交鋒而退玨遂妄以大捷聞朝廷拜玨節度使犒賞銀絹數萬十一月金斡里雅布攻平州圍之金人以棟摩無功而還乃復使斡里雅布督棟摩攻平州會張玨聞朝廷犒賜將至喜而逺迎斡里雅布乘其無備襲之與玨戰於城東玨敗宵奔燕山王安中納而匿之平州都統張忠嗣及張敦固出降金金遣使與敦固入諭城中城中人殺其使者立敦固為都統閉門固守詔殺張玨函首以畀金時金人以納叛來責朝廷初不欲發遣金人索之益急王安中取貌類玨者斬其首與之金知非玨也遂欲以兵攻燕安中言必不發遣懼起兵端朝廷不得已令安中縊殺之函其首併玨二子送於金於是燕降將及常勝軍士皆泣下郭藥師曰金人欲玨即與玨若求藥師亦將與藥師乎安中懼因力求罷詔以蔡靖知燕山府事自是降將卒解體而金卒用此為兵端云金人來歸武朔州時朝廷以山後諸州請于金金主烏竒邁新立將許之尼瑪哈自雲中至言于金主曰先帝初圖宋協力攻遼故許以燕地宋人既盟之後請加幣以求山西諸鎮先帝辭其幣而復與之盟曰無匿逋逃無擾邊民今宋數路招納叛亡纍疏叛人姓名索之童貫不遣盟未期年已如是萬世守約其可望乎且西鄙未寧割付山西諸郡則諸軍失屯據之所將有經略或難持久請勿與之金主遂遣使止以武朔二州來歸六年三月金人遣使詣宣撫司索趙良嗣所許糧二十萬石談稹曰二十萬石豈易致耶良嗣口許不足憑也遂不與金人由此大怒六月金人克平州執張敦固殺之詔以收復燕雲以來京都兩河之民困於調度令京西淮南兩浙江南荆湖四川閩廣並納免夫錢每夫三十貫委漕臣限督之違者從軍法又詔宗室戚里宰執之家及宫觀寺院一例均敷於是遍索天下所得才二千萬緡而結怨四海矣八月談稹罷復以童貫領樞密院事兩河燕山路宣撫使初金人以拓跋故地雲中二千里遺夏止以武朔二州來歸至是夏人舉兵侵武朔地界談稹遣兵禦之兵數交夏師不即退又金人以朝廷納張玨不給糧遂攻應蔚逐守臣朝廷罪稹措致乖方詔致仕以貫代之時遼主延禧在夾山帝欲誘致之始遣一畨僧齎御筆絹書通意及延禧許歸遂易書為詔許待以皇弟之禮位燕越二王上築第千間女樂三百人延禧大喜貫之是行名為代稹交割山後土地其實已約延禧來降自往迎之也然延禧以中國不足恃卒不至是月以復燕雲赦天下七年六月封童貫廣陽郡王帝援神宗遺訓能復全燕之境者胙土錫以王爵封貫為王方臘之亂宋江附徽宗宣和二年冬睦州清溪民方臘作亂方臘世居縣堨村託左道以惑衆初唐永徽中睦州女子陳碩真反自稱文佳皇帝故其地相傳有天子基臘因得憑借以自信縣境梓桐幫源諸洞皆落山谷幽險處民物繁夥有漆楮杉材之饒富商巨賈多往來臘有漆園造作局屢酷取之臘怨而未敢發時朱勔花石綱之擾比屋致怨臘因民不忍隂聚貧乏遊手之徒以誅勔為名遂作亂自號聖公建元永樂置官吏將帥以巾飾為别自紅而上凡六等無弓矢甲胄惟以鬼神詭祕事相扇訹焚室廬掠金帛子女誘脅良民為兵人安於太平不識金革聞金鼓聲即斂手聽命不旬日聚兵數萬兩浙都監蔡遵顔坦擊之皆敗死於息坑十二月臘攻陷青溪遂陷睦歙州東南將郭師中戰死北掠桐廬富陽諸縣進逼杭州郡守趙霆棄城走州陷殺制置使陳建廉訪使趙約縱火六日死者不可勝計凡得官吏必斷臠支體探其肺腸或熬以膏油叢鏑亂射備盡楚毒以償怨心警奏至京師時方聚兵以圖北伐王黼匿不以聞於是凶焰日熾附者益衆東南大震淮南發運使陳遘上言臘衆強東南兵弱乞調京畿兵及鼎澧槍牌手兼程以來使不至滋蔓帝得疏始大驚乃罷北伐之議詔以童貫為江淮荆浙宣撫使談稹為兩浙制置使率禁旅及秦晉畨漢兵十五萬討之三年春正月方臘陷婺州又陷衢州衢守彭汝方被執罵賊而死賊屠其城二月方臘陷處州又遣其將方七佛引衆六萬冦秀州統軍王子武禦之會大軍至合擊賊斬首九千賊還據杭州夏四月童貫合兵擊方臘破之執臘以歸童貫談稹前鋒至清河堰水陸並進屢擊破方臘臘焚官舍府庫民居宵遁還清溪幫源洞諸將劉延慶王稟王渙楊惟忠辛興宗王淵等相繼至盡復所陷城貫等合兵擊臘於幫源洞臘衆尚二十萬與官軍力戰深據岩屋為三窟諸將莫知所入王淵禆將韓世忠潛行溪谷問野婦得徑即挺身直前渡險數里搗其穴格殺數十人擒臘以出辛興宗領兵截洞口掠為己功併取臘妻子及偽相方肥等其衆遂潰臘之亂凡破六州五十二縣戕平民二百萬所掠婦女自賊洞逃出裸而縊於林中者相望百餘里五月安置御史中丞陳過庭於黃州過庭以睦冦竊發上言致冦者蔡京飬冦者王黼竄二人則冦自平又言朱勔父子本刑餘小人交結權幸竊取名器罪惡盈積宜正典刑以謝天下三人聞而憾之故貶八月加童貫太師封楚國公賞平方臘功也方臘伏誅改睦州為嚴州歙州為徽州宣和三年二月淮南盜宋江冦京東州郡至海州張叔夜敗之江乃降宋江起為盜以三十六人橫行河朔轉掠十郡官軍莫敢攖其鋒知亳州侯蒙上書言江才必有過人者不若赦之使討方臘以自贖帝命蒙知東平府未赴而卒又命張叔夜知海州江將至海州叔夜使間者覘所向江徑趨海濱劫巨舟十餘載鹵獲叔夜募死士得千人設伏近城而出輕兵距海誘之戰先匿壯卒海旁伺兵合舉火焚其舟賊聞之皆無鬬志伏兵乘之擒其副賊江乃降宋史紀事本末卷十二
