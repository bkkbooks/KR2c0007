body:
  text: 宋史紀事本末卷五明馮琦原編陳邦瞻增輯茶鹽𣙜罷仁宗天聖元年春正月癸未命三司節浮費遂立計置司罷𣙜茶鹽行貼射通商法時承平既久兵籍益廣吏員益衆佛老夷狄蠧耗中國百姓縱侈而上下困於財三司使李咨請省浮費鹽鐵判官俞獻卿亦言天下穀帛日耗稻苖未生而和糴桑葉未吐而和買自天禧以來日甚一日宜與大臣議救正之上納其言乃立計置司以張士遜吕夷簡魯宗道領之初陜西河北商人入芻糧者𣙜貨務給劵以茶償之又益以東南緍錢及香藥犀象為虛實三估謂之三稅而塞下急於兵食欲廣儲偫不愛虛估入中者以虛錢得實利人競趨焉其後虛估日益高茶日益賤入實錢金帛日益寡茶法大壞至是上命咨等校歲入登耗更定之咨等言淮南十三場茶歲課五十萬緍天禧五年才及二十三萬緍每劵直錢十萬鬻之售錢五萬五千總為實錢十三萬緍除九萬緡為本錢歲才得息錢三萬餘緡而官吏廪給雜費不與焉是則虛數雖多實利殊寡請罷三稅以十三場本息併計其數罷官給本錢使商人與園户自相交易一切定為中估而官收其息如鬻舒州羅源場茶斤售錢五十有六官不復給但使商人輸息錢三十有一而已然必輦茶入官隨啇人所指而與之給劵為驗以防私售謂之貼射若歲課貼射不盡則官市之如舊商人入芻糧塞下者隨所在實估度地理逺近量增其直給劵至京一切以緍錢償之謂之見錢法咨等又以鹽之類有二解池引水而成曰顆鹽淮浙蜀廣煮海或井或鹻而成曰末鹽皆通商貿易乾興初解鹽計歲入二十三萬緍視天禧中數損十四萬請罷之專令兩池入中並邊芻粟上皆從之三年十一月復𣙜茶鹽李咨以實錢入粟實錢售茶二者不得相為輕重既行而商人失厚利怨謗蜂起上疑變法之弊下詔責計置司而遣官行視咨具言新法便會孫奭等論其煩擾遂罷貼射法官仍給本錢市茶商人入錢售之茶法復壞解鹽亦復𣙜之八年八月復解鹽通商法上書者言𣙜解鹽官得利微而民困於轉輸詔翰林學士盛度御史中丞王隨議更其制因畫通商五利上之曰方禁商時伐木造船輦用兵民不勝疲勞今去其弊一利也陸運既差帖頭又役車户貧人懼役連歲逋逃今悉罷之二利也船運有沉溺之患綱吏侵盜雜以泥沙硝石其味苦惡疾生重膇今皆得食真鹽三利也錢幣國之貨泉欲使通流富家多藏鏹不出民用益蹙今歲得商人出緍錢六十餘萬助經費四利也歲減鹽官兵卒畦夫傭作之給五利也遂罷三京二十八州軍𣙜法聽商人入錢若金銀於京師𣙜貨務受鹽兩池而民便之自是雖商賈流行而課耗矣景祐三年三月罷𣙜茶復行貼射法自貼射茶法廢而河北入中虛估之弊益甚李咨既居政府請復行見錢法皆如天聖元年之制又命商持劵徑趨𣙜貨務驗實立償之錢而三稅之法廢縣官自此省費矣慶厯二年春正月丁巳復𣙜鹽法自元昊反軍興用度不足因聽並邊入中芻粟豫劵趨京師𣙜貨務受錢若金銀入中他貨豫劵償以池鹽由是羽毛筋角膠潻鐵炭瓦木之類一切以鹽易之猾商貪吏表裏為姦至入椽木二估錢千給鹽二百二十斤鹽直益賤販者不行至是詔凡商人虛估受劵及已受鹽未鬻者皆計直輸虧官錢內地州軍民間鹽悉收市入官官為置場增價出之復禁永興等十一州軍商鹽官自輦運以衙前主之又禁商鹽私入蜀置析博務於永興鳳翔聽人入錢若蜀貨易鹽趨蜀中以售已而東南未鹽悉復禁𣙜皇祐四年九月以范祥為陜西轉運使制置解鹽事自復𣙜法兵民輦運不勝其苦並邊務誘人入中芻粟皆為虛估騰踊至數倍大耗京師錢幣太常博士范祥關中人也熟其利害常謂兩池之利甚博而不能少助邊計者公私侵漁之害也儻一變法歲可省度支緍錢數十百萬乃畫䇿以獻遂命制置其事使推行之論者爭言其非是遣户部使包拯馳視還言其便論者猶籍籍驛召祥至與三司雜議皆是祥所建詔從之田况請久任祥以專其事乃擢祥為轉運使於是舊禁鹽地一切通商聽鹽入蜀罷九州軍入中芻粟令入實錢償以鹽授以要劵即池驗劵按數而出盡弛兵民輦運之役以商所入緍錢糴粟輸並邊九州軍而悉留𣙜貨物錢幣以實中都由是黠商貪賈無所僥幸關內之民得安其業公私便之嘉祐四年二月罷𣙜茶自茶為官𣙜民私蓄盜販皆有禁臘茶之禁尤嚴歲報刑辟不可勝計園户困於征取官司並緣侵擾因陷罪戾至破産逃匿者歲比有之又茶法屢變歲課日削官茶所在陳積縣官獲利無幾論者皆謂宜弛其禁帝曰茶鹽民所食而強設法以禁之致犯法者衆顧經費尚廣未能弛禁耳既而葉清臣請令通商收稅以免輦運之勞弭刑辟之濫又茶與鹽均為人用宜以口定賦三司議以為不可行於是著作佐郎何鬲三班奉職王嘉麟皆上書請罷給茶本錢縱園户貿易而官收租錢與所在征算歸𣙜貨務以償邊糴之費可以疏利源寬民力富弼韓琦曾公亮然其䇿請於帝行之下三司議三司言茶課給本收利所獲甚微而煩擾為患園户輸納侵害日甚小民趨利犯法益繁宜約歲入息錢之數均付茶民恣其買賣所在收算而不給本錢遂下詔曰古者山澤之利與民共之故民足於下而君裕於上國家無事刑罰以清自唐建中時始有茶禁上下規利垂二百年如聞比來為患益甚民被誅求之困日惟咨嗟官受濫惡之入歲以陳積私藏盜販犯者實繁嚴刑峻誅情所不忍是於江湖間幅員數千里為陷穽以害吾民也朕心惻然念此久矣間遣使者往就問之而皆歡然願弛其禁歲入之課以時上官一二近臣條析其狀朕猶若慊然又於歲輸裁減其數使得饒阜以相為生俾通商利厯世之弊一旦以除著為經常弗復更制損上益下以休吾民尚慮喜於立異之人緣而為姦之黨妄陳奏議以惑官司必置明刑無或有貸凡歲輸緍錢三十三萬八千有竒謂之租錢與諸路本錢悉儲以待邊糴自是惟臘茶禁如舊餘茶肆行天下論者猶謂朝廷志於恤人省刑其意良善然茶户先時受錢於官而今也顧使納錢於官受納之間利害百倍先時百姓冒法販茶被罰耳今悉均賦於民賦不時入刑亦及之是良民代冒法受罪先時商賈為國遷貿而州郡收其稅今商賈以利薄不行致歲額不登經費日蹙翰林學士歐陽修知制誥劉敞皆主是説請除前令帝不聽神宗熙寧二年三月以薛向為江浙荆淮發運使時范祥卒以向繼領其事向請兼以鹽易馬王安石時令羣牧主其説請久任向會淮南轉運使張靖言向壞鹽法且有欺隱帝召向與靖對錢公輔范純仁皆言向罪安石排羣議抵靖於法以向代之向請即永興軍置賣鹽場以邊費錢十萬緍儲永興為鹽鈔官本官自鬻之而罷通商從之七年夏四月初𣙜蜀茶時王韶建開河湟之䇿遣三司幹當公事李把入蜀經畫買茶於秦鳳熙河博馬以著作佐郎蒲宗閔同領其事初蜀之茶園皆民兩稅地不植五榖惟宜種茶賦稅一例折輸稅額總三十萬杞乃即蜀諸州創設官場更嚴私交易之令知彭州吕陶言市易司籠制百貨歲出息錢不過十之二今茶場司盡𣙜民茶取息十之三茶户被害不可勝窮詔止取息十之一而陶亦以是得罪未幾以李稷都大提舉茶場稷與宗閔務浚利刻急一年之間通課利及舊界息稅七十六萬七千餘緍稷又辟陸師閔幹當公事以自輔八年十二月更定解池鹽鈔法自薛向立鹽鈔本其後多虛鈔而鹽益輕至是多言官賣不便乞通商王安石主提舉張景溫之言至課民買官鹽隨貧富作業為多少之差買賣私鹽聽人告以犯人家財給之買官鹽食不盡留經宿者同私鹽法於是民間騷怨鹽鈔舊法每席六緍至是二緍有餘商不入粟邊儲失偹哲宗元祐元年秋七月罷成都𣙜茶場時劉摯蘇轍論陸師閔在成都增場𣙜茶其害過於市易遂貶師閔官而罷茶場值上官均論集賢修撰黃亷往附蔡確出為陜西都轉運使亷至陜謂茶政隨事制宜便於公者不茍去以為名害於民者不茍存以為利請𣙜熙秦茶勿改而罷成都茶場許東路通商禁南茶毋入陜西以利蜀貨定博馬歲額為萬八千匹朝廷從之歲餘人皆稱便初陸師閔歲計茶息以一百二十萬緍掊克斂怨無所不至及亷盡除公私之病比數年亦得百二十萬六年秋七月復制置解鹽使詔鹽復許通商徽宗崇寧二年夏四月更鹽鈔法蔡京欲囊括四方之錢實中都以誇富強而固恩寵俾商人先輸錢於榷貨務請鈔赴産鹽州郡支鹽而舊鈔悉不用商人凡三輸錢始獲一直之貨因無資更鈔已輸錢悉乾沒於是有齎數十萬劵一旦廢棄者朝為豪商夕儕流丐有赴水投繯而死者商賈不通邊儲失備提點淮東刑獄章繹見而哀之奏改法誤民京怒奪繹官正雅樂仁宗天聖元年冬十月翰林侍講學士言郊廟二舞失序願下有司考議於是學士承旨劉筠等議曰周人奏清廟以祀文王執競以祀武王漢高帝文帝亦各有舞至唐有事太廟每室樂歌異名蓋帝王功德既殊舞亦隨變屬者有司不詳舊制奠獻止登歌而樂舞不作其失明甚請如舊制宗廟酌獻復用文舞皇帝還版位文舞退武舞入亞獻酌醴已武舞作至三獻已奠還位則止蓋廟室各頌功德故文舞迎神後各奏逐室之舞郊祀則降神奏高安之曲文舞已作及皇帝酌獻惟登歌奏禧安之樂而縣樂舞綴不作亞獻終獻仍用武舞詔從之景祐元年八月判太常寺燕肅等上言大樂制器歲久金石不調願以周王朴所造律準考按修治并閲樂工罷其不能者乃命直史館宋祁內侍李隨同肅等典其事又命集賢校理李照預焉於是帝御觀文殿取律準閲視親之以屬太常詔求知音者范仲淹薦布衣胡瑗召對崇政殿與鎮東軍節度推官阮逸同較鐘律分造鐘磬各一虡以一黍之廣為分以制尺律徑三分四釐六毫四絲圍十分三釐九毫三絲又以大黍纍尺小黍實籥丁度以為非古制罷之授試祕書省校書郎二年二月命集賢校理李照重定雅樂時承平日久帝留意禮樂之事判太常寺燕肅等上考定樂器并見工人帝御延福宫臨閲奏郊廟五十一曲因問李照樂音高命詳陳之照言王朴所造律準視古樂高五律視教坊樂高二律蓋五代之亂雅樂廢壞朴創意造準不合古法用之本朝卒無福應又編鐘鎛磬無大小輕重厚薄之差銅錫不精聲韻失美大者陵小者抑非中度之器也昔軒轅氏命伶倫截竹為律後令神瞽協其中聲然後聲應鳳鳴而管之參差亦如鳳翅其樂傳之亘古不刋之法也願聽臣依神瞽律法試鑄編鐘一虡可使度量權衡協和乃詔於錫慶院鑄之既成奏御照遂建議請改制大樂取京縣秬黍纍尺成律鑄鐘審之其聲猶高更用太府布帛尺為法乃下太常制四律别詔潞州取羊頭山秬黍上送於官照乃自為律管之法以九十黍之量為四百二十星率一星占九秒一黍之量得四星六秒九十黍得四百二十星以為十二管定法乃詔內侍鄧保信監視羣工照并引集賢校理聶冠卿為檢討雅樂制度故實官入內都知閻文應董其事中書門下總領焉凡所改制皆關中書門下詳定以聞别詔翰林侍讀學士馮元宋祁冠卿照討論樂理為一代之典又詔天下有深逹鐘律者在所亟以名聞於是杭州鄭向言阮逸蘇州范仲淹言胡瑗皆通知古樂詔遣詣闕其他以樂書獻者悉上有司時胡瑗所作鐘磬大變古法徐復笑曰聖人寓器以聲今不先求其聲而更其器其可用乎後瑗制作皆不效復字復之建州人初遊京師舉進士不第退而學易通流衍卦氣法自筮無祿遂無進取意遊學淮浙間數年益通隂陽天文地理遁甲占射諸家之説一日聽其鄉人林鴻範説詩且言詩之所以用於樂者忽若有得因以聲器求之遂悟七音十二律清濁次序及鐘磬侈弇匏竹高下制度皆洞逹尋召見命為大理評事固以疾辭五月李照上雅樂制度既改制金石則絲竹匏土革木亦當更制奏可照乃鑄銅為籥合升斗四物以興鐘鎛聲量之法籥之率六百三十黍為黃鐘之容合三倍於籥升十二倍於合斗十倍於升乃改造諸器以定其法俄又以鎛之容受差大更增六籥為合十合為升十升為斗銘曰樂斗後數月潞州上秬黍照等擇大黍縱纍之檢考長短尺成與太府尺合法乃定先時太常鐘磬每十六枚為虡而四清聲相承不擊照因上言十二律聲已備餘四清聲乃鄭衛之樂請於編縣止留十二中聲去四清聲則哀思邪僻之聲無由而起也馮元等駁之曰前聖制樂取法非一故有十三管之和十九管之巢三十六簧之竽二十五弦之瑟十三弦之箏九弦七弦之琴十六枚之鐘磬各自取義寧有一之於律吕專為十二數者且鐘磬八音之首絲竹以下受之於均故聖人尤所用心焉春秋號樂總言金奏詩頌稱美實依磬聲此二器非可輕改今照欲損為十二不得其法稽諸古制臣等以為不可且聖人既以十二律各配一鐘又設黃鐘至夾鐘四清聲以附正聲之次原四清之意蓋為夷則至應鐘四宫而設也夫五音宫為君商為臣角為民徴為事羽為物不相凌謂之正迭相凌謂之慢百世所不易也聲重濁者為尊輕清者為卑卑者不可加於尊古今之所同也故列聲之尊卑者事與物不與焉何則事為君治物為君用不能尊於君故也惟君臣民三者則自有上下之分不得相越故四清聲之設正謂臣民相避以為尊卑也今若止用十二鐘旋相考擊至夷則以下四管為宫之時臣民相越上下交戾則凌犯之音作矣此甚不可者也其鐘磬十六皆本周漢諸儒之説及唐家典法所載欲損為十二惟照獨見臣以為且如舊制便帝令權用十二枚為一格且詔曰俟有知者能考四鐘協調清濁有司别議以聞三年二月命官較阮逸胡瑗等所定鐘律秋七月馮元等上新修景祐廣樂記詔翰林學士丁度知制誥胥偃直史館高若訥直集賢院韓琦取鄧保信阮逸胡瑗等鐘律詳定得失以聞九月阮逸言臣等所造鐘磬皆本於馮元宋祁其分方定律又出於胡瑗算術而臣獨執周禮嘉量聲中黃鐘之法及國語鈞鐘絃準之制皆抑而不用臣前蒙召對言王朴律高而李照鐘下竊覩御製樂髓新經厯代度量衡篇言隋書依漢志黍尺制管或不容千二百或不啻九寸之長此則明班志以後厯代無有符合者惟蔡雍銅籥本得於周禮遺範雍自知音所以只傳銅籥積成嘉量則是聲中黃鐘而律本定矣謂管有大小長短者蓋嘉量既成即以量聲定尺明矣今議者但爭漢志黍尺無準之法殊不知鐘有鈞石量衡之制况周禮國語姬代聖經翻謂無慿孰為稽古有唐張文收定樂亦鑄銅匭此足驗周之嘉量以聲定律明矣臣所以獨執周禮鑄嘉量者以其方尺深尺則度可見也其容一釜則量可見也其重均則衡可見也聲中黃鐘之宫則律可見也既律度量衡如此符合則制管歌聲其中必矣臣昧死欲乞將臣見鑄成銅匭再限半月內更鑄嘉量以其聲中黃鐘之宫乃取李照新鐘就加修整務合周制鐘量法度文字已編寫次未敢具進詔送度等并定以聞度等言據鄧保信黍尺二其一稱用上黨秬黍圓者一黍之長纍百成尺與蔡雍合臣等檢詳前代造尺皆以一黍之廣為分唯後魏公孫崇以一黍之長為寸法太常劉芳以秬黍中者一黍之廣即為一分中尉元正以一黍之廣度黍二縫以取一分三家競不能決而蔡雍銅籥亦不明言用黍長廣纍尺今將保信黃鐘管內秬黍二百粒以黍長為分再纍至尺二條比保信元尺一長五黍一長七黍又律管黃鐘籥一枚容秬黍千二百粒以元尺比量分寸略同復將實籥秬黍再纍者校之即又不同其籥合升斗亦皆類此又阮逸胡瑗鐘律法黍尺其一稱用上黨羊頭山秬黍中者纍廣求尺制黃鐘之聲臣等以其大黍百粒纍廣成尺復將管內二百粒以黍廣為分再纍至二尺比逸等元尺一短七黍一短三黍蓋逸等元尺並用一等大黍其實管之黍大小不均遂致差異又其銅律管十二枚臣等據楚衍等圍九方分之法與逸等元尺及所實籥秬黍再纍成尺者校之又各不同又所製銅稱二量亦皆類此臣等看詳其鐘磬各一架雖合典故而黍尺一差難以定奪又言太祖皇帝嘗詔和峴等用景表尺典修金石七十年間薦之郊廟稽合唐制以示詒謀則可且依景表舊尺俟天下有妙達鐘律之學者俾考正之以從周漢之制其阮逸胡瑗鄧保信並李照所用太府寺等尺及阮逸狀進周禮度量法其説踈舛不可依用寶元元年五月右司諫韓琦言臣前奉詔詳定鐘律嘗覽景祐廣樂記睹李照所造樂不依古法皆率已意别為律度朝廷因而施用識者非之今將親祀南郊不可重以違古之樂上薦天地宗廟竊聞太常舊樂見有存者郊廟大禮請復用之詔資政殿大學士宋綬三司使晏殊同兩制官詳定以聞既而綬等言李照新樂比舊樂下三律衆論以為無所考據願如琦請郊廟復用和峴所定舊樂鐘磬不經鐫磨者猶存三縣竒七虡郊廟殿庭可以更用太常亦言舊樂宫縣用龍鳳散鼓四面以應樂節李照廢而不用止以晉鼓一面應節舊樂建鼓四并鞞應共十二靣備而不擊李照以四隅建鼓與鎛鐘相應擊之舊樂雷鼓兩架各八面止用一人考擊李照别造雷鼓每靣各用一人椎鼓順天左旋三步一止又令二人搖鞉以應之又所造大竽大笙雙鳳管兩儀琴十二絃琴並行今既復用舊樂未審照所作樂器制度合改與否詔悉仍舊制其李照所作勿復施用皇祐二年五月丁亥朔新作明堂禮神玉禮儀使言明堂所用樂皆當隨月用律六月己未內出御製明堂樂八曲以君臣民事物配屬五音凡二十聲為一曲用宫變徴變者天地人四時為七音凡三十聲為一曲以子母相生凡二十八聲為一曲皆黃鐘為均又明堂月律五十七聲為二曲皆無射為均又以二十聲二十八聲三十聲為三曲亦無射為均皆自黃鐘宫入無射如合用四十八或五十七聲即依前譜次第成曲其徵聲自同本律及御撰鼓吹警嚴曲合宫歌並肄於太常翰林學士承旨王堯臣等言奉詔預參議阮逸所上編鐘四清聲譜法請用之於明堂者竊以自唐末世樂文墜缺考擊之法久已不傳今若使匏土絲竹諸器盡求清聲即未見其法又據大樂諸工所陳自磬簫琴和巢笙五器本有清聲塤箎竽築瑟五器本無清聲三弦阮九弦琴則有太宗皇帝聖制譜法至歌工引音極唱止及黃鐘清聲臣等參議其清正二聲既有典據理當施用自今大樂奏夷則以下四均正律為宫之時商角依次並用清聲自餘八均盡如常法至於絲竹等諸器舊有清聲者令隨鐘石教習本無清聲者未可創意求法且當如舊惟歌者本用中聲故夏禹以聲為律明人皆可及若強所不至足纍至和請止以正聲作歌應合諸器亦自是一音别無差戾其阮逸所上聲譜以清濁相應先後互擊取音靡曼近於鄭聲不可用詔可秋七月御製明堂無射宫樂曲譜三皆五十七字五音一曲奉爼用之二變七律一曲飲福用之七律相生一曲退文舞迎武舞及亞獻終獻徹豆用之閏十一月詔曰朕聞古者作樂本以薦上帝配祖考三五之盛不相沿襲然必太平始克明備周武受命至成王時始大合樂漢初亦沿舊樂至武帝時始定泰一后土樂詩光武中興至明帝時始改大豫之名唐高祖造邦至太宗時孝孫文收始定鐘律明皇方成唐樂是知經啓善述禮樂重事須三四世聲文乃定國初亦循用王朴竇儼所定周樂太祖患其聲高遂令和峴減一律真宗始議隨月轉律之法屢加按核然念樂經久墜學者罕專厯古研覃亦未完緒頃雖博加訪求終未有知聲知經可信之人嘗為改更未適兹意中書門下其集兩制及太常禮樂官以天地五方神州日月宗廟社蠟祭享所用登歌宫縣審定聲律是非按古合今調諧中和使經久可用以發揚祖宗之功德朕何憚改為但審聲驗書二學鮮並互詆胸臆無所援據慨然希古靡忘於懷於是中書門下集兩制太常官置局於祕閣詳定大樂王堯臣等言天章閣待制趙師民博通今古願同詳定及乞借參政高若訥所校十五等古尺並從之宋祁田况薦益州鄉貢進士房庶曉音律祁上其所著樂書補亡三卷召詣闕庶自言嘗得古本漢志云度起於黃鐘之長以子榖秬黍中者一黍之起積一千二百黍之廣度之九十分黃鐘之長一為一分今文脫之起積一千二百黍八字故自前世以來纍黍為尺以制律是律生於尺尺非起於黃鐘也且漢志一為一分者蓋九十分之一後儒誤以一黍為一分其法非是當以秬黍中者一千二百實管中黍盡得九十分為黃鐘之長九寸加一以為尺則律定矣直祕閣范鎮是之時胡瑗等製樂已定故授庶校書郎而遣之惟集賢校理司馬光不以鎮言為是數與論難然世鮮鐘律之樂竟不能決三年春正月詔徐宿泗耀江鄭淮揚七州軍采磬石令諸路訪民間有藏古尺律者上之秋七月丁巳兩制禮官王堯臣等言太常天地宗廟四時之祀樂章凡八十九曲自景安而下七十五章率以安名曲豈特本道德政教嘉靖之美亦緣神靈祖考安樂之故臣等謹上議國朝樂宜名大安詔曰朕惟古先格王隨代之樂亦既制作必有稱謂緣名以討義繇義以知德蓋名者德之所載而行逺垂久之致焉故韶以紹堯夏以承舜濩以救民武以象伐傳之不朽用此道也國家舉墜正失典章交備獨斯體大而有司莫敢易言之朕憫然念兹大懼列聖之休未能照揭於天下之聽是用申敕執事逺求博講而考定其衷今禮官學士逮三有事之臣同寅一辭以大安之議來復且謂藝祖之戡暴亂也安天下之未安其功大二宗之致太平也安天下之既安其德盛洎朕之承聖烈也安祖宗之安其仁厚祗覽所議熟復於懷恭惟神德之造基神功之戢武章聖恢清淨之治沖人蒙成定之業雖因世之迹各異而靖民之道同歸以之播鐘球文羽籥用諸郊廟告於神明曰大且安誠得其正四年五月户部員外郎范鎮上言陛下制樂三年有司紛然未決蓋由不議其本而爭其末也樂者和氣也發和氣者聲音也聲音生於無形故古人以有形之物傳其法然後無形之聲音得而和氣可通也今有形之物皆相戾而不合則無形之聲音不可得而和也必得真黍然後可為耳鎮自謂得古法司馬光終不以為是五年夏四月甲午命劉沆梁適監議大樂知制誥王洙奏黃鐘為宫最尊者但音有尊卑耳不必在其形體也言鐘磬依律數為大小之制者經典無正文惟鄭康成立意言之亦自云假設之法孔頴逹作疏因而述之據厯代史籍亦無鐘磬依數大小之説其康成頴逹等即非身曾制作樂器至如言磬前長三律二尺七寸後長二律一尺八寸是磬有大小者據此以黃鐘為律臣曾依此法造黃鐘特磬者止得林鐘律聲若隨律長短為鐘大小之制則黃鐘長二尺二寸半減至應鐘則形制大小比黃鐘才四分之一又九月十月以無射應鐘為宫即黃鐘大吕反為商聲宫小而商大是君弱臣強之象今參酌其鎛鐘特磬制度欲且各依律數算定長短大小容受之數仍以皇祐中黍尺為法鑄大吕應鐘鐘磬各一即見形制聲韻所歸奏可五月王拱辰言奉詔詳定大樂比臣至局鐘磬已成竊緣律有長短磬有大小黃鐘九寸最長其氣陽其象土其正聲為宫為諸律之首蓋君德之象不可並也今十二鐘磬一以黃鐘為率與古為異臣等亦嘗詢逸瑗等皆言依律大小則聲不能諧故臣竊有疑請下詳定大樂所更稽古義參定之是月知諫院李兊言曩者紫宸殿閲太常新樂議者以鐘之形制未中律度遂斥而不用復詔近臣詳定竊聞崇文院聚議而王拱辰欲更前史之義王洙不從議論喧嘖夫樂之道廣大微妙非知音入神豈可輕議西漢去聖尚近有制氏世典大樂但能紀其鏗鏘而不能言其義况今又千餘年而欲求三代之音不亦難乎且阮逸罪廢之人安能通聖明述作之事務為異説欲規恩賞朝廷制樂數年當國財匱乏之時煩費甚廣器既成矣又欲改為雖命兩府大臣監議然未能裁定其當請以新成鐘磬與祖宗舊樂參校其聲但取諧和近雅者合用之六月乙亥御紫宸殿奏太常新定大安之樂觀宗廟祭器八月詔南郊姑用舊樂其新定大安之樂常祀及朝會用之翰林學士胡宿上言自古無並用二樂之理今舊樂高新樂下相去一律難並用且新樂未施郊廟先用之朝會非先王薦上帝配祖考之意帝以為然至和二年二月潭州上瀏陽縣所得古鐘送太常初李照斥王朴樂音高乃作新樂下其聲太常歌工病其太濁歌不成聲私賂鑄工使減銅齊而聲稍清歌乃協然照卒莫之辨又朴所制編鐘皆側垂照與胡瑗皆非之及照將鑄鐘給銅於鑄瀉務得古編鐘一工人不敢毁乃藏於太常鐘不知何氏所作其銘云粵朕皇祖寶和鐘粵斯萬年子子孫孫永寶用叩其聲與朴鐘夷則清聲合而其形側垂瑗後改鑄正其鈕使下垂叩之弇鬱而不揚其鎛鐘又長用而震掉聲不和著作佐郎劉羲叟謂人曰此與周景王無射鐘無異上將有眩惑之疾嘉祐元年春正月甲寅朔帝御大慶殿受朝暴感風眩趣行禮而罷人以劉羲叟之言為驗七年翰林學士王圭言昔之作樂以五聲播於八音調和諧合而與治道通先王用於天地宗廟社稷事於山川鬼神使鳥獸盡感况於人乎然則樂雖盛而音虧未知其所以為樂也今郊廟升歌之樂有金石絲竹匏土革而無木音夫所謂柷敔者聖人用以著樂之始終顧豈容有缺耶且樂莫隆於韶書曰戞擊是柷敔之用既云下而擊鼗知鳴球與柷敔之在堂故傳曰堂上堂下各有柷敔也今陛下躬祠明堂宜詔有司考樂之失而合八音之和於是下禮官議而堂上始置柷敔神宗元豐三年六月詔楊傑等議樂帝自即位於禮樂之事未遑制作至是將有事於明堂知禮院楊傑條上舊樂之失遂召致仕祕書監劉几侍郎范鎮與傑參議几言律主於人聲不以尺度求合古今異時聲亦隨變儒者泥古致詳於形名度數間而不知清濁輕重之用故求於器雖合考於聲則不諧且古樂備四清聲沿五季亂離而廢請增之一切下王朴樂二律用仁宗時所制編鐘追考成周分樂之序辨正二舞容節范鎮欲求一稃二米真黍以律生尺改修鐘量廢四清聲詔悉從几傑議樂成第加恩賚鎮謝曰此劉几樂也臣何預焉乃復上疏曰太常鎛鐘皆有大小輕重之法非三代莫能為者禁中又出李照胡瑗所鑄銅律及尺付太常按照黃鐘律合王朴太簇律仲吕律合王朴黃鐘律比朴樂才下半律外有損益而內無損益鐘聲鬱而不發無足議者照之律雖是然與其樂校三格自相違戾且以太簇為黃鐘則是商為宫也方劉几奏上時臣初無所預臣頃造律內外有損益其聲和又與古樂合今若將臣所造尺律依大小編次太常鎛鐘可以成一代大典又太常無雷鼓靈鼓路鼓而以散鼓代之開元中有以畫圖獻者一鼓而為八面六面四面明皇用之國朝郊廟或考或不考宫架中惟以散鼓不應經義又八音無匏土二音笙竽以木斗攢竹而以匏裹之是無匏音也塤器以木為之是無土音也八音不具以為備樂安可得哉不報四年冬十月詳定所言搏拊琴瑟以詠則堂上之樂以象朝廷之治下管鼗鼓合止柷敔笙鏞以間則堂下之樂以象萬物之治後世有司失傳歌者在堂兼設鐘磬宫架在庭兼設琴瑟堂下匏竹置之於牀並非其序請親祀宗廟及有司攝事歌者在堂不設鐘磬宫架在庭不設琴瑟堂下匏竹不置於牀其郊壇上下之樂亦以此為正而有司攝事如之又言以小胥宫縣推之則天子鐘磬鎛十二虡為宫縣明矣故或以為配十二辰或以為配十二次則虡無過十二先王之制廢學者不能考其數隋唐以來有謂宫縣當二十虡甚者又以為三十六虡方唐之盛日有司攝事樂並用宫縣至德後太常聲音之工散亡凡郊廟有登歌而無宫縣後世因仍不改請郊廟有司攝事改用宫架十八虡太常以謂用宫架十二虡則律吕均聲不足不能成均請如禮宫架四面如辰位設鎛鐘十二虡而甲丙庚壬設鐘乙丁辛癸設磬位各一虡四隅植建鼓以象二十四氣宗廟郊丘如之哲宗元祐三年十二月甲辰范鎮定鐘律諸樂器以進令禮官太常參定賜鎮詔曰朕惟春秋之後禮樂先亡秦漢以來韶武僅在散樂工於河海之上往而不還聘先生於齊魯之間有莫能致魏晉以下曹鄶無譏豈徒鄭衛之音已雜華戎之器間有作者猶存典刑然銖黍之一差或宫商之易位惟我四朝之老獨知五降之非審聲知音以律生尺覽詩書以來上閲簨簴之在廷君臣同觀父老太息方詔學士大夫論其法工師有司考其聲上追先帝移風易俗之心下慰老臣愛君憂國之志究觀所作嘉歎不忘閏月甲辰詔百官觀新樂范鎮樂成著為八論自敘考周官王制司馬遷書班氏志流通貫穿一無抵牾樂下太常楊傑上言元豐中詔范鎮劉几與臣詳議大樂既成而奏稱其和協今鎮新定樂法與樂局所議不同且樂經仁宗制作神考睿斷奏之郊廟朝廷蓋已久矣豈可用鎮一説而遽改之遂著元祐樂議以破鎮説禮部太常亦言鎮樂自係一家之學難以參用仍詔樂如舊制元符二年春正月詔前信州司法參軍吳良輔按協音律改造琴瑟教習登歌以太常少卿張商英薦其知樂故也初良輔在元豐中上樂書五卷其書分為四類以謂天地兆分氣數爰定律厥氣數通之以聲於是撰釋律律為經聲為緯律以聲為文聲以律為質旋相為宫七音運生於是撰釋聲聲生於日律生於辰故經之以六律緯之以五聲聲律相協和而無乖播之八音八音以生於是撰釋音四物兼采八器以成度數施設象隱於形考器論義道德以明於是撰釋器類各有條凡四十十四篇大抵考之經傳精以講思頗益於樂徽宗崇寧元年詔以大樂之制訛繆殘闕樂器敝壞制度不齊秦漢之後樂經散亡箏築阮秦晉之樂也乃列於琴瑟之間熊羆按梁隋之樂也乃設於宫架之外笙不用匏舞不象成曲不協譜諸儒自相非議不足取法議樂之臣無所據依乃博求知音之士於天下於是有魏漢津者本蜀黥卒自言師事唐仙人李良授以鼎樂之法皇祐中與房庶俱以善樂薦時阮逸方定黍律不獲用漢津至是年九十餘矣蔡京復薦之乃得召見獻樂議曰聲有太有少太者清聲陽也天道也少者濁聲隂也地道也中聲在其間人道也合三才之道備隂陽竒耦然後四序可得而調萬物可得而理當時以為迂怪蔡京獨神之或言漢津本范鎮之役稍窺見其制作而京託之於李良云二年九月禮部員外陳暘上所撰樂書二百卷命吏部尚書何執中看詳謂暘欲考定音律以正中聲願送講議司令知音律者參驗行之暘論曰魏漢津論樂用京房二變四清蓋五聲十二律樂之正也二變四清樂之蠧也二變以變宫為君四清以黃鐘清為君事以時作固可變也而君不可變太簇大吕夾鐘或可分也而黃鐘不可分豈古人所謂尊無二上之旨哉壬辰詔曰朕惟隆禮作樂實治內修外之先務損益述作其敢後乎其令講議司官詳求厯代禮樂沿革酌古今之宜修為典訓以貽永世致安上治民之至德著移風易俗之美化乃稱朕咨諏之意焉三年春正月甲辰命魏漢津定樂鑄九鼎時帝鋭意制作以文太平蔡京復每為帝言方今泉幣所積盈五千萬和足以廣樂富足以備禮帝惑其説而制作營築之事興矣至是京以門客劉昺為大司樂命魏漢津定樂鑄九鼎漢津上言曰臣聞皇帝以三寸之器名為咸池其樂曰大卷三三而九乃為黃鐘之律禹郊黃帝之法以聲為律以身為度用左手中指三節三寸謂之君指裁為宫聲之管又用第四指三節三寸謂之臣指裁為商聲之管又用第五指三節三寸謂之物指裁為羽聲之管第二指為民為角大指為事為徴民與事君臣治之以物養之故不用為裁管之法得三指合之為九寸即黃鐘之律定矣黃鐘定餘律從而生焉臣今欲取帝中指第四指第五指各三節先鑄九鼎以備百物之象次鑄帝座大鐘次鑄四韻清聲鐘次鑄二十四氣鐘然後均弦裁管為一代之樂制帝從之漢津論樂語多無稽之言然曉隂陽數術多竒中嘗語所知曰不三十年天下亂矣四年八月九鼎成奉安於九成宫以蔡京為定鼎禮儀使乙酉帝幸宫行酌獻禮鼎各一殿周以垣墻上施埤堄墁如方色外築垣環之中央曰帝鼎北曰寶鼎東曰牡鼎東北曰蒼鼎東南曰岡鼎南曰彤鼎西南曰阜鼎西曰皛鼎西北曰魁鼎又鑄帝座大鐘及二十四氣鐘時制新樂亦成大司樂劉昺言大朝會宫架舊用十二熊羆按金錞簫鼓觱篥等與大樂合奏今所造大樂逺稽古制不應雜以鄭衛詔罷之又依昺改定二舞各九成每三成為一變執籥秉翟揚戈持盾威儀之節以象治功庚寅樂成列於崇政殿有旨先奏舊樂三闋曲未終帝曰舊樂如泣聲揮止之既奏新樂帝顔和豫百僚稱頌九月朔以鼎樂成帝御大慶殿受賀是日初用新樂太尉率百僚奉觴稱夀有數鶴從東北來飛度黃庭回翔鳴唳乃下詔曰禮樂之興百年於此然去聖愈逺遺聲弗存乃者得隱逸之士於草茅之賤獲英莖之器於受命之邦適時之宜以身為度鑄鼎以起律因律以制器按協於庭八音克諧昔堯有大章舜有大韶三代之王亦各異名今追千載而成一代之制宜賜新樂之名曰大晟朕將薦郊廟享鬼神和萬邦與天下共之其舊樂勿用先是瑞州上古銅器有樂鐘驗其款識乃宋成公時帝以端王繼大統故詔言受命之邦而隱逸之士謂漢魏津也朝廷舊以禮樂掌於太常至是專置大晟府大司樂一員典樂二員並為長二大樂令一員協律郎四員又有製撰官為制甚備於是禮樂始分為二加魏漢津虛和沖顯寶應先生帝幸九成宫酌獻至北方寶鼎鼎忽破水流溢於外或者以為北方致亂之兆大觀元年五月甲午詔頒新樂於天下二年二月劉詵上徴聲詔曰自唐以來正聲全失無徴角之音五聲不備豈足以道和而化俗哉劉詵所上徴聲可令大晟府同教坊依譜按習仍增徴角二譜候習熟來上初進士彭几進樂書論五音言本朝以火德王而羽音不禁徴調尚闕禮部員外郎吳時善其説建言乞召几至樂府朝廷從之至是乃降是詔三年五月帝御崇政殿親按宴樂召侍從以上侍立詔曰大晟之樂已薦之郊廟而未施於宴饗比令有司播之教坊試於殿庭無惉懘焦急之聲嘉與天下共之可以所進新樂頒行其舊樂悉禁八月大晟府奏以雅樂中聲播於宴樂舊闕徴角二調及無土石匏三音今樂並已增入詔頒降天下九月詔大晟樂頒於太學辟雍諸生習學所服冠以辨袍以素紗皂緣紳帶佩玉從劉昺製也昺又上言曰五行之氣有生有尅四時之禁不可不頒示天下盛德在木角聲乃作得羽而生以徴為相若用商則刑用宫則戰故春禁宫商盛德在火徴聲乃作得角而生以宫為相若用羽則刑用商則戰故夏禁商羽盛德在土宫聲乃作得徴而生以商為相若用角則刑用羽則戰故季夏土王宜禁角羽盛德在金商聲乃作得宫而生以羽為相若用徴則刑用角則戰故秋禁徴角盛德在水羽聲乃作得商而生以角為相若用宫則刑用徴則戰故冬禁宫徴此三代之所共行月令所載深切著明者也作樂本以導和用失其宜則反傷和氣夫淫哇淆雜干犯四時之氣久矣陛下親灑宸翰發為詔旨淫哇之聲轉為雅正四時之禁亦有所頒協氣則粹美繹如以成詔令大晟府置圖頒降四年春正月大晟府言宴樂諸宫調多不正如以無射為黃鐘宫以夾鐘為中吕宫以夷則為仙吕宫之類又加越調雙調大食小食皆俚俗所傳今依月改定詔可慶厯黨議仁宗景祐元年冬十月除范仲淹為禮部員外郎天章閣待制判國子監尋權知開封府仲淹先以諫廢后事貶睦州至是復召時御史臺辟石介為主簿未至即論事坐罷館閣校勘歐陽修貽書責中丞杜衍曰主簿於臺中非言事官介足未履臺門之閾已用言事見罷可謂正直剛明不畏避矣度介之才不止為主簿直可為御史今斥介而他舉亦必擇賢夫賢者固好辨及有言則又斥而他舉乎如此則必得愚暗懦默者而後止也衍不能用三年五月范仲淹以吕夷簡執政進用多出其門上百官圖指其次第曰如此為序遷如此為不次如此則公如此則私况進退近臣凡超格者不宜全委之宰相夷簡不悅他日論建都之事仲淹進曰洛陽險固而汴為四戰之地太平宜居汴即有事必居洛陽當漸廣儲蓄繕宫室帝以問夷簡夷簡對曰仲淹迂濶務名無實仲淹聞之乃為四論以獻一曰帝王好尚二曰選賢任能三曰近名四曰推委大扺譏切時弊且曰漢成帝信張禹不疑舅家故有新莽之禍臣恐今日亦有張禹壞陛下家法夷簡訴仲淹越職言事離間君臣引用朋黨仲淹對益切由是落職知饒州集賢校理余靖上言仲淹以譏刺大臣重加譴謫儻其言未合聖慮在陛下聽與不聽耳安可以為罪乎汲黯在廷以平津為多詐張昭論將以魯肅為粗踈漢皇吳主熟聞訾毁兩用無猜豈損令德陛下自新政以來屢逐言事者恐鉗天下口請改前命疏入坐落職監筠州酒稅館閣校勘尹洙上疏曰仲淹忠諒有素臣與之誼兼師友則是仲淹之黨也今仲淹以朋黨被罪臣不可茍免夷簡怒斥監郢州酒稅尋改唐州館閣校勘歐陽修貽書責司諫高若訥曰仲淹以非辜逐君不能辨猶以面目見士大夫出入朝中是不復知人間有羞恥事若訥怒上其書修坐貶夷陵令時朝士畏宰相無敢送仲淹獨龍圖直學士李紘集賢校理王質出郊餞之或以誚質質曰希文賢者得為朋黨幸矣館閣校勘蔡襄作四賢一不肖詩以譽仲淹靖洙修而譏若訥都人士相傳寫鬻書者市之得厚利契丹使適至買以歸張於幽州館御史韓縝希夷簡旨請以仲淹朋黨榜朝堂戒百官越職言事者從之蘇舜卿上書曰厯觀前代神聖之君好聞讜議蓋以四海至逺民有隱慝不可以偏照故無間愚賤之言而擇用之然後朝無遺政物無遁情雖有佞臣邪謀莫得而進也臣覩近日詔書戒越職言事播告四方無不驚惑往往竊議恐非出陛下之意蓋陛下即位以來屢詔羣下勤求直言使百僚轉對置匭函設直言極諫科今詔書頓異前事豈非大臣壅蔽陛下聰明杜塞忠良之口不惟虧損朝政實亦自取覆亡之道夫納善進賢宰相之事蔽君自任未或不亡今諫官御史悉出其門但希旨意即獲美官多士盈庭噤不得語陛下拱默何由盡聞天下之事乎前孔道輔范仲淹剛直不撓致位臺諫雖改他官不忘獻納二臣者非不知緘口數年坐得卿輔蓋不敢負陛下委注之意皆罹中傷竄謫而去使正臣奪氣鯁士咋舌目覩時弊口不敢論昔晉侯問叔向曰國家之患孰為大對曰大臣持祿而不極諫小臣畏罪而不敢言下情不能上通此患之大者故漢文感女子之説而肉刑是除武帝聽三老之意而江充以族肉刑古法江充近臣女子三老愚耄踈隔之至也蓋以義之所在賤不可忽二君從之後世稱聖况國家班設爵位列陳豪俊固當責其公忠安可教之循默賞之使諫尚恐不言罪其敢言孰肯獻納物情蔽塞主勢孤危軫念於兹可為驚怛望陛下發德音寢前詔勤於采納下及芻蕘可以常守隆平保全近輔不報四年十二月地震直史館葉清臣因上言頃范仲淹余靖以言事被黜天下之人咋舌不敢議朝政者二年願陛下深自咎責詳延忠直敢言之士書奏數日仲淹等皆得近徙寶元元年春正月詔求直言蘇舜卿上疏曰臣聞河東地大震裂涌水壞屋廬城堞殺民畜幾十萬厯旬不止臣惟妖祥之興各以類告未嘗妄也天人之應古今之鑒大可恐懼所怪者朝廷見此大異不修闕政以厭天戒安民心默然如無事時諫官御史不聞進牘鋪白災害之端以啓上心然民情洶洶聚首橫議咸有憂悸之色臣欲言又見范仲淹以剛直忤姦臣言不用而身竄謫降詔天下不許越職言事臣不避權右但恐橫罹中傷無補於國因自悲嗟不知所措既而孟春之初雷霆暴作臣以謂國家闕失衆莫敢為陛下言者惟天丁寧以告陛下果能沛發明詔許羣臣皆得獻言臣不勝幸甚竊見陛下比年稍邇俳優賤人燕樂踰節賜豫過度燕樂踰節則蕩賜豫過度則侈蕩則政事不親侈則用度不足臣觀國史見祖宗日視朝旰昃乃罷猶坐於後苑門有白事者立得召對真宗末年不豫始間日視事今陛下春秋鼎盛實宵衣旰食求治之秋而乃隔日御殿此政事不親也又府庫匱竭民鮮蓋藏誅斂科索殆無虛日計度經費二十倍於祖宗時此用度不足也政事不親用度不足誠國大憂臣望陛下修己以御人洗心以鑒物勤聽斷舍燕安放棄優諧近習之纎人親近剛明鯁直之良士因此變災以思永圖則天下幸甚夫明主勞於求賢而逸於任使然盈庭之士不須盡擇在擇一二輔臣及御史諫官而已近王隨自吏部侍郎擢平章事此乃非常之任而隨虛庸邪諂非輔相器石中立在朝行以詼諧自任物望甚輕乃為執政又張觀為御史中丞高若訥為司諫二人者皆溫和軟懦無骨鯁敢言之氣斯皆輔臣引拔建置欲其慎默不敢舉揚其私時有所言則必暗相關説旁人窺之甚可笑也故御史諫官之任臣欲陛下親擇之不令出執政門下臺諫官能得其人則近臣不能文過乃馭下之䇿也上頗納用其言冬十月丙寅詔戒百官朋黨范仲淹既徙潤州讒者恐仲淹復用遽誣以事語入帝怒亟命置之嶺南中外論薦仲淹者衆帝曰向貶仲淹為其密請建立皇太弟非但詆毁大臣也今稱薦者如此似涉朋黨乃下詔戒之程琳為帝開設帝意頗解李若谷亦言近世俗薄專以朋黨汚善良蓋君子小人各有類今槩以朋黨名之恐正人無以自立帝納之三年十一月盛度程琳罷初張士遜惡琳而疾孔道輔不附己欲并去之會開封府吏馮士元以贓敗知府鄭戩窮治之辭連度琳及天章閣待制龎籍直集賢院吕公綽太常博士吕公弼等十餘人士遜謂道輔曰上顧程公厚今為小人所誣盍見上辨之道輔不悟入言琳罪薄不足深治帝怒道輔朋附併出之於是度坐令士元強取其鄰所賃官舍琳坐令士元紿市張遜故第籍與公綽公弼坐令士元市女口度罷知揚州琳知潁州籍等皆被黜罰士元流海島而道輔亦出知鄆州道輔始知為士遜所賣發憤而卒然天下皆以遺直許之康定元年春正月丙辰朔日食富弼上言應天變莫若通下情帝然之於是盡除越職言事之禁詔中外臣庶極言朝政闕失慶厯三年三月增置諫官以歐陽修王素蔡襄知諫院余靖為右正言襄喜言路開而慮正人難久立因上言任諫非難聽諫為難聽諫非難用諫為難修等三人忠誠剛直必能盡言臣恐邪人不利必造為禦之之説其禦之不過有三曰好名好進彰君過耳願陛下察之無使有好諫之名而無其實修每入對帝必延問執政咨所宜行既多所張弛修慮善人必不勝數為帝分别言之自范仲淹貶饒州修及尹洙余靖皆以直仲淹見逐羣邪目之曰黨人於是朋黨之議遂起修乃為朋黨論以進曰臣聞朋黨之説自古有之惟幸人君辨其君子小人而已大凡君子與君子以同道為朋小人與小人以同利為朋此自然之理也然臣謂小人無朋惟君子則有之其故何哉小人所好者祿利也所貪者財貨也當其同利之時暫相黨引以為朋者偽也及其見利而爭先或利盡而交踈則反相賊害雖其兄弟親戚不能相保故臣謂小人無朋其暫為朋者偽也君子則不然所守者道義所行者忠信所惜者名節以之修身則同道而相益以之事國則同心而共濟終始如一此君子之朋也故為人君者但當退小人之偽朋用君子之真朋則天下治矣堯之時小人共工歡兜等四人為一朋君子八元八凱十六人為一朋舜佐堯退四凶小人之朋而進元凱君子之朋堯之天下大治及舜自為天子而臯夔稷契等二十二人並列於朝更相稱美更相推讓凡二十二人為一朋而舜皆用之天下亦大治書曰紂有臣億萬惟億萬心豫有臣三千惟一心紂之時億萬人各異心可謂不為朋矣然紂以亡國周武王之臣三千人為一大朋而周用以興後漢獻帝時盡取天下名士囚禁之目為黨人及黃巾賊起漢室大亂後方悔盡解黨人而釋之然已無救矣唐之晚年漸起朋黨之論及昭宗時盡殺朝之名士或投之黃河曰此輩清流可投濁流而唐遂亡矣夫前世之主能使人人異心不為朋莫如紂能禁絶善人為朋莫如漢獻帝能誅戮清流之朋莫如唐昭宗之世皆亂亡其國更相稱美推讓而不自疑莫如舜之二十二臣舜亦不疑而皆用之然而後世不誚舜為二十二人朋黨所欺而稱為聰明之聖者以能辨君子與小人也周武之世舉其國之臣三千人共為一朋自古為朋之多且大莫如周然周用此以興者善人雖多而不厭也夫興喪治亂之迹為人君者可以見矣修論事切直人視之如仇帝獨奬其敢言顧侍臣曰如歐陽修者何處得來夏四月以夏竦為樞密使韓琦范仲淹為樞密副使時帝御天章閣召公卿出手詔問當世急務葉清臣聞之極論時政且曰陛下欲息奔競此繫中書若宰相裁抑奔競之流則風俗惇厚人知止足宰相用憸佞之士則貪榮冒進激成渾波向有職在管庫日趨走時相之門入則取街談巷議以惑聰明出則竊廟謨朝論以驚流輩一旦皆擢職司以酬所任比日人士競踵此風出入權要之家時有三尸五鬼之號或列館職或置省曹且臺諫官為天子耳目今則不然盡為宰相肘腋宰相所惡則捃以微瑕公行擊搏宰相所善則從而倡和為之先容中書政令不平賞罰不當則箝口結舌未嘗敢言人主纎微過差或宫闈小事即極言過當用為訐直供職未逾歲時遷擢已加常等宋禧為御史勸陛下宫中畜犬設棘以為守衛削弱朝體取笑四夷不加訶譴擢為諫官王逹兩為湖南江西轉運使所至苛虐誅剝百姓徒配無辜特以宰相故舊不次拔擢遂有河北之行如此是長奔競也帝覽而頷之乙巳夏竦至京師罷之以杜衍為樞密使初召竦諫官歐陽修蔡襄等交章論竦在陜西畏懦不肯盡力兼之挾詐任數姦邪傾險陛下孜孜政事首用懷詐不忠之臣何以求治中丞王拱辰亦言竦經略西師無功而歸今置諸二府何以厲世因對極論之帝未省遽起拱辰前引裾畢其説帝乃悟會竦已至國門言者論益力乞毋令入見右正言余靖言竦纍表引疾及聞召命即兼驛而馳若不早決竦必堅求靣對敘恩感泣復有左右為之地者則聖聽惑矣章纍上即日詔竦歸鎮拜杜衍為樞密使竦亦自請還節越徙知亳州竦至亳上書萬言自辨乃徙判并州蔡襄言於帝曰陛下罷竦而用琦仲淹士大夫賀於朝庶民歌於路至飲酒呌號以為歡且退一邪進一賢豈能關天下輕重哉蓋一邪退則其類退一賢進則其類進衆邪並退衆賢並進海內有不泰乎雖然臣竊憂之天下之勢譬猶病者陛下既得良醫矣信任不疑非徒愈病而又夀民醫雖良術不得盡用則病且日深雖有和扁難責效矣國子監直講石介篤學尚志樂善嫉惡喜聲名遇事奮然敢為會吕夷簡罷相章得象晏殊賈昌朝韓琦范仲淹富弼同時執政而歐陽修蔡襄王素余靖並為諫官夏竦既拜復奪之以衍代因大喜曰此盛事也歌頌吾職其可已乎作慶厯聖德詩曰於惟慶厯三年三月皇帝龍興徐出闈闥晨坐太極晝開閶闔躬覽英賢手鉏姦枿大聲渢渢震搖六合如乾之動如雷之發昆蟲蹢躅怪妖藏滅同明道初天地嘉吉初聞皇帝蹙然言曰豫祖豫父付豫大業豫恐失墜實賴輔弼汝得象殊重慎微密君相豫久豫嘉君伐君仍相豫笙鏞斯協昌朝儒者學問該洽與豫論政傅以經術汝二二相庶績咸秩惟汝仲淹汝誠豫察太后乘勢湯沸火熱汝時小臣危言嶪嶪為豫司諫正豫門闑為豫京兆堲豫讒説賊叛於夏往豫式遏六月酷日大冬積雪汝寒汝暑同豫士卒豫聞心酸汝不告乏豫晚得弼豫心弼悅弼每見豫無有私謁以道輔豫弼言深切豫不堯舜弼自笞罰諫官一年疏奏滿篋侍從周歲忠力厪竭契丹忘義檮杌叨餮敢侮大國其辭慢悖弼將豫命不畏不怯卒復舊好民得食褐沙磧萬里死生一節視弼之膚霜剝風裂觀弼之心鍊金煆鐵寵名大官以酬勞渴弼辭不受其志莫奪惟仲淹弼一夔一契天實賚豫豫其敢忽並來弼豫民無瘥扎曰衍汝來汝豫黃髮事豫二紀毛秃齒豁心如一兮率履弗越遂長樞府兵政無蹶豫早識琦琦有竒骨其器魁櫑豈視扂楔其人渾朴不施剞劂可屬大事敦厚如勃琦汝副衍知人豫哲惟修惟靖立朝䡾䡾言論磊砢忠誠特逹祿微身賤其志不怯嘗詆大官亟遭貶黜萬里歸來剛氣不折屢進直言以補豫闕素相之後含忠履潔昔為御史幾叩豫榻襄雖小官名聞豫徹亦嘗獻言針豫之失剛守粹慤與修儔匹並為諫官正色在列豫過汝言毋鉗汝舌皇帝聖明忠邪辨别舉擢畯良掃除妖魃衆賢之進如茅斯拔大姦之去如距斯脫上倚輔弼司豫調燮下賴諫諍維豫紀法左右正人無有邪孽豫望太平日不逾浹皇帝嗣位二十二年神武不殺其默如淵聖人不測其動如天賞罰在豫不失其權恭己南靣退姦進賢知賢不易非明弗得去邪惟艱惟斷乃克明則不二斷則不惑既明且斷惟皇帝德羣臣踧踖重足屏息交相教語曰惟正直毋作側僻皇帝汝殛諸侯危栗墮玉失舄交相告語皇帝神明四時朝覲謹修臣職四夷走馬墜鐙遺䇿交相告語皇帝英武解兵修貢永為屬國皇帝一舉羣臣懾焉諸侯畏焉四夷服焉臣願皇帝壽萬千年詩所稱多一時名臣其言大姦蓋斥竦也詩且出孫復聞之曰介禍始於此矣范仲淹亦謂韓琦曰為此鬼怪輩壞事也五月吕夷簡罷陜西轉運使孫沔上書言自夷簡當國黜忠言廢直道及以使相出鎮許昌乃薦王隨陳堯叟代己才庸負重謀議不協忿爭中堂取笑多士政事寢廢又以張士遜冠台席士遜本乏逺識致隳國事蓋夷簡不進賢為社稷逺圖但引不若己者為自固之計欲使陛下知輔相之位非己不可冀復思己而召用也陛下果召夷簡還自大名入秉朝政於兹三年不更一事以姑息為安以避謗為智西州將帥纍以敗聞契丹無厭乘此求賂兵殱貨悖天下空竭刺史牧守十不得一法令變易士民怨咨隆盛之基忽至於此今夷簡以病求退陛下手和御藥親寫德音乃謂恨不移卿之疾在於朕躬四方義士傳聞詔語有泣下者夷簡在中書二十年三冠輔相所言無不聽所請無不行有宋得君一人而已未知何以為陛下報天下皆稱賢而陛下不用者左右毁之也皆謂憸邪而陛下不知者朋黨蔽之也比契丹復盟西夏欵塞公卿欣欣日望和平若因此振紀綱修廢墜選賢任能節用養兵則景德祥符之風復見於今矣若恬然不顧遂以為安臣恐土崩瓦解不可復救而夷簡意謂四方已寧百度已正欲因病默默而去無一言啓沃上心别白賢不肖雖盡南山之竹不足書其罪也書聞帝不之罪議者喜其謇切夷簡見書謂人曰元規藥石之言但恨聞此遲十年耳至是蔡襄復言夷簡被病以來兩府大臣並笏受事於門貪戀權勢病不知止乃命夷簡不得同議軍國大事秋七月丙子王舉正罷歐陽修余靖論舉正懦默不任事范仲淹有相才請罷舉正而用仲淹帝然之舉正罷知許州八月丁未以范仲淹參知政事仲淹曰執政可由諫官而得乎固辭不拜願與韓琦出行邊命為陜西宣撫使未行復除參知政事帝方鋭意太平數問當世事仲淹語人曰上用我至矣事有先後久安之弊非朝夕可革也帝再賜手詔又為之開天章閣召輔臣條對仲淹退而上十事曰明黜陟抑僥幸精貢舉擇長官均公田厚農桑修武偹推恩信重命令減徭役悉采用之宜著令者皆以詔書畫一頒下復以富弼為樞密副使弼猶固辭帝使宰相諭之曰此朝廷特用非以使遼故也時元昊使辭帝至紫宸殿俟弼至樞密院班乃坐弼不得已受命帝以平治責成輔相命弼主北事仲淹主西事弼上當世之務十餘條及安邊十三䇿大略以進賢退不肖止僥幸去宿弊欲漸易監司之不才者使澄汰所部吏於是小人始不悅矣癸丑以韓琦為陜西宣撫使時二府合班奏事琦必盡言雖事屬中書亦指陳其實同列或不悅帝獨識之曰韓琦性直琦嘗條所宜先者七事曰清政本念邊計擢才賢備河北固河東收民心營洛邑繼又陳救弊八事曰選將相明按察豐財利遏僥幸進能吏退不才謹入官去冗食謂數者之舉謗必隨之願委計輔臣聽其注措帝嘉納之遂命宣撫陜西九月戊辰吕夷簡以太尉致仕冬十月以張昷之王素等為都轉運按察使先是知諫院歐陽修言天下官吏既多朝廷無由遍知其賢愚善惡乞立按察之法於內外朝官三丞郎官中選強幹亷明者為之使至州縣遍見官吏其公亷無狀皆以朱書於名之下其中材之人以墨書之歲具以聞詔從之富弼范仲淹復請詔中書樞密通選逐路轉運按察使即委使自擇知州知州擇知縣不任事者皆罷之於是昷之等首被兹選昷之河北王素淮南沈邈京東施昌言河東李絢京西仲淹之選監司也取班簿視不才者一筆勾之弼曰一筆勾之甚易焉知一家哭矣仲淹曰一家哭何如一路哭耶遂悉罷之壬戌詔曰考課之法舊矣祥符之際治致升平凡下詔條全務寬大考最則有限年之制入官則有循資之格及此事邊因緣多故思得應務之才無虧素餐之道非賞勸衆志不激勵非甄别人情不憤悱具申凡目著於甲令因更定磨勘法初太祖舊制文武常參官各以曹務間劇為月限考滿即遷非循名責實之道乃罷之而置審官院考課中外職事受代京朝官引對磨勘非有勞績不得進秩其後立法文臣五年武臣七年無贓私罪始得遷秩曾犯贓罪則文臣七年武臣十年中書樞密取旨其七階選人則考第資厯無過犯或有勞績者遞遷謂之循資淳化四年始置磨勘司然每遇恩慶百僚多得序進真宗即位始罷之惟郊祀恩許加勳階爵邑至是范仲淹富弼以官冗由磨勘亟易至高位故獲蔭者衆乃令待制以上自遷官後六歲無故則復遷之有過益展年至諫議大夫止京朝官四歲磨勘至前行郎中止少卿監限七十員有闕乃補少卿以上遷官聽旨其法始密於舊矣十一月丁亥詔曰周大司樂掌學政以六藝教國子則官材蓋本於世胄而今之蔭法推恩太廣以致踈宗蒙澤稚齒授官未知立身之道從政之方而並階仕進非所以審爵重民也其著為令於是更定蔭子法初太祖定任子之法臺省六品諸司五品登朝嘗厯兩仕然後得請太宗即位諸州進奏者授以試銜及三班職尋特定選人七等凡誕聖節及三年南郊皆聽奏一人而特恩不預焉由是奏薦之恩寖廣至是范仲淹富弼始裁損其制凡選人遇郊赴銓試不試者永不預選且罷聖節奏蔭恩凡長子不限年諸子孫必年過十五弟姪年過二十乃得蔭自是任子之恩殺矣四年夏帝與執政論及朋黨事范仲淹對曰方以類聚物以羣分自古以來邪正在朝各為一黨在主上鑒辨之耳誠使君子相朋為善其於國家何害不可禁也六月壬子以范仲淹為陜西河東宣撫使時仲淹奏防秋事近願罷臣參知政事特賜知邊事帶安撫之名足以照管邊事遂有是命始仲淹以忤吕夷簡放逐者數年及陜西用兵帝以其士望所屬拔用護邊及夷簡罷召還倚以為治中外想望其功業仲淹亦以天下為己任與富弼日夜謀慮興致太平然更張無漸規模濶大論者籍籍以為難行及按察使出多所舉劾衆心不悅任子之恩薄磨勘之法密僥幸者不便由是謗毁寖盛而朋黨之論滋不可解先是石介奏記於弼責以行伊周之事夏竦怨介斥己又欲因以傾弼等乃使女奴隂習介書久之習成遂改伊周為伊霍且偽作介為弼撰廢立詔草飛語上聞帝雖不信而弼與仲淹恐懼不自安於朝皆請出按西北邊不許適聞契丹伐夏仲淹固請行乃獨允之仲淹將赴陜過鄭州時吕夷簡已老居鄭仲淹往見之夷簡問何事遽出仲淹對以暫往經撫兩路事畢即還夷簡曰君此行正蹈危機豈復再入若欲經制西事莫如在朝廷為便仲淹愕然仲淹既去朝攻者果益急帝心不能無疑矣羅從彥曰小人之權幸可畏也以仁宗之英明急於圖治而富范等衄於讒間不果其志何耶古者人君立政立事君臣相與同心同謀明足以照之仁足以守之勇足以斷之為之不暴而持之以久故小人不得措其私權幸不得搖其成若慶厯之事鋭之於始而不救其終君臣之間毋乃有未至耶八月以富弼為河北宣撫使從弼請也弼及范仲淹既去石介不自安亦請外得濮州通判九月甲申以杜衍為平章事兼樞密使賈昌朝為樞密使陳執中參知政事衍務裁僥幸每有內降率寢格不行積詔旨至十數輒納帝前帝嘗語歐陽修曰外人知杜衍封還內降耶凡有求於朕每以衍不可告之而止者多於所封還也執中自知青州召還諫官蔡襄孫甫等爭言執中雖係陳恕之子然剛愎不學若任以政天下之不幸也帝不聽諫官論不止乃命中使賫敕告即青州賜之明日諫官上殿帝作色迎謂之曰豈非論陳執中耶朕已召之矣乃不敢言十一月詔戒朋黨相訐并戒按察恣為苛刻及文人肆言行怪者五年春正月乙酉杜衍范仲淹富弼罷以賈昌朝同平章事兼樞密使宋庠參知政事王貽永為樞密使吳育龎籍為副使仲淹弼既出宣撫攻者益衆二人在朝所為亦稍沮止衍獨左右之衍好薦引賢士而抑僥幸羣小咸怨衍壻蘇舜欽易簡子也能文章論議稍侵權貴時監進奏院循例祀神以伎樂娛賔集賢校理王益柔曙之子也於席上戲作傲歌御史中丞王拱辰聞之以二人皆仲淹所薦而舜欽又衍壻欲因是傾衍及仲淹乃諷御史魚周絢劉元瑜舉劾其事拱辰及張方平列狀請誅益柔蓋欲因益柔以纍仲淹也賈昌朝隂主拱辰等議韓琦言於帝曰益柔狂語何足深計方平等皆陛下近臣同國休戚今西陲用兵大事何限一不為陛下論列而同狀攻一王益柔此其意可見矣帝感悟乃止黜益柔監復州酒稅而除舜欽名同席𬒳斥者十餘人皆知名之士拱辰喜曰吾一網打盡矣舜欽既放廢寓於吳中與高僧逸士吟嘯自適衍亦見不為人所容數求去不許仲淹不自安奏乞罷政事帝欲聽其請章得象謂仲淹素有虛名今一請遽罷恐天下謂陛下輕黜賢臣不若且賜不允若即有謝表則是挾詐要君乃可罷也上從之仲淹果奉謝表上愈信得象言於是富弼自河北還將及國門右正言錢明逸希得象等意遂論仲淹弼更張綱紀紛擾國經凡所推薦多挾朋黨陳執中復譛衍庇二人帝不悅遂併黜之衍罷知兖州仲淹知邠州弼知鄆州仲淹引疾求解邊任改知鄧州二月辛卯詔罷京朝官用保任敘遷法又罷磨勘蔭子孫新法三月辛酉韓琦罷時范仲淹富弼罷去琦乃上疏曰陛下用杜衍為相方及一百二十日而罷范仲淹以夏人初附自乞保邊固亦有名至於富弼之出則所損甚大富弼大節難奪天與忠義昨契丹領大兵壓境命弼使邊以正辨屈強敵卒復和議忘身立事古人所難近者李良臣自北來歸盛言北方自其主而下皆稱羡之陛下兩命弼為樞密副使皆忘其有功辭避不受逮抑令赴上則不顧毁譽動思振緝紀綱其志欲為陛下立萬世之業爾近日臣僚多務攻擊忠良取快私忿非是國家之福惟陛下久而察之疏入不報初陜西四路總管鄭戩遣靜邊寨主劉滬著作佐郎董士亷城水洛以通秦渭援兵知渭州尹洙曰賊數犯塞必併兵一道五路帥之戰兵常不滿二萬人而當賊昊舉國之衆吾兵所以屢為賊困者正由城寨多而兵勢分也今無故奪諸羌之田二百里列堡屯師坐耗芻糧則吾兵愈分而邊用不給矣乃奏罷其役會戩罷而滬等督役如故洙不平以張忠代之滬不受代洙乃諭禆將狄青往械滬及士亷下吏而罷水洛之役戩論奏不已琦是洙而朝議右戩竟徙洙知慶州又徙晉州釋滬等獄而復城水洛琦因請外遂出知揚州河東轉運使歐陽修上疏曰杜衍范仲淹韓琦富弼天下皆知其有可用之賢而不聞其有可罷之罪自古小人讒害其識不逺欲廣陷良善則指為朋黨欲動搖大臣則誣以專權蓋去一善人而衆善人尚在則未為小人之利欲盡去之則善人少過唯指為朋黨則可盡逐自古大臣被主知蒙信任則難以他事動搖惟有專權是上之所惡方可傾之夫正士在朝羣邪所忌謀臣不用敵國之福也竊為陛下惜之羣邪益忌修因附致修罪左遷知滁州遷洙知潞州時諫官余靖歐陽修輩既已相繼罷去而天下目之為賢者執政指之為黨皆欲因事斥逐之董士廉者即詣闕上書以水洛事訟洙詔遣御史劉湜就鞠不得他罪而洙以部將孫用由軍校補邊自京師貸息錢到官無以償洙惜其才嘗假公使錢為償之逮按問而錢已先輸官矣竟坐此貶監均州酒稅六月石介卒介字守道兖州奉符人舉進士厯官國子直講太子中允直集賢院通判濮州魯人稱為徂徠先生貌厚氣完學篤志大雖在畎畝不忘天下是是非非無所忌諱以故小人嫉之相與出力必擠之死介安然不惑不變曰吾道固如是十一月罷京東安撫使富弼時滁州狂人孔直溫謀反伏誅搜其家得石介書併所遺孫復書時介已死宣徽南院使夏竦深怨石介譏己常欲報之因言介詐死乃弼遣介結契丹起兵期以一路兵馬內應請發介棺驗之詔下兖州訪介存亡杜衍知兖州以語官屬衆不敢答掌書記龔鼎臣願以合族保介必死提刑吕居簡亦言無故發棺何以示後具狀上之始獲免遂罷弼安撫使貶孫復監虔州稅介子孫羈管池州宋史紀事本末卷五
