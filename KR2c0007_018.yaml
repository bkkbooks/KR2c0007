body:
  text: 宋史紀事本末卷十八明馮琦原編陳邦瞻增輯金亮之惡高宗紹興十八年六月金以完顔亮為平章政事亮本名都古嚕納太祖子鄂特本之子為人慓急猜忌殘忍任數自以己與金主同為太祖孫常懷覬望及為中京留守専立威以懼衆結蕭裕為腹心每與論天下事裕傾險揣知其意因曰留守先太師太祖長子德望如此人心天意宜有所屬誠有志舉大事願竭力以從亮喜遂與謀弒逆事至是引裕為兵部侍郎十二月金以完顔亮為右丞相亮生日金主遣近侍以司馬光畫像玉吐鶻廏馬賜之金主后費摩氏亦附賜禮物金主聞之怒杖近侍奪回賜物亮本謀不軌疑畏益甚十九年三月金主以完顔亮為太保領三省事五月金以天變肆赦命翰林學士張鈞草詔參知政事蕭肄摘其語以為誹謗金主殺鈞且問誰使為之左丞相宗賢曰都古嚕納實使之金主不悅出亮於行臺亮過中原與留守蕭裕定約而去亮至良鄉召還莫測其故大恐及至復拜平章謀逆益甚冬十月金主亶殺其弟胙王常勝遂殺其后費摩氏初金宰臣議遷遼陽渤海之民於燕南近侍高夀星等當遷訴於費摩后后白金主致怒遂杖平章政事秉德右丞唐古辨而殺左司郎中薩哈夀星等竟不遷秉德辨二人怨望遂與大理卿烏格岱謀廢立烏格岱以告完顔亮一日亮與辨語因問曰若舉大事誰可立者辨曰胙王常勝乎問其次曰鄧王子阿克凌亮曰阿克凌屬疏安得立辨曰公豈有意邪亮曰果不得已捨我其誰於是旦夕相與密謀護衛將軍塔斯疑之以告費摩后后白金主金主怒召辨曰爾與亮謀何事將如我何杖之亮因此忌常勝阿克凌惡塔斯㑹河南兵士孫進作亂自稱皇弟按察大王而金主之弟止有常勝察喇亮乘此搆常勝阿克凌察喇達蘭塔斯皆殺之金主積怒于后遂亦殺之而召胙王妃薩滿入宫繼之又殺德妃烏庫哩氏及瓜爾佳氏張氏等十二月金完顔亮弒其主亶而自立時護衛十人長布薩呼圖舊受鄂特本恩圖克坦阿齊呼與亮姻家亮皆使為內應大興國嘗以李老僧屬亮得為尚書省令史亮度興國被杖怨望又使老僧結興國內應興國給事寢殿夜常取符鑰歸家是月丁巳乘呼圖與阿齊呼內直作變夜二鼓興國以符鑰啓門亮與妹壻圖克坦津及平章政事秉德左丞唐古辨大理卿烏格岱李老僧等以刀藏衣下入宫門者以辨乃國壻亮又至親不疑而納之及殿門衛士始覺有變亮等抽刀劫之莫敢動遂入寢殿金主常置佩刀於榻是夜興國先取刀投榻下金主求刀不得阿齊呼遂先進刃呼圖次之金主頓仆亮前手刃之血濺滿其面與衣金主既殂秉德等未有所屬呼圖曰始議立平章今復何疑秉德遂與羣臣奉亮即位詐以金主欲議立后召大臣因殺曹國王宗敏左丞相宗賢以秉德為左丞相唐古辨為右丞相烏格岱為平章政事諡費摩后為悼平皇后廢亶為東昏王大赦改元二十年春正月金主尊其嫡母圖克坦氏及母大氏皆為太后圖克坦氏與大氏相得至歡及金主弒亶圖克坦氏曰帝雖失道人臣豈可至此金主銜之至是追尊鄂特本為帝廟號德宗二母俱尊為皇太后圖克坦氏居東宫號永夀宫大氏居西宫號永寧宫後圖克坦后生日酒酣大氏起為夀圖克坦后方與諸公主宗婦語大氏跪者久之金主怒而出明日召與圖克坦后語者皆杖之大氏以為不可金主曰今日之事豈能尚如前日邪夏四月金主亮大殺其宗室初亮在熙宗世見太宗諸子盛强忌之及即位遂與蕭裕謀殺之又以前左丞相秉德首謀廢立而不即勸進銜之將盡誅焉於是豫教尚書省令史蕭玉上變遂召領三省事阿嚕左丞相唐古辨判大宗正事呼爾察擊鞠至則殺之因遣使如東京殺留守阿林北京留守呼拉布南京殺領行臺事秉德并誅其親屬復殺太宗子孫七十餘人尼瑪哈子孫三十餘人諸宗室五十餘人太宗尼瑪哈後皆絶而烏格岱蕭裕蕭玉等皆受重賞亮又令玉子尚主曰朕無以報卿使朕女為卿男婦代朕事卿也冬十月金主亮殺其左副元帥薩里罕等夷其族亮復忌舍音諸子盛强及宗室勳舊大臣欲盡除之乃諷都元帥府令史約蘇誣飾上變遂殺薩里罕及景祖孫穆稜舍音子伯竒及其族百數十人以魏王斡台孫呼爾察好修飾亦族之二十一年五月金主亮納其叔母阿喇勒及宗婦於宫阿喇勒亮叔曹王鄂勒博妻也亮殺鄂勒博而納之封為昭妃又命圖克坦津語宰相曰朕嗣續未廣前所誅黨人諸婦多朕中表親選納焉宰相乃奏請行之遂納阿嚕子蘇嚕克圖呼嚕子和囉羅和碩台秉德弟吉里四人之妻于宫尋封吉里妻髙氏為修儀崇義節度使烏格岱妻唐古鼎格舊嘗與亮私及為帝鼎格使侍婢來朝亮諷使殺烏格岱以之為后鼎格初不忍亮訹之曰不殺汝夫將族滅汝家鼎格大恐縊殺烏格岱即納之宫中封貴妃大愛幸後與舊家奴姦賜死又使祕書監完顔文出其妻唐古實格而以為麗妃使伊里布出其妻富察徹辰而納之徹辰亮姊之女也二十二年十二月金主亮聞濟南尹葛王烏祿妻烏凌阿氏儀容整肅召之烏凌阿氏謂烏䘵曰我不行上必殺王我當自勉不以相纍也遂召王府臣僕曰為我禱東嶽使皇天后土明鑒我心行至良鄉得間自殺二十三年夏四月金太后大氏卒金主遷都于燕親屬皆從獨留圖克坦太后於㑹寧圖克坦后常憂懼每中使至必易衣以俟命大氏在燕常思念圖克坦后及病篤以不得一見圗克坦后為恨將死謂金主曰汝以我之故不令永夀宫偕來我死必迎致之事之當如事我二十四年十一月金主納其諸從姊妹於宫夀寧縣主實庫斡里雅布之女也靜樂縣主布拉克及實訥烏珠之女也實庫爾鄂勒歡之女也混同縣君蘇哷和卓及其妹伊都阿嚕之女也皆亮之從姊妹郕國夫人重節富勒呼之女孫亮之侄也張定安妻納爾琿太后大氏之兄嫂也富魯和卓實格之妹也皆有夫亮無所忌恥皆召與之私分屬諸妃位下蘇哷和卓最得幸每召必親候廊下立久則坐於實庫爾膝上凡宫人在外有夫者初猶分番出入後乃盡遣其夫往㑹寧不聽出外每幸婦人必奏樂撤幃或妃嬪列坐輒率意淫亂使共觀之常於臥內遍設地衣倮逐為戲二十五年冬十月金主亮命以大房山雲峯寺為山陵遣右丞相布薩思恭等如㑹寧奉還太祖太宗梓宫及迎圖克坦后至燕后及流沙河亮親迎之命左右持杖二束跪后前曰亮不孝久缺溫凊願笞之后掖之曰今庶民有克家子尚且愛之不忍笞之我有子如是寧忍笞乎叱杖者退既至居夀康宫亮事之外極恭順后起則自扶之常從輿輦徒行后所御物或自執之見者以為至孝雖太后亦信其誠三十一年八月金主亮弒其太后圖克坦氏初圖克坦后聞亮欲南侵數以言諌之亮不悅每謁見還宫必忿怒人不知其故及至汴后居寧德宫使侍婢髙福娘問亮起居亮通之因使伺后動靜凡后所為事無大小福娘夫特默格教福娘增飾其言以聞及契丹反樞密使布薩呼圖往討辭謁后后謂曰國家世居上京既徙中都今又至汴復將興兵涉江淮伐宋疲敝中國我嘗諌止之不見聽也契丹事復如此奈何福娘以告亮亮意謂后嘗養鄭王充為己子充四子皆成立恐呼圖將兵在外或有異圖乃召㸃檢大懷忠等使弒后且指后左右數人名皆令殺之后方樗蒲懷忠等至令后跪受詔后愕然下跪尚衣局使呼特默從後擊之仆而復起者再髙福娘等縊殺之并殺其左右數人亮命焚后于宫中棄骨于水并殺鄭王充之子塔納阿勒班等三人遂召呼圖等皆殺之封髙福娘為勛國夫人以特默格為澤州刺史金亮南侵金人殺亮立雍附髙宗紹興二十年三月遣參知政事余堯弼如金賀即位及還金主亮以上皇玉帶附遺于帝其祕書即張仲軻曰此希世之寶也亮曰江南之地他日當為我有此置之外府耳仲軻由是知金主有南侵之意遂每事先意逢之二十一年二月以巫伋為金國祈請使伋至金首請迎靖康帝歸國金主曰不知歸後何處頓放伋唯唯而退二十三年三月金主亮自上京如燕遂改燕京為中都大興府汴京為南京削上京之名止稱㑹寧府又改中都大定府為北京而東京遼陽府西京大同府如舊遣完顔長寧為南京留守經畫之以為南侵之漸既而汴京大火宫室盡焚金主大怒杖殺長寧二十六年三月東平進士梁勛上書言金人必舉兵宜為之備帝怒編管勛于千里外州軍因下詔曰講和之䇿斷自朕志秦檜特能贊朕而已豈以其存亡而渝定議耶近者無知之輩鼓倡浮言以惑衆聽至有僞撰詔命召用舊臣抗章公車妄議邊事朕甚駭之自今有此當重置憲典二十七年二月金主亮御武德殿召其臣吏部尚書李通刑部尚書胡厲翰林直學士蕭亷賜坐而語之曰朕自即位視閲章奏治宫中事常至丙夜始御內寢疇昔之夜方就榻恍惚如親覿有二青衣持幢節自天降授朕以幅紙若牒謂上帝有宣命朕再拜受遂佩弓矢具鍪鎧將從之前而朕常所御小駿號小將軍倏已鞚勒待墀下青衣揖就騎既行但覺雲霧勃鬱起馬蹄間下如海濤洶湧方覺心悸望一門正開金碧焜耀青衣指之曰天門也朕隨入焉又里許至鈞天之宫嚴邃宏麗光明奪目朕意欲馳二金甲人謂朕曰此非人間可下馬步入及殿下埀簾若有所待須臾有朱衣出贊拜髣佛聞殿上語如嬰兒使青衣傳宣畀朕曰天䇿上將令征宋國朕伏而謝使復就馬見兵如鬼者左右前後杳無邊際一矢射之萬鬼齊喏聲如震雷驚而寤喏猶不絶於耳朕立遣內侍至廏視小將軍喘汗雨浹取箭箙數之亦亡其一矢昭應如此豈天假手于我令混江南之車書耶衆皆稱賀於是南侵之議益决矣二十八年五月金主亮召李通及翰林學士承㫖翟永固宣徽使敬嗣暉翰林直學士韓汝嘉入見薰風殿問曰朕欲遷都于汴遂以伐宋使海內一統卿意如何通以天時人事不可失機為對亮大悅永固却立楹間亮顧見之問之故徐進曰臣有愚慮請殫一得本朝自海上造邦民未見德而黷兵是聞古稱兵猶火不戢將自焚也故雖如梁王之武毅猶以和為上䇿今宋室偏安天命未改金繒締好歲事無闕遽欲出無名之師以事逺征臣竊以為未便兼中都始成未及數載帑藏虗乏丁壯疲瘁營汴而居是欲竭根本富庶之力以繕爭戰丘墟之地尤為非宜臣事陛下不敢不以正對因伏地請死亮以問暉汝嘉暉是通汝嘉是永固亮大怒拂䄂起傳宣二臣殿側聽㫖繼而召翰林待制綦戩講漢史及陸賈新語事亮怒稍霽乃赦之明日以為右丞嗣暉為參知政事永固遂請老秋七月金以李通參知政事𥘉金主亮召其幸臣祕書少監張仲軻左諌議大夫馬欽校書郎田與信等便殿侍坐金主謂仲軻曰漢之封疆不過七八千里今吾國幅員萬里可謂大矣仲軻曰本朝疆土雖大而天下有四主若能一之乃謂大矣金主曰彼且何罪而伐之仲軻曰臣聞宋人買馬修器械招納山東叛亡豈得謂無罪金主喜曰向者梁珫嘗為朕言宋有劉貴妃者資質美艷今一舉而兩得之俗所謂因行掉臂也江南聞我舉兵必逺竄耳欽與信皆對曰海島蠻越臣等皆知道路彼將安往金主曰然則天與我也朕舉兵滅宋逺不過二三年然後討平髙麗夏國一統之後論功遷秩分賞將士彼必忘勞矣時金主恃其纍世强盛欲大肆征伐以一天下嘗曰天下一家方可以為正統及拜李通參知政事通承金主意遂與仲軻欽及近習羣小輩盛言江南富庶子女玉帛之多逢其欲金主以通為謀主遂議舉兵南伐冬十月金主亮遣其左丞相張浩參政敬嗣暉如汴京營建宫室國子司業黃中使還上言金人治汴京必欲徙居以迫我不可不早為之備若彼果至汴則壯士健馬不數日可及境矣宰相湯思退大怒貶中官二十九年春正月金主亮命其左丞相張浩及敬嗣暉內侍梁漢臣與中國叛臣孔彥舟造戰船于通州遣使籍諸路猛安部族及契丹奚人不限丁數悉僉之凡二十四萬又僉中都南都中原渤海丁壯年二十以上五十以下者皆籍之凡二十七萬雖親老丁多求一子留侍亦不聽又遣使分詣諸道總管府督造兵器命諸路舊貯兵器並致于燕又建汴宫修燕城民不能堪箭翎一尺至千錢村落間往往椎牛以供筋革至於烏鵲狗彘無不被害者五月禮部侍郎孫道夫使金還金主亮謂之曰歸白爾帝事我上國多有不誠今略舉二事爾民有逃入我境者邊吏皆即發還我民有叛入爾境者有司索之往往托詞不發一也爾於沿邊盜買鞍馬備戰陳二也蓋欲南侵故設此二端為詞道夫還具奏之帝曰朝廷待之甚厚彼以何名為兵端道夫曰彼身弒其君而奪之位興兵豈問有名湯思退沈該不以為然道夫每對帝輒言武事該疑其引用張浚忌之貶知綿州六月帝聞金主亮有南侵意疑之使王綸往覘綸還入對言鄰國恭順和好無他皆陛下威德所致湯思退等皆賀帝曰中外之論皆欲沿邊屯戍軍馬移易將帥為進取之計萬一輕舉兵連禍結何時而已三十年春正月金遣施宜生來賀正旦宜生閩人也上命吏部尚書張燾館之都亭時諜者傳金亮造舟調兵之事上不深信館者以首丘諷宜生微問其的宜生為隱語曰今日北風甚徑又取几間筆扣之曰筆來筆來宜生歸為介所告金主烹之八月賀允中使金還言金人必叛盟宜為之備不聽命允中致仕三十一年三月詔廷臣議邊事先是陳康伯以金人必敗盟請早為之備及聞金人南侵已决乃召楊存中及三衙帥至都堂議舉兵又詔侍從臺諌集議康伯傳上㫖曰今日更不論和與守直問戰當如何時上意雅欲視師內侍省都知張去為隂沮用兵且陳退避䇿中外妄傳幸閩蜀人情洶洶朱倬無一語康伯奏曰金敵敗盟天人共憤今日之事有進無退聖意堅决則將士之意自倍願分三衙禁旅助襄漢待其先發應之乃以利州路都統吳拱知襄陽部兵三千戍之退守荆南以視緩急五月金人來求淮漢之地初金主亮聞人言行在景物繁麗嘗密隱畫工於奉使俾寫臨安湖山以歸為屏而圖已之像䇿馬於吳山絶頂題詩其上有立馬吳山第一峯之句至是遣其僉書樞密院事髙景山右司員外郎王全以賀天申節為名亮謂全曰汝見宋主即面數其焚南京宫室沿邊買馬招致叛亡之罪當令大臣來此朕將親詰之且索淮漢之地如不從則厲聲詆責之彼必不敢害汝蓋欲激怒以為南侵之名也又謂景山曰回日以全所言奏聞全至臨安一如金主之言以詆帝帝謂全曰聞公北方名家何乃如是全復曰趙桓今已死矣帝始聞淵聖崩遂起舉哀詔以王全語諭諸路統制帥守監司隨宜應變無失機㑹六月金主亮遷都于汴秋七月金大括馬于諸路初金調馬諸路以户口為差計五六十萬匹仍令户自養以俟至是又大括騾馬官至七品聽留一匹併舊籍民馬其在東者給西軍在西者給東軍交相往來晝夜絡繹不絶死者狼籍於道其亡失多者官吏懼罪或自殺所過蹂踐民田調發牽馬夫役詔河南州縣所儲糧米以備大軍不得他用騾馬所至當給芻粟而無可給有司以為請金主亮曰北方比歲民間儲畜尚多今禾稼滿野自可就牧田中借令再歲不獲亦何傷乎於是國內騷然盜賊蜂起大者連城邑小者保山澤有以盜賊事聞者亮輒杖而黜其官太醫使祈宰上疏諌南伐亮殺之由是羣臣不敢言金主亮大殺宋遼宗室之在國者凡百三十餘人遣徐嚞如金賀遷都嚞至盱眙金主亮使韓汝嘉就境上止之曰朕始至此比聞北方小警欲復歸中都無庸來賀也嚞乃還八月辛丑宿遷人魏勝起兵復海州總管李寶承制以勝知州事勝多智勇初應募為弓箭手居山陽及金人籍諸路民為兵勝躍曰此其時也聚義士三百北渡淮取漣水軍宣布朝廷德意不殺一人經畫布置課酒𣙜鹽士卒有自北來歸者勝與之同卧起共飲食示以不疑周其貧寠使之感激自是河北山東歸附者日衆金知海州事髙文富遣兵捕勝勝迎擊走之追至城下文富閉門固守勝令城外多張旗幟舉烟火為疑兵又使人向諸城門諭以金人棄信背盟無名興兵及本朝寬大之意城中人聞即開門獨文富與其子安仁率牙兵拒之勝殺安仁及州兵千餘擒文富民皆按堵如故勝遣人諭朐山懷仁沭陽東海諸縣皆定之乃蠲租稅釋罪囚發倉庫犒戰士分忠義士為五軍紀律明肅部分如宿將勝益募忠義以圖收復逺近聞之響應旬日得兵數千勝將董成率所部千餘人直入沂州殺金守將及軍士二千餘人悉降得器甲數萬金遣䝉恬鎮國以兵萬餘取海州抵州北二十里新橋勝帥兵出迎之設伏於隘陳以待衆殊死戰伏發賊大敗殺鎮國馘千人降三百人軍聲益振山東之民咸欲來附勝傳檄招諭結集以待王師之至沂民壁蒼山數十萬金人圍之久不下寨首滕􅀢告急於勝勝提兵往救之陳于山下金人多伏兵勝兵遇伏皆赴寨金人襲之勝單騎而殿以大刀奮擊金人望見勝知其為將也以五百騎圍之數重勝馳突四擊金陳開復合戰移時身𬒳數十槍冒刃出圍金兵追之馬中矢踣步而入寨無敢當者金人又急攻絶其水寨中食乾糧殺牛馬飲血勝默禱而雨驟作金人攻益急周山為營勝度其必復攻海州因間出寨趨城中金人果解蒼山圍自新橋抵城下勝出戰皆捷金兵分四靣攻之勝募兵登城以禦矢石如雨者七日金兵死傷多遁去乙卯劉錡引兵屯揚州遣統制王剛中以兵五千屯寶應己巳起復成閔為京湖制置使莭制兩路軍馬九月金主亮大舉入侵亮分諸道兵為三十二軍置左右大都督及三道都統制府以總之以賔都為左大都督李通副之赫舍哩良弼為右大都督烏延富勒琿副之蘇保衡為浙東道水軍都統制完顔鄭家副之由海道徑趨臨安劉萼為漢南道行營兵馬都統制進自蔡州以瞰荆襄圖克坦喀齊喀為西蜀道行營兵馬都統制由鳯翔趨大散關駐軍以俟後命左監軍圖克坦津别將兵二萬入淮隂金主亮召諸將授方略賜宴于尚書省命后圖克坦氏與太子光英居守張浩蕭玉敬嗣暉留治省事亮戎服乘馬具裝起行妃嬪皆從衆六十萬號百萬氊帳相望鉦鼓之聲不絶李通造浮梁于淮水之上將自清河口入淮東逺近大震庚辰詔劉錡王權李顯忠戚方備清河潁河渦河口丁亥高平人王友直起兵復大名遣使入朝友直幼從父佐遊志復中原聞金主亮渝盟乃結豪傑謂之曰權所以濟事權歸於正何害於理即矯制自稱河北等路安撫制置使以其徒王任為副使遍諭州縣勤王未幾得衆數萬制為十三軍置統制等官以統之進攻大名一鼓而克撫定衆庶諭以紹興年號遣人入朝未幾自夀春來歸詔以為忠義都統制冬十月金主亮渡淮慮魏勝睨其後分軍數萬圍海州㑹李寶帥舟師由海道將拒敵於膠西勝遣人邀之寶遡風至東海慷慨厲士卒赴援與勝同擊金兵於西橋敗之勝還守北關金兵逼關勝登關門張樂飲酒犒軍士令固守勿出戰踰時乃少遣士出憑險隘擊之金人知不可攻率軍轉而渡河襲關後勝斂兵入城金人欲過沙堰圜城為營勝先已據堰拒之尋以單騎逐敵於東門外大聲叱之金騎五百皆望風退勝又追十數里金兵駭散明旦乘昏霧四面薄城急攻勝竭力捍禦城上鎔金液投火牛金兵不能前多死傷乃拔寨走辛丑劉錡以兵駐清河口扼金師金人以氊裹船載糧而來錡使善沒者鑿沉其舟金人自渦口渡淮錡次于淮陰列兵運河岸以扼之丁未金人立曹國公烏嚕為帝於遼陽更名雍金主亮自發汴京將士在道多亡歸者哈斯罕明安福夀高忠建盧萬家博索路總管默音東京穆琨錦珠等始受甲於大名即舉部亡歸從者至二萬餘皆公言於路曰我輩今往東京立新天子矣時東京留守烏嚕許王鄂爾多之子太祖之孫也性仁孝沉靜明達衆心歸之亮嘗使摩囉歡圖淮北諸王烏嚕聞而憂懼㑹故吏魯爾錦自汴還具言金主殺母等事且曰將遣使害宗室兄弟矣烏嚕益懼謀于其舅興元少尹李石石勸烏嚕先殺副留守高存福烏嚕遂執存福將殺之適福夀等以軍入東京乃共殺存福等烏嚕遂御宣政殿即位大赦改元大定下詔暴揚亮罪惡十事追尊鄂爾多為帝戊申劉錡遣都統王權措置淮西權不從錡節制聞金兵大至即棄廬州退屯昭關兵皆潰錡聞之遂自淮隂退還揚州金主亮入廬州權自昭關退保和州吳拱成閔遣兵復唐鄧諸州丁巳帝聞王權敗召楊存中至內殿議禦敵之䇿因命存中就陳康伯議欲航海避敵康伯延之入解衣置酒帝聞之已自寬明日康伯入奏曰聞有勸陛下幸越趨閩者審爾大事去矣盍靜以待之一日帝忽降手詔曰如敵未退散百官康伯焚詔而後奏曰百官散主勢孤矣帝意既堅康伯乃請下詔親征帝從之詔㫖有云惟天惟祖宗既共昌於基運有民有社稷敢自逸於燕安又云歲星臨於吳分定成淝水之勳鬬士倍於晉師可决韓原之勝帝次平江以葉義問督視江淮軍馬中書舍人虞允文參贊軍事尋以楊存中為御營宿衛使金人陷真州統制邵宏淵逆戰敗走庚申王權退屯采石金主亮入和州以梁山濼水涸先所造戰船不得進命李通復造船督責苛急將士日夜不得休息壞城中民居以為材木煮死人膏為油用之乙丑金人陷掦州劉錡以舟渡真掦之民于江南留屯瓜洲金人來爭錡命步將吳超員琦王佐等拒之于皂角林錡陷重圍下馬死戰佐以步卒設伏林中金人既入張弩俄發金人以運河岸狹非騎兵之利稍稍引去追擊大破之斬其統軍高景山丙寅李寶大破金人于陳家島殺其將完顏鄭嘉努寶既解海州之圍遂與其子公佐引舟師至膠西石臼島敵舟已出海口泊陳家島相拒僅一山時北風盛寶禱于石臼神風來自柂樓中如鐘鐸聲衆咸奮引舟握創待戰敵操舟者皆中原遺民遙見寶船紿敵兵入舟使不知王師猝至風駛舟疾過山薄敵鼓聲震蕩海波騰躍敵大驚掣矴舉帆帆皆油纈綿亘數里風浪捲聚一隅無復行次寶命火箭射之煙焰隨發延燒數百艘火所不及者猶欲前拒寶叱壯土躍登其舟以短兵擊殺之降其衆三千餘人斬其帥完顔鄭嘉努等六人擒倪詢等上于朝獲其統軍符印與文書器甲糧斛以萬計餘物衆不能舉者悉焚之火四晝夜不滅十一月壬申召張浚判建康先是秦檜既主和晏然不復以邊事為意浚欲力論時事以其母計氏年髙言之必𬒳禍計氏知之誦其父咸紹聖初制䇿曰臣寧言而死於斧鉞不忍不言而負陛下浚意遂决上疏言當今事勢如養大疽於頭目心腹之間不决不止遲則禍大而難治疾則禍輕而易治惟陛下謀之於心斷之於獨謹察情僞預備倉卒庶幾社稷安全不然後將噬臍事下三省檜大怒貶浚連州居住及檜死朝廷復以和為可恃如檜時浚方居喪㑹星變求言浚慮金數年間必求釁用兵而吾方溺於宴安莫為之備沈該万俟卨居相位尤不厭天下望自以大臣義同休戚不敢以喪為嫌復上疏極言臺諌論浚名在罪籍倡異議以動國是復貶永州居住至是殿中侍御史陳俊卿上疏極言浚忠藎帝悟乃有是命召王權赴行在以李顯忠代將其軍金人犯瓜洲時劉錡病甚求解兵柄留其姪中軍統制劉汜以干五百人塞瓜洲李橫以八千人固守詔錡還鎮江專防江於是盡失兩淮之地金人攻圍益急汜以克敵弓射却之葉義問至鎮江見錡病劇以李橫權錡軍遂督兵渡江衆以為不可義問强之汜請出戰錡不從汜拜家廟而行金人鐡騎奄至江上汜先退李橫以孤軍不能當亦却失其都統制印橫左軍統制魏俊右軍統制王方死之橫汜僅以身免義問聞之乃陸走趨建康乙亥金主亮臨江築臺自被金甲登臺殺黑馬以祭天以一羊一豕投于江中召璸都等謂之曰舟楫已具可以濟江矣富勒琿曰臣觀宋舟甚大我舟小而行遲恐不可濟亮怒曰爾昔從梁王追趙構入海島豈皆大舟耶誓明日渡江晨炊玉麟堂先濟者與黃金一兩亮置黃旗紅旗于岸上以號令進止時葉義問命虞允文往蕪湖迎李顯忠交王權軍且犒師允文至采石權已去顯忠未來敵騎充斥官軍三五星散解鞍束甲坐道傍皆權敗兵也允文謂坐待顯忠則誤國事遂立召諸將勉以忠義曰金帛告命皆在此以待有功衆曰今既有主請死戰或謂允文曰公受命犒師不受命督戰他人壞之公受其咎耶允文叱之曰危及社稷吾將安避乃命諸將列大陳不動分戈船為五其二並東西岸其一駐中流藏精兵待戰其二藏小港備不測部分甫畢敵已大呼亮操小紅旗麾數百船絶江而來瞬息之間抵南岸者七十艘直薄官軍軍小却允文入陳中撫統制魏俊之背曰汝膽略聞四方立陳後則兒女子爾俊即揮雙刀出士殊死戰中流官軍以海鰌船衝敵舟皆平沈敵半死半戰日暮未退㑹有潰卒自光州至允文授以金鼓從山後轉出敵疑援兵至始遁允文又命徑弩尾擊追射大敗之金兵還和州凡不死於江者亮悉敲殺之㑹報曹國公已即位于東京改元大定亮拊髀嘆曰朕本欲平江南改元大定此非天乎因出其素所書取一戎衣天下大定改元事以示羣臣遂召諸將帥謀北還且分兵渡江李通曰陛下親征深入異境無功而還若衆散於前敵乘於後非萬全計若留兵渡江車駕北還諸將亦將解體今燕北諸軍近遼陽者恐有異志宜先發兵渡江斂舟焚之絶其歸望然後陛下還南北皆指日而定矣亮然之允文知亮敗明當復來夜半部分諸將分海舟縋上流别遣盛新以舟師截金人于楊林河口明旦敵果至因夾擊之復大敗焚其舟三百敵遣僞詔來諭王權似有宿約者允文曰此反間也乃復書言權因退師已置憲典新將李顯忠也願快戰以决雌雄亮得書大怒遂焚其龍鳯舟斬梁漢臣及造舟者二人率其軍趨揚州使符寶郎耶律滿達護神果軍扼淮渡凡自軍中還至淮上無都督府文字皆殺之丁亥劉錡以疾罷李顯忠至采石虞允文語之曰敵入揚州必與瓜洲兵合京口無備我當往公能分兵相助乎顯忠分萬六千與之允文遂還京口時敵屯重兵滁河造三閘儲水深數尺塞瓜洲口楊存中成閔邵宏淵諸軍皆集京口凡二十餘萬允文以戰艦數少不足用聚材改治之命張深守滁河口扼大江之衝以苖定駐下蜀為援且謁劉錡問疾錡執允文手曰疾何必問朝廷養兵三十年一技不施而大功乃出一儒生我輩愧死矣以疾篤召還提舉萬夀觀詔以成閔等為招討使閔淮東李顯忠淮西吳拱湖北京西乙未金主亮至瓜洲居于龜山寺虞允文與楊存中臨江按試命戰士踏車船中流上下三周金山回轉如飛敵持滿以待相顧駭愕亮笑曰紙船耳有一將跪奏南軍有備不可輕願駐揚州徐圖進取亮怒杖之五十召諸將約以三日濟江否則盡殺之驍騎高僧欲誘其黨以亡事覺亮命衆刃銼之乃下令軍士亡者殺其富勒堅富勒堅亡者殺其穆琨穆琨亡者殺其明安明安亡者殺其總管由是軍士益危懼亮又令軍中運鴉鶻船于瓜洲期以明日渡江敢後者死衆欲亡歸乃决計于浙西都統制耶律元宜及明安唐古烏葉且曰前阻淮渡皆成擒矣比聞遼陽新天子即位不若共行大事然後舉軍北還元宜然之期詰旦衛軍番代即行事黎明元宜等帥諸將以衆薄亮營亮聞亂意宋兵奄至攬衣遽起箭入帳中亮取視之愕然曰乃我兵也近侍大慶山曰事急矣當出避之亮曰走將安往方取弓已中箭仆地延安少尹納哈塔斡里雅布先刃之手足猶動遂縊死之軍士攘取行營服用皆盡乃取驍騎指揮使大磐衣巾裹其尸而焚之收其妃嬪及李通郭安國圖克坦永年梁珫大慶山等皆殺之元宜自為左領軍副大都督使人殺太子光英于汴退軍三十里遣人持檄詣鎮江軍議和未幾金軍在荆襄兩淮者皆拔栅北還初金人之犯邊也鄭樵言歲星分在宋金主將自斃至是果然金主雍知亮𬒳殺趨入燕京十二月成閔李顯忠收復兩淮州郡張浚至建康先是浚被召至嶽陽買舟冒風雪而行時金兵充斥浚遇東來者云敵兵方盛焚采石煙焰漲天慎毋輕進浚曰吾赴君父之急知直前求乘輿所在而已時長江無一舟敢行北岸者浚乘小舟徑進過池陽聞金亮敗餘衆猶二萬屯和州李顯忠兵在沙上浚往犒之一軍見浚以為從天而下浚犒軍畢即趨建康先牒通判劉子昻辦行宫儀物至是遂請車駕臨幸帝從之戊申帝如建康張浚迎拜道左衛士見浚無不以手加額浚起復用風采隱然軍民皆倚以為重三十二年春正月山東人耿京起兵復東平時金亮既死中原豪傑並起京據東平自稱東平節度使以厯城人辛棄疾掌書記棄疾勸京來歸京遣棄疾奉表詣行在帝大喜厚賚之以京知東平府金主雍下令散南征之衆以髙忠建為報諭宋國使且告即位二月癸卯帝發建康瀕行謂張浚曰卿在此朕無北顧憂矣御史吳芾言建康可以控帶襄漢經略淮甸大駕宜留以係中原之望若還臨安則西北之勢不能相從矣不從閏月辛棄疾至山東值耿京將張安國已殺京降金棄疾還至海州與衆謀曰我緣主帥來歸朝不期事變何以復命乃約李寶統制王世隆忠義人馬全福等徑趨金營即帳中縳安國獻於臨安斬之詔授棄疾江淮判官夏四月戊子金高忠建至臨安議遣使報聘且賀即位工部侍即張闡請嚴遣使之命正敵國之禮彼或不從則有戰耳如此則中國之威可以復振帝然之遂遣洪邁充賀登極使帝謂執政曰向日講和本為梓宫太后雖屈已卑辭有所不憚今兩國之盟已絶宜正名畫境朝儀歲幣當先定之邁乃奏接伴禮儀十有四事既而忠建責事以臣禮及取新復州郡陳康伯以義折之乃止邁行書用敵國禮帝手札賜邁曰祖宗陵寢隔濶三十年不得以時灑掃祭祀心實痛之若彼能以河北見歸必欲居尊如故正復屈己亦何所惜邁奏言山東之兵未解則兩國之好不成至燕金閣門見國書不如式即令於表中改陪臣二字朝見之儀必欲用舊禮邁執不可金鎖使館三日水漿不通及見金人語不遜欲留邁張浩不可乃遣還金人復攻海州鎮江都統張子蓋及魏勝敗之金人復遣烏津太師發諸路兵二十餘萬攻海州先遣一軍自州西南斷勝軍餉道勝擇徑悍三千餘騎拒于石闡堰金軍不能進逮夜始還留千人備險隘金兵十萬來奪勝率衆鏖戰殺數千人餘皆遁去勝還入城無何金兵環城圍數重勝與郭蔚分兵備禦或獨出擾之使不得休息又夜發兵劫其營或焚其攻具既而金人併力急攻勝告急于李寶寶以聞命張子蓋赴援進次石湫堰金人陳萬騎于河東子蓋率精鋭數千騎擊之統制張汜略陳中流矢死子蓋曰事急矣奮臂大呼馳入陳勝等繼之殊死戰賊大敗擁溺石湫河死者半圍遂解六月罷三招討司以金人議和故也初李顯忠隂結金都統蕭琦為內應請出師欲自宿亳趨汴由汴京以通關陜關陜既通則鄜延一路熟知顯忠威名必皆響應且欲起其舊部曲數萬以取河東㑹詔罷兵乃止顯忠初名世輔綏德青澗人世為蘇尾九族都巡檢使年十七隨父永竒出入行陳以勇捷知名先是金人陷延安授永奇父子官永奇聚泣曰我宋臣也世受國恩乃為彼用耶㑹劉豫令世輔帥馬軍赴東京永竒密戒之曰汝若得乘機即歸本朝無以我故二其志事成我亦不朽矣世輔至東京從烏珠以萬騎獵淮上世輔令吳俊往探淮水可渡馬處欲執烏珠歸朝俊還世輔馳問之為竹刺傷馬而止烏珠授世輔知同州世輔至鄜省父永竒曰同州入南山乃金人往來驛路汝可於此擒其酋渡洛渭由商虢歸朝第報我知我當以兵取延安而歸金薩里罕至同州世輔以計執之馳出城至洛河舟後期不得渡與追騎屢戰皆捷世輔憩髙原望追騎益多薩里罕搏頰求哀世輔乃與折箭為誓不得殺同州人及害我骨肉薩里罕許之遂推之下追兵爭救得免世輔携老幼長驅而北至鄜城急遣人告永竒永竒即挈家出城至馬趐谷為金人所及家屬三百口皆遇害世輔僅以二十六人奔夏既至夏人問其故世輔泣具言父母妻子之亡切齒疾首恨不即死願得二十萬衆生擒薩里罕取陜西五路歸於夏夏主以世輔為延安經略使與其臣王樞伊特阿同出師時紹興九年五月也世輔至延安總管趙惟清大呼曰鄜延今復歸朝已有赦書世輔取赦文觀之因與官屬列拜大夫乃以舊部八百餘騎往見王樞伊特阿諭之曰世輔已得延安府見講和赦書招撫可以本部軍歸國伊特阿不從曰初經略乞兵來取陜西既到此乃令我歸耶世輔知勢不可乃出刀斫伊特阿不及擒王樞縛之夏人以鐵鷂子軍來世輔以所部驅之馳揮雙刀所向披靡夏兵大潰世輔揭榜招兵得驍勇萬人乃擒害其父母弟姪者斬于東市行至鄜州有馬步軍四萬餘遂見吳玠于河池尋之行在帝撫勞再三賜名顯忠宋史紀事本末卷十八
