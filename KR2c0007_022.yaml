body:
  text: 宋史紀事本末卷二十二明馮琦原編陳邦瞻增輯兩朝內禪孝宗光宗寧宗廟議陵議附孝宗淳熙十四年九月癸卯太上皇有疾冬十月辛未帝罷朝侍疾赦乙亥太上皇崩於德夀殿遺詔太上皇后改稱皇太后帝號痛劈踊謂宰臣王淮等曰晉孝武魏孝文實行三年喪服何妨聽政司馬光通鑑所載甚詳淮對曰晉武雖有此意後來在宫中止用深衣練冠帝曰當時羣臣不能將順其美光所以議之自我作古何害辛巳詔曰太上皇帝奄棄至養朕當衰服三年羣臣自遵易月之令可令有司討論儀制以聞尤袤典禮定大行皇帝廟號髙宗翰林學士洪邁獨請號世祖袤率禮官顔師魯等奏曰宗廟之制祖有功宗有德藝祖規創大業為宋太祖太宗混一區夏為宋太宗自真宗至欽宗聖聖相傳廟制一定萬世不易在禮子為父屈示有尊也太上親為徽宗子子為祖父為宗失昭穆之序議者不過以漢光武為比光武以長沙王後布衣崛起不與哀平相繼其稱無嫌太上中興雖同光武然實繼徽宗正統以子繼父非光武比將來祔廟在徽宗下而稱祖恐在天之靈有所不安詔羣臣集議袤上議如初邁論遂屈詔從禮官議衆論紛然會禮部太常寺亦同主高宗謂本朝創業中興皆在商丘取商高宗實為有證遂從初議乙酉百官五上表請帝還內不許戊子帝衰絰御素輦還內十一月己亥帝始以白布巾袍視事於延和殿朔望詣德壽宫則衰絰而杖如初因詔太子參決庶務於議事堂左諭德尤袤言於太子曰大權所在天下之所爭趨甚可懼也願殿下事無大小一取上旨而後行情無厚薄一付衆議而後定又曰儲副之位止於侍膳問安不交外事撫軍監國自漢至今多出權宜事權不一動有觸礙乞俟祔廟之後便行懇辭以彰殿下令德庚子皇太子三辭參決不許辛丑帝詣德壽宫禫祭百官釋服甲辰羣臣三上表請御殿聽政詔俟過祔廟十五年春正月丁酉朔詣德壽宫几筵行禮三月庚子上大行太上皇諡曰聖神武文憲孝皇帝廟號高宗用翰林學士洪邁議以吕頥浩趙鼎韓世忠張俊配享高宗廟庭祕書少監楊萬里以張浚有社稷功請用浚配享不聽丙寅權攢高宗於永思陵夏四月壬申帝親行奉迎虞主之禮自是七虞八虞九虞卒哭奉辭皆如之丙戌祔高宗主於太廟詔曰朕比下令欲衰絰三年羣臣屢請御殿易服故以布素視事內殿雖有俟過祔廟勉從所請之詔然稽諸典禮心實未安行之終制乃為近古宜體至意勿復有請十六年春正月丙申以周必大留正為左右丞相帝自高宗崩即欲傳位太子嘗諭必大曰禮莫重於祀宗廟而孟享多以病分詣孝莫大於執喪而不得日至德壽宫朕將退休矣因密賜紹興傳位親札於必大命預草詔專以奉几筵以畢高宗三年之制而進必大為首相乙巳皇太后移御慈福宫更德壽宫為重華宫二月壬戌下詔傳位於皇太子太子即位帝素服退居於重華宫辛未尊帝為壽皇聖帝皇后為壽成皇后皇太后為壽聖皇太后大赦立皇后李氏后安陽人慶逺節度使道之女也道帥湖北聞道士皇甫坦善相人出諸女拜之坦見后驚不敢受拜曰此女當母天下坦言於高宗遂聘為恭王妃性悍妬嘗訴帝左右於高宗及壽皇高宗不懌謂吳后曰是婦將種吾為皇甫坦所誤壽皇亦屢訓敇令以皇太后為法不然行當廢汝后疑其説出於太后憾之至是立為后三月己亥子擴進封嘉王李后所生也光宗紹熙元年春正月丙辰帝朝壽皇於重華宫二年十一月辛未帝有事於太廟后殺貴妃黃氏初帝欲誅宦者近習懼遂謀離間三宫帝疑之不能自解會帝得心疾夀皇購得良藥欲因帝至宫授之宦者遂訴於皇后曰太上合藥一丸俟宫車過即投藥萬一不虞奈宗社何李后覘藥實有心銜之頃之內宴后請立嘉王擴為太子夀皇不許后曰妾六禮所聘嘉王妾親生也何為不可夀皇大怒后退持嘉王泣訴於帝謂夀皇有廢立意帝惑之遂不朝夀皇一日帝浣手宫中覩宫人手白恱之他日后遣人送食合於帝啓之則宫人兩手也至是以黃貴妃有寵因帝祭太廟宿齋宫后殺貴妃以暴卒聞壬申冬至郊合祭天地風雨大作黃壇燭盡滅不能成禮而罷帝既聞貴妃卒又值此變震懼增疾不視朝政事多決於后后益驕恣夀皇聞帝疾亟往南內視之且責后后怨益深三年春正月乙巳朔帝有疾不視朝三月辛巳帝疾稍愈始御延和殿聽政以子濤為安定郡王帝自有疾重華溫凊之禮以及誕辰節序屢以夀皇傳旨而免至是宰輔百官下至韋布之士以過宫為請者甚衆至有扣頭引裾號泣而諫者帝為開悟有翻然夙駕之意既而不果行都人始以為憂夏四月戊午帝始朝重華宫五月帝有疾不視朝十一月丙戌日南至丞相留正帥百官詣重華宫稱賀兵部尚書羅點給事中尤袤中書舍人黃裳御史黃度郎官葉適等上疏請帝朝重華宫不從祕書郎彭龜年復上言夀皇之事髙宗備極子道此陛下所親睹也况夀皇今日止有陛下一人聖心拳拳不言可知特遇過宫日分陛下或遲其行則夀皇不容不降免到宫之旨蓋為陛下辭責於人使人不得以竊議陛下其心非不願陛下之來自古人君處骨肉之間多不與外臣謀而與小人謀之所以交鬬日深疑隙日大今日兩宫萬萬無此然臣所憂者外無韓琦富弼吕誨司馬光之臣而小人之中已有任守忠者在焉惟陛下裁察又言使陛下虧過宫定省之禮皆左右小人間諜之罪宰執侍從但能推父子之愛調停重華臺諫但能仗父子之義責望人主至於疑間之根盤固不去曾無一語及之今內侍間諜兩宫者固非一人獨陳源在夀皇朝得罪至重近復進用外人皆謂離間之機必自源始宜亟發威斷首逐陳源然後肅命鑾輿負罪引慝以謝夀皇使父子歡然宗社有永不亦幸歟龜年又以書誚趙汝愚汝愚入對往復規諫帝意乃悟汝愚更屬嗣秀王伯圭調護於是兩宫之情始通辛卯帝朝重華宫皇后繼至從容竟日而還都人大恱是月皇后歸謁家廟推恩使臣鄧從訓等一百八十人四年春正月己巳朔帝朝重華宫三月辛巳以趙汝愚同知樞密院事御史汪義端與汝愚有隙上言高宗聖訓不用宗室為宰執汝愚楚王元佐七世孫不宜用之汝愚亦力辭不許命當制學士申諭上意而黜義端汝愚乃拜命五月己巳親策禮部進士問禮樂刑政之要陳亮以君道師道對且曰臣竊嘆陛下於夀皇涖政二十有八年之間寧有一政一事之不在聖懷而問安視寢之餘所以察詞而觀色因此而得彼者其端甚衆亦既得其機要而見諸施行矣豈徒一月四朝為京邑之美觀也哉上得之大喜以為善處人父子之間擢為第一秋七月壬午以趙汝愚知樞密院事九月庚午重陽節百官上夀請帝朝重華宫不聽而召內侍陳源為押班中書舍人陳傅良不草詞且上疏曰陛下之不過重華宫者特誤有所疑而積憂成疾以至此爾臣嘗即陛下之心反覆論之竊自謂深切陛下亦既許之矣未既中變以誤為實而開無端之釁以疑為真而成不療之疾是陛下自貽禍也給事中謝深甫言父子至親天理昭然太上之愛陛下亦猶陛下之愛嘉王太上春秋高千秋萬嵗後陛下何以見天下帝感悟趨命駕往朝百官班立以俟帝出至御屏后挽留帝入曰天寒官家且飲酒百僚侍衛相顧莫敢言傅良趨進引帝裾請毋入因至屏後后叱曰此何地秀才欲斫頭耶傅良痛哭於庭后使人問曰此何理也傅良曰子諫父不聽則號泣而隨之后益怒遂傳旨罷還內傅良下殿徑行詔改祕閣修撰不受於是著作郎沈有開祕書郎彭龜年禮部侍郎倪思國子録王介等皆上疏請朝不從會上召嘉王倪思言夀皇欲見陛下亦猶陛下之於嘉王也上為動容時李后寖與政思進講薑氏會齊侯於濼因奏言人主治國必自齊家始家之不能齊者不能防其漸也始於褻狎終於恣橫至於隂陽易位內外無别甚至離間父子漢之吕氏唐之武韋幾至亂亡不但魯莊公也帝悚然趙汝愚同侍經筵退語人曰讜直如此吾黨不逮也上怒思出知紹興府冬十月工部尚書趙彥逾等上書重華宫乞會慶節勿降旨免朝夀皇曰朕自秋涼以來思與皇帝相見卿等奏疏已令進御前矣及會慶節帝復稱疾不朝丞相以下皆上疏自劾乞罷黜嘉王府翊善黃裳請誅內侍楊舜卿彭龜年奏言臣所居之官以記注人君言動為職車駕不過宫問安如此書者殆數十矣恐非所以示後又言陛下誤以臣充嘉王府講讀官正欲臣等教以君臣父子之道臣聞有身教有言教陛下以身教臣以言教者也言豈若身之切哉是時太學生汪安仁等二百一十八人亦上書請朝重華宫皆不報十一月趙彥逾復力請帝朝重華宫帝始往朝尚書左選郎官葉適奏自今宜於過宫之日令宰執侍從先詣起居異時兩宫聖意有難言者自可因此傳致則責任有歸不可復使近習小人增損語言以生疑惑不聽五年春正月癸酉夀皇不豫夏四月夀皇疾浸革羣臣數請帝問疾重華宫皆不報帝與皇后幸玉津園兵部尚書羅點請先過重華宫且曰陛下為夀皇子四十餘年無一間言止緣初郊違豫夀皇嘗至南內督過左右之人自此讒間遂生憂疑以臣觀之夀皇與天下相忘久矣今大臣同心輔政百執事奉法循理宗室戚里三軍百姓皆無二志設有間離誅之不疑乃若深居不出久虧子道衆口謗讟禍患將作不可以不慮帝曰卿等可為朕調護之侍講黃裳對曰父子之親何俟調護點曰陛下一出即當釋然帝猶未許點乃率講官言之帝曰朕心未嘗不思夀皇點曰陛下久闕定省雖有此心何以自白起居舍人彭龜年連疏請對不報屬帝視朝龜年不離班位伏地扣額血流漬甃帝曰素知卿忠直欲何言龜年奏今日事何大於過宫余端禮因曰扣額龍墀曲致忠懇臣子至此豈得已耶帝曰知之然猶不往羣臣上疏請者相繼帝將以癸丑日朝至期丞相以下入宫門俟日昃帝復辭以疾於是羣臣請斥罷者百餘人詔不許祕書少監孫逢吉等再上疏以請陳傅良請以親王執政一人充重華宫使臺諫交章劾內侍陳源楊舜卿林億年離間之罪請逐之不報五月夀皇疾大漸欲一見帝數顧視左右陳傅良以帝不往重華宫乃繳上告敇出城待罪丞相留正等率宰執進諫帝拂衣起正引帝裾諫羅點進曰夀皇疾勢已危不及今一見後悔何及羣臣隨帝入至福寧殿內侍闔門痛哭而出越二日正等又請入對帝令知閣門事韓托胄傳旨云宰執並出正等俱出至浙江亭待罪夀皇聞之憂甚托胄奏曰昨傳旨宰執出殿門今乃出都門請自往宣押入城於是正及趙汝愚等復還第明日帝召羅點入對點言前日迫切獻忠舉措失禮陛下赦而不誅然引裾亦故事也帝曰引裾可也何得輒入宫禁乎點引辛毗事以謝且曰夀皇止有一子既付神器惟恐見之不速耳從官及彭龜年黃裳沈有開奏乞令嘉王詣重華宫問疾許之王至宫夀皇為之感動六月戊戌夜夀皇崩年六十八是夕重華宫內侍訃於宰執私第趙汝愚恐帝疑惑不出視朝持其劄不上次日帝視朝汝愚以聞因請詣重華宫成禮帝許之至日昃不出大宗正丞李大性上疏言今日之事顛倒舛逆况金使祭奠當引見於北宫素帷不知是時猶可以不出乎檀弓曰成人有兄死不為衰者聞子臯將為成宰遂為衰成人曰兄則死而子臯為之衰蓋言成人畏子臯之來方為制服乃子臯為之非為兄也若陛下必待使來然後執喪則恐貽譏中外豈特如成人而已哉宰相乃率百官詣重華宫發喪將成服留正與汝愚議介少傅吳琚請夀聖太后垂簾暫主喪事太后不許正等附奏云臣等連日造南內請對不獲纍上疏不得報今當率百官恭請若皇帝不出百官相與慟哭於宫門恐人情騷動為社稷憂乞太后降旨以皇帝有疾暫就宫中成服然喪不可以無主祝文稱孝子嗣皇帝宰臣不敢代行太后夀皇之母也請攝行祭禮太后許之史臣曰高宗以公天下之心擇太祖之後而立之乃得孝宗之賢聰明英毅卓然為南渡諸帝稱首即位之初鋭志恢復重違高宗之命不輕出師又值金國平治無隙可乘然易表為書正敵國禮減去嵗幣以定鄰好金人易宋之心至是亦寖異於前日故世宗每戒羣臣積錢榖謹邊備蓋忌帝之將有為也惜帝用兵之志弗遂而終自古人君起自外藩入繼大統而能盡宫庭之孝未有若帝者終喪三年又能却羣臣之請而力行之廟號孝宗其無愧矣乙巳尊夀聖皇太后為太皇太后夀成皇后為皇太后丁未葉適言於留正曰帝疾而不執喪將何辭以謝天下今嘉王長若預建參決則疑謗釋矣正從之率宰執入奏云皇子嘉王仁孝夙成宜早正儲位以安人心不報越六日又請帝批云甚好明日宰執同擬旨以進乞帝親批付學士院降詔是夕御劄付丞相云歷事嵗久念欲退間正得之大懼秋七月辛酉留正因朝佯仆於庭即出國門上表請老且云陛下速回淵鑒追悟前非漸收人心庶保國祚初正始議帝以疾未克主喪宜立皇太子監國若未倦勤當復明辟設議內禪太子可即位而趙汝愚請以太皇太后旨禪位嘉王正謂建儲詔未下遽及此他日必難處與汝愚異遂以肩輿五鼓遁去甲子太皇太后詔嘉王擴成服即位尊帝為太上皇帝皇后為太上皇后時留正既去人心益搖會帝臨朝忽仆於地趙汝愚憂危不知所出徐誼以書誚汝愚曰自古人臣為忠則忠為姦則姦忠姦雜而能濟者未之有也公內雖心惕外欲坐觀非雜之謂歟國家安危在此一舉汝愚問策安出誼曰此大事非憲聖太后命不可知閣門事韓托胄琦五世孫憲聖女弟之子也同里蔡必勝與托胄同在閣門可因必勝招之托胄至汝愚以內禪議遣托胄請於太后托胄因所善內侍張宗尹以奏太后不獲命明日往又不獲命逡巡將退內侍關禮見而問之托胄具述汝愚意禮令少俟入見太后而泣太后問故禮對曰聖人讀書萬卷亦嘗見有如此時而保無亂者乎太后曰此非汝所知禮曰此事人人知之今丞相巳出所賴者趙知院旦夕亦去矣言與淚俱下太后驚曰知院同姓事體與他人異乃亦去乎禮曰知院未去非但以同姓故以太皇太后為可恃耳今定大計而不獲命勢不得不去去將如天下何太后因問托胄安在禮曰臣已留其俟命太后曰事順則可令諭好為之禮報托胄且云來早太后於夀皇梓宫前垂簾引執政托胄復命日已向夕汝愚始以其事語陳騤余端禮亟命殿帥郭杲等夜以兵分衛南北內關禮使傅昌朝密製黃袍是日嘉王謁告不入臨時將禫祭汝愚曰禫祭重事王不可不出翌日甲子羣臣入王亦入汝愚率百官詣梓宫前太后垂簾汝愚率同列再拜奏皇帝疾未能執喪臣等乞立皇子嘉王為太子以繫人心皇帝批出有甚好二字繼有念欲退間之旨取太皇太后處分太后曰既有御筆相公當奉行汝愚曰兹事重大播之天下書之史册須議一指揮太后允諾汝愚袖出所擬太后指揮以進云皇帝以疾至今未能執喪曾有御筆欲自退間皇子嘉王擴可即皇帝位尊皇帝為太上皇帝皇后為太上皇后太后覽畢曰甚善汝愚奏自今臣等有合奏事當取嗣君處分然恐兩宫父子間有難處者須煩太后主張又奏上皇疾未平驟聞此事不無驚疑乞令都知楊舜卿提舉本宫任其責遂召舜卿至簾前面諭之太后乃命汝愚以旨諭皇子即位皇子固辭曰恐負不孝名汝愚奏天子當以安社稷定國家為孝今中外人人憂亂萬一變生置太上皇何地衆扶皇子入素幄被黃袍方却立未坐汝愚率同列再拜皇子詣几筵奠哭盡哀須臾立仗訖催百官班皇子衰服出就重華殿東廡素幄立內侍扶掖登御座百官起居訖行禫祭禮命舜卿往南內請八寶初猶靳與舜卿傳奏皇子即位乃得寶出汝愚即喪次召還留正尋詔即以寢殿為泰安宫以奉上皇民心悅懌中外晏然汝愚力也乙亥侍御史章頴等劾內侍林億年陳源楊舜卿詔奪舜卿官億年常州居住源撫州居住冬十月庚寅更號泰安宫為夀康宫閏月庚申詔議祧廟時以孝宗祔廟議宗廟迭毁之制孫逢吉曹三復皆請併祧僖順翼宣四祖祧主宜有所歸自太祖首尊四祖之廟治平間以世數寖逺請遷僖祖於夾室後王安石等奏僖祖有廟與稷契無異請復其舊至是趙汝愚雅不以復祀僖祖為然侍從多從其説吏部尚書鄭僑欲且祧宣祖而祔孝宗侍講朱熹以為藏之夾室則是以子孫之主下藏於子孫之夾室又擬為廟制以為物豈有無本而生者廟堂不以聞乃毁撤僖宣廟室更創别廟以奉四祖十一月辛亥詔行孝宗皇帝三年喪先是有司請於易月之外用漆紗淺黃之制時朱熹在講筵奏言自漢文短喪歷代因之天子遂無三年之喪為父且然則嫡孫承重可知人紀廢壞三綱不明千有餘年莫能釐正夀皇聖帝至性以日易月之外猶執通喪朝衣朝冠皆用大布所宜著在方策為萬世法程陛下以世嫡承大統承重之服著在禮律宜遵夀皇已行之法一時倉卒不及詳擬遂用漆紗淺黃之服使夀皇已行之禮舉而復墜臣竊痛之然既往之事不及追改啓殯發引禮當復用初喪之服至是詔遵用三年之制中外百官皆以涼衫視事蓋用熹言也乙卯攢孝宗於永阜陵先是趙彥逾按視孝宗山陵以為土肉淺薄下有水石孫逢吉覆按乞别求吉兆詔集議朱熹上議狀言夀皇聖德衣冠之藏當博求名山不宜偏信臺史委之水泉沙礫之中不報寧宗慶元六年六月乙酉太上皇后李氏崩諡曰慈懿八月辛卯太上皇帝崩廟號光宗史臣曰光宗幼有令聞嚮用儒雅即位之初總權綱屏嬖幸薄賦寬刑有可觀者及夫宫闈妬悍閹寺交搆驚憂致疾孝養曰怠孝宗之業衰矣韓托胄專政光宗紹熙五年秋七月甲子皇子擴即位乙丑立皇后韓氏后琦六世孫父曰同卿托胄則其季父也被選入宫能順適兩宫意遂歸嘉王邸至是立為后己巳以趙汝愚兼權參知政事汝愚首裁抑僥幸收召四方知名之士中外引領望治己亥復召留正赴都堂治事趙汝愚乞免兼參知政事乃拜右丞相汝愚辭曰同姓之卿不幸處君臣之變敢言功乎戊寅加殿前都指揮使郭杲為武寧軍節度使辛巳以趙汝愚為樞密使壬午以韓托胄為汝州防禦使初托胄欲推定策功意望節鉞汝愚曰吾宗臣汝外戚也豈可言功惟爪牙之臣則當推賞乃加杲節鉞但遷托胄防禦使托胄大失望然以傳逹詔旨浸見親幸時時乘間竊弄威福知臨安府徐誼告汝愚曰托胄異時必為國患宜飽其欲而逺之不聽汝愚欲推葉適之功適辭曰國危效忠職也適何功之有及聞托胄觖望與知閣劉弼言於汝愚曰托胄所望不過節鉞宜與之不從適歎曰禍自此始矣遂力求補外八月丙辰內批罷左丞相留正時韓托胄浸謀預政數詣都堂正使省吏諭之曰此非知閣日往來之地托胄怒而退會正與汝愚議山陵不合托胄因間之於帝遂以手詔罷正出知建康府以趙汝愚為右丞相汝愚本倚留正共事怒韓托胄不以告及來謁因不見之托胄慙憤羅點曰公誤矣汝愚悟乃見之托胄終不懌九月壬申以京鏜僉書樞密院事初帝欲除鏜帥蜀趙汝愚謂人曰鏜望輕資淺豈可當此方面鏜聞而憾之由是韓托胄引以自助鏜時已變素守羣憸附和視正士如仇讐衣冠之禍自此始冬十月內批以謝深甫為御史中丞劉德秀為監察御史罷右正言黃度時韓托胄日夜謀去趙汝愚知閣門事劉弼亦以不得與內禪心懷不平因謂托胄曰趙相欲專大功君豈惟不得節鉞將恐不免嶺海之行托胄愕然問計曰惟有用臺諫耳托胄問若何而可弼曰御筆批出是也托胄然之遂以內批拜給事中謝深甫為中丞會汝愚請令近臣薦御史托胄密以其黨劉德秀屬深甫遂以內批用之由是劉三傑李沐等牽連以進言路皆托胄之人排斥正士侍講朱熹憂其害政每因進對為帝切言之又約吏部侍郎彭龜年同劾托胄會龜年出護使客不果熹復貽書汝愚當以厚賞酬托胄之勞勿使預政汝愚為人疏謂其易制不以為慮黃度將上疏論托胄之姦托胄覺之以御筆除度知平江府度言蔡京擅權天下所由以亂今托胄假御筆逐諫臣使俯首去不得效一言非國之利也固辭奉祠歸養未幾復內批罷侍講朱熹熹事見道學紀遊仲鴻上疏曰陛下宅憂之時御批數出不由中書前日宰相留正之去去之不以禮諫官黃度之去去之不以正近日講官朱熹之去復去之不以道自古未有舍宰相諫官講官而能自為聰明者也願亟還熹毋使小人得志以養成禍亂王介上疏言陛下即位未三月策免宰相遷易臺諫悉出內批非盛世事也崇寧大觀間事出御批遂成北狩之禍杜衍為相常積內降十數封還今宰相不敢封納臺諫不敢彈奏此豈可久之道皆不報十一月庚戌以韓托胄兼樞密都承旨初詔托胄可特遷二官托胄意不滿力辭乃止遷一官為宜州觀察使怨趙汝愚益深至是特遷都承旨十二月乙丑吏部侍郎兼侍講彭龜年見韓托胄用事權勢重於宰相上疏條奏其姦謂進退大臣更易言官皆初政最關大體若大臣或不能知而托胄知之假托聲勢竊弄威福不去必為後患上覽奏駭曰托胄朕托以肺腑信而不疑不謂如此龜年又言陛下逐朱熹太暴故欲陛下亦亟去此小人毋使天下人謂陛下去君子易去小人難於是龜年托胄俱請祠帝欲兩罷其職陳騤進曰以閣門去經筵何以示天下既而內批龜年與郡托胄進一官與在京官觀給事中林大中同中書舍人樓鑰繳奏曰陛下眷禮舊僚一朝龍飛延問無虛日不三數月間或死或斥賴龜年一人尚留今又去之四方謂其以盡言得罪恐傷政體且一去一留恩意不侔去者下逺則復侍左右留者納祠則召見無時請留龜年經筵而命托胄以外任則事體適平人無可言者上批龜年已為優異托胄本無過尤可並書行大中與鑰同奏龜年除職與郡以為優異則托胄之轉承宣使非優異乎若謂托胄本無過尤則龜年論事實出於愛君之忱豈得為過龜年既已決去托胄難於獨留宜畀外任或外祠以慰公議不聽由是托胄愈橫御史中丞謝深甫劾陳傅良罷之己巳陳騤罷以余端禮知樞密院事京鏜參知政事鄭僑同知樞密院事陳騤與趙汝愚素不協未嘗同堂語及爭彭龜年事韓托胄語人曰彭侍郎不貪好官固也元樞亦欲為好人耶故罷之而引京鏜居政府以間汝愚汝愚孤立於朝天子亦無所倚信以趙彥逾為四川制置使時彥逾為工部尚書自以有功於帝室冀趙汝愚引居政府及除蜀帥大怒遂與韓托胄合因陛辭疏廷臣姓名於帝指為汝愚之黨且曰老奴今去不惜為陛下言之由是帝亦疑汝愚矣寧宗慶元元年二月戊寅罷右丞相趙汝愚初韓托胄欲逐汝愚而難其名謀於京鏜鏜曰彼宗姓也誣以謀危社稷則一網打盡矣托胄然之以祕書監李沐嘗有怨於汝愚引為右正言使奏汝愚以同姓居相位將不利於社稷乞罷其政以奠安天位杜塞姦源是日汝愚出浙江亭待罪遂以觀文殿大學士出知福州甲申謝深甫等論汝愚冒居相位今既罷免不當加以書殿隆名帥藩重寄乞令奉祠思咎命提舉洞霄宫直學士院鄭湜草制詞有曰頃我家之多難賴碩輔之精忠持危定傾安社稷以為悅任公竭節利國家無不為坐無貶詞亦免官兵部侍郎章頴侍經幃帝曰諫官有言趙汝愚者卿等謂何頴奏言天地變遷人情危疑加以敵人嫚侮國勢未安未可輕退大臣願降詔宣諭汝愚無聽其去國子祭酒李祥言去嵗夀皇崩兩宫隔絶中外洶洶留正棄宰相而去官僚幾欲解散君喪無主國命如髮汝愚不畏滅族決策立陛下風塵不搖天下復安社稷之臣也奈何無念功至意忽體貌常典使精忠直節拂鬱黯暗何以示後世知臨安府徐誼素為汝愚所器凡有政務多咨訪之誼隨事禆助不避形迹又嘗勸汝愚早退及預防托胄之姦托胄尤怨之及是與國子博士楊簡亦抗論留汝愚李沐劾為黨皆斥之夏四月丁巳大府寺丞吕祖儉奏言趙汝愚之忠韓托胄怒曰吕寺丞乃與我事耶祖儉乃上封事曰陛下初政清明登用忠良然曾未踰時朱熹老儒也彭龜年舊學也有所論列則亟許之去至於李祥老成篤實非有偏比蓋衆聽所共孚者今又終於斥逐臣恐自是天下有當言之事必將相視以為戒鉗口結舌之風一成而未易反是豈國家之利耶又曰今之能言之士其所難非在於得罪君父而在忤意權勢姑以臣所知者言之難莫難於論災異然言之而不諱者以其事不關於權勢也若乃御筆之降廟堂不敢重違臺諫不敢深論給舍不敢固執蓋以其事關貴近深慮乘間激發而重得罪也故凡勸導人主事從中出者蓋欲假人主之聲勢以漸竊威權耳比者聞之道路左右􅉏御於黜陟廢置之際間得聞者車馬輻輳其門如市恃權怙寵搖撼外庭臣恐事勢浸淫政歸幸門不在公室凡所薦進皆其所私凡所傾陷皆其所惡豈但側目憚畏莫敢指言而阿比順從內外表裏之患必將形見臣因李祥獲罪而深及此者是豈矯激自取罪戾哉實以士氣頺靡之中稍忤權臣則去不旋踵私憂過計深憂陛下之勢孤而相與維持宗社者寖寡也疏上有旨祖儉朋比罔上送韶州安置中書舍人鄧馹繳奏祖儉不當貶中降旨祖儉意在無君罪當誅竄逐已從寬會樓鑰進讀吕公著元祐初所上十事因進曰如公著社稷臣猶將十世宥之祖儉乃其孫也今投嶺外萬一即死陛下有殺諫臣名臣竊惜之帝問祖儉所言何事人皆知詔州之貶不出上意尋改吉州庚申太學生楊宏中周端朝張道林仲麟蔣傅徐範六人伏闕上書曰自古國家禍亂之由初非一端惟小人中傷君子其禍尤慘黨錮敝漢朋黨亂唐大率由此元祐以來邪正交攻卒成靖康之變臣子所不忍言陛下所不忍聞也近者諫官李沐論罷趙汝愚中外咨憤而李沐以為父老歡呼蒙蔽天聽一至於此陛下獨不念去嵗之事乎人情驚疑變在朝夕是時假非汝愚出死力定大議雖百李沐罔知攸濟當國家多難汝愚位樞府本兵柄指揮操縱何向不可不以此時為利今上下安妥乃有異意乎章頴李祥楊簡發於中激力辨其非即遭斥逐六館之士拂膺憤怨李沐自知邪正不兩立思欲盡覆正人以便其私必托朋黨以罔陛下之聽臣恐君子小人消長之機於此一判則靖康已然之驗何堪再見於今日耶伏願陛下念汝愚之忠勤察祥簡之非黨灼李沐之回邪竄沐以謝天下還祥簡以收士心疏上詔宏中等罔亂上書扇搖國是悉送五百里外編管中書舍人鄧馹繳奏留之不聽是日有旨李沐除右諫議大夫劉德秀除右正言知臨安府錢象祖捕諸生押送貶所未幾出馹知泉州時天下號宏中等為六君子秋七月癸酉加韓托胄保寧節度使十一月丙午竄故相趙汝愚於永州初韓托胄忌汝愚必欲置之死以息人言至是用何淡疏落汝愚觀文殿大學士及宫觀監察御史胡紘遂上言汝愚倡引偽徒謀為不軌乘龍授鼎假夢為符因條奏其十不遜且及徐誼詔謫汝愚寧逺軍節度副使永州安置誼惠州團練副使南安軍安置時汪義端當制遂用漢誅劉屈氂唐戮李林甫事示欲殺之之意趙師古亦上書乞斬汝愚帝不從二年春正月壬午趙汝愚卒於衡州初汝愚之貶謂諸子曰觀托胄之意必欲殺我我死汝曹尚可免也行至衡州病作衡守錢鍪承托胄風旨窘辱備至汝愚暴卒天下聞而寃之訃聞上命追復元官許歸葬中書舍人吳宗旦繳還復官之命汝愚嘗夢孝宗授以湯鼎背負白龍升天後翼嘉王以素服即位蓋其驗也讒者遂以為罪云秋七月量徙流人吕祖儉等於內郡祖儉移高安尋卒祖儉嘗曰因世變有所摧折失其素履者固不足言矣因世變而意氣有所加者亦私心也四年五月己亥加韓托胄少傅賜玉帶八月丙子以謝深甫知樞密院事許及之同知院事及之為吏部尚書諂事韓托胄無所不至居二年不遷見托胄流涕敘其知遇之恩衰遲之狀不覺屈膝托胄惻然憐之故有是命托胄嘗值生辰朝臣畢集及之適後至閽人掩關拒之及之大窘會閘未及閉遂俯僂而入當時有由竇尚書屈膝執政之語傳以為笑是月以趙師􅋷為工部侍郎師􅋷附韓托胄得知臨安府托胄生日百官爭貢珍異師􅋷最後至出小合曰願獻少果核侑觴啓之乃粟金蒲桃小架上綴大珠百餘顆衆慙沮托胄有愛妾張談王陳四人皆封郡夫人其次有名位者又十人或獻北珠冠四枚於韓托胄托胄以遺四夫人其十人亦欲之未有以應也師􅋷聞之亟市北珠製十冠以獻十人者喜為求遷官拜工部侍郎托胄嘗與衆客飲南園過山莊顧竹籬草舍曰此真田舍間氣象但欠犬吠雞鳴耳俄聞犬嘷叢薄視之乃師􅋷也托胄大笑五年春正月庚子奪前起居舍人彭龜年等官初趙汝愚定策時樞密院直省官蔡璉從旁竊聽因而漏言汝愚竄之既而逃臨安韓托胄聞之乃使璉誣告汝愚定策時有異謀具列賔僚所言凡七十餘紙詔下大理捕鞫彭龜年曾三聘沈有開葉適項安世等以實其事中書舍人范仲藝謂托胄曰章惇蔡確之權不為不盛然而至今得罪於清議者以同文獄故耳相公胡為蹈之托胄曰某初無此心以諸公見迫不容己但莫問其人乃知京鏜劉德秀實主其議托胄取録黃藏之事遂格張釜劉三傑張嚴程松等論之不已詔纍經赦宥宜免然猶奪龜年三官而擢璉進義副尉六年秋七月以陳自強簽書樞密院事自強嘗為韓托胄童子師及托胄當國自強入都待銓欲見之無以自通僦居主人出入托胄家為入言之一日托胄召自強比至則從官畢集托胄設褥於堂延自強升坐再拜次召從官同坐從官踧踖莫敢居上者托胄徐曰陳先生老儒汨沒可念坐客唯唯明日交章薦其才即除太學録未踰嵗三遷為祕書郎既入館即改右正言月餘拜諫議大夫御史中丞旬日遂秉政九月甲子婺州布衣吕祖泰上書請誅托胄祖泰祖儉從弟也性疏達尚氣誼論世事無忌諱先是祖儉以言事貶祖泰語其友曰自吾兄之貶諸人箝口我雖無位義必以言報國當少須之今亦不敢以纍吾兄也至是祖儉卒祖泰乃擊登聞鼓上書論韓托胄有無君之心請誅之以防禍亂其略曰道學自古所恃以為國者也丞相趙汝愚今之有勳勞者也立偽學之禁逐汝愚之黨是將空陛下之國而陛下不知悟耶陳自強何人也徒以韓托胄童稚之師躐致宰輔陛下舊學之臣若彭龜年等今安在哉蘇師旦平江之吏胥周筠韓氏之厮役人共知之今師旦乃以潛邸隨龍筠以皇后親屬俱得大官不知陛下在潛邸時果識所謂蘇師旦者乎椒房之親果有厮役之周筠者乎托胄徒自尊大而卑陵朝廷一至於此願亟誅托胄師旦筠而逐罷自強之徒故大臣在者獨周必大可用宜以代之不然事將不測書下三省朝論雜起御史施康年以為必大實使之遂露章奏劾且謂淳熙之季王淮為首相必大嘗擠而奪之位倡偽徒植黨與今屏居田野不自循省而誘致狂生扣閽自薦以覬召用林采言偽學之成造端自周必大乞加貶削遂貶必大一官為少保降詔吕祖泰挾私上書語言狂妄拘管連州右諫議大夫程松與祖泰狎友懼曰人知我素與遊其謂我與聞乎乃獨奏言祖泰有當誅之罪且其上書必有教之者今縱不殺猶當杖脊黥面竄之逺方殿中侍御史陳讜亦以為言遂杖祖泰一百配欽州牢城收管冬十月加韓托胄太傅十一月己未皇后韓氏崩嘉泰元年八月以張巖參知政事程松同知樞密院事巖松皆附韓托胄松諂托胄尤甚自知錢塘縣不二年為諫議大夫滿嵗未遷殊怏怏乃市一妾獻之名曰松夀托胄曰奈何與大諫同名答曰欲使賤名常達鈞聽耳托胄憐之遂得同知樞密院二年春正月以蘇師旦兼樞密都承旨初韓托胄為平江府兵馬鈐轄時師旦以筆吏事之托胄愛其辨慧帝登極竄姓名於藩邸吏士內遂以隨龍恩得官至是權勢日盛十二月甲申立貴妃楊氏為皇后自韓后崩中宫未有所屬后為貴妃與曹美人俱有寵韓托胄以后頗涉書史知古今性警敏任權術而曹美人柔順勸帝立曹氏帝不從竟立后由是后與托胄有怨矣加韓托胄太師封平原郡王先是監惠民局夏允中上書請依文彥慱故事以托胄平章軍國重事托胄繆為辭謝詔不許而罷允中至是進位太師托胄欲以勢利蠱士大夫之心薛叔似辛棄疾陳謙等皆起廢顯用當時困於久斥者往往損晚節以規榮進政府樞密臺諫侍從皆出托胄之門而蘇師旦周筠又托胄厮役亦得預聞國政羣小滿朝勢熖薰灼三年五月以陳自強為右丞相時韓托胄專權凡所欲為宰執惕息不敢為異自強至印空名敇劄授之惟所欲為宰執不與知也言路扼塞每月按舉小吏一二人謂之月課又有泛論君德時事皆取其陳熟緩慢略無攖拂者言之或問之則愧謝曰聊以塞責耳加以苞苴盛行自強尤貪鄙四方致書餽必題其緘云某物若干併獻凡書題無併字則不開縱子弟親戚關通貨賄仕進干請必諧價而後豫嘗語人曰自強惟一死以報師王每稱托胄為恩主恩父蘇師旦為叔堂吏史達祖為兄托胄姦宄専國自強表裏之功為多開禧元年秋七月庚申詔朝托胄平章軍國事立班丞相上三日一朝赴都堂治事論者謂托胄繫銜比吕夷簡省同字則其體尤尊比文彥博省重字則其所與者廣於是三省印並納其第托胄置機速房於私第甚者假作御筆升黜將帥事關機要未嘗奏稟人莫敢言時托胄專政既久黨與遍內外天子孤立於上威行宫省權震宇內嘗鑿山為沼下瞰太廟出入宫闈無度孝宗疇昔思政之所偃然居之老宫人見之往往流涕顔棫草制以為得聖之清易祓撰答詔以元聖褒之四方投獻者謂伊霍旦奭不足以擬其勳余嚞請加九錫趙師􅋷乞置平原府官屬托胄皆當之不辭其嬖妾皆封郡國夫人每內宴與妃嬪雜坐恃勢驕倨掖庭皆惡之後伏誅籍其家多乘輿服御之飾其僭紊極矣北伐更盟寧宗嘉泰四年春正月韓托胄定議伐金時金為北鄙韃靼等部所擾無嵗不興師討伐兵連禍結士卒塗炭府庫空匱國勢日弱羣盜蜂起民不堪命有勸韓托胄立蓋世功名以自固者托胄然之恢復之議遂起聚財募卒出封樁庫黃金萬兩以待賞功命吳曦練兵西蜀既而安豐守臣厲仲方言淮北流民咸願歸附浙東安撫使辛棄疾入見言金國必亡願屬大臣備兵為倉卒應變之計托胄大喜會鄧友龍使金還言金有賂驛使夜半求見者具言金國困弱王師若來勢如拉朽托胄聞之用師之意益決矣五月癸未追封嶽飛為鄂王飛先已賜諡武穆至是韓托胄欲風勵諸將故追封之開禧元年夏四月武學生華嶽上書諫朝廷未宜用兵啓邊釁且乞斬韓托胄蘇師旦周筠以謝天下托胄大怒下嶽大理編管建寧五月金主璟聞朝廷將用兵召諸大臣問之皆曰宋敗衄之餘自救不暇恐不敢叛盟完顔匡獨曰彼置忠義保捷軍取先世開寶天禧紀元豈忘中國者哉乃命平章布薩揆會兵於汴以備之六月詔內外諸軍密為行軍之計八月金罷河南宣撫使初布薩揆至汴移文來責敗盟三省樞密院答言邊臣生事已行貶黜所置兵亦已抽去揆信之會殿前副都指揮使郭倪濠州守將田俊邁誘虹縣民蘇貴等為間言於揆曰宋之增戍本虞他盜及聞行臺之建益畏讋不敢去備且兵皆白丁自裹糧糒窮蹙飢疾死者甚衆揆益弛備以其言白於金主璟時金羣臣皆勸先舉璟曰南北和好四十餘年民不知兵不可及聞揆言遂命罷宣撫司及新置兵丁亥命湖北安撫司增招神徑軍乙巳以郭倪為鎮江都統兼知揚州九月丁未韓托胄欲審敵虛實遣陳景俊使金賀正旦景俊還金主璟諭之曰大定初世宗許宋世為姪國朕遵守至今豈意爾國屢犯我邊以此遣大臣宣撫河南及得爾國公移朕即罷司而爾國侵擾益甚朕惟和好嵗久委曲含容恐姪宋皇帝或未詳知卿歸國當具言之景俊還以告陳自強戒勿言由是用兵益決以丘崈為江淮宣撫使崈辭不拜初韓托胄以北伐之議示崈崈曰中原淪陷且百年在我固不可一日而忘然兵凶戰危若首倡非常之舉兵交勝負未可知則首事之禍其誰任之必有誇誕貪進之人攘臂以僥幸萬一宜亟斥絶不然必誤國矣托胄不納至是命崈宣撫江淮崈手書力論金人未必有意敗盟中國當示大體宜申警軍實使吾常有勝勢若釁自彼作我有詞矣因力辭不拜托胄不悅十二月戊寅金使太常卿趙之傑來賀正旦入見韓托胄故使贊者犯金主父嫌名以挑之之傑遂倨慢托胄請帝還內著作郎朱質乞斬北使不報詔使人更以正旦朝見二年夏四月庚午追論秦檜主和誤國之罪削奪王爵改諡繆醜金聞皇甫斌分兵規取唐鄧復命布薩揆領行省於汴河南皆聽節制盡徴諸道籍兵分守要害命彰德守臣護韓琦墳凡宋宗族所居有司提控之鎮江都統制陳孝慶復泗州江州統制許進復新息縣光州忠義人孫成復褒信縣五月辛巳陳孝慶復虹縣丁亥韓托胄聞已得泗州及新息褒信頴上虹縣乃命直學士院李璧草詔下伐金詔略曰天道好還我國有必伸之理人心效順匹夫無不報之仇今兹金國猶託要盟朘生靈之資奉溪壑之欲此非出於得已彼乃謂之當然軍入塞而公肆創殘使來庭而敢為桀驁洎行李之繼遣復嫚詞之見加含垢納汚在人情而已極聲罪致討屬敵勢之將衰兵出有名師直為壯言乎逺言乎近孰無忠義之心為人子為人臣當念祖宗之憤初兵部侍郎葉適輪對嘗言甘弱而幸安者衰改弱而就強者興托胄聞而喜之以為直學士院欲藉其草詔以動中外而適以疾辭職乃改命璧云甲午郭倪遣郭倬李汝翼會兵攻宿州敗還至蘄金人追而圍之倬執馬軍司統制田俊邁以與金人乃得免時建康都統李爽攻夀州亦敗皇甫斌敗績於唐州時江州都統王大節攻蔡州亦不克而潰六月甲寅鄧友龍罷以丘崈為兩淮宣撫使韓托胄以師出無功罷友龍而以崈代之駐揚州崈至鎮部署諸將悉以三衙江上軍分守江淮要害托胄遣人來議招收潰卒且求自解之計崈謂宜明蘇師旦周筠等僨師之姦正李汝翼郭倬等喪師之罪崈欲全淮東兵力為兩淮聲援奏泗州孤立淮北所屯精兵幾二萬萬一金人南出清河口及犯天長等城則首尾中斷墮敵計矣莫若棄之還軍旴𣅿從之於是王大節李汝翼皇甫斌李爽等皆坐貶斬郭倬於鎮江秋七月韓托胄既喪師始覺為蘇師旦所誤召李璧飲酒酣語及師旦始謀事璧微摘其過以覘之因極言師旦怙勢招權使明公負謗非竄謫此人不足以謝天下托胄然之翌日罷師旦籍其家尋除名韶州安置八月丙子金布薩揆分兵為九道南下揆兵三萬出頴夀完顔匡兵二萬五千出唐鄧赫舍哩子仁兵三萬出渦口赫舍哩呼沙呼兵二萬出清河口完顔充兵一萬出陳倉富察貞兵一萬出成紀完顔綱兵一萬出臨潭石抹仲兵五千出鹽州完顔疄兵五千出來逺呼沙呼自清河口渡淮遂圍楚州十一月甲申以丘崈僉書樞密院事督視江淮軍馬金人攻淮南日急詔郭杲將兵駐真州以援之又以崈督視江淮軍馬或勸崈棄廬和州為守江計崈曰棄淮則與敵共長江之險吾當與淮南俱存亡乃益增兵防守金完顔匡陷光化棗陽江陵副都統魏友諒突圍奔襄陽招撫使趙淳焚樊城金人遂破信陽襄陽隨州進圍德安府金布薩揆引兵至淮遣人密測淮水惟八疊灘可涉即遣奧屯驤揚兵下蔡聲言欲渡守將何汝勵姚公佐以為誠然悉衆屯花靨以備之揆乃遣薩布等潛師渡八疊駐於南岸官軍不虞其至遂皆潰走自相蹂踐死者不可勝計揆遂奪頴口下安豐軍及霍江縣進圍和州屯於瓦梁河以控真揚諸州之衝乃整軍列騎張旗幟於沿江上下江表大震十二月金赫舍哩子仁陷滁州遂入真州州之士民奔逃渡江者十餘萬知鎮江府宇文紹節亟具舟以濟又廩食之自是淮西縣鎮皆沒於金時金布薩揆欲通和罷兵有韓元靚者自謂琦五世孫揆遣之渡淮丘崈獲之詰所以來之故元靚言兩國交兵北朝皆謂韓太師意今相州墳墓宗族皆不可保故來依太師耳崈使畢其説始露講解之意崈密使人護送北歸俾扣其實元靚既回崈得金行省文字以聞於朝韓托胄方以師出屢敗悔其前謀輸家財二十萬以助軍而諭崈募人持書幣赴敵營議和崈乃遣陳璧充小使持書於揆願講和息兵揆曰稱臣割地獻首禍之臣乃可崈復遣王文往言用兵乃蘇師旦鄧友龍皇甫斌所為非朝廷意且言今三人皆已貶黜揆曰托胄若無意用兵師旦等豈敢專擅文還崈復遣使相繼以往因許還其淮北流移人及今年嵗幣揆始許之自和州退屯下蔡獨濠州尚使一統軍守之以畢再遇權山東京東招撫司時諸將用兵皆敗惟再遇數有功金人常以水匱取勝再遇夜縛藁人數千衣以甲胄持旗幟戈矛儼列成行昧爽鳴鼓金人驚視亟放水匱後知其非兵也甚沮乃出兵攻之金人大敗又嘗引金人與戰且前且却至於數四視日已晚乃以香料煮豆布地上復前搏戰佯為敗走金人乘勝追逐馬飢聞豆香皆就食鞭之不前反攻之金人馬死者不可勝計又嘗與金人對壘度金兵至者日衆難與爭鋒一夕拔營去留旗幟於營并縛生羊置其前二足於鼓上擊鼓有聲金人不覺為空營復相持數日及覺欲追之則已遠矣三年春正月丁丑丘崈罷命張巖督視江淮軍馬時金已有和意崈上疏乞移書金帥以成和議且言金人既指韓托胄為首謀若移書宜暫免繫銜托胄大怒罷崈二月以知建康府葉適兼江淮制置使適上言三國孫氏嘗以江北守江自南唐以來始失之乞兼節制江北諸州詔從之時羽檄旁午而適治事如平時軍須皆從官給民以不擾其防守皆盡法度是月金布薩揆卒於下蔡揆有疾金主命左丞相完顔宗浩行省事於汴至是揆卒夏四月以方信孺為國信所參議官如金軍時韓托胄募可以報使金帥府者近臣薦信孺可使自蕭山丞召赴都命以使事信孺曰開釁自我金人設問首謀當以何詞答之托胄矍然信孺遂持張巖書以行九月貶方信孺官初信孺至濠州赫舍哩子仁止之於獄露刃環守絶其薪水要以五事信孺曰反俘歸幣可也縛送首謀自古無之稱藩割地則非臣子所敢言子仁怒曰若不望生還耶信孺曰吾將命出國門時已置死生度外矣子仁遣至汴見完顔宗浩出就傳舍宗浩遣將命者來堅持五説信孺辨對不少屈宗浩不能詰授以報書曰和與戰俟再至決之信孺還朝廷以林拱辰為通謝使與信孺持國書誓草及許通謝百萬緡信孺至汴宗浩怒信孺不曲折建白遽以誓書來有誅戮禁錮之語信孺不為動將命者曰此非犒軍可了别出事目以示之信孺曰嵗幣不可再增故代以通謝錢今得此求彼吾有隕首而已會蜀中遣師復大散關宗浩益疑之乃遣信孺還復書於張巖曰若能稱臣即以江淮之間取中為界欲世為子國即盡割大江為界且斬元謀姦臣函首以獻及添嵗幣五萬匹犒師銀一千萬兩方可議和好信孺還致其書韓托胄問之信孺言敵所欲者五事一割兩淮二增嵗幣三索歸正人四犒軍銀五不敢言托胄固問之信孺徐曰欲得太師頭耳托胄大怒奪信孺三官臨江軍居住信孺三使金師以口舌折強敵使彼計屈情見雖未即和然已有成説及貶欲再遣使顧在廷無可者近臣以王柟薦乃命柟假右司郎中持書北行柟王倫之孫也辛卯以趙淳為江淮制置使乙未張巖罷韓托胄怒金人欲罪首謀和議遂輟復鋭意用兵乃以淳鎮江淮而罷巖巖開督府九月費耗縣官錢三百七十萬緡而無寸功十一月乙亥禮部侍郎史彌遠奏自兵興以來蜀口漢淮之民死於兵戈者不可勝計公私之力大屈而韓托胄意猶未已中外憂懼因力陳危迫之勢請誅托胄皇后楊氏素怨托胄因使皇子榮王儼具疏言托胄再啓兵端將不利於社稷帝不答后從旁力贊之帝猶未許后請命其兄次山擇羣臣可任者與共圖之帝始諾次山遂語彌遠彌遠得密旨以錢象祖嘗諌用兵忤托胄乃先白象祖象祖許之以告李璧璧謂事緩恐泄乃命主管殿前司公事夏震統兵三百候托胄入朝至太廟前即呵止之擁至玉津園側殺之彌逺象祖以聞帝猶未信既乃知之遂下詔暴揚托胄罪惡於中外蓋其謀始於彌逺而成於楊后及后兄次山帝初無意也托胄既死錢象祖探懷中堂帖授陳自強曰有旨丞相罷政自強即上馬去丁丑貶自強永州居住己卯斬蘇師旦嘉定元年春正月戊寅右諫議大夫葉時請梟韓托胄首於兩淮不報三月癸酉復秦檜王爵贈諡己丑王柟自金軍還初柟至金請依靖康故事世為伯姪之國增嵗幣為三十萬犒軍錢三百萬貫蘇師旦等俟和議定後當函首以獻完顔匡具以柟言奏於金主璟璟命匡索韓托胄首以贖淮南地改犒軍錢為銀三百萬兩會錢象祖移書金帥府喻以誅韓托胄事柟未之知也一日匡問柟曰韓托胄貴顯幾年矣柟曰已十餘年平章國事才二年爾匡曰南朝欲去此人可乎柟曰主上英斷去之何難匡顧之而笑和議始決因遣柟還索托胄首詔百官集議倪思謂有傷國體吏部尚書樓鑰曰和議重事待此而決姦宄已斃之首又何足惜遂命臨安府斫棺取首梟之兩淮仍諭諸路以函首畀金之事遂以托胄及蘇師旦首付王柟送金師以易淮陜侵地六月王柟以韓托胄蘇師旦首至金金主璟御應天門備黃麾立仗受之百官上表稱賀懸二首并畫像於通衢令百姓縱觀然後漆其首藏於軍器庫遂命完顔匡等罷兵更元帥府為樞密院遣使來歸大散關及濠州八月置安邊所凡韓托胄與其他權幸沒入之田及圍田湖田之在官者皆𨽻焉凡所輸錢租籍以給行人金繒之費逮後與北方絶好軍需邊用每於此取之九月辛丑金遣完顔侃喬宇來詔以金國和議成諭天下吳曦之叛光宗紹熙三年夏四月以丘崈為四川安撫制置使初留正帥蜀慮吳氏世將謀去之不果至是議更蜀帥正言西邊三將惟吳氏世襲兵柄號為吳家軍不知有朝廷遂以户部侍郎丘崈往崈陛辭奏曰臣入蜀後吳挺脫至死亡兵權不可復付其子臣請得以便宜撫定諸軍許之四年五月利州安撫使吳挺卒丘崈使總領財賦楊輔權安撫使統制官李世廣權總其軍知樞密院趙汝愚亦言吳氏世掌西兵非國家之利宜别置帥遂以興州都統制代挺以挺子曦帶御器械寧宗嘉泰元年秋七月以吳曦為興州都統制曦時為殿前副都指揮使鬱鬱不得志乃以賄賂宰輔規求還蜀陳自強為言於韓托胄托胄許之遂有是命曦至興州因譛副統制王大節罷其官由是兵權悉歸於曦異志遂成矣開禧二年三月以程松為四川宣撫使吳曦副之松移司興元東以軍三萬屬之曦進屯河池西以軍六萬屬之仍聽節制財賦按劾計司曦由是益得自專松無所關預松始至欲以執政禮見曦責庭參曦聞之及境而還松用東西軍一千八百自衛曦抽摘以去松不悟尋詔曦兼陜西河東招撫使知大安軍安丙陳十可憂於松既而松開府漢中夜延丙議丙為松言曦必誤國松亦不省夏四月丁丑吳曦叛曦既得志與其從弟晛及徐景望趙富米修之董鎮共為反謀隂遣其客姚淮源獻關外階成和鳯四州於金求封蜀王十二月吳曦既遣姚淮源如金因持重按兵河池韓托胄日夜望其進兵使者相繼曦恐謀泄乃遣兵度秦隴與金人戰以堅托胄之心金人聞曦叛求封大喜與曦詔曰卿家專制蜀漢積有嵗年猜嫌既萌進退維谷且卿自視翼贊之功孰與嶽飛飛之威名戰功暴於南北一朝見忌遂被誅夷之慘可不畏哉智者順時而動明者因機而決今大軍臨江若能按兵閉境不為異同使我師東下無西顧憂則全蜀之地卿所素有當加封册一依康王故事更能順流東下助為犄角則旌麾所指盡以相付因命完顔綱經略之綱進兵水洛訪得曦族人吳端署為水洛城巡檢使遣人報曦曦得報心喜以程松在興元未敢發詐稱杖殺端而隂遣使送欵於綱及金將蒲察貞破和尚原犯西和州曦將王喜等方力戰曦忽傳令退保黑谷軍遂潰貞入成州曦因焚河池退保青野原金人無復顧慮時興州都統制母思以重兵守關吳曦聞金兵至因撤驀關之戍金人由扳閘谷繞出關後思孤軍不能支遂陷曦退屯罝口完顔綱遣張仔會之且索曦告身為信曦盡出以付仔綱乃以金主璟命遣馬良顯持詔書金印立曦為蜀王曦密受之遂還興州是夜天赤如血光燭地如晝翌日曦召幕屬諭意謂東南失守車駕幸四明今宜從權濟事王翼楊騤之抗言曰如此則相公忠孝八十年門户一朝掃地矣曦曰吾意已決即遣任辛奉表獻蜀地圖及吳氏譜牒於金金完顔抄合攻鳯州程松猶未知吳曦之叛遣人求援於曦曦紿言當得三千騎往松信不疑及曦受金詔宣言金使者欲得階成和鳯四州以和馳書諷松使去松不知所為會報金兵至百姓奔走相蹂躪松亟趨米倉山而遁自閬州順流至重慶以書抵曦丐贐稱曦為蜀王曦以匣封致餽松望見大恐疑為劒亟逃奔使者追豫之乃金寶也松受而兼程出陜西向掩淚曰吾今始獲保頭顱矣三年春正月辛卯吳曦自稱蜀王遣將利吉引金兵入鳯州以四郡付之表鐵山為界曦即興州為行宫改元置百官遣董鎮至成都治宫殿欲徙居之議改章服之制奉表稱臣於金分其所統兵十萬為統帥遣祿祁等戍萬州泛舟下嘉陵江聲言約金人夾攻襄陽下黃榜於成都潼川利州夔州四路以興州為興德府召隨軍轉運使安丙為丞相長史權行都省事先是從事郎錢鞏之從曦在河池嘗夢曦禱神祠以銀杯為珓擲之神起立謂曦曰公何疑公何疑後政事已分付安子文矣曦未省神又曰安子文有才足能辦此鞏之覺心異其事具以語曦曦遂召丙用事又召權大安軍楊震仲震仲不屈飲藥而死吳晛為曦謀宜收用蜀名士以保民心於是陳咸自髠其髮史次秦自瞽其目李道傳鄧性甫楊泰之悉棄官去二月己未以楊輔為四川制置使吳曦逐之初輔知成都嘗言吳曦必反帝意輔能誅曦乃密詔授輔制置使許以便宜從事青城山道人安世通獻書於輔曰世通在山中忽聞關外之變不覺大慟世通雖方外人而大人先生亦嘗發以入道之門竊以為公初得曦檄即當還書誦其家世激以忠義聚官屬軍民素服號慟因而散金發粟鼓集忠義明檄劒門夔梓興仗義之師以順討逆誰不願從而士大夫皆酒缸飯囊不明大義尚云少屈以保生靈何其不知輕重如此夫君乃父也民乃子也豈有棄父而救子之理此非曦一人之叛乃舉蜀士大夫之叛也聞古有叛民無叛官今曦叛而士大夫皆縮手以聽命是驅民而為叛也且曦叛雖逆猶有所忌未敢建正朔士大夫尚以虛文見招亦以公論之與否卜民之從違也今悠悠不決徒為婦人女子之悲所謂停囚長智吾恐朝廷之失望也凡舉大事者成敗死生皆當付之度外區區行年五十二矣古人言可以生而生福也可以死而死亦福也決不忍汙面戴天同為叛民也輔有重名蜀中士大夫多勸以舉義者而世通之言尤切輔自以不習兵事且內郡無兵可用遷延不發曦移輔知遂寧府輔遂以印授通判韓植棄成都而去乙亥監興州合江倉楊巨源謀討吳曦乃隂與曦將張林朱邦寧及忠義士朱福等深相結眉州人程夢錫知之以告轉運使安丙丙時稱疾未視事乃屬夢錫以書致巨源延之卧所巨源曰先生而為逆賊丞相長史邪丙號哭曰目前兵將我所知不能奮起必得豪傑乃滅此賊巨源曰非先生不足以主此事非巨源不足以了此事會興州中軍正將李好義亦結軍士李貴進士楊君玉李坤辰李彪等數十人謀誅曦好義曰此事誓死報國救西蜀生靈但曦死後若無威望者鎮撫恐一變未息一變復生欲奉安丙主事使坤辰來邀巨源與會巨源往與約還報丙丙始出視事君玉與白子申共草密詔略曰惟干戈省厥躬既昧聖賢之戒雖犬馬識其主乃甘仇敵之臣邦有常刑罪在不赦乙亥未明好義帥其徒七十四人入偽宫時偽宫門洞開好義大呼而入曰奉朝廷密詔以安長史為宣撫令我誅反賊敢抗者夷其族曦兵千餘聞有詔皆棄挺而走巨源持詔乘馬自稱奉使入户內曦啓户欲逸李貴即前執之刃中曦頰曦反撲貴仆於地好義急呼王換斧其腰曦始縱貴貴遂斫其首馳告丙宣詔軍民拜舞聲動天地持曦首撫定城中市不易肆盡收曦黨殺之衆推丙權四川宣撫使巨源權參贊軍事丙陳曦所以反及矯制平賊便宜賞功狀上疏自劾待罪函曦首及違制法物與曦所受金人詔印送朝廷曦僭立凡四十一日金遣珠赫髙琪奉册於曦未至而曦已誅矣先是韓托胄聞曦反大懼與曦書許以茅土之封且召知鎮江府宇文紹節問計紹節云安丙似非附逆者或能討賊托胄乃密以帛書諭丙云若能圖曦報國以明本心即當不次推賞書未逹而誅曦露布已聞朝廷大喜曦首至臨安獻於廟社梟之市三日詔誅曦妻子家屬徙嶺南奪曦父挺官爵遷曦祖璘子孫出蜀存璘廟祀玠子孫免連坐初曦未叛時嘗校獵塞上一日夜歸笳鼓競奏轔載雜襲曦方垂鞭四視時盛秋天宇澄霽仰見月中有一人騎而垂鞭與己惟肖問左右所見皆符殊以為駭默自念曰我當貴月中人其我也揚鞭而揖之其人亦揚鞭乃大喜異謀由是而決蓋其妄心一萌遂奪其魄舉目形似已兆覆亡之禍矣三月丁丑斬偽四川都轉運使徐景望於利州庚子以楊輔為四川宣撫使安丙副之許奕為宣諭使壬寅連貶程松澧州安置楊巨源李好義謂安丙曰曦死敵破膽矣關外西和成階鳯四州為蜀要害盍乘勢復取之不然必為後患丙從之於是分遣好義復西和州張林李簡復成州劉昌國復和州張翼復鳯州孫忠鋭復大散關好義進兵次於獨頭嶺會忠義及民兵夾擊金人死者蔽路七日至西和人人樂死前無留敵金將完顔欽遁去好義整衆而入軍民歡呼迎拜好義籍府庫以歸於官欲乘勝徑取秦隴以牽制淮冦宣撫司楊輔安丙不許士氣皆沮孫忠鋭因而失守散關丙素惡忠鋭檄其還欲廢之先命楊巨源偕朱邦寧以沔兵二千䇿應巨源至鳯州因忠鋭出迎伏壯士於幕後突出殺之并其子揆丙遂以忠鋭附偽表聞於朝丁卯楊輔還以吳獵為四川制置使時朝廷察安丙與輔異召輔赴闕著作佐郎楊簡言輔嘗棄成都不當召遂命輔知建康李好義以中軍統制知西和州吳曦故將王喜遣其死黨劉昌國聽節制好義與之酬酢歡飲達旦好義心腹暴痛死而昌國遁矣既殮口鼻爪指皆青黑居民莫不寃之號慟如私親朝廷慮喜為變授節度使移荆鄂都統制既而昌國白日見好義持刃刺之驚怖仆地疽發而死六月安丙殺楊巨源初吳曦之誅實楊巨源李好義為首倡功最大既安丙以討賊事聞於朝詐言以巨源好義為首實則獨後二人及奬諭詔書至沔州巨源曰詔命一字不及巨源疑有蔽其功者俄報王喜授節度使而巨源僅與通判心益不平乃為啓以謝丙曰飛矢以下聊城深慕魯仲連之髙節解印而去彭澤庶幾陶靖節之清風既又訴功於朝或謂安丙曰巨源謀亂丙令王喜鞫其黨皆抵罪時巨源方與金人戰于鳯州之長橋樞密使興元都統制彭賂械巨源收送閬州獄至大安龍尾灘丙使將校樊世顯拔刀取其頭不絶者踰寸遂以巨源自殪聞忠義之士莫不扼腕流涕劒外士人張伯威為文以吊其詞尤悲切丙以人情洶洶上章求免楊輔亦謂丙殺巨源必召變請以劉甲代之嘉定二年八月以安丙為四川制置大使罷宣撫司宋史紀事本末卷二十二
