body:
  text: 宋史紀事本末卷二十六明馮琦原編陳邦瞻増輯䝉古諸帝之立太宗憲宗定宗世祖理宗寶慶三年十二月䝉古主特穆津卒于六盤山在位二十六年廟號太祖凡六子長曰卓沁性卞急而善戰早死二曰察罕台三曰諤格徳依四曰圖類至是圖類監國紹定二年八月䝉古主諤格徳依立諤格徳依聞太祖之䘮自和博果地来㑹耶律楚材以遺詔召諸王畢至請立諤格徳依時圖類監國諸王意猶豫未决楚材言于監國曰此社稷大計若不早定恐生他變監國乃與諸王奉諤格徳依即位於和琳東奎騰阿喇勒之地時庻務草創禮儀簡率楚材始定冊立禮俾皇族諸王尊長皆就班列以拜又中原新定未有號令長吏皆得自専生殺稍有忤意者刀鋸隨之至有全家被禍者楚材以為言命禁絶之淳祐元年十一月䝉古主諤格徳依卒廟號太宗諤格徳依性嗜酒晚年尤甚耶律楚材數諫不聽乃持酒槽鐵口以獻曰此鐵為酒所蝕尚致如此况人之五臟耶䝉古主乃少減是年二月疾篤脉絶第六皇后鼐瑪錦氏不知所為召楚材問之楚材對曰今任使非人賣官鬻獄囚繫非辜者多宜赦天下后亟欲行之楚材曰非君命不可頃之䝉古主少蘇后以為言乃首肯之赦發而脉復生至十一月疾愈楚材以六一數推之不宜田獵左右皆曰不騎射何以為樂出田五日至諤特古呼蘭温都爾哈瑪爾進酒歡飲極夜乃罷翊日卒諤格徳依量時度力舉無過事華夏庻富羊馬成羣時稱治平初䝉古主有旨以孫實勒們為嗣實勒們䝉古主第四子庫春之子也至是后召楚材問之楚材曰此非外姓臣所敢知自有先帝遺詔幸遵行之后不從遂稱制於和林三年三月䝉古中書令耶律楚材以憂卒時䝉古后鼐瑪錦氏稱制温都爾哈瑪爾專政用事權傾中外后至以御寳空紙使自書塡楚材曰天下者先帝之天下朝廷自有憲章今欲紊之臣不敢奉詔又有旨凡温都爾哈瑪爾所建白令史不為書者斷其手楚材曰國之典故先帝悉委老臣令史何與焉事若合理自當奉行如不可行死且不避况㫁手乎后不悅楚材憤悒成疾而卒或譛之曰楚材為相二十年天下貢賦半入其家后命近臣覆視之惟琴阮十餘古今書畫金石遺文數千卷楚材為相正色立朝不為勢屈每陳國家利病生民休戚辭色懇切太宗嘗曰汝又欲為百姓哭耶楚材每言興一利不若除一害生一事不若減一事人以為名言宋子貞曰元承大亂之後天綱人理幾乎冺絶加以南北之政每每相戾出入用事之臣又皆諸畨降附言語不通趨向不同楚材以一書生孤立其間欲行其所學可謂難矣然見於設施者十不二三向使無楚材人類不知其何如耳時䝉古諸王圖類第四子呼必賚思大有為於天下延藩府舊臣及四方文學之士問以治道初邢臺人劉秉忠英爽不羈年十七為邢臺節度使府令史以養其親居常鬰鬱不樂一日投筆歎曰吾家累世衣冠乃汨沒為刀筆吏乎丈夫不遇於世當隠居以求志耳即棄去隱武安山中久之為僧往來雲中會呼必賚召他僧遂邀秉忠俱行既入見應對稱旨秉忠於書無所不讀尤邃於天文律厯三式六壬遁甲之屬論天下事如指諸掌呼必賚大愛之秉忠復薦張文謙召為掌書記六年秋七月䝉古主庫裕克立庫裕克太宗長子母六皇后臨朝四年至是會諸王百官議立古裕乃即位於昻吉蘇黙托里之地朝政猶出於后八年三月䝉古主庫裕克卒於杭錫雅爾之地廟號定宗時國内大旱河水盡涸野草自焚牛馬死者十八九人不聊生諸王及各部又遣使於諸郡徵求貨財或於西域囘鶻索取珠璣或於海東取鷹鶻驛騎絡繹晝夜不絶民力益困皇后烏拉海額實乃抱庫春子實勒們聽政諸王大臣多不服十一年六月䝉古主孟克立初定宗卒久未立君中外洶洶至是諸王穆格及大將烏蘭哈達等咸會議所立時定宗后所遣使者在坐曰昔太宗命以皇孫實勒們為嗣諸王百官皆與聞之今實勒們固在而議欲他屬將置之何地耶烏蘭哈達等不聽共推孟克即位於奎騰阿拉克之地追尊其考圖類為帝廟號睿宗實勒們及諸弟心不能平孟克因察諸王有異同者並羈縻之取主謀者誅之遂頒便宜事於國中罷不急之役凡諸王大臣濫發牌印詔旨宣命盡收之政始歸一秋七月䝉古主命其弟呼必賚總治漢南詔凡軍民在漢南者聽呼必賚總之遂開府於金蓮川時姚樞隐居蘇門呼必賚遣趙璧召之樞至待以賓禮樞乃為書數千言上之首陳帝王之道次及救時之務為條三十呼必賚奇其才動必召問樞因言於呼必賚曰今土地人民財賦皆在漢地王若盡有之則天子何為後必有間之者矣不若但持兵權凡事付之有司則勢順理安呼必賚從之樞又說呼必賚置經畧司於汴分兵屯田西起㐮鄧東連清口桃源皆列障守之十二年二月䝉古主以諸王嘗欲立實勒們乃徙太宗后於奎騰所居地之西分遷諸王於各邊定宗后及實勒們母以厭勝並賜死禁錮實勒們於摩多齊之地六月䝉古主以中州封同姓命弟呼必賚於汴京關中自擇其一姚樞曰南京河徙無常土薄水淺瀉鹵生之不若闗中厥田上上古名天府陸海呼必賚遂請於䝉古主䝉古主曰闗中户寡河南懷孟地狹民夥可取自益由是盡有闗中河南之地呼必賚與姚樞夜燕樞因陳宋太祖遣曹彬取南唐不殺一人市不易肆事呼必賚大喜曰吾能為之樞賀曰王能如此生民之幸有國之福也開慶元年秋七月䝉古主孟克卒於合州城下孟克沉斷寡言不樂飲燕自謂遵祖宗之法然性喜畋獵信巫覡卜筮之術凡行事必叩之殆無虚日廟號憲宗景定元年三月丁夘䝉古主呼必賚立初呼必賚自南伐北還廉希憲聞額哷布格命劉太平及大將和囉海行尚書省事於闗右恐結諸將以動秦蜀請遣趙良弼往覘之良弼具得實還報時諸王格辰穆格塔齊爾俱會於開平錫哩亦自西域遣使勸進惟額哷布格不至希憲等力言先發制人後發人制逆順安危間不容髮宜早定大計呼必賚三譲諸王大臣固請遂即位詔曰朕惟祖宗肇造區宇奄有四方武功迭興文治多缺五十餘年於此矣盖時有先後事有緩急天下大業非一聖一朝所能兼備也先皇帝即位之初風飛雷厲將大有為憂國愛民之心雖切於己尊賢使能之道未得其人方董䕫門之師遽遺鼎湖之泣豈期遺恨竟勿克終肆予冲人渡江之後盖將深入焉乃聞國中重以僉軍之擾黎民驚駭若不能一朝居者予為此懼驛騎馳歸目前之急雖紓境外之兵未戢乃會羣議以輯良規不意宗盟輒先推戴左右萬里名王巨臣不召而至不謀而同咸謂國家之大統不可久曠神人之重寄不可暫虚求之今日太祖嫡孫之中先皇母弟之列以賢以長止予一人雖在征伐之間每存仁愛之念博施濟衆實可為天下主天道助順人謀予能祖訓傳國大典於是乎在孰敢不從朕峻辭固譲至於再三祈懇益堅誓以死請於是俯狥輿情勉登大寳自惟寡昧屬時多艱若涉淵氷罔知攸濟爰當臨御之始宜新𢎞逺之規祖述變通正在今日務施實徳不尚虚文雖承平未易遽臻而饑渴所當先務嗚呼厯數攸歸欽應上天之命勲親斯托敢忘烈祖之規體極建元與民更始朕所不逮更賴我逺近宗族中外文武同心協力獻可替否之助誕告多方體予至意夏四月䝉古額哷布格聞呼必賚即位命阿勒達爾發兵於漠北諸部分遣腹心易置將佐散金帛賚士卒又命劉太平和囉海拘收闗中錢榖時琿塔噶自先朝將兵屯六盤太平等陰相結納琿塔噶復分遣人約成都密喇卜和卓竒爾岱布哈同舉事額哷布格遂自稱帝於和琳五月䝉古劉太平和囉海聞廉希憲將至乘傳急入京兆謀為變秦人前被阿勒達爾太平等威虐聞其來皆破膽越二日希憲亦至宣示詔旨遣人馳往六盤宣諭安撫未幾城門候引一急使去至云來自六盤希憲訊之盡得太平與琿塔噶宻喇卜和卓竒爾岱布哈要結狀希憲集僚佐謂曰主上命我輩正為今日遂分遣人掩捕太平和囉海仍遣劉里瑪誅密喇卜和卓於成都汪惟正誅竒爾岱布哈于沁結又命總帥汪良臣帥秦鞏諸軍進討琿塔噶良臣以未得旨為辭希憲即解所佩虎符銀印授之曰此皆身承密旨君但辦吾事制符已飛奏矣良臣遂行又摘蜀卒四千命䝉古將巴沁帥之為良臣聲援會有詔赦至希憲命殺太平等於獄尸於通衢方出迎詔琿塔噶知京兆有備西渡河趨甘州阿勒達爾自和琳帥兵適至遂與琿塔噶合軍而南時諸王哈坦亦率騎兵與巴沁汪良臣合兵分三道以拒之既陣大風吹沙良臣令軍士下馬以短兵突其左繞出陣後潰其右而出巴沁直擣其前哈坦勒精騎邀其歸路大戰於甘州東殺琿塔噶阿勒達爾闗隴悉平希憲乃遣使自劾停赦行刑徵調諸軍擅以良臣為帥諸罪䝉古主曰委卿方面之寄正欲從宜拘常制豈不坐失事機詔賜希憲金虎符進平章政事行省秦蜀商挺㕘知省事二年冬十月䝉古主呼必賚以額哷布格違命自將討之與戰於實黙圖之地諸王哈坦等殺其兵三千人塔齊爾分道奮撃大破之追北五十里呼必賚率諸軍躡其後合三路蹙之其部將多降額哷布格北遁呼必賚引還五年秋七月䝉古額哷布格自實黙圖之敗不復能軍至是與諸王玉隆達實阿蘇岱錫里濟及其謀臣布爾哈阿里綽哈果斯等自歸於上都䝉古主以諸王皆太祖之裔並釋不問其謀臣布爾哈等伏誅䝉古立國之制寧宗嘉定十五年五月䝉古主特穆津會諸將於扣肯寨以西域漸定始置達嚕噶齊於各城監治之達嚕噶齊猶華言掌印官也理宗紹定二年十二月䝉古始定算賦中原以户西域以丁䝉古以牛羊三年二月䝉古立十路課稅所初䝉古太祖征西域倉庫無斗粟尺帛之儲於是羣臣咸言雖得漢人亦無所用不若盡殺之使草木暢茂以為牧地耶律楚材曰夫以天下之廣四海之富何求而不得但弗為耳誠均定中原地稅商稅酒醋鹽鐵山澤之利周嵗可得銀五十萬兩絹八萬疋粟四十餘萬石何為無用哉太祖曰誠如卿言則國用有餘矣卿試為之至是楚材奏十路課稅所設使副二員悉用士人如陳時可趙昉劉中等皆在選中楚材因間進說周孔之教且謂天下雖得之馬上不可以馬上治䝉古主深然之由是文臣漸進用矣四年八月䝉古主以耶律楚材為中書令楚材奏請諸路州縣長吏專理民事萬户府專總軍政課稅所專掌錢榖各不相統攝著為令又舉鎮海鈕赫與之同事權貴不得志燕京路長官實黙威達布激怒宗室烏哲使奏楚材用南朝舊人恐有異志不宜重用因誣構百端必欲寘於死地鎮海鈕赫重山等懼譲楚材曰何為强更張必有今日事楚材曰立朝廷以來每事皆我自為諸公何與焉若果獲罪我自當之䝉古主察烏哲之誣逐其使者已而威達布為人所訴䝉古主命楚材鞫治楚材曰此人倨傲故易招謗今方有事南方他日治之未晚也䝉古主私謂近侍曰楚材不校舊惡真長者汝輩當效之䝉古主至雲中諸路所貢課額銀幣及倉廩物料文簿具陳於前悉符楚材元奏之數笑曰卿何使錢幣流入如此即日授以中書省印俾領其事事無大小悉以委之端平三年夏四月䝉古初括中原民戸定賦稅初䝉古唯事進取所降之户因以與將士自一社之民各有所主不相統攝至是詔括户口以大臣呼圖克領之民始𨽻州縣時羣臣共欲以丁為户耶律楚材以為不可衆皆曰我朝及西域諸國莫不以丁為户豈可捨大朝之法而從亡國之政邪楚材曰自古有中原者未嘗以丁為户若果行之可輸一年之賦隨即逃散矣䝉古主從楚材之議及呼圖克以所括户一百四萬上䝉古主議割裂諸州郡分賜諸王貴族為湯沐邑楚材奏曰尾大不掉易以生隙不如多與金帛足以為恩䝉古主曰業已許之矣楚材曰若置官吏必自朝命除恒賦外不令擅自徴斂差可久也䝉古主從之楚材又定賦稅每二户出絲一斤以供官用五户出絲一斤以與受賜貴戚功臣之家上田每畆稅三升半中田三升下田二升半水田畆五升商稅三十分之一鹽每銀一兩四十斤已上以為永額朝臣皆謂太輕楚材曰將來必有以利進者則已為重矣嘉熈元年二月䝉古始給官府符印定驛令初諸路官府自為符印僣越無度耶律楚材請中書省依式鑄給名器實重時諸王貴戚皆得自起驛馬道路騷擾所至需索百端楚材復請給牌劄定分例其弊始革八月䝉古耶律楚材奏制器者必用良工守成者必用儒臣儒臣之事業非積數十年殆未易成䝉古主曰果爾可官其人乃命稅課使劉中楊奐隨郡考試以經義詞賦論分為三科儒人被俘為奴者亦令就試其主匿弗遣者死得士凡四千三十人免為奴者四之一楚材又請立衡量立鈔法定均輸庻政畧備民稍蘇息三年十二月䝉古以温都爾哈瑪爾提領諸路課稅初耶律楚材定課稅銀額每歲五十萬兩及河南降户口滋息増至一百一十萬兩至是回回温都爾哈瑪爾請以二百二十萬樸買之楚材持不可曰雖取五百萬亦可得不過嚴設法禁陰奪民利耳反復争論聲色俱厲䝉古主曰爾欲摶鬭耶楚材力不能奪乃太息曰民之困窮將自此始矣景定元年夏四月䝉古初定官制䝉古自特穆津以來諸事草創設官甚簡以㫁事官為至重之任位三公上丞相謂之大筆且齊掌兵柄則左右萬户而已後稍倣金制置行省及元帥宣撫等官至是䝉古主呼必賚大新制作遂命劉秉忠許衡酌古今之宜定内外官制其總政務者曰中書省秉兵權者曰樞密院司黜陟者曰御史臺其次内則有寺監院司衛府外則有行省行臺宣慰廉訪其牧民則有路府州縣官有常職位有常員食有常祿其長則䝉古人為之而漢人南人貳焉於是故老舊臣山林遺逸之士咸見録用一代之制始備秋七月䝉古行交鈔法王文綂立十宣撫司示以條格欲差發辦而民不擾課不失常額交鈔無致阻滯遂行中書省造中綂元寳交鈔立互市於潁川漣水光化軍交鈔法自十文至二貫文凡十等不限年月諸路通行賦稅並聽收受仍嚴私鹽酒禁二年夏四月䝉古主命宣撫司官勸農桑抑游惰禮髙年問民疾苦舉文學才識可以從政及茂才異等列名上聞擢用其職官汚濫及民不孝弟者量輕重議罰秋七月䝉古初立翰林國史院十二月䝉古初立宫殿府秩正四品專職營繕立尚食局尚藥局四年三月䝉古始建太廟䝉古國俗祭享之禮割牲奠馬潼以巫祝致辭䝉古主初立始設位於中書省用登歌樂命製祭器法服至是建太廟於燕京定烈祖太祖太宗卓沁察罕台睿宗定宗憲宗為八室又命僧薦佛事七晝夜嵗以為常度宗咸淳元年春正月䝉古併六部為四吏禮為一部兵刑為一部户工仍各為一部二年春正月䝉古立制國用使三年三月䝉古安圖言今丞相五人素無此例臣等擬議設二丞相䝉古漢人㕘用從之夏四月䝉古敕上都重建孔子廟五年二月䝉古行新字詔曰國家肇基朔方制用文字皆取漢楷及輝和爾字以達本朝之言考諸遼金及遐方諸國例各有字今文治寖興字書方缺特命國師帕克斯巴創䝉古新字頒行諸路譯冩一切文字期於順言達事而已字凡千餘大要以諧聲為宗六年春正月䝉古主命許衡與太常卿徐世隆定朝儀衡與劉秉忠張文謙定官制又詔尚文與諸儒採唐開元禮及近代禮儀之可行於今者斟酌損益凡文武儀仗服色差等皆令掌之七年十一月䝉古改國號曰大元詔曰誕膺景命奄四海以宅尊必有美名紹百王而紀統肇從隆古匪獨我家且唐之為言蕩也堯以之而著稱虞之為言樂也舜因之而作號馴至禹興而湯造互名夏大以殷中世降以還事殊非古雖乘時而有國不以義而制稱為秦為漢者但從初起之地名曰隋曰唐者僅即所封之爵邑是皆徇百姓見聞之狃習要一時經制之權宜槩以至公不無少貶我太祖握乾符而起朔土以神武而膺帝圖肆振天聲大恢土宇輿圖之廣歴古所無頃者耆宿詣庭奏章申請謂既成於大業宜早定於鴻名在古制以當然於朕心乎何有可建國號曰大元盖取易經乾元之義兹大治流形於庻品孰名資始之功予一人底寜於萬邦尤切體仁之要事從因革道協天人嘉與敷天共隆大號北方諸儒之學理宗嘉熈二年冬十月䝉古姚樞建太極書院於燕京初䝉古破許州得金軍資庫使姚樞時北庭無漢人士大夫太祖見之甚喜特加重焉及奎騰南侵俾樞從楊惟中即軍中求儒釋道醫卜之人樞招致稍衆及㧞徳安得趙復復以儒學見重於世其徒稱為江漢先生既被獲不欲北行力求死所樞止與共宿譬說百端曰徒死無益隨吾而北可保無他也復從之樞於是獲覩周程性理之書至是惟中與樞謀建太極書院及周子祠以二程張楊游朱六子配食請趙復為師選俊秀有識度者為道學生由是河朔始知道學淳祐二年夏四月䝉古姚樞辭官隠輝縣之蘇門山作家廟别為室奉孔子及宋儒周程張邵司馬六君子像刻小學四書併諸經傳註行於國中寶祐三年二月䝉古呼必賚徵許衡為京兆提學衡懷慶河内人㓜有異質七歲入學授章句問其師曰讀書何為師曰取科第耳曰如此而已乎師大奇之謂衡父曰兒頴悟非常他日必有過人者吾非其師也遂辭去稍長嗜學如飢渴然遭世亂且貧無書嘗從日者家得書疏義避亂徂徠山得易王弼說夜思晝誦身體而力踐之動必揆諸義而後發嘗暑中過河陽渴甚道有梨衆争取啖之衡獨危坐樹下自若或問之曰非其有而取之不可也人曰世亂此無主曰梨無主我心獨無主乎既而往來河洛間從栁城姚樞得程朱氏書益大有得尋居蘇門與樞及竇黙相講習慨然以道自任嘗語人曰綱常不可一日亡於天下茍在上者無以任之則在下之任也凡喪祭嫁娶必徴於禮以倡其鄉人學者寖盛衡嘗語之曰進學之序必當棄前日章句之習從事於小學因悉取向來簡帙焚之使無大小皆自小學入是時秦人新脫於兵欲學無師聞衡來人人莫不喜幸於是郡縣皆建學民大化之景定元年夏四月䝉古主召竇黙許衡至開平黙肥鄉人金末避亂轉徙隠於大名與姚樞許衡相講習至忘寢食䝉古主在潜邸嘗召之黙變姓名以自晦使者俾其友人往見之微服踵其後黙不得已乃拜命既至問以治道默首以綱常為對且曰失此則無以自立於世矣又言帝王之道在誠意正心心既正則朝廷逺近莫敢不一於正䝉古主敬待加禮久之南還至是復與衡同召二年五月䝉古以姚樞為太子太師竇黙為太子太傅許衡為太子太保皆辭不拜時平章政事王文綂以言利進為平章政事衡樞輩入侍言治亂休戚必以義為本文綂患之竇默復於䝉古主前力言文綂學術不正必禍天下䝉古主曰然則誰可相者默曰以臣觀之無如許衡䝉古主不悅而罷文統疑衡與默為表裏乃奏授樞等東宫三師陽為尊用之實不使數侍䝉古主也默以屢攻文綂不中欲因東宫以避禍與樞拜命將入謝衡曰此不安於義也且禮師傅與太子位東西向師傅坐太子乃坐公等度能復此乎不能則師道自我廢也因相與懷制言太子未立豈宜虚設官稱乃改授樞大司農默仍侍講學士衡國子祭酒未幾衡稱疾還懷孟度宗咸淳七年六月元主復召許衡拜集賢大學士兼國子祭酒即燕京南城舊樞密院設學衡聞命喜曰此吾事也因請徵其弟子王梓耶律有尚姚燧等十二人為齋長時所選弟子皆幼穉衡待之如成人愛之如子出入進退其嚴如君臣其為教因覺以明善因善以開蔽相其動息以為張弛課誦少暇即習禮或習書算少者則令習拜跪揖譲進退應對或射或投壺負者罰讀書若干遍久之諸生人人自得尊師敬業下至童子亦知三綱五常之道九年秋七月元許衡請還懷孟元主以問翰林學士王磐磐對曰衡教人有法諸生行可從政此國之大事宜勿聽其去元主復命諸大臣議其去留竇默為衡懇請乃聽衡還劉秉忠姚樞及磐默等復請以賛善王恂攝學事衡弟子耶律有尚蘇郁白棟為助教庻幾衡之規矩不至廢墜從之䝉古南侵理宗寶祐四年八月䝉古諸王伊遜克駙馬阿薩爾等請伐宋䝉古主命諸王額哷布格居守和琳阿勒達爾輔之自將南侵由西蜀以入先命張柔從呼必賚攻鄂趨杭州塔齊爾攻荆山又詔烏蘭哈達自交廣引兵會鄂李全子璮進攻海州漣水軍等處䝉古主進次六盤軍四萬號十萬分三道而入䝉古主由隴州趨散關諸王穆格由洋州趨米倉萬戸巴哩義由潼關趨沔州六年二月䝉古納琳將前軍欲會都元帥阿都呼於成都蒲擇之遣安撫劉整等據遂寧江箭灘渡以㫁東路納琳軍至不能渡自旦至暮大戰整等軍敗納琳遂長驅至成都擇之命楊大淵等守劍門及靈泉山自將兵救成都會阿都呼死納琳率諸將大破大淵等於靈泉山進圍雲頂山城擇之軍潰城中食盡殺主將以降成都彭漢懐綿等州威茂諸蕃悉降䝉古冬十月䝉古主渡江陵江至白水命總帥汪徳正造浮梁以濟進次劔門至苦竹隘守將張實死之十一月䝉古兵進圍長寧山守將王佐徐昕戰敗䝉古進攻鵞頂堡城降佐死之由是青居大良運山石泉龍州俱降於䝉古十二月䝉古兵渡馬湖入蜀詔馬光祖移師峽州向士璧移師紹慶府以便䇿應光祖士璧以兵迎䝉古師戰於房州敗之䝉古主取隆雅州又取閬州楊仲淵以城降開慶元年春正月己酉䝉古兵攻忠涪州漸薄䕫境詔蒲擇之馬光祖戰守調遣便宜行事丁卯以賈似道為京西湖南北四川宣撫大使移馬光祖為沿江制置使似道尋兼督江西二廣軍馬䝉古軍破利州隆慶順慶諸郡䝉古烏蘭哈達率四王兵三千蠻僰萬人破横山徇内地乘勝破賓州入静江府連破辰沅官軍㫁其歸路烏蘭哈達潜出官軍後命其子阿珠横擊於前官軍退走遂壁潭州城下二月䝉古主遣降人晉國寶招諭合州守將王堅殺之䝉古主遂命大將琿塔噶以兵二萬守六盤竒爾岱布哈守青居山又命納琳造浮梁於涪州之藺市以杜援兵䝉古主自雞爪灘渡直抵合州城俘男女萬餘堅力戰以守䝉古會師圍之六月四川制置副使吕文徳帥兵攻涪浮梁力戰得入重慶遂率艨艟千餘泝嘉陵江而上䝉古史天澤分軍為兩翼順流縱擊文徳敗績秋七月䝉古兵圍合州自二月至於是月守將王堅固守力戰䝉古主屢督諸軍攻之不克前鋒將汪徳臣選兵夜登外城堅率兵逆戰遲明徳臣單騎大呼曰王堅我來活汝一城軍民宜早降語既幾為飛石所中因得疾死會天大雨攻城梯折後軍不克進俱退䝉古主孟克卒於合州城下或傳中飛矢死諸王大臣用二驢䝉以繒槥負之北行合州圍解捷聞加堅寧逺軍節度使八月䝉古呼必賚遣王維中郝經宣撫荆湖江淮將歸徳軍先至江山經言於呼必賚曰經聞圖天下之事於未然則易救天下之事於已然則難已然之中復有未然者使往者不失而來者得遂是尤難也國家奮起朔漠滅金源并西夏取荆㐮克成都平大理􅏳躒諸夷奄征四海垂五十年而一之以兵遺黎殘姓游氣驚魂䖍劉劘盪殆欲殱盡自古用兵未有若是之久且多也且括兵率賦朝下令夕出師闔國大舉以之伐宋而圖混一以志則鋭以力則强而術則未盡也茍於諸國既平之後創法立制敷布條綱任將相選賢能平賦足用屯農足食内治既舉外禦亦備今西師之出久未即功兵連禍結底安於危王宜遣人禀命行在宜諭宋令降名進幣割地納質偃兵息民以全吾力而圗後舉禀命不從然後傳檄示以大信使知王仁而不殺之意一軍出㐮都一軍出夀春一軍出維揚三道並進東西連衡王處一軍為之節制使我兵力常有餘裕如是則未來之變或可弭已然之失或可救也議者必曰三道並進則兵分勢弱不若併力一向則莫我當也曽不知取國之術與争地異併力一向争地之術也諸道並進取國之術也昔之混一者皆若是矣晉取吳則六道進隋取陳則九道進宋之於南唐則三面皆進未聞有一旅之衆而能克國者或者有之僥倖之舉也昔秦王問王翦以伐荆翦曰非六十萬不可秦王曰將軍老矣命李信將二十萬往不克卒以兵六十萬卑翦而後舉楚盖衆有所必用事勢有不可懸料而倖取者故王者之舉必萬全其倖舉者崛起無賴之人也若直前振迅銳而圖功一舉而下金陵入臨安則可也如兵力耗敝役成遷延進退不可反為敵人所乘悔何及乎固宜重慎詳審圗之乃會兵渡淮呼必賚由大勝關張柔由虎頭關分道並進官軍皆遁時呼必賚得沿江制置司榜有云今夏諜者聞北兵會議取黄陂民繫栰由陽邏堡以渡會於鄂州呼必賚曰此事前所未有願如其言及至黄陂漁人獻舟且為鄉導九月宗王穆克自合州遣人以䝉古主凶訃告呼必賚請北還以繫人望呼必賚曰吾奉命南來豈可無功遽還自登香爐山俯瞰大江大江之北曰武湖武湖之東曰陽邏堡其南岸即許黄州官軍以大舟扼江渡軍容甚盛董文炳言於呼必賚曰長江天險宋所恃以為國勢必死守不奪其氣不可臣請嘗之乃帥死士數十百人當其前令其弟文用文忠載艨艟鼓櫂疾趨呌呼畢奮鋒既交文炳麾衆趨岸摶戰官軍大敗明日遂帥諸軍渡江進圍鄂州中外大震䝉古兵至臨江時制置使徐敏子在隆興頓兵不進知軍事陳元桂力疾登城坐督戰力不能敵有欲抱而走者元桂曰死不可去左右俱遁兵至元桂瞠目叱罵遂死之懸其首於敵樓䝉古兵遂入瑞州知府陳昌世治郡有善政百姓擁之以逃詔諸路出師以禦䝉古大出内府銀幣犒師前後出緡錢七千七百萬銀帛各一百六萬兩匹冬十月以賈似道為右丞相兼樞密使軍漢陽以援鄂時邊報日急臨安團結義勇招募新兵増築平江紹興慶元城壁朝野震恐内侍董宋臣請帝遷都四明以避敵鋒軍器太監何子舉言於吳潜曰若上行幸則京師百萬生靈何所依賴御史朱貔孫亦言鑾輿一動則三邊之將士瓦解而四方之盜賊蜂起必不可會皇后亦請留蹕以安民心帝遂止寧海節度判官文天祥乞斬宋臣不報十一月䝉古圍鄂州都統張勝權州事以城危在旦夕登城諭之曰城已為汝家有但子女玉帛皆在將臺可從彼取䝉古信之遂焚城外民居將退會髙達等引兵至賈似道亦駐漢陽為援䝉古乃復進攻遣展齊巴圖爾領兵同降人諭鄂州使降抵城下勝殺使者以軍出襲展齊巴圖爾戰敗死達恃其武勇殊易似道每見其督戰即戲之曰巍巾者何能為哉將戰必須似道親勞始出否即使兵士譁於其門吕文徳諂事似道使人訶曰宣撫在此何敢爾耶曹世雄向士璧皆從在軍事未嘗闗白似道由是啣三人而親文徳時諸路重兵咸聚於鄂䝉古兵由永全至潭州江西大震吳潜用御史饒應子言移賈似道於黄州雖下流實當兵衝孫虎臣以精騎七百送之至蘱草坪候騎言前有北兵似道大懼謂左右曰奈何虎臣匿似道出戰似道歎曰死矣惜不光明俊偉爾及北兵至乃老弱部所掠金帛子女而還者江西降將儲再興騎牛先之虎臣出擒再興似道遂入黄州十二月己亥賈似道私與䝉古議和時䝉古攻城益急城中死傷者至萬三千人賈似道大懼乃密遣宋京詣䝉古營請稱臣納幣呼必賚不許會合州守臣王堅使阮思聰踔急流走鄂以䝉古計聞似道再遣京往呼必賚亦聞阿勒達爾等謀立額哷布格遣托果斯括民兵因召羣臣議事郝經曰易言知進退存亡而不失其正者其唯聖人乎國家自平金以來惟務進取老師費財三十年矣今國内空虚塔竒錫哩諸王觀望所立莫不覬覦神器一有狡焉或啓戎心先人舉事腹背受敵大事去矣且額哷布格已令塔爾楚行尚書省據燕都按圗籍號令諸道行皇帝事矣雖大王素有人望且握重兵獨不見金世宗海陵之事乎若彼果稱遺詔便正位號下詔中原行赦江上欲歸得乎願大王以社稷為念與宋議和割淮南漢上梓䕫兩路定疆界歲幣置輜重率輕騎而歸直造燕都則彼之奸謀冰釋瓦解遣一軍逆大行靈舁收皇帝璽遣使召錫哩額爾布格穆克諸王會䘮和琳差官於諸路撫慰安輯命王子珍戩鎮守燕都示以形勢則大寶有歸而社稷安矣呼必賚以為然會宋京至請稱臣割江南為界嵗奉銀絹匹兩各二十萬呼必賚許之遂㧞砦而去留張傑閻旺以偏師候湖南烏蘭哈達之兵賈似道奏鄂州圍解詔論功行賞䝉古烏蘭哈達攻潭州甚急向士璧帥潭極力守禦既置飛江軍又募斗弩社朝夕親自登城撫勞聞䝉古後軍且至遣王輔佑帥五百衆覘之遇於南岳市大戰䝉古少却會呼必賚遣黙徳齊將兵來迎烏蘭哈達遂解圍引兵趨湖北景定元年二月䝉古張傑閻旺作浮梁於新生磯烏蘭哈達曰兵至傑等濟師北還賈似道用劉整計命夏貴以舟師攻新浮梁進至白鹿磯殺卒百七十人辛酉䝉古遣偏師取道大理由廣南抵衡州向士璧合劉雄飛兵逆戰於道敗之獲還俘民甚衆三月賈似道匿議和稱臣納幣之事以所殺獲俘卒殿兵上表言諸路大捷鄂圍始解江漢肅清宗社危而復安實萬世無疆之休帝以似道有再造功詔入朝夏四月進賈似道少師封衞國公帝手詔曰賈似道為吾股肱之臣任此旬宣之計隠然殄敵奮不顧身吾民賴之而更生王室有同於再造及似道至又詔百官郊勞如文彥博故事奬眷甚至諸將士悉進官吕文徳檢校少傅髙達寧江軍承宣使劉整知瀘州兼潼川安撫副使夏貴知淮安州兼京東招撫使孫虎臣和州防禦使范文虎黄州武定諸軍都統制向士璧曹世雄各加轉有差初似道惡髙達在軍中嘗侮已言於帝欲殺之帝知其有功不從故論功以吕文徳為第一而達居其次似道既相引薦奔競之士受納賄賂寘諸通顯又引外戚子弟為監司郡守進倡優傀儡奉帝為游燕臺臣有諫者宣諭使裁去謂之節帖權傾中外進用羣小更法制矣郝經之留理宗景定元年夏四月䝉古以郝經為國信使來告即位且徵前日講和之議䝉古王文統素忌郝經有重名既請遣經復陰屬李璮潜師侵宋欲侵手害經或謂經曰文統叵測盍以疾辭經曰自南北搆難江淮遺黎弱者被俘略壯者死原野兵連禍結斯亦久矣主上一視同仁務通兩國之好雖以微軀蹈不測之險茍能弭兵靖亂活百萬生靈於鋒鏑之下吾學為有用矣遂行秋七月賈似道拘䝉古使者郝經于真州先是賈似道還朝使其客廖瑩中輩撰福華編稱頌鄂功通國皆不知所謂和也經至宿州遣其副使何源劉人傑請入國日期不報經數遺書於三省樞密院及兩淮制置使李庭芝賈似道恐經至謀泄拘經於真州之忠勇軍營經上表有言曰願附魯連之義排難解紛豈如唐儉之徒欵兵誤國又數上書於帝畧曰貴朝自太祖受命建極啓運創立規模一本諸理校其武功有不逮漢唐之初而革弊政弭兵兇弱藩鎮强京國意慮深逺貽厥孫謀有盛於漢唐之後者嘗以為漢似乎夏唐似乎商而貴朝則似乎周可以為後三代夫有天下者孰不欲九州四海奄有混一端委垂衣而天下晏然穆清也哉理有所不能勢有所難必亦安夫所遇之理而已貴朝祖宗深見夫此持勒控約不肯少易是以太祖開建大業太宗丕承基統仁宗治效浹洽神宗大有作為髙宗坐弭强敵皆有其勢而弗乘安於理而不妄者也今乃或者欲於遷徙戰伐之極三百餘年之後不為扶持安全之計欲㫁生民之餘命棄祖宗之良法不以理以勢不以守以戰欲收奇功取幸勝為詭遇之舉不亦悮乎伏惟陛下之與本朝初欲復前代故事遣使納交越國萬里天地人神皆知陛下之仁計安生民之意而氣數末合小人交亂雖行李往來徒費道路迄無成命非兩朝之不幸生民之不幸也有繼好之使而無止戈之君有講信之名而無修睦之實有報聘之命而無輸平之約是以籍籍紛紛不足以明信而適足以長亂至渝合交廣之役而禍亂極矣主上即位之初過意相與惟恐不及不知貴朝何故接納其使拘於邊郡蔽羃䝉覆不使進退一室之内顛連宛轉不覩天日綿歴數年主上何罪經等亦何罪而窘逼至是耶或者必以為本朝兵亂有隙可乗必有范山語楚子言以為晉君不在諸侯而北方可圗夫以貴朝積累之盛畜養生聚三百餘年恢復故疆固所當為然而大河南北秦壠東西海岱表裏名城數百縱使本朝有故委而不問諸鎮侯伯亦未易取中間或有魏大武歛戍之計縱使入境一日抄騎百千為羣雖得一城取一寨未能償數世之所失而徒棄二國之明信或者之論足以病國而不足以有成明矣請以貴朝之事質之熈豐之間有意於强國矣而卒莫能强宣政之間有意於恢復矣百年之力漫費於燕山之空府而因以致變開禧之間又有意於進取矣而隨得隨失反致淮南之師端平之間再事夫收復矣而徒敝師徒漫不收攝遂失蜀漢是皆貴朝之事且陛下所親見者旁薄横潰至於今日而議者不規夫古之理惟徇夫今之勢不懼夫逺禍惟嗜夫近利此經所以昧死强僣必言之而不靳也茍惟徇天下之勢不規天下之理則又必謂遼金夏人吾見其㓕彼今有故氣數可惻委如貴朝兵亂異聞等事一皆不妄豈宜遽以為玩本朝立國根據綿絡包括海宇未易搖蕩太祖皇帝倡義漠北一舉而取燕遼更舉而取河朔又再舉而㓕西夏遂乃掇拾秦雍傾覆汴蔡穿徹巴蜀繞出大理東西北皆際海而南際江淮自周漢以來未有大且强若是者而其風俗淳厚禁網疎闊號令簡肅是以中外之人皆盡死力豈得一遭變故便至淪棄者乎且委如所傳非直本朝之不幸抑亦貴朝之不幸也主上萬安必能弭兵使南北之民免殺戮之禍不然則戰争方始而貴朝可憂矣事至今日貴朝至汲汲皇皇以應主上美意講信修睦計安元元而乃仍自置而不問實有所未解者抑天未厭亂將由是以締造兵端耶抑别有所韞畜耶皆不可得而知也竊嘗思之本朝用兵四十餘年亦休息之時也貴朝受兵三十餘年亦厭苦之時也夫天下之勢始於北而終於南一氣之運建於子而屈於午動本於静陽本於陰日北至而陽生南至而陰生故凡立國者莫不自北而南也是以周自公劉遷豳國岐而都豐鎬至於成周則極矣平王東遷於是不能復古盖自西北而入於東南也秦人自汧渭霸關中并六國最後㓕楚亦自西北而始也漢自關中取韓魏梁趙蹙項氏於彭城亦自西北而至於東南也至世祖都洛而漢氏極矣照烈入蜀輔以孔明之英賢關張之忠勇仗義復漢攻樊城震許都屢出祁出久駐渭濱終不能有關洛一郡孫氏立國江東據三州以虎視天下有陸遜之沉鷙吕䝉之謀畫出濡須下浣城攻合肥以戰為守終不能得淮北一民觀此則南北之理天下之勢灼然見矣伏惟貴朝肇基王跡則自燕趙之交一時將相皆幽薊常山之豪傑二祖功徳則著於淮南受命啓土則始於汴宋是亦自北而南也既正皇極平唐蜀㓕楚漢自江南至於嶺南則又自北而南也江淮之間至於閩越户口滋殖十百諸夏文物學校盛於上國亦氣數使然應夫萬物相見南方之卦所以開後王而有今日也是亦自北北而南也夫邦交之事非獨貴朝然至貴朝而始盛自國初啓運剗平僣偽有沛然混一之勢乃置燕雲而不取與契丹再定盟誓好聘往來甲兵不試安天下者百餘年至於宣政盟約遂壞靖康之末因棄都邑髙宗南幸堕讐崇好遂與金源再定盟誓好聘往來甲兵不試安天下者又百餘年由是觀之以交鄰為國而能計安天下者莫盛於貴朝也故曰以和議邦交為國者貴朝之事也天子之所持守大臣之所輔相百僚之所論議以為社稷之大經者惟此而已至於本朝適與陛下相當而陛下使命不一卒無有成盖本朝極兵威奄征方國而天未厭亂每為差池是以陛下之聖意不能達祖宗之成規不能合生民之命莫與救藥太和之氣將遂殄絶天地設位必有對待陛下有此意則主上啓此心盖其氣數亦當然也主上即位之初先遣信使輸平繼好弭兵息民而貴朝置之舍館綿歴數歲置而不問是殆必有横議之人將以弊貴朝誤陛下者就令貴朝所舉皆中圗維皆獲返舊京奄山東取河朔剗白溝之界上盧龍之塞而本朝亦不失故物若為之而不成圖之而不獲復欲洗兵江水掛甲淮壖而遂無事殆恐不能一有所失則不既大矣乎且貴朝光有天下三百有餘年矣舉祖宗三百年之成烈再為博者之一擲遂以干戈易玉帛殺戮易民命戰争易禮樂竊為陛下不取或稽留使人不為無故或别有盖藏之跡亦宜明白指陳不宜擯而弗問陳説不答表請不報嘿嘿而已殆非貴朝之長䇿也不報驛吏棘垣鑰户晝夜守邏欲以動經經不屈但語其下曰嚮受命不進我之罪也一入宋境死生進退聽其在彼屈身辱命我終不能汝等不幸同在患難宜忍以待之揆之天時人事宋祚殆不逺矣帝聞有北使謂宰執曰北朝使來事體當議似道奏和出彼謀豈宜一切輕徇儻以交鄰國之道當令入見䝉古遣詳問官崔明道李全義詣淮東制置司訪問經等所在淮東制置李庭芝奏䝉古使者久留荆州亦為似道所格不報李璮之納理宗景定三年二月䝉古江淮大都督李璮以京東來歸璮李全子既降䝉古為山東行省葺舊海城將窺海道已而陷海州漣水軍拔四城殺官軍幾盡淮揚大震自䝉古主孟克卒呼必賚立璮始萌南歸之志前後所奏凡數十事皆恫疑虚愒以動䝉古而自為完繕益兵計至是召其子彥簡開平修築濟南益都等城壁殱䝉古戍兵以漣海三城來歸獻京東州縣請贖父過仍遣總管李毅等傳檄列郡詔授璮保信寧武軍節度使督視京東河北路軍馬封齊郡王復其父全官爵改漣水為安東州夏四月李璮引兵還攻益都入之遂入淄州五月䝉古主命諸王哈必齊總諸道兵擊李璮璮兵勢甚張復命丞相史天澤往仍詔諸將皆受天澤節制天澤至濟南謂哈必齊曰璮多譎而兵精不宜力角當以歲月斃之乃深溝髙壘遏其侵軼初行軍總管張𢎞範臨發父柔謂之曰汝圍城勿避險地險則已無懈心兵必致死主者慮其險必赴救可因以立功至是𢎞範營城西璮出兵突諸將獨不向𢎞範𢎞範曰我營險地璮乃示弱於我必以奇兵來襲謂我弗悟也遂築長壘内伏甲而外為壕開東門以待夜浚濠加深廣璮不知也明日璮果擁飛橋來攻未及岸軍陷壕中得升壕者突入壘門遇伏皆死六月朝廷聞李璮受圍給銀五萬兩下益都府犒軍遣青陽蘿炎帥師援之蘿炎至山東不敢進而還八月䝉古主命史樞阿珠各將兵赴濟南李璮帥衆出掠輜重將及城北兵邀擊大敗之璮退保城史天澤命築環圍璮自是不復得出董文炳知其勢蹙抵城下呼璮愛將田都帥者曰反者璮耳餘來即吾人毋自取死也田縋城降璮猶日夜拒守分軍就食民家發其盖藏以繼不足則家賦之鹽令以人為食璮知城且破乃手刄妻妾乘舟入大明湖自投水中水淺不得死為䝉古所獲史天澤殺之解其體以徇明日引軍東行未至益都城中人已開門迎降三齊復為䝉古所有事聞贈璮檢校太師賜廟額曰顯忠初璮兵有沂漣兩軍二萬餘人勇而善戰哈必齊配䝉古諸軍使陰殺之文炳當殺二千人言於哈必齊曰彼為璮所脅耳向天子南伐或妄殺人雖大將亦罪之是不宜殺也哈必齊從之然他殺之者已衆皆大悔時山東尚未靖䝉古主以文炳為經略使文炳至益都從數騎便服而入至府不設警衞召璮故將吏撫諭於庭下所部大恱山東以安初天澤征璮䝉古主臨軒授詔責以專征天澤至軍未嘗以詔示人既還䝉古主慰勞之時言者謂璮之變由大藩子弟盡専兵民之權天澤奏行之請自臣家始於是史氏及張柔嚴忠濟子弟皆還私第宋史紀事本末卷二十六
