body:
  text: 宋史紀事本末卷二十五明馮琦原編陳邦瞻增輯蒙古連兵理宗端平二年春正月丙辰詔孟珙屯黃州珙留襄陽招中原精鋭之士萬五千餘分屯漅北樊城新野唐鄧間以僃蒙古名鎮北軍遂以為襄陽都統制六月蒙古主命子奎騰將諾海等侵蜀特們德爾張柔等侵漢扣肯布哈及察罕等侵江淮秋七月蒙古將扣肯布哈侵唐州全子才等棄師走趙范帥兵敗蒙古于上閘兒還冬十月蒙古奎騰入蜀次鞏昌金總帥汪世顯降時金亡郡縣皆降獨世顯堅守不下奎騰至世顯率其衆持牛酒迎謁奎騰謂之曰吾征討有年所至皆下汝獨固守何也世顯曰有君在上賣國市恩之人諒所不取濶端大悅戒其下秋毫勿犯俾世顯仍舊職即日令帥所部從征世顯遂截嘉陵進趨大安十二月蒙古奎騰入沔州殺知州事髙稼稼在沔葺理創殘招集流散皆襁負歸之及數與蒙古力戰竒功甚多至是奎騰自鳯州入西川東路之師多敗遂搗西池谷距沔九十里吏民議退保大安稼言於制置使趙彥呐曰今日之事有進無退若能進據險地以身捍蜀敵有後顧必不深入若倉皇召兵退守內地敵長驅而前蜀事去矣彥呐曰吾志也已而競行留稼守沔蒙古自白水關入六股㧣距沔六十里沔無城依山為阻稼升髙鼓譟盛旗鼓為疑兵彥呐至蜀口檄帳前總管和彥威以軍還沔召小校楊俊何璘以兵㑹又選精兵千人命王宣帥以助之已而蒙古大至何璘遁沔州遂陷衆擁稼出户稼叱之不能止敵圍殺之彥呐聞稼死沔州破乃進屯青野原蒙古圍之曹友聞曰青野為蜀咽㗋不可緩也即往救之半夜截戰遂解其圍既而蒙古先鋒汪世顯搗大安友聞又救之指麾甫畢蒙古大軍數萬突至友聞迎戰又敗之敵乃退友聞遂引兵扼仙人關三年春正月蒙古兵攻洪山張順翁成大等以兵捍禦蒙古將特們德爾侵江陵統制李復明奮戰死之三月襄陽北軍主將王旻等作亂時制置使趙范在襄陽以王旻李伯淵樊文彬黃國弼等為腹心朝夕酣狎了無上下之序民訟邊防一切廢弛既而南北軍交爭范失於撫馭於是旻伯淵焚襄陽城郭倉庫相繼降於䝉古時城中官民尚四萬七千有竒財粟在倉庫者無慮三十萬軍器二十四庫皆為蒙古所有金銀鹽鈔不與焉南軍將李虎乘勝劫掠城中為之一空襄陽自嶽飛收復以來百三十年生聚繁庶城髙池深甲於兩陲一旦灰燼詔以趙范失於撫御削三官仍舊職任時師屢為蒙古所敗襄漢淮蜀日急帝悔前事命學士吳泳草詔罪已監察御史王萬謂泳曰兵固失矣言之甚恐亦不可今邊民生意如髮宜以振厲奮發興感人心因為條具沿革事宜泳從其言草詔進略曰數年之間多難已甚屬讐金之寢滅而䝉古之與鄰逮合謀成破蔡之功恐假道有滅虞之勢心之憂矣臍可噬乎又曰兵民之死戰鬪户口之困流離室廬靡存骼胔相望是皆朕明不能燭德有未孚上無以格天心下無以定民志今方施令發政以為緩輯之圖補卒搜乘以嚴守禦之僃想瘡痍之溢目如疾病之在身是月䝉古陷隨郢州荆門軍八月䝉古陷棗陽軍德安府九月壬午御前諸軍統制曹友聞與䝉古戰於大安軍陽平關敗績死之初友聞帥師扼仙人關諜報䝉古合蕃漢軍五十餘萬至友聞謂弟萬曰國家安危在此一舉衆寡不敵豈容浪戰惟當乘髙據險出竒設伏以待之䝉古攻武休關敗都統李顯忠軍遂入興元欲衝大安軍制置使趙彥呐檄友聞控制大安以保蜀口友聞以為不可彥呐不從友聞乃遣弟萬及友諒引兵上雞冠隘多張旗幟示敵堅守友聞選精鋭萬人夜渡江密往流溪設伏約曰敵至內以鳴鼓舉火為應外呼殺聲䝉古兵果至萬出逆戰䝉古巴圗魯及諾海帥步騎萬餘人往來搏戰矢石如雨萬身被創令諸軍舉烽友聞分所部為三以禦敵親帥精兵三千人疾馳至隘下先遣統領劉虎帥敢死士五百衝敵前鋒不動友聞乃伏三百騎道旁而令虎銜枚突陳㑹大風雨諸將請曰雨不止淖濘深沒足宜候少霽友聞叱曰敵知我伏兵在此緩必失機遂擁兵齊進西軍素以綿裘代鐵甲經雨濡濕不利步鬬黎明䝉古以鐵騎四面圍繞友聞嘆曰此殆天乎吾有死而已於是血戰愈厲與萬俱死軍盡沒䝉古兵遂長驅入蜀一月之間成都利州潼州三路俱陷沒西蜀所存唯䕫州一路及潼川順慶府而已冬十月壬寅䝉古兵陷固始縣丙午䝉古奎騰兵離成都入文州知州劉鋭通判趙汝嚮乘城固守晝夜摶戰踰月援兵不至鋭度不免集其家人盡飲以藥皆死乃聚其尸及公私金帛告命焚之家素有禮法幼子才六歲飲藥時猶下拜受之左右感動城破鋭及其二子自刎死汝嚮被執臠殺之軍民同死者數萬人十一月䝉古扣肯布哈入淮西蘄舒光州守臣皆遁扣肯布哈合三州人馬糧械趨黃州遊騎自信陽趨合肥詔淮西史嵩之援光淮東趙葵援合肥沿江陳韡過和州為淮西聲援䝉古特們德爾攻江陵史嵩之遣孟珙救之珙遣張順先渡而自以全師救之變易旌旗服色循環往來夜則列炬照江數十里相接珙又遣趙武等與戰珙親往節度遂破䝉古二十四寨還民二萬而歸蒙古將察罕攻真州知州丘嶽部分嚴明守具周悉䝉古兵薄城輒敗嶽乘勝出戰於胥浦橋以強弩射其致師者一人死之敵兵少却嶽曰敵衆十倍於我不可以力勝也乃為三伏設炮石待之於西城敵至伏起炮發殺其驍將敵衆大擾嶽選勇士襲敵營焚其廬帳越二日皆引去嘉熙元年冬十月䝉古扣肯布哈攻黃州孟珙帥師救却之遂攻安豐杜杲繕完守禦䝉古以火炮焚樓櫓杲隨陷隨補完䝉古令巴圖爾斫牌􅒎木巴圖爾者皆死囚為之攻城以自贖杲募善射者用小箭射其目巴圖爾多傷而退䝉古填壕為二十七壩杲分兵扼壩䝉古乘風縱火俄而風雪驟作杲募壯士奪壩路士皆奮躍死戰㑹池州都統制吕文德突圍入城合力捍禦䝉古引去淮右以安文德安豐人魁梧勇悍嘗鬻薪城中趙葵見其遺履長尺有咫異而訪之值文德出獵暮負虎鹿各一而歸召置帳下遂纍功勞超擢軍職二年春正月己未詔史嵩之趙葵援黃州安豐其立功將士等第亟具名以聞二月䝉古再遣王楫來求嵗弊銀絹各二十萬僉書樞密李宗勉言輕諾者多後患當守元約可也然比之開禧時物價騰踴奚啻倍蓗矣史嵩之開督府力主和議宗勉言使者可疑者三嵩之職在督戰如收復襄光控扼施澧招集山寨保固江流皆今所當為若所主在和則凡有機㑹可乘不無退縮之意必至虛捐歲月坐失事功三月己丑命將作監周次說為䝉古通好使九月䝉古察罕帥兵號八十萬圍廬州期破廬後造舟巢湖以窺江左於濠外築土城六十里穿兩濠攻具皆數倍於攻安豐時杜杲極力守禦䝉古築壩髙於城樓杲以油灌草即壩下焚之皆為煨燼又於串樓內立鴈翅七層俄炮中壩上衆驚杲乘勝出戰䝉古敗走杲追躡數十里又練舟師扼淮河遣其子庶監吕文德聶斌伏精鋭於要害䝉古不能進遂引而北歸詔加杲淮西制置使冬十月以孟珙為荆湖制置使詔珙收復京襄珙謂必得郢然後可以通餽餉得荆門然後可以出竒兵及至嶽州檄江陵節制司搗襄郢召諸將指授方略發兵深入遂復郢州荆門軍三年三月孟洪遣兵及䝉古戰三戰皆捷遂復信陽光化軍樊城襄陽因上疏曰取襄不難而守為難非將士不勇也非車馬器械不精也實在乎事力之不給耳襄陽為朝廷根本今百戰而得之當加經理如護元氣非甲兵十萬不足分守與其抽兵於戰來之後孰若保此全勝上兵伐謀此不爭之爭也乃以蔡息降人置忠衛軍襄郢降人置先鋒軍八月䝉古諾海將兵入蜀制置使丁黼聞之先遣妻子南歸自誓死守至是諾海自新井入詐竪宋將旗黼以為潰卒以旗榜招之既審知其非領兵夜出城南迎戰而死䝉古遂取漢卭簡眉蓬州遂寧重慶順慶府尋引還黼帥蜀為政寬大蜀人思之十二月孟珙諜知䝉古諾海等帥衆號八十萬南侵䇿其必道施黔以透湖湘乃請粟十萬石以給軍餉以三千人屯峽州千人屯歸州命弟瑛以精兵五千駐松滋為䕫聲援增兵守歸州隘口萬户谷及䝉古至珙密遣將禦之又以千人屯施州䝉古既入蜀珙增置營寨分布戰艦遣兵間道抵均州防遏且設䇿備禦未幾䝉古渡萬州湖灘施䕫震動珙兄璟時知峽州帥兵迎拒於歸州大埡寨得捷於巴東遂復䕫州四年春正月䝉古張柔等分道入侵二月癸丑以孟珙為四川宣撫使珙遂興屯田條具上流事宜㑹諜知䝉古於襄樊信陽隨州招集軍民布種積船材於鄧之順陽乃分兵撓其勢潜兵燒所積船材又度其必因糧於蔡遣兵火其積聚遂拜四川安撫使知䕫州節制歸峽鼎澧軍馬珙至鎮招集散民為寧武軍以降人回鶻阿里巴圗爾為飛鶻軍釐蜀政之弊為條班諸郡縣且曰不擇險要立寨柵則難責兵以衛民不集流離安耕種則難責民以養兵乃立賞罰以課殿最俾諸司奉行之尋兼䕫州路制置屯田調夫築堰募農給種首秭歸尾漢口為屯二十為頃十八萬八千二百八十以李庭芝權施州建始縣庭芝訓農治兵選壯士雜官軍教之期年民皆知戰守善馳逐無事則植戈而耕敵至則悉出而戰珙下其法於所部行之夏四月䝉古復使王楫來楫前後凡五至以和議未决隱憂致疾卒遣使歸其柩於䝉古淳祐元年十一月䝉古諾海部汪世顯等復入蜀進圍成都制置使陳隆之固守彌旬誓與城存亡部將田世顯濳送欵於䝉古乘夜開門北兵突入隆之舉家數百口皆死檻送隆之至漢州命諭守臣王䕫降隆之大呼曰大丈夫死爾勿降也遂見殺漢州兵三千出戰城閉盡為䝉古所屠十二月䝉古伊埒默色來議和從行者七十餘人伊埓默色曰吾與汝等奉命南下楚人多詐當誓死無辱吾君已而馳抵淮上守將以兵脅之曰爾命在我生死頃刻間耳若能降官爵可立致不然必不爾貸伊埒默色曰吾持節南來以通國好反誘我以不義有死而已守將知其不可逼乃囚之長沙飛虎寨二年二月䝉古伊克諾延耶律珠格自京兆取道商房以趨三川遂攻瀘州孟珙遣一軍屯江陵及郢州一軍屯沙市一軍自江陵出襄與諸軍㑹又遣一軍屯涪州且下令應出戍主兵官不許失棄寸土權開州梁棟以乏糧還司珙曰是棄城也斬以狥由是諸將禀命惟謹冬十月䝉古陷通州屠其民守將杜霆棄城遁十二月䝉古兵攻敘州都統楊大全戰死三年春正月䝉古張柔分兵屯田於襄城秋七月䝉古兵破大安軍忠義副總管楊世安守魚孔隘力戰却之詔以世安就知大安軍四年五月䝉古兵圍壽春吕文德率諸軍禦之六月以吕文德為淮西招撫使未幾文德敗䝉古兵於五河復其城十二月以孟珙兼知江陵府珙至江陵登城嘆曰江陵所恃三海不知沮洳有變為桑田者敵一鳴鞭即至城外蓋自城以東古嶺先峰直至三汊無有限隔乃修復內隘十有一别作十隘於外有距城數十里者沮漳之水舊自城西入江因障而東之俾繞城北入於漢而三海遂通為一隨其髙下為匱畜泄三百里間渺然巨浸土木之工百千萬民不知役因繪圖上之五年五月詔沿江湖南江西湖廣兩浙制帥漕司共造輕捷戰船置遊擊軍壯士分僃捍禦七月䝉古察罕㑹張柔掠淮西至揚州而去六年十一月䝉古兵侵荆湖江淮之境攻拔虎頭關遂至黃州余玠守蜀理宗淳祐三年二月以余玠為兵部侍郎四川制置使玠家貧落魄無行喜功名好大言嘗作長短句謁淮東制置使趙葵葵壯之留置幕府俾帥舟師泝淮入河抵汴所向有功纍推淮東制置副使入對言方今世胄之彥場屋之士田里之豪一或即戎即指之為粗人斥之為儈伍願陛下視文武之士為一勿令偏有所重偏則必至於激文武交激非國之福帝曰卿人物議論皆不尋常可獨當一面乃授四川宣諭使至是加制置使知重慶府蜀中財賦入户部三司者五百餘萬緡入四總領所者二千五百餘萬緡金銀綾錦之類不預焉自寶慶三年失關外端平二年蜀地殘破所存州郡無幾國用益窘至是十六年間凡授宣撫使者三人制置使者九人副使四人或老或暫或庸或貪或慘或繆或遙領而不至或開隙而各謀終無成績於是兩川無復紀律監司戎帥各專號令擅辟守宰蕩無紀綱玠至築招賢館于府左供張一如帥所居下令曰集衆思廣忠益諸葛孔明所以用蜀也士欲有謀以告我者近則徑詣公府逺則自言於所在州郡以禮遣之髙爵重賞朝廷不吝以報功豪傑之士趨期立事今其時矣士之至者玠不厭禮接咸得其歡心言有可用隨才而任茍不可用亦厚遺謝之播州冉璉冉璞兄弟有文武才隱居蠻中前後閫帥􅀈召皆不至聞玠賢兄弟相率詣謁玠賓禮之館穀加厚居數月無所言玠乃更闢别館以處之且常使人窺其所為兄弟終日不言惟對踞以堊畫地為山川城池之形起則漫去如是又旬餘請見玠屏人曰為今日西蜀之計其在徙合州城乎玠不覺躍起曰此玠志也但未得其所耳曰蜀口形勝之地莫若釣魚山請徙諸此若任得其人積粟以守之勝於十萬師逺矣巴蜀不足守也玠大喜遂不謀於衆密以其謀聞於朝請不次官之詔以璉為承事郎權發遣合州璞為承務郎權通判州事徙城之事悉以任之命下一府皆喧然同辭以為不可玠怒曰城成則蜀賴以安不成玠獨坐之諸君無預也率築青居大獲釣魚雲頂天生凡十餘城皆因山為壘碁布星分為諸郡治所又移金戎於大獲以護蜀口移沔戎於青居興戎先駐合州舊城移守釣魚共僃內水移利戎於雲頂以僃外水於是如臂使指氣勢聫絡屯兵聚糧為必守計民始有安土之心十年冬十月余玠出師搗興元不克玠慷慨自許有挈故地還天子之語數年之間建城堡築關隘增屯堡邊警稍息於是一意出師率諸將巡邊直搗興元遇䝉古將汪德臣鄭鼎大戰而還十二年二月䝉古將汪德臣城沔州未幾又城利州自是䝉古且耕且戰蜀土遂不可復冬十月䝉古汪德臣將兵掠成都薄嘉定四川大震余玠率諸將愈興元用等夜開關力戰始解去寶祐元年五月甲午召余玠還六月庚申以余晦為四川宣諭使代余玠初利州都統王䕫素殘悍號王夜義恃功驕恣桀驁不受節度所至却掠蜀人苦之初玠帥蜀至嘉定䕫帥所部迎謁才羸弱二百人玠曰久聞都統兵精今疲弊若此殊不稱所望䕫對曰䕫兵非不精所以不敢即見者恐驚從人耳頃之班聲如雷江水為沸旗幟精明舟中皆戰掉失色而玠自若也徐命吏班賞冇差䕫退謂人曰儒者中乃有此人玠久欲誅䕫獨恐其握重兵居外恐輕動危蜀謀於親將楊成成曰今縱弗誅飬成其勢後一舉足西蜀危矣䕫在蜀雖久有威名孰與吳氏吳氏當中興危難之時能百戰以保蜀傳之四世恩威益張一日曦為叛逆諸將誅之如取孤豚况䕫無吳氏之功而有曦之逆心恃豨突之勇敢慢法度縱兵殘民奴視同列非有吳氏得人之固也今誅之一夫力耳待其發而取之難矣玠意遂决夜召䕫計事潜以成代領其衆䕫才離營而新將已單騎入矣將士皆錯愕相顧不知所為成以帥指譬曉之遂相率下拜䕫至玠斬之乃薦成為文州刺史㑹戎州帥欲舉統制姚世安為代玠素欲革軍中舉代之弊以三千騎至雲頂山下遣將代世安世安閉關不納而世安素結丞相謝方叔子姪至是求援於方叔方叔遂倡言玠失利戎之心非我調停且朝夕有變又隂嗾世安密求玠之短陳於帝前帝惑之於是世安乃與玠抗玠鬱鬱不樂玠專制四蜀凡有奏疏詞氣不謹帝不能平㑹徐清叟入對語及玠因言玠不知事君之禮陛下何不出其不意而召之帝不答清叟曰陛下豈以玠握大兵召之或不至耶臣度玠素失士心必不敢帝然之乃以資政殿學士召而以知鄂州余晦代之秋七月余玠卒玠之治蜀也任都統張實治軍旅安撫王惟忠治財賦監簿朱文炳接賓客皆有常度至於修學飬士輕徭以寬民力薄征以通商賈蜀既富實乃罷京湖之餉邊關無警又撤東南之戍自寶慶以來蜀閫未有能及之者然久假便宜之權不顧嫌疑昧於勇退遂來讒賊之口又置機捕官雖足以廉得士情然寄耳目於羣小故人多懷疑懼至是聞召不自安一夕暴卒或謂仰藥死蜀人莫不悲之薛應旗曰宋之不競若天有以限之者才得一人讒忌即入自其盛世固已有之熙豐以後類不相容迄於南渡日甚一日逮嘉寶間金國雖亡䝉古方熾余玠治蜀措置有方猶足以為一木之支而謝方叔徐清叟之徒必為疑間以致之死鳴呼玠死之後不特蜀非宋有而國祚亦從可知矣尋又籍玠家財以犒師若非忠義之士有不解體者哉二年八月下利州西路安撫王惟忠大理獄余晦帥蜀惟忠潜通北國遂下獄竟斬於市九月追削余玠官秩奪其子晦告身先是待御史吳燧等論玠聚斂罔利七罪玠死其子如孫盡竊帑庾之積以歸詔簿録玠家財以犒師賑邊如孫遂認錢三千萬徴之纍年始足真魏諸賢用罷理宗寶慶元年八月罷直學士院真德秀先是嘉定中德秀為起居舍人兼東宫講官言事不避權貴知宰相史彌逺欲以爵祿縻天下士慨然謂劉鑰曰吾徒須急引去使廟堂知世有不肯為從官者遂力請外帝初即位自知潭州召為禮部侍郎直學士院入對勸帝以容受直言召用賢臣固結人心為本帝頗納之時又召魏了翁為起居郎了翁開禧初以武學博士對䇿諫開邊事出知嘉定府尋築室白鶴山下以所聞於輔廣李燔者開門授徒士爭負笈從之蜀人盡知義理之學及是與德秀同召而洪咨䕫亦入為考功員外郎咨䕫言事尤剴切因論臺諌失職有云月課將臨筆不敢下稱量議論之異同揣摩情分之厚薄不否未决吞吐不能其相率勇往而不顧者恭請聖駕欵謁景靈宫而已臺臣深銜之㑹上書言濟王事者甚衆彌逺以為患有梁成大者以知縣秩滿待遷諂事彌逺家幹萬昕昕一日言真德秀當逐成大曰某若入臺必能辦此事昕為達其語遂擢監察御史成大因與莫澤李知孝等論德秀所主濟王贈典非是遂命德秀提舉玉隆宫咨䕫亦鐫二秩去成大澤知孝三人共為彌逺鷹犬凡忤彌逺意者三人必相繼擊之於是名人賢士排斥殆盡人目為三凶又目成大為成犬冬十月貶魏了翁官罷真德秀祠祿初胡夢昱以論濟王事逐了翁出關餞之李知孝遂指了翁首唱議論將擊之彌逺猶畏公議外示優禮改權工部侍郎了翁力以疾辭乃出知常德府諌議大夫朱端常劾了翁欺世盜名朋邪謗國德秀奏劄詆誣詔了翁落職奪三秩靖州居住德秀落煥章閣待制罷祠李知孝上書乞追削流竄德秀以正典刑梁成大亦奏言大佞似忠大辨若訥或好名以自鬻或立異以自詭或假髙尚之節以要名或飾矯僞之學以欺世言若忠鯁心實回邪一不察焉薰蕕同器涇渭雜流矣言不達變謀不中機或强辨以為能或詭訐以市直或設竒險之說以駭衆聽或肆詭誕之論以惑士心所行非所言所守非所學一不辨焉枘鑿不侔矛盾相激矣魏了翁雖從追竄人猶以為罪大罰輕真德秀狂僣悖繆不减了翁相羊家食宜削秩貶竄一等施行彌逺勸帝下其章帝曰仲尼不為己甚乃止成大貽書所親曰真德秀乃真小人魏了翁乃僞君子此舉太快公論識者笑之了翁至靖湖湘江浙之士不逺千里負書從學乃著九經要義一百卷訂定精密先儒所未有也德秀既歸蒲城修讀書記語門人曰此人君為治之門如有用我者執此以往紹定六年十一月召魏了翁為文華閣待制了翁應詔上章論十弊乞復舊典以彰新化一曰復三省之典以重六卿二曰復二府之典以集衆議三曰復都堂之典以重省府四曰復侍從之典以來忠告五曰復經筵之典以熙聖學六曰復臺諌之典以公黜陟七曰復制誥之典以謹命令八曰復聽言之典以通下情九曰復三衙之典以強主威十曰復制閫之典以黜私意疏列萬言先引故實次陳時弊分别利害燦若白黑上讀之為感動戊辰禮部郎中洪咨䕫進對帝問以今日急務咨䕫言進君子退小人開誠心布公道因乞召用崔與之真德秀魏了翁帝納之命咨䕫與王遂並拜御史咨䕫謂遂曰朝無臺諌久矣要當極本原而先論之乃上疏曰臣歷考往古治亂之原權歸人主政出中書天下未有不治權不歸人主則簾陛無分綱常且不立奚政之問政不出中書則腹心無寄必轉而他屬奚權之攬此八政馭羣臣所以獨歸之王而詔之者必天官冢宰也陛下親政以來威福操柄收還掌握揚廷出令震撼海宇天下始知有吾君元首既明股肱不容於自惰撤副封罷先行坐政事堂以治事天下始知有朝廷此其大權大政亦纍舉矣然中書之弊端其大者有四一曰自用二曰自專三曰自私四曰自固願陛下於從容論道之頃宣示臣言俾大臣充初志而加定力懲往轍而圖方來以仰稱勵精更始之意時樞密院編修官陳塤亦上言天下之安危在宰相南渡以來屢失機會秦檜死所任不過万俟禼沈該耳韓托胄死所任不過史彌逺耳此今日所當謹也次言內庭當嚴宦官之禁外庭當嚴臺諌之選於是宦者陳洵益隂中之監察御史王定劾塤出知常州塤史彌逺之甥紹定初嘗言乞去君側之蠱媚以正主德從天下之公論以新庶政蓋指賈妃及彌逺也彌逺謂塤曰吾甥殆好名耶塤曰好名孔孟所取也夫求士於三代之上惟恐其好名求士於三代之下惟恐其不好名耳遂力辭職直聲動一時端平元年春正月祕書郎蔣重珍上五事且曰隱蔽君德昔咎故相故臣得以專詆權臣昭明君德今在陛下故臣得以責難君父乞召真德秀魏了翁用之帝謂之曰人主之職無他惟辨君子小人重珍對曰君子指小人為小人小人亦指君子為小人此為難辨人主當精擇人望處之要津正論日聞則必知君子姓名小人情狀矣重珍每草奏必齊心盛服有密啓手書削藁帝嘉其忠實冬十月召真德秀為翰林學士魏了翁直學士院時江淮帥閫有進取中原之議德秀上封事言移江淮兵甲以守無用之空城運江淮金穀以治不耕之廢壤富庶之效未期根本之弊立見惟陛下審之重之進德秀為户部尚書入見帝謂曰卿去國十年每切思賢德秀以大學衍義進因言于帝曰天之所助者順人之所助者信陛下欲祈天永命惟存乎敬而已敬者德之聚儀狄之酒南威之色盤遊弋射之娛禽獸狗馬之玩有一於此皆足害敬今天心厭亂久矣陛下儻能敬德以迓續休命中原終為吾有若徒以力求之而不反其本天意難測臣實憂之了翁入對首乞明君子小人之辨以為進退人材之本以杜姦邪窺伺之端次論故相十失猶存次及修身齊家選宗賢建內小學等皆切於上躬者又言和議不可信北軍不可保軍實財用不可恃凡十餘端復口奏利害晝漏下四十刻而退帝皆嘉納之時又召徐僑為太常少卿趣入覲手疏數千言皆感憤剴切帝慰諭之顧見僑衣履垢弊愀然謂曰卿可謂清貧僑對曰臣不貧陛下乃貧耳帝曰朕何為貧僑曰陛下國本未建疆宇日蹙權幸用事將帥非才旱蝗相仍盜賊並起經用無藝帑藏空虗民困於橫斂軍怨於掊尅羣臣飬交而天子孤立國勢阽危而陛下不悟臣不貧陛下乃貧耳又言今女謁閹宦相為囊槖誕為二豎以朘國膏肓而執政大臣又無和緩之術陛下不此之慮而耽樂是從世有扁鵲將望見而却走矣時貴妃閻氏方有寵而內侍董宋臣表裏用事故僑及之帝為之感動明日手詔罷邊帥之尤無狀者申警羣臣以朋黨為之戒命有司裁節中外浮費而賜僑金帛甚厚僑固辭不受二年三月以真德秀參知政事以疾辭除資政殿大學士提舉萬壽宫德秀奏言息民講武上嘉納之五月真德秀卒德秀立朝不滿十年奏疏將數十萬言皆切當世要務直聲震朝廷四方人士誦其文想見其風采及宦遊所至惠政深洽不愧其言由是中外皆頌都城人時驚傳澒洞奔擁出關曰真直院至矣果至則又填塞聚觀不置史彌逺以是忌之輒擯不用而聲聞愈彰且慨然以斯文自任不因學禁之餘而少有疑沮後學宗之晚年帝始有意向用而德秀遽殞天下以為恨十一月以魏了翁同僉書樞密院事十二月以魏了翁往江淮京湖督視軍馬了翁在朝凡六月前後二十餘疏皆當世急務帝將引與共政而忌者相與合謀排擯之且言了翁知兵體乃命出視師賜便宜詔書如張浚故事陛辭御書唐嚴武詩及鶴山書院四大字賜之了翁開幕府於江州以吳濳為參謀官趙善瀚馬光祖為參議官三年二月召魏了翁還時廷臣多忌了翁故謀假出督以外之再二旬復以建督為非召之還而帝不悟於是了翁固辭求去夏四月魏了翁罷了翁乞歸田里不允以資政殿學士知潭州殿中侍御史李韶上疏曰了翁刻志學問幾四十年忠言讜論載在國史比者樞庭之詔未幾改鎮未久有㫖豫祠不知國家人材炳然有稱如了翁者幾人願亟召還處以台輔不報帝時又召崔與之以為參知政事不至與之自成都乞歸廣州每有除命皆力辭不起及拜廣東安撫㑹摧鋒軍士作亂縱火惠陽郡長驅至廣州城聲言欲得連帥幕屬甘心焉與之肩輿登城叛兵望之俯伏聽命而散因即家治事帝注想彌切召參大政與之力辭帝乃遣使趣之且訪以政事之當行罷者人材之當用舍者與之上疏曰天生人才自足以供一代之用惟辨其君子小人而已忠實而有才者上也才雖不髙而忠實有守者次也用人之道無愈於此蓋忠實之才謂之有德而有才者也若以君子為無才必欲求有才者用之意嚮或差名實無别則君子小人消長之勢基於此矣陛下勵精更始擢用老成然以正人為迂濶而疑其難以集事以忠言為矯激而疑其近於好名任之不專信之不篤或謂世教將衰則人才先已凋謝如真德秀洪咨䕫魏了翁方進柄用相繼而去天意固不可曉至于敢諌之臣忠於為國言未脫口斥逐隨之一去而不可復留人才豈易得而輕棄如此陛下悟已往而圖方來昨以直言去位者亟加峻擢補外者蚤與召還使天下明知陛下非疏逺正人非厭惡忠言一轉移力耳陛下收攬大權悉歸獨斷謂之獨斷者必是非利害胸中卓然有定見而後獨斷以行之比聞獨斷以來朝廷之事體愈輕寄相進擬多沮格不行或除命中出而宰相不與知立政造命之原失其要矣大抵獨斷當以兼聽為先儻不兼聽而獨斷其勢必至於偏聽實為亂階威令雖行於上而權柄濳移於下矣又曰邊臣主和朝廷雖知而未嘗明有施行憂邊之士剴切獻言一鳴輒斥得非朝廷亦隂主之乎假使和而可保亦當議而行之可也又曰比年以來變故層出盜賊跳梁雷雹震驚星辰乖異皆非細故京城之災七年而兩見豈數萬戶生靈皆獲罪於天者百姓有過在豫一人此陛下所當凛凛惟有求直言可以禆助君德感格天心又曰戚畹舊寮凡有絲髮夤緣者孰不乘間俟隙以求其所大欲近習之臣朝夕在側易於親昵而難於防間司馬光謂內臣不可令其採訪外事及問以羣臣能否蓋干預之門自此始也若謂其所問出於無心豈知愛惡之私因此而入其於聖德能無玷乎帝覽奏嘉歎趣召愈力與之控辭至於十三疏不許三年九月鄭清之喬行簡罷召崔與之為右丞相兼樞密使復辭不至十一月以魏了翁知紹興兼浙東安撫使未幾了翁卒史嵩之起復理宗紹定五年春正月以史嵩之為京湖安撫制置使知襄陽府端平元年六月以入蔡功加史嵩之兵部尚書九月京湖制置使史嵩之罷三年二月以史嵩之為淮西制置使嘉熙二年二月詔史嵩之以參知政事督視京西荆湖南北路江西軍馬置司鄂州三年春正月以史嵩之為右丞相兼樞密使督視兩淮四川京湖軍馬嵩之既相一時正人如杜範游侣劉應起李韶趙汝騰等皆以不合逐去王萬首上疏論嵩之謂其事體迫遽氣象傾搖太學生欲趣其歸則賄賂之迹已形或謂有族人發其私事肆為醜詆者以相國大臣而若此非書之所謂大臣矣時嵩之與喬行簡李宗勉並相當國論者謂喬失之泛李失之狹史失之專淳祐四年六月禮部進士徐霖以宰相史嵩之挾邊功要君植黨顓國上疏歷言其姦深之狀以為其先也奪陛下之心其次奪士大夫之心而其甚也奪豪傑之心今日之士大夫嵩之皆變化其心而收攝之矣且其變化之術甚深非彰彰然號於人使之為小人也常於善類擇其質柔氣弱易以奪之者親任一二其或稍有異已則潜棄而擯逺之以風其餘彼柔弱者始雖欲為君子終以名節之尊不足易富貴之願而義利之辨亦終暗於妻妾宫室之私則亦從之而已此嵩之變化士大夫之術舉朝皆受其聾瞽鮮有不為其所欺也於凡善則歸已過則歸君入以告於陛下者惟窺測上情承順風㫖出以語於人則曰某事吾所調停也某人吾所斡旋也是嵩之要譽於下而陛下叢怨於上也古人所謂斯謀斯猷惟我后之德者嵩之曷嘗有哉不報九月癸卯史嵩之以父病謁告許之甲辰史彌忠卒詔史嵩之起復右丞相兼樞密使中外莫敢言於是太學生黃愷伯金九萬孫翼鳯等百四十四人叩閽上書曰臣等竊謂君親等天地忠孝無古今事親孝故忠可移於君自古求忠臣必於孝子之門未有不孝而可望其忠也宰我問三年之喪於夫子而曰期可已矣夫子曰豫之不仁也子生三年然後免於父母之懷夫三年之喪天下之通喪也豫也有三年之愛於其父母乎夫宰豫朞年之請夫子猶以不仁斥之未聞有聞父母欲亡之病而不之問聞父母已亡之訃而不之奔有人心天理者固如是乎是不特無三年之愛於其父母且無一日之愛於其父母矣宰豫得罪於聖人而嵩之者則又宰豫之罪人也此天地所不覆載日月所不照臨鬼神之所共殛天下萬世公論之所共誅其所為去禽獸不逺矣且起復之說聖經所無而權宜變化衰世始有之我朝大臣若富弼一身佩社稷安危進退係天下輕重所謂國家重臣不可一日無者也起復之詔凡五遣使弼以金革變禮不可用於平世卒不從命天下至今稱焉至若鄭居中王黼輩頑忍無恥固持祿位甘心起復絶滅天理卒以釀成靖康之禍往事可鑒也彼嵩之何人哉心術回邪蹤跡詭祕曩者開督府以和議惰將士心以厚資竊宰相位羅天下之小人為之私黨奪天下之利權歸之私室蓄謀積慮險不可測在朝廷一日則貽一日之禍在朝廷一歲則貽一嵗之憂萬口一辭惟恐其去之不速也嵩之亡父以速嵩之之去中外方以為快而陛下起復之命已下矣陛下姑曰大臣之去不可不留也嵩之不天聞訃不行乃徘徊牽引彌縫貴戚買囑貂璫轉移上心夤緣御筆必得起復之札然後徐徐引去大臣佐天子以孝治天下孝不行於大臣是率天下而為無父之國矣鼎鐺尚有耳嵩之豈不聞富弼不受起復之事乎而乃忍為鄭居中王黼輩之所為邪禮子聞父母之喪見星而行見星而舍今嵩之視父死如路人方經營內引搖尾乞憐暨奸謀已遂乃始就道初不見其有憂戚之容夫以無父之嵩之而陛下必欲起復之者為其有折衝萬里之才歟嵩之本無捍衛封疆之能徒有劫制朝廷之術彼國內亂骨肉相殘天使之也嵩之貪天之功以欺陛下其意以為三邊雲擾非我不足以制彼也殊不知敵情叵測非嵩之之所能制嵩之徒欲以制敵之名以制陛下耳陛下所以起復嵩之者謂其有經理財用之才歟嵩之本無足國裕民之能徒有私自豐殖之計且國之利源鹽策為重今鈔法屢更利之歸於國者十無一二而聚之於私帑者已無遺算國家之土壤日削而嵩之之田宅益廣國家之帑藏日虗而嵩之之囊槖日厚陛下眷留嵩之將以利吾國也殊不知適以貽無窮之害爾嵩之敢於無忌憚而經營起復為有彌逺故智可以效尤然彌逺所喪者庶母也嵩之所喪者父也彌逺奔喪而後起復嵩之起復之後而後奔喪以彌逺貪黷固位猶有顧藉丁艱於嘉定改元十一月之戊午起復於次年五月之丙申未有如嵩之匿喪罔上殄滅天常如此其慘也且嵩之之為計亦姦矣自入相以來固知二親耄矣必有不測旦夕以思無一事不為起復張本當其父未死之前已預為必死之地近畿總餉本不乏人而起復未卒哭之馬光祖京口守臣豈無勝任而起復未經喪之許堪故里巷為十七字之謡也曰光祖作總領許堪為節制丞相要起復援例夫以里巷之小民猶知其奸陛下獨不知之乎臺諫不敢言臺諫嵩之爪牙也給舍不敢言給舍嵩之腹心也侍從不敢言侍從嵩之肘腋也執政不敢言執政嵩之羽翼也嵩之當五內分裂之時方且擢姦臣以司㗋舌謂其必無陽城毁麻之事也植私黨以據要津謂其必無惠卿反噬之虞也自古大臣不出忠孝之門席寵怙勢之於三世未有不亡人之國者漢之王氏魏之司馬氏是也史氏秉鈞今三世矣軍旅將校惟知有史氏天下士大夫惟知有史氏而陛下之左右前後亦惟知有史氏陛下之勢孤立於上甚可懼也天欲去之而陛下留之堂堂中國豈無君子獨信一小人而不悟是陛下欲藝祖三百年之天下壞於史氏之手而後已臣方涕泣裁書適觀麻制有曰趙普當乾德開創之初勝非在紹興艱難之際皆從變禮迄定武功夫擬人必於其倫曾於奸深之嵩之而可與趙普諸賢同日語邪趙普勝非在相位也忠肝貫日一德享天生靈倚之以為命宗社賴之以為安我太祖髙宗奪其孝思俾之勉陳王事所以為生靈宗社計也嵩之自視器局何如勝非且不能企其萬一况可匹休趙普耶臣愚所謂擢姦臣以司㗋舌者此其驗也臣又讀麻制有曰諜諗憤兵之聚邊傳哨馳之騎况秋髙而馬肥近冬寒而地凛方嵩之虎踞相位之時諱言邊事通川失守至踰月而後聞壽春有警至危急而後告今圖起復乃密諭詞臣昌言邊警張皇事勢以恐陛下蓋欲行其劫制之謀也臣愚所謂擢姦臣以司㗋舌者又其驗也竊觀嵩之自謂宰相動欲守法至於身乃跌蕩於禮法之外五刑之屬三千其罪莫大於不孝若以法繩之雖置之鈇鉞猶不足謝天下况復置諸具瞻之位其何以訓天下後世耶臣等於嵩之本無宿怨私忿所以爭趨闕下為陛下言者亦欲揭綱常於日月重名教於丘山使天下為人臣為人子者死忠死孝以全立身之大節而已孟軻有言學則三代共之皆所以明人倫也臣等久被教育此而不言則人倫掃地將與嵩之胥及溺矣惟陛下裁之不報武學生翁日善等六十七人京學生劉時舉王元野黃道等九十四人上書略曰天下有一日不可廢之人倫人心有一日不可泯之公論大倫之盡廢固不足為亂臣賊子羞公論之不泯所以為宗廟社稷慮先儒謂事親之情可奪則事君之情亦可奪正以不忠實原於不孝無父後至於無君此理之必然也陛下拳拳於嵩之之不忍釋者豈以秋風向邇冬寒又迫非嵩之素諳敵情熟識邊事莫能當此寄耶然臣等不憂敵國之勢盛而憂陛下之勢孤昔者金人之盛十倍韃靼吾國之專政者秦檜爾檜死而金亮南來兵號百萬孰不束手無䇿時宰臣陳康伯以靜定運廟謨詞臣虞允文以忠義鼓士氣竟能致采石之捷成誅亮之功檜之死而有陳康伯虞允文孰謂嵩之之去而無如康伯允文者耶惟是陛下所進今不知其亡凡當世傑特之士皆銷落於嵩之排擯之餘如王萬謝方叔以爭不勝最先去游侣以大政不使聞而激之去劉應起以轉對直言去張蟠以轉對觸諱去劉漢弼以臺論攻嵩之之黨去趙與權以才名軋已而嗾逐斥去李韶以侍從數嵩之之專柄去王伯大以意向不合去趙汝騰以麻詞無佞語隂摘其小疵而遣去徐榮叟趙葵皆墮其機穽去别之傑號為長厚又以每事必問本末假托而擠之去杜範尤為簡聖眷負人望上前敢論諍遇事有分决則又用李鳴復而速其去竊聞其時太學九士扣閽上疏乞罷鳴復而留範九士囊封未徹於宸旒之聽而親管之門生已入臺端矣庸邪小人奉承唯謹即今司寮交章論範陛下所藉以為耳目心腹者皆盡空於嵩之之一網陛下雖居九重身處佚愈傍無可謀之人外無入告之益是以獨善之清躬游於史氏之黨局君父至此天下謂何宗學生與寰等三十四人上書略曰肅讀麻制私竊有疑陛下謂其修法度能服逺人能運掉三邊能發蹤百將又謂嵩之可以慰中外之望凡此數者必非陛下之意乃嵩之之腹心小人之無忌憚者為陛下之㗋舌也嵩之不孝上徹於天弔者在門賀者在閭即欲捨苫塊而坐廟堂脫衰經而被公衮是可忍也孰不可忍也縱使陛下屬念史氏則公圭旄節魚鱗雜襲陛下之恩亦至矣而嵩之今乃一日不肯釋相位者其意將安底止耶惟陛下决去大奸則社稷幸甚建昌軍學教授盧鉞皆上書切諌亦不報諸生乃榜於太學齊廊云丞相朝入諸生夕出諸生夕出丞相朝入時范鐘劉伯正暫領相事惡京學生言事謂皆遊士鼓倡之諷京伊趙與歡逐遊士諸生聞之作捲堂文辭先聖以出曰天之將喪斯文實係興衰之運士亦何負於國遽罹斥逐之辜靜言思之良可醜也慨祖宗之立國廣學校以儲才非惟衍豐芭以遺後人抑亦隆漢都而尊國士肆惟皇上克廣前猷炳炳宸奎釐為四學戔戔束帛例及諸生䝉教育以如天恨補報之無地但思粉骨寧畏觸鱗盡言安石之奸共惜元城之去實惟公議不利小人始隂諷其三緘終盡打於一網不任其咎咎歸於君是誠何心空人之國昔鄭僑且謂毁校不可而李斯尚知逐客為非彼既便已行之吾亦何顔居此厄哉吾道告爾同盟無見義而不為當行已而有恥苟為飽暖忍貪周粟之羞相與携持母蹈秦坑之慘斯言既出明日遂行京尹遂盡削遊士籍時將作監徐元杰適輪對言臣前日進侍經筵親承聖問以大臣史嵩之起復臣奏陛下出命太輕人言不可沮抑陛下自盡陛下之禮大臣自盡大臣之禮玉音賜俞臣又何所容喙今觀學校之書使人感歎且大臣讀聖賢書畏天命畏人言家庭之變哀戚終事禮制有常臣竊料其何至於忽送死之大事輕出以犯清議哉前日朝廷出命之易士論所以凛凛者實以陛下為四海綱常之主大臣身任道揆扶翊綱常者也自聞大臣有起復之命雖未知其避就若何凡有父母之心者莫不失聲涕零是果何為而然人心天理誰實無之興言及此非可使聞於鄰國也陛下烏得而不悔悟大臣烏得而不堅忍臣懇懇納忠何敢詆訐特為陛下愛惜民彞為大臣愛惜名節而已疏出朝野傳頌帝亦察其忠亮冬十月以劉漢弼為左司諫時史嵩之久擅國柄帝亦患苦之乃夜降御筆黜四不才臺諫於是諫議大夫劉晉之侍御史王瓉監察御史龔基先胡清獻皆罷去故漢弼乃有是命漢弼首贊帝曰拔去隂邪庶可轉危為安否則是非不兩立邪正不並進陛下雖欲收召善類不可得矣帝嘉納之十一月徐元杰復上疏論史嵩之起復士論紛然乞許其舉執政自代帝曰學校雖是正論但言之太甚元杰對曰正論乃國家元氣今正論猶在學校要當保飬一線之脉因乞引去左司諫劉漢弼亦上言願聽嵩之終喪亟選賢臣蚤定相位又論馬光祖奪情總賦淮東乃嵩之預為引例之地乞勒令追服以補名教會嵩之亦自知不為衆論所容上疏乞終制帝乃許之五年六月工部侍郎徐元杰暴卒先是史嵩之既去元老舊德次第收召及杜範入相復延元杰議政多所禆益是月朔日元杰當侍立先一日謁范鐘歸是夕執大作夜四鼓指瓜忽裂以死三學諸生相繼伏闕上言昔小人傾君子者不過使之死於蠻煙瘴雨之鄉今蠻煙瘴雨不在嶺外而在朝廷詔付臨安府鞠治常所給使之人獄迄無成劉漢弼亦每以姦邪未盡屏汰為慮未幾以腫疾暴死太學生蔡德潤等百七十有三人復叩闕上書訟寃詔給元杰漢弼官田五百畞緡錢五千恤其家時杜範入相八十日卒元杰漢弼相繼暴死時謂諸公皆中毒堂食無敢下筯者嵩之從子璟卿嘗上書諫嵩之曰自開督府東南民力困於供需州縣倉卒困於應辦輦金帛挽芻粟絡繹道路一則曰督府二則曰督府不知所幹者何事所成者何功近聞蜀川不守議者多歸退師於鄂之失何者分戍列屯僃邊禦敵首尾相援如常山之蛇維江則有趙葵廬江則有杜伯虎金陵則有别之傑為督府者宜據鄂渚形勝之地西可以援蜀東可以援淮北可以鎮荆湖不此之圖盡捐藩籬深入堂奧坐使飢民叛將乘虗搗危侵軼於沅湘搖蕩於鼎澧恐江陵之勢既孤則武昌之勢未易守荆湖之路稍警則江浙諸郡焉得髙枕而卧况殺降失信則前日徹疆之計不可復用矣內地失護則前日清野之䇿不可復施矣此隙一開東南生靈直几上肉耳宋室南渡之疆土安能保其金甌之無闕也為今日計莫若盡去在幕之羣小悉召在野之君子相與改絃易轍戮力王事庶幾失之東隅收之桑榆不然見失而不知救視非而不知革天下大勢駸駸日趨於危亡之域矣無何璟卿暴卒相傳嵩之致毒云十年十二月史嵩之服除有進用之意殿中侍御史章琰正言李昻英監察御史黃師雍翰林學士李韶抗疏論之乃命嵩之致仕詔不復用董宋臣丁大全之姦理宗寶祐三年五月以宦者董宋臣幹辦佑聖觀宋臣逢迎上意起梅堂芙蓉閣香蘭亭强奪民田引倡優入宫招權納賄無所不至人以董閻羅目之監察御史洪天錫上疏言天下之患三曰宦官外戚小人蓋指宋臣及謝堂厲文翁也帝俾天錫易疏欲自戒飭之天錫又言自古姦人雖憑怙其心未嘗不畏人主之知若知之而止於戒飭則憑怙愈張不若未知之愈也不報六月以丁大全為右司諌大全鎮江人面藍色為戚里婢壻夤緣閻妃及內侍盧允升董宋臣遂得寵於帝自蕭山尉纍拜右司諫時正言陳大方侍御史胡大昌與大全同除人目為三不吠犬戊子罷監察御史洪天錫時雨土天錫以其異為䝉力言隂陽君子小人之辨又言蜀中地震閩浙大水上下窮空逺近嗟怨獨貴戚巨閹享富貴耳舉天下窮且怨陛下能獨與數十人者共天下乎會吳民列訴宦官董宋臣奪其田天錫下其事有司而御前提舉所謂田屬御莊不當白臺儀鸞司亦牒常平天錫謂御史所以雪寃常平所以均若中貴人得以控之則內外臺可廢猶謂國有紀綱乎乃申劾宋臣併慮允升及言修內司止於供膳修比年動曰御前姦贓之老吏逋逃之渠凶一竄名其間則有司不得舉手狡者獻謀暴者助虐其展轉受害者皆良民也願無使史臣書之曰內司之橫自今始疏六七上悉留中不報天錫遂去宗正寺丞趙崇嶓移書責丞相謝方叔不能正救而讒者又曰天錫之論方叔意也於是監察御史朱應元劾謝方叔及參知政事徐清叟罷之董宋臣盧允升猶以為未快厚賂人上書力詆洪天錫謝方叔且乞誅之使天下明知宰相臺諫之去出自獨斷於內侍無預遂出方叔提舉洞霄宫四年六月丁大全逐右丞相董槐槐自以為人主所振拔可以利安國家者無不為嘗言於帝有害吏者三一戚里不奉法二執法大吏久於其官而擅威福三皇城司不檢士將師不檢下故士卒橫士卒橫則變生於無時執法擅威福故賢不肖混淆賢不肖混淆則奸邪肆賢人伏而不出親戚不奉法故法令輕法令輕故朝廷卑三者不去政且日廢願自上除之於是嫉之者滋甚時帝年寖髙操柄獨斷羣臣無當意者漸喜狎佞人丁大全方諂事內嬖竊㺯威權帝弗覺悟大全嘗遣客私於槐槐曰吾聞人臣無私交吾惟事上不敢私結約幸為謝丁君大全度槐終不容己乃日夜刻求槐短槐入對極言大全邪佞不可近帝曰大全未嘗短卿卿勿疑槐曰臣與大全何怨顧陛下拔臣至此臣知大全奸邪而噤不言是負陛下也且陛下謂大全忠而臣以為奸不可與共事陛下矣上書乞骸骨不報大全益怨之乃上章劾槐章未下大全夜半以臺檄調隅兵百餘人露刃圍槐第驅迫之出紿令輿槐至大理寺欲以此脅之須㬰出北闕棄槐嘂呼而散槐徐步入接待寺罷相之制始下物論殊駭三學生屢上書言之乃詔槐以觀文殿大學士提舉洞霄宫大全既逐槐益恣橫道路以目太學生陳宜中黃鏞林則祖曾唯劉黻陳宗六人上書攻之大全怒使御史吳衍劾之削其籍編管逺州立碑三學戒諸生勿得妄議國政士論翕然稱宜中等號為六君子左司郎中陳宗禮見大全擅柄以言為諱嘆曰此可一日居乎陛對言願為宗社大計毋但為倉廩府庫之小計願得天下四海之心毋但得左右便嬖戚畹之心願寄腹心於忠良無但寄耳目於卑近願四通八達以來正人母但旁蹊曲徑類引貪濁不納十一月以丁大全簽書樞密院事馬天驥同簽書院事時閻妃怗寵大全天驥用事有無名子書八字於朝門曰閻馬丁當國勢將亡十二月罷知嚴州吳槃帝以御寶黃冊催內藏坊場錢槃奏言內庫理財太急督促太峻龍章鳯篆施於帑藏之催科寶冊泥封下同官吏之文檄居萬乘之崇髙而商財賄之有無事雖至微關係甚大董宋臣諷臺諫劾罷之六年夏四月以丁大全為右丞相兼樞密使開慶元年春正月國子監主簿徐宗仁伏闕上書曰賞罰者軍國之綱紀賞罰不明則綱紀不立今天下如器之欹而未墜於地存亡之機固不容髮兵虗將惰而力匱財殫環視四境類不足恃而所恃以維持人心奔走豪傑者惟陛下賞罰之微權在耳權在陛下而陛下不知所以用之則未墜者安保其終不墜乎臣竊為此懼久矣陛下當危急之時出金幣賜土田授節鉞公爵秩尺寸之功在所必賞故當悉心效力圖報萬分而自出兵越江踰廣以來未聞有死封疆戰陳者豈賞罰不足以勸懲之耶今通國之所謂佚罰者乃丁大全袁玠沈翥張鎮吳衍翁應弼石正則王立愛髙鑄之徒而首惡則董宋臣也是以廷紳抗疏學校叩閽至有欲借尚方劔為陛下除惡而陛下乃釋而不問豈真欲愛護此數人而重拂千萬人之心哉今天下之事勢急矣朝廷之紀綱壞矣若誤國之罪不誅則用兵之士不勇東南一隅已半壞於此數人之手而罰不損其毫毛彼方擁厚資挾聲色髙卧華屋而使陛下與二三大臣焦心勞思可乎三軍之在行者豈不憤然不平曰稔禍者誰歟而使我捐軀兵革之間百姓之罹難者豈不羣然胥怨曰召亂者誰歟而使我流血鋒鏑之下陛下亦嘗念及此乎不報宗仁又極論宋臣盤固日久䝉蔽日深不誅且誤國竟不報冬十月丁大全罷時䝉古侵軼日甚大全當國匿不以聞至是罷相以觀文殿大學士判鎮江府中書舍人洪芹繳奏言大全鬼蜮之資穿窬之行引用凶惡陷害忠良遏塞言路濁亂朝綱乞追官逺竄以伸國法御史朱貔孫等相繼論大全姦回險狡狠害貪殘假陛下之刑威以箝天下之口挾陛下之爵祿以籠天下之財饒虎臣又論其絶言路壞人才竭民力誤邊防四罪詔致仕景定元年夏四月出內侍董宋臣於安吉州三年十一月竄丁大全於新州道死公田之置理宗淳祐六年十一月殿中侍御史謝方叔言豪強兼併之患至今日而極非限民名田有所不可是亦救世道之微權也國朝駐蹕錢塘百有二十餘年矣外之境土日荒內之生齒日繁權勢之家日盛兼併之習日滋百姓日貧經制日壞上下煎迫若有不可為之勢所謂富貴操柄者若非人主之所得專識者懼焉夫百萬生靈資生飬之具皆本於菽粟而菽粟之産皆出於田今百姓膏腴皆歸貴勢之家租米有及百萬石者小民百畝之田頻年差充保役官吏誅求百端不得已則獻其産於巨室以規免役小民田日减而保役不休大官田日增而保役不及以此弱之肉強之食兼并浸盛民無以遂其生於斯時也可不嚴立經制以為之防乎去年諫官嘗以限田為說朝廷付之悠悠不知今日國用邊餉皆仰和糴然權勢多田之家和糴不容以加之保役不容以及之敵人睥睨於外盜賊窺伺於內居此之時與其多田厚資不可長保曷若捐金助國共紓目前在轉移而開導之耳乞諭二三大臣托臣僚諭奏而行之使經制以定兼併以塞于以尊朝廷裕國計陛下勿牽貴近之言以搖初意大臣勿避仇怨之多而廢良䇿帝從之按方叔此疏蓋置公田之漸故載於此景定四年二月賈似道當國以國計困於造楮富民困於和糴思有以變法而未得其說知臨安府劉良貴浙西轉運使吳勢卿獻買公田之䇿似道乃命殿中侍御史陳堯道右正言曹孝慶監察御史虞毖張希顔上疏言三邊屯列非食不飽諸路和糴非楮不行既未免於廩兵則和糴所宜廣圖既不免於和糴則楮幣未容緒造為今日計欲便國便民而辦軍食重楮價者莫若行祖宗限田之制以官品計頃以品格計數下兩浙江東西和糴去處先行歸併詭析後將官户田産逾限之數抽三分之一回買以充公田但得一千萬畝之田則每歲可收六七百萬之米其於軍餉沛然有餘可免和糴可以餉軍可以住造楮幣可平物價可安富室一事行而五利興矣帝從之詔買公田置官田所以劉良貴提領通判陳訔為檢閲副之良貴請下都省嚴立賞罰究歸併之弊獨徐經孫條具其害似道諷御史舒有開劾之罷歸浙西安撫魏克愚言取四路民田立限回買所以免和糴而益邦儲議者非不自以為公且忠也然未見其利而適見其害近給事中徐經孫奏言江西買田之弊甚詳若浙西之弊則尤有甚於經孫所言者因歷述為害者八事踈奏不省未幾帝手詔曰永免和糴無如買逾限之田為良法然東作方興權俟秋成續議施行似道憤然上疏求去復諷何夢然陳堯道曹孝慶抗章留之且勸帝下詔慰勉帝乃趣似道出視事且曰當始於浙西諸路視之為則似道具陳其制帝悉從之二省奉行惟謹似道首以己田在浙西者萬畝為公田倡榮王與苪繼之趙立奎自陳投賣由是朝野無敢言者六月庚申詔平江江隂安吉嘉興常州鎮江六郡已買公田三百五十餘萬畝今秋成在邇其荆湖江西諸道仍舊和糴丙寅詔公田竣事進劉良貴等官初買官田猶有抑強嫉富之意繼而敷𣲖除二百畝以下者免餘各買三分之一其後雖百畝之家亦不免立價以租一石償十八界㑹子四十而浙西之田石租有直千緡者亦就此價價錢稍多則給銀絹各半又多則給以度牒告身准直登仕郎誥准三十楮將仕郎誥准千楮許赴漕試校尉誥准萬楮承信郎誥准萬五千楮承節郎誥准二萬楮安人誥准四千楮孺人誥准二千楮民失實差而得虗誥吏又恣為操切浙中大擾民之破家失業者甚衆官吏有奉行不至者劉良貴輒劾之追毁出身永不收敘由是有司爭以多買為功似道又以陳訔往秀湖廖邦傑往常潤催督其六郡買田有專官平江則包恢成公䇿嘉興則潘墀李補焦煥炎安吉則謝奕趙與訔王唐圭馬元演常州則洪穮劉子庚鎮江則章坰郭夢熊江隂則楊班黃伸恢在平江至以肉刑從事邦傑在常州害民特甚至有本無田而以歸併抑買自經者朝廷惟以買公田為功詔進良貴官兩轉餘進秩有差五年三月賈似道言公田已成若復以州縣總之恐害不除而利不可久請以江隂平江公田𨽻浙西憲司安吉嘉興公田𨽻兩浙運司鎮江公田𨽻總所每歲租輸之官倉特與减饒二分或水旱則别議放數仍立四分司以主管公田每鄉置官莊一所民為官耕者曰官佃為官督者曰莊官以富饒者充應兩歲一更初買時上下迎合惟欲買數之多凡六七斗皆作一石及租收有虧則以其額取足於田主遂為無窮之害秋七月甲戍彗星見詔許中外直言臺諌士庶多上書以為公田不便民間愁怨所致於是賈似道上疏力辨乞避位帝曰言事易任事難自古然也使公田之說不可則卿建議之始朕已沮之矣惟其公私兼濟所以舉意行之今業已成矣一歲之軍餉仰給於此若遽因人言罷之雖可决一時之異議如國計何卿既任事亦當任怨禮義不愆何恤人言知臨安府劉良貴亦以人言籍籍自陳括田之勞乞從罷免不允由是公論頓沮九月賈似道請行經界推排法於諸路由是江南之地尺寸皆有稅民力益困度宗咸淳三年十二月司農卿李鏞言經界嘗議修明矣而修明卒不行嘗今自實矣而自實卒不竟豈非上之任事者每欲避理財之名下之害成者又每倡為擾民之說故寧坐視邑政之壞而不敢詰猾吏奸民之欺寧忍取下户之苛而不敢受豪家大姓之怨蓋經界之法必多差官吏必悉集都保必遍走阡陌必盡量步畝必審定等色必細折計等奸弊轉生久不迄事乃若推排之法不過以縣統都以都統保選任財富公平者訂田畝稅色載之圖冊使民有定産産有定稅稅有定籍而已臣守吳門已嘗見之施行今聞紹興亦漸就緒湖南漕臣亦以一路告成竊謂東南諸郡皆奉行惟謹其或田畝未實則令鄉局釐正之圖冊未則令縣局程督之又必郡守察縣之稽遲監司察郡之怠弛嚴其號令信其賞罰期之秋冬以竟其事責之年歲以課其成如周官日成月要歲㑹以綜核之於是詔諸路漕帥施行焉大抵南渡後水田之利富於中原故水利大興而諸籍沒田募民耕者皆仍私租舊額每失之重輸納之際公私事例迥殊私租額重而納輕公租額重而納亦重則佃者不堪命州縣胥吏與倉庫執事人皆得為侵漁之計金人乍和乍戰戰則軍須浩繁和則歲幣重大國用常苦不繼於是因民苦官租之重命有司括賣官田以給用其初弛其力役以誘之其終不免於抑配此官田之弊也嘉定以後又有所謂安邊所田收其租以助歲幣後又限民名田買其限外所有謂之公田初議欲省和糴以輸民力而其弊極多其租尤重迄於宋亡遺患猶不息云宋史紀事本末卷二十五
