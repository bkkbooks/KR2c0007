body:
  text: 宋史紀事本末卷四明馮琦原編陳邦瞻增輯天書封祀真宗景德三年二月罷冦凖平章事出知陜州凖為相用人不以次同列頗不悅他日除官同列目吏持例簿以進凖曰宰相所以進賢退木肖若用例一吏職耳自澶淵還頗矜其功帝待準甚厚王欽若深嫉之一日會朝凖先退帝目送之欽若因進曰陛下敬凖為其有社稷功耶帝曰然欽若曰澶淵之役陛下不以為恥而謂凖有社稷功何也帝愕然曰何故欽若曰城下之盟春秋恥之澶淵之舉以萬乘之貴而為城下之盟何恥如之帝愀然不悅欽若曰陛下聞博乎博者輸錢欲盡乃罄所有出之謂之孤注陛下冦準之孤注也斯亦危矣由是帝顧準寖衰竟罷為刑部尚書出知陜州初張詠在成都聞凖入相謂僚屬曰冦公竒材惜學術不足爾及凖知陜詠適自成都還凖送之郊問曰何以教我詠徐曰霍光傳不可不讀也準莫諭其意歸取其傳讀之至不學無術笑曰此張公謂我也未幾移準知天雄軍契丹使過大名謂凖曰相公望重何故不在中書準曰主上以朝廷無事北門鎖鑰非準不可耳大中祥符元年春正月乙丑有天書見於承天門大赦改元帝自聞王欽若言深以澶州之盟為辱常怏怏不樂欽若度帝厭兵因謬進曰陛下以兵取幽薊乃可滌此恥帝曰河朔生靈始免兵革朕安忍為此可思其次欽若曰惟封禪可以鎮服四海誇示外國然自古封禪當得天瑞希世絶倫之事乃可爾既而又曰天瑞安可必得前代蓋有以人力為之者惟人主深信而崇奉之以明示天下則與天瑞無異也陛下謂河圖洛書果有耶聖人以神道設教耳帝沈思久之曰王旦得無不可乎欽若曰臣喻以聖意宜無不可欽若乃乘間為旦言旦黽勉從之帝尚猶豫會幸祕閣驟問直學士杜鎬曰古所謂河出圖洛出書果何事耶鎬老儒不測上旨漫應之曰此聖人以神道設教爾帝意遂決遂召旦飲歡甚賜以尊酒曰歸與妻孥共之既歸發封則皆美珠也旦悟帝旨自是不敢有異議至是帝謂羣臣曰去冬十一月庚寅夜將半朕方就寢忽室中光耀見神人星冠絳衣告曰來月宜於正殿建黃籙道場一月當降天書大中祥符三篇朕竦然起對已復無見自十二月朔即齋戒於朝元殿建道場以佇神貺至是適皇城司奏有黃帛曵左承天門南鴟尾上令中使視之帛長二丈許緘物如書卷纒以青縷封處隱隱有字蓋神人所謂天降之書也旦等皆再拜稱賀帝即步至承天門瞻望再拜遣二內侍升屋奉之下旦跪進帝再拜受之親置輿中導至道場授陳堯叟啓封帛上有文曰趙受命興於宋付於眘居其器守於正世七百九九定帝跪受復命堯叟讀之其書黃字三幅詞類洪範道德經始言帝能以至孝至道紹世次諭以清淨簡儉終述世祚延永之意讀訖帝復跪奉韞以所緘帛盛以金匱羣臣入賀於崇政殿賜宴帝與輔臣皆蔬食遣官告天地宗廟社稷大赦改元羣臣加恩賜京師酺五日改左承天門為承天祥符置天書儀衛扶侍使有大禮即命宰執近臣兼之欽若之計既行陳堯叟陳彭年丁謂杜鎬益以經義附和而天下爭言祥瑞矣獨龍圖閣待制孫奭言於帝曰以臣愚所聞天何言哉豈有書也帝默然三月詔議封禪宰相王旦等率文武百官諸軍將校官吏藩夷僧道耆壽二萬四千三百餘人凡五上表請帝封禪帝意未決召丁謂問以經費謂對曰大計有餘議乃定命翰林太常詳定儀注先是西北用兵帝便殿延訪多至旰食王旦嘆曰我輩安得坐致太平優遊無事耶宰相李沆曰強敵外患足為警戒他日四方寧謐朝廷未必無事旦以為不然沆又日取四方水旱盜賊奏之旦以為細事不足煩帝聽沆曰人主少年當使知四方艱難不然血氣方剛不留意聲色犬馬則土木兵甲禱祠之事作矣至是其言果驗夏四月乙未以王欽若參知政事丙申以王旦為封禪大禮使王欽若等為經度制置使馮拯陳堯叟為分掌禮儀使丁謂等計度財用謂時權三司使遂著景德會計録以獻因條大禮經費以備參校優詔奬之六月乙未王欽若至乾封上言泰山醴泉出錫山蒼龍見未幾木工董祚於醴泉亭北見黃帛曵林木上有字不能識言於皇城使王居正居正見其上有御名馳告欽若欽若奉至社首跪授中使馳捧詣闕帝御崇政殿趣召羣臣曰朕五月丙子夜復夢向者神人言來月上旬當賜天書於泰山即密諭欽若等凡有祥異即上聞今果與夢協上天眷祐惟懼不稱王旦等再拜稱賀乃迎奉含芳園之正殿帝齋戒備法駕詣殿拜受之授陳堯叟啓封其文曰汝崇孝奉吾育民廣福錫爾嘉瑞黎庶咸知祕守斯言善解吾意國祚延永壽厯遐歲讀訖復奉以升殿於是羣臣表上尊號曰崇文廣武儀天尊道寶應章感聖明仁孝皇帝未幾欽若獻芝草八千本趙安仁獻五色金玉丹紫芝八千七百餘本諸州上芝草嘉禾瑞木三脊茅等不可稱紀九月令有司勿奏大辟案以天書告於太廟乙酉親習封禪儀於崇德殿作玉清詔應宫奉天書也知制誥王曾都虞候張旻皆上疏諫不聽冬十月辛卯帝發京師以玉輅載天書先道凡十七日至泰山王欽若等獻芝草三萬八千餘本齋戒三日登山道經險峻降輦步進鹵簿儀衛列於山下享昊天上帝於圜臺陳天書於左以太祖太宗配命羣臣享五方帝及諸神於山下封祀壇帝飲福酒攝中書令王旦跪稱曰天賜皇帝太一神符周而復始永綏兆人三獻畢封金玉匱王旦奉玉匱置於石䃭攝太尉馮拯奉金匱以降將作監領徒封䃭帝登圜臺閲視訖還御幄宰相率從官稱賀明旦禪祭皇地祗於社首山如封祀儀禮畢御壽昌殿受群臣朝賀大赦天下文武並進秩令開封府及所過州軍考送舉人賜天下酺三日改乾封縣為奉符縣大宴穆清殿又宴泰山父老於殿門十一月戊午帝過曲阜縣謁孔子廟酌獻再拜近臣分奠七十二弟子遂幸孔林加諡孔子曰玄聖文宣王祭以太牢賜錢三十萬帛三百匹又追諡齊太公望為昭烈武成王周文公旦為文憲王太公立廟青州周公立廟曲阜尋復追封孔子廟配享從祀者顔回為兖國公閔損曾參及漢儒左丘明以下為郡公侯伯丁丑帝自泰山奉天書還宫羣臣爭頌功德惟進士孫籍獻書言封禪帝王之盛事願陛下謹於盈成不可遂自滿假知制誥周起亦上言天下之勢常患恬於逸安而忽於兢畏願毋以告成為恃十二月辛卯帝御朝元殿受尊號宰相王旦等各進秩有差二年二月以方士王中正為左武衛將軍先是汀州人王捷言於南康遇道人姓趙氏授以丹術及小鐶神劍蓋司命真君也是為聖祖宦者劉承圭以聞賜捷名中正得對龍圖閣既東封加聖祖號為司命天尊授中正左武衛將軍恩遇甚厚十二月辛丑權三司使丁謂上封禪祥瑞圖示百官於朝堂自封禪之後士大夫爭奏符瑞獻贊頌崔立獨言水發徐兖旱連江淮無為烈風金陵大火是天所以戒驕矜也而中外多上雲霧草木之瑞此何足為治道言哉不省三年六月河中府進士薛南及父老僧道千二百人請祀后土於汾隂八月丁未詔明年春有事於汾隂戊申以知樞密院事陳堯叟為祀汾隂經度制置使以王旦為大禮使王欽若為禮儀使冬十月庚申丁謂上大中祥符封禪記十二月陜州言黃河清集賢校理晏殊獻河清頌帝作奉天庇民述示宰相四年春正月辛巳以將祀汾隂詔執事懈怠者罪勿原是時大旱京師近郡榖踊貴龍圖閣待制孫奭上疏曰先王卜征五年歲習其祥祥習則行不習則增修德而改卜陛下始畢東封更議西幸殆非先王卜征五年慎重之意其不可一也夫汾隂后土事不經見昔漢武帝將封禪故先封中嶽祠汾隂始巡幸郡縣遂有事於泰山今陛下既已登封復欲幸汾隂其不可二也古者圓丘方澤所以郊祀天地今南北郊是也漢初承秦唯立五畤以祀天而后土無祀故武帝立祠於汾隂自元成以來從公卿之議遂徙汾隂后土於北郊後之王者多不祀汾隂今陛下已建北郊乃舍之而逺祀汾隂其不可三也西漢都雍去汾隂至近今陛下經重關越險阻輕棄京師根本而慕西漢之虛名其不可四也河東唐王業之所起也唐又都雍故明皇間幸河東因祀后土聖朝之興事與唐異而陛下無故欲祀汾隂其不可五也昔者周宣王遇災而懼故詩人美其中興以為賢主比年以來水旱相繼陛下宜側身修德以答天譴豈宜下徇姦回逺勞民庶盤遊不已忘社稷之大計其不可六也夫雷以二月啓蟄八月收聲育養萬物失時則為異今震雷在冬為異尤甚此天意丁寧以戒陛下而反未悟殆失天意其不可七也夫民神之主也是以聖王先成民而後致力於神今國家土木之功纍年未息水旱洊沴飢饉居多乃欲勞民事神神其享之乎其不可八也陛下必欲為此者不過效漢武帝唐明皇巡幸所至刻石頌功以崇虛名夸示後世爾陛下天資聖明當慕二帝三王何為下襲漢唐之虛名其不可九也唐明皇以嬖寵姦邪內外交害身播國危兵交闕下亡亂之迹如此由狃於承平肆行非義稔致禍敗今議者引開元故事以為盛烈乃欲倡導陛下而為之臣切為陛下不取其不可十也臣言不逮意陛下以臣言為可取願少賜清問以畢臣説帝遣內侍皇甫繼明就問又上疏曰陛下將幸汾隂而京師人心不寧江淮之衆困於調發理須鎮安而矜存之且土木之功未息而奪攘之盜公行外國治兵不逺邊境使者雜至寧可保其心乎昔陳勝起於徭戍黃巢出於凶飢隋煬帝勤逺略而唐高祖興於晉陽晉少主惑小人而耶律德光長驅中國陛下俯從姦佞逺棄京師涉仍歲薦飢之墟修違經久廢之祠不念民疲不恤邊患安知今日戍卒無陳勝飢民無黃巢姦雄將無窺伺於肘腋外敵將無觀釁於邊陲乎先帝嘗議封禪寅畏天災尋詔停寢今姦臣乃贊陛下力行東封以為繼成先志先帝嘗欲北平幽朔西取繼遷大勳未集用付陛下則羣臣未嘗獻一謀畫一策以佐陛下繼先帝之志者反務卑辭重幣求和於契丹蹙國縻爵姑息於繼遷曾不思主辱臣死為可戒誣下罔上為可羞撰造祥瑞假託鬼神才畢東封便議西幸輕勞車駕虐害飢民冀其無事往還便謂成大勳績是陛下以祖宗艱難之業為姦邪僥幸之資臣所以長歎而痛哭也夫天地神祗聰明正直作善降之百祥作不善降之百殃未聞專事籩豆簠簋可邀福祥春秋傳曰國之將興聽於民將忘聽於神愚臣非敢妄議惟陛下終賜裁擇時羣臣爭奏祥瑞奭又上言方今野雕山鹿並形奏簡秋早冬雷率皆稱賀退而腹非竊笑者比比皆是孰謂上天為可罔下民為可愚後世為可欺乎人情如此所損不細惟陛下深鑒其妄帝知其忠而不能從乙酉帝習祀后土儀丙申詔以六月六日天書再降日為天貺節丁酉奉天書發京師二月壬子車駕出潼關渡渭河遣近臣祀西嶽癸丑次河中府丁巳至寶鼎縣辛酉祀后土地祗壬戍大赦賜天下酺三日作汾陰配饗銘河瀆四海贊召草澤李瀆劉巽瀆以足疾辭再拜遣使存問瀆自陳世本儒墨習靜避世之意瀆素嗜酒人或勉之答曰扶羸養疾捨此莫可從吾所好以盡餘年不亦樂乎巽至授大理評事乙巳次華州召見隱士鄭隱李寧賜茶果粟帛辛未至閿鄉召見道士柴又玄問以無為之要三月甲戌次陜州遣陜令王希召草澤魏野辭疾不至上言麋鹿之性頓纓則狂望回過聽許令愚守詔長吏常加存撫命工圖其所居觀之野居陜之東郊架草堂有水竹之勝好彈琴作詩以清苦聞於時常以詩諷冦準王旦乞休帝故不強其出己卯次西京丙申謁諸陵夏四月甲辰朔帝至自汾陰宰相親王以下進秩有差九月辛卯以向敏中等為五嶽奉册使加上五嶽帝號帝御朝元殿發册五年八月作會靈觀奉祀五嶽戊子以王欽若陳堯叟並為樞密使丁謂參知政事馬知節為樞密副使時天下乂安王欽若丁謂導帝以封祀眷遇日隆欽若自以深逹道教多所建明而謂附會之與陳彭年劉承圭等搜講墜典大修宫觀以林特有心計使為三司使以幹財利五人交通蹤迹詭祕時號五鬼王旦欲諫則業已同之欲去則上遇之厚追思李沆之先識嘆曰李文靖真聖人也欽若狀貌短小項有附疣時人目為癭相性傾巧敢為矯誕然智數過人每朝廷有興作能委曲遷就以中帝意知節以衆方競言祥瑞深不然之每言於帝曰天下雖安不可忘戰去兵也冬十月戊午帝語輔臣曰朕夢神人傳玉皇之命云先令汝祖趙玄朗授汝天書今令再見汝明日復夢神人傳聖祖言吾座西斜設六位以候是日即於延恩殿設道場五鼓一籌先聞異香頃之黃光滿殿聖祖至朕再拜殿下俄有六人至揖聖祖皆就坐聖祖命朕前曰吾人皇九人中一人也是趙之始祖再降乃軒轅黃帝後唐時復降主趙氏之族今已百年皇帝善為撫育蒼生無怠前志即離座乘雲而去王旦等皆再拜稱賀詔天下避聖祖諱玄為元朗為明凡載籍偏犯者各缺其點畫尋以玄元聲相近改玄為真玄武為真武巳未大赦閏十月己巳上聖祖尊號曰聖祖上靈高道九天司命保生天尊大帝聖母懿號曰元天大聖后遂加太廟六室尊號羣臣上帝尊號曰崇文廣武感天尊道應真佑德上聖欽明仁孝皇帝戊寅建景靈宫太極觀於壽丘以奉聖祖聖母且詔天下天慶觀並增建聖祖殿辛巳詔建康軍鑄玉皇聖祖太祖太宗尊像尋以丁謂為奉迎使奉安於玉清昭應宫帝率百官郊謁又詔刻天書於宫以王旦為刻玉使王欽若與丁謂副之戊子御製配享樂章並二舞名文曰發祥流慶武曰隆真觀德十一月丙申帝親祀玉皇於朝元殿甲辰加王旦門下侍郎向敏中中書侍郎內外官加恩置玉清昭應宫使以王旦為之丁未作汴水發願文十二月戊辰作景靈宫於京師奉聖祖也六年春正月癸巳朔司天監言五星同色六月亳州官吏父老三千三百人詣闕請謁太清宫八月庚申詔來春親謁太清宫庚午加上太上老君混元上德皇帝孫奭上疏曰陛下封泰山祀汾隂躬謁陵寢今又將祠於太清宫外議籍籍以謂陛下事事慕效唐明皇豈以明皇為令德之主耶甚不然也明皇禍敗之迹有足為深戒者非獨臣能知之近臣不言者此懷姦以事陛下也明皇之無道亦無敢言者及奔至馬嵬軍士已誅楊國忠請矯詔之罪乃始諭以識理不明寄任失所當時雖有罪已之言覺寤已晚何所及也臣願陛下早自覺寤抑損虛華斥逺邪佞罷興土木不襲危亂之迹無為明皇不及之悔此天下之幸社稷之福也帝以為封泰山祠汾隂上陵祠老子非始於明皇開元禮今世所循用不可以天寶之亂舉謂為非也秦無道甚矣今以官名詔令郡縣猶襲秦舊豈以人而廢言乎作解疑論以示羣臣然知奭朴忠雖其言切直容之而弗斥七年春正月帝將如亳州謁老子命王旦兼大禮使丁謂兼奉祀經度制置使陳彭年副之壬寅奉天書發京師丙午次奉元宫判亳州丁謂獻白鹿一芝九萬五千本戊申王旦上混元上德皇帝册寶己酉謁老子於太清宫升亳州為集慶軍節度減歲賦十之三太史言含譽星見庚戍賜酺三日二月辛酉帝至自亳州壬申祀天地大赦十一月乙酉玉清昭應宫成初議營宫料工須十五年修宫使丁謂令以夜繼晝每繪一壁給二燭故七年而成凡二千六百一十楹制度宏麗屋宇少不中程式雖金碧已具劉承圭必令毁而更造有司莫敢較其費八年春正月壬午朔謁玉清昭應宫奉安刻玉天書於寶符閣以帝容立侍其側還御崇德殿受賀赦天下非十惡枉法贓咸除之帝製誓文刻石置於寶符閣下又製欽承寶訓述以示中外九月知陳州張詠卒遺表言不當造宫觀竭天下之財傷生民之命此皆賊臣丁謂誑惑陛下乞斬謂頭置國門以謝天下然後斬詠頭置丁氏之門以謝謂帝歎其忠九年春正月丙辰置會靈觀使以丁謂為之天禧元年春正月辛丑朔改元詣玉清昭應宫薦獻上玉皇大天帝寶册衮服壬寅上聖祖寶册己酉上太廟諡册辛亥謝天地於南郊大赦御天安殿受册號乙卯作欽承寶訓述示羣臣三月以王曾兼會靈觀使曾辭不受王欽若方挾符瑞以固寵位隂排異已者會有詔以曾為會靈觀使曾以推欽若帝不悅謂曾曰大臣宜傅會國事何遽自異耶曾頓首曰君從諫謂明臣盡忠謂義陛下不知臣駑病使待罪宰府臣知義而已不知異也九月癸卯王曾罷曾既不受會靈觀使上意不懌王欽若數譖之會曾市賀皇后家舊第其家未徙而曾令人舁土置其門賀氏訴於朝遂罷曾政事王旦在告聞之曰王君介然他日德望勳業甚大顧豫不得見爾或請其故曰王君昨讓觀使雖怫上旨而詞直氣和了無所懾且始被進用已能若是我自在政事二十年每進對稍忤即蹙蹜不能自容以是知其偉度矣己酉王旦卒旦自祥符以來每有大禮輒奉天書以行常悒悒不樂臨終語其子曰我别無過惟不諫天書一節為過莫贖我死之後當削髮披緇以斂諸子欲奉遺命楊億以為不可乃止議者謂旦得君言聽計從而不能以正自終或比之馮道云二年夏皇城司言保聖營之西南營卒有見龜蛇者因就建真武祠今泉湧祠側疫癘者飲之多愈詔即其地建祥源觀任布上疏言不宜以神怪衒愚俗不報三年六月甲午王欽若罷判杭州以寇準同平章事丁謂參知政事先是巡檢朱能挾內侍都知周懷政詐為天書降於乾祐山時冦準判永興軍壻王曙居中與懷政善勸準與能合遂以上聞詔迎入禁中中外皆識其詐帝獨信之諭德魯宗道言姦臣誕妄以惑聖聽知河陽孫奭上疏曰朱能者姦險小人妄言祥瑞而陛下崇信之屈至尊以迎拜歸祕殿以奉安上自朝廷下及閭巷靡不痛心疾首反脣腹非而無敢言者昔漢文成將軍以帛書飯牛既而言牛腹中有竒書殺視得書天子識其手迹又有五利將軍妄言方多不讐二人皆坐誅先帝時有侯莫陳利用者以方術暴得寵用一旦發其姦誅於鄭州漢武可謂雄材先帝可謂英斷唐明皇得靈寶符上清護國經寶劵等皆王鉷田同秀等所為明皇不能顯戮怵於邪説自謂德實動天神必福我夫老君聖人也儻實降語固宜不妄而唐自安史亂離乘輿播越兩都蕩覆四海沸騰豈天下太平乎明皇雖僅得歸闕復為李輔國劫遷卒以憂終豈聖壽無疆長生久視乎以明皇之英睿而禍患猥至曾不知者良由在位既久驕亢成性謂人莫已若謂諫不足聽心玩居常之安耳熟導諛之説內惑寵嬖外任姦回曲奉鬼神過崇妖妄今日見老君於閣上明日見老君於山中大臣尸祿以將迎端士畏威而緘默既惑左道即紊政經民心用離變起倉卒當是之時老君寧肯禦兵寶符安能排難耶今朱能所為或類於此願陛下思漢武之雄材法先帝之英斷鑒明皇之召禍庶幾災害不生禍亂不作皆不聽寇準由是得召用矣時欽若恩禮衰商州捕得道士譙文易畜禁書能以術使六丁六甲神欽若坐與之出入遂罷以準代相準之始召也門生有勸準者曰公若至河陽稱疾堅求外補此為上䇿儻入見即發乾祐天書之詐斯為次也最下則再入中書大喪平生矣準不懌乾興元年二月戊午帝崩冬十月葬永定陵以天書殉史臣曰真宗英悟之主其初踐位相臣李沆慮其聰明必多作為數奏災異以杜其侈心蓋有所見也及澶淵既盟封禪事作祥瑞沓臻天書屢降導迎奠安一國君臣如病狂然吁可怪也他日修遼史見契丹故族而後推求宋史之微言焉宋自太祖幽州之敗惡言兵矣契丹其主稱天其后稱地一歲祭天不知其幾獵而手接飛鴈鴇自投地皆稱為天賜祭告而誇耀之意者宋之諸臣因知契丹之習又見其君有厭兵之意遂進神道設教之言欲假是以動敵人之聽聞庶幾足以潛消其窺覦之志歟然不思修本以制敵又效尤焉計亦末矣仁宗以天書殉葬山陵嗚呼賢哉仁宗天聖七年六月大雨震雷玉清昭應宫災詔繫守衛者於御史獄太后泣對大臣曰先帝尊天奉道故竭力成此宫今一夕延燎幾盡惟長生崇壽二小殿存何以稱遺旨哉范雍抗言曰不若悉燔之也先朝以此竭天下之力遽為灰燼非出人意如因其所存又將葺之則民不堪命非所以祗天戒也王曾吕夷簡又助雍言中丞王曙亦言玉清昭應宫之建非應經義天變來警願除其地罷諸禱祀以應天變右司建范諷復言此實天變不當置獄太后與帝感悟遂減守衛者罪下詔不復修治以二殿為萬壽觀罷諸宫觀使丁謂之姦真宗天禧三年六月以冦準同平章事丁謂參知政事先是準與謂善嘗薦其才於李沆沆不用準問之沆曰謂誠才顧其為人可使之在人上乎準曰如謂者相公終能抑之使在人下乎沆笑曰他日當思吾言準終不以為然謂既因準稱譽漸致通顯雖同列而事準甚謹嘗會食中書羹汚準鬚謂徐起拂之準笑曰參政國之大臣乃為官長拂鬚耶謂大慙恨遂成仇隙四年六月丙申冦準罷時帝得風疾事多決於皇后冦準李迪以為憂一日準請間曰皇太子人所屬望願陛下思宗廟之重傳以神器擇方正大臣羽翼之丁謂錢惟演佞人也不可以輔少主帝然之準密令楊億草表請太子監國且欲援億輔政已而準被酒漏言謂聞之曰即日上體平朝廷何以處此李迪曰太子出則撫軍入則監國古之制也何不可之有謂力譖準請罷其政事帝不記與準有成言竟罷為太子太傅丙寅以李迪同平章事馮拯為樞密使庚午以丁謂馮拯並同平章事癸酉入內都知宦者周懷政伏誅丁丑貶冦準知相州初帝得疾自疑不起嘗卧周懷政股與之謀欲命太子監國懷政東宫官也出告冦準已而事泄準罷丁謂等因踈斥之使不得親近懷政憂懼不自安隂謀奉帝為太上皇而傳位太子罷皇后預政殺丁謂而復相準客省使楊崇勳等以其謀告謂謂即微服夜乘犢車挾崇勳詣曹利用議明日以聞詔命曹瑋訊之懷政具服帝怒甚欲責及太子羣臣莫敢言李迪從容奏曰陛下有幾子乃欲如是帝悟乃止誅懷政謂與皇后謀并發朱能天書妖妄事遂貶準為太常卿知相州而罷翰林學士盛度樞密直學士王曙朝士與準親厚者皆斥之準之貶也帝命與小州謂輒云與逺小州迪言向者聖旨無逺字二人忿爭蓋始此八月乙酉以任中正王曾並參知政事錢惟演為樞密副使壬寅貶冦準為道州司馬時遣使捕朱能能殺中使擁衆叛未幾衆潰自殺準坐是再貶道州初帝欲謫準江淮間謂竟除道州同僚莫敢言王曾獨以帝語質之謂顧曰居停主人勿復言蓋指曾嘗以第舍假準也九月帝疾愈丙辰始御崇德殿視事治朱能黨死流者數十人壬戌給事朱巽郎中梅詢坐不察朱能姦謫官十一月戊辰李迪丁謂罷時丁謂擅權用事至除吏不以聞迪憤然謂同列曰迪起布衣至宰相有以報國死猶不恨安能附權幸為自安計耶會議二府皆進秩兼東宫官迪以為不可謂又欲引林特為樞副迪復沮之謂積怒既而謂加門下侍郎兼太子太傅迪加尚書左丞仍兼太子少傅故事宰相無兼左丞者及入對長春殿內出制書置榻前帝謂輔臣曰此卿等兼東宫官制也迪進曰東宫官屬不當增置臣不敢受命也謂罔上弄權私林特錢惟演而嫉冦準特子殺人事寢不治準無罪逺謫惟演以皇后姻家使預朝政曹利用馮拯相為朋黨臣願與謂俱罷付御史臺劾正帝怒留制不下左遷迪知鄆州謂知河南府明日謂入謝帝詰所爭狀謂對曰非臣敢爭乃迪詈臣耳願復留遂自出傳口詔復入中書視事時翰林學士劉筠已草迪謂同罷制既而謂復留命草制筠不奉詔乃更召學士晏殊草之筠自院出遇殊於樞密院南門殊惶愧側面不敢與揖謂既復位益擅權專恣筠曰姦人用事安可一日居此力請補外遂知廬州庚午詔自今軍國大事仍舊親決餘皆委皇太子同宰相樞密等參議施行太子固讓不允遂開資善堂親政皇后裁決於內而丁謂用事中外以為憂王曾謂錢惟演曰太子幼非中宫不能立中宫非倚太子則人心亦不附后若加恩太子則太子安太子安則劉氏安矣惟演乘間言之后深納焉陳邦瞻曰當國家危疑之勢定社稷安人主此天下之所謂大忠也然而非智不濟夫轉户者係樞智者於安危之際亦能得其樞而轉之耳方宋真宗之寢疾也事皆決於劉后而太子非后出丁謂以姦邪亂政錢惟演復以后戚佐之一有搖動則宋事去矣當時冦準李迪皆忠臣其計皆在逐謂與演而后乃可制后可制而太子乃可安也夫此䇿而濟已非善處人母子之間且慮無以善其後此策而不濟則禍豈可測哉周懷政之死太子得不廢者特天幸也夫當時不難逐謂而難於安后之心后心不安則吕武之事且復見姦人之欲為謂者皆是也可盡逐哉后心安則去謂如孤豚腐鼠耳善乎王曾之告惟演也曰太子幼非中宫不能立中宫非倚太子則人心亦不附后若加恩太子則太子安太子安則劉氏安矣夫后直懼劉氏之不安耳非有則天改姓易命之志也彼曉然知太子安而已安豈忍復為邪謀也哉蓋自是而小人僥幸之計始不得入則曾之一言有以深動其心也然是言也非由惟演進則后不信是又曾之所以為智也萊公號為能斷大事然於此不如沂公逺矣以丁謂兼太子少師馮拯兼少傅曹利用兼少保五年十一月丁謂加司空馮拯加左僕射曹利用加右僕射時謂威權日盛朝臣多附之起居注李垂獨不往謁或問其故垂曰謂為宰相不以公道副天下望而恃權怙勢視若所為必遊朱崖吾不欲在其黨中謂聞而惡之罷知亳州乾興元年二月庚子大赦癸卯羣臣上尊號甲辰封丁謂為晉國公馮拯為魏國公曹利用為韓國公甲辰帝不豫增劇問左右曰吾目中何久不見冦準羣臣畏謂威莫敢言戊午帝崩遺詔太子受益柩前即位更名禎王曾奉遺詔入殿廬草制命皇后權處分軍國事輔太子聽政丁謂欲去權字曾曰皇帝沖年太后臨朝斯已國家否運稱權猶足示後且增減制書有法表則之地先欲亂之耶謂遂止太子即位年十三矣尊皇后為皇太后淑妃楊氏為皇太妃兩府議太后臨朝儀曾請如東漢故事太后與帝五日一御承明殿太后坐殿右垂簾聽政謂欲擅權不欲同列與聞機政潛結入內押班雷允恭密請太后降手書云帝朔望見羣臣大事則太后召對輔臣決之非大事則令允恭傳奏禁中畫可以下曾曰兩宫異處而柄歸宦官禍端兆矣於是允恭恃勢專恣而謂權傾中外衆莫敢抗獨曾正色立朝時倚為重庚申命丁謂為山陵使戊辰貶寇準為雷州司户參軍李迪為衡州團練副使先是先帝臨崩惟言冦準李迪可託丁謂怨準而太后憾迪嘗諫立已遂誣以朋黨貶之連坐者甚衆曹瑋亦謫知萊州初議竄逐王曾疑責太重謂熟視曾曰居停主人尚有言乎恐亦未免耳曾遂不復爭學士呈制草謂改曰當醜徒干紀之際屬先帝違豫之初罹此震驚遂致沉劇且使人迫迪行或語謂曰迪若貶死公如士論何謂曰異日諸生記事不過曰天下惜之而已謂必欲令二人死遣中使齎敕詣準就賜以錦囊貯劍於馬前示將誅戮狀至道州衆皆惶恐不知所為準方與郡官宴飲神色自若使人謂之曰朝廷若賜準死願見敇書使不得已乃授敇準拜於庭升階復宴至暮乃罷丁謂欲邀蔡齊附己許以知制誥齊退而歎曰吾受先帝之知至此豈宜為權臣所脅得罪非吾懼也遂拒不往己酉命參知政事王曾按視山陵庚申內侍雷允恭伏誅丁謂任中正罷時允恭為都監判司天監邢中和言於允恭曰今山陵上百步法宜子孫類汝州秦王墳但恐下有石有水耳允恭曰上無他子若如秦王墳何不可中和曰山陵事重踏行覆按動經月日恐不及七月之期耳允恭曰第移就上穴我走馬入見太后言之允恭素貴橫人不敢違即改穿上穴乃入白太后曰此大事何輕易如此允恭曰使先帝宜子孫何為不可太后意不然曰出與山陵使議可否允恭出與丁謂言謂唯唯允恭入奏山陵使亦無異議遂命夏守恩領工徒數萬穿地土石相半繼之以水衆議日喧懼不能成功中作而罷奏請待命丁謂庇允恭依違不決內使毛昌逹自陵下還以其事聞詔問謂謂始請遣使按視既而咸請復用舊地乃詔馮拯曹利用等就丁謂第議遣王曾覆視曾還請獨對因言丁謂包藏禍心令允恭移皇堂於絶地太后大驚怒甚欲併誅謂馮拯進曰謂固有罪然帝新即位亟誅大臣駭天下耳目后怒稍解遂止誅允恭等二日太后召宰相諭曰丁謂為宰相乃與宦者交通謂前附允恭奏事皆言已與卿等定議故皆可之且營奉先帝陵寢而擅有遷易幾誤大事拯等對曰自先帝登遐政事皆謂與允恭同議稱得旨禁中臣等莫敢辨虛實賴聖神察其姦此宗社之福也任中正獨進曰謂被先帝顧托雖有罪請如律議功曾曰丁謂以不忠得罪宗廟尚可議耶乃降授謂太子少保分司西京并罷中正出知鄆州故事黜宰相皆降制時欲亟行止召舍人草詞仍榜朝堂宣諭天下初謂舉進士客許田胡則厚遇之及謂貴顯則驟進用至是謂罷則亦出為西京轉運使改命馮拯為山陵使辛未以王曾同平章事丙子以錢惟演為樞密使辛卯貶丁謂為崖州司户參軍初女道士劉德妙嘗以巫師出入丁謂家謂敗逮繫德妙內侍鞫問之德妙具言丁謂嘗教之曰汝所為不過巫事不若託老君以言禍福足以動人於是即謂家設神像夜醮於園中雷允恭數至請禱及真宗崩引入禁中又因穿地得龜蛇令德妙持入內紿言出其家山洞中仍教云上即問若所事何知為老君第云相公非凡人當知之丁謂又作頌題曰混元皇帝賜德妙語涉妖誕遂貶謂崖州籍其家得四方賂遺不可勝紀謂赴崖州道出雷州冦準使人以一蒸羊逆諸境上謂欲見準準固辭之準聞家僮謀欲報讐乃杜門使縱博毋得出俟謂行逺乃已謂機敏有智謀憸狡過人及居崖州專事浮屠因果之説家寓西京嘗為書自克責敘國厚恩戒家人毋輒怨望遣人至於洛守劉燁祈付其家戒使者會衆僚時逹之燁得書不敢私即以上聞太后與帝見之感惻遂徙雷州十一月丁卯錢惟演罷初惟演見丁謂當國權勢燻灼因附之與為婚姻冦準之斥惟演有力焉及序樞密題名獨削去準姓氏曰逆準不書御史中丞蔡齊言於帝曰冦準忠義聞天下社稷之臣也豈可為姦黨所誣哉帝遽令磨去之謂得罪惟演慮將及已因擠謂以自解馮拯以是惡其為人因言惟演以妹妻劉美乃太后姻家不可與機政以廢祖宗之法請罷之乃以保大節度使知河陽府踰年入朝意圖執政御史鞠詠上疏論之太后遣內侍持奏示惟演惟演猶顧望不行詠語右司諫劉隨曰若相惟演當取白麻廷毁之惟演始亟去惟演出於勳貴文辭清麗名與楊億劉筠相上下於書無所不讀尤喜奬勵後進嘗曰吾平生不足者惟不得於黃紙上押字故切切求入中書為時議所鄙明肅莊懿之事真宗景德四年四月皇后郭氏崩諡曰莊穆大中祥符三年四月甲戌皇子受益生後宫李氏所誕也李氏杭州人初入宫侍劉德妃莊重寡言帝命為司寢既有娠從帝臨砌臺玉叉墜帝私卜叉完當生男子左右取叉以進如故已而果舉子劉德妃攘為己子李不敢言中外亦不知五年十二月丁亥立德妃劉氏為皇后初后父通為虎捷都指揮使從征太原道卒后在襁褓而孤鞠於外氏善播鼗蜀人龔美者以煆銀為業攜之至京師年十五入襄邸帝即位自美人進位德妃專寵後宫郭后崩帝欲立之翰林學士李迪言妃起於寒微不可以母天下帝不從竟立為后后既立以無宗族更以美為兄改其姓為劉聞李迪之諫大恨之后性警敏曉書史聞朝廷事能記其本末帝退朝閲天下封奏多至中夜后皆預聞宫闈事有問輒援引故實以對帝深重之由是漸干外政初帝欲立劉后使丁謂諭楊億草制億難之謂曰勉為此不憂不富貴億曰如此富貴亦非所願也乃命他學士草之乾興元年二月戊午帝崩太子即位尊皇后為皇太后淑妃楊氏為皇太妃三月庚寅帝初御崇德殿太后設幄次於承明殿垂簾以見輔臣八月乙巳太后同帝御承明殿垂簾聽政仁宗天聖元年五月庚寅議皇太后儀衛制同乘輿三年春正月辛卯長寧節近臣及契丹使上太后壽於崇政殿五年春正月壬寅朔帝率羣臣朝太后於會慶殿先是帝白太后欲元日先上太后壽乃受朝太后不可王曾奏曰陛下以孝奉母儀太后以謙全國體請如太后令帝不從太后嘗問參知政事魯宗道曰唐武后何如主對曰唐之罪人也幾危社稷后默然有小臣方仲弓請立劉氏七廟后問諸輔臣衆不敢對宗道獨進曰若立劉氏七廟如嗣君何乃止后嘗與帝同幸慈孝寺欲乘輦先行宗道以夫死從子之義爭之后遽命輦後乘輿自是后左右用事者多憚宗道目為魚頭參政七年十一月癸亥冬至帝率百官上皇太后壽於會寧殿遂同御太安殿以受朝祕閣校理范仲淹先期上疏曰天子奉親於內自有家人禮今顧與百官同列北面而朝虧君體損主威非所以垂法後世也疏入不報晏殊初薦仲淹為館職聞之大懼召仲淹詰以狂率邀名且將纍薦者仲淹正色抗言曰仲淹繆辱公薦每懼不稱為知已羞不意今日反以忠直獲罪門下殊不能答既而又疏請太后還政亦不報遂乞補外出為河中府通判八年二月范仲淹疏請太后復辟其略云陛下擁扶聖躬聽斷大政日月持久今皇帝春秋已盛睿哲明聖握乾綱而歸坤紐非黃裳之吉象也豈若保慶壽於長樂卷收大權還上真主以享天下之養疏入不報明道元年二月丁卯真宗宸妃李氏卒李氏實生帝太后既取帝為己子與楊太妃保護之李氏默然處先朝嬪御中未嘗自異人畏太后亦無敢言者以是帝雖春秋長不自知為李氏出也至是疾革乃自順容進位宸妃及卒太后欲以宫人禮治喪於外吕夷簡奏禮宜從厚太后遽引帝起有頃復獨立簾下召夷簡問曰一宫人死相公云云何也夷簡對曰臣待罪宰相事無內外皆當預也后怒曰相公欲離間吾母子耶夷簡對曰太后不欲全劉氏乎尚念劉氏則喪禮宜從厚司天希旨言歲月未利夷簡祕其説請發哀成服且謂入內都知羅崇勳曰宸妃誕育聖躬而喪不成禮異日必有受其罪者莫謂夷簡今日不言也當以后服殮用水銀實棺后悟乃以一品禮殮之時有詔欲鑿宫城垣以出喪夷簡言鑿垣非喪禮宜自西華門出太后從之殯於洪福院二年二月乙巳皇太后欲被服天子衮冕以享太廟薛奎力諫且曰必御此若何為拜后不聽服儀天冠衣衮初獻皇太妃亞獻皇后終獻禮畢羣臣上太后尊號丁未帝祀先農於東郊躬耕籍田命宰相張士遜撰謝太廟及躬耕籍田記檢討朱郊言皇太后謁廟非後世法乃止撰籍田記三月庚寅以皇太后不豫大赦除常赦所不原者乾興以來貶死者復官謫者內徙甲午皇太后崩稱制十一年雖政出宫闈而號令嚴明恩威加天下左右近習少所假借宫掖間未嘗妄改作內外賜豫有節賜族人御食必易以扣器曰尚方器勿使入吾家也三司使程琳獻武后臨朝圖后擲於地曰吾不作此負祖宗事漕使劉綽還京西言在庾有出賸糧千餘斛乞付三司后問曰卿識王曾張知白吕夷簡曾宗道乎此四人者豈因獻羡餘進哉晚年稍進外家而任宦者羅崇勳江德明等訪外事崇勳由此勢傾中外至是后崩帝見左右泣曰太后疾不能言猶數引其衣若有所屬何也薛奎曰其在衮冕也服之豈可見先帝於地下帝悟遂以后服殮諡曰莊獻明肅舊制后皆二諡稱制加四諡自此始太后遺詔尊太妃為皇太后與皇帝同議軍國事閣門趣百僚賀御史中丞蔡齊目臺吏毋追班而入白執政曰上春秋長習知天下情偽今宜躬攬朝政豈可使女后相踵稱制乎殿中侍御史龎籍請下閣門取垂簾儀制盡焚之乃止尊太妃為皇太后削去同議軍國事之語夏四月壬寅左右有為帝言陛下乃李宸妃所生妃死以非命帝號慟纍日下詔自責追尊為皇太后諡莊懿幸洪福寺祭告易梓宫親啓視之妃以水銀故玉色如生冠服如皇后帝歎曰人言其可信哉待劉氏加厚壬子帝始親政罷創修寺觀裁抑僥幸召宋綬范仲淹而黜內侍羅崇勳等中外大悅以范仲淹為右司諫仲淹聞遺詔以楊太妃為皇太后參決國事亟上疏言太后母號也未嘗因保育而代立者今一太后崩又立一太后天下且疑陛下不可一日無母后之助也時已刪去參決等語然太后之號訖不改止罷其册命而已初太后愛帝如己出帝亦盡孝始終無毫髮間隙至是帝親庶務言者多追詆太后時事范仲淹上言曰太后受遺先帝調護陛下者十餘年今宜掩其小過以全大德帝曰此亦朕所不忍聞也遂下詔戒飭中外毋得輒言皇太后垂簾日事冬十月丁酉葬莊獻明肅皇后莊懿皇后於永定陵詔定祔廟禮翰林侍讀學士宋綬援春秋考仲子之宫唐坤儀廟故事請别築宫遂作奉慈廟以奉二神主郭后之廢溫成事附仁宗天聖二年十一月乙巳立皇后郭氏后平盧節度使崇之孫女時張美人有寵帝欲立之太后不可而止故后雖立而頗見踈明道二年夏四月吕夷簡張耆夏竦陳堯佐范雍趙稹晏殊罷先是夷簡手疏陳八事曰正朝綱塞邪徑禁賄賂辨佞壬絶女謁踈近習罷力役節冗費勸帝語甚切帝因與夷簡謀以張耆等皆附太后欲悉罷之夷簡以為然帝退語於皇后后曰夷簡獨不附太后耶但多機巧善應變耳由是夷簡亦罷制下夷簡方押班聞唱名大駭不知其故因令素所厚內侍都知閻文應詗之乃知事由郭后也由是深憾於后八月戊午復以吕夷簡同平章事十一月美人張氏卒追册為皇后十二月乙卯廢皇后郭氏時尚美人楊美人俱得幸素與皇后忿爭一日尚氏於帝前有侵后語后不勝忿批其頰帝自起救之誤批帝頸帝大怒內侍閻文應因與帝謀廢后且勸以爪痕示執政帝以示吕夷簡告之故夷簡以前憾遂主廢立之議帝猶疑之夷簡曰光武漢之明主也郭后止以怨懟坐廢况傷陛下頸乎帝意遂決夷簡先敕有司不得受臺諫章奏乃詔稱皇后願入道封淨妃玉京沖妙仙師居長寧宫臺諫章奏果不得入於是中丞孔道輔率諫官范仲淹孫祖德宋庠劉煥御史蔣堂郭勸楊偕馬絳段少連十人詣垂拱殿伏奏皇后天下之母不當輕廢願賜對盡所言殿門闔不為通道輔扣環大呼曰皇后被廢奈何不聽臺臣言尋有詔令夷簡諭以皇后當廢狀道輔等至中書語夷簡曰大臣之於帝后猶子事父母也父母不和可以諫止奈何順父出母乎夷簡曰廢后有漢唐故事道輔曰人臣當導君以堯舜豈得引漢唐失德為法耶夷簡不能答即奏言伏閣請對非太平美事遂出道輔知泰州仲淹知睦州祖德等罰金仍詔臺諫自今無相率請對明日道輔等趨朝欲留百官揖宰相廷爭至待漏院聞詔乃退道輔鯁挺特逹遇事彈劾無所避天下皆以直道許之僉書河陽判官富弼言朝廷一舉而兩失縱不能復后宜還仲淹等不聽景祐元年詔淨妃郭氏出居瑤華宫美人尚氏入道楊氏安置别宅九月甲辰詔立曹氏為皇后彬之女孫也初郭后廢帝命宋綬作詔云當求德閥以稱坤儀既而左右引富人陳氏女入宫綬曰陛下乃欲以賤者正位中宫不亦與前詔戾乎王曾入對又論奏之乃罷陳氏而立曹氏御史裏行孫沔請終莊獻喪制而後行祕書丞余靖亦以為言不報二年十一月戊子故后郭氏暴卒后居瑤華帝頗念之遣使存問賜以樂府后和答之詞甚悽惋帝益悔焉嘗密遣人召之后辭曰若再見召須百官立班受册方可閻文應以常譖后懼其復立屬后小疾帝遣文應挾醫診視數日言后暴崩中外疑文應進毒而不得其實帝深憫之以禮斂葬而停諡册祔廟之禮知開封府范仲淹劾奏文應之罪竄之嶺南死於道三年春正月壬辰追復郭氏為皇后丁酉葬皇后郭氏慶厯八年帝以閏正月望夕將張燈曹后諫止之越三日親從官顔秀等四人謀為亂夜入禁中越屋叩寢殿皇后方侍帝聞變遽起帝欲出后閉閣擁持趣召都知王守忠使引卒入衛賊傷宫嬪於殿下聲徹帝所宦者以乳嫗驅小女子紿奏后叱之曰賊在近殺人敢妄言耶隂遣人挈水踵後賊果舉炬焚簾水隨滅之是夕所遣內侍后皆親剪其髮曰以是徴賞故爭盡死力守忠兵至賊就擒滅詔領皇城司者皆坐斥事連副都知楊懷敏夏竦與懷敏相結欲曲庇之乃請御史與宦官同鞫於禁中丁度曰宿衛有變事關社稷請付外臺窮治因爭於帝前帝從竦議由是懷敏止降官領內職如故十二月丁卯册美人張氏為貴妃初衛士之變帝以美人有扈蹕功夏竦建議欲尊之同知諫院王贄因言賊本起皇后閣前請究其事冀動搖中宫隂為美人地上以問御史何剡剡曰此姦人之謀不可不察上悟事遂寢然美人卒以功進貴妃皇祐二年十一月己未詔外戚毋得任二府時張貴妃寵冠後庭堯佐其伯父也驟除宣徽節度景靈羣牧四使殿中侍御史唐介與知諫院包拯吳奎等力爭之中丞王舉正又留百官班廷論故有是詔且罷堯佐宣徽景靈二使三年冬十月復除張堯佐宣徽使知河陽侍御史唐介謂同列曰是欲與宣徽而假河陽為名耳同列依違介獨抗言之帝謂曰除擬本出中書時文彥博為首相介遂劾彥博知益州日造間金竒錦緣奄侍通宫掖以得執政今顯用堯佐益自固結請罷之而相富弼語甚㘦直帝怒郤其奏不視且曰將逺竄介徐讀疏畢曰臣忠憤所激鼎鑊不避何辭於謫帝急召執政示之曰介論事是其職至以彥博由妃嬪致宰相此何言也進用冢司豈應得預而乃薦弼時彥博在帝前介責之曰彥博宜自省即有之不可隱彥博拜謝不已帝怒亦甚梁適叱介使下殿介猶力爭帝聲色俱厲修起居注蔡襄趨進救之曰介誠狂直然納諫容言人主之美德乞賜寬貸遂貶介春州别駕王舉正言其太重帝亦悟明日取其疏入改英州罷彥博知許州帝慮介或道死有殺直臣名命中使護之由是介直聲聞天下天下稱真御史者必曰唐子方云至和元年春正月癸酉貴妃張氏卒貴妃巧慧多智數善承迎至贈其父堯封為郡王伯父堯佐至太師姻戚莫不顯貴然帝守法度事無大小悉付外庭議凡宫禁干請雖已賜可或輒中郤貴妃雖專寵特異終不得紊政及卒帝悼甚至輟朝七日禁京城舉樂一月追册為溫成皇后治喪皇儀殿知制誥王洙隂與內使石全斌附會務以非禮導帝欲令孫沔讀册宰相護葬帝從之沔曰陛下若以臣沔讀册則可以樞密副使讀册則不可因力求罷時陳執中為首相奉行溫成喪事唯謹且引王洙為翰林學士士論由是爭咎執中天聖災議仁宗天聖四年六月庚寅大雨京師平地水數尺壞屋溺人京東西及河北江淮以南皆大水五年六月京師大旱通判常州謝綘上疏曰去年京師大水敗民廬舍河渠暴溢幾冒城郭今年苦旱百姓疫死田榖焦稿秋成絶望此皆大異也按洪範京房易傳皆以為簡祭祀逆天時則水不順下政令逆時水失其性則壞國邑傷稼穡顓事者如誅罰絶理則大水殺人欲德不用兹謂張厥災荒上下皆蔽兹謂隔其咎旱天道指類示戒大要如此陛下夙夜勤苦思有以上塞時變固宜䇿告殃咎變更理化下罪已之詔修順時之令宣羣言以導壅斥近幸以損隂而聖心優柔重在改作號令所發未聞有以當天心者夫風雨寒暑之於天時為大信也信不及於物澤不究於下則水旱為沴近日制命有信宿輒改適行遽止而欲風雨以時其可得乎天下之廣萬幾之衆不出房闥豈能盡知而在廷之臣未聞被數刻之召吐片言之善朝夕左右非恩澤即佞幸上下皆蔽其應不虛昔兩漢日食地震水旱之變則䇿免三公以示戒懼陛下進用丞弼極一時之選而政道未茂天時未順豈大臣輔佐不明耶陛下信任不篤耶必若使之宜推心責成以極其效謂之不然則更選賢者比來姦邪者易進守道者數窮政出多門俗喜由徑聖心固欲盡得天下之賢能分職受業而宰相方考資進吏無敢建白欲德不用之應又可驗矣今陽驕莫解蟲孽漸熾河水妄行循依違之迹行尋常之政臣恐不足回靈意塞至戒古者穀不登則虧膳災屢至則降服凶年不塗塈願下詔引咎損大官之膳避路寢之朝許士大夫斥諱上聞譏切時病罷不急之役省無名之斂勿崇私恩更進直道宣德流化以休息天下至誠動乎上大惠浹於下豈有時事之艱哉帝嘉納之七年六月丁未大雨震電玉清昭應宫災中丞王曙上疏曰昔魯桓僖宫災孔子以為桓僖親盡當毁漢遼東高廟及高園陵便殿災董仲舒以為高廟不當居郡國便殿不當居陵旁故災魏崇華殿災高堂隆以為天以臺榭宫室為戒宜罷勿治文帝不聼明年復災今玉清昭應宫之建非應經義災變之來若有警者願除其地罷諸禱祠以應天變滎陽縣尉蘇舜欽詣登聞鼓院上疏曰臣觀今歲自春徂夏霖雨隂晦未嘗少止農田被災者幾於十九臣以為任用失人政令多過賞罰弗中之所召也天之降災欲悟陛下而大臣歸咎於刑獄之濫陛下聽之故肆赦天下以為禳救如此則是殺人者不死傷人者不抵罪而欲以合天意也古者斷決滯訟以平水旱不聞用赦故赦下之後隂雨及今前志曰積隂生陽陽生火災見焉乘夏之氣發泄於玉清宫雹雨雜下烈熖四起樓觀萬疊數刻而盡非慢於火備乃天之垂戒也陛下當降服減膳避正寢責躬罪已下哀痛之詔罷非業之作拯失職之民察輔弼及左右無禆國體者罷之竊弄權威者去之念政刑之失收芻蕘之論庶幾可以變災為祐浹日之間未聞為此而將計工役以圖修復都下之人聞者駭惑聚首橫議咸謂非宜皆曰章聖皇帝勤儉十餘年天下富庶帑府流衍乃作斯宫及其畢工海內虛竭陛下即位未及十年數遭水旱雖征賦減入而百姓困乏若大興土木則費用不知紀極財力耗於內百姓勞於下內耗下勞何以為國况天災之已違之是欲競天無省已之意逆天不祥安已難任欲祈厚貺其可得乎今為陛下計莫若來吉士去佞人修德以勤至治使百姓足給而征稅寬減則可以謝天意而安民情矣夫賢君見變修道除凶亂世無象天不譴告今幸天見之變是陛下修已之日豈可忽哉昔漢宣帝三年茂陵白鶴館災詔曰乃者火災降於孝武園館朕戰栗恐懼不燭變異罪在朕躬羣有司又不肯極言朕過以至於斯將何寤焉夫茂陵不及上都白鶴館大不及此宫彼尚降詔四方以求已過是知帝王憂危念治汲汲如此臣又按五行志賢佞分别官人有敘率由舊章禮重功勳則火得其性若信道不篤或耀虛偽讒夫昌邪勝正則火失其性自上而降及濫炎妄起燔宗廟燒宫室雖興師徒而不能救魯成公三年新宫災劉向謂成公信三桓子孫之讒逐父臣之應襄公九年春宋火劉向謂宋公聽讒逐其大夫華弱奔魯之應今宫災豈亦有是乎願陛下拱默內省而追革之罷再造之勞述前世之法天下之幸也宋史紀事本末卷四
