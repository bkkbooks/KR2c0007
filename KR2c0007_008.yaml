body:
  text: 宋史紀事本末卷八明馮琦原編陳邦瞻增輯王安石變法仁宗嘉祐五年五月己酉召王安石為三司度支判官安石臨川人好讀書善屬文曾鞏擕其所撰以示歐陽修修為之延譽擢進士上第授淮南判官故事秩滿許獻文求試館職安石獨不求試調知鄞縣起堤堰決陂塘為水陸之利貸穀與民出息以償俾新陳相易邑人便之尋通判舒州文彥博薦安石恬退乞不次進用以激奔競之風召試館職不就歐陽修薦為諫官安石以祖母年髙辭修以其須祿養復言于朝用為羣牧判官又辭懇求外補知常州移提點江西刑獄與周敦頥相遇語連日夜安石退而精思至忘寢食先是館閣之命屢下安石輒辭不起士大夫謂其無意於世恨不識其面朝廷每欲授以美官唯患其不就也及是為度支判官聞者莫不喜悅安石果於自用於是上萬言書大要以為今天下之財力日以困窮風俗日以衰壞患在不知法度不法先王之政故也法先王之政者法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目囂天下之口而固已合先王之政矣因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以財不足為患也患在治財無其道耳在位之人才既不足用而閭巷草野之間亦少可用之才社稷之託封疆之守陛下其能久以天幸為常而無一旦之憂乎願監茍且因循之弊明詔大臣為之以漸期合於當世之變臣之所稱流俗之所不講而議者以為迂闊而熟爛者也上覽而置之吕祖謙曰安石變法之蘊亦略見於此書特其學不用於嘉祐而盡用於熙寧世道升降之機蓋有在也時有詔舍人院無得申請改除文字安石爭之曰審如是則舍人不得復行其職而一聽大臣所為今大臣之弱者不敢為陛下守法而強者則挾上旨以造令諌官御史無敢逆其意者臣實懼焉語皆侵執政執政者不悅會以母喪遂去職英宗治平四年閏月癸卯以王安石知江寧府終英宗之世安石被召未嘗起韓維吕公著兄弟更稱揚之神宗在頴邸維為記室每講説見稱輒曰此非維之説維友王安石之説也維遷庶子又薦安石自代帝由是想見其人及即位召之安石不至帝謂輔臣曰安石厯先帝朝召不赴或以為不恭今又不至果病邪有所要邪曾公亮曰安石真輔相材必不欺罔吳奎曰臣嘗與安石同領羣牧見其護前自用所為迂闊萬一用之必紊綱紀帝不聽乃有江寧之命衆謂安石必辭及詔至即起視事九月以王安石為翰林學士時宰相韓琦執政三朝或言其專曾公亮因力薦王安石覬以間琦琦求去益力帝不得已從之以司徒兼侍中判相州入對帝泣曰侍中必欲去今日已降制矣然卿去誰可屬國者王安石何如琦對曰安石為翰林學士則有餘處輔弼之地則不可帝不答神宗熙寧元年夏四月乙巳王安石始至京師時受翰林學士之命已七越月矣詔安石越次入對帝問為治所先安石對曰擇術為先帝曰唐太宗何如曰陛下當法堯舜何以太宗為哉堯舜之道至簡而不煩至要而不迂至易而不難但末世學者不能通知以為髙不可及耳帝曰卿可謂責難於君朕自視眇躬恐無以副卿此意可悉意輔朕庶同躋此道一日講席羣臣退帝留安石坐曰有欲與卿從容論議者因言唐太宗必得魏徴漢昭烈必得諸葛亮然後可以有為二子誠不世出之人也安石曰陛下誠能為堯舜則必有臯夔稷契誠能為髙宗則必有傅説彼二子皆有道者所羞何足道哉以天下之大人民之衆百年承平學者不為不多然常患無人可以助治者以陛下擇術未明推誠未至雖有臯夔稷契傅説之賢亦將為小人所蔽卷懷而去耳帝曰何世無小人雖堯舜之時不能無四凶安石曰惟能辨四凶而誅之此其所以為堯舜也若使四凶得肆其讒慝則臯夔稷契亦安肯茍食其祿以終身乎十一月郊執政以河朔旱傷國用不足乞南郊勿賜金帛詔學士議司馬光曰救災節用當自貴近始可聽也王安石曰常衮辭堂饌時以為衮自知不能當辭職不當辭祿且國用不足者以未得善理財者故也光曰善理財者不過頭會箕斂爾安石曰不然善理財者不加賦而國用足光曰天下安有此理天地所生財貨百物不在民則在官彼設法奪民其害乃甚於加賦此蓋桑𢎞羊欺武帝之言司馬遷書之以見其不明耳爭議不已帝曰朕意與光同然姑以不允答之會安石草制引常衮事責兩府兩府不敢復辭二年二月庚子以王安石參知政事初帝欲用安石曾公亮力薦之唐介言安石難大任帝曰文學不可任邪經術不可任邪吏事不可任耶介對曰安石好學而泥古故議論迂闊若使為政必多所更變介退謂曾公亮曰安石果大用天下必困擾諸公當自知之帝問侍讀孫固曰安石可相否固對曰安石文行甚髙處侍從獻納之職可矣宰相自有度安石狷狹少容必欲求賢相吕公著司馬光韓維其人也帝不以為然竟以安石參知政事謂之曰人皆不能知卿以卿但知經術不曉世務安石對曰經術正所以經世務帝曰卿所設施以何為先安石對曰末世風俗賢者不得行道不肖者得行無道賤者不得行禮貴者得行無禮變風俗立法度正方今之所急也帝深納之甲子議行新法王安石言周置泉府之官以榷制兼併均濟貧乏變通天下之財後世唯桑𢎞羊劉晏粗合此意學者不能推明先王法意更以為人主不當與民爭利今欲理財則當修泉府之法以收利權帝納其説安石乃復言人才難得亦難知今使十人理財其中容有一二敗事則異論乘之而起堯與羣臣共擇一人治水尚不能無敗事况所擇而使非一人豈能無失要當計利害多少不為異論所惑帝曰有一人敗事而遂廢所圖此所以少成事也乃立制置三司條例司掌經畫邦計議變舊法以通天下之利命陳升之王安石領其事初泉人吕惠卿自真州推官秩滿入都與安石論經義多合遂定交因言於帝曰惠卿之賢雖前世儒者未易比也學先王之道而能用者獨惠卿而已遂以惠卿及蘇轍並為檢詳文字事無大小安石必與惠卿謀之凡所建請章奏多惠卿筆也又以章惇為三司條例官曾布檢正中書五房公事凡有奏請朝臣以為不便者布必上疏條析以堅帝意使專任安石以威脅衆俾毋敢言由是安石信任布亞於惠卿而農田水利青苖均輸保甲免役市易保馬方田諸役相繼並興號為新法頒行天下安石與劉恕友善欲引置三司條例恕以不習金穀為辭且曰天子方屬公以大政宜恢張堯舜之道以佐明主不應以利為先安石曰利以和義善用之堯舜之道也時爭新法廟堂諸大臣議論多不協安石曰公輩坐不讀書耳趙抃曰君言失矣臯夔稷契之時何書可讀安石不應夏四月丁巳從三司條例司之請遣劉彛謝卿材侯叔獻程皓盧秉王汝翼曾伉王廣廉八人行諸路察農田水利賦役蘇轍言役人之不可不用鄉户猶官吏之不可不用士人也有田以為生故無逃亡之憂朴魯而少詐故無欺嫚之患今乃舍此不用竊恐掌財者必有盜用之姦捕盜者必有竄逸之弊唐楊炎為兩稅取大厯十四年應當賦斂之數以定兩稅之額則租調與庸既兼之矣今兩稅如舊奈何復取庸錢且品官之家復役己久蓋古者國子俊造將用其才者皆復其身胥史賤吏既用於官者皆復其家聖人舊法良有深意奈何至於官戶而又將役之耶不聽六月丁巳罷御史中丞吕誨王安石既執政士大夫多以為得人吕誨獨言其不通時事大用之則非所宜將入對學士司馬光亦將詣經筵相遇並行光密問今日所言何事誨曰袖中彈文乃新參也光愕然曰衆喜得人奈何論之誨曰君實亦為是言邪安石雖有時名然好執偏見輕信姦回喜人佞已聽其言則美施於用則踈置諸宰輔天下必受其禍且上新即位所與圖治者二三執政而已苟非其人將敗國事此乃心腹之疾顧可緩邪上疏言大姦似忠大詐似信安石外示朴野中藏巧詐驕蹇慢上隂賊害物誠恐陛下悅其才辨久而倚毗大姦得路羣隂彚進則賢者盡去亂由是生臣究安石之迹固無逺略唯務改作立異於人徒文言而飾非將罔上而欺下臣竊憂之誤天下蒼生必斯人也疏奏帝方眷注安石還其章疏誨遂求去安石亦求去帝謂曾公亮曰若出誨恐安石不自安安石曰臣以身許國陛下處之有義臣何敢以形迹自嫌苟為去就乃出誨知鄧州誨既斥安石益自用光由是服誨之先見自以為不及也秋七月辛巳立淮浙江湖六路均輸法條例司言諸路上供嵗有常數年豐可以多致而不能嬴餘年歉難於供億而不敢不足逺方有倍蓰之輸中都有半價之鬻徒使富商大賈乘公私之急以擅輕重斂散之權今江浙荆淮發運使實總六路賦入宜假以錢貨資其用度凡上供之物皆得徙貴就賤因近易逺預知在京倉庫所當辦者得以便宜蓄買而制其有無庶幾國用可足民財不匱詔以發運使薛向領均輸平準專行于六路賜內藏錢五百萬緡上供米三百萬石時議者慮其為擾多言非便帝不聽薛向既董其事乃請設置官屬從之蘇轍言今先設官置吏簿書廪祿為費己厚非良不售非賄不行是官買之價比民必貴及其賣也弊復如前此錢一出恐不可復縱使其間薄有所獲而征商之額所損必多矣帝方惑于王安石不納其言然均輸法亦迄不能就八月罷知諫院范純仁純仁奏言王安石變祖宗法度掊克財利民心不寧書曰怨豈在明不見是圖願陛下圖不見之怨帝曰何謂不見之怨對曰杜牧所謂不敢言而敢怒者是也帝曰卿善論事宜為朕條陳古今治亂可為監戒者遂作尚書解以進曰其言皆堯舜禹湯文武之事也治天下無以易此願深究而力行之帝切於求治多延見踈逖小臣咨訪闕失純仁言小人之言聽之若可采行之必有纍蓋知小忘大貪近昧逺願加深察及薛向行均輸法於六路純仁言臣嘗親奉德音欲修先王補助之政今乃效桑𢎞羊行均輸之法而使小人掊克生靈斂怨基禍安石以富國強兵之術啓迪上心欲求近功忘其舊學尚法令則稱商鞅言財利則背孟軻鄙老成為因循棄公論為流俗異已者為不肖合意者為賢人劉琦錢顗等一言便蒙降黜在廷之臣方大半趨附陛下又從而驅之其將何所不至道逺者理當馴致事大者不可速成人才不可急求積弊不可頓革儻欲事功急就必為憸佞所乘宜速還言者而退安石答中外之望留章不下純仁力求去不許未幾罷諫職改判國子監純仁去意愈確安石使諭之曰毋輕去已議除知制誥矣純仁曰此言何為至於我哉言不用萬鐘非所顧也遂録所上章申中書安石大怒乞加重貶帝曰彼無罪姑與一善地命知河中府尋徙成都轉運使以新法不便戒州縣未得遽行安石怒其沮格以事左遷知和州壬戍貶判刑部劉述等六人初知登州許遵上州獄有婦謀殺夫傷而未死及按問遂自承法因犯殺傷而自首者得免所因之罪請從減論帝命司馬光與王安石議安石以遵言為是光謂因他罪致殺傷者他罪得首原豈可以謀與殺分為兩事而謂謀為所因得以首原乎帝方意嚮安石而文彥博富弼等多主光議踰年不決至是詔從安石議凡謀殺已傷按問自首者減罪二等著為令侍御史知雜事兼判刑部劉述封還其詔執奏不已安石白帝詔開封府推官王克臣劾述罪述遂率侍御史劉琦錢顗共上疏曰安石執政以來未踰數月中外囂然陛下置安石政府必欲致時如唐虞而反操管商權詐之術與陳升之合謀侵三司利權取為己功開局設官分行天下驚駭物聽去年因許遵妄議按問自首之法安石任偏見而立新議陛下不察而從之遂害天下大公先朝所立制度自宜世守勿失乃事事更張廢而不用姦詐專權之人豈宜處之廟堂以亂國紀願罷逐以慰天下曾公亮畏避安石隂自結援以固寵趙抃則括囊拱手但務依違皆宜斥免疏上安石奏先貶琦監處州鹽酒務顗監衢州鹽稅殿中侍御史孫昌齡始以附安石得進顗將出臺罵昌齡而去於是昌齡亦言王克臣阿奉當權欺蔽聰明遂黜昌齡通判蘄州安石欲置述於獄司馬光范純仁爭之乃貶知江州同判刑部丁諷審刑院詳議官王師元皆以附述忤安石諷貶通判復州師元貶監安州稅罷條例司檢詳文字蘇轍轍與吕惠卿論多不合會遣八使于四方求遺利中外知其必迎合生事而莫敢言轍以書抵王安石力陳其不可安石怒將加之罪陳升之止之乃以轍為河南府推官九月丁卯行青苗法初陜西轉運使李參以部內多戍兵而糧儲不足令民自隱度麥粟之贏先貸以錢俟穀熟還官號青苖錢經數年廪有餘糧至是條例司請以諸路常平廣惠倉錢穀依陝西青苗錢例民願預借者給之令出息二分隨夏秋稅輸納願輸錢者從其便如遇災傷許展至豐熟日納非惟足以待凶荒之患民既受貸則兼并之家不得乘新陳不接以邀倍息又常平廣惠之物收藏積滯必待年儉物貴然後出糶所及者不過城市遊手之人今通一路有無貴發賤斂以廣蓄積平物價使農人有以赴時趨事而兼并不得乘其急凡此皆以為民而公家無所利其入是亦先王散惠興利以為耕斂補助之意也欲量諸路錢穀多寡分遣官提舉每州選通判幕職官一員典幹轉移出納仍先自河北東京淮南三路施行俟有緒推之諸路詔曰可乃出內庫緡錢百萬糴河北常平粟而常平廣惠倉之法遂變為青苖矣初王安石既與吕惠卿議定出示蘇轍等曰此青苖法也有不便以告勿疑轍曰以錢貸民本以救民然出納之際吏緣為姦雖有法不能禁錢入民手雖良民不免妄用及其納錢雖富民不免踰限如此則恐鞭箠必用州縣之事煩矣唐劉晏掌國計未嘗有所假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病今此法見在而患不修公誠能有意於民舉而行之則晏之功可立俟也安石曰君言誠有理當徐思之由是逾月不言青苖會京東轉運使王廣淵言春農事興而民苦乏兼并之家得以乘急要利乞留本道錢帛五十萬貸之貧民嵗可獲息二十五萬從之其事與青苖法合安石始以為可用召廣淵至京師與之議於是決意行焉壬辰王安石薦吕惠卿為太子中允崇政殿説書司馬光諌曰惠卿憸巧非佳士使王安石負謗於中外者皆其所為也帝言安石不好官職自奉甚薄可謂賢者光曰安石誠賢但性不曉事而愎此其所短也又不當信任吕惠卿惠卿真姦邪而為安石謀主安石為之力行故天下并指為姦邪也近者進擢不次大不厭衆心帝曰惠卿進對明辨亦似美才光對曰惠卿誠文學辨慧然用心不正願陛下徐察之江充李訓若無才何以動人主帝默然光又貽書安石曰諂諛之士於公今日誠有順適之快一旦失勢將必賣公自售矣安石不悅帝嘗御邇英閣聽講光講曹參代蕭何帝曰漢常守蕭何之法不變可乎光對曰寧獨漢也使三代之君守禹湯文武之法雖至今存可也漢武取髙帝約束紛更之盜賊半天下元帝改孝宣之政漢業遂衰由此言之祖宗之法不可變也惠卿言先王之法有一年一變者正月始和布法象魏是也有五年一變者巡守考制度是也有三十年一變者刑罰世輕世重是也光言非是其意以風朝廷耳帝問光光對曰布法象魏布舊法也諸侯變禮易樂者王巡狩則誅之不自變也刑新國用輕典亂國用重典是為世輕世重也非變也且治天下譬如居室敝則修之非大壞不更造也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜之可也不可使執政侵其事今為制置三司條例司何也宰相以道德佐人主安用例茍用例則胥吏矣今為看詳中書條例司何也惠卿辭塞乃以他語抵光帝曰相與論是非耳何至是光又言青苖之弊曰平民舉錢出息尚能𧖟食下户至飢寒流離况縣官督責之威乎惠卿曰青苖法願則與不願不強也光曰愚民知取債之利不知還債之害非獨縣官不強富民亦不強也太宗平河東立糴法時斗米十錢民樂與官為市其後物貴而和糴不解遂為河東世世患臣恐異日之青苗亦猶是也帝曰陜西行之久民不為病光曰臣陜西人也見其病不見其利朝廷初不許有司尚能以病民况法許之乎光又講漢史至賈山上疏因言從諫之美拒諌之禍上曰舜堲讒説殄行若臺諫欺罔為讒安得不黜光曰進讀及之爾時事臣不敢論也及退上留光謂曰吕公著言藩鎮欲興晉陽之甲豈非讒説殄行也光曰公著平居與儕輩言猶三思何故上前輕發乃爾外人多疑其不然上曰此所謂靜言庸違者也光曰公著誠有罪不在今日向者朝廷委公著專舉臺官公著乃盡舉條例司之人與條例司互相表裏使熾張如此乃始逼於公議復言其非此所可罪也帝曰今天下洶洶者孫叔敖所謂國之有是衆之所惡也光曰然陛下當論其是非今條例司所為獨王安石韓絳吕惠卿以為是天下皆以為非也陛下豈能獨與此三人共為天下邪冬十月丙申富弼罷時王安石用事不與弼合弼度不能爭多稱疾求退章數十上帝曰卿即去誰可代卿者弼薦文彥博帝默然良久曰王安石何如弼亦默然遂出判毫州弼恭儉孝敬好善疾惡常言君子與小人並處其勢必不勝君子不勝則奉身而退樂道無悶小人不勝則交結搆扇千岐萬轍必勝而後已待其得志遂肆毒於善良求天下不亂不可得也以陳升之同平章事升之既相帝問司馬光近相升之外議云何對曰閩人狡險楚人輕易今二相皆閩人二參政皆楚人必將援引鄉黨之士充塞朝廷風俗何以更得淳厚帝曰升之有才智曉民政光曰但不能臨大節不可奪耳凡才智之士必得忠直之人從旁制之此明主用人之法也帝又曰王安石何如對曰人言安石姦邪則毁之太過但不曉事又執拗耳十一月乙丑命韓絳制置三司條例初陳升之欲傅會王安石以固其位安石亦以議論盈廷引升之為助升之知其不可而竭力為之用安石德之故先使正相位升之既相乃時為小異陽若不與之同者因言於帝曰宰相無所不統所領職事豈可稱司請罷制置三司條例司安石曰古之六卿即今執政有司馬司徒司冦司空各名一職何害于理升之曰若制置百司條例則可但令置制三司一官則不可安石曰今中書支百錢以上物及轉補三司吏人皆奏得旨乃行至於制置三司條例何為不可由是二人遂不合安石乃薦綘共事安石每奏事絳必曰臣見安石所陳非一皆至當可用陛下宜省察安石恃以為助丙子頒農田水利約束自是進計者紛然數年間諸路凡得廢田萬七百九十三處三十六萬一千一百七十八頃有竒而民給役勞擾置諸路提舉官條例司上言民間多願借貸青苖錢乞遍下諸路轉運司施行仍詔諸路各置提舉二員管當一員掌行青苗免役農田水利諸路凡四十一人提舉官既置往往迎合王安石意務以多散為功富民不願取貧者乃欲得之即令隨户等髙下品配又令貧富相兼十人為保首王廣淵在京東一等户給十五千等而下之至五等猶給一千民間喧然以為不便廣淵入奏謂民皆歡呼感德諫官李常御史程皓論廣淵抑配掊克迎朝廷旨意以困百姓會河北轉運使劉庠不散青苗錢奏適至安石曰廣淵力主新法而遭劾劉庠欲壞新法而不問舉事如此安得人無向背由是常皓之言皆不行閏月遣官提舉諸路常平廣惠倉兼管勾農田水利差役事三年二月己酉河北安撫使韓琦上疏曰臣準散青苗詔書務在惠小民不使兼并乘急以要倍息而公家無所利其入今所立條約乃自鄉户一等而下皆立借錢貫數三等以上更許增借且鄉户上等并坊郭有物業者乃從來兼并之家今令借錢一千納一千三百是官自放錢取息與初詔相違又條約雖禁抑勒然不抑散則上户必不願請下户雖或願請請時甚易納時甚難將來必有督索同保均賠之患陛下躬行節儉以化天下自然國用不乏何必使興利之臣紛紛四出以致逺邇之疑哉乞罷諸路提舉官第委提點刑獄依常平舊法施行帝袖其疏以示執政曰琦真忠臣雖在外不忘王室朕始謂可以利民不意乃害民如此且坊郭安得青苖而使者亦強與之王安石勃然進曰茍從其所欲雖坊郭何害因難琦奏曰如桑𢎞羊籠天下貨財以奉人主私用乃可謂興利之臣今陛下修周公遺法抑兼并振貧弱非所以佐私欲安可謂興利之臣乎帝終以琦説為疑安石遂稱疾不出帝諭執政罷青苖法趙抃請俟安石出安石求去帝命司馬光草答詔有士夫沸騰黎民騷動之語安石抗章自辨帝為巽辭謝之且命吕惠卿諭旨韓絳又勸帝留安石安石入謝因言中外大臣從官臺諫朋比欲敗先王正道以沮陛下此所以紛紛也帝以為然安石乃起視事持新法益堅詔以琦奏付制置條例司令曾布疏駁刋石頒之天下琦申辨愈切且論安石妄引周禮以惑上聽皆不報時文彥博亦以青苖之害為言帝曰吾遣二中使親問民間皆云甚便彥博曰韓琦三朝宰相不信而信二宦者乎先是安石嘗與入內副都知張若水押班藍元震交結帝遣使潛察府界俵錢事適命二人二人使還極言民情深願無抑配者故帝信之不疑壬申以司馬光為樞密副使固辭不拜初光素與王安石厚及行新法貽書開陳再三又與吕惠卿辨論于經筵安石不樂帝欲大用光訪之安石安石曰外托劘上之名內懷附下之實所言盡害政之事所與盡害政之人而欲置之左右使預國論此消長之機也光才豈能害政但在髙位則異論之人倚以為重韓信立漢赤幟趙卒氣奪今用光是與異論者立赤幟也及安石稱疾不出帝乃以光為樞密副使光辭曰陛下所以用臣蓋察其狂直庶有補於國家若徒以祿位榮之而不取其言是以天官私非其人也臣徒以祿位自榮而不能救生民之患是盜竊名器以私其身也陛下誠能罷制置條例司追還提舉官不行青苗助役法雖不用臣臣受賜多矣青苗之散使者恐其逋負必令貧富相保貧者無可償則散而之四方富者不能去必責使代償十年之外貧者既盡富者亦貧常平又廢加之以師旅因之以飢饉民之羸者必委死溝壑壯者必聚而為盜賊此事之必至者也疏凡九上帝使謂之曰樞密兵事也官各有職不當以他事為辭光對曰臣未受命則猶侍從也於事無不可言者會安石復起視事乃下詔允光辭收還敇誥知通進銀臺司范鎮封還詔旨者再帝以詔直付光不由門下鎮奏曰由臣不才使陛下廢法乞解其職許之乙酉韓琦以論青苖不見聽上疏請解河北安撫使止領大名府路王安石欲沮琦即從之三月貶知審官院孫覺知廣德軍帝初即位覺為右正言以言事忤帝意罷去王安石早與覺善將援以為助自知通州召還纍改知審官院時吕惠卿用事帝問於覺覺對曰惠卿辨而有才過於人數等特以為利之故屈身安石安石不悟臣竊以為憂帝曰朕亦疑之青苖法行首議者謂周官泉府民之貸者至輸息二十而五國事之財用取具焉覺條奏其妄曰成周賖貸特以備民之緩急不可徒與也故以國服為之息然國服之息説者不明鄭康成釋經乃引王莽計嬴受息無過歲什一為據不應周公取息重於莽時况國用專取具於泉府則冢宰九賦將安用邪聖世宜講求先王之法不當取疑文虛説以圖治安石覽之怒始有逐覺意會曾公亮言畿縣散青苖錢有追呼抑配之擾安石遣覺行視虛實覺言民實不願與官相交望賜寢罷遂坐奉詔反覆貶知廣德軍程皓上疏曰臣近纍上言乞罷預俵青苗錢利息及汰去提舉官事朝夕以覬未蒙施行臣竊謂明者見於未形智者防於未亂况今日事理顯白易知若不因機亟決持之愈堅必貽後悔悔而後改則為害己多蓋安危之本在乎人情治亂之機繫乎事始衆心暌乖則有言不信萬邦協和則所為必成固不可以威力取強言語必勝而近日所聞尤為未便伏見制置條例司疏駁大臣之奏舉劾不奉行之官徒使中外物情愈致驚駭是乃舉一偏而盡沮公議因小事而先失衆心權其輕重未見其可臣竊謂陛下固已燭見事體究知是非在聖心非吝改張由柄臣尚持固必是致輿情大鬱衆論益歡若欲遂行必難終濟伏望陛下奮神明之威斷審成敗之先機與其遂一失而廢百為孰若沛大恩而新衆志外汰使人之擾亟推去息之仁况糶糴之法兼行則儲蓄之資自廣在朝延未失於舉措使議論何名而沸騰伏乞檢會臣所上言早賜施行則天下幸甚夏四月戊辰貶御史中丞吕公著時青苖法行公著上疏曰自古有為之君未有失人心而能圖治亦未有脅之以威勝之以辨而能得人心者也昔日之所謂賢者今皆以此舉為非而主議者一切詆為流俗浮論豈昔皆賢而今皆不肖乎王安石怒其深切會帝使公著舉吕惠卿為御史公著曰惠卿固有才然姦邪不可用帝以語安石安石益怒遂誣公著言韓琦欲因人心如趙鞅興晉陽之甲以逐君側之惡於是貶公著知潁州且命知制誥宋敏求草制明著罪狀敏求不從但言敷陳失實安石怒命陳升之改其語行之己卯趙抃罷安石持新法益堅抃大悔恨上疏言制置條例司建使者四十餘輩騷動天下安石強辨自用詆公論為流俗違衆罔民順非文過近者臺諫侍從多以言不聽而去司馬光除樞密不肯拜且事有輕重體有大小財利於事為輕而民心得失為重青苖使者於體為小而禁近耳目之臣用舍為大今去重而取輕失大而得小懼非宗廟社稷之福也奏入懇求去位乃出知杭州以韓絳參知政事侍御史陳襄言王安石參預大政首為興利之謀先與知樞密院事陳升之同領條例司未幾升之用是為相而絳繼之曾未數月遂預政事則是中書大臣皆以利進乞罷絳新命而求道德經術之賢以處之庶不害于王政而足以全大臣之節矣不報癸未以李定為監察御史裏行罷知制誥宋敏求蘇頌李大臨定少受學于王安石舉進士為秀州判官孫覺薦之朝召至京師李常見之問曰君從南方來民謂青苖法如何定曰民便之無不喜者常曰舉朝方共爭是事君勿為此言定即往白安石且曰定但知據實以言不知京師乃不許安石大喜立薦對帝問青苖事定曰民甚便之於是諸言新法不便者帝皆不聽命定知諫院宰相言前無選人除諫官之例遂拜監察御史裏行知制誥宋敏求蘇頌李大臨言定不由銓考擢授朝列不緣御史薦置憲臺雖朝廷急於用才度越常格然隳紊法制所益者小所損者大封還制書詔諭數四頌等執奏不已並坐纍格詔命落知制誥天下謂之熙寧三舍人壬午罷監察御史裏行程皓張戬右正言李常時皓上疏言臣聞天下之理本諸簡易而行之以順道則事無不成故曰智者若禹之行水行其所無事也捨之而於險阻則不足以言智矣蓋自古興治雖有專任獨決能就事功者未聞輔弼大臣人各有心暌戾不一致國政異出名分不正中外人情交謂不可而能有為者也况於措置失宜沮廢公議一二小臣實預大計用賤陵貴以邪妨正者乎凡此皆天下之理不宜有成而智者之所不行也設令由此僥幸事有小成而興利之臣日進尚德之風浸衰尤非朝廷之福矧復天時未順地震連年四方人心日益搖動此皆陛下所當仰測天意俯察人事者也臣奉職不肖議論無補望早賜降責帝令皓詣中書議王安石方怒言者厲色待之皓徐言曰天下事非一家私議願平氣以聽之安石為之愧屈戩與臺官王子韶論新法不便乞召還孫覺吕公著又上疏論王安石亂法曾公亮陳升之依違不能救正韓絳左右徇從李定以邪諂竊臺諫吕惠卿刻薄辨給假經術以文姦言豈宜勸講君側又詣中書爭之安石舉扇掩面而笑戩曰戩之狂直宜為公笑然天下之笑公者不少矣陳升之從旁解之戩曰公亦不得為無罪升之有愧色常上言均輸青苗斂散取息傅會經義何異王莽猥析周官片言以流毒天下安石遣所親密諭意常不為止又言州縣散常平錢實不出本勒民出息帝詰安石安石請令常具官吏主名常以非諌官體不奉詔皓言既不行懇求外補而戬常亦各乞罷乃罷常通判滑戬知公安縣子韶知上元縣安石素善皓及是雖不合猶敬其忠信但出為京西路提點刑獄皓辭乃改僉書鎮寧軍節度判官數日之間臺諌一空安石以外議紛紛請以姻家謝景溫為侍御史知雜事帝從之五月癸巳詔並邊州郡毋給青苗錢甲辰詔罷制置三司條例歸中書以吕惠卿兼判司農寺先是言者皆請罷條例司帝問安石可併入中書否安石言修條例未畢且臣與韓絳共領是司每請間奏事今綘在密院未可併請緩之至是綘入中書乃降詔以其事還中書又以手扎諭安石凡修條例掾屬悉授以官青苗免役農田水利等法付司農寺命吕惠卿掌之九月以曾布為崇政殿説書判司農寺王安石常欲置其黨一二人于經筵以防察奏對者吕惠卿遭父喪去職安石遂薦布代之布資序淺人尤不服尋罷山隂陸佃嘗受經于安石至是應舉入京師安石問以新政佃曰法非不善但推行不能如初意還為擾民安石驚曰何乃爾吾與惠卿議之又訪外議佃曰公樂聞善古所未有然外間頗以為拒諫安石笑曰吾豈拒諫者但邪説營營顧無足聽佃曰是乃所以致人言也明日召佃謂之曰惠卿言私家取債亦須一雞半豚已遣李承之使淮南質究矣既而承之還詭言民無不便佃説遂不行以劉庠知開封府庠不肯屈事王安石安石欲見之或以為言庠曰安石自執政未嘗一事合人情往將何語邪卒不往而上疏極言新法非是帝曰奈何不與大臣協心濟治乎庠對曰臣知事陛下而已不敢附大臣也庚子曾公亮罷公亮初嫉韓琦故薦王安石以間之及同輔政知帝方向安石凡更張庶事一切隂助之而外若不與同者嘗遣其子孝寬參其謀至帝前略無所異由是帝益信任安石安石深德之公亮以老求去遂拜司空侍中集禧觀使蘇軾嘗從容責其不能救正變更公亮曰上與介甫如一人此乃天也然安石猶以公亮不盡阿附已於是聽其罷相乙巳親策賢良方正太原判官吕陶對曰陛下初即位願不惑理財之説不間老成之謀不興疆埸之事陛下措意立法自謂庶幾堯舜然以陛下之心如此天下之論如彼獨不反而思之乎及奏第帝顧王安石取卷讀讀未半神色頗沮帝覺之使馮京竟讀稱其言有理會范鎮所薦台州司户參軍孔文仲對策凡九千餘言力論安石所建理財訓兵之法非是宋敏求第為異等安石怒啓帝御批罷文仲還故官齊恢孫固封還御批韓維陳薦孫永皆力論文仲不當黜帝不聽范鎮上疏言文仲草茅疏逺不識忌諱且以直言求之而又罪之恐為聖明之纍亦不聽吕陶止授通判蜀州癸丑罷司馬光知永興軍冬十月翰林學士范鎮乞致仕許之鎮上疏言臣言不用無顔復立于朝請謝事復極論青苖之害且曰陛下有納諫之資大臣進拒諫之計陛下有愛民之性大臣用殘民之術疏入王安石大怒自草制極詆之遂以户部侍郎致仕鎮謝表略曰願陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養中和之福天下聞而壯之蘇軾往賀曰公雖退而名益重矣鎮愀然曰君子言聽計從使天下隂受其賜無智名無勇功吾獨不得為此使天下受其害而吾享其名吾何心哉十二月改諸路更戍法初太祖懲五代之弊用趙普策收四方徑兵列營京畿以備宿衛分番屯戍以捍邊圉于時將帥之臣入奉朝請獷暴之民收𨽻尺籍雖有桀驁恣肆而無所施其間為什長之法階級之辨使之內外相維上下相制截然而不可犯其後定兵制天子之衛兵以守京師更番戍邊者曰禁軍諸州之鎮兵以分給役使者曰廂軍選於户籍或應募使之團結以為所在防守者曰鄉軍具籍塞下以為藩籬者曰蕃軍大抵四者而已至是議者以更戍法雖無難制之患而兵將不相識緩急不可恃乃部分諸路將兵總𨽻禁旅使兵知其將將練其兵平居知有訓厲而無番戍之勞尋置京畿河北京東西路二十七將陜西五路四十二將然禁旅盡屬將官飲食嬉遊養成驕惰又將官遂與州郡長吏爭衡每將各有部隊將訓練官等數十人而諸州舊有總管鈐轄都監監押設官重復虛破廪祿知兵者皆知其非卒不能奪也乙丑立保甲法時王安石言先王以農為兵今欲公私財用不匱為宗社長久計當罷募兵用民兵乃立保甲其法十家為保有保長五十家為大保有大保長十大保為都保有都保正副主客户兩丁以上選一人為保丁附保兩丁以上有餘丁以壯勇者亦附之內家資最厚材勇過人者亦充保丁授之弓弩教之戰陳每一大保夜輪五人警盜凡告捕所獲以賞格從事同保犯強盜殺人強姦略人傳習妖教造蓄蠱毒知而不告依律伍保法餘事非干己又非敇律所聽紏皆無得告雖知情亦不坐若依法鄰保合坐罪者乃坐之其居停強盜三人經三日保鄰雖不知情科失覺罪逃移死絶同保不及五家併他保有自外入保者收為同保户數足則附之俟及十家則别為保置牌以書其戶數姓名提點刑獄趙子幾迎安石意請先行於畿甸詔從之遂推行於永興秦鳯河北東西五路以達於天下於是諸州籍保甲聚民而教之禁令苛急往往去為盜郡縣不敢以聞判大名府王拱辰抗言其害曰非止困其財力奪其農時是以法驅之使陷于罪罟也浸淫為大盜其兆已見縱未能盡罷願裁損下户以紓之主者指拱辰為沮法拱辰曰此老臣所以報國也抗章不已帝悟由是下户得免丁卯以韓綘王安石同平章政事戊寅行募役法先是詔條例司講立役法條例司言使民出錢募人充役即先王致民財以祿庶人在官者之意命呂惠卿曾布相繼草具條貫踰年始成計民之貧富分五等輸錢名免役錢若官户女户寺觀單丁未成丁者亦等第輸錢名助役錢凡輸錢先視州若縣應用雇直多少隨户等均取雇直又增取二分以備水旱欠闕謂之免役寬剩錢用其錢募人代役既試用其法于開封府遂推行于諸路既而東明縣民數百紛然詣開封府訴帝知之以詰安石安石力言外間扇搖役法者謂輸多必有嬴餘若羣訴必可免彼既聚衆僥幸茍受其訴與免輸錢當仍役之帝乃盡用其言尋以臺諌多論奏因謂安石宜少裁之安石對曰朝廷制法當斷以義豈須規規恤淺近之人議論邪司馬光言上等户自來更互充役有時休息今使嵗出錢是常無休息之期下等户及單丁女户從來無役今盡使之出錢而鰥寡孤獨之人俱不免役夫力者民之所生而有榖帛者民可耕桑而得至於錢者縣官之所鑄民之所不得私為也今有司立法惟錢是求嵗豐則民賤糶其榖嵗凶則伐桑棗殺牛賣田得錢以輸民何以為生乎此法卒行富室差得自寬貧者困窮日甚矣帝不聽庚辰命王安石提舉編修三司令式時天下以新法騷然邵雍屏居于洛門人故舊仕宦中外者皆欲投劾而歸以書問雍雍曰正賢者所當盡力之時新法固嚴能寬一分則民受一分之賜矣投劾何益邪四年三月辛卯詔察奉行新法不職者陳留知縣薑濳到官才數月青苖令下濳即榜于縣門又移之鄉村各三日無人至遂撤榜付吏曰民不願矣即移疾去山隂知縣陳舜俞上書極論新法謫監南康軍鹽酒稅至是復上書言青苖法實便初迷不知爾識者笑之夏四月癸酉以司馬光判西京留臺先是光在永興以言不用乞判西京留臺不報又上疏曰臣之不才最出羣臣之下先見不如呂誨公直不如范純仁程皓敢言不如蘇軾孔文仲勇決不如范鎮今陛下唯安石是信附之者謂之忠良攻之者謂之讒慝臣今日所言陛下之所謂讒慝者也若臣罪與范鎮同即乞依鎮例致仕若罪重於鎮或竄或誅所不敢逃久之乃從其請光既歸洛自是絶口不復論事出直史館蘇軾通判杭州軾自直史館議貢舉與帝合即日召見問方今政令得失軾對曰陛下天縱文武不患不明不患不勤不患不斷但患求治太急聽言太廣進人太鋭願鎮以安靜待物之來然後應之帝竦然曰卿三言朕當熟思之凡在館閣皆當為朕深思治亂無有所隱軾退言于同列王安石不悅命軾權開封府推官將困之以事軾決斷精敏聲聞益逺嘗以新法不便上疏極論且曰臣之所言者三言而已願陛下結人心厚風俗存紀綱人主所恃者人心也自古及今未有和易同衆而不安剛果自用而不危者祖宗以來治財用者不過三司今陛下又創制置三司條例司使六七少年日夜講求於內使者四十餘輩分行營幹於外以萬乘之主而言利以天子之宰而治財君臣宵旰幾一年矣而富國之功茫如捕風徒聞內帑出數百萬緍祠部度五千人耳以此為術人皆知其難也汴水濁流自生民以來不以種稻今欲陂而清之萬頃之稻必用千頃之陂一嵗一淤三嵗而滿矣陛下使相視地形所在鑿空訪尋水利隄防一開水失故道雖食議者之肉何補於民自古役人必用鄉户今徒聞江浙之間數郡雇役而欲措之天下自楊炎為兩稅租調與庸既兼之矣奈何復欲取庸青苗放錢自昔有禁今陛下始立成法每嵗常行雖云不許抑配而數世之後暴君汚吏陛下能保之乎昔漢武以財力匱竭用桑𢎞羊之説買賤賣貴謂之均輸于時商賈不行盜賊滋熾幾至於亂臣願陛下結人心者此也國家之所以存亡者在道德之淺深不在乎強與弱厯數之所以長短者在風俗之厚薄不在乎富與貧臣願陛下務崇道德而厚風俗不願陛下急於有功而貪富強仁祖持法至寬用人有序專務掩覆過失未嘗輕改舊章考其成功則曰未至言乎用兵則十出而九敗言乎府庫則僅足而無餘徒以德澤在人風俗知義故升遐之日天下歸仁議者見末年吏多因循事不振舉乃欲矯之以苛察濟之以智能招來新進勇鋭之人以圖一切速成之效未享其利澆風已成欲望風俗之厚豈可得哉臣願陛下厚風俗者此也祖宗委任臺諌未嘗罪一言者縱有薄責旋即超升許以風聞而無官長言及乘輿則天子改容事關廊廟則宰相待罪臺諌固未必皆賢所言亦未必皆是然須養其鋭氣而借之重權者將以折姦臣之萌也臣聞長老之談皆謂臺諌所言常隨天下公議今者物論沸騰怨讟交至公議所在亦知之矣臣恐自兹以往習慣成風盡為執政私人以致人主孤立綱紀一廢何事不生臣願陛下存紀綱者此也時王安石贊帝以獨斷專任軾因試進士發䇿以晉武平吳獨斷而克苻堅伐晉獨斷而亡齊桓專任管仲而霸燕噲專任子之而敗事同功異為問安石滋不悅使侍御史謝景溫論奏軾向丁憂歸蜀乘舟商販詔下六路捕逮篙工水師窮治無所得軾遂請外通判杭州以鄧綰為侍御史判司農寺初綰通判寧州知王安石得君專政乃條上時事數十以為宋興百年習安玩治當事更化且言陛下得伊周之佐作青苖免役等法民莫不歌舞聖澤願勿移于浮議而堅行之復貽安石書極其諛佞由是安石力薦於帝遂驛召對會夏人寇慶州綰於帝前敷陳甚悉帝問識王安石呂惠卿否綰對曰不識也帝曰安石今之古人惠卿賢人也退見安石欣然如素交屬安石致齋陳升之以綰練習邊事使復知寧州綰聞之不樂誦言急召我來乃使還邪或問君今當作何官綰曰不失為館職得無為諌官乎明日果除集賢校理檢正中書孔目房鄉人在都者皆笑且罵綰曰笑罵從他笑罵好官還我為之尋同知諌院時新法皆出司農而呂惠卿居憂曾布不能獨任其事安石欲藉綰以威衆故有是命五月甲午右諌議大夫呂誨卒誨有疾表乞致仕曰臣本無宿疾偶值醫者用術乖方妄投藥劑寖成風痺遂艱行步非秪憚􅀈戾之苦又將虞心腹之變勢已及此為之奈何雖然一身之微固未足恤其如九族之託良以為憂蓋以身疾喻朝政也至是病亟司馬光往省之至則目已瞑聞光哭張目強視曰天下事尚可為君實勉之遂卒年五十八海內識與不識咸痛惜之時保甲法行帝聞鄉民憂無錢買弓矢加以傳惑徙之戍邊父子聚泣語王安石曰保甲宜緩而密安石對曰日力可惜韓維時知開封上言諸縣團結保甲鄉民驚擾至有截指斷腕以避丁者乞候農隙排定帝以問安石安石對曰此固未可知就令有之亦不足怪帝曰民言合而聽之則聖亦不可不畏也安石對曰為天下者如止欲任民情所願而已則何必立君而為之張官置吏也大抵保甲法不特除盜固可漸習為兵且省財費惟陛下果斷不恤人言以行之帝遂變河東北陜西三路義勇如府畿保甲法未幾維出知襄州甲戍富弼移判汝州弼在亳州持青苖法不行曰如是則財聚於上人散於下提舉官趙濟劾弼沮格詔旨鄧綰乞付有司鞫治乃落弼武寧節度使同平章事以左僕射移判汝州王安石曰弼雖謫猶不失富貴昔鯀以方命殛共工以象恭流弼兼二罪止奪使相何由沮姦帝不答弼行過應天謂判府張方平曰人固難知也方平曰謂王安石乎亦豈難知者方平頃知皇祐貢舉或稱安石文學辟以考校既至院中之事皆欲紛更方平惡其為人檄之使出自是未嘗與語弼有愧色蓋弼亦素喜安石也秋七月丁酉御史中丞楊繪言提舉常平張靚等科配助役錢一户多者至三百千乞少裁損以安民心不聽時賢士多引去以避王安石楊繪又上疏言老成人不可不惜當今舊臣多引疾求去范鎮年六十有三呂誨年五十有八歐陽修年六十有五而致仕富弼年六十有八而引疾司馬光王陶皆五十而求散地陛下可不思其故乎安石聞而深惡之劉摯為安石所器拜監察御史裏行入見帝靣賜褒諭因問卿從學王安石邪安石極稱卿器識對曰臣東北人少孤獨學不識安石也退而上疏曰君子小人之分在義利而已小人希賞之志每在事先奉公之心每在私後陛下有勸農之意今變而為煩擾陛下有均役之意今倚以為聚斂天下有喜於敢為有樂於無事彼以此為流俗此以彼為亂常畏義者以進取為可耻嗜利者以守道為無能此風浸成漢唐黨禍必起矣因陳率錢助役十害會楊繪又論提刑趙子幾怒知東明縣賈蕃不禁遏縣民使訟助役事托以他故下蕃於獄而自鞫之是希安石意指又言助役之難行者有五劉摯亦論趙子幾捃托賈蕃是欲鉗天下之口乞按其罪於是安石大怒使知諌院張璪取繪摯所論助役十害五難行之事作十難以詰之璪辭不為曾布請為之既作十難且劾楊繪劉摯欺誕懷向背詔下其疏於繪摯使各言狀繪録前後四奏以自辨摯奮然曰為人臣豈可壓於權勢使天子不知利害之實即條對所難以伸其説曰助役斂錢之法有大臣及御史主之於內有大臣親黨為監司提舉官行之於諸路其勢甚易矣然曠日彌年終未有定論者為不順乎民心也臣待罪言責采士民之説以聞職也今乃遽令分析交口相直無乃辱陛下耳目之任哉所謂向背則臣所向者義所背者利所向者君父所背者權臣願以臣章并司農奏宣示百官考定當否不報明日復上疏曰陛下夙夜勵精以親庶政天下未致於安且治者誰致之耶陛下注意以望太平而自以太平為己任得君專政者是也二三年間開闔搖動舉天地之內無一民一物得安其所者其議財則市井屠販之人皆召至政事堂其征利則下至厯日而官自鬻之推此以往不可究言輕用名器淆混賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之為流俗敗常害民者謂之為通變凡政府謀議經畫除用進退獨與一掾屬曾布者論定然後落筆同列預聞反在其後故奔走乞丐之人布門如市今西夏之欵未入反側之兵未安三邊瘡痍流潰未定河北大旱諸路大水民勞財乏縣官減耗聖上憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也疏奏安石欲竄摯嶺外帝不許詔貶繪知鄭州謫摯監衡州鹽倉璪亦落職遣察訪使遍行諸路促成役書八月以王雱為崇政殿説書雱安石子為人慓悍隂刻無所顧忌性敏甚未冠已著書數十萬言鄧綰曾布力薦之遂有是命雱嘗稱商鞅為豪傑之士且言不誅異議者則法不行安石一日與程皓語雱囚首跣足㩦婦人冠以出問父所言何事曰以新法為人所沮故與程君議之雱大言曰梟韓琦富弼之首于市則法行矣安石遽曰兒誤矣皓曰方與參政論國事子弟不可與姑退雱不樂九月鬻諸路坊場河渡募人承買收取淨利嵗收六百九十八萬六千緡穀帛九十七萬六千六百石匹有竒既而司農并祠廟鬻之聽民為賈區其中冬十月以鮮于侁為利州轉運副使初詔監司各定所部助役錢數利州路轉運使李瑜欲定四十萬侁時為判官爭之曰利州民貧地瘠半此可矣瑜不從遂各為奏時諸路役書皆未就帝是侁議諭司農曾布使頌以為式因黜瑜而擢侁副使兼提舉常平初王安石居金陵有重名士大夫期以為相侁惡其沽激要君嘗語人曰是人若用必壞亂天下及安石用事侁乃上書論時政曰可為憂患者一可為太息者二其他逆治體而召民怨者不可槩舉其意專指安石安石怒毁短之帝稱其有文學可用安石曰何以知之帝曰有章奏在安石乃不敢言既為副使部民不請青苖錢安石遣吏詰之侁曰青苖之法願取則與民自不願豈能強之哉蘇軾稱侁上不害法中不廢親下不傷民以為三難五年春正月己亥置京城邏卒察謗時政者收罪之三月富弼致仕弼至汝州兩月即上言新法臣所不曉不可以治郡願歸洛養疾許之遂請老復授司空武寧節度使致仕弼雖家居朝廷有大利害知無不言帝雖不盡用而眷禮不衰嘗因王安石有所建明帝却之曰富弼手疏稱老臣無所告訴但仰屋竊嘆者即當至矣其敬之如此丙午行市易法六市易司皆𨽻焉夏四月丙午行保甲養馬法詔開封府界諸縣保甲願牧馬者聽仍令以陜西所市馬選給之詔曾布等上其條約凡陜西五路義勇保甲願養馬者户一匹物力髙願養二匹者聽皆以監牧見馬給之或官與其直令自市先行于開封府及陜西五路府界無過三千匹五路毋過五千匹襲逐盜賊外乘越三百里者有禁嵗一閲其肥瘠死病者補償在府界者免體量草二百五十束加給以錢布在五路者嵗免折變緣納錢三等以上十户為一保四等以下十户為一社以待病斃逋償者保户馬死保户獨償社户馬死社户半償之其後遂遍行于諸路王安石求去位帝不許先是樞密都承旨李評喜論事帝多從其言又嘗極言助役不便安石惡之會評妄奏罷閣門官吏安石言其作威福必欲罪之帝亦謂評有罪然未始罪評也明日安石入見乞東南一郡帝曰自古君臣如卿與朕相知極少朕鄙鈍初未有知自卿在翰林始聞道德之説心稍開悟天下事方有緒卿何得言去安石固請帝曰卿得非以李評事謂朕有疑心朕自知制誥知卿屬以天下事如呂誨比卿少正卯盧把朕不為惑豈更有人能惑朕者未幾安石復自齎表入請帝不視以表授安石固令就職八月甲辰頒方田均稅法帝患田賦不均詔司農重定方田及均稅法頒之天下方田之法以東西南北各千步當四十一頃六十六畝一百六十步為一方嵗以九月縣委令佐分地計量隨陂原平澤而定其地因赤淤黑壚而辨其色方量畢以地及色參定肥瘠而分五等以定其稅則至明年三月畢揭以示民一季無訟即書户帖連莊帳付之以為地符均稅之法縣各以其租額稅數為限舊嘗收蹙竒零如米不及十合而收為升絹不滿十分而收為寸之類今不得用其數均攤增展致溢舊額凡越額增數皆禁若瘠鹵不毛及衆所食利山林陂塘溝路墳墓皆不立稅凡田方之角立土為峯植其野之所宜木以封表之有方帳有莊帳有甲帖有户帖其分煙析産典賣割移官給契縣置簿皆以今所方之田為正令既具乃以巨野縣尉王曼為指教官先自京東路行之諸路倣焉六年夏四月己亥文彥博罷彥博久居樞密以王安石多變舊典言于帝曰朝廷行事務合人心宜兼采衆論以靜重為先陛下勵精求治而人心未安蓋更張之過也祖宗法未必皆不可行但有偏而不舉之弊爾安石知為已而發奮然排之曰求去民害何為不可若萬事隳脞乃西晉之風何益于治及市易司立至果實亦官監賣彥博以為損國體斂民怨致華嶽山崩為帝極言之且曰衣冠之家罔利于市縉紳清議尚所不容豈有堂堂大國皇皇求利而天意有不示警者乎安石曰華山之變殆天意為小人發市易之起自為細民久困以抑兼并爾於官何利焉彥博求去益力遂以司空河東節度使判河陽徙大名府九月收免行錢先是京師百物有行官司所須俱以責辦下逮貧民浮販類有陪折呂嘉問請約諸行利入厚薄令納錢以賦吏祿與免行戶祗應而禁中賣買百貨并下雜買場務仍置市司估物低昻凡內外官司欲占物價則取辦焉至是行之七年夏四月癸酉權罷新法自去嵗秋七月不雨以至于是月帝憂形于色嗟嘆懇惻欲盡罷法度之不善者王安石曰水旱常數堯湯所不免陛下即位以來纍年豐稔今旱暵雖久但當修人事以應之帝曰朕所以恐懼者正為人事之未修爾今取免行錢太重人情咨怨自近臣以至后族無不言其害者馮京曰臣亦聞之安石曰士大夫不逞者以京為歸故京獨聞此言臣未之聞也初光州司法參軍鄭俠為安石所奬拔感其知已思欲盡忠及滿秩入京安石問以所聞俠曰青苖免役保甲市易數事與邊鄙用兵在俠心不能無區區也安石不答至是俠監安上門會嵗飢征斂苛急東北流民每風沙霾曀扶㩦塞道羸疾愁苦身無完衣或茹木實草根至身被鎖械而負瓦揭木賣以償官纍纍不絶乃繪所見為圖及疏言時政之失詣閣門不納遂稱密急發馬遞上之其略曰陛下南征北伐皆以勝捷之勢作圖來上並無一人以天下憂苦父母妻子不相保遷移困頓遑遑不給之狀為圖而獻者臣謹按安上門逐日所見繪成一圖百不及一但經聖覽亦可流涕況於千萬里之外哉陛下觀臣之圖行臣之言十日不雨即乞斬臣宣德門外以正欺君之罪疏奏帝反覆觀圖長吁數四袖以入內是夕寢不能寐翌日遂命開封體放免行錢三司察市易司農發常平倉三衛具熙河所用兵諸路上民物流散之故青苖免役權息追呼方田保甲並罷凡十有八事民間歡呼相賀是日果大雨逺近沾洽甲戌輔臣入賀雨帝出俠圖及疏示輔臣問王安石曰識俠否安石曰嘗從臣學因上章求去外間始知所行之由羣姦切齒遂以俠付御史獄治其擅發馬遞罪吕惠卿鄧綰言于帝曰陛下數年忘寢與食成此美政天下方被其賜一旦用狂夫之言罷廢殆盡豈不惜哉相與環泣于帝前於是新法一切如故惟方田暫罷丙戌王安石罷以韓絳同平章事呂惠卿參知政事安石執政六年更法度開邊疆老成正士廢黜殆盡儇慧巧佞超進用事天下怨之而帝倚任益專太皇太后嘗乘間語帝曰祖宗法度不宜輕改吾聞民間甚苦青苖助役宜罷之帝曰此以利民非苦之也后又曰安石誠有才學然怨之者甚衆欲保全之不若暫出之於外帝曰羣臣惟安石為國家當事時帝弟岐王皓在側因進曰太后之言不可不思帝怒曰是我敗壞天下邪汝自為之皓泣曰何至是邪皆不樂而罷久之太后流涕謂帝曰安石亂天下奈何帝始疑之及鄭俠疏進安石不自安遂求去位帝再四勉留安石請益堅乃以觀文殿大學士知江寧府呂惠卿使其黨變姓名曰投匭留之安石感其意因乞韓絳代已而惠卿佐之帝從其請二人守其成規不少失時號絳為傳法沙門惠卿為護法善神惠卿懼中外有議新法者乃作書遍遺監司郡守使陳利害又從容白帝下詔言終不以吏違法之故為之廢法故安石所建無所更復五月三司使曾布提舉市易司呂嘉問罷先是呂嘉問提舉市易連以羡課受賞帝聞其擾民以語王安石安石對曰嘉問奉法在公以是媒怨帝曰免行錢所收細瑣市易鬻及果實氷炭太傷國體安石力辨至譏帝為叢脞不知帝王大略帝曰即如是士大夫何故以為不便安石請言者姓名令嘉問條析及帝以旱故命韓維孫永集市人問之減坐賈錢千萬安石遂持嘉問條析奏曰朝廷所以許民輸錢免行者蓋人情安於樂業厭於追擾若一切罷去則無人祗承又吏胥祿廪薄勢不得不求於民非重法莫禁以薄廩申重法則法有時而屈今取於民鮮而吏知自重此臣等推行之本意也議者乃欲除去是殆不然民未嘗不畏吏方其以行役觸罪雖欲出錢亦不可得今吏之祿可謂厚矣然未及昔日取民所得之半也時市易𨽻三司嘉問恃勢陵使薛向出其上及曾布代向懷不能平會帝出手劄詢布布訪于魏繼宗具上嘉問多收息干賞挾官府而為兼并之事帝將委布考之安石言二人有私忿於是詔布與呂惠卿同治惠卿故憾布脅繼宗使誣布繼宗不從布言惠卿不可共事帝欲聽之安石不可帝遂詔中書曰朝廷設市易本為平凖以便民若周官泉府者今顧使中人之家失業若此吾民安得泰然也宜釐定其制布見帝言曰臣每聞德音欲以王道治天下今市易之為虐駸駸乎間架除陌之事矣如此之政書之簡牘不獨唐虞三代所無厯觀秦漢以來衰亂之世恐未之有也嘉問又請販鹽鬻帛豈不貽笑四方帝頷之事未決安石去位嘉問持之以泣安石勞之曰吾已薦惠卿矣及惠卿執政遂治前獄劾布沮新法出知饒州嘉問亦出知常州以章惇為三司使秋七月立手實法時免役出錢或未均呂惠卿用其弟曲陽縣尉和卿計創手實法其法官為定立物價使民各以田畝屋宅資貨畜産隨價自占凡居錢五當蕃息之錢一非用器食粟而輒隱落者許告獲實以三分之一充賞預具式示民令依式為狀縣受而籍之以其價列定髙下分為五等既該見一縣之民物産錢數乃參會通縣役錢本額而定所當輸錢詔從其言於是民家尺椽寸土檢括無遺至於雞豚亦遍抄之民不聊生初惠卿制是法然猶災傷五分以上不預荆湖察訪使蒲宗孟上言此天下之良法使民自供初無所擾何待豐嵗願詔有司勿以豐凶弛張其法從之民於是益困矣冬十月庚辰置三司會計司初帝嘗患增置官司費財王安石謂增置官司所以省費帝曰古者什一而稅今取財百端安石謂古非特什一而已安石又欲盡祿天下之吏帝未之許而三司上新增吏祿嵗至緡錢百十一萬有竒主新法者皆謂吏祿既厚則人知自重不敢冒法可以省刑然良吏實寡賕取如故往往陷重辟議者不以為善詔三司帳司會計是嵗天下財用出入之數以聞令宰相提舉其事至是韓絳請選官置司以天下户口人丁稅賦場務坑冶河渡房園之類租額年課及一路錢穀出入之數去其重復嵗比較增虧廢置及羡餘橫費計嬴闕之處使有無相通而以任職能否為黜陟則國計大綱可以省察三司使章惇亦以為言乃詔置三司會計司以絳提舉八年春正月鄭俠上疏論呂惠卿朋黨壅蔽仍取唐魏徴姚崇宋璟李林甫盧把傳為兩軸題曰正直君子邪曲小人事業圖迹在位之臣暗合林甫輩而反於崇璟者各以其類復為書獻之且薦馮京可相并言禁中有人被甲登殿詬罵等事惠卿奏為謗訕令中丞鄧綰知制誥鄧潤甫治之遂編管俠于汀州御史臺吏楊忠信謁俠曰御史緘默不言而君上書不已是言責在監門而臺中無人也取懷中名臣諌疏二帙授俠曰以此為正人助馮京與呂惠卿同在政府議論多不合而王安國素與俠善御史張璪承惠卿旨劾俠嘗遊京之門交通有迹鄧綰鄧潤甫言王安國嘗借俠奏藁觀之而有奬成之言意在非毀其兄於是放安國歸田里出京知亳州時俠貶汀州已行惠卿又令舒亶捕之道搜其篋得所録名臣諌疏有言新法事及親友書尺悉按姓名治之獄成惠卿欲致俠以死帝曰俠所言非為身也忠誠亦可嘉豈宜深罪但徙俠英州初安國任西京國子教授秩滿至京師帝以安石故特召對問曰漢文帝何如主安國對曰三代以後未有也帝曰但恨其才不能立法更制耳安國對曰文帝自代來入未央宮定變故于俄頃呼吸間恐無才者不能至用賈誼言待羣臣有節專務以德化民海內興於禮義幾致刑措則文帝加有才一等矣帝曰王猛佐苻堅以蕞爾國而令必行今朕以天下之大不能使人何也曰猛教堅以峻法殺人致秦祚不傳世今刻薄小人必有以是誤陛下者願專以堯舜三代為法則下豈有不從者乎帝又問卿兄秉政外論謂何安國對曰恨知人不明聚斂太急爾帝不悅由是止授崇文院校書尋改祕閣校理安國屢以新法之弊力諌安石又嘗以佞人目惠卿故惠卿逐之二月癸酉復以王安石同平章事初呂惠卿迎合安石建立新法安石故力援引驟至執政惠卿既得志有射羿之意忌安石復用遂欲逆閉其途凡可以害安石者無所不用其智一時朝士見惠卿得君謂可傾安石以媚惠卿遂更朋附之而鄧綰鄧潤甫因李逢之獄又挾李士寧以撼安石安石聞而怨之時韓絳顓處中書事多稽留不決且數與惠卿爭論度不能制密請帝復用安石帝從之惠卿聞之不安乃條列安石兄弟之失數事靣奏意欲上意有二上封惠卿所言以示安石安石上表有忠不足以取信故事事欲須自明義不足以勝姦故人人與之立敵蓋謂是也既而安石承召命即倍道而進七日至汴京初蜀人李士寧者得導氣養生之術自言時已三百嵗矣又能言人休咎王安石與之有舊每延於東府迹甚熟安石鎮金陵呂惠卿參大政會山東告李逢劉育之變事連宗子趙世居御史府沂州各起獄推治之劾者言士寧嘗預此謀敕天下捕之獄具世居賜死李逢劉育磔于市士寧決杖流永州連坐者甚衆惠卿始興此獄引士寧意欲有所誣衊會安石再入秉政謀遂不行冬十月庚寅呂惠卿罷御史蔡承禧論惠卿欺君玩法立黨肆姦惠卿居家俟命中丞鄧綰亦欲彌縫前附惠卿之迹以媚安石安石子雱復深憾惠卿遂諷綰發惠卿兄弟強借秀州華亭富民錢五百萬與知華亭縣張若濟買田共為姦利事置獄鞫之惠卿竟罷出知陳州綰又論三司使章惇協濟惠卿之姦出知湖州乙未彗出軫帝以災異數見避殿減膳詔求直言赦天下詢政事之未協于民者程皓應詔論朝政極切差知扶溝縣事王安石率同列上疏言晉武帝五年彗出軫十年又有孛而其在位二十八年與乙巳占所期不合蓋天道逺先王雖有官占而所信者人事而已禆竈言火而驗欲禳之國僑不聽鄭亦不火有如禆竈未免妄誕況今星工哉竊聞兩宮以此為憂望以臣等所言力行開慰帝曰聞民間殊苦新法安石對曰祁寒暑雨民猶怨咨此無庸恤帝曰豈若并祁寒暑雨之怨亦無邪安石不悅退而屬疾卧帝慰勉起之其黨謀曰今不取上素所不喜者暴進用之則權輕將有窺人間隙者安石是其䇿帝喜其出凡所進用悉從之鄧綰言凡民養生之具日用而家有之今欲盡令疏實則家有告訐之憂人懷隱匿之慮商賈通殖貨利交易有無或春有之而夏已蕩析或秋貯之而冬已散亡公家簿書何由拘録其勢安得不犯徒使嚚訟者趨賞報怨畏怯者守死忍困而已詔罷手實法九年秋七月鄧綰罷呂惠卿既出守陳而張若濟之獄久不成王雱令門下客呂嘉問練亨甫共取鄧綰所列惠卿事雜他書下制獄王安石不知也省吏告惠卿于陳惠卿以狀聞且上書訟安石盡棄所學隆尚縱橫之末數方命矯令罔上要君力行於年嵗之間雖失志倒行逆施者殆不如此帝以狀示安石安石謝無有歸以問雱雱言其情安石咎之雱憤恚疽發背死帝頗厭安石所為綰慮安石去失勢乃上書言宜録安石子及壻仍賜第京師帝以語安石安石曰綰為國司直而為宰臣乞恩澤極傷國體當黜之帝以綰操心頗僻賦性姦回論事薦人不循分守斥知虢州冬十月丙午王安石罷安石之再相也屢謝病求去及子雱死尤悲傷不堪力請解機務帝益厭之乃以使相判江寧府尋改集禧觀使安石既退處金陵往往寫福建子三字蓋深悔為呂惠卿所誤也以吳充王圭同平章事充子安持雖娶王安石女而充心不善安石所為數為帝言新法不便帝察充中立無與及安石罷遂相之充欲有所變革乞召還司馬光呂公著韓維蘇頌及薦孫覺李常程皓等數十人光自洛貽書充曰自新法之行中外洶洶民困於煩苛迫於誅斂愁怨流離轉死溝壑日夜引領冀朝廷覺悟一變敝法今曰救天下之急當罷青苖免役保甲市易而息征伐之謀欲去此五者必先别利害開言路以悟人主之心今病雖已深猶未至膏肓失今不治遂為痼疾矣充不能用以馮京知樞密院事時呂惠卿告安石罪發其私書有無使上知及勿令齊年知之語京與安石同年生故云帝以安石為欺而賢京故召用之宋史紀事夲末卷八
