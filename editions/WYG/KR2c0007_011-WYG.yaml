body:
  text: 宋史紀事本末卷十一明馮𤦺原編陳邦瞻增輯孟后廢復哲宗元祐七年夏四月己未立皇后孟氏后洛州人馬軍都虞候元之孫帝年益壯太皇太后歴選世家女百餘人入宫后年十六太皇太后皇太后皆愛之教以女儀至是太皇太后諭執政曰孟氏女能執婦道宜正位中宫命學士草制又以近世禮儀簡畧詔翰林臺諌給舎與禮官議冊后六禮儀制以進遂命吕大防兼六禮使韓忠彦充奉迎使蘇頌王巖叟充發冊使蘇轍皇叔祖宗景充告期使皇伯祖宗晟范百祿充納徴使王存劉奉世充納吉使梁燾鄭雍充納采問名使帝御文徳殿冊為皇后太皇太后語帝曰得賢内助非細事也既而歎曰斯人賢淑惜福薄耳異日國有事變必此人當之紹聖三年八月竄范祖禹于賀州劉安世于英州時劉媫妤專寵内庭前祖禹元祐中聞禁中覔乳媼以帝年十四非近女色之時與安世上疏勸進徳愛身又乞太皇太后保䕶聖躬言甚切至太后謂曰乳媼之説外間虚傳也祖禹對曰外議雖虛亦足為先事之戒太后深嘉之至是章惇蔡卞摭諌乳媪事乃指媫妤也於是坐二人搆造誣謗之罪九月乙卯廢皇后孟氏初劉媫妤嘗同后朝景靈宫訖事就坐嬪御皆立侍媫妤獨背立簾下后閣中陳迎兒訶之媫妤不顧閣中皆忿㑹冬至朝太后於隆祐宫后座朱髹金飾媫妤亦欲得之從者知其意易座與后等衆弗能平因傳唱曰皇太后出后起立媫妤亦起尋復坐或已撤媫妤座遂仆于地懟不復朝泣訴于帝内侍郝隨謂媫妤曰毋以此戚戚願為大家早生子此座正當媫妤有也㑹后女福慶公主疾后有姊頗知醫嘗已后危疾以故出入宫掖公主藥弗效持道家治病符水入治后驚曰姊寧知宫中禁嚴與外間異耶令左右蔵之俟帝至具言其故帝曰此人之常情耳后即爇符于帝前宫中相傳厭魅之端作矣未幾后養母聴宣夫人燕氏尼法端為后禱祠事聞詔入内押班梁從政等即皇城司鞫之捕逮宦者宫妾三十人榜掠備至肢體毁折至有㫁舌者獄成命御史董敦逸覆錄罪人過庭下氣息僅屬無一人能出聲者敦逸秉筆疑未下郝隨等以言脅之敦逸畏禍乃以奏牘上詔廢后為華陽教主玉清妙靜仙師法名冲真出居瑤華宫時章惇欲誣宣仁后有廢立計以后逮事宣仁又隂附劉媫妤欲請建為后遂與郝隨搆成是獄天下寃之踰兩旬敦逸奏中宫之廢事有所因情有可察臣常閱錄其獄恐得罪天下帝欲貶之曾布曰陛下以獄出於近習推治故命敦逸錄問今乃貶之何以取信中外乃止元符二年九月丁未立賢妃劉氏為皇后后多材藝被專􅃂既搆孟后章惇與内侍郝隨劉友端相結請妃正位中宫時帝未有儲嗣㑹妃生子茂帝大喜遂立焉時鄒浩方劾章惇不忠慢上之罪未報而劉后立浩上疏言立后以配天子安得不審今為天下擇母而所立乃賢妃一時公議莫不疑惑誠以國家自有仁祖故事不可不遵用之耳葢郭后與尚美人爭寵仁祖既廢后並斥美人所以示公也及立后則不選於妃嬪而卜其貴族所以逺嫌所以為天下萬世法也陛下之廢孟氏與郭后無以異果與賢妃爭寵而致罪乎抑或不然也二者必居一於此矣孟氏罪廢之初天下孰不疑立賢妃為后及讀詔書有别選賢族之語又陛下臨朝既歎以為國家不幸至于宗景立妾怒而罪之於是天下始釋然不疑今竟立之豈不上累聖徳臣觀白麻所言不過稱其有子及引永平祥符事以為證臣請論其所以然若曰有子可以為后則永平貴人未嘗有子所以立者以徳冠後宫故也祥符徳妃亦未嘗有子所以立者以鍾英甲族故也又况貴人實馬援之女徳妃無廢后之嫌迥與今日事體不同頃年冬妃從享景靈宫是日雷變甚異今宣制之後霖雨飛雹自奏告天地宗廟以來隂霳不止上天之意豈不昭然考之人事既如彼求之天意又如此望不以一時改命為難而以萬世公議為可畏追停册禮如初詔行之帝謂浩曰此亦祖宗故事豈獨朕耶葢指真宗立劉徳妃也對曰祖宗大徳可法者多矣陛下不之取而效其小疵臣恐後世之責人無已者紛紛也帝變色猶不怒持其章躊躇四顧凝然若有所思因付于外明日章惇詆浩狂妄除名勒停羈管新州尚書右丞黄履進曰浩以親被拔擢之故敢犯顔納忠陛下遽出之死地人臣將視以為戒誰復為陛下論得失乎幸與善地不聴初陽翟田畫議論慷慨與浩以氣節相激厲劉后立畫謂人曰志完不言可以絶交矣浩既得罪畫迎諸途浩出涕畫正色責之曰使志完隠黙京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君毋以此舉自滿士所當為者未止此浩茫然自失謝曰君贈我厚矣浩之將論事也以告其友宗正寺簿王囘囘曰事有大於此者乎子雖有親然移孝為忠亦太夫人素志也及浩南遷人莫敢顧囘歛交游錢與浩治裝往來經理且慰安其母邏者以聞逮詣詔獄衆為之懼囘居之晏如御史詰之囘曰實嘗預謀不敢欺也因誦浩所上章凡二千言獄上除名停廢囘即徒步出都門行數十里其子追及問以家事不答又有曾誕者嘗三以書勸浩論孟后事浩不報及浩廢誕作玉山主人對客問以譏浩不能力諌孟后之廢而俟朝廷過舉乃言為不知幾云閏月子茂卒三年春正月己卯帝崩無子弟端王佶即位辛巳尊皇后劉氏為元符皇后五月丙子詔復哲宗廢后孟氏為元祐皇后初哲宗嘗悔廢后事歎曰章惇壊我名節至是太后將復后位㑹布衣何文正上書言之遂降是詔自瑤華宫還居禁中陳邦瞻曰按陳瓘論廢后事有曰當時致此之因葢生於元祐之説也以繼神考為説以讐毁宣仁為心者其於元祐譬如刈草欲除其根瑤華乃宣仁所厚萬一有預政之時則元祐未必不復是以任事之臣懐刈草之慮則瑤華惡得而不廢乎知經術者獨謀于心宰政柄者獨㫁於手方其造意自謂密矣而已難逃於見㣲之士嗚呼小人之愚其君一至是哉其可畏也人情莫親於父子莫昵于夫婦李林甫用而明皇不能有其子蔡卞章惇之計行而哲宗不能有其妻哀哉徽宗崇寧元年冬十月甲戌復廢元祐皇后孟氏時元符皇后閣宦者郝隨諷蔡京再廢元祐皇后京未得間既而昌州判官馮澥上書論復后為非於是御史中丞錢遹殿中侍御史石豫左膚連章論韓忠彦等乘一布衣何文正狂言復瑤華之廢后掠流俗之虚美當時物議固已洶洶乃至疎逖小臣詣闕上書忠義激切則天下公議從可知矣望詢考大臣㫁以大義無牽于流俗非正之論以累聖朝京與許將溫益趙挺之張商英皆主臺臣之説請如紹聖三年九月詔書帝不得已從之詔罷元祐皇后之號復出后於瑤華宫且治元符末議復后號者降宰臣韓忠彦曾布官追貶李清臣雷州司户㕘軍黄履祁州團練副使安置翰林學士曾肇御史中丞豐稷諫臣陳瓘龔夬等十七人於逺州十二月追諡哲宗子茂為獻愍太子初鄒浩召自新州入對帝首及諫立后事奬歎再三詢諫草安在對曰已焚之矣退告陳瓘瓘曰禍其在此乎異時姦人妄出一緘則不可辨矣蔡京用事乃使其黨偽為浩疏有劉后殺卓氏而奪其子以為已出欺人可也詎可以欺天乎之語帝詔暴其事遂追冊茂為太子而竄浩于昭州二年二月尊元符皇后劉氏為皇太后宫名崇恩政和三年二月太后劉氏自殺帝以哲宗故曲加恩禮於后而后頗干預外事且以不謹聞帝與輔臣議將廢之而后為左右所逼即簾鈎自縊死諡曰昭懐髙宗建炎元年春正月尊廢后孟氏為元祐太后七月元祐太后避金兵如揚州八月更號元祐太后曰隆祐太后尚書省言元字犯后祖諱易以所居宫名從之十月隆祐太后如杭州三年秋七月隆祐太后如洪州復如䖍州四年三月遣使迎隆祐太后于䖍州帝謂輔臣曰朕初不識太后自迎至南京愛朕不啻已出今在數千里外兵馬驚擾當亟奉迎以愜朕朝夕慕念之意遂遣盧益辛企宗等奉迎于䖍州八月太后至越州紹聖元年夏四月隆祐太后孟氏崩諡曰昭慈獻烈詔權攢于㑹稽縣之上皇村俟事寧歸葬哲宗山陵建中初政哲宗元符三年春正月帝崩皇太后向氏哭謂宰臣曰國家不幸大行皇帝無嗣事須早定章惇抗聲曰在禮律當立母弟簡王似太后曰老身無子諸王皆神宗庶子莫難如此分别惇復曰以長則申王佖當立太后曰申王有目疾不可於次則端王佶立惇曰端王輕佻不可以君天下言未畢曾布叱之曰章惇未嘗與臣商議如皇太后聖諭極當蔡卞許將相繼曰合依聖㫖太后又曰先帝嘗言端王有福壽且仁孝于是惇黙然乃召端王入即位于柩前羣臣請太后權同處分軍國事后以長君辭帝拜泣移時乃許之端王神宗第十一子也三月辛卯以四月朔日當食詔求直言筠州推官崔鶠上書曰臣聞諫爭之道不激切不足以起人主意激切則近訕謗夫為人臣而有訕謗之名此讒邪之論所以易乘而世主所以不悟天下所以卷舌吞聲而以言為戒也臣嘗讀史見漢劉陶曹鸞唐李少良之事未嘗不掩卷興嗟矯然山林不返之意比聞國家以日食之異詢求直言伏讀詔書至所謂言之失中朕不加罪葢陛下披至情廓聖度以來天下之言如此而私秘所聞不敢一吐是臣子負陛下也方今政令煩苛民不堪擾風俗險薄法不能勝未暇一二陳之而特以判左右之忠邪為本臣生於草萊不識朝廷之士特怪左右之人有指元祐之臣為奸黨者必邪人也使漢之黨錮唐之牛李之禍將復見於今日甚可駭也夫毀譽者朝廷之公議故責授朱崖軍司户司馬光左右以為奸而天下皆曰忠今宰相章惇左右以為忠而天下皆曰奸此何理也臣請畧言奸人之迹夫乘時抵巇以盜富貴探㣲揣端以固權􅃂謂之奸可也苞苴滿門私謁踵路隂交不逞密結禁廷謂之奸可也以竒使淫巧蕩上心以倡優女色敗君徳獨操賞罰自報恩怨謂之奸可也蔽遮主聴排斥正人㣲言者坐以刺譏直諫者䧟以指斥以杜天下之言掩滔天之罪謂之奸可也凡此數者光之有乎惇之有乎夫有實者名隨之無其實而有其名誰肯信之傳曰謂狐為貍非特不知狐又不知貍是故以佞為忠必以忠為佞於是乎有謬賞濫罰賞謬罰濫佞人徜徉如此而國不亂未之有也光忠信直諒聞於華夷雖古名臣未能過而謂之奸是欺天下也至如惇狙詐凶險天下士大夫呼曰惇賊貴極宰相人所具瞻以名呼之又指為賊豈非以其孤負主恩玩竊國柄忠臣痛憤義士不服故賊而名之指其實而號之以賊邪京師語曰大惇小惇殃及子孫謂惇與其御史中丞安惇也小人譬之蝮蝎其兇忍害人根乎天性隨遇必發天下無事不過賊陷忠良破碎善類至緩急危疑之際必自反覆畜跋扈不臣之心比年以來諫官不論得失御史不劾奸邪門下不駁詔令共持喑黙以為得計昔李林甫竊相位十有九年海内怨痛而人主不知頃鄒浩以言事得罪大臣拱而觀之同列無一語者又從而擠之夫以股肱耳目治亂安危所係而一切若此陛下雖有堯舜之聰明將誰使言之誰使行之夫日陽也食之者隂也四月正陽之月陽極盛隂極衰之時而隂干陽故其變為大惟陛下畏天威聴明命大運乾剛大明邪正毋違經義毋鬱民心則天意解矣若夫伐鼓用幣素服徹樂而無修徳善政之實非所以應天也帝覽而善之以為相州教授召龔夬為殿中侍御史陳瓘鄒浩為左右正言韓忠彦等薦之也御史中丞安惇言鄒浩復用慮彰先帝之失帝曰立后大事也中丞不言而浩獨敢言何為不可復用惇懼而退陳瓘言陛下欲開正路取浩既往之善惇乃狂惑主聴規騁其私若明示好惡當自惇始遂出惇知潭州夏四月丁巳復范純仁等官時純仁在永州帝遣中使賜以茶藥諭之曰皇帝在藩邸太皇太后在宫中知公先朝言事忠直今虚相位以待不知目疾如何用何人醫之純仁頓首謝徙居鄧州在道拜觀文殿大學士中太乙宫使制詞有曰豈惟尊徳尚齒昭示􅃂優庶幾鯁論嘉謀日聞忠告純仁聞制泣曰上果用我矣死有餘責既又遣中使􅃐純仁入純仁乞歸養疾帝不得已許之每見輔臣問安否且曰范純仁得一識面足矣時蘇軾亦自昌化移廉徙永更三赦復提舉成都玉局觀乙酉蔡卞罷卞專托紹述之説上欺天子下脅同列凡中傷善類皆密疏建白然後請帝親札付外行之章惇雖巨姦然猶在其術中惇輕率不思而卞深阻寡言議論之際惇毅然主持卞或噤無一語一時論者以為惇迹易明卞心難見至是龔夬論惇卞之惡大略以為昔日丁謂當國號為恣睢然不過陷一冦凖而已及惇則故老元輔侍從臺省之臣凡天下之所賢者一日之間布滿嶺海自有宋以來未之聞也當是時惇之威勢震于海内此陛下所親見葢其立造不根之語文致悖逆之罪是以人人危懼莫能自保俾忠臣義士朽骨銜寃于地下子孫禁錮于炎荒海内之人憤悶而不敢言皆以歸怨先帝其罪如此尚何俟而不正典刑哉卞事上不忠懐姦深阻凡惇所為皆卞發之為力居多望采公論昭示顯黜未報臺諌陳師錫陳次升陳瓘任伯雨張庭堅等極論卞罪浮於惇乞正典刑以謝天下乃出知江寧臺諫論之不已遂以秘書少監分司池州己丑追復文彦博王珪司馬光吕公著吕大防劉摰等三十三人官韓忠彦言之遂有是詔六月陳瓘論邢恕矯誣定策之罪安置均州九月辛未章惇罷惇為相專國復怨引蔡卞林希黄履來之邵張商英等居要地任言責由是正人無一得免死者禍及其孥屢興大獄以陷忠良天下嫉之及兼山陵使靈輿陷淖中踰宿而行臺諫豐稷等劾其不恭罷知越州冬十月丙申安惇蹇序辰除名放章惇于潭州惇既罷陳瓘等以為責輕復論惇在紹聖中置看詳元祐訴理局凡於先朝言語不順者加以釘足剝皮斬頸拔舌之刑其慘刻如此看詳之官如安惇蹇序辰等受大臣諷諭迎合紹述之意傳致語言指為謗訕遂使朝廷紛紛不已考之公論宜正典刑於是二人並除名放歸田里而貶惇武昌節度副使居潭州蔡京林希罷時侍御史陳師錫上疏言京卞同惡迷國誤朝而京好大喜功日夜結交内侍戚里以覬大用若果用之天下治亂自是而分祖宗基業自是而隳矣龔夬亦言蔡京治文及甫獄本以償報私仇始則上誣宣仁終則歸咎先帝必將族滅無辜以逞其欲臣料當時必有案牘章疏可以見其煆煉附㑹願考證其實以正奸臣之罪皆未報㑹中丞豐稷召自河南初入對與京遇京謂之曰天子自外服召公中執法今日必有髙論稷正色曰行自知之是日論京奸狀帝猶未納臺諫陳瓘江公望等相繼言之帝亦不聴稷曰京在朝吾屬何面目居此復力論之始出知永興軍言者不已乃奪職居杭州右司諫陳祐復論林希紹聖初黨附權要詞命醜詆之罪乃削端明殿學士徙知揚州丁酉以韓忠彦曾布為尚書左右僕射兼門下中書侍郎布初附章惇凡惇所為多布所建白及不得同省始與乖異元符中惇以士心不附欲薦引名士且乞正所奪司馬光吕公著等贈諡布以為無益沮之且奏人主操柄不可倒持今自丞弼以至言者知畏宰相不知畏陛下其意葢欲傾惇㑹哲宗崩而止及帝即位銳意圖治延進忠鯁布因力排紹聖之人而去之既拜相其弟翰林學士肇引嫌出知陳州言于布曰兄方得君當引用善人翊正道以杜惇卞復起之萌而數月以來所謂端人吉士繼迹去朝所進以為輔佐侍從臺諌往往皆前日事惇卞者一旦勢異今日必首引之以為固位計思之可為慟哭比來主意已移小人道長進則必論元祐人於帝前退則盡排元祐人於要路異時惇卞縱未至一蔡京足以兼二人可不深慮乎布不能從布之拜相也御史中丞豐稷欲率臺屬論之遂遷稷工部尚書稷力乞補外不允謝表有内侍已成于怨府佞人方剡於奏章之語上問佞人為誰曰曾布陛下斥布則天下事定矣己未詔禁曲學偏見妄意改作以害國事者十一月庚午詔改明年元年議以元祐紹聖均有所失欲以大公至正消釋朋黨遂改元為建中靖國詔下御史中丞王覿言建中之名雖取皇極然重襲前代紀號非是宜以徳宗為戒時任事者多乖異不同覿言堯舜禹相授一道堯不去四凶而舜去之堯不舉元凱而舜舉之事未必盡同文王作邑於豐而武王治鎬文王闗市不征澤梁無禁周公征而禁之不害其為善繼善述神宗作法于前子孫當守于後至於時異事殊須損益者損益之於理固未為有失也當國者忿其言遂改為翰林學士由是邪正雜進矣初曾布密陳紹述之說帝不能決以問給事中徐勣勣對曰聖意得非欲兩存乎天下之事有是與非朝廷之人有忠與佞若不考其實姑務兩存臣未見其可也徽宗建中靖國元年春正月壬戌朔有流星光燭地自西南入尾抵距星是夕有赤氣起東北亘西南中函白氣將散復有黒祲在旁右正言任伯雨言正嵗之始建寅之月其卦為泰年當改元時方孟春而赤氣起於暮夜之幽以一日言之日為陽夜為陰以四方言之東南為陽西北為隂以五色推之赤為陽黑與白為隂以從事推之朝廷為陽宫禁為隂中國為陽外國為隂君子為陽小人為隂此宫禁隂謀下干上之證也漸衝正而西散為白而白主兵此外域竊發之證也天心仁愛以灾異為警戒陛下進忠良絀邪佞正名分撃奸惡使小人無得生犯上之心則灾異可變為休祥矣又言比日内降寖多或恐矯傳制命漢之鴻都賣爵唐之墨敇斜封此近監也范純仁卒遺表言宣仁之誣謗未明致保佑之憂勤不顯又勸帝清心寡欲約己便民絶朋黨之論察邪正之歸凡八事諡忠宣二月丁巳貶章惇為雷州司户㕘軍初任伯雨論章惇乆竊朝柄迷國㒺上毒流縉紳乘先帝變故倉卒輒逞異志睥睨萬乘不復有臣子之恭向使其計得行將寘陛下與皇后於何地若貸而不誅則天下大義不明大法不立矣臣聞北使言去年遼主方食聞中國黜惇放箸而起稱善者再謂南朝錯用此人北使又問何為只若是行遣以此觀之不獨孟子所謂國人皆曰可殺雖蠻貊之邦莫不以為可殺也章八上未報㑹臺諫陳瓘陳次升等復極論之乃貶惇為雷州司户㕘軍初蘇轍謫雷州不許占官舎遂僦民屋惇又以為强奪民居下州追民究治以僦劵甚明乃止至是惇問舎于民民曰前蘇公來為章丞相幾破我家今不可也後徙睦州死三月罷權給事中任伯雨伯雨初為右正言半嵗之間凡上一百八疏大臣畏其多言俾權給事中密諭以少黙即為真伯雨不聴抗論愈力時曾布欲和調元祐紹聖之人伯雨言人才固不當分黨與然自古未有君子小人雜然並進可以致治者葢君子易退小人難退二者並用終於君子盡去小人獨留唐徳宗坐此致播遷之禍建中乃其紀號不可以不戒既而欲劾布布覺之徙為度支員外郎六月戊午尚書范純禮罷時韓忠彦雖首相而曾布專政漸進紹述之説諷中丞趙挺之排撃元祐諸臣純禮從容言于帝曰邇者朝廷命令莫不是元豐而非元祐以臣觀之神宗立法之意固善吏推行之或有失當以致病民宣仁聴㫁一時小有潤色葢大臣識見異同非必盡懐邪為私也今議論之臣有不得志故挾此以藉口以元豐為是則欲賢元豐之人以元祐為非則欲斥元祐之士其心豈恤國事直欲快私忿以售其奸不可不深察也純禮沉毅剛正曾布憚之謂駙馬都尉王詵曰上欲除君承㫖范右丞不可詵怒㑹詵館遼使純禮主宴詵誣其輒斥御名遂罷知穎昌府帝初政虚心納諌海内想望庶幾慶歴之治曾布入相遂右紹述諫官陳祐六疏劾之不從賜罷降敇以觀望推引責之右司諫江公望聞而求對面請其故上曰祐意在逐布引李清臣為相耳公望言臣不知其他但近者易言官者三逐諌官者七非朝廷美事因袖䟽力言豐祐政事得失且曰陛下若自分彼此必且起禍亂之源上意感格業從之矣㑹前太學博士范致虚上書言太學取士法不當變且言臣讀御製泰陵挽章曰同紹裕陵此陛下孝弟之本心也臣願守此而已江公望又上疏言自先帝有紹述之意輔政非其人以媚于己為同忠於君為異借威柄以快私隙使天下騷然泰陵不得盡繼述之美元祐人才皆出于熈豐培養之餘遭紹聖竄逐之後存者無幾矣神考與元祐之臣其先非有射鉤斬袪之隙也先帝信仇人而黜之陛下若立元祐為名必有元豐紹聖為之對有對則爭興爭興則黨復立矣陛下改元詔㫖亦稱思建皇極端好惡以示人本中和而立政皇天后土實聞斯言今若渝之奈皇天后土何帝嘗以示范純禮純禮贊之乞褒遷公望以勸來者㑹蔡王府相告有不遜語及于王公望乞勿以無根之言加諸至親遂坐罷秋七月丙戌安燾罷時燾密奏紹聖元符以來用事者假紹述之虚名以誑惑君父上則欲固位而挾私仇下則欲希進而肆朋附并為一談牢不可破彼自為謀則善矣未嘗有毫髮為朝廷計也當熈寧元豐間内外府庫無不充衍自紹聖元符以來傾府庫竭倉廩以供開邊之費願陛下罷無益之人厚公私之積早計而預圖之則天下幸甚又言東京黨禍已萌願戒履霜之漸語尤激切上不悦遂自樞密院出知河陽府八月陳瓘上疏言臣嘗乞别修神宗實錄以成一代之典而不聞施行葢紹聖史臣今為宰相故也不報瓘議論持平務存大體不以細故藉口未嘗及人晻昧之過時兼權給事中曾布專主紹述取王安石熈寧間所記日錄以為依據欲引瓘附己使人語瓘謂將去權即真瓘語子正彚曰吾與宰相議事多不合今若此是欲以官爵相餌也明日遂投書于布論其尊私史而壓宗廟緣邊費而壊先政違神考之志壊神考之事即此二者天下所共知而聖主不得聞其説䝉蔽之患孰大於此布得書大怒瓘復錄所上布書及所嘗著日錄辨國用須知以上三省且乞敷奏早行竄黜遂黜瓘知泰州瓘始著合浦尊堯集為十論盡辨其所紀載猶未證言王安石之非及北歸又著四明尊堯集為八門曰聖訓曰論道曰獻替曰理財曰邊機曰論兵曰處已曰寓言始條分而件析之無婉詞矣冬十月召陸佃為禮部侍郎佃上疏曰近時士大夫相傾競進以善求事為精神以能訐人為風采以忠厚為重遲以靜退為卑弱相師成風莫之或止正而救之實在今日夫善續前人者不必因所為否者賡之善者揚焉元祐紛更是知賡之而不知揚之之罪也紹聖稱頌是知揚之而不知賡之之過也願咨謀仁賢詢考政事惟其當之為貴大中之期亦在今日也遂命修哲宗實錄遷吏部尚書拜尚書右丞十一月庚辰詔改明年為崇寧蔡京擅國徽宗建中靖國元年十一月復詔蔡京為翰林學士承㫖初供奉官童貫性巧媚善測人主㣲㫖先事順承以故得幸及詣三吳訪書畫奇巧留杭累月蔡京與之遊不舎晝夜凡所畫屏障扇帶之屬貫日以達禁中且附語言論奏於帝所由是帝屬意用京左階道錄徐知常以符水出入元符皇后所太學博士范致虚與之厚因薦京才可相知常入宫言之由是宫妾宦官衆口一詞譽京遂起京知定州改大名㑹韓忠彦與曾布交惡布謀引京自助乃有是召京首論二事其一言神宗一代之史非紹聖無以察正元祐之詆謗今復詔㕘修是紛更也願令史官條具紹聖之所以掩蔽者示天下其二言元祐置訴理所以雪先朝得罪之人紹聖命安惇蹇序辰駁正固當然耳二人乃坐除名如此則訴理為是矣夫二臣之罪不除則兩朝之謗終在疏奏上益嚮之初鄧綰之子洵武為起居郎恐不為清議所容常圖所以求知於上因入對言陛下乃神宗子今相忠彦乃琦之子神宗行新法以利民琦常論其非今忠彦更神宗之法是忠彦為人臣尚能紹述其父之志陛下為天子反不能紹述先帝也必欲繼志述事非用蔡京不可又曰陛下方紹述先志羣臣無助者乃作愛莫助之圖以獻其圖如史記年表例旁行七重别為左右左曰元豐右曰元祐自宰相執政侍從臺諫郎官舘閣學校各為一重以能助紹述者序於左執政中惟温益蔡京一二人餘不過三四若趙挺之范致虛王能甫錢遹之屬而已其序于右者則舉朝輔相公卿百執事咸在皆指為害政不欲紹述者帝出以示曾布而掲去左方一姓名布請之帝曰蔡京也洵武謂非相此人不可以與卿不同故去之布曰洵武既與臣見異臣安敢與議明日改付温益益欣然奉行請相蔡京而籍異論者於是善人皆不見容而帝決意相京矣乃進洵武中書舎人給事中兼侍講罷禮部尚書豐稷稷初為諫官即論罷蔡京又陳曾布之姦至是以積忤貴倖罷十二月邢恕吕嘉問路昌衡安惇蹇序辰蔡卞並復宫觀尋與郡召張商英赴闕崇寧元年五月庚申韓忠彦罷左司諌吳材等論忠彦變神考之法度逐神考之人材遂罷知大名府己卯陸佃罷佃每欲參用元祐人才尤惡奔競嘗曰人才無大相逺當以資歴叙進少緩之則士知自重矣又曰今天下勢如人大病向愈當以藥餌輔養之須其安平茍為輕事改作是使之騎射也㑹御史請更懲元祐餘黨佃言于帝曰不宜窮治乃下詔云元祐諸臣各已削秩自今無所復問言者亦勿輒言掲之朝堂言者用是論佃名在黨籍不欲窮治正恐自及耳遂罷知亳州庚辰以許將溫益為門下中書侍郎蔡京趙挺之為尚書左右丞京素與屯田員外郎孫鼛善鼛嘗曰蔡子貴人也然才不勝徳恐貽天下憂及是京謂之曰我若用於天子願助我鼛曰公誠能謹守祖宗之法以正論輔人主示節儉以先百吏而絶口不言兵天下幸甚京黙然閏月壬戌曾布罷布初用王安石薦在神宗時凡上前所言皆安石所欲建明也又上書欲神宗專任安石以刑罰脅制天下使無敢言哲宗親政宰相章惇托紹述以快私忿布贊之甚力惇興大獄無能救解或隂擠之惇逐而布總右揆欲以元祐兼紹聖而行故逐蔡京至崇寧初知上意所向又力排韓忠彦而專其政引京以自助京懐舊恨與布大異㑹布擬陳祐甫為户部侍郎祐甫之子迪布之愛壻也京言布以爵祿私其所親布忿辨乆之聲色俱厲温益叱之曰曾布上前安得失禮帝不悦殿中侍御史錢遹論之布請罷遂出知潤州秋七月戊子以蔡京為尚書右僕射兼中書侍郎制下之日賜坐延和殿命之曰神宗創法立制中道未究先帝繼之兩遭簾帷變更國是未定朕欲上述父兄之志今特相卿卿可以教之京頓首謝曰敢不盡死己丑禁元祐法甲午詔置講議司於都省蔡京起於逐臣一旦得志天下拭目所為而京隂託紹述之柄箝制天子用熈寧條例司故事即都省置講議司自為提舉講議熈豐已行法度及神宗欲為而未暇者以其黨吳居厚王漢之等十餘人為僚屬取政事之大者講議之凡所設施皆由是出而法度屢變無常矣八月己卯以趙挺之張商英為尚書左右丞商英為中書舍人謝表歴詆元祐諸賢及任翰林學士草蔡京拜相制極其褒美故京引之復紹聖役法九月己亥立黨人碑於端禮門籍元符末上書人分邪正等黜陟之時元祐元符末羣賢貶竄死徙者略盡蔡京猶未愜意乃與其客强浚明葉夢得籍宰執司馬光文彦博吕公著吕公亮吕大防劉摰范純仁韓忠彦王珪梁燾王巖叟王存鄭雍傅堯俞趙瞻韓維孫固范百祿胡宗愈李清臣蘇轍劉奉世范純禮安燾陸佃曾任待制以上官蘇軾范祖禹王欽臣姚勔顧臨趙君錫馬黙王蚡孔文仲孔武仲朱光庭孫覺吳安持錢勰李之純趙彦若趙卨孫升李周劉安世韓川吕希純曾肇王覿范純粹王畏吕陶王古陳次升豐稷謝文瓘鮮于侁賈易鄒浩張舜民餘官程頥謝良佐吕希哲吕希績晁𥙷之黄庭堅畢仲游常安民孔平仲司馬康吳安詩張耒歐陽棐陳瓘鄭俠秦觀徐常湯馘杜純宋保國劉唐老黄隠王鞏張保源汪衍余爽常立唐義問余卞李格非商倚張庭堅李祉陳佑任伯雨朱光裔陳郛蘇嘉龔夬歐陽中立吳儔吕仲甫劉當時馬琮陳彦劉昱魯君貺韓跋内臣張士良魯燾趙約譚裔王偁陳詢張琳裴彦臣武臣王獻可張巽李備胡凡百二十人等其罪狀謂之姦黨請御書刻石于端禮門京等復請下詔籍元符末日食求言章疏及熈寧紹聖之政者付中書定為正上正中正下三等邪上邪中邪下三等於是鍾世美以下四十一人為正等悉加旌擢范柔中以下五百餘人為邪等降責有差又詔降責人不得同州居住冬十月戊寅蔡卞知樞密院事十二月丁丑詔邪説詖行非先聖賢之書及元祐學術政事並勿施用二年春正月乙酉安置任伯雨等十二人於逺州蔡京蔡卞怨元符末臺諫之論已悉陷以黨事同日貶竄任伯雨昌化軍陳瓘廉州龔夬化州陳次升循州陳師錫柳州陳佑澧州李深復州江公望南安軍常安民温州張舜民商州馬涓吉州豐稷台州初蔡京帥蜀張庭堅在其幕府及入相欲引以自助庭堅不從京恨之至是亦編管于象州丁未以蔡京為尚書左僕射兼門下侍郎三月乙酉詔黨人子弟毋得至闕下尋又詔元符末上書進士充三舎生者罷歸以元祐學術聚徒教授者監司覺察必罰無赦元符上書邪等人亦無得至京師丁亥策進士于集英殿時李階舉禮部第一階深之子陳瓘之甥也安忱對策言使黨人之子階魁南宫多士無以示天下遂奪階出身而賜忱第又黄定等十八人皆上書邪等上臨軒謂之曰若等攻朕短可也神宗哲宗何負于若亦並黜之夏四月丁卯詔毁司馬光吕公著吕大防范純仁劉摰范百祿梁燾鄭雍趙瞻王巖叟十人景靈宫繪像乙亥詔毁范祖禹唐鑑及三蘇黄庭堅秦觀文集戊寅以趙挺之為中書侍郎張商英吳居厚為尚書左右丞安惇同知樞密院事除故直秘閣程頥名言者希蔡京意論頥學術頗僻素行譎怪專以詭異聾瞽愚俗近以入山著書妄及朝政詔毁頥出身以來文字其所著書令監司嚴加覺察范致虚又言頥以邪説詖行惑亂衆聴而尹焞張繹為之羽翼乞下河南盡逐學徒頥於是遷居龍門之南止四方學者曰尊所聞行所知可矣不必及吾門也八月戊申張商英罷商英在紹聖時巧媚取容共倡紹述至是與蔡京議論不合執法石豫御史朱紱余深奉京風㫖將劾奏之而無以為説乃取商英在元祐中嘗著嘉禾頌擬司馬光於周公且酹祭光文有褒頌功徳語因請正其罰詔以商英論議反覆貪冒希求元祐之初詆訾先烈臺憲交章豈容在列落職知亳州名入元祐黨籍時蔡京又自書姦黨為大碑頒于郡縣令監司長吏㕔皆刻石有長安石工安民當鐫字辭曰民愚人固不知立碑之意但如司馬相公者海内稱其正直今謂之姦邪民不忍刻也府官怒欲加之罪民泣曰被役不敢辭乞免鐫安民二字于石末恐得罪後世聞者愧之三年春正月鑄當十大錢自太祖以來諸路置監鑄錢有折二折三當五隨時立制未嘗鑄當十錢至是蔡京將以利惑上始請鑄于諸路與小平錢通行於時時四方承平府庫盈溢京倡為豐亨豫大之説視官爵如糞土屢朝所儲大都掃地矣以蔡攸為秘書郎攸京長子也有􅃂于上至是賜以進士出身遂有是拜夏四月罷講議司詔諸州見行新法文移許直達尚書省其講議司官屬依制置三司條例司例推恩自張康國以下遷官者㡬四十人尚書省復言追復先朝法度以來無慮千百數尚懼講求未盡乞令諸路官司有未興復者各具以聞從之蔡京請置京西北路專切管幹通行交子所倣川峽路立偽造法通情轉用併隣人不告者皆罪之私造交子紙者罪以徒配已而令諸路更用錢引凖新様印製四川如舊法惟閩浙湖廣不行錢引趙挺之以為閩乃京鄉里故得免焉六月壬寅朔圖熈寧元豐功臣於顯謨閣癸酉辟雍初成詔荆國公王安石孟軻以來一人而已其以配享孔子位次孟軻吏部尚書何執中請開學殿使都人縱觀戊午詔重定元祐元符黨人及上書邪等者合為一籍通三百九人刻石于朝堂餘並出籍自今毋復彈奏户部尚書劉極言漢唐失政皆自朋黨始今日指前日之人為黨焉知後日不以今日為黨乎大扺人之過惡自有公論何必悉拘于籍而禁錮之哉蔡京大不懌風臺臣劾之出知蘄州秋七月辛夘復行方田法八月許將罷將居政府十年不能有所建明中丞朱諤收將舊謝章表析文句以為謗且謂將在元祐則盡更元豐之所守在紹聖則隂匿元祐之所為遂罷知河南府諤蔡京之黨也九月乙亥以趙挺之吳居厚為門下中書侍郎張康國鄧洵武為尚書左右丞紹聖中蔡京治役法薦康國為屬及京當國定黨籍紹述康國皆預密謀故京引援之甚力自福建轉運判官不三嵗入翰林為承㫖遂拜左丞以胡師文為户部侍郎初東南六路糧斛自江浙起綱至于淮甸以及真揚楚泗為倉七以聚蓄軍儲復自楚泗置汴綱搬運上京以江淮發運使董之故常有六百萬石以供京師而諸倉常有數年之積州郡告歉則折収上價謂之額斛計本州嵗額以倉儲代輸京師謂之代發復於豐熟以中價收糴榖賤則官糴不至傷農饑歉則令民納錢民以為便本錢嵗增兵食有餘其法良善及蔡京當國始求羡財以供侈費於是以其姻家胡師文為發運使以糴本數百萬緡充貢入為户部侍郎自是繼者效尤時有進獻而本錢竭矣本竭則不能增糴儲積空而輸搬之法壊矣四年春正月蔡卞罷卞立心傾邪一意婦翁王安石所行為至當以兄京晩達而位在上致已不得相故二府政事時有不合至是京請以童貫為制置使卞言不宜用宦者必誤邊計京於帝前詆卞卞求去遂出知河南府三月以趙挺之為尚書右僕射兼中書侍郎竄知慶州曾孝序于嶺南初孝序察訪湖北過闕蔡京畏孝序見帝言舒亶事密遣客以美官啖之孝序不從又與京論講議司事曰天下之財貴於通流取民膏血以聚京師恐非太平法京銜之遂出知慶州至是京行結糴俵糴之法盡括民財充數孝序上疏曰民力殫矣一有逃移誰與守邦京益怒遣御史宋聖􅃂劾其私事追逮其家人鍜鍊無所得但言約日出師幾誤軍期除名竄嶺表六月戊子趙挺之罷初帝以蔡京獨相謀置右輔京力薦挺之遂拜尚書右僕射既相與京爭權屢陳京奸惡且請去位以避之遂罷五年春正月戊戌彗出西方其長竟天甲辰以吳居厚為門下侍郎劉逵為中書侍郎乙巳以星變避殿損膳詔求直言劉逵請碎元祐黨人碑寛上書邪籍之禁帝從之夜半遣黄門至朝堂毁石刻明日蔡京見之厲聲曰石可毁名不可滅也丁未太白晝見赦除黨人一切之禁權罷方田之法及諸州嵗貢供奉物詔崇寧以來左降者無間存沒稍復其官盡還諸徙者二月丙寅蔡京罷京懐奸植黨威福在其手託紹述之名紛更法制貶斥羣賢增修財利之政務以侈靡惑人主動以周官惟王不㑹為説每及前朝惜財省費者必以為陋至於土木營造率欲度前規而侈後觀時天下乆平吏員冗濫節度使至八十餘員留後觀察下及遥郡刺史多至數千員學士待制中外百五十員置應奉司御前生活所營繕所蘇杭造作局其名雜出大率爭以奇巧為功而花石綱之害為尤甚至是因彗星見帝悟其奸凡所建置一切罷之而免京為中太乙宫使留京師言者論不已中丞吳執中言于帝曰進退大臣當全體貌帝為京下詔戒飭言者乃已以趙挺之為尚書右僕射兼中書侍郎蔡京既罷帝召見挺之曰京所為一如卿言復拜右相挺之與劉逵同心輔政凡京所行悖理虐民之事稍稍釐正之然挺之知慮後患每建白務開其端而使逵畢其説逵亦欲自以為功直情不顧初蔡京興邊事用兵累年至是帝臨朝語大臣曰朝廷不可與四方生隙釁端一開兵連禍結生民肝腦塗地豈人主愛民之意哉挺之退謂同列曰上志在息兵吾曹所宜將順時執政皆京黨但㣲笑而已三月丙申詔星變已消罷求直言尋復方田諸法及諸州嵗貢供奉物己未賜禮部進士及第出身六百七十人時蔡嶷揣蔡京且復用其所對䇿曰熈豐之徳業足以配天不幸繼之以元祐紹聖之纘述足以永賴不幸繼之以靖國陛下兩下求言之詔冀以聞至言收實用也而見於元符之末者方且幸時變而肆奸言乘間隙而投異意詆誣先烈不以為疑動搖國是不以為憚願逆處其未至而絶其原於是擢為第一以所對策頒天下己未劉逵罷時蔡京令其黨進言于帝曰京之改法度皆禀上㫖非私為之今一切皆罷恐非紹述之意帝惑其説復有用京之意然羣臣未有覺者鄭居中往來鄭妃父紳所知之即入見言陛下所建立皆學校禮樂居養安濟等法乃厚下裕民何所逆天而致威譴乃更張耶帝悦居中退語禮部侍郎劉正夫正夫因請對語與居中合帝遂疑逵擅政於是京黨御史余深石公弼論逵專恣反覆陵蔑同列引用邪黨出逵知亳州大觀元年春正月甲午以蔡京為尚書左僕射兼門下侍郎壬寅吳居厚罷壬子以何執中為中書侍郎鄧洵武梁子美為尚書左右丞子美初為河北轉運使傾漕計以奉上至損緡錢三百萬市北珠以進由是諸路漕臣效尤爭進羨餘矣北珠出于女真子美市於遼遼嗜其利虐女真捕海東青以求珠女真深怨之而子美用是顯二月己卯復行方田三月丁酉趙挺之罷以何執中鄧洵武為門下中書侍郎梁子美朱諤為尚書左右丞以鄭居中同知樞密院事蔡京之再相也居中有力焉京薦之初居中直學士院自言為鄭貴妃從兄弟妃家世㣲亦倚以為重及居中入樞府妃時已貴重於居中無所賴乃用宦者黄經臣計以親嫌為請改授中太乙宫使居中不懌蔡京為言樞府本兵之地非三省執政用親無嫌經臣沮之於是居中疑京援已不力怨之以蔡攸為龍圖閣學士兼侍讀以葉夢得為起居郎時蔡京再相向所立法度已罷者復行夢得上言周官太宰以八柄詔王馭羣臣所謂廢置賞罰者王之事也太宰得以詔王而不得自專夫事不過可不可二者而已以為可而出於陛下則今不可復今徒以大臣進退為可否無乃陛下有未了然於中者乎上喜曰邇來士多朋比媒進卿言獨無觀望遂除起居郎時用事者喜小有才夢得言自古用人必先辨賢能賢者有徳之稱能者有才之稱故先王常使徳勝才不使才勝徳崇寧以來在内惟取議論與朝廷同者為純正在外惟取推行法令速成者為幹敏未聞器業任重識度經逺者特有表異恐用才太勝願繼今用人以有徳為先上然之九月貶侍御史沈畸監信州酒税竄御史蕭服於處州時蔡京怨劉逵㑹蘇州盜鑄錢獄起京欲陷逵婦兄章綖兄弟遣開封尹李孝壽鞫之株連者千餘人彊抑使承死者甚衆京猶以為緩遣侍御史沈畸御史蕭服往代畸至蘇即日决釋無左證者七百人歎曰為天子耳目司而可傅㑹權要殺人以茍富貴乎遂閱實平反以聞京大怒貶畸監信州酒税服羈管處州而綖竟竄海島閏十月復以鄭居中同知樞密院事居中既怨蔡京遂隂與張康國比而間京都水使者趙霆得兩首龜于黄河獻以為瑞京曰此齊小白所謂象㒺見之而霸者也居中言首豈有二人皆駭異而京獨主之殆不可測帝命棄龜金明池謂居中愛已故申前命流太廟齋郎方軫于嶺南時軫上書言蔡京睥睨社稷内懐不道專以紹述熈豐之説為自媒之計内而執政侍從外而帥臣監司無非其門人親戚京每有奏請盡作御筆行出語人曰此上意也明日不行又語人曰京實啟之也善則稱已過則稱君必欲陛下斂天下之怨而後已自元符末陛下嗣服忠義之士投匭者無日無之京分為邪等黥配編置不齒仕籍則誰肯為陛下言哉京又使子攸日以花石禽鳥為獻欲愚陛下使不知天下治亂臣以為京必反也請誅京詔宣示京京請下軫獄竟流嶺南十一月壬子朔日食蔡京以不及所當食分率羣臣稱賀二年春正月戊寅加蔡京太師三年三月壬申張康國暴卒康國始因附蔡京而進及在樞府寖為崖異時帝惡京專愎隂令康國阻其姦且許以相京忌康國遂引吳執中為中丞執中將論康國康國先知之旦奏事留白帝曰執中今日入對必為京論臣臣願避位既而執中對果陳其事帝怒黜執中至是康國早朝退趨殿廬得疾仰天吐舌舁至待漏院卒或疑中毒云六月丁丑蔡京罷京專國日乆中丞石公弼殿中侍御史張克公劾京罪惡章數十上上亦厭京遂罷為太乙宫使初上為端王時大使局有郭天信者言王當有天下及即位言驗得􅃂毎奏天文必指陳以撼京密白日中有黒子帝為之恐後屢白不已上始疑京故罷辛巳以何執中為尚書左僕射兼門下侍郎執中一意謹事蔡京遂代為首相太學生陳朝老詣闕上書曰陛下即位以來五命相矣若韓忠彦之庸懦曾布之贓汚趙挺之之蠢愚蔡京之跋扈皆天下所不堪者今陛下知蔡京之奸解其相印天下之人鼓舞有若更生及相執中中外黯然失望執中雖不敢若京之蠧國害民然碌碌常質初無過人天下敗壊至此如人一身臟腑受沴已深豈庸庸之醫所能起乎執中夤緣攀附致位二府亦已大幸遽俾之經體贊元是猶以蚉負山多見其不勝任也疏奏不省十一月己巳蔡京進楚國公致仕仍提舉修哲宗實錄朝朔望石公弼言蔡京盤旋京師無去志餘威震于羣臣願持必㫁之决以消後悔殿中侍御史洪彦昇言蔡京再居元宰假紹述之名一切更張敗壊先朝法度朋姦誤國公私困弊既已上印而偃蹇都城上憑眷顧之恩中懐跋扈之志願早賜英㫁遣之出京殿中侍御史毛注言京擅持威福動搖中外以翰林學士葉夢得為腹心交植黨與帝為逐夢得提舉洞霄宫而遷注侍御史注復極論京受孟翊妖姦之書與逆人張懐素游處引兇朋林攄置政府用所親宋喬年尹京其門人播傳咸謂陛下恩眷不衰行且復用太學生陳朝老亦疏京惡十四事乞投畀逺方以禦魑魅皆不報四年二月己丑以余深為門下侍郎張商英為中書侍郎侯䝉同知樞密院事蔡京既免商英自峽州起知杭州過闕賜對因奏曰神宗修建法度務以去大害興大利今誠一一舉行則盡紹述之美法若有弊不可不變但不失其意足矣遂留居政府帝嘗從容問蒙曰蔡京何如人也䝉對曰使京正其心術雖古賢相何以加帝使密伺京所為京聞而銜之五月丙辰以彗星見詔侍從官直言指陳闕失石公弼等遂極論蔡京罪張克公亦論蔡京輔政八年權震海内輕賜予以蠧國用託爵祿以市私恩役將作以葺居第用漕船以運花石名為祝聖而脩塔以壯臨平之山託言灌田而決水以符興化之䜟法名退送門號朝京方田擾安業之民圜土聚徙郡之惡及不軌不忠之罪凡數十事毛注又論京罪積惡大天人交譴雖罷相致政猶怙恩恃寵偃居賜第以致上天威怒推原其咎實在於京考京之罪葢不可以縷數陛下去黨碑以開自新之路京疾其異已而别為禁防陛下頒明詔以來天下之言京惡其議已而重寘于法聲熖所震中外憤疾宜早令去國消彌天變甲子貶蔡京出居杭州六月乙亥以張商英為尚書右僕射兼中書侍郎初蔡京乆盜國柄中外怨疾見商英能立異同更稱為賢帝因人望而相之時乆旱彗星中天商英受命是夕彗不見明日雨帝喜因大書商霖二字賜之十二月張商英請編熈寧元豐事號皇宋政典詔就尚書省置局商英謂蔡京以紹述為名但刼制人主禁錮士大夫耳故作政典以黜其妄政和元年八月乙未復以蔡京為太子太師丁巳張商英罷商英為政持平改蔡京所鑄當十大錢為當三以平泉貨復轉般倉以罷直達行鹽鈔法以通商旅蠲横斂以寛民力勸帝節華侈息土木抑僥倖帝嚴憚之嘗葺升平樓戒主者遇丞相導騎至必匿匠樓下時稱商英忠直然意廣才疎凡所當為先於公座誦言故不便者得預為計初何執中與蔡京同相凡營立皆預議至是惡商英出已上與鄭居中日夜醖織其短先使言者論其門下客唐庚竄知惠州時方技郭天信有􅃂於上商英因與往來事覺居中因諷中丞張克公併論之遂罷政出知河南府冬十月羈管陳瓘于台州瓘以忤蔡京竄郴州瓘子正彚在杭訟京有動搖東宫迹杭守蔡嶷執正彚送京師隂告京俾為計事下開封府併逮治瓘尹李孝壽逼使證其妄瓘曰正彚聞京將不利社稷傳于道路瓘豈得預知以所不知忘父子之恩而指其為妄則情有所不忍挾私情以符合其説又義所不為京之奸邪必為國禍瓘固嘗論之于諫省亦不待今日語言間也内侍黄經臣蒞鞫聞其辭失聲歎息謂曰主上正欲得實但如言以對可也獄具正彚猶以所告失實流海上瓘安置通州帝命取瓘所著尊堯集張商英先已取其集將上而商英罷相瓘遂表奏乞進尊堯集於御前開拆仍於奏牘寓意言王安石不宜配享宣聖廟帝謂其語言無緒並係詆誣羈管台州初安石嘗著日錄八十卷瓘謂安石此書詆訕宗廟及瓘貶亷州乃著合浦尊堯集以日錄詆誣之罪歸於蔡卞後又著四明尊堯集痛絶王氏以發揚熈寧用舎宰臣本末之緒而自明改過之心至是貶台州何執中奉行蔡京意㫖起遷人石悈知台州欲寘瓘以必死悈至執瓘至庭大陳獄具將脇以死瓘揣知其意大呼曰今日之事豈被制㫖耶悈失措始告之曰朝廷令取尊堯集耳瓘曰然則何用如許使君知尊堯所以立名乎葢以神考為堯主上為舜尊堯何得為罪時相學術短淺為人所愚君所得幾何乃亦不畏公議干犯名分乎况尊堯集已上進矣悈慙揖瓘使退所以窘辱之者百端終不能害執中怒罷悈瓘生平論京兄弟皆披摘其處心發露其情慝最所忌恨故得禍最酷二年二月戊子詔蔡京復以太師致仕賜第京師京自杭州召還帝宴之於内苑太清樓夏四月復行方田五月乙巳詔蔡京三日一至都堂議事京患言者議己乃作御筆密進而丐帝親書以降謂之御筆手詔違者以違制坐之事無巨細必託以行至有不類帝書者羣下亦莫敢言由是貴戚近臣爭相請求至使中人楊球代書號曰書楊吕中曰自奸臣創御筆之令凡私意所欲為者皆謂御筆行之違者有刑於是給舎不得繳臺諌不得言而紀綱壊矣昔有勸仁宗攬權者上曰措置天下事正不欲從中出此言真為萬世法八月焚元祐制詞九月更定官名蔡京率意自用欲更置官名以繼元豐之政乃首更開封守臣為尹牧由是府分六曹縣分六案内侍省職悉倣機庭之號脩六尚局建三衛郎遂詔太師太傅太保古三公之官今為三師古無此稱合依三代為三公為真相之任司徒司空周六卿之官太尉秦主兵之官皆非三公並宜罷仍立三孤為次相之任更侍中為左輔中書令為右弼尚書左僕射為太宰兼門下侍郎右僕射為少宰兼中書侍郎罷尚書令及文武勲官而以太尉冠武階然是時員既冗濫名且混雜甚者走馬承受升擁使華黄冠道流亦濫朝品元豐之制至此大壊三年春正月癸酉追封王安石為舒王子雱為臨川伯從祀孔子廟廷五年秋七月詔建明堂于寢廟之南以蔡京為明堂使開局興工日役萬人八月安置太子詹事陳邦光於池州初蔡京獻太子以大食國琉璃酒器羅列宫庭太子怒曰天子大臣不聞以道義相訓乃持玩好之具蕩吾志耶命左右碎之京聞邦光實激太子諷言者撃逐之六年夏四月庚寅詔蔡京三日一朝正公相位總治三省事五月庚子以鄭居中為少保太宰劉正夫為少宰鄧洵武知樞密院事時蔡京大興工役民不聊生變亂法度吏無所師鄭居中每為帝言帝亦惡京專乃拜居中太宰使伺察之又以正夫議論數與京異拜為少宰七年六月戊午朔以明堂成進封蔡京為魯國公京辭兩國不拜詔官其親屬二人八月癸亥鄭居中罷居中與蔡京不相能至是以母喪去位京懼其起復以居中王珪壻也乃使蔡􅃀子懋重理定策事以沮遂追封確清源郡王御製文立石墓前欲借撼居中然卒不能害十二月竄侍御史黄葆光于昭州初葆光為左司諫始蒞職即言三省吏猥多乞非元豐舊制者一切革去帝命釐正之一時士論翕然蔡京怒其異已密白帝降内批云當豐亨豫大之時為衰亂減省之計徙為符寶郎明年復拜侍御史至是大旱帝以為念葆光上疏言蔡京彊悍自專侈大過制無君臣之分鄭居中余深依違畏避不能任天下之責故致灾異疏上不報京權勢震赫舉朝結舌葆光獨出力攻之京懼中以他事遂有是竄宣和元年九月道徳院生金芝帝幸觀之遂幸蔡京第時京子儵攸翛及攸子行皆為大學士鞗尚帝女茂徳帝姬家人厮養亦居大官媵妾封夫人每侍上恒以君臣相悦為言帝時乘輕車小輦頻幸其第命坐傳觴畧用家人禮京謝表有云主婦上壽請酬而肯從稚子牽衣挽留而不􅁍葢實事也加蔡攸開封儀同三司攸有寵于帝進退無時與王黼得預宫中秘戯或侍曲宴則攸黼著短衫窄袴塗抹青紅雜倡優侏儒中多道市井淫媟謔浪語以獻笑取悦攸妻宋氏出入禁掖攸子行領殿中監􅃂信傾其父攸嘗言于帝曰所謂人主當以四海為家太平為娛嵗月能幾何豈徒自勞苦帝深納之冬十月甲戌以紹述熈豐政事書布告天下十二月丙申編管正字曹輔于郴州帝自政和以來多㣲行始民間猶未知及蔡京謝表有輕車小輦七賜臨幸之語自是邸報傳之四方而臣僚阿順莫敢言曹輔上疏諫曰陛下厭居法宫時乘小輦出入塵陌郊坰極遊樂而後返道路之言始猶有忌今乃談以為常臣不意陛下當宗社付託之重玩安忽危一至於此夫君之與民本以人合合則為腹心離則為楚越畔服之際在於斯須甚可畏也昔者仁祖視民如子憫然惟恐或傷一旦宫闈少寛衛士輙踰禁城幾觸寶瑟諺有之盜憎主人主人何負於盜哉況今蚩愚之民見差科日增豈能一一安分萬一乘輿不戒之初一夫不逞包蔵禍心雖神靈垂䕶然亦損威傷重矣又況有臣子不忍言者可不戒哉臣願陛下深居髙拱臨之以穹昊至髙之勢行之以日月有常之度及其出也太史擇日有司除道三衛百官以前以後若曰省煩約費則臨時降㫖稍為裁節比諸㣲服不猶愈乎帝得疏出示宰臣令付都堂審問余深曰輔小官何敢論大事輔曰大官不言故小官言之官有大小愛君之心一也王黼陽顧張邦昌王安中曰有是事乎皆應以不知輔曰兹事雖里巷小民無不知相公當國獨不知耶曾此不知焉用彼相黼怒令吏從輔受詞輔撡筆曰區區之心一無所求愛君而已退待罪于家黼奏不重責輔無以息浮言遂編管郴州初輔將有言知必𫉬罪召子紳來付以家事乃閉户草疏夕有惡鳥鳴屋脊聲若紡輪心知其有禍弗恤也及貶怡然就道二年六月戊寅詔蔡京致仕京專政日乆公論益不與帝亦厭薄之子攸權勢既與父相軋浮薄者復間焉由是父子各立門户遂為仇敵攸别居賜第一日詣京京正與客語使避之攸甫入遽起握父手為診視狀曰大人脈勢舒緩得無有不適乎京曰無之攸曰禁中方有公事即辭去客竊窺見以問京京曰君固不解此耶兒欲以為吾疾而罷我耳閲數日果以太師魯國公致仕仍朝朔望十一月以王黼為少保太宰初京致仕黼陽順人心悉反其所為四方翕然稱為賢相及拜太宰遂乘髙為邪多畜子女玉帛自奉僣擬禁省稍襲京迹六年十一月王黼罷黼位元宰每陪曲宴親為俳優鄙賤之役以獻笑取悦太子聞而惡之黼以鄆王楷有􅃂隂為畫奪宗之計未成及帝幸其第觀芝而黼第與梁師成連牆穿便門往來帝始悟其與師成交結狀還宫眷待頓衰李邦彦素與黼不協隂結蔡攸共毁之㑹中丞何㮚論黼姦邪專横十五事遂詔黼致仕其黨胡松年等皆罷十二月詔蔡京復領三省事王黼既致仕朱勔力勸用京帝從之京至是四當國目昬眊不能治事悉決于季子絛凡京所判皆絛為之至代京入奏事絛每造朝侍從以下皆迎揖呫囁耳語堂吏數十人抱案後從由是恣為姦利竊弄威柄驟引其婦兄韓梠為户部侍郎媒蘖密謀斥逐朝士創宣和庫式貢司四方之金帛與府蔵之所儲盡拘括以實之為天子私財白時中李邦彦等惟奉行文書而已七年夏四月勒蔡京致仕蔡絛鍾愛于京擅權用事其兄攸嫉之數言于帝請殺絛帝不許白時中李邦彦亦惡絛乃與攸發絛姦私事帝怒欲竄之京力丐免乃止勒停侍養因安置韓梠于黄州褫絛侍讀毁賜出身敇欲以撼京而京猶未有去志帝乃命童貫詣京令上章謝事貫至京泣曰上何不容京數年當有相讒譛者貫曰不知也京不得已以章授貫帝命詞臣代京作三表求去乃降詔從之史臣曰京天資凶譎舞智御人在人主前顓狙伺為固位計始終一説謂當越拘攣之俗竭四海九州之力以自奉帝亦知其姦屢罷屢起且擇與京不合者以柅之京每聞將退免輒入見祈哀匐伏叩頭無復廉恥燕山之役京送攸以詩陽寓不可之意兾事不成得以自解見利忘義至於兄弟為參商父子如秦越暮年即家為府營進之徒舉集其門輸貨童𨽻以得美官棄紀綱法度為虚器患得之心無所不至根株結盤牢不可脱卒致宗社之禍花石綱之役徽宗崇寧元年春三月命宦者童貫置局于蘇杭造作􅄊用諸牙角犀玉金銀竹藤裝畫糊抹雕刻織繡之工曲盡其巧諸色匠日役數千而材物所須悉科于民民力重困三年二月令天下坑冶金銀悉輸内藏四年十一月以朱勔領蘇杭應奉局及花石綱于蘇州初蔡京過蘇州欲建僧寺閣㑹費鉅萬僧言必欲集此緣非郡人朱沖不可京即召沖語之居數日沖請京詣寺度地至則大木數千章積庭下京器其能踰年京還朝遂挾冲子勔偕來竄其父子姓名於童貫軍籍中皆得官帝時垂意花石京諷冲密取浙中珍異以進初致黄楊三本帝嘉之後嵗嵗召貢五六品至是漸盛舳艫相銜於淮汴號花石綱置應奉局於蘇州命勔總其事勔指取内帑如囊中物每取以數十百萬計於是搜巖剔藪幽隠不置凡士庶之家一石一木稍堪玩者即領健卒直入其家用黄封表識指為御前之物使䕶視之㣲不謹即被以大不恭罪及發行必撤屋抉牆以出人不幸有一物小異共指為不祥惟恐芟夷之不速民預是役者中家破産或鬻賣子女以供其須劚山輦石程督慘刻雖在江湖不測之淵百計取之必得乃止至截諸道糧餉綱旁羅商船掲所貢暴其上舟人倚勢貪横凌轢州縣道路以目而勔勢熖薫灼衺人穢夫候門奴事自直秘閣至殿學士如欲可得不附者旋踵罷去時謂東南小朝廷大觀四年閏八月以張閣知杭州兼領花石綱政和四年八月新作延福宫宫在大内北拱宸門外初蔡京欲以宫室媚帝召内侍童貫楊戩賈詳何訢藍從熈五人諷以内中逼窄之狀五人乃請因延福舊名而新作之五人分任工役視力所致爭以侈麗髙廣相誇尚各為制度不務沿襲及成號延福五位東西配大内南北稍劣其東直景龍門西扺天波門其間殿閣亭臺相望鑿池為海疏泉為湖鶴莊鹿砦文禽奇獸孔翠諸柵蹄尾動以千數嘉花名木類聚區别怪石巖壑幽勝宛若天成不類塵境既成帝自為文以記之其後又為村居野店酒肆青帘於其間每嵗冬至後即放燈自東華門以北並不禁夜徙市民行鋪夾道以居縱博羣飲至上元後乃罷謂之先賞尋又跨舊城脩築號延福第六位復跨城外浚濠作二橋橋下叠石為固引舟相通而橋上人物外自通行不覺也名曰景龍江夾江皆植奇花珍木殿宇對峙焉七年秋七月置提舉御前人船所時東南監司郡官二廣市舶率有應奉又有不待㫖但送物至都計㑹宦者以獻大率靈壁太湖慈溪武康諸石二浙奇竹異花海錯福建茘枝橄欖龍眼南海椰實登萊文石湖湘文竹四川佳果木皆越海渡江毁橋梁鑿城郭而至植之皆生而異味珍苞則以健步㨗走雖甚逺數日即達色香未變也至是蔡京又言陛下無聲色犬馬之奉所尚者山林間物乃人之所棄但有司奉行之過因以致擾乃請作提舉淮浙人船所命内侍鄧文誥領之詔自後有所需即從御前降下乃如數貢餘不許妄進名為便民而實擾害如故十二月作萬嵗山宣和三年春正月童貫承詔罷蘇杭應奉局花石綱初帝以東南之事付童貫且曰如有急即以御筆行之貫至吳見民困花石之擾貫遂命其僚董耘作手詔罪已罷諸應奉造作局又御前花石綱運併木石彩色等塲務而帝亦黜朱勔父子弟姪之在職者吳民大悦閏五月復置應奉司方臘既平王黼言于帝曰士大夫懐姦弗悛抑損應奉妄為譏謗望特置應奉一司臣專總領庶杜姦謀從之仍令梁師成總領於内遂復諸應奉局奪發運漕輓之卒為用户部不敢詰自是四方珍異之物充歸二人之家而入尚方者纔十一四年十二月萬嵗山成更名曰艮嶽山周十餘里其最髙一峯九十步上有亭曰介分東南二嶺直接南山山之東有蕚綠華堂書館八仙館紫石巖棲真嶝覽秀軒龍吟堂山之南則壽山兩峯並峙有鴈池噰噰亭山之西有藥寮西莊巢雲亭白龍沜濯龍峽蟠秀練光跨雲亭羅漢巖又西有萬松嶺半嶺有樓曰倚翠上下設兩闗闗下有平地鑿大沼沼中作兩洲東為蘆渚浮陽西為梅渚雪浪亭西流為鳯池東出為鴈池中分二館東曰流碧西曰環山有巢鳯閣三秀堂東池後有揮雪㕔復由嶝道上至介亭亭左復有極目亭蕭森亭右復有麗雲亭半山北俯景龍江引江之上流注山間西行為潄瓊軒又行石間為煉丹凝觀圜山亭下視江際見髙陽酒肆及清澌閣北岸有勝筠庵躡雲臺蕭閑館飛岑亭支流别為山莊為回溪又於南山之外為小山横亘二里曰芙蓉城窮極巧妙而景龍江外則諸館舎尤精其北又因瑤華宫火取其地作大池名曰曲江池中有堂曰蓬壺東盡封丘門而止其西則自天波門橋引水直西殆半里江乃折南又折北折南者過閶闔門為複道通茂徳帝姬宅折北者四五里屬之龍徳宫既成帝自為艮嶽記以為山在國之艮位故也初朱勔於太湖取石髙廣數丈載以大舟挽以千夫鑿城㫁橋毁堰拆牐數月乃至㑹得燕地因號昭功敷慶神運石立於萬嵗山又作絳霄樓勢極髙峻盡工藝之巧其後羣閹興築不已於是山林巖壑日益髙深亭臺樓觀不可稱紀又以金芝産于萬壽峯更名壽嶽諸巨璫爭出新意謂土木既宏麗矣獨念四方所貢珍禽之在圃者不能盡馴有市人薛翁素以豢擾為優塲戲請於童願役其間許之乃日集輿衛鳴蹕張黄葢以游至則以巨柈盛肉炙梁米翁傚禽鳴以致其類既乃飽飫翔集聴其去來月餘而圃禽四集不假鳴而至益狎玩立鞭扇間不復畏遂自命局曰來儀所招四方籠畜者置官司以總之一日上幸是山聞清道聲望而羣翔者數萬翁輒先以牙牌奏道左曰萬嵗山瑞禽迎駕上顧罔測大喜命以官賚予加厚道教之崇徽宗崇寧四年五月賜信州龍虎山道士張繼元號虚靖先生大觀二年三月頒金籙靈寶道塲儀範于天下政和三年夏四月作玉清和陽宫於福寧殿東奉安道像帝所生之地也九月賜方士王老志號洞㣲先生王仔昔號通妙先生老志濮人初為小吏遇異人授以丹遂棄妻子結草廬田間為人言休咎多驗太僕卿王亶以名聞時帝方嚮道術乃召至京師館于蔡京第嘗緘書一封至帝所啟視乃昔嵗中秋與喬劉二妃燕好之語也由是益信之號為洞㣲先生朝士多從求書初若不可解者卒應者什八九其門如市京慮太甚漸以為戒老志亦謹畏乃奏禁絶之踰年而死仔昔洪州人初隠于嵩山自言遇許遜得大洞隠書豁落七元之法能道人未來事京薦之帝召見賜號冲隠處士篆符有驗進封通妙先生由是道家之事日興而仔昔恩􅃂寖加朝臣戚里夤緣闗通中丞王安中上疏請自今招延山林道術之士當責所屬保任宣召出入必令察視其所經由仍申嚴臣庶往還之禁并言蔡京欺君僣上蠧國害民數事帝欣然納之已而再疏京罪帝曰本欲即行卿章以近天寧節俟過此當為卿罷京京伺知之大懼其子攸日夕侍禁中泣拜懇祈帝為遷安中翰林學士十一月癸未祀天於圜丘帝執大圭以道士百人執儀仗前導蔡攸為執綏官玉輅出南薫門帝忽曰玉津園東若有樓臺重複是何處也攸即奏見雲間樓臺殿閣隠隠數重既而審視皆去地數十丈頃之帝又曰見人物否攸即奏有若道流童子持幡幢節葢相繼而出雲間眉目厯厯可識遂以天神降詔告在位即其地建道宫名曰迎真作天真降臨示現記由是益信神仙之事矣十二月癸丑詔求道教仙經于天下四年春正月戊寅朔置道階時王老志王仔昔徐知常等得幸遂賜號先生處士等名秩比中大夫至將仕郎凡二十六級後又置道官二十六等有諸殿侍宸校籍授經以擬待制修撰直閣之名六年春正月賜方士林靈素號通真達靈先生靈素温州人少從浮屠苦其師笞罵去為道士善妖幻往來淮泗間丐食僧寺僧寺苦之及王老志死王仔昔寵衰帝訪方士于左階道籙徐知常知常以靈素對即召見靈素大言曰天有九霄而神霄為最髙其治曰府神霄玉清王者上帝之長子主南方號稱長生大帝君陛下是也既下降于世其弟號青華帝君者主東方攝領之又有僊官八百餘名今蔡京即左元仙伯王黼即文華使鄭居中童貫等皆有名而已即仙卿禇慧下降佐帝君之治時劉貴妃方有􅃂靈素以為九華玉真安妃帝心獨喜其事甚加􅃂信遂賜號賞賚無算為改温州為應道軍靈素本無所能惟稍習五雷法召呼風霆間禱雨有小驗而已閏月丁未從林靈素之言立道學自元士至志士凡十三品嵗大比許襴襆就試又用蔡京言集古今道教事為紀志賜名道史夏四月㑹道士于上清寶籙宫初帝以未得嗣子為念道士劉混康以法籙符水出入禁中建言京城西北隅地協堪輿形勢加以少髙當有多男之祥始命為數仞岡阜已而后宫生子漸多帝益信道教於是蔡攸謂有珠星璧月跨鳯乘龍天書雲篆之符以逢迎之及聞林靈素之言遂作上清寶籙宫密連禁署宫中山包平地環以佳木清流列諸館舎臺閣多以美材為楹棟不施五采有自然之勝上下立亭宇不可勝計帝時登皇城下視之由是開景龍門城上作複道通寶籙宫以便齋醮之路九月辛夘朔帝奉玉冊玉寶如玉清和陽宫上玉帝尊號曰太上開天執符御厯含真體道昊天玉皇上帝詔天下洞天福地脩建宫觀塑造聖像又上地祗徽號曰承天效法厚徳光大后土皇地祗上寶冊禮儀一如上帝尋改宫名為玉清神霄宫又鑄神霄九鼎安置于上清寶籙宫之神霄殿七年春正月甲子㑹道士二千餘人於上清寶籙宫詔林靈素諭以帝君降臨事乙亥帝幸上清寶籙宫命林靈素講道經時道士皆有俸每一觀給田亦不下數百千頃凡設大齋輒費緡錢數萬貧下之人多買青布幅巾以赴日得一飫餐而襯施三百謂之千道㑹且令士庶人聴靈素講經帝為設幄其側靈素據髙座使人於下再拜請問然所言無殊絶者時時雜以滑稽媟語上下為大閧笑莫有君臣之禮復令吏民詣宫授神霄祕籙朝士嗜進者亦靡然趨之夏四月庚申道籙院上章冊帝為教主道君皇帝初帝諷道籙院曰朕乃上帝元子為神霄帝君憫中華􅀍西方之教遂懇上帝願為人主令天下歸于正道卿等可上表章冊朕為教主道君皇帝於是道籙院上表冊之然止於道教章疏内用而不施於政事十二月方士王仔昔下獄死仔昔倨傲而戇帝待以客禮故遇宦者若童奴又欲羣道士宗已林靈素忌之乃與宦者馮浩誣以言語怨望下獄死戊辰帝言天神降于坤寧殿詔示百官且刻石以紀之初帝惑於林靈素之言建宫觀徧天下又造青華帝君正晝臨壇及火龍神劒夜降内宫之事託天神臨降造帝誥天書雲務以惑世欺衆其説妄誕不可究質宦者道士有所不快必託為帝誥則莫不如志尋加靈素號通真達靈元妙先生張虚白通元冲妙先生視中大夫出入訶引至與諸王爭道都人稱曰道家西府其徒美衣玉食者㡬二萬人立元成節以青華帝君八月九日生也重和元年八月辛酉詔頒御註道徳經丙戌詔太學辟雍各置内經道徳經莊子列子博士二員冬十月置道官二十六等道職八等宣和元年春正月乙夘詔更寺院為宫觀林靈素欲盡廢釋氏以逞前憾請於帝改佛號大覺金仙餘為仙人大士僧為徳士易服飾稱姓氏寺為宫院為觀改女冠為女道尼為女徳尋詔徳士並許入道學依道士之法六月甲申追封莊周為㣲妙元通真君列禦冦為致虚觀妙真君仍行冊命配享混元皇帝二年春正月甲子罷道學放林靈素歸田里靈素初與道士王允誠共為神怪之事後忌其相軋毒殺允誠專用事及都城水帝遣靈素厭勝方步虚城上役夫爭舉挺將撃之走而免帝始厭之然横恣愈不悛道遇皇太子弗斂避太子入訴於帝帝怒以靈素為太虛大夫斥還故里命江端本通判温州察之端本廉得其居處過制罪詔徙置楚州命下而靈素已死遺奏至猶以侍從禮葬焉宋史紀事本末卷十一
