body:
  text: 宋史紀事本末卷九明馮𤦺原編陳邦瞻増輯學校科舉之制仁宗慶歴四年三月乙亥詔天下州縣立學行科舉新法時范仲淹意欲復古勸學數言興學校本行實詔近臣議於是宋郊等奏教不本於學校事不察於鄉里則不能覈名實有司束以聲病學者專於記誦則不足盡人材參考衆說擇其便於今者莫若使士皆土著而教之於學校然後州縣察其履行則學者修飭矣先策論則文詞者留心於治亂矣簡程式則閎博者得以馳騁矣問大義則執經者不專於記誦矣帝從之至是乃詔曰儒者通天地人之理明古今治亂之原可謂博矣然學者不可騁其説而有司務先聲病章句以拘牽之則夫豪雋竒偉之士何以奮焉士以純明朴茂之美而無教學養成之法使與不肖並進則夫懿徳敏行何以見焉此取士之甚敝而學者自以為患夫遇人以薄者不可責其厚也今朕建學興善以尊大夫之行更制革敝以盡學者之才有司其務嚴訓導精察舉以稱朕意學者其務進徳修業無失其時其令州若縣皆立學本道使者選部屬官為教授員不足取於鄉里宿學有道業者士須在學三百日乃聴預秋試舊嘗充試者百日而止試於州者令相保任有匿服犯刑虧行冒名等禁三塲先策論次詩賦通考為去取而罷帖經墨義士通經術願對大義者試十道夏四月壬子判國子監王拱辰田況王洙余靖等言漢太學二百四十房千八百室生徒三萬人唐學舎亦千二百間今取才養士之法盛矣而國子監纔二百楹制度狹小不足以容詔以錫慶院為太學置内舍生二百人五月壬申帝至太學謁孔子故事止肅揖帝特再拜賜直講孫復五品服初海陵人胡瑗為湖州教授訓人有法科條􅊏悉備具以身率先雖盛暑必公服坐堂上嚴師弟子之禮視諸生如其子弟諸生亦信愛如其父兄從之遊者常數百人時方尚詞賦湖學獨立經義治事齋以敦實學至是興太學詔下湖州取其法著為令式瑗上書請興武學其略曰頃嵗吳育已建議興武學但官非其人不乆而廢今國子監直講内梅堯臣曾注孫子大明深義孫復而下皆明經㫖臣曾任丹州軍事推官頗知武事若使堯臣等兼蒞武學每日令講論語使知忠孝仁義之道講孫吳使知制勝御敵之術於武臣子孫中選有智略者二三百人教習之則一二十年之間必有成效臣已撰成武學規矩一卷進呈時議難之五年三月罷科舉新法范仲淹既去執政以新定科舉入學預試為不便且言詩賦聲病易考而策論汗漫難知祖宗以來莫之有改且得人嘗多矣帝下其議有司請如舊法乃詔前所更令悉罷之神宗熈寧四年二月丁巳更令科舉法從王安石議罷詩賦及明經諸科專以經義論策試士王安石又謂孔子作春秋實垂世立教之大典當時游夏不能贊一詞自經秦火煨燼無存漢求遺書而一時儒者附㑹以邀厚賞自今觀之一如斷爛朝報决非仲尼之筆也儀禮亦然請自今經筵毋以進講學校毋以設官貢舉毋以取士從之時詔議貢舉咸謂宜變法便蘇軾獨上議曰得人之道在於知人知人之法在於責實使君相有知人之明朝廷有責實之政則胥吏皂𨽻未嘗無人雖因今之法臣以為有餘使君相不知人朝廷不責實則公卿侍從嘗患無人况學校貢舉乎雖復古之制臣以為不足夫時有可否物有興廢使三代聖人復生於今其選舉亦必有道何必由學乎且慶厯固嘗立學矣天下以太平可待至於今惟空名僅存今陛下必欲求徳行道藝之士責九年大成之業則將變今之理易今之俗又當發民力以治宫室斂民財以養遊士置學立師而又時簡不帥教者屏之逺方徒為紛紛其與慶厯之際何異至於科舉或曰鄉舉徳行而畧文章或曰專取策論而罷詩賦或欲舉唐故事采譽望而罷彌縫或曰變經生帖墨而考大義此數者皆非也夫欲興徳行在於君人者修身以格物審好惡以表俗若欲設科立名以取之則是教天下相率而為偽也上以孝取人則勇者割股怯者廬墓上以廉取人則敝車羸馬惡衣菲食凡可以中上意者無所不至自文章言之則策論為有用詩賦為無益自政事言之則詩賦論策均為無用然自祖宗以來莫之廢者以為設法取士不過如此也矧自唐至今以詩賦為名臣者不可勝數何負於天下而必欲廢之帝喜曰吾固疑此得軾議釋然矣他日王安石言於帝曰今人材乏少且其學術不一異論紛然不能一道徳故也欲一道徳則當修學校欲修學校則貢舉法不可不變若謂進士科詩賦亦多得人自縁仕進别無他路其間不容無賢若謂科法已善則未也今以少壯之士正當講求天下正理乃閉門學作詩賦及其入官世事皆所未習此科法敗壊人材致不如古既而中書門下又言古之取士皆本學校道徳一於上習俗成於下其人材皆足以有為於世今欲追復古制則患於無漸宜先除去聲病偶對之文使學者得專意經術以俟朝廷興建學校然後講求三代所以教育選舉之法施之天下則庶幾可以復古矣於是改法罷詩賦帖經墨義士各占治易詩書周禮禮記一經兼論語孟子每試四塲初本經次兼經大義凡十道次論一首次策三道禮部試即増二道中書撰大義式頒行試義者須通經有文采乃為中格不但如明經墨義麄解章句而已其殿試則專以策限千字以上分五等第一等二等賜進士及第第三等賜進士出身第四等賜同進士出身第五等賜同學究出身舊制進士入謝恩銀百兩至是亦罷之仍賜錢三千為期集費三月庚寅始命諸州置學官率給田十頃贍士併置小學教授冬十月戊辰立太學生三舎法宋初國子生以京朝七品以上子孫應䕃者為之太學生八品以下子孫及庶人子孫俊異者為之試論策經義如進士法及帝即位垂意儒學以天下郡縣既皆有學嵗時月各有試程其藝能以次差升舎其最優者為上舎免發解及禮部試而特賜之第遂專以此取士又以慶厯中嘗置太學内舎生二百人帝漸增至九百人至是因言者論太學假錫慶院西北廊甚湫隘乃盡以錫慶院及朝集院西廡建講書堂四自主判官外增置直講為十員率二員共講一經令中書遴選或主判官奏舉釐生員為三等始入太學為外舎定額為七百人外舎升内舎員三百内舎升上舎員一百各執一經從所講官受學月考試其業優等以次升舎上舎免發解及禮部試召試賜第其正録學諭以上舎生為之經各二員學行卓異者主判直講復薦之於中書除官其後增置八十齋齋三十人外舎生至二千人嵗一試補内舎生間嵗一試補上舎生彌封謄錄如貢舉法六年三月己未置諸路學官更新學制有司立為約束過於煩密劉摰上疏曰學校為育材首善之地教化所從出非行法之所雖羣居衆聚帥而齊之不可無法亦有禮義存焉治天下者遇人以君子長者之道則下必以君子長者之行而應乎上若以小人犬豕遇之彼將以小人犬豕自為而況以此行於學校之間乎願罷其制丁卯詔進士諸科並試明法注官乙亥置律學詔士之涖官以法從事今所習非所學宜置律學設教授四員命官舉人皆得入學習律令九月辛亥初策武舉之士先是武舉試義策於秘閣武藝於殿前司又殿試則又試騎射又策於庭策武藝俱優為右班殿直武藝次優為三班奉職又次借職末等三班差役初樞密院修武舉法不能答策者答兵書墨義王安石曰武舉而試墨義何異學究誦書不曉理者無補於事先王収勇力之士皆屬於車右者欲以備禦侮之用則記誦何所施帝從之至是始策武舉之士八年六月己酉王安石以所訓釋詩書周禮三經上進帝謂之曰今談經者人人殊何以一道徳卿所著經義其頒行使學者歸一遂頒於學官號曰三經新義一時學者無不傳習有司純用以取士安石又為字説二十四卷學者爭傳習之自是先儒之傳注悉廢矣九年三月甲戌親策進士並試律義㫁案哲宗元祐元年夏四月辛亥司馬光請立經明行修科嵗委升朝文臣各舉所知以勉勵天下使敦士行以示不專取文學之意若所舉人違犯名教必坐舉主毋赦則自不敢妄舉而士之居鄉居家者立身行已惟懼玷缺所謂不言之教不肅而成不待學官日訓月察立賞告訐而士行自美矣於是詔自今凡遇科舉令升朝官各舉經明行修之士一人俟登第日與升甲罷謁禁之制五月戊辰命程頥等修定學制太學自蔡􅃀起大獄連引朝士有司緣此造為法禁煩苛凝密博士諸生禁不相見教諭無所施御史中丞劉摰以為言至是命程頥孫覺顧臨同太學長貳考詳修定條制頥大槩以為學校禮義相先之地而月使之爭殊非教養之道請改試為課有所未至則學官召而教之更不考定髙下置尊賢堂以延天下道徳之士鐫解額以去利誘省繁文以專任委勵行檢以厚風教及置待賓吏師齋立觀光法如是者亦數十條秋七月癸酉立十科舉士法舊制銓注有格槩拘以法法可以制平而不可以擇材故令内外官皆得薦舉其後被舉者既多除吏愈難神宗即位乃革去奏舉而槩以定格于是内外舉官法皆罷但令吏部審官院㕘議選格及帝即位左司諫王巖叟言自罷辟舉而用選格可以見功多而不可以見人才於是不得已而用其平日之所信故有踏逐申差之目踏逐實薦舉而不與同罪且選才薦能而謂之踏逐非雅名也况委人以權而不容舉其所知豈為通術遂復内外舉官法司馬光奏曰為政得人則治然人之才或長於此而短於彼雖臯䕫稷契各守一官中人安可求備故孔門以四科論士漢室以數路得人若指瑕掩善則朝無可用之人茍隨􅄊指任則世無可棄之士臣備位宰相職當選官而識短見狹士有恬退滯淹或孤寒遺逸豈能周知若專引知識則嫌於私若止循資序未必皆才莫若使有位達官各舉所知然後克叶至公野無遺賢矣欲乞朝廷設十科舉士一曰行義純固可為師表科有官無官人皆可舉二曰節撡方正可備獻納科舉有官人三曰智勇過人可備將帥科舉文武有官人四曰公正聰明可備監司科舉知州以上資序五曰經術精通可備講讀科有官無官人皆可舉六曰學問該博可備顧問科同經術舉人七曰文章典麗可備著述科同經術舉人八曰善聴獄訟盡公得實科舉有官人九曰善治財賦公私俱便科舉有官人十曰練習法令能㫁請讞科舉有官人應職事官自尚書至給事中中書舎人諫議大夫寄祿官自開府儀同三司至大中大夫職自觀文殿大學士至待制毎嵗須於十科内舉三人仍具狀保任中書置籍記之異時有事須材即執政按籍視其所嘗被舉科格隨事試之有勞又著之籍内外官闕取嘗試有効者隨科授職所賜告命仍具所舉官姓名其人任官無狀坐以繆舉之罪所貴人人重慎所舉得才光又言朝廷執政惟八九人若非舊交無以知其行能不惟涉狥私之嫌兼所取至狹豈足以盡天下之賢才若採訪毁譽則情偽萬端與其聴遊談之言曷若使之結罪保舉故臣奏設十科以舉士其公正聰明可備監司誠知請􅀈挾私所不能無但有不如所舉譴責無所寛宥則不敢妄舉矣詔從之二年春正月戊辰詔毋以老子列子命題試士時科舉罷詞賦專用王安石經義且雜以釋氏之說凡士子自一語以上非安石新義不得用學者至不誦正經唯竊安石之書以干進精熟者輙上第故科舉益弊吕公著當國始請禁主司不得以老莊書命題舉子不得以申韓佛書為學經義參用古今諸儒説毋得專取王氏尋又禁毋得引用王氏字説夏四月丁未吕公著請復制科詔曰祖宗設六科之選策三道之要以網羅天下賢俊先皇帝興學校崇經術以作新人材變天下之俗故科目之設有所未遑今天下之士多通於經術而知所學矣宜復制策之科以徠拔俗之才禆于治道蓋乃帝王之道損益趨時不必盡同同歸于治而已今復置賢良方正能直言極諫科自今年為始四年夏四月戊午分經義詩賦為兩科試士罷明法科尚書省請復詩賦與經義兼行解經通用先儒傳注及已説又言舊明法最為下科今中者即除司法叙名反在及第進士上非是乃詔立經義詩賦兩科罷試律義凡詩賦進士於易書詩周禮禮記春秋左傳内聴習一經初試本經義一道論孟義各一道次試賦及律詩各一首次試論一首末試子史時務策二道凡四塲其經義進士須習兩經以詩禮記周禮春秋為大經書易公羊榖梁儀禮為中經願習二大經者聴不得偏占兩中經初試本經義三道論語義一道孟子義一道次試論策亦四塲兩科通定髙下而取解額中分之各占其半專經者以經義定取舎兼詩賦者以詩賦為去留其名次髙下則於策論參之自復詩賦士多鄉習而專經者十無二三矣初司馬光言取士之道當先徳行後文學就文學言之經學又當先于詞章神宗專用經義論䇿取士此乃復先王令典百王不易之法但王安石不當以一家私學欲蓋先儒令天下師生講解至于律令皆當官所須使為士者果能知道義自與法律冥合何必置明法一科習為刻薄非所以長育人材敦厚風俗也至是遂罷明法科六年夏四月乙未復置通禮科先開寶中改鄉貢開元禮為通徳熈寧中嘗罷試科至是禮官以為言乃復置以試士八年三月庚子詔御試舉人復試詩賦論三題中書請御試復用祖宗法且言士子多已改習詩賦太學生員總三千一百餘人而不兼詩賦纔八十二人耳遂下是詔紹聖元年閏四月罷十科舉士法五月甲辰詔進士專習經義罷習詩賦三省上言今進士純用經術如詔誥章表等文皆朝廷官守日用不可闕者若悉不習試之何以兼収文學博異之士於是改置宏詞科嵗詔進士登科者請試試者雖多所取無過五人詞格超異者特奏命官六月申除引用王安石字説之禁二年夏四月丁亥詔依元豐置律學博士五月乙巳命蔡卞詳定國子監三學及外州學制徽宗崇寧元年八月甲戌蔡京請興學貢士縣學生選考升諸州學州學生每三年貢太學考分三等入上等補上舎入中等補下舎下等入下等補内舎餘居外舎諸州軍解額各以三分之一充貢士京又請建外學乃詔即京城南門外營建賜名辟雍外圓内方為屋千八百七十二楹太學專處上舎内舎生而外學則處外舎生士初貢至皆入外學經試補入上舎内舎始得進處太學太學外舎亦令出居外學於是上舎至二百人内舎六百人外舎三千人三年九月罷科舉法時雖設辟雍太學以待士之升貢者然州縣猶以科舉貢士蔡京以為言遂詔天下取士悉由學校升貢其州郡發解凡試禮部法皆罷而毎嵗試上舎生則差知舉如禮部法云四年五月甲寅立詞學兼茂科帝以宏詞科不足以致文學之士故改立是科嵗附貢士院試中格則授館職嵗不過五人行三舎法於天下元豐官制神宗元豐三年六月丙午詔中書詔定官制國初承唐制三省無專職臺省寺監亦無定員類以他員主判三省長官不預朝政六曹不釐本務給舎不領本職諫議無言責起居不記注司諫正言非特㫖供職亦不任諫諍其官人授受之别有官有職有差遣凡仕者以登臺閣升禁從為顯宦而不以官之遲速為榮滯以差遣要劇為貴途而不以階勲爵邑有無為輕重議者多以正名為請帝慨然欲更其制乃置詳定官制局于中書命翰林學士張璪樞密副使承㫖張誠一領之九月乙亥正官名以開府儀同三司易中書令侍中同平章事特進易左右僕射自是以下易名有差詳定官制所上寄禄格下詔行之凡領空名者一切罷去而易之以階因以寄祿議者又欲罷樞密院歸兵部帝曰祖宗不以兵柄歸有司故專命官以統之互相維制何可廢也遂止帝嘗謂執政曰官制將行欲新舊人兩用指御史大夫曰非司馬光不可王珪蔡確相顧失色珪憂甚不知所出確曰上乆欲収靈武公能任責則相位可保也珪喜謝之因薦俞充帥慶使上平西夏策其意以為既用兵深入必不召光雖召將不至已而光果不召四年秋七月己酉詔定選格初太祖設官分職多襲五代之制稍損益之凡入仕有貢舉奏䕃攝署流外從軍五等吏部銓惟注擬州縣官幕職兩京諸司六品以下官皆無選文臣少卿監以上中書主之京朝官則審官院主之武臣刺史副率以上内職樞密院主之使臣則三班院主之其後典選之職分為四文選曰審官東院曰流内銓武選曰審官西院曰三班院帝自即位欲更制度建議之臣以為唐銓與今選殊異雜用其制則有留礙煩紊之弊乃詔内外官司舉官悉罷令大理卿崔台符同尚書吏部審官東西三班院議選格遂定銓注之法悉歸選部以審官東院為尚書左選流内銓為侍郎左選審官西院為尚書右選三班院為侍郎右選於是吏部有四選之法文臣寄禄官自朝議大夫職事官自大理正以下非中書省敇授者歸尚書左選武臣升朝官自皇城使職事官自金吾階衛仗司以下非樞密院宣受者歸尚書右選自初仕至州縣幕職官歸侍郎左選自借差監當至供奉官軍使歸侍郎右選凡應注擬升移叙復䕃補封贈酬賞隨所分𨽻校勘合格團甲以上尚書省若中散大夫閣門使以上則列選叙之狀上中書省樞密院得畫㫖給告身祖宗以來中書有堂選百司郡縣有奏舉雖小大殊科然皆不𨽻于有司王安石言於帝曰中書總庶務今通判亦該堂除選徒留滯不能精擇宜歸諸有司帝曰唐陸贄謂宰相當擇百官之長而百官之長擇百官今之審官茍得其人安有不能擇百官者哉欲罷堂選曾公亮執不可而止至是既罷内外長吏舉官法堂除亦廢五年二月癸丑頒三省樞密六曹條制癸酉以王珪為左僕射兼門下侍郎蔡確為尚書右僕射兼中書侍郎章惇為門下侍郎張璪為中書侍郎蒲宗孟為尚書左丞王安禮為尚書右丞初議官制葢倣唐六典事無大小並中書取㫖門下審覆尚書受而行之三省分班奏事並歸中書確說珪曰公乆在相位必得中書令珪信不疑確乃言於帝曰三省長官位高不須置令但令左右僕射分兼兩省侍郎足矣帝以為然故確名為次相實顓大政珪以左僕射兼門下雖為首相拱手而已西夏用兵英宗治平三年夏四月夏人冦邊經略使蔡挺擊走之先是夏主諒祚遣吳宗來賀即位宗語不遜詔諒祚懲約宗諒祚不奉詔而出兵秦鳯涇原抄熟户擾邊塞殺掠人畜以萬計遂冦大順城環慶經略使蔡挺使蕃官趙明擊之諒祚衷銀甲氊㡌督戰挺先遣强弩列壕外注矢下射諒祚中流矢遁去徙冦柔逺挺又使副總管張玉以三千人夜出擾營賊驚潰退屯金湯聲言益發十萬騎圍大順㑹朝廷發嵗賜銀幣知延州陸詵曰朝廷積習姑息故敵敢狂悖不稍加折誚則國威不立因留止不與移牒宥州問故諒祚遂大沮盤桓塞下因遣使謝罪言邊吏擅興兵行且誅之初諒􅍈入冦韓琦議停其嵗賜絶其和市遣使問罪文彦博難之舉寶元康定時事𤦺曰諒祚狂童也非有元昊智計而吾邊備過當時逺甚亟詰之必服㑹陸詵䇿與𤦺合而諒祚果歸欵帝顧琦曰一如卿料也四年春夏主諒祚遣使獻方物謝罪時神宗新即位因賜詔曰朕以夏國累年以來數興兵甲侵犯邊陲驚擾人民誘迫熟户去秋復直冦大順圍迫城寨焚燒村落抗敵官軍邊奏累聞人情共憤羣臣皆謂夏國已違誓詔請行拒絶先皇帝務存含恕且詰端由庶觀逆順之情以决衆多之論逮此遜章之禀命已悲仙馭之上賓朕纂極云初包荒在念仰循先志俯諒乃誠既自省于前辜復願堅于永好茍奏封所叙忠信無渝則恩禮所加嵗時如舊安民保福不亦休哉冬十月癸酉青澗守將种諤襲擄夏監軍嵬名山遂復綏州嵬名山部落在故綏州名山弟夷山請降于种諤諤使人因夷山以誘名山賂以金盂名山小吏李文喜受之隂許歸欵而名山未之知也諤即以聞且欲因取河南地知延州陸詵言以衆來降情偽未可知戒諤毋妄動諤持之力詔詵召諤問狀且與轉運使薛向議撫納乃共畫三策令幕府張穆之入奏穆之因受向指詭言必可成帝意詵不協力徙之秦鳯諤不待命悉起所部兵長驅而進圍名山帳名山不得已舉衆從諤而南得首領三百尸萬五千兵萬人遂城其地夏人來爭諤擊敗之詵初劾諤擅興之罪欲捕治之未果而徙秦之命至西方用兵自此始种諤既受嵬名山降迨十一月夏主諒祚乃詐為㑹議誘知保安軍楊定等殺之邊釁復起朝議以諤生事欲棄綏誅諤陜西宣撫主管機宜文字趙卨言敵既殺王官而又棄綏不守示弱已甚且名山舉族來歸當何以處又遺書執政請存綏以張兵勢規度大理河川建堡畫稼穡之地三十里以處降者不從乃改命韓琦判永興軍經略陜西琦初言綏不當取及楊定等被殺復言綏不可棄樞密以初議詰之琦具論其故卒存綏州時言者交論种諤乃下吏貶諤四官安置隨州是月郭逵詗得殺楊定等首領姓名李崇貴韓道善夏主諒祚乃錮崇貴等以獻神宗熈寧元年三月庚辰夏主諒祚死子秉常立遣其臣薛宗道等來告哀帝問殺楊定事宗道言殺人者已執送之矣及李崇貴等至言楊定奉使諒祚嘗拜稱臣且許以歸沿邊熟户諒祚遺之寶劒寶鑑及金銀物初定歸時上其劒鑑而匿其金銀言諒祚可刺帝喜遂擢知保安軍既而夏人失綏州以為定賣已故殺之至是事露帝薄責崇貴等而削定官沒其田宅萬計遣劉航冊秉常為夏國主三年八月己卯夏人冦環慶州以韓絳為陜西宣撫使先是夏人築閙訛堡知慶州李復圭合蕃漢兵三千遣禆將李信劉甫禦之信等大敗而還復圭懼欲自解既執信等斬之復出兵追夏人殺其老㓜二百以功告㨗至是夏人大舉入環慶攻大順城柔逺砦茘原堡兵多者號二十萬少者不下一二萬屯于榆林游騎至慶州城下九日乃退鈐轄郭慶等數人死焉韓絳請行邊王安石亦請絳曰朝廷方賴安石臣宜行乃以絳為陜西宣撫使授以空名告敕得自除吏尋命兼河東宣撫使四年春正月己丑韓絳使种諤襲夏人敗之絳素不習兵事開幕府於延安措置乖方選蕃兵為七軍復以种諤為鄜延鈐轄知青澗城信任之命諸將皆受其節制蕃兵皆怨望絳與諤謀出兵取横山安撫使郭逵曰諤狂生耳朝廷徒以种氏家世用之必誤大事絳奏逵沮軍事召還之既諤帥師襲敗夏人于鄂羅特因以衆二萬城焉自是夏人日聚兵為報復計吕公弼言諤稔邊患不便宜戒之弗聴已而絳言諤入夏之功乞加旌賞詔從之三月丁亥夏人䧟撫寧諸城初种諤進築永樂川賞逋嶺二砦分遣都監趙璞燕達築撫寧故城及分荒堆三泉吐渾川開光嶺葭蘆川四砦與河東路修築各相去四十餘里已而夏人來攻順寧砦遂圍撫寧折繼昌髙永能等擁兵駐細浮圖去撫寧咫尺羅鄂特兵勢尚完諤在綏徳節制諸軍聞夏人至茫然失措欲作書召燕達戰悸不能下筆顧運判李南公涕泗不已由是新築諸堡悉䧟將士沒者千餘人詔棄羅鄂特城治諤罪責授汝州團練副使潭州安置絳坐興師敗衂罷知鄧州果不出郭逵所料云元豐四年六月夏人幽其主秉常知慶州俞充知帝有用兵意屢請伐夏又言諜報云夏將李清本秦人說秉常以河南地來歸秉常母梁氏知之遂誅清奪秉常政而幽之宜興師問罪此千載一時也帝然之秋七月庚寅詔熈河經制李憲等㑹陜西河東五路之師大舉伐夏而召鄜延副總管种諤入對諤至大言曰夏國無人秉常孺子往持其臂而來爾帝壯之乃决意西伐方議出師孫固諫曰舉兵易解禍難不可帝曰夏有釁不取則為遼人所有不可失也固曰必不得已請聲其罪薄伐之分裂其地使其酋長自守帝笑曰此真酈生之說爾時執政有言便當直渡河不可留行固曰然則孰為陛下任此者帝曰朕已屬李憲固曰伐國大事而使宦者為之則士大夫孰肯為用帝不恱他日固又曰今五路進師而無大帥就使成功兵必為亂帝諭以無其人吕公著進曰問罪之師當先擇帥既無其人曷若已之固曰公著之言是也帝不聴竟命李憲出熈河种諤出鄜延髙遵裕出環慶劉昌祚出涇原王中正出河東分道並進又詔吐畨首領董氊集兵㑹伐八月丁丑李憲總熈秦七軍及董氊兵三萬敗夏人於西市新城庚申又襲破之於女遮谷斬獲甚衆遂復古蘭州城之請建為帥府辛亥鄜延經略副使种諤率鄜延兵出綏徳城以攻米脂夏人八萬來救諤與戰于無定川敗之遂克米脂冬十月庚午環慶經畧使髙遵裕將步騎八萬七千出慶州與夏人戰敗之復通逺軍种諤遣曲珍率兵通黒水安定堡與夏人遇亦大敗之内使王中正率涇原兵出麟州渡無定河循水北行地皆沙濕士馬多䧟沒糗糧不能繼又恥無功遂入於宥州時夏人棄城走河北城中遺民百餘家中正遂屠之掠其牛馬以充食時劉昌祚率畨漢兵五萬受髙遵裕節制令兩路合軍伐夏既入境而慶州兵不至昌祚次瑪伊克隘遇夏衆十萬扼險大破之遂薄靈州城兵幾入門遵裕嫉其功馳使止之昌祚按甲不敢進遵裕至十八日圍城不能下夏人决黄河七級渠以灌營復鈔絶餉道士卒凍溺死遂潰而還餘軍纔萬三千而已夏人躡之復敗昌祚亦還涇原种諤留千人守米脂自率大衆進攻銀石夏州遂破石堡城進至夏州駐軍索家平㑹大校劉歸仁以衆潰而軍食又乏復值大雪乃引還死者不可勝計入塞者僅三萬人王中正自宥州行至奈王井糧盡士卒死者二萬人乃引還初詔李憲帥五路兵直趨興靈憲總師東上營于天都山下焚夏之南牟内殿并其館庫追襲其統軍星多哩鼎敗之次于葫蘆河遂班師時五路兵皆至靈州獨憲不至五年春正月庚子貶髙遵裕等官初夏人聞朝廷大舉母梁氏問策於廷諸將少者盡請戰一老將獨曰但堅壁清野縱其深入聚勁兵於靈夏而遣輕騎抄絶其餽運可不戰而困也梁氏從之師卒無功而還帝曰朕始以孫固言為迂今悔無及矣至是討敗師罪髙遵裕責受郢州團練副使本州安置种諤王中正劉昌祚並降官李憲欲以開蘭㑹功贖罪孫固曰兵法後期者斬况諸路皆至而憲獨不行不可赦帝以憲有功但令詰其擅還之由憲以餽餉不接為辭釋弗誅憲復上再舉之策詔以為涇原經畧安撫制置使知蘭州李浩副之三月壬寅鄜延路副總管曲珍敗夏人于金湯夏四月李憲乞再舉伐夏帝以訪輔臣王珪對曰向所患者用不足朝廷今捐錢鈔五百萬緡以供軍食有餘矣王安禮曰鈔不可噉必變而為錢錢又變為芻粟今距出征之期纔兩月安能集事帝曰李憲以為己有備彼宦者能如是卿等獨無意乎唐平淮蔡唯裴度謀議與主同今乃不出公卿而出于閹寺朕甚恥之安禮曰淮西三州爾有裴度之謀李光顔李愬之將然猶引天下之兵力厯嵗而後定今夏氏之强非淮蔡比憲才非度匹諸將非有光顔愬輩臣懼無以副聖意也六月辛亥環慶經畧司遣將與夏人戰破之戊辰曲珍等敗夏人於明堂川知延州沈括議欲盡城横山下瞰平夏使敵不得絶磧為冦种諤自以西討無功遂上其䇿於朝且言興功當自銀州始帝以為然遣給事中徐禧及内侍李舜舉往鄜延議之舜舉退詣執政王珪迎謂曰朝廷以邊事屬押班及李留後無西顧之憂矣舜舉曰四郊多壘卿大夫之辱也相公當國而以邊事屬二内臣可乎内臣止宜供禁廷灑掃之職豈可當將帥之任邪珪無慙色聞者恥之徐禧至鄜延种諤上言横山延袤千里多馬宜稼人物勁悍善戰且有鹽鐵之利夏人恃以為生其城壘皆控險足以守禦今之興功當自銀州始其次遷宥州又其次遷夏州三郡鼎峙則横山之地已囊括其中又其次修鹽州則横山强兵戰馬山澤之利盡歸中國其勢居髙俯視興靈可以直覆巢穴徐禧上言銀州雖據明堂川無定河之㑹而故城東南已為河水所吞其西北又阻天塹實不如永樂之形勢險扼請先城永樂竊惟銀夏宥三州䧟沒百年一日興復實為俊偉但建州之始煩費不貲若選擇要㑹建置堡砦名雖非州實有其地舊來疆塞乃自腹心已與沈括議築砦各六諤言若城永樂則西夏必力爭不可帝從禧議詔禧䕶諸將往城永樂命括移府並塞總兵為援陜西轉運判官李稷主饋餉禧以諤䟦扈奏留諤守延州而自率諸將往築之十四日而成距故銀州二十五里賜名銀川砦禧括及李舜舉等退還米脂以兵萬人屬曲珍守永樂九月丁亥夏人䧟永樂徐禧等敗死禧等既城去九日夏人以千騎趨新城曲珍使報禧禧遂與李舜舉李稷往援之留沈括守米脂時夏人三十萬已屯住涇原北邊人來告者十數禧曰彼若大來是吾立功名取富貴之日也大將髙永亨曰城小人寡又無水泉恐不可守禧以為沮衆械送延州獄禧扺永樂夏人傾國而至大將髙永能曰先至者皆精兵及其未陣急擊之則駭散後雖有至者亦不敢進此常勢也禧曰爾何知王師不鼓不成列執刀自率士卒拒戰夏人衆進薄城下珍兵陳於水際將士皆有懼色珍白禧曰今衆心已搖不可戰戰必敗請収兵入城禧曰君為大將奈何遇敵先自退邪乃以七萬人陳于城下夏人縱鐵騎渡河珍曰此鐵鷂子軍也當其半濟擊之乃可以逞得地則其鋒不可當也禧不從鐵騎既濟震盪衝􅊳大衆繼之珍銳卒敗奔還蹂後陣夏人乘之珍衆大潰珍収餘衆入城夏人圍之厚數里且據其水砦珍士卒晝夜血戰城中乏水已數日掘井不及泉渇死者十六七至絞馬糞汁飲之括與李憲援兵及餽餉皆為夏人所隔不得前种諤怨禧不遣救師城中大急㑹夜半大雨夏人環城急攻城遂䧟禧舜舉稷永能皆為亂兵所害惟珍裸跣走免將校死者數百人喪士卒役夫二十餘萬夏人耀兵米脂城下而還自熈寧以來用兵得夏葭蘆吳保義合米脂浮圖塞門六堡而靈州永樂之役官軍熟羌義保死者六十萬人錢榖銀絹不可勝計事聞帝臨朝痛悼為之不食自靈武之敗秦晉困棘天下企望息兵而括諤進攻取之策禧素以邊事自任狂謀輕敵遂致覆敗自是帝始知邊臣不可倚信深自悔咎無意于西伐而夏人亦困弊矣初帝之遣禧也王安禮諫曰禧志大才疎必誤國事帝不聴及敗帝曰安禮每勸朕勿用兵少置獄蓋為是也又每臨朝歎曰邊民疲弊如此獨吕公著每為朕言之於是徙公著知揚州六年二月夏人數十萬圍蘭州已據兩闗李浩閉城拒守鈐轄王文郁請擊之浩曰城中騎兵不滿數百安可戰文郁曰賊衆我寡正當折其鋒以安衆心然後可守此張遼所以破合肥也乃夜集死士七百餘人縋城而下持短刃􅊳之賊衆驚潰時以文郁方尉遲敬徳擢知州事未幾夏人復分道入冦亦多為諸路所敗中丞劉摰言熈河經畧使李憲貪功生事一出欺罔避興慶㑹師之期頓兵以城蘭州遺患至今詔貶憲為熈河安撫經畧都總管五月夏人冦麟州神堂砦知州訾虎躬督兵出戰敗之詔虎自今毋得輕易出入遇有冦邊止令禆將出兵捍逐恐失利損威以張敵勢閏月夏主秉常亦以困弊於兵令西南都統昴星威明濟勒移書示涇原劉昌祚乞通好如初昌祚以聞帝諭昌祚答之及入冦屢敗國用益竭乃遣摩格蔑密伊裕來貢上表曰臣自厯世以來貢奉朝廷無所虧怠至於近嵗猶甚歡和不意憸人誣間朝廷特起大兵侵奪疆土城砦因兹搆怨嵗致交兵今乞朝廷示以大義特還所侵倘垂開納别効忠勤帝賜詔曰比以權强敢行廢辱朕用震驚令邊臣往問匿而不報王師徂征葢討有罪今遣使造庭辭禮恭順仍聞國政悉復故常益用嘉納已戒邊吏毋輒出兵爾亦慎守先盟復詔陜西河東經畧司其新復城砦徼循毋出二三里夏之嵗賜悉如其舊惟乞還侵疆不許七年春正月癸丑夏人冦蘭州初李憲以夏人數至蘭州河外而翺翔不進意必大舉乃增城守之備至是果大舉入冦步騎號八十萬圍蘭州意在必取督衆急攻矢如雨雹雲梯革洞百道並進凡十晝夜不克糧盡引去尋復冦延州徳順軍定西城及熈河諸砦九月夏人圍定州城熈河將秦貴敗之哲宗元祐元年秋七月乙丑夏國主秉常卒子乾順立初秉常遣阿拉雅求蘭州米脂等五砦神宗不許及帝即位秉常復遣使來請司馬光言此乃邊鄙安危之機不可不察靈夏之役本由我起今既許其内附若靳而不與彼必以為恭順無益不若以武力取之小則上書悖慢大則攻䧟新城當此之時不得已而與之其為國恥無乃甚于今日乎羣臣見小忘大守近遺逺惜此無用之地使兵連不解願决聖心為億民計文彦博與光合太后將許之光又欲併棄熈河安燾固爭之曰自靈武而東皆中國故地先帝有此武功今無故棄之豈不取輕於外藩邪邢恕亦言此非細事當訪之邊人光乃召禮部員外郎前通判河州孫路問之路挾輿地圖示光曰自通逺至熈州纔通一徑熈之北已接夏境今自北闗瀕大河城蘭州然後可以扞蔽若捐以予敵一道危矣光乃止㑹秉常卒遣使來告哀詔自元豐四年用兵所得城砦待歸我永樂䧟執民當盡畫以給還遣穆衍往弔祭衍奏以為蘭棄則熈危熈危則闗中震唐自失河湟西邊一有不順則警及京都今二百餘年非先帝英武孰能克復若一旦委之恐後患益前悔將無及矣議遂止尋遣使封乾順為夏國主五年二月己亥夏人來歸永樂所掠吏士百四十九人遂詔以米脂葭蘆浮圖安疆四砦還之夏得地益驕秋七月夏人來議分畫疆界六年九月夏人冦麟州又冦府州七年冬十月夏人冦環州紹聖三年冬十月壬戌夏人冦鄜延䧟金明砦夏人自得四砦連嵗以畫界未定侵擾邊境且遣使欲以蘭州一境易塞門二砦朝廷不許夏主乾順乃奉其母率衆五十萬大入鄜延西自順寧招安砦東自黑水安定中自塞門龍安金明以南二百里間相繼不絶至延州北五里是月自長城一日馳至金明列營環城乾順子母親督桴鼓縱騎四掠知麟州有備復還金明而後騎之精銳者留龍安邊將悉兵掩擊不退金明遂䧟守兵二千八百惟五人得脫城中糧五萬石草千萬束皆盡將官張輿戰死初帝聞有夏冦泰然笑曰五十萬衆深入吾境不過數日即勝不過一二砦須去已而果破金明引退四年夏四月甲辰知渭州章楶城平夏楶以夏人猖獗上言城葫蘆河川據形勝以偪夏朝廷許之遂合熈河秦鳯環慶鄜延四路之師陽繕理他砦數十所以示怯而隂具版築守戰之備出葫蘆河川築二砦于石門峽江口好水川之隂夏人聞之帥衆來襲楶迎擊敗之二旬又二日城成賜名曰平夏城靈平砦章惇因請絶夏人嵗賜而命沿邊諸路相繼築城于要害以進拓境土凡五十餘所八月鄜延經畧使吕惠卿復宥州惠卿乞諸路出兵乘便討撃詔河東環慶並聴惠卿期約惠卿遂遣將官王愍攻破宥州尋又奏築威戎威羌二城加惠卿銀青光祿大夫時章惇肆開邊隙故諸道興役進築屢被爵賞元符元年冬十月己亥夏人圍平夏章楶禦之獲其勇將威明阿密西壽監軍美楞多布斬獲甚衆夏人震駭㨗至帝御紫宸殿受賀楶在涇原日乆嘗言夏嗜利畏威不有懲艾邊不得休息宜稍取其土疆如古削地之制以固吾圉然後諸路出兵擇要害不一再舉勢將自蹙矣章惇與楶同宗言多見采由是創州一城砦九屢敗夏人而諸路多建城砦以逼夏及是有平夏之㨗夏人不復振二年三月丙辰夏人求援于遼遼主遣僉書樞密院事蕭徳崇來為夏人議和仍獻玉帶詔郭知章報之復書謂若果出至誠深悔謝罪當徐度所宜開以自新之路冬十月許夏人通好夏人屢敗遣其臣凌囊威明濟勒等來謝罪且進誓表詔許其通好嵗賜如舊自是西陲民少安徽宗崇寧三年十二月以陶節夫經制陜西河東五路初蔡京任節夫帥鄜延節夫誕妄特甚每進築一城寨即奏云此西人要害必爭之地未一年自常調遷至樞密直學士然未嘗遣一騎一卒出塞葢與敵戰則有勝負獨進築則無虞又皆逺靈武數百里之地敵所不至故皆得就功論賞而京力主之故有是命四年三月貶王厚于郢州初蔡京使王厚招夏卓羅右廂監軍星多保忠厚言保忠雖有歸意而下無附者章數上京責厚愈急厚乃遣弟詣保忠還為夏邏者所獲遂追保忠赴牙帳厚以保忠縱不為夏所殺亦不能復領軍政使得之一匹夫耳何益於事京怒令以金帛招致之夏乃㸃兵渭延慶三路各數千騎出沒聲言假兵於遼而朝廷用京計又命西邊能招致夏人者毋論首從賞同斬級令陶節夫在延安大加招誘夏主遣使巽請皆拒之又令殺其放牧者夏人遂入鎮戎畧數萬口與羌酋錫羅薩勒合兵逼宣威城知鄯州髙永年出禦之行三十里為羌人所執都爾伯謂其下曰此人奪我國使吾宗族漂落無處所遂殺之探其心肝食焉已而羌衆復分大通河橋以叛新疆大震事聞帝怒親書五路將帥劉仲武等十八人姓名敇御史侯䝉往秦州逮治䝉至秦仲武等囚服聴命䝉喻之曰君輩皆侯伯無庸辱獄吏苐以實對獄既具䝉奏言漢武帝殺王恢不如秦穆公赦孟明子玉縊而晉侯喜孔明亡而蜀國輕今羌殺吾一都䕶而使十八將由之以死是自戕其肢體也欲身不病得乎帝悟釋不治惟王厚坐逗遛貶為郢州防禦使政和五年春正月童貫遣熈河經略使劉法將步騎十五萬出湟州秦鳯經略使劉仲武將兵五萬出㑹州貫以中軍駐蘭州為兩路聲援仲武至清水河築城屯守而還法與夏右廂軍戰于古骨龍大敗之斬首三千餘二月以童貫領六路邊事時永興鄜延環慶秦鳯涇原熈河各置經畧安撫司以貫統領之於是西邊之柄皆屬於貫九月王厚劉仲武合涇原鄜延環慶秦鳯之師攻夏臧㡳河城敗績死者十四五童貫匿不以聞未幾夏人大掠蕭闗而去六年春正月童貫使劉法劉仲武合熈秦之師十萬攻夏仁多泉城城中力孤守援不至乃降法受而屠之渭州將种師道克夏臧㡳河城師道世衡之孫也宣和元年三月童貫使熈河經略使劉法取朔方法不欲行彊遣之乃引兵二萬出至統安城遇夏主弟察克率步騎為三陣以當法前軍而别遣精騎登山出其後大戰移七時前軍楊惟忠敗入中軍後軍焦安節敗入左軍朱定國力戰自朝至暮兵饑馬渇死者甚衆法乘夜遁比明走七十里至葢朱峗守兵追之斬首而去察克見法首惻然語其下曰劉將軍前敗我于古骨龍仁多泉吾嘗避其鋒謂天生神將豈料今為一小卒梟首哉其失在恃勝輕出不可不戒遂乘勝圍震武震武在山峽中熈秦兩路不能餉自築城三嵗間知軍李明孟清皆為夏所殺至是城又將䧟察克曰勿破此城留作南朝病塊乃自引去時諸將所築城砦皆不毛夏所不爭之地而闗輔為之蕭條矣劉法既敗死童貫乃以㨗聞受賞者數百人六月夏人遣使納欵詔童貫罷兵熈河之役神宗熈寧三年冬十月貶秦鳯經略使李師中知舒州先是建昌軍司理王韶詣闕上平戎三策以為西夏可取欲取西夏當先復河湟欲復河湟當先以恩信招撫沿邊諸種自威武之南至于洮河蘭鄯皆故漢郡其地可以耕而食其民可以役而使幸今諸羌𤓰分莫相統一此正可併合而兼撫之時也且唃氏子孫瑪爾珍差盛為諸戎所畏若招撫之使糾合宗黨制其部族於漢有肘腋之助且使夏人無所連結策之上也帝異其言召問方畧王安石以為奇請以韶管幹秦鳯經略司機宜文字韶請築渭涇上下兩城屯兵以撫納洮河諸部下師中議師中以為不便詔師中罷帥事韶又言渭源至秦州良田不耕者萬頃願置市易司稍籠商賈之利取其贏以治田乞假官錢為本詔秦鳯經略司以川交子易物貨給之命韶領市易事師中言韶所指田乃極邊弓箭手地耳又將移市易司於古渭恐秦州自此益多事所得不補所失安石主韶議為削師中職徙知舒州而以竇舜卿知秦州與内侍李若愚按閒田所在僅得地一頃地主有訟又歸之矣舜卿若愚奏其欺安石又為謫舜卿而命韓縝縝遂附㑹實其事乃進韶太子中允四年八月命王韶主洮河安撫司事時議取河湟自古渭砦接青唐武勝軍應招納畨部市易募人營田等事並令王韶主之韶至秦會諸將以畨部俞龍珂在青唐最大渭源羌與夏人皆欲羈縻之議先致討韶因按邊引數騎直扺其帳諭以成敗遂留宿明旦兩種皆遣其豪隨韶以東龍珂率其屬十二萬口内附龍珂既歸朝自言平生聞包中丞朝廷忠臣乞賜姓包氏帝如其請賜姓包名順五年五月以古渭砦為通逺軍帝志復河隴㑹定州駐泊都監張守約請以古渭為軍根本隴右帝從之以王韶知軍事行教閱法八月秦鳯路沿邊安撫王韶引兵擊吐畨乞神平破䝉羅覺穆爾瑞巴等族初諸羌各保險諸將謀置陣平地韶曰賊不舍險來鬭則我師必徒歸今已入險地當使險為吾有乃徑趨瑪爾邦山壓敵軍而陣令曰敢言退者斬賊乘髙下鬭師小却韶躬擐甲胄麾帳下兵逆擊之羌大潰焚其廬帳而還洮西大震㑹穆珍渡河來援餘黨復集韶戒别將由竹牛嶺路張軍聲而潛師越武勝遇瑪爾珍首領轄裕勒等與戰破之遂城武勝建為鎮洮軍韶言措置洮河只用回易息錢未嘗輙費官本文彦博曰工師造屋初必小計冀人易於動工及既興作知不可已乃方增多帝曰屋壊豈可不修王安石曰主者善計自有忖度豈為工師所欺也彦博不復敢言由是韶進討敢肆欺誕朝廷不與計財冬十月置熈河路領熈河洮岷州通逺軍升鎮池軍為熈州以王韶為經略安撫使兼知熈州然河洮岷三州猶未能復也十一月河州首領轄裕勒等來降以為内殿崇班賜姓名包約六年二月王韶復河州𫉬穆珍妻子九月岷州首領穆珍以其城降初王韶既復河州㑹降羌叛韶回軍擊之吐畨穆珍遂據河州韶進破噶納木蔵城穿露骨山南入洮州境道陿隘釋馬徒行或日至六七穆珍留其黨守河州自將尾官軍韶力戰破走之河州復平穆珍聞先聲遂以城降韶入岷州於是宕洮疊三州羌酋皆以城附韶軍行五十四日涉千八百里得州五斬首數千級獲牛羊馬以萬計㨗書至帝御紫宸殿受羣臣賀解所服玉帶賜王安石進韶左諫議大夫端明殿學士七年二月知河州景思立與吐畨别將戰於塔布城敗死三月壬寅穆珍冦岷州穆珍雖屢敗而棟戩别將青伊結果荘之衆復數擾河州屬蕃時王韶入朝景思立既敗死穆珍勢復熾遂冦岷州刺史髙遵裕遣包順擊走之是月遣使分行諸路募武士赴熈河夏四月穆珍復冦河州圍之時賊勢方盛王韶自京師還至興平聞之乃與李憲日夜馳至熈州熈方城守韶命撤之選兵得二萬人諸將欲趨河州韶曰賊所以圍城者恃有外援也攻其所恃則圍自解乃直趨定羌城破西畨結河川族㫁夏國通路進臨寧河分命偏將入南山穆珍知援絶拔柵去韶還熈州以兵循西山繞塔布城後焚賊八十帳斬首七千餘級穆珍窮蹙率酋長八十餘人詣軍門乞降韶受之送穆珍赴京師初景思立之覆師也羌勢復熾朝議欲棄熈河帝為之旰食數下詔戒韶持重勿出及是帝大喜以穆珍為榮州團練使賜姓名趙思忠八年十二月以王韶為樞密副使九年二月吐蕃果荘冦五牟谷蕃將凌戩諾爾結大破之十二月果荘聚兵洮岷脇新附羌多歸之帝遣内侍押班李憲乘驛往秦鳯熈河措置邊事詔諸將皆受節制御史彭如礪等極論其不可且言果荘之患小用憲之患大憲功不成其患小功成其患大章再上不聴十年二月王韶罷韶與王安石有隙且以勤兵逺略歸曲朝廷帝亦不悅數以母老乞歸乃出知洪州韶鑿空開邊驟躋政地然用兵有機略臨出師召諸將授以指不復更問每戰必㨗常夜臥帳中前部遇敵矢石已及呼聲振山谷侍者股栗而韶鼻息自如人服其量夏四月賜熈河路兵特支錢戰死者賜帛十一月以宗格首領青伊結果荘為廓州刺史鄂特凌古為松州刺史哲宗元祐二年八月岷州將种誼復洮州執果荘青伊結檻送京師初棟戩既死養子阿里庫嗣為邈川首領逼果荘使率其衆據洮河岷州誼等帥師執之遣居秦州聴令招其子結鄂特促及部屬以自贖阿里庫懼乃上表謝罪元符二年秋七月洮西安撫使王贍取吐蕃邈川青唐降其酋瑪爾珍初阿里庫死子瑪爾珍嗣瑪爾珍性嗜殺部曲睽貳大酋森摩欽戩等有異志以瑪爾珍季父索諾木丹津雄武譖殺之其黨皆死獨綽爾結得逃奉棟戩疎族溪巴烏之子必贊據溪格城瑪爾珍攻殺必贊綽爾結奔河州說知州王贍以取青唐之策贍言于朝章惇許之至是贍引兵趨邈川守者以城降贍留屯之瑪爾珍自知其下多叛乃脫身自青唐來降於贍詔以胡宗回帥熈河以節制之八月城㑹州元豐中雖加蘭㑹與熈河為一路而會州實未復至是始城㑹州以西安城北六砦𨽻之閏九月吐蕃隆贊復據青唐王贍擊降之詔以青唐為鄯州邈川為湟州初瑪爾珍既降于王贍而贍與總管王愍爭功交訟于朝於是青唐大酋森摩欽戩迎溪巴烏入城立穆珍之子隆贊為主其勢復張瑪爾珍大懼自髠為僧以祈免熈河帥胡宗回督贍進師贍急攻隆贊及森摩欽戩等皆出降贍入據其城以青唐為鄯州贍知州事邈川為湟州王厚知州事三年三月詔棄鄯湟州以畀吐蕃初王贍留鄯州縱所部剽掠羌衆携貳森摩等結諸族帳謀反贍擊破之悉捕斬城中羌積級如山贍又諷諸羌酋籍勝兵者皆涅其臂無應者綽爾結請歸帥本路為倡贍聴之去遂嘯聚數千人圍邈川夏衆十萬助之城中危甚苗履姚雄帥所部兵來援圍始解贍因棄青唐而還溪巴烏與其子錫羅薩勒據之羣羌復合兵攻邈川王厚亦不能支朝論請並棄邈川且謂隆贊乃穆珍之子遂命知鄯州賜姓名曰趙懐徳其弟巴爾闢勒鄂丹斡曰懐義同知湟州加瑪爾珍懐逺軍節度使而貶贍于昌化軍厚于賀州胡宗回奪職知蘄州贍至穰縣自縊死徽宗崇寧元年十二月蔡京論前宰執韓忠彦等議棄湟州失䇿復薦髙永年王厚為帥從之二年夏四月詔宦者童貫監洮西軍六月童貫復湟州初蔡京復開邊還王厚前職㑹羌人都爾伯奉錫羅薩勒謀復國趙懐徳畏偪奔河南種落更挾之以令諸部朝廷患衆羌扇結遂命王厚安撫洮西合兵十萬討之京又與内客省使童貫善因言貫常使陜右審悉五路事宜與諸將之能否請以貫用李憲故事監其軍帝從之貫至湟州適禁中太乙宫火帝下手札止貫毋西兵貫發視遽納鞾中厚問故貫曰上趣成功耳遂行都爾伯知王師且至集衆以拒厚聲言駐兵而隂戒行羌備益弛乃與偏將髙永年異道而進都爾伯三子以數萬人分據要害厚擊殺其二子唯少子阿䝉中流矢去道遇都爾伯與俱遁厚遂拔湟州㨗聞進蔡京官三等蔡卞以下二等降徳音於熈河蘭㑹路論棄湟州罪貶韓忠彦為磁州團練副使安燾為祁州團練副使曾布為賀州别駕范純禮為靜江軍節度副使奪蔣之竒三秩凡預議者貶出有差三年夏四月王厚復鄯州廓州五月封蔡京為嘉國公以王厚為武勝節度留後初厚率大軍次于湟命髙永年將左軍别將張誡將右軍自將中軍期㑹宗格川羌置陣臨宗水倚北山錫羅薩勒張黄屋建大斾乘髙指呼望中軍旗鼓爭赴之厚麾遊騎登山攻其北親帥強弩迎射羌退走右軍濟水擊之大風揚沙翳羌目不得視遂大敗斬首四千三百餘級俘三千餘人薩勒以一騎馳去其母龜兹公主與諸酋開城門以降厚計薩勒必且走青唐將夜追之童貫以為不能及遂止師下青唐知薩勒留一宿去貫始悔之厚將大軍趨廓州羌酋落施軍令結以衆降遂入廓州詔加京司空封爵而超拜厚武勝軍節度觀察留後史臣曰吐蕃之裔守䕶西塞為不侵不叛之臣固嘗宣力王家奮擊夏醜而王安石主王韶章惇主王贍蔡京主王厚三用師于其國唃氏子孫無罪而就覆亡功雖訖成邊患不息及金人得青隴乃能求其後而續其血食孰謂金無人哉瀘夷神宗熈寧六年五月瀘夷叛詔遣中書檢正官熊本為梓䕫訪察使得以便宜措置諸夷事七年春正月熊本平瀘夷本嘗通判戎州習夷中俗及至部以為彼能擾邊者介十二村豪為嚮導爾乃以計致百餘人梟之瀘州其徒股栗願矢死自贖獨柯隂一酋不至本合晏州十九姓之衆發黔南義軍强弩遣大將王宣等帥以進討賊悉力旅拒宣敗之黄葛下追奔深入柯隂窘迫乞降本受之盡籍丁口土田及其重寶善馬歸之官以其酋海努勒知歸徠州其子及弟為畨部巡檢於是淯井長寧烏蠻羅氏鬼主諸夷皆願世為漢官本還帝勞之曰卿不傷財不害民一旦去百年之患至于檄奏詳明近時鮮儷擢集賢殿修撰賜三品服西南用兵自此始八年十一月熊本擊渝州獠渝州南川獠穆敦叛詔本安撫之本進營銅佛埧破其黨穆敦舉溱州地五百里來歸為四砦九堡建銅佛埧為南平軍召本還知制誥元豐三年五月復詔中州團練使韓存寶經制瀘夷先是渝州獠冦南川其酋阿鄂特奔海努勒熊本重賞檄斬之阿鄂特桀黠習知邊隙海努勒匿不殺㑹海努勒老以兵屬其子竒塔特遂與阿鄂特侵諸部時羅茍夷叛犯納溪提刑穆珦言羅茍起端不加誅則烏蠻觀望為害不細乃詔韓存寶擊之存寶召竒塔特掎角討蕩五十六村十三囤蠻乞降承租賦乃罷兵至是竒塔特率步騎六千至江安城下責平羅茍之賞數日乃引去知瀘州喬叙遣梓䕫都監王宣以兵二千守江安而以賄招竒塔特與盟于納溪蠻以為畏已益悖慢盟五日遂率衆圍熟夷羅箇牟族王宣救之一軍皆沒事遂張驛召存寶授方略統三將兵萬八千趨東川存寶怯懦不敢進竒塔特送欵紿降存寶信之遂休兵于綿梓遂資間四年秋七月韓存寶坐逗遛無功誅於瀘州以步軍都虞候林廣代将時竒塔特復送欵帝以其反覆無降意督廣進兵廣遂敗竒塔特於納江破樂共城斬首二千級竒塔特遁廣帥兵深入自發納江即入叢箐無日不雨雪兵夫疾病死亡不可勝計往往取僵尸臠割食之過鴉飛不到山至歸徠州竟不得竒塔特而還時朝廷懲安南無功方大舉伐夏故誅存寶以令諸將宋史紀事本末卷九
