body:
  text: 宋史紀事本末卷二明馮琦原編陳邦瞻増輯呉越歸地陳洪進附太祖建隆元年三月呉越王錢俶遣使來賀即位自是嵗朝貢開寶七年冬十月伐江南詔加呉越王俶為昇州東南行營招撫制置使先是俶遣判官黃夷簡入貢帝謂之曰汝歸語元帥江南倔彊不朝我將討之元帥當助我無惑人言云皮之不存毛將安附尋宻告以師期遂有是命八年夏四月呉越王俶既受命以沈承禮權知國務而自率兵五萬攻常州丞相沈虎子誎曰江南國之藩蔽今大王自撤其藩蔽將何以衛社稷乎不聽進攻其闗城又敗其軍於北界遣兵攻江陰宜興皆下之遂㧞常州江南主貽俶書曰今日無我明日豈有君一旦聖天子易地酬勲王亦大梁一布衣耳俶不答以書上帝優詔褒之九年二月呉越王俶來朝先是帝謂呉越使者曰元帥克毘陵有大功竢平江南可暫來與朕一相見以慰延想即當復還朕三執圭幣以見上帝豈食言乎至是俶與妻孫氏子惟濬入朝帝賜禮賢宅以居親幸宴之賞賚甚厚賜俶劒履上殿書詔不名命與晉王叙昆弟之禮俶固辭乃止留兩月遣還賜以一黃袱封識甚固戒俶曰途中宜宻觀及啟之則皆羣臣乞留俶章疏也俶甚感懼太宗太平興國三年三月己酉呉越國王俶來朝會陳洪進納土而懼上表乞罷所封呉越國王及解天下兵馬大元帥并書詔不名之命歸其兵甲求還帝不許其臣崔仁冀曰朝廷意可知矣大王不速納土禍且至俶左右爭言不可仁冀厲聲曰今已在人掌握且去國千里惟有羽翼乃能飛去耳俶遂決䇿上表獻其境内十三州一軍八十六縣俶朝退將吏始知之皆慟哭曰吾王不歸矣丁亥詔封俶為淮海國王授俶弟儀信並觀察使俶子惟濬惟治並節度使惟演惟灝及族屬僚佐授官有差又授其將校孫承祐沈承禮崔仁冀並為節度使賜賚待遇冠絶當時尋令兩浙發俶緦麻已上親及管内官吏悉至汴京凡千四十四艘以范旻權知兩浙諸州軍事旻上言俶在國日徭賦繁苛乞盡蠲其弊從之八年十二月俶改封漢南國王罷天下兵馬大元帥端拱元年八月戊寅俶生辰帝賜燕是夕暴卒陳洪進者故清源節度使留從效牙將也建隆三年三月從效卒子紹鎡典留務會呉越聘使至紹鎡夜召與燕洪進誣紹鎡謀附呉越執送於唐建康推副使張漢思為留後而自為副使已而漢思患洪進專因設燕伏甲將殺之酒數行地忽大震同謀者懼因以告洪進洪進亟走出甲士皆散自是更相為備一日洪進袖大鎻安歩入府中叱退直兵漢思方坐内齋洪進即合其户而鎻之使人叩門而言曰郡中軍吏請副使知留務衆情不可違幸授之印漢思惶懼不知所為即自門間出印與之洪進遽召將吏曰留後授吾印以蒞事衆皆賀即日遷漢思別舎以兵守之遣使請命於唐又遣牙將魏仁濟間道奉表來告且請制命乾德二年二月改清源為平海軍仍授洪進節度洪進嵗貢多厚歛於民二州甚苦之太宗太平興國三年夏四月洪進來朝因獻漳泉二州縣十四詔授洪進武寧節度使同平章事留之汴京諸子皆授要郡遣之官洪進後從平太原封岐公雍熙三年卒平北漢太祖建隆元年夏四月北漢主劉鈞自將兵至潞州赴李筠筠兵敗北漢主懼引師歸八月昭義節度使李繼勲焚北漢平遥縣俘獲甚衆晉州鈐轄荆罕儒復率衆攻汾州為北漢大將郝貴超所襲戰死罕儒驍將帝痛惜之斬其部將不用命者二十餘人三年二月北漢侵潞晉守將擊走之乾德元年秋七月漢宿衛殿直王隠劉昭趙巒等謀逆伏誅辭連其樞宻使段常北漢主出常為汾州刺史尋縊殺之初北漢主寵姬郭氏醫僧之女也僧與嫠婦通而生姬有殊色北漢主嬖之將立為妃常以所出非偶恐貽笑隣國北漢主乃止姬之昆弟姻戚又多抑而不用故咸怨常因譖殺之死非其罪國人憐之八月王全斌攻取北漢樂平詔以為平晉軍契丹救之不及九月北漢以契丹攻平晉軍洺州防禦使充西山巡檢郭進救却之進御下嚴毅帝遣戍卒必諭之曰汝輩謹奉法我猶貸汝郭進殺汝矣嘗有軍校自西山詣汴誣訟不法事帝詰知其情送進令殺之會北漢來侵進語其人曰汝敢論我信有膽氣今貰汝罪汝能掩殺敵兵當即薦汝如敗可自投河東其人踴躍赴戰大致克捷進即以聞乞還其職帝從之北漢主自潞州之敗日懼宋師至以趙文度為相又召抱腹山人郭無為及五臺山僧繼顒㕘預國事未幾文度無為議論不協北漢主出文度守汾州而無為獨相機事悉以委之契丹主以書貽北漢主曰爾不禀我命擅改年號助李筠殺段常其罪有三北漢主引父為子隠謝之初北漢與契丹嵗使不絶自是契丹使不來而北漢使往則見留羣臣悉以使北為懼北漢主乃命從子侍衛親軍使繼文請命亦被拘繼文崇之嫡孫魁梧有氣局沈毅寡言契丹主亦厚禮之二年二月昭義節度使李繼勲侵北漢遼州克之初繼勲屢敗北漢兵至是帝遣曹彬會繼勲合兵入北漢境攻其邉邑及遼石州繼勲大敗北漢兵於遼城下北漢遼城刺史杜延韜危蹙籍部下兵三千人降於繼勲契丹以六萬騎來援又擊走之三月北漢耀州團練使周審玉等來降四年北漢復取遼州五年北漢將閻章樊暉各以砦來降開寶元年秋七月北漢主鈞殂養子繼恩立初世祖女適薛釗生繼恩再適何氏生繼元二子初幼孤世祖以鈞無子命養為子鈞嘗謂郭無為曰繼恩㢲軟非濟世材恐不能了我家事將奈何無為不對至是病篤召無為付以後事繼恩既嗣位怨無為初不助己且恐其專政加守司空外示優禮内實疎之八月戊辰遣李繼勲將兵伐北漢初帝嘗因諜者謂漢主曰君家與周世讐宜不屈今我與爾無所間何為困此一方人也若有志中國宜下太行以決勝負漢主遣諜者報曰河東土地甲兵不足以當中國然我家世非叛者區區守此葢懼漢氏之不血食也帝哀其言謂諜者曰為我語鈞開爾一生路故終鈞世不加兵至是聞其卒遣李繼勲等以禁軍伐之北漢主初立宋兵已入其境乃遣劉繼業馬峯等領軍扼圍北谷峯至銅鍋河李繼勲前鋒將何繼鈞擊破之斬首三十餘級遂奪汾河橋薄太原城下焚延夏門九月北漢主欲逐郭無為畏懦不能決月餘供奉官矦霸榮率十餘人挺刃入閣反扃其門時繼恩獨處喪次見之驚起繞屏還走霸榮以刃揕其背殺之無為使人梯屋入殺霸榮繼恩立纔六十餘日并人疑無為授意於霸榮亟殺之以滅口無為與羣臣議立繼恩之弟繼元叅議中書事張昭敏獨曰少主非劉氏故嗣位不終今宜立宗姓以慰民望世宗嫡孫繼文久留契丹歴險阻宜迎立之可以固宗社結敵援無為不從以繼元易制遂立之十一月北漢主遣使告即位於契丹且乞師契丹主遣塔喇將諸道兵救之帝亦遣使齎詔諭北漢主令降約以平盧節度使授之又別賜郭無為詔許以邢州節度使無為得詔色動勸北漢主納欵北漢主不從初帝使諜者惠璘偽稱殿前指揮使負罪奔北漢無為知其詐使為供奉官及宋兵入境璘即奔赴至嵐谷候吏獲送太原北漢主使無為鞫之無為釋不問有李超者知璘姦狀上告無為怒并超斬之以絶口李繼勲等聞契丹兵來皆引歸北漢因大掠晉絳二州北漢主繼元妻段氏常以小過為孝和后郭氏所責既而病卒繼元疑后殺之后方縗服哭孝和帝於柩前繼元遣其嬖臣范超執而縊殺之宫中嬪御遭罹逼辱無復嫌間世祖十子鎬錡錫最有賢行繼元聽羣小之譖幽囚之未踰年皆死二年三月帝以李繼勲等師還無功謀再舉以問魏仁浦曰朕欲親征太原何如仁浦曰欲速則不達惟陛下重之帝不聽命繼勲等將兵先赴太原以光義為東京留守自將發汴三月至太原築長連城圍之立砦於城四面繼勲軍於南趙贊軍於西曹彬軍於北党進軍於東北漢劉繼業等乘晦突門犯東西砦戰敗而遁帝又命壅汾晉二水以灌城漢人大恐郭無為復勸北漢主出降漢主不從一日因宴羣臣無為痛哭於庭曰奈何以空城抗宋百萬之師乎引佩刀欲自刺冀動衆心漢主遽降階執其手引升坐而止夏四月契丹復救北漢帝度其必由鎮定救太原使韓重贇倍道兼行赴之又聞其分道一自石嶺闗入召何繼筠逆擊授以方畧繼筠遇契丹兵於陽曲大敗之斬首千餘級重贇亦先陣於嘉山契丹兵自定州西入見旗幟大駭欲遁重贇急擊大破之擒其首領三十餘人帝命以所獲契丹俘示於城下城中喪氣憲州判官史昭文嵐州刺史趙文度各以城降閏五月壬子帝班師時契丹主遣韓知璠冊立北漢主知璠習知戎備在圍城中晝夜督察盡心固守帝命水軍載弩環攻驍將石漢卿等多戰死北漢兵亦屢敗夜半忽傳呼漢主出降帝將開壁門將作使趙遂曰受降如受敵詎可中夜輕出已而果諜者契丹復遣南大王者將兵援北漢東西班都指揮使李懷忠曰敵勢已困若選勁兵急攻破在旦夕都虞候趙廷翰請先登帝壯之俾率衆攻城戰不利懷忠中流矢幾死時帝師頓於甘草池會暑雨軍士多疾太常博士李光贊上書請班師帝以問趙普普亦以為然乃分兵屯鎮潞徙北漢民萬餘户於山東河南而還北漢主籍宋所棄軍儲得粟三萬茶絹各數萬喪敗之餘賴此少濟太原之圍南城為汾水所䧟郭無為謀出降因請自將夜擊宋北漢主信之選精甲千人付無為自登七夏門送之無為行至北橋值風晦冥而止至是閹人衛德貴告其事且言無為獻地之謀蹤跡屢露反狀明白不可赦北漢主乃殺之以徇三年春正月契丹韓知璠自太原歸言晉陽多梗而劉繼元無輔政事令趙髙勲亦言我與晉陽父子之國先君以一怒而盡拘其使甚無謂也契丹主乃盡索北漢使者凡十六人厚禮而遣之仍命劉繼文為平章事李弼為樞宻使俾輔繼元繼文等久留契丹復受其命歸秉國政左右皆譖毁之北漢主乃出繼文為代州刺史李弼為憲州刺史是年北漢主以僧繼顒為太師兼中書令繼顒本劉氏孽子以宗姓授鴻臚卿嘗遊華嚴見地有寶氣乃於團柏谷置銀塲募民鑿山官收十之四繼顒自督所獲即倍於民時北漢主多内寵繼顒獻首飾數百副北漢主大喜遂有是命六年十二月北漢主殺其弟劉繼欽初北漢主為大内都㸃檢父鈞以其幼弱命劉繼欽副之委以禁衛北漢主立親舊多所誅放繼欽遂謝病請罷北漢主曰繼欽但亊先帝豈肯為我盡力耶乃黜居交城尋遣人殺之北漢主性殘忍凡臣下有忤意必族其家自帝親征及遣將攻伐因之殺傷不可勝計大將張崇訓鄭進衛儔故相張昭敏樞宻使高仲曦等先後俱以讒見殺九年八月帝令党進潘美楊光美牛思進米文義率兵分五道以攻太原又遣郭進等分攻忻代汾沁遼石等州諸將所向克捷進敗北漢兵於太原城北漢主急求救於契丹契丹主遣其相耶律舒救之師還先是帝嘗微行過趙普與普謀下漢普曰太原當西北二面太原既下則二邉之患我獨當之不如姑俟削平諸國則彈丸黑子之地將安逃乎帝以為然故雖連年攻伐至城下輒退師太宗太平興國四年春正月庚寅帝議伐漢薛居正等多以為不可惟曹彬力贊之帝意遂決乃以潘美為北路都招討使帥崔彦進李漢瓊劉遇曹翰米信田重進軍分四面攻太原城又以郭進為太原石嶺闗都部署以斷燕薊援師二月甲子帝自將伐漢三月乙未漢求救於契丹契丹遣耶律舒為都統迪里為監軍帥師赴之至白馬嶺與都部署郭進遇舒欲阻澗以待後軍迪里不從渡澗迎戰未成列進薄之契丹大敗迪里等皆死會耶律色珍兵至進引師退舒得免田欽祚䕶石嶺屯軍恣為姦利進不能禁屢形於言欽祚憾之進武人剛烈戰功高欽祚數加凌侮進不能堪遂縊而死欽祚以卒中風眩聞帝悼惜良久贈安國節度使左右皆知而無敢言者尋詔以牛思進代之夏四月帝發鎮州行營都監折御卿分兵攻岢嵐軍下之遂取嵐州漢人於隆州依險築城以拒帝遣軍使解暉折彦贇等先發兵圍之繼遣尹勲往城遂䧟庚午帝次太原時潘美等屢敗漢兵進築長連城圍太原矢石交下如雨漢外援不至餉道又絶城中大懼帝至督戰益急城無完堞帝慮城䧟殺傷者衆詔諭繼元降使者至城守陴者不納帝親督諸將士進薄城下列陣於前蹲甲交射矢集城上如蝟毛五月漢指揮使郭萬超踰城出降繼元親信之臣多亡城中危急帝復詔諭繼元速降當保終始富貴詔雖入城而諸將鋭攻不可遏帝猶慮城䧟害良民麾兵少却五月甲申繼元乃夜遣客省使李勲奉表乞降詔許之因至城北張樂宴從臣於城臺明日繼元率官屬縞衣紗帽待罪臺下帝釋之賜襲衣玉帶召使升臺繼元叩首謝罪五月甲申詔授特進檢校太師右衛上將軍封彭城郡公賜賚甚厚命劉保勛知太原府凡得州十軍一縣四十一帝作平晉詩命從臣和又授漢相李揮以下官有差詔毁太原舊城改為平晉縣以榆次縣為并州遣使分部徙太原民居之縱火焚太原廬舎老幼趨城門不及焚死者甚衆陳邦瞻曰宋之受制於遼由失燕薊其不能取燕薊失在先下太原昔王朴與周世宗謀取天下欲先定南方次及燕最後乃及太原葢燕定則太原直罝中兎耳將安往哉太祖趙普雪夜之言亦朴遺意也太宗一日忘其本謀急於伐漢盡鋭堅城之下僅能克之師已老矣復議攻燕所謂强弩之末勢不能穿魯縞一敗而没世不振再舉再失利皆由太宗不知天下之大勢倒行求前以致顛蹶也契丹和戰太祖開寶八年三月契丹主賢命其涿州刺史耶律琮貽書知雄州孫全興請通好全興以聞帝命答書許之契丹乃使克實克舒蘓來結成復遣人告北漢以通好于宋無妄侵伐秋七月遣閣門使郝崇信太常丞吕端使契丹報聘太宗太平興國二年夏四月契丹遣使耶律敞會𦵏太祖山陵尋遣辛仲甫報謝之契丹主問曰聞中朝有党進者真驍將如進之比凡幾人仲甫曰名將甚多如進鷹犬之材何可勝數契丹主欲留之仲甫曰信以成命義不可留有死而已契丹主知其不可奪厚禮遣還帝曰仲甫逺使絶域可謂不辱君命更得數人如此朕何患也四年春正月帝伐北漢契丹遣塔瑪長壽來言曰何名而伐漢也帝曰河東逆命所當問罪若北朝不援和約如故不然惟有戰耳自是和好中絶帝既滅漢欲乘勝取幽薊諸將以師罷餉匱不欲行崔翰獨曰所當乘者勢也不可失者時也取之易帝意決五月庚子遂發太原六月丁卯次東易州契丹刺史劉宇以城降留兵千人守之戊辰次涿州判官劉厚德亦以城降庚午進次幽州城南契丹將耶律實迪軍於城北帝率衆擊走之壬申命宋渥崔彦進劉遇孟𤣥喆分兵四面攻城圍之三周以潘美知幽州行府事契丹將多降秋七月契丹順州薊州皆降耶律學古時守燕悉力備禦不能支城中大懼契丹遣耶律興格救燕癸未帝督諸軍與契丹將耶律舒大戰於高梁河舒敗將遁興格兵適至與耶律色珍分左右翼以進復戰帝大敗死者萬餘人甲申帝引師南還興格追至涿州帝急乘驢車走免喪資械不可勝計庚寅命孟𤣥喆屯定州崔彦進屯闗南劉廷翰李漢瓊屯真定而還以石守信劉遇從征失律貶之乙巳帝至自范陽九月丙午契丹冦鎮州都鈐轄劉廷翰等合擊大破之是時契丹遣南京留守韓匡嗣與耶律舒耶律興格侵鎮州報圍燕之役軍於滿城西方陣官軍詐降匡嗣欲納之興格曰彼氣甚鋭疑誘我也可整衆待之匡嗣不聽俄而劉廷翰陣於前崔彦進潛師躡其後李漢瓊崔翰趙延進兵繼至合擊之契丹軍大潰追至遂城西大敗之斬首萬三百級獲三將馬萬匹匡嗣棄旗鼓遁去獨興格整兵而退五年三月契丹兵十萬冦鴈門代州刺史楊業領麾下數百騎自西陘出至鴈門北口南向擊之契丹兵大敗殺其駙馬侍中蕭徹爾自是契丹畏業每望見旌旗即引去業本北漢節度使劉繼業為漢主繼元扞太原城東南面每殺傷王師及繼元降繼業猶據城苦戰帝素聞其勇欲招致之令中使諭繼元俾招繼業繼元遣親信往繼業乃北面再拜大慟釋甲來見帝慰撫之復姓楊氏止名業拜代州刺史時以業善戰號楊無敵冬十月契丹主賢入冦圍瓦橋闗官軍陣于水南耶律興格帥精騎渡水而戰官軍大敗興格追至莫州十一月己酉帝自將禦契丹戊午次大名會契丹主引去帝欲復伐幽州李昉力陳其未可帝以劉遇曹翰為幽州部署遂還京時廷臣多迎帝意言宜速取幽薊張齊賢上疏曰方今海内一家朝野無事闗聖慮者豈不以河東新平屯兵尚衆幽燕未下輦運為勞臣愚以為此不足慮也自河東初下臣知忻州捕得契丹納粟典吏皆云自山後轉般以授河東以臣料契丹能自備軍食則於太原非不盡力然終為我有者力不足也河東初平人心未固嵐憲忻代未有軍砦入冦則田牧頓失擾邉則守備可虞及國家守要害増壁壘左控右扼疆事甚嚴恩信已行民心已定乃於鴈門陽武谷來爭小利此其智力可料而知也聖人舉事動在萬全百戰百勝不如不戰而勝若重之慎之則契丹不足吞燕薊不足取自古疆場之難非盡由敵國亦多邉吏擾而致之若緣邉諸砦撫馭得人但使峻壘深溝畜力養鋭以逸自處寧我致人此李牧所以用趙也所謂擇卒不如擇將任力不如任人如是則邉鄙寧邉鄙寧則輦運減輦運減則河北之民獲休息矣臣聞家六合者以天下為心豈止爭尺寸之事角强弱之勢而已乎是故聖人先本而後末安内以養外陛下以德懷逺以惠勤民内治既成逺人之歸可立而待也帝嘉納之吕中曰齊賢之論其知本矣然徒知遼未可伐而不知燕薊在所當取豈惟齊賢雖趙普田錫王禹偁亦不之知也葢燕薊之所當取者有二一則版籍之民苦於流徙二則山河之險移於强敵燕薊不收則河北之地不固河北不固則河南不可髙枕而卧也特太宗時未有可取之機耳契丹主還國以耶律興格為裕恱裕恱契丹至貴之職也興格智畧宏逺善料敵每戰勝讓功諸將故士卒樂為之用六年春正月癸卯置平塞靜戎二軍辛亥易州破契丹數千衆復改靜戎軍為安靜軍秋七月遣使如渤海渤海本髙麗别種契丹嘗取其扶餘城為東丹府時帝將大舉伐契丹遣使賜其王詔書令發兵以應約滅遼之日幽薊土宇復歸中朝朔漠之外悉與渤海竟無至者帝後復遣使如髙麗諭令發兵西會髙麗亦不能應七年九月契丹主賢幸雲州至焦山有疾命韓德讓耶律色珍受遺詔立長子梁王隆緒而卒隆緒小字文殊努生十二年矣既嗣位諡賢曰孝成皇帝廟號景宗尊母蕭氏為太后專國事復國號曰大契丹改元統和后以德讓為政事令兼樞宻使總宿衛兵巴固濟總領山西諸州事耶律興格為南面行軍都統雍熙三年春正月庚寅以曹彬田重進潘美等為都部署將兵伐契丹初賀懷浦將兵屯三交好議邉事與其子知雄州賀令圖上言契丹主少母后專政寵幸用事請乘其釁以取燕薊帝信之於是以曹彬為幽州道行營都部署崔彦進副之米信為西北道都部署杜彦圭副之出雄州田重進為定州路都部署出飛狐潘美為雲應朔等州都部署楊業副之出鴈門三月癸酉曹彬趨涿州遣先鋒將李繼隆破契丹兵取固安新城二縣進攻涿州克之殺其將和斯敵兵復集米信獨以麾下三百人接戰被圍數重信持大刀大呼突圍而出會彬遣兵至遂敗契丹兵於新城東北丁丑田重進出飛狐南遇契丹兵擊破之契丹西南面招安使大鵬翼率衆來拒重進陣於東命部將荆嗣出其西乘暮薄崖以短兵接戰契丹兵投崖而下殺獲甚衆挑戰數日敵勢頗張時譚延美屯小沼嗣令延美列隊平川别遣二百人執白幟于道側嗣以所部疾驅往鬬契丹兵見旗幟綿亘疑大軍繼至欲遁去重進乘之契丹兵崩潰生擒大鵬翼飛狐靈丘皆降丁亥潘美自西徑入與契丹兵遇追至寰州破之刺史趙彦章以城降進圍朔州節度副使趙希贊亦舉城降遂轉攻應雲州皆克之夏四月己酉田重進戰飛狐北再破之殺其二將趙普上疏曰伏覩今春出師將以收復幽薊屢聞克捷深快輿情然晦朔薦更已及初夏尚稽克復屬在炎蒸飛輓甚煩戰鬬未息王師漸老吾民亦疲夙夜思之頗増疑慮戰者危事難保其萬全兵者凶器深戒于不戢前書有兵久生變之言此可以深慮也茍更圖淹緩轉失機宜旬朔之間便渉秋序臣又慮内地先困邉境漸涼敵則弓勁馬肥我則人疲師老恐於此際或誤指蹤伏望速詔班師無容玩冦不報五月庚午曹彬引兵退與契丹耶律興格戰於岐溝敗績初諸將陛辭帝謂曰潘美但先趨雲朔卿等以十萬衆聲言取幽州且持重緩行不得貪利敵聞大兵至必悉衆救范陽不暇援山後矣及彬等乘勝而前所至克捷每捷奏聞帝訝其進兵之速彬既次涿契丹南京留守耶律興格兵少不敢出戰夜則令輕騎掠其單弱以脅餘衆晝則以精鋭張其勢又設伏林莽以絶糧道彬居涿旬日食盡退師雄州以援餽餉帝聞之曰豈有敵人在前反退軍以援芻糧失䇿之甚也亟遣使止彬勿前急引師緣白溝河與米信軍接俟美盡畧山後地會重進東下合勢以取幽州彬部下諸將聞美重進累捷恥握重兵不能有所攻取謀議蜂起彬不得已乃裹糧與米信復趨涿州興格聞之以輕兵來薄伺蓐食則擊離伍單出者且戰且却由是軍士自救不暇結方陣塹地兩邉而行時方炎暑軍渴乏井漉淖而飲凡四日始得至涿士卒困乏糧又將盡會契丹主隆緒與其太后自駞羅口將大兵應援趨涿州彬信復退興格因出兵躡之戰於岐溝闗彬信敗走無復行伍夜渡拒馬河興格引精兵追及溺者不可勝計彬信南趨易州方瀕沙河而㸑聞興格引兵復至驚潰死者過半沙河為之不流棄戈甲如丘山知幽州行府事劉保勲死之興格請乘勝畧地至河為界太后不從引兵還燕封興格為宋國王丙子帝詔曹彬米信及崔彦進等還令田重進屯定州潘美還代州徙雲應朔寰四州吏民及吐谷渾部族分置河東京西時契丹耶律色珍將兵十萬至定安西賀令圖遇之敗績南奔色珍追及戰於五臺死者數萬人明日攻蔚州令圖與潘美帥師往救與色珍戰於飛狐又敗於是渾源應州將皆棄城走色珍乘勝入寰州殺其守城吏卒千餘潘美既敗于飛狐副將楊業引兵䕶雲應寰朔吏民内徙時耶律色珍已䧟寰州兵勢甚盛楊業遇之欲領兵出大石路直入石碣谷以避其鋒護軍王侁等以為畏懦欲從鴈門北川中而往業不可侁曰君侯素號無敵今逗撓不戰得非有他志乎業曰業非避死葢時有未利徒殺士卒而功不立今君責業以不死當為諸公先乃引兵自石跌路趨朔州將行泣謂美曰此行必不利業太原降將分當死上不之殺寵以連帥授之兵柄非縱敵不擊葢欲伺便以立尺寸功報國家耳今諸君責業避敵尚敢自愛乎因指陳家谷口曰諸君幸於此張歩兵强弩以相援也業轉戰當至此可夾擊之不然無遺類矣美遂與侁帥麾下陣於谷口色珍聞業且至遣副部署蕭達蘭伏兵於路業至色珍擁衆為戰勢業麾幟而進色珍佯敗伏兵四起色珍還兵前戰業大敗退趨狼牙村侁自寅至巳不得業報使人登托囉臺望之無所見以為契丹敗走欲爭其功即領兵離谷口美不能制乃緣交河西南而進行二十里聞業敗即麾兵却走賀懷浦敗没業且戰且行自午至暮果至谷口望見無人拊膺大慟再率麾下力戰身被數十創士卒殆盡猶手刃數十百人馬重傷不能進匿深林中耶律實迪望見袍影射之業墮馬被擒其子延玉死焉業因太息曰上遇我厚期討賊捍邉以報而反為姦臣所迫致王師敗績何面目求活耶乃不食三日死業既敗麾下尚百餘人業謂曰汝等各有父母妻子與我俱死無益也可走還報天子衆感激皆戰死無一生還者於是雲應朔州及諸城將吏聞業死悉棄城走色珍復䧟其地事聞帝深痛惜詔贈業太尉削美三任除侁名初議興兵獨與樞宻院計中書不預聞及敗帝悔謂樞使張齊賢等曰卿等共睹朕自今復作如此事否秋七月庚午以曹彬等違詔失律各貶官有差初米信軍潰獨李繼隆所部成列而還田重進亦全軍不敗詔以重進為馬歩軍都虞候繼隆知定州丁亥以張齊賢知代州帝以楊業死訪近臣可知代州者時齊賢以言事忤帝意因請行乃命與潘美同領緣邉兵馬十一月壬寅契丹主隆緒及蕭太后帥衆南下以耶律興格為先鋒都統時劉廷讓帥師數萬並海而北與李敬源合兵將趨燕興格聞之以兵扼要害逆戰於君子館天方盛寒士卒皆不能彀弓弩會隆緒兵大至圍廷讓數重廷讓先分精兵屬李繼隆為後援繼隆退保樂壽廷讓力不敵一軍盡没以數騎脱走李敬源楊重進皆死之先是興格諜紿賀令圖曰我獲罪本國旦夕願歸南朝令圖信之私遺重錦十兩及廷讓敗興格宣言願見雄州賀使君令圖意其來降欲擅其功即引數十騎逆之既至帳下興格據胡床罵曰汝常好經度邉事今乃送死來耶令左右殺其從騎而執之自是河朔戍兵無復鬬志契丹乘勝長驅而南遂䧟深邢德三州殺官吏俘士民輦金帛而去魏博之北民尤苦焉帝聞之下詔自悔而釋敗潰將士之罪且蠲河北逋租給復三年令圖貪功生事輕而無謀初與其父懷浦首謀北伐一嵗中父子皆敗且貽中國之害壬子契丹薄代州城副部署盧漢贇畏懦保壁自固張齊賢選廂軍二千出禦之誓衆感慨無不一當百契丹少却先是齊賢遣使約潘美以并師來會戰使為契丹所執俄而美使至云師出至柏井得宻詔云東路王師敗衂并之全軍不許出戰已還州矣時契丹兵塞川齊賢曰敵知美來而不知美退乃閉美使室中夜發兵二百人持一幟負一束芻距州西南三十里列幟燃芻契丹遥見火光中有旗幟意謂并師至駭而北走齊賢先伏歩卒二千於土鐙砦掩擊大敗之殺其國舅詳衮特爾格宫使蕭達哩斬首數百獲馬二千器械無筭四年春正月丙戌詔行營將士戰敗潰散並釋不問緣邉城堡備禦有勞者具以名聞録死事文武官子孫蠲河北雍熙三年以前逋租敵所蹂踐者給復三年軍所過二年餘一年二月繕治河北諸州軍城隍帝將大發兵討契丹遣使募兵於河南北四十餘郡凡八丁取一以充義軍京東轉運使李維清曰若是天下不耕矣三上疏爭之李昉等亦相率言河南之民罔知戰鬬或慮人情揺動因而為盗非計之得乃詔獨選河北而諸路悉罷端拱元年冬十月契丹主隆緒攻涿州城破遂進攻長城士卒潰圍南走隆緒邀擊之殺獲畧盡十一月契丹攻滿城祁州及新樂皆䧟之己丑郭守文破契丹于唐河時北鄙騷動帝憂之訪羣臣以邉事右拾遺王禹偁獻禦戎十䇿大畧假漢事以明之漢十二帝言賢明者文景也言昏亂者哀平也然文景之世軍臣單于最為强盛候騎至雍火照甘泉哀平之時呼韓邪單于每嵗來朝委質稱臣邉烽罷警何耶葢文景當軍臣强盛之時而外任人内修政使不能為深患者由乎德也哀平當呼韓衰弱之際雖外無良將内無賢臣而致其來朝者係於時也今國家之廣大不下漢契丹即强盛至如撓邉侵塞豈有候騎至雍火照甘泉之事乎亦在乎外任人内修德耳臣愚以為外則合兵勢而重將權下詔感勵邉人使知取幽薊舊疆非貪其土地内則省官以寛經費抑文士以激武夫信用大臣以資其謀禁游惰以厚民力帝深嘉之二年春正月契丹䧟易州遷其民于燕癸巳詔議北伐張洎言中國禦戎惟恃險阻今自飛狐以東皆為契丹所有既失地利而河朔列壁皆具城自固莫可出戰此又分兵之過也請於沿邉建三大鎮各統十萬之衆鼎峙而守仍命親王出臨魏府以控其要則契丹雖有精兵豈敢越而南侵制敵之方盡於此矣宋琪言國家取燕於雄霸直進非我戰地如令大軍於易州循孤山渉涿水抵桑乾河出安祖寨則東瞰燕城纔及一舎此周德威取燕之路下視孤壘浹旬必克山後八州聞薊門不守必盡歸降勢使然也然兵凶器聖人不得已而用之若選使通好弭戰息民此亦䇿之得也李昉王禹偁亦多以修好為言帝納之八月尹繼倫大破契丹兵於徐河時朝廷聞契丹復至遣李繼隆發鎮定兵萬餘護送糧餽數千乘趨威虜耶律興格聞之帥精騎數萬邀諸途北面都巡檢使尹繼倫適領兵徼巡路遇之興格不顧而南繼倫曰彼蔑視我耳彼捷還則乘勝而驅我北去不捷亦且洩怒於我將無遺類矣為今日計當卷兵銜枚以躡之彼鋭氣前趨不虞我之至力戰而勝足以自樹縱死猶不失為忠義豈可泯然而死為邊地鬼乎衆皆憤激從命繼倫令秣馬俟夜人持短兵潛躡其後行數十里至唐州徐河天未明興格去大軍四五里會食訖將戰繼隆方陣于前以待繼倫從後急擊殺契丹一大將衆皆驚潰興格方食失箸為短兵中其臂創甚乘馬先遁餘衆引去契丹為之奪氣自是不敢大入冦每相戒曰當避黑面大王以繼倫面黑故云至道元年二月契丹大將韓德威率衆萬騎誘党項囉朗等族自振武入冦折御卿邀擊敗之於子河􅆜囉朗等乘亂反擊德威殺其將突厥哈里等德威僅以身免夏四月契丹冦雄州何承矩條子河􅆜之捷諭州民且掲于市契丹諜知愧忿將襲取承矩以雪恥夜引數千騎抵城下承矩整兵出拒遲明與契丹酣戰契丹復走帝聞謂承矩輕佻生事罷之十二月契丹韓德威諜知折御卿有疾遂帥衆犯邉以報子河􅆜之役御卿力疾禦之德威聞其至不敢進既而疾甚母宻召之歸御卿曰世受國恩邉冦未滅御卿罪也今臨敵安可棄士卒自便死於軍中乃其分也為白太夫人無念我忠孝豈得兩全言訖泣下明日卒于師契丹兵亦退西夏叛服繼遷德明太祖建隆元年定難節度使李彛興入貢李氏自思恭歴唐末五代世有夏州周顯德中封彛興西平王至是加太尉乾德五年李彛興卒子克睿立太宗太平興國三年李克睿卒子繼筠立四年王師伐漢繼筠遣其將李光逺光憲率蕃漢兵渡河畧太原境以張軍勢五年李繼筠卒弟繼捧立七年五月李繼捧入朝獻銀夏綏宥四州地繼捧自陳願居京師乃遣使夏州護緦麻已上親赴闕授繼捧彰德軍節度使併官其昆弟克信等十二人有差遂曲赦夏州管内以曹光實為四州都巡檢使六月李繼遷叛走地斤澤繼遷繼捧族弟也時為管内都知蕃落使居銀州聞朝使至遣赴闕乃詐言乳母死出塟遂與其黨數十人奔入地斤澤八年知夏州尹憲都巡檢曹光實襲繼遷破之斬首五百級焚四百餘帳獲其母與妻繼遷遁去雍熙二年二月繼遷䧟銀州先是繼遷既敗轉徙無常處復連娶豪族漸以彊大而西人以李氏世著恩德往往多歸之繼遷因語其豪右曰李氏世有西土今一日絶之爾等不忘李氏能從我興復乎衆曰諾遂與弟繼冲赴夏州詐降誘殺曹光實于葭蘆川因襲據銀州復破會州焚城郭而去事聞朝廷遣知秦州田仁朗等將兵討之五月徴田仁朗還副將王侁擊繼遷走之初繼遷既殺曹光實遂圍三族砦砦將折遇乜殺監軍使者與繼遷合田仁朗行次綏州請益兵留月餘俟報時繼遷乘勝進攻撫寧砦仁朗聞之喜曰戎人常烏合冦邉勝則進敗則走不可窮其巢穴今繼遷嘯聚數萬盡鋭以攻孤壘撫寧小而固非浹旬所能破我俟其困以大兵臨之分遣强弩三百邀其歸路敵成擒矣部署已定仁朗欲示閒暇縱酒樗蒲侁等因媒孽之帝聞三族已䧟大怒徴仁朗還下御史獄劾問請益兵及䧟三族狀仁朗對曰銀綏夏三州兵皆以城守為詞不遣三族去綏州逺非元詔所救也臣已定擒繼遷策會詔至不果因言繼遷得𦍑戎情願優詔懷來或以厚利啖部落酋長令圖之不爾他日大為邉患帝愈怒特貸死竄商州是月侁等出銀州北破悉利諸砦梟其黨折羅遇麟州諸蕃皆請納馬贖罪助討繼遷侁遂舉所部入濁輪川斬賊首五千級繼遷及遇乜遁去時詔郭守文與侁同領邉事守文復與知夏州尹憲擊鹽城諸蕃焚千餘帳由是銀麟夏三州蕃百二十五族悉内附三年繼遷請降于契丹契丹冊封為夏國王以義成公主妻之夏四月夏州安守中以衆三萬與繼遷戰于王亭鎮敗績繼遷追至城門而還端拱元年五月復以李繼捧為定難節度使遣之鎮帝嘗謂繼捧曰汝在夏州用何道以制諸部對曰𦍑人鷙悍但羈縻而已非能制也會有言繼遷悉知朝廷事疑繼捧洩之乃出繼捧為崇信軍節度至是繼遷侵擾日甚諸將用兵無功帝從趙普計復命繼捧鎮夏州賜姓名趙保忠厚賜而遣之以招繼遷淳化二年秋七月李繼遷請降以為銀州觀察使賜姓名趙保吉先是繼捧至夏州數月即言繼遷悔過歸欵詔授繼遷銀州刺史然實無降心也至是與繼捧戰于安慶澤繼遷中流矢遁去轉攻夏州繼捧乞濟師乃遣翟守素出兵援之守素至繼遷納欵奉表謝罪遂有是命且以其子德明為管内蕃落使行軍司馬未幾繼遷復叛五年春正月詔以李繼隆為河西都部署討李繼遷先是轉運副使鄭仁寶議禁鹽池用困繼遷繼遷遂率邉人四十二族㓂掠環州邉將多為所敗久之繼遷欲徙綏州民於平夏部將髙文岯等因衆不樂反攻敗之繼遷復圍堡砦掠居民焚積聚遂攻靈州朝廷乃命繼隆討之三月乙亥李繼隆將兵入夏州時繼捧聞繼隆且至先挈其母妻子女壁于野外上言與繼遷解怨獻馬五十匹乞罷兵帝覽奏立遣中使督繼隆進軍及師壓境繼遷因襲繼捧營欲併其衆繼捧方寢聞難作單騎走還城指揮使趙光嗣閉之别室開門迎繼隆繼隆執之送汴繼遷遁去繼捧至京赦之封宥罪侯夏四月甲申墮夏州城帝以夏州深在沙漠奸雄因以竊據欲墮其城宰相吕䝉正曰自赫連築城以來每為闗右之患若遂廢之萬世利也乃詔墮之遷其民于銀綏是年繼遷復遣使貢馬謝罪至道元年六月李繼遷遣押衙張浦以良馬槖駞來獻帝令衛士射于後圃俾浦觀之士皆拓兩石弓有餘力帝笑問浦曰𦍑人敢敵否對曰𦍑部弓弱矢短但見此長巨人則已遁矣况敢敵乎帝留浦京師遣使拜繼遷鄜州節度使繼遷不受秋七月李繼遷冦清逺軍守將張延擊敗之二年夏四月遣李繼隆等分道討李繼遷初帝命白守榮等護芻粟四十萬赴靈州李繼遷邀擊于浦洛河守榮衆潰運餉盡為所奪帝怒命繼隆為環慶等州都部署將兵討之會曹燦自河西還言繼遷衆萬餘方圖靈武城中告急使為繼遷所得則頓兵不去矣吕端請發兵由麟府鄜延環慶三道以擣平夏襲其巢穴則靈武之圍自解或云盛夏渉旱海水泉竭糧運艱辛不如靜以待之帝不聽即部分諸將命繼隆出環丁罕出慶范廷召出延王超出夏張守恩出麟五路進討直趨平夏保安軍奏獲繼遷母帝用㓂凖議且斬之吕端言昔項羽得太公欲烹之漢祖曰願遺我一杯羮夫舉大事者不顧其親况繼遷敵國悖逆之人哉斬之徒樹仇怨益堅其叛不若置延州善養視之以繫繼遷心帝從之八月李繼隆率諸將進軍期抵烏白池繼隆遣其弟繼和駞奏以環州道迂欲自清岡峽直趨繼遷巢穴不及援靈武上怒曰汝兄必敗吾事矣因手札切責使未至而繼隆已發兵與丁罕合行十日不見敵引軍還張守恩見敵不擊獨范廷召與王超至烏白池與賊遇時賊鋭甚超持重不進其子德用年十七為先鋒請乘之轉戰三日敵遂却德用曰歸師遇險必亂乃領兵先絶要害下令曰亂行者斬一軍肅然賊見其師整不敢逼廷召等大小數十戰互有勝負而諸將失期士卒困乏終三年二月李繼遷遣使納欵且求蕃任會帝崩太子初即位方在諒隂許之授繼遷充定難節度使且割夏綏銀宥靜五州與之張浦亦遣還繼遷尋遣弟瑗詣闕謝未幾復抄邉真宗咸平五年三月李繼遷大合蕃部攻䧟靈州繼遷改靈州為西平府居之先是帝以靈武事訪李至至言河湟之地蕃漢雜居是以先王置之度外今靈州不可不棄若移朔方軍於環州保固邉境亦一時之權也帝不決時繼遷抄掠益甚帝以張齊賢為涇原諸路經畧使禦之齊賢亦言靈武孤城必難固守徒使軍民六七萬䧟于危亡之地無益通判永興軍何亮復上安邉書言靈武地方千里表裏山河舎之則敵人之利廣且饒矣一患也自環慶至靈武凡千里西域諸衆合而為一二患也冀北馬之所生自匈奴猖獗無匹馬南來惟資西域西域既分為二其右乃西戎之東偏實為夏賊之境其左乃西域之西偏如舎靈武復合為一夏賊桀黠俾諸戎不得貨馬未知戰馬何從來三患也請築􅄎樂耀德二城以通河西之糧道靈武居絶域之外不築此二城為唇齒與捨靈武無異帝覽奏復詔羣臣議棄守之宜楊億上疏引漢棄朱崖為喻請棄靈武守環慶與李至前議合輔臣復以靈州乃必爭之地茍失之則緣邉諸郡皆不可保帝惑之李沆曰繼遷不死靈武終非朝廷有也莫若遣使宻召州將使部分軍民空壘而歸如此則闗右之民息肩矣帝不從以王超為西面行營都部署將步騎六萬援靈州會繼遷冦清逺軍都監段義叛降于繼遷繼遷勢益張復攻定州懷逺曹燦以蕃兵邀擊之稍稍斬獲而王超所將大軍卒不能進靈州遂䧟知州事裴濟死之帝得報悔不用李沆之言六年六月李繼遷圍麟州詔金明巡檢李繼周擊之知州事衛居寶出竒兵突戰繼遷㧞營遁去十月李繼遷轉攻西蕃取西涼府都首領潘羅支偽降集六谷蕃部合擊繼遷繼遷大敗中流矢死子德明立契丹封德明為西平王時環慶邉臣以德明初立乞降詔慰撫之帝乃詔德明令審圖去就知鎮戎軍曹瑋上言繼遷擅河南地二十年兵不解甲使中國有西顧之憂今其國危子弱不即捕滅後更强盛不可制矣願假臣精兵出其不意擒德明送闕下復河南為郡縣此其時也帝欲以恩致德明不報景德三年九月李德明奉表歸欵復遣劉仁朂進誓表十月授德明充定難節度使封西平王賜賚甚厚給奉如内地因索子弟入質德明謂非先世故事不遣惟獻駝馬謝恩而已自是德明嵗朝貢不絶大中祥符三年夏州饑德明上表求粟百萬朝議不知所出或言德明方納欵而敢渝誓請降詔責之王旦曰第詔德明云已敕有司具粟百萬于京師其遣衆來取德明得詔慙曰朝廷有人遂止九年德明表邉臣罕守舊制各務邀功漸乖盟約詔答之乾興二年德明以兵攻麟州柔逺砦巡檢楊承吉與戰不利命曹瑋為環慶秦州緣邉巡檢安撫使備禦之是年德明城懷逺鎮為興州仁宗天聖九年十月德明死子元昊立事見後交州之變太祖開寶六年五月交州丁璉入貢梁末交州土豪曲承美乘中國之亂據有十二州之地南漢遣將攻承美執之置交州節度乾德初節度使呉昌文死其將呉處玶爭立驩州刺史丁部領擊敗處玶等自領交州帥號大勝王署其子璉為節度使尋遜璉位漢既亡璉入貢授璉靜海軍節度封交阯郡王太宗太平興國五年秋七月交州丁璉及其父部領相繼死璉弟璿權行軍府事璿年尚幼大將黎桓幽璿别館而代領其衆時知邕州侯仁寳趙普女弟之夫也盧多遜與普有隙出仁寳於邕九年不代仁寳恐因循死嶺外乃上言交州亂可以偏師取之願乘傳詣闕面陳其狀帝喜將驛召仁寳多遜遽奏曰交州内擾此實天亡之秋但先召仁寶其謀必泄蠻冦預為之備未易取也不如宻令仁寶經度其事發兵長驅勢必萬全帝以為然以仁寶為交州水陸轉運使孫全興張濬崔亮劉澄賈湜王僎並為部署將兵討之全興濬亮由邕州澄湜僎由㢘州進桓聞之乃遣使為丁璿上表求襲位帝不許六年三月交州行營破賊于白藤江口獲戰艦二百於是知邕州侯仁寳率兵先進孫全興等頓兵花歩黎桓詐降以誘仁寳遂為所害會炎瘴軍士多死轉運使許仲宣以聞詔班師斬劉澄賈湜于軍徴全興下獄尋棄市八年春黎桓自稱權交州三使留後遣使來貢併上丁璿讓表帝賜桓詔曰朕且欲璿為統帥之名卿居副貳之任若璿將材無取童心如故然奕世承襲載綿星紀一朝舎去節鉞降同士伍理既非便居亦靡安宜遣璿母子盡室入朝即降制授卿節旄凡兹兩途爾當審處其一桓不聽命雍熙三年以黎桓為靜海軍節度使桓復上表求正領節鎮朝廷懲孫全興之敗不欲用兵許之丁氏由此遂滅四年復封桓為交阯郡王真宗景德三年五月交州黎桓死子龍廷殺其兄龍鉞而自立知廣州凌策等言桓諸子爭立衆心離叛請發本道兵討之帝以桓素修職貢不欲伐喪令緣海安撫使諭曉之龍廷復入貢後賜名至忠大中祥符三年春交州大校李公藴弑其主至忠自立為留後遣使入貢帝曰黎桓不義而得公藴尤而效焉甚可惡也然蠻俗何足責哉遂用桓故事封公藴為交阯郡王交州自公藴後世修職貢不絶然數盗邉至其王乾德遂大舉入冦神宗熙寧八年也時朝廷方議開疆知桂州沈起遣官入溪洞㸃集土丁為保伍又於融州强置城寨殺人以千數交人以為言罷起以知州劉彛代之彛至奏罷廣南所屯北兵而用槍杖手分戍復聽偏校言以為安南可取乃大治戈船交人來互市盡遏絶表疏亦不得達至是遂分三道入冦一自廣府一自欽州一自崑崙闗連䧟欽㢘二州殺土丁八千人事聞起坐貶安置郢州除彛名神宗熙寧九年春正月交人圍邕州知州蘇緘悉力拒守外援不至城遂䧟緘義不死賊手命其家三十六人皆先死藏屍于坎乃縱火自焚城中人感緘之義無一人從賊者於是交人盡屠其民凡五萬八千餘口事聞詔贈緘奉國節度使諡忠勇二月以郭逵為安南招討使時會得交人露布言中國作青苗助役之法窮困生民今出兵欲相拯濟時相怒乃以天章閣待制趙卨為招討使將兵討之卨言逵老於邉事願以為使而已副之故有是命冬十月郭逵敗交阯兵于富良江初逵次長沙先遣將復邕㢘而自將西進至富良江蠻以精兵乘船逆戰官軍不能濟趙卨分遣將吏伐木治攻具機石如雨蠻船皆壞因設伏擊之斬首數千殺其偽太子洪真李乾德懼遣使奉表詣軍門納欵時官兵八萬人冒暑涉瘴地死者過半富良江去其國不逺逵不敢渡得其廣源州門州思浪州蘇茂州桄榔縣而還羣臣稱賀詔以廣源為順州赦乾德罪治沈起劉彛開釁之罪安置隨秀州陳邦瞻曰交州在宋世凡再叛初以侯仁寶後以沈起仁寶死起竄足為邉臣不務安輯而生事者之戒雖然交州小醜再勤王師卒無成功宋之不振甚矣蜀盗之平太宗淳化四年春蜀青神民王小波作亂初蜀亡其府庫之積悉輸汴京後任事者競喜功利於常賦外更置博買務禁商賈不得私市布帛蜀地狹民稠耕稼不足以給由是小民貧困兼并者益糴賤販貴以規利小波因聚衆為亂且曰吾疾貧富不均今為爾均之貧者爭附遂攻青神掠彭山殺縣令齊元振剖其腹實之以錢以其平日愛錢故也賊黨由是愈熾旁邑響應十二月西川都巡檢使張玘與王小波戰于江原玘射中小波已而為小波所殺小波亦病創死其黨推小波妻弟李順為帥㓂掠州縣䧟卭州永康軍衆至數十萬五年春正月戊午李順攻䧟漢州復䧟彭州遂攻成都轉運使樊知古知府郭載及官屬出奔梓州順入城據之僣號大蜀王遣其黨四出攻刼州縣兩川大震帝議遣大臣撫諭趙昌言獨請遣兵急討無致滋蔓帝從之遣宦者王繼恩為兩川招安使分路進討以雷有終為峽路轉運使二月乙未李順分遣楊廣數萬衆冦劍門上官正為劍門都監麾下有疲卒數百因勉激以忠義勇氣百倍力戰以守會成都監軍宿翰兵至正與之合迎擊賊衆斬馘幾盡餘衆三百分還成都順怒其驚衆盡斬之自此氣沮時朝廷聞蜀盗甚盛深以棧道為憂正以孤軍力戰破賊於是閣道無壅王師得以長驅而進李順圍梓州初知梓州張雍聞王小波起即練士卒募强勇為城守計輦綿州金帛以實帑藏命官屬治戎器守械悉備至是順遣其黨帥衆二十萬圍梓城中兵纔三千雍悉智力禦之凡八十日王繼恩遣石智顒來援賊乃潰去己亥王繼恩師至綿州賊潰走追殺其衆遂復綿州遣曹習破賊于老溪復閬巴蓬劍等州五月王師至成都破賊十萬衆斬首三萬級獲李順遂復成都其黨張餘復攻䧟嘉戎瀘渝涪忠萬開八州開州監軍秦傳序死之辛未降成都府為益州八月甲午以王繼恩為宣政使初中書以繼恩討蜀冦功欲除宣徽使帝曰朕讀前代史不欲令宦官預政宣徽執政之漸也止可授以他官宰相力言繼恩有大功非此不足以酬之帝怒深責相臣乃命學士張洎錢若水議别立宣政使以授之辛丑以張詠知益州時王繼恩上官正宿翰等總兵討賊漸有成功頓師不進專務飲博其下恣横剽掠餘冦時復張大詠至勉正等親行臨發舉酒屬軍校曰爾曹䝉國厚恩此行當蕩平醜類若老師曠日即此地還為爾死所矣正由是決計深入大致克捷時㓂掠之際民多脅從詠諭以恩信使各歸田里且曰前日李順脅民為賊今日吾化賊為民不亦可乎時民間訛言有白頭翁午後食人兒女一郡􅅝然至暮路無行人既而得造訛者戮之民遂帖息詠曰妖訛之興沴氣乘之妖則有形訛則有聲止訛之術在乎識斷不在乎厭勝也初蜀士知向學而不樂仕宦詠察郡人張及李畋張逵三人皆有學行為鄉里所稱遂敦勉就舉士由是知勸民有諜訴者詠酌量情法輕重判數語以示之蜀人刻為戒民習風俗為之敦厚先是城中屯兵尚三萬人無半月之食詠知民間舊苦鹽貴而廩有餘積乃下其估聽民以米易鹽未踰月得米數十萬斛詠度有二嵗備乃奏罷陜西糧運帝聞之喜曰此人何事不了吾無憂矣癸卯以㕘知政事趙昌言為川峽都部署時王繼恩在蜀不能戢衆帝意頗厭兵召昌言謂曰西川本自一國太祖平之今三十年矣昌言知帝指即前畫攻守之䇿帝喜命昌言帥蜀自繼恩以下並受節制既行或奏昌言有反相不宜握重兵尋罷知鳳翔府上官正復雲安軍先是張餘賊衆攻䕫州白繼贇大敗之于西津口斬首二萬獲舟千餘艘正復連破賊于廣安嘉陵合州賊進攻陵州又為知州張旦所敗至是正等大敗張餘於雲安軍復其城至道元年二月丙午四川都監宿翰獲張餘于嘉州先是西川行營衛紹欽楊瓊屢破賊衆復蜀卭等州帝以蜀盗漸平下詔罪已畧曰朕委任非當燭理不明致彼親民之官不以惠和為政管𣙜之吏惟用刻削為功撓我烝民起為狂冦念兹失德是務責躬永鑒前非庶無貳過聞者感悦至是餘攻眉州翰擊敗之餘走嘉州為軍士所獲是年召王繼恩還以上官正雷有終為四川招安使蜀冦悉平後數年復有王均之變真宗咸平三年春正月甲午益州戍卒作亂推王均為首初神衛卒戍益州以都虞候王均董福分領之福御衆有法所部皆優贍均好飲博軍裝悉以給費至是兵馬軡轄符昭壽與知益州牛冕大閱于東郊蜀人趨觀之二軍衣服鮮敝不等均衆由是慙憤而昭壽亦驕恣侵虐軍士素怨之是月朔戍卒趙延順等八人為亂遂殺昭壽益州官吏方賀正旦聞變皆奔竄知州牛冕與轉運使張適縋城而去惟都巡檢使劉紹榮冐刃格鬬衆寡不敵叛卒尚未有主欲奉紹榮紹榮攝弓矢罵曰我本燕人棄敵歸朝豈能與爾同逆耶亟見殺我終不負朝廷也監軍王澤召王均謂曰汝所部為亂盍往招安之叛卒見均即擁之為主紹榮自經死均遂僣號大蜀改元化順署置官稱以小校張鍇為謀主均帥衆攻䧟漢州進攻綿州不克直趨劒州為知州李士衡所敗還保益州帝時幸河朔將發大名聞之以戸部使雷有終為川峽招安使李惠石普李守倫並為巡檢使給歩騎八千往討之上官正李繼昌等皆𨽻焉時知蜀州楊懷忠聞亂即調鄉丁會諸州巡檢兵討之懷忠入益州焚城北門至三井橋與賊黨戰數合懷忠不利而退復檄嘉眉等七州合兵再攻益州敗之乘勝逐賊至州南十五里砦于雞鳴原以俟王師均亦閉門自固二月癸亥雷有終等至益州時都巡檢張思鈞已克漢州遂進壁升仙橋賊出攻砦有終擊走之丁卯王均開城門偽遁雷有終等帥兵入城號令不肅官軍競剽掠賊閉闗發伏布牀榻于路口官軍不得出因為所殺有終等緣堞而墜得免李惠死之官軍退保漢州益州城中民皆奔迸四出復為賊黨追殺或囚縶之支解族誅以恐衆又脅士民之少壯者為兵先刺手背次髠首次黥面給軍裝令乘城與舊賊黨相間有終署榜招之至則署其衣袂釋之日數百人冬十月甲辰雷有終復益州初賊由升仙橋分路襲王師有終帥兵逆擊大敗之王均單騎走還城遂撤橋塞門有終與石普進屯於城北分遣將校攻城三面賊出戰屢敗然王師每薄城輒會雨城滑不能上有終命為洞屋以進均亦對設敵樓以相拒有終遣卒焚之賊由是消沮復築月城以自固有終令卒䝉氊秉燧以入悉焚其望櫓機石先遣東西南砦鼓譟攻之有終普分主洞屋而前遂入城大敗之均夜與其黨二萬人突圍而遁有終疑有伏遣人縱火城中明日執嘗受偽署者數百人悉焚殺之時謂􅁈酷均既走所過斷橋塞路焚倉庫而去己丑有終遣楊懷忠追均至富順及之大敗其衆遂入城均縊死懷忠取均首及僣偽法物降其黨六千人詔進有終懷忠等秩流牛冕儋州張適連州四年十二月丁未詔蜀賊既平除追捕亡命餘詿誤之民並釋不問訛言動衆者有司斬以聞六年冬十月復以張詠知益州民聞詠再至皆鼓舞相慶轉運使黃觀上其治狀下詔褒美會遣謝濤巡撫西蜀帝令傳諭詠曰得卿在蜀朕無西顧之憂矣是時内地亦多冦盗濮州賊夜入城掠知州王守信監軍王昭度家王禹偁時守黃州上疏曰伏以體國經野王者保邦之制也易曰王公設險以守其國自五季亂離各據城壘豆分𤓰剖七十餘年太祖太宗削平僣偽天下一家當時議者乃令江淮諸郡毁城隍收兵甲撤武備者二十餘年書生領州大郡給二十人小郡減五人以充常從號曰長吏實同旅人名為郡城蕩若平地雖則尊京師而抑郡縣為强幹弱枝之術亦匪得其中道也臣比在滁州值發兵挽漕闗城無人守禦止以白直代主開閉城池頺圯鎧仗不完及徙維揚稱為重鎮乃與滁州無異嘗出鎧甲三十副與巡警使臣彀弩張弓十損四五葢不敢擅自修治上下因循遂至於此今黃州城池器械復不及滁揚萬一水旱為灾盗賊竊發雖思備禦何以支吾葢太祖削諸侯跋扈之勢太宗杜僣偽覬望之心不得不爾其如設法維世久則弊生救弊之道在乎從宜疾若轉規固不可膠柱而鼓瑟也今江淮諸州大患有三城池頺圮一也兵仗不完二也軍不服習三也濮賊之興慢防可見望陛下特紆神斷許諸郡酌民户衆寡城池大小並置守捉軍士多不過五百人閲習弓劍然後漸葺城壁繕完甲胄則郡國有禦侮之備長吏免剽畧之虞矣按禹偁此䟽深切時弊故附見于此宋史紀事本末卷二
