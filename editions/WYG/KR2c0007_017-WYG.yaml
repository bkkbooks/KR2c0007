body:
  text: 宋史紀事本末巻十七明馮𤦺原編陳邦瞻増輯秦檜主和檜死附髙宗建炎元年六月遣宣義郎傅雱使金軍通問二帝初黄潛善白遣雱為祈請使又遣太常少卿周望為通問使俱未行李綱上言堯舜之道孝弟而已今日之事正當枕戈嘗膽内修外攘使刑政修而中國强則二帝不俟迎請而自歸不然雖冠蓋相望卑詞厚禮恐亦無益今所遣使但當奉表通問二帝致思慕之意可也帝從之遂命綱草表付雱以往且致書于尼瑪哈秋七月丙辰閤門宣贊舎人曹勛以上皇手書至自金時上皇自燕山謂勛曰我夢四日並出此中原争立之象不知中原之民尚肯推戴康王否因出御衣絹半臂親書其領中曰便可即真來救父母又諭勛曰如見康王第言有清中原之策悉舉行之毋以我為念又言藝祖有誓約藏之太廟不殺大臣及言事官違者不祥康王夫人邢氏聞勛南還亦脱所御金環使内侍持付勛曰幸為我白大王願如此環得早相見也勛遂間行至南京以御衣進帝泣以示輔臣勛因建議募死士入海至金東境奉上皇由海道歸黃潛善等難之出勛于外冬十月壬辰以王倫為朝奉郎假刑部侍郎充大金通問使閤門舍人朱弁副之倫等至金見金左副元帥宗維議事時金方大舉南下留倫等不遣二年五月以宇文虛中充金國祈請使虛中時竄韶州㑹詔求使絶域者虛中應詔乃復資政殿大學士充祈請使稱臣奉表于金時金人方起兵南侵已留王倫朱弁矣虛中至金人遣虛中楊可輔劉海王貺並歸虛中曰奉命北來祈請二帝二帝未還虛中不可歸遂獨留金國初建制度草創愛虛中有才藝毎加官爵虛中即受之遂與韓昉俱掌制因是知東北之士皆憤恨䧟北宻以信義結納金人不之覺三年夏四月起復朝散郎洪皓為金國通問使時尼瑪哈自東平還雲中鄂爾多自濵州還燕山帝遣皓移尼瑪哈書願去尊號用金正朔比于藩臣時所在盗梗皓艱難百端得達太原留一年遣至雲中尼瑪哈迫使仕劉豫皓曰萬里銜命不得奉兩宮南歸恨力不能磔逆豫忍事之耶留亦死不即豫亦死不願偷生狗鼠間願就鼎鑊無悔尼瑪哈怒將殺之旁一校曰此真忠臣也目止劍士且為皓請得流逓冷山九月遣直龍圖閣張邵使金武臣楊憲副之邵至濰州接伴使置酒張樂邵曰二帝北遷邵為臣子所不忍聽請止樂至于三四聞者泣下見左監軍達蘭命邵拜邵曰監軍與邵為南北朝從臣無相拜禮且以書抵之曰兵不在强弱在曲直宣和以來我非無兵也帥臣初開邊隙謀臣復起兵端是以大國能勝之厥後偽楚僣立羣盗蠭起曾幾何時電掃無餘是天意人心未厭宋也今大國復裂地以封劉豫窮兵不已曲有在矣達蘭怒取國書去執邵送宻州囚于柞山砦金人又迫朱弁仕劉豫且訹之曰此南歸之漸弁曰豫乃國賊吾嘗恨不食其肉又忍北面臣之乎吾有死耳金人怒絶其餼遺以困之弁固拒驛門忍饑待盡誓不為屈金人亦感動致禮如初久之復欲易其官弁曰自古兵交使在其間言可從從之不可從則囚之殺之何必易其官吾官受之本朝有死而已誓不易以辱吾君也冬十月辛未秦檜自金歸初檜從二帝至燕金主以檜賜達蘭為其任用達蘭信之及南侵以為㕘謀軍事又以為隨軍轉運使達蘭攻楚州檜與妻王氏自軍中趨漣水軍自言殺金人監已者奪舟而來欲赴行在遂航海至越州帝命先見宰執檜首言如欲天下無事須是南自南北自北朝士多疑其與何㮚孫傅等同被拘執而檜獨還又自燕至楚二千八百里踰河越海豈無譏訶之者安得殺監而南就令從軍達蘭金人縱之必質妻屬安得與王氏偕惟范宗尹及李囬二人素與檜善盡破羣疑力薦其忠檜入對首奏所草與達蘭求和書帝謂輔臣曰檜朴忠過人朕得之喜而不寐既聞二帝母后消息又得一佳士也先是朝廷雖數遣使于金但且守且和而專意與敵解仇息兵則自檜始紹興元年八月丁亥以秦檜為尚書右僕射同平章事兼知樞宻院事時范宗尹罷相檜欲得其位因揚言曰我有二策可聳動天下或問何不言檜曰今無相不可行也帝聞乃有是命二年六月秦檜罷時呂頤浩為左相檜為右相㑹桑仲上疏願以所部收復京師乞朝廷舉兵為聲援頤浩信之屢請出師檜時已有傾頤浩之意因諷人言周宣王内修外攘故能中興今二相宜分任内外於是帝諭頤浩及檜曰頤浩治軍旅檜理庶務如種蠡分職可也乃命頤浩都督江淮荆浙諸軍事開府鎮江帝謂給事中程瑀曰頤浩熟於軍事在外總諸將檜在朝廷庶幾内外相應然檜誠實但太執耳瑀對曰如求機警能順㫖者極不難得但不誠實則終不可倚帝然之頤浩至常州桑仲已為霍明所殺前軍將趙延壽復叛遂稱疾不進尋召還行在初胡安國嘗聞游酢論檜人才可方荀文若故力言檜賢於張浚諸人檜入相安國時為給事中呂頤浩既還憾檜傾己欲去之問計于席益益曰目為黨可也今黨魁胡安國在𤨏闥宜先去之㑹頤浩薦朱勝非代已都督命下安國奏勝非正位冡司值苗劉肆逆貪生茍容辱逮君父今強敵憑陵叛臣不忌用人得失係國安危深恐勝非上誤大計帝為罷都督之命改兼侍讀安國復持録黃不下頤浩特命檢正黃龜年書行安國争之遂落職提舉仙都觀侍御史江躋左司諫呉表臣論勝非不可用安國不當責於是與張燾程瑀胡世將劉一止林待聘樓炤等二十餘人皆坐檜黨落職檜亦自求去先是起居郎王居正與檜善檜與居正論天下事甚鋭既相所言皆不酬居正疾其詭言于帝曰秦檜嘗語臣中國之人惟當着衣啖飯共圖中興臣時心服其言又自謂為相數月必聳動天下今為相設施止是願陛下以臣所言問檜所行及檜求去呂頤浩諷侍御史黃龜年上書劾罷檜遂以觀文殿大學士提舉江州太平觀龜年又奏論檜狥私欺君合正典刑投諸裔土以禦魑魅章凡三上乃褫檜職仍榜其罪于朝堂示不復用初檜所陳二策欲以河北人還金中原人還劉豫帝曰檜言南人歸南北人歸北朕北人將安歸檜語乃塞至是帝乃召直學士院綦崇禮語以是事及居正所言崇禮即以帝意載于制詞畧曰自檜得權而舉事謂當聳動于四方逮兹居位以陳謀乃首建明于二策罔燭厥理殊乖素期播告中外人始知檜之姦九月壬戌王倫還自金倫既被留久之有商人陳忠宻告倫二帝所在倫遂與朱弁及洪皓以金遺忠潛通倫意由是兩宮始知帝已即位先是淵聖自雲中徙燕山始與太上皇相見居于愍忠寺至是並遷於霫郡霫古奚國也在燕山北千里既至居于相府院嗣濮王仲理等千八百人尚在燕金人計口給食死者甚衆金尼瑪哈使烏陵思謀即驛見倫語及契丹時事倫曰海上之盟兩國約為兄弟萬世無變雲中之役我實饋師贊厥成功上國之臣嘗欲稱兵南來先大聖惠顧盟好不許厥後舉兵以禍吾國果先大聖意乎况亘古自分南北盍思久逺之謀歸我二帝太母復我土疆使南北赤子無致塗炭亦足以慰先大聖之靈思謀沉思曰君言是也歸當盡達之已而尼瑪哈至曰比使來問其意指多不能對思謀傳侍郎語欲議和决非江南情實特侍郎自為此言耳倫曰使事有指不然來何為哉人定者勝天天定亦能勝人惟元帥察之尼瑪哈不答及是尼瑪哈忽至館中與倫議和縱之歸報倫至入對言金人情偽甚悉帝優奬之時方議討劉豫和議中格久之復以潘致堯為通問使如金附茶藥金幣進兩宮三年十二月韓肖胄偕金使來帝自即位屢遣使如金多見拘留而金未嘗遣一介報聘至是尼瑪哈使李永壽王翊來請還劉豫之俘及西北士民之在南者且欲畫江以益劉豫與秦檜前議脗合識者益知檜與金人共謀矣殿中侍御史常同言先振國威則和戰常在我若一意議和則和戰常在彼靖康以來分為兩事可以鑒戒帝因語及武備曰今養兵已二十萬有竒同曰未聞二十萬兵而畏人者也帝不聽復遣樞宻都承㫖章誼為金國通問使請還兩宮及河南地五年夏四月甲子上皇崩于金五國城遺言欲歸葬内地金主亶不許時兵部侍郎司馬朴與奉使朱弁在燕山聞之共議制服弁欲先請朴曰為臣子聞君父之喪當致其哀尚何請設請而不許柰何遂服斬衰朝夕哭金人義之而不責洪皓在冷山聞之北向泣血遣同使沈珍往燕山建道塲於開泰寺作功德疏詞㫖悲痛金人亦不之罪五月辛巳遣忠訓郎何蘚使金罷中書舍人胡寅寅上疏言女真驚動陵寢戕毁宗廟刼質二帝塗炭生民乃陛下之大讐也自建炎丁未至紹興甲寅卑辭厚禮以問安迎請為名而遣使者不知幾人矣知二帝所在見二帝之面得女真之要領因講和而能息兵者誰歟但見通和之使歸未息肩而黃河長淮大江相繼失險矣夫女真知中國所重在二帝所恨在刼質所畏在用兵則常示欲和之端增吾所重平吾所恨匿吾所畏而中國坐受此餌既久而後悟也天下其謂自是改圖矣何為復出此謬計耶茍曰姑為是豈有修書稱臣厚費金帛而成就一姑息之事耶茍曰以二帝之故不得不然則前效可考矣况嵗月益久敵情益閟必無可通之理也適觀何蘚之事恐和議復行國論傾危士氣沮喪所繫不細疏入詔褒諭之㑹張浚奏言使事兵家機權後將闢地復土終歸於和未可遽絶乃遣蘚行寅因乞外知邵州六年八月丁未以秦檜為建康行營留守參决尚書省樞宻院事檜自被斥㑹與金議和稍復其官知溫州紹興府又以張浚薦授醴泉觀使兼侍讀至是漸用事七年春正月丁亥何蘚還自金始知道君皇帝及寧德皇后鄭氏相繼崩帝成服百官七上表請遵以日易月之制知嚴州胡寅上疏請服喪三年衣墨臨戎以化天下帝欲遂終服張浚言天子之孝不與士庶同必思所以奉宗廟社稷今梓宮未返天下塗炭願陛下揮淚而起歛髪而趨一怒以安天下之民帝乃命浚草詔吿諭羣臣外朝勉從所請宮中仍行三年之喪命諸大將率三軍發哀成服俾中外感動從之是月以秦檜為樞宻使三月己卯遥尊宣和皇后韋氏為皇太后帝嘗謂輔臣曰宣和皇后春秋髙朕朝夕思之不遑寧處屈己講和正為此耳至是從翰林學士朱震之請遥尊為皇太后十二月癸未王倫還自金初倫再使將還金人新廢劉豫達蘭送倫曰好報江南自今道途無壅和議可成倫至入對言金人許還梓宮及太后且許歸河南地帝喜曰若金人能從朕所求其餘一切非所較也丁亥復遣奉迎梓宮于金八年三月壬辰復以秦檜為尚書右僕射同平章事兼樞宻使初張浚嘗與趙鼎論人才浚極稱檜善鼎曰此人得志吾輩無所措足矣及鼎再相檜在樞宻一惟鼎言是從鼎由是深信之言檜可大任於帝而不知為檜所賣也檜既相制下朝士相賀獨吏部侍郎晏敦復有憂色曰姦人相矣聞者皆以其言為過五月丁未王倫偕金使來初倫至㑹寧見金主首謝廢劉豫次致使指㑹達蘭自河南還言于金主請以廢齊舊地與宋金主命羣臣議鄂特本力言不可東京留守鄂勒歡曰我以地與宋宋必德我阿喇勒曰我俘宋人父兄怨非一日若復資以土地是助讐也何德之有勿與便富勒呼位在鄂特本上達蘭鄂勒歡附之由是富勒呼執議以河南陜西地與宋遂遣倫及其太原少尹烏凌阿思謀太常少卿石慶來議事將至帝命吏部侍郎魏矼館伴之矼以為御史時嘗言和議之非不可奉詔因備論敵情之不可信秦檜曰公以智料敵檜以誠待敵矼曰第恐敵不以誠待相公耳檜乃改命吳表臣思謀等至臨安入見帝謂輔臣曰先帝梓宮果有還期雖待二三年尚庶幾惟是太后春秋髙朕旦夕思念欲早相見此所以不憚屈己冀和議之速成也朝臣多言其不可帝怒趙鼎曰陛下於金人有不共戴天之讐今屈己請和不憚為之者以梓宮及母后耳羣臣憤懣之詞出於愛君不可以為罪陛下宜諭之曰講和非吾意以親故不得已為之但得梓宮及母后還敵雖渝盟吾無憾帝從其言衆議遂息烏凌阿思謀等稱朱弁忠節詔附黃金三十兩賜之秋七月乙酉秦檜復請遣王倫如金定和議及申問諱日左正言辛次膺言宣和海上之約靖康城下之盟口血未乾兵隨其後今日之事當識其詐國耻未雪義難講好凡七上疏力陳不報冬十月丁巳罷㕘知政事劉大中大中與趙鼎不主和議秦檜忌之薦蕭振為侍御史振入臺即劾大中罷之鼎曰振意不在大中也振亦曰趙丞相不待論當自為去就矣甲戌趙鼎罷帝意不樂鼎給事中勾濤因詆鼎結臺諫及諸將帝聞益疑鼎乃引疾求罷遂出知紹興府入辭言于帝曰臣去後必有以孝弟之説脅制陛下者將行秦檜率執政餞之鼎不為禮一揖而去檜益憾之以勾龍如淵為御史中丞先是宰執入見秦檜獨留身言臣僚畏首畏尾多持兩端此不足與論大事若陛下决欲講和乞專與臣議勿許羣臣預帝曰朕獨委卿檜曰臣恐未便望陛下更思三日檜復留身奏事帝意欲和甚堅檜猶以為未也復進前説又三日檜復留身奏事如初知帝意不移乃始出文字乞决和議然猶以羣臣為患中書舍人勾龍如淵為檜謀曰相公為天下大計而邪説橫起盍不擇人為臺諫使盡擊去則事定矣檜大喜即擢如淵為中丞劾異議者卒成檜志丁丑金以張通古蕭哲為江南詔諭使與王倫偕來通古至泗州要所過州郡迎以臣禮知平江府向子諲不肯拜且上言和議之非遂乞致仕十一月戊戌王倫入見辛丑詔曰金國遣使入境欲朕屈己就和命侍從臺諫詳思條奏於是直學士院曾開當草國書辨視體制非是論之不聽遂請罷改兼侍講秦檜以溫言慰之曰主上虛執政以待開曰儒者所争在義茍為非義髙爵厚祿弗顧也願聞所以事敵之禮檜曰若髙麗之於本朝耳開曰主上以盛德登大位公當強兵富國尊主庇民柰何自卑辱至此非開所聞也復引古誼折之檜大怒曰侍郎知故事檜獨不知也開又詣都堂問計果安出檜曰聖意已定又何言公自取大名而去如檜但欲濟國事耳開乃與從官張燾晏敦復魏矼李彌遜尹焞梁汝嘉樓炤蘇符薛徽言御史方廷實館職胡珵朱松張擴凌景夏常明范如圭馮時中趙雍皆極言不可和吏部員外郎許忻上疏曰金人始南侵也固嘗云講和矣靖康之初約肅王至大河而返已而挾之北行河朔千里焚掠無遺及再舉深入遂䧟都城懼我百萬之衆必以死争也止我諸道勤王之師則又曰講和矣乃邀二聖出郊追取宗族係纍大臣然後偽立張邦昌而去則是金人所謂講和者果可信乎此已然之禍陛下所親見今徒以王倫繆悠之説遂誘致金人責我以必不可行之禮而陛下遂已屈己從之夫彼以詔諭江南而來是飛尺書而下本朝豈講和之謂哉我躬受之真為臣妾矣陛下方寢苫枕塊其忍下穹廬之拜乎臣竊料陛下必不忍為也萬一奉其詔令則將變置吾之大臣分部吾之諸將邀求無厭靡有窮極當此之時陛下欲從之則無以立國不從之則復責我以違令其何以自處乎况旃裘之衆驚動我陵寢戕毁我宗廟刼質我二帝據守我祖宗之地塗炭我祖宗之民而又徽宗皇帝顯肅皇后鑾輿不反遂致萬國痛心是謂不共戴天之讐彼謂我之必復此讐也未嘗頃刻而忘圖我豈一王倫能平哉陛下包羞忍耻受其詔諭而彼之許我者不復如約則徒受莫大之辱貽萬世之譏縱使如約則是我今日所有土地先拱手而奉讐敵矣豈不痛哉自金使入境以來中外惶惑陛下必以王倫之言為不妄金人之詔為可從臣恐不惟墮敵人之奸計而意外之虞將有不可勝言者此衆所共曉陛下亦嘗慮及於此乎國家今雖未能克復中原而大江之南亦足支吾軍聲粗振國勢粗定故金人因王倫之往復遣使來嘗試朝廷其謀叵測今金使雖已就館謂當别議區處之宜更與二三大臣熟議其便無遺後時之悔不報甲辰王庶罷庶論金不可和者七見帝言者六秦檜方挾自重以為功絀其説庶語檜曰公不思東都抗節存趙時而忘此敵耶檜大恨出庶知潭州辛亥樞宻院編修胡銓抗疏言曰臣謹按王倫本一狎邪小人市井無賴頃縁宰臣無識舉以使金專務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致金使以詔諭江南為名是欲劉豫我也劉豫臣事北庭南面稱王自以為子孫帝王萬世不拔之業一旦金人改慮捽而縳之父子為俘商鑑不逺而倫又欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為金人之天下以祖宗之位為金藩臣之位陛下一屈膝則祖宗廟社之靈盡汙草莽祖宗數百年之赤子盡為降卒朝廷宰執盡為陪臣天下士大夫皆當裂冠毁冕變為異服異時敵人無厭之求安知不加我以無禮如劉豫也哉今倫之議乃曰我一屈膝則梓宫可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此説㗖陛下哉然而卒無一驗則敵之情偽已可知矣而陛下尚不覺悟竭民膏血而不恤忘國大仇而不報含垢忍耻舉天下而臣之甘心焉就令敵决可和盡如倫議天下後世謂陛下何如主况金人變詐百出而倫又以奸邪濟之梓宫决不可還太后决不可復淵聖决不可歸中原决不可得而此膝一屈不可復伸國勢陵夷不可復振可為痛哭流涕長太息矣向者陛下間闗海道危如累卵當時尚不忍北面臣之况今國勢稍張諸將盡鋭士卒思奮只如頃者敵人陸梁偽豫入冦固常敗之於襄陽敗之於淮上敗之於渦口敗之於淮隂校之往時蹈海之危固已萬萬儻不得已而至於用兵則我豈遽出敵人下哉今無故而反臣之欲屈萬乗之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虛名惜天下大勢有所不可也今内而百官外而軍民萬口一談皆欲食倫之肉謗議洶􅍅陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之陛下有堯舜之資檜不能致君如唐虞而欲導陛下為石普近者禮部侍郎曾開等引古誼以折之檜乃厲聲責曰侍郎知故事我獨不知則檜之遂非愎諫己自可見而乃建白令臺諫侍臣僉議可否是葢畏天下議已而令臺諫侍臣共分謗耳有識之士皆以為朝廷無人吁可惜哉孔子曰微管仲吾其被髮左衽矣夫管仲伯者之佐耳尚能變左衽之區而為衣裳之㑹秦檜大國之相也反棄復仇之舉而為求成之謀則檜也不唯陛下之罪人實管仲之罪人矣孫近傅㑹檜議遂得㕘知政事天下望治有如饑渴而近伴食中書漫不敢可否事檜曰金可和近亦曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不荅但曰已令臺諫侍從議矣嗚呼㕘贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮耶臣竊謂秦檜孫近亦可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之藁街然後羈留金使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死爾寧能處小朝廷求活耶書既上檜以銓狂妄凶悖鼔衆刼持詔除名編管昭州仍降詔播吿中外給舍臺諫及朝臣多救之者檜迫於公論乃以銓監廣州鹽倉明年改簽書威武軍判官十二年諫官羅汝楫劾銓飾非橫議詔除名編管新州銓之初上書也宜興進士吳師古鋟木傳之金人募其書千金其謫廣州也朝士陳剛中以啟事為賀其謫新州也同郡王廷珪以詩贈行皆為人所訐師古流袁州廷珪流辰州剛中謫知䖍州安遠縣遂死焉晏敦復謂人曰頃言檜奸諸君不以為然今方專國便敢爾他日何所不至耶十二月己未以李光㕘知政事秦檜既定和議將揭榜以吏部尚書李光有人望欲藉之同押榜以息浮議乃請于帝而用之光既受命遂於尚書省榜諭金國使來盡割河南陜西故地通好於我許還梓宮及母兄親族餘無需索時檜以未見國書疑封冊白帝帝曰朕嗣守祖宗基業豈受金人封冊於是楊沂中解潛韓世良見檜曰朝議籍籍軍民洶洶若之何退又白之臺諫中丞勾龍如淵謂檜曰但取金書納之禁中則禮不行而事定給事中樓炤亦舉諒隂三年事以告檜遂以檜攝冡宰詣館受書而王倫亦以計説張通古通古從之檜至館見通古受其書通古欲百官備禮檜使省吏朝服導從以書納于禁中丙子張通古入見言先歸河南陜西地徐議餘事權禮部侍郎尹焞上疏曰本朝金人之禍亘古未聞中國無人致其猾亂昨者城下之盟詭詐百出二帝北狩皇族播遷宗社之危已絶而續陛下即位已來十有二年雖中原未復讐敵未殄然而賴祖宗德澤之厚陛下勤苦之至億兆之心無有離異前年徽宗皇帝寧德皇后崩問遽來莫究不豫之狀天下之人痛心疾首而陛下方且屈意降志以奉迎梓宮請問諱日為事今又為此議則人心日去祖宗積累之業陛下十二年勤撫之功當决於此矣不識陛下亦嘗深謀而熟慮乎抑在廷之臣不以告也禮曰父母之讐不共戴天兄弟之讐不反兵今陛下信讐敵之譎詐而覬其肯和以紓目前之急豈不失不共戴天不反兵之義乎或以金國内亂懼我襲已故為甘言以緩王師儻或果然尤當鼔士卒之心雪社稷之耻尚何和之足為不報李綱時知洪州上疏曰臣竊見朝廷使金國奉迎梓宮今倫之歸與金使偕來乃以詔諭江南為名不著國號而曰江南不云通問而曰詔諭此何禮也臣請試為陛下言之金人毁宗社逼二聖而陛下應天順人光復舊業自我視彼則仇讐也自彼視我則腹心之疾也豈復有可和之理然而朝廷遣使通問冠葢相望于道卑辭厚禮無所愛惜者以二聖在其域中為親屈己不得已而然猶有説也至去年春兩宮凶問既至遣使以迎梓宮承往遄返初不得其要領今倫使事初以奉迎梓宮為指而金使之來乃以詔諭江南為名循名責實己自乖戾則其所以罔朝廷而生後患者不待詰而可知臣在逺方雖不足以知曲折然以愚意料之金以此名遣使其邀求大畧有五必降詔書欲陛下屈體降禮以聽受一也必有赦文與朝廷宣布頒示郡縣二也必立約束欲陛下奉藩稱臣禀其號令三也必求嵗賂廣其數目使我坐困四也必求割地以江為界淮南荆襄四川盡欲得之五也此五者朝廷從其一則大亊去矣金人變詐不測貪婪無厭縱使聽其詔令奉藩稱臣其志猶未已也必繼有號令或使親迎梓宮或使單車入覲或使移易將相或改革政事或竭取租賦或朘削土宇從之則無有紀極一不從則前功盡廢反為兵端以為權時之宜聽其邀求可以無後悔者非愚則誣也使國家之勢單弱果不足以自振不得已而為此固猶不可况土宇之廣猶半天下臣民之心戴宋不忘與有識者謀之尚足以有為豈可忘祖宗之業生靈之屬望弗慮弗圖遽自屈服冀延旦暮之命哉臣願陛下特留聖意且勿輕許深詔羣臣講明利害可以久長之策擇其善而從之帝不納先是倫使金從趙鼎受使指鼎言問禮數則荅以君臣之分已定問地界則荅以大河為界二事使者之大指或不從則已倫受命而行至是倫還有詔諭江南之名帝嘆息曰使五日前得此報趙鼎豈可去耶初檜主和議命韓世忠移屯鎮江世忠言金人詭詐恐以計緩我師乞留此軍遮蔽江淮因力論和議之非願效死節率先迎敵若不勝從之未晚章數上皆慷慨激切且請單騎詣闕面陳帝不許及張通古來以詔諭為名世忠四上疏言不可從願舉兵决戰兵勢最重處臣請當之且言金人欲以劉豫相待舉國士大夫盡為陪臣恐人心離散士氣凋沮不報及通古還世忠伏兵洪澤鎮將邀殺之以壞和議不克而罷時劉豫既廢傳言金人欲立淵聖于南京以和定而止九年春正月丙戌以金人通和大赦河南新復州軍直學士院樓炤草赦文畧曰上穹開悔禍之期大金報許和之約割河南之境土歸我輿圖戢宇内之干戈用全民命張浚在永州上疏言燕雲之舉其鑒不逺金自宣和以來挾詐反覆傾我國家葢非可結以恩信者借令敵中有故上下紛雜天屬盡歸河南遂復我必德其厚賜謹守信誓數年之後人情益懈士氣漸消彼或内變既平指瑕造釁肆無厭之欲發難從之請其將何辭以對顧事理可憂又有甚于此者陛下積意兵政將士漸孚一旦北面事之聽其號令小大將帥孰不解體葢自堯舜以來人主奄有天下非兵無以立國未聞委質可以削平禍難者也前後凡五上疏皆不報戊子遣判大宗正事士㒟兵部侍郎張燾詣河南修奉陵寢從史館校勘范如圭之請也戊戌賜王倫同進士出身端明殿學士僉書樞宻院事既又以倫為東京留守與金人交割地界二月癸丑以周聿為陜西宣諭使方庭實為三京宣諭使庭實至西京見先朝陵寢自永昌而下皆遇發掘而泰陵至暴露歸以白帝秦檜怒之三月丙申王倫至汴見金烏珠交割地界得東西南三京壽春府宿亳曹單州及陜西京西諸州之地烏珠遂自祁州渡河而去移行臺于大名府五月士㒟張燾自河南還燾上疏曰金人之禍上及山陵雖殄滅之未足以雪此耻復此讐也必不可恃和盟而忘復讐之大事帝問諸陵寢何如燾不對惟言萬世不可忘此敵帝黙然秦檜惡之出燾知成都府時金人厚有所邀議久不决將再遣使權刑部侍郎陳櫜上言金毎挾講和以售其姦謀論者因其廢劉豫又還河南地謂其有意於和臣以為不然且金之立豫葢欲自為捍蔽使之南窺豫毎犯順卒皆敗北金知不足恃從而廢之豈為我哉河南之地欲付之他人則必以豫為戒故捐以歸我往嵗金書嘗謂嵗幣多寡聽裁曾未淹嵗反覆如此且割地通和則彼此各守封疆可也而同州之橋至今存焉葢金非可以義交而信結恐其假和好之説騁繆悠之詞包藏禍心變出不測願深鑒前轍益嚴戰守之備使人人激厲常若冦至茍彼通和則吾之振飭武備不害為立國之常如其不然决意恢復之圖勿循私曲之説天意允協人心響應一舉以成大勲則梓宮太后可還祖宗境土可復矣秦檜憾之罷櫜官丁亥王倫如金議事烏珠時言于金主曰達蘭富勒呼主割河南地與宋必有隂謀今宋使在汴勿令踰境倫聞之即遣介具言于朝㑹孟庾至汴倫即解留鑰將使指赴金國議事行至中山㑹達蘭等謀反金人執之富勒呼鄂勒歡皆誅倫見金主于御子林致使指金主不荅而令翰林待制耶律紹文為宣勘官問倫知達蘭罪否倫對不知又問無一言及嵗幣反求割地汝但知有元帥豈知有上國耶倫曰比蕭哲以國書許歸梓宮太母及河南地天下皆知上國尋海上之盟與民休息使人奉使通好兩國耳紹文復曰卿留雲中已無還期及貸之還曾無以報反間貳我君臣耶乃遣副使藍公佐還議嵗貢正朔誓命等事及索河東北士民之在南者而徙倫拘于河間以待報命之至時皇后邢氏崩金人秘之十二月李光罷光初謂可因和為自治之計故署榜不辭及秦檜議撤淮南守備奪諸將兵權光始極言金人有欵我心和不可恃備不可撤檜惡之光復折檜于帝前曰觀檜之意是欲壅蔽陛下耳目盗弄國權懷姦誤國不可不察檜大怒光遂求去十年春正月丙戌遣工部侍郎莫將等使金充迎䕶梓宮奉迎兩宮使五月己夘金烏珠薩里罕分道南侵烏珠以歸河南陜西地為非計而張通古又言宋置戍河南請及其部置未定當議收復鄂特本然之及誅達蘭遂大閲國中兵於祁州命烏珠自黎陽趨河南薩里罕出河中趨陜西烏珠率孔彦舟等入汴遣烏禄取歸德李成取河南分兵下諸郡於是東京留守路允迪等皆以城降西京留守李利用棄城走河南州縣皆降薩里罕入同州趨永興軍權知軍事郝逺開門納之陜西州郡所至迎降遂進據鳯翔秦檜聞金人叛盟以其言不讐甚懼謂給事中馮檝曰金人背盟我之去就未可卜前此大臣皆不足慮獨君鄉衮未測上意君其為我探之檝入見曰金人長驅犯順勢必興師如張浚者且須以戎機付之帝正色曰寧至覆國不用此人檜聞之意遂安秋七月丙午以王次翁㕘知政事秦檜薦次翁為中丞故凡可以為檜地者無不力為之及金人敗盟帝下詔罪狀烏珠次翁懼檜得罪因奏曰前日國是初無主議事有小變更用他相後來者未必賢而排黜異黨紛紛屢月不能定願陛下以為至戒帝深然之檜德其言遂引與同列由是檜益安據其位公論不能揺奪矣八月貶秘閣修撰張九成等官九成等皆言和議非計秦檜惡之乃貶九成知邵州喻樗知懷寧縣陳剛中知安逺縣凌景夏知辰州樊光逺閬州學教授毛叔度嘉州司戸㕘軍九月罷諸大帥軍俱還鎮十一年三月金烏珠渡淮北去時秦檜力主和議恐諸將難制欲盡收其兵權給事中范同獻計于檜請除韓世忠張俊岳飛樞府則兵柄自解檜喜宻奏召三大將赴行在論功行賞於是世忠俊皆入朝飛亦後至遂拜世忠俊樞宻使飛為副使並宣押至樞府治事俊知檜欲罷兵首請以所部𨽻御前且力贊和議檜大喜遂罷三宣撫司以其兵𨽻御前遇出師取㫖九月莫將還自金烏珠欲議和莫將久留于金乃縱之歸以道意秦檜遂奏遣劉光逺為通問使冬十月壬午以魏良臣為金國稟議使時烏珠遣劉光逺還欲得官尊望著者為使秦檜乃奏遣良臣十一月辛丑金烏珠以蕭毅邢具瞻為審議使與魏良臣偕來壬子蕭毅等入見議以淮水為界求割唐鄧二州及陜西餘地嵗幣銀絹各二十五萬仍許歸梓宮太后帝悉從其請定議和盟誓乙夘以何鑄僉書樞宻院事充金國報謝進誓表使庚申命宰執及議誓官告􅀕天地社稷何鑄奉誓表往表畧曰臣構言今來畫疆以淮水中流為界西有唐鄧州割屬上國自鄧州西四十里併南四十里為界屬鄧四十里外併西南盡屬光化軍為敝邑沿邊州城既蒙恩造許備藩方世世子孫謹守臣節毎年皇帝生辰并正旦遣使稱賀不絶嵗貢銀絹二十五萬兩匹自壬戌年為首毎春季搬送至泗州交納有渝此盟明神是殛墜命亡氏踣其國家臣今既進誓表伏望上國早降誓詔庶使敝邑永為慿焉毅辭帝諭曰若今嵗太后果還自當謹守誓約如今嵗未也則誓文為虛設十二月乙亥何鑄至汴見烏珠遂如㑹寧見金主且趣割地尋復遣使來求商州及和尚方山二原遂命周聿鄭剛中等分畫京西唐鄧二州陜西商秦之半以畀金止存上津豐陽天水三縣及隴西成紀餘地棄和尚方山二原以大散闗為界於是宋僅有兩浙兩淮江東西湖南北西蜀福建廣東西十五路而京西南路止有襄陽一府陜西路止有階成和鳯四州凡有府州軍監一百八十五縣七百三金既畫界建五京置十四總管府凡十九路其間散府九節鎮三十六守禦郡二十二刺史郡七十三軍十有六縣六百三十二初邵隆在商州十年披荆榛瓦礫以為治招徠流散屢敗金人值和議成割商與金隆甚怏怏徙知金州嘗以兵出敵境秦檜恨之徙知敘州檜隂使人酖殺之十二年二月癸巳何鑄還自金初蕭毅至臨安帝曰朕有天下而養不及親徽宗無及矣今立信誓明言歸我太后朕不耻和不然朕不憚用兵及何鑄曹勛往召至内殿諭之曰朕北望庭闈無淚可揮卿見金主當曰慈親之在上國一老人耳在本國則所繫甚重以至誠説之庶彼有感鑄至金首以太后為請金主曰先朝業已如此豈可輒改曹勛再三懇請金主乃許之遂遣鑄還許歸徽宗及鄭后邢后之喪與帝母韋氏夏四月金遣左宣徽使劉筈以衮冕圭冊冊帝為大宋皇帝秋七月壬午皇太后韋氏至自金后有智慮初聞金人許還三梓宮后恐其反覆呼役者畢集然後起攢宮時方暑金人憚行后慮有他變乃陽稱疾須秋涼進發已而稱貸於金使得黃金三千兩以犒其衆由是途中無虞后將南旋淵聖卧車前泣曰歸語九哥與丞相我得太乙宮使足矣他不敢望也后許之且與誓而别及歸帝至臨平奉迎見后喜極而泣后至臨安入居慈寧宮始知朝議遂不敢述淵聖車前之語己丑帝易緦服奉迎徽宗及顯肅懿節二后梓宮奉安于龍德别宮九月乙巳以和好成加秦檜太師封魏國公先三年通和赦河南新復州軍烏珠讀赦文謂不歸德其國遂指為釁以起兵至是檜懼當制者不能悦金遂屬其黨程克俊為文曰上穹悔禍副生靈願治之心大國行仁遂子道事親之孝可謂非常之盛事敢忘莫報之深恩而况申遣使軺許敦盟好來存殁者萬餘里慰契濶者十六年禮備送終天啓固陵之吉壤志伸就養日承長樂之慈顔於是郵傳至四方遺黎讀之有泣下者甲寅遣使如金沈昭逺賀生辰楊愿賀正旦賀禮俱用金茶器千兩銀酒器萬兩錦綺千匹金循契丹例不欲兩接使人故併遣使嵗如之冬十月以皇太后回鑾進封秦檜為秦魏兩國公檜以封兩國與蔡京同辭不拜十三年秋七月行人洪皓張邵朱弁還自金自建炎以來奉使如金被拘囚者三十餘人多已物故惟三人以和議成許歸已而金人遣七騎追之及淮而皓等已在舟中矣皓居冷山去㑹寧二百里地苦寒穴居百餘家陳王烏舎聚落也烏舎敬皓使教其子或二年不給衣食盛夏衣粗布常大雪薪盡以馬矢然火煨麫食之或獻取蜀策烏舎持以問皓皓力折之悟室鋭意南侵曰孰謂海大我力可乾但不能使天地相拍耳皓曰兵猶火也弗戢將自焚自古無四十年用兵不止者又數為言所以來為兩國事既不受使乃今深入教小兒非古者待使臣之禮也烏舎怒曰汝作和事官而口硬如此謂不能殺汝耶皓曰自分當死顧大國無受殺行人之名願投之於水以墜淵為辭可也烏舎義之而止皓屢因諜者宻奏敵情且力言和議非計乞興師進擊嘗求韋太后書遣李微持歸帝大喜曰朕不知太后寧否幾二十年雖遣使百輩不如此一書毎遇貴族名家子流落於金者盡力拯救之留金十五年而還入對内殿求郡養母帝曰卿忠貫日月志不忘君雖蘇武不能過豈可捨朕去耶皓退見秦檜語連日不止曰張和公金人所憚乃不得用錢塘暫居為景靈宫太廟皆極土木之華豈非示無中原意乎檜不懌遂除徽猷閣直學士提舉萬壽觀復以論事忤檜出知饒州邵初被囚柞山踰年送劉豫使用之邵見豫長揖而已又呼豫為殿院責以君臣大義詞氣俱厲豫怒械于獄久之復送于金拘之燕山僧寺從者皆莫知所在邵又以書言于金曰劉豫挾大國之勢日夜南侵不勝則首鼠兩端勝則如養鷹飽則颺去終非大國之利金人徙之㑹寧及還入見除秘書修撰主管佑神觀司諫詹大方論其使事無成改台州崇道觀弁初副王倫使金既就館守之以兵久之金將議和當遣一人受書還報欲弁與倫探䇿決去留弁曰吾來固自分必死豈應今日覬幸先歸願正使受書歸報天子成兩國之好蚤申四海之養于兩宮則吾雖暴骨外國猶生之年也倫將歸弁謂曰古之使者有節以為信今無節有印印亦信也願留之使弁得抱以死死不腐矣倫解以授弁弁受而懷之卧起與俱金人迫弁仕豫且訹之復欲易其官弁皆誓不為屈語在四年九月又以書訣洪皓曰金殺行人非細事吾曹遭之命也要當舍生以全義耳乃具酒召被掠士夫飲半酣語之曰已得近郊某寺地一旦畢命報國諸公幸瘞我其處題其上曰有宋通問副使朱公之墓於我幸矣衆皆泣下莫能仰視弁談笑自若曰此臣子之常諸君何悲也及尼瑪哈死弁宻疏金國虛實曰此不可失之時也遣李發間行歸報王倫還以弁奉送徽宗大行之文為獻其辭有曰歎馬角之未生魂消雪窖扳龍髯而莫逮涙洒氷天帝讀之感泣官其親屬五人謂丞相張浚曰弁歸日當以禁林處之及還入見便殿弁謝且曰人之所難得者時而時之運無已事之不可失者幾而幾之藏無形惟無已也故來遲而難遇惟無形也故動微而難見陛下與金人講和上返梓宮次迎太母又其次則憐赤子之無辜此皆知幾之明然時運而往或難固執幾動有變宜鑑未兆盟可守而詭詐之心宜嘿以待之兵可息而銷弭之術宜詳以講之金人以黷武為至德以茍安為太平虐民而不恤民廣地而不廣德此皆天助中興之勢若時與幾陛下既知於始願圖厥終帝曰善納其言賜賚甚厚秦檜惡其言敵情奏以初補官易宣教郎直秘閣而卒十二月金遣完顔曄等來賀明年正旦以金酒器六事綾羅紗縠三百端馬六匹為禮自是嵗如之十四年秋七月王倫為金所殺金拘倫河間六載欲授以平灤三路都轉運使倫曰奉命而來非降也金人益脅以威倫自縊死後數年宇文虛中亦以反誅朱熹戌午讜議序曰君臣父子之大倫天之經地之義所謂民􅃔也故臣之於君子之於父生則敬養之没則哀送之所以致其忠孝之誠者無所不用其極而非虛加之也以為不如是則無以盡乎吾心云爾然則其有君父不幸而罹於橫逆之故則夫為臣子者所以痛憤怨疾而求為之必報其讐者其志豈有窮哉故記禮者曰君父之讐不與共戴天寢苫枕塊不與共天下也而為之説者曰復讐者可盡五世則又以明夫雖不當其臣子之身而茍未及五世之外則猶在乎必報之域也雖然此特庶民之事耳若夫有天下者承累世無疆之統則亦有萬世必報之讐非若庶民五世則自髙祖以至𤣥孫親盡服窮而遂已也國家靖康之禍二帝北狩而不還臣子之所痛憤怨疾雖萬世而必報其讐者葢有在矣紹興之初賢才並用綱紀復張諸將之兵屢以㨗吿恢復之勢葢已十八九成矣敵人於是始露和親之議以沮吾計而宰相秦檜歸自金庭力主其事當此之時人倫尚明人心尚正天下之人無賢愚無貴賤交口合辭以為不可獨士大夫之頑鈍嗜利無耻者數輩起而和之清議不容詬詈唾斥欲食其肉而寢處其皮則其於檜可知矣而檜乃獨以梓宮長樂藉口攘却衆謀熒惑主聽然後所謂和議者翕然以定而不可破自是以來二十餘年國家忘讐敵之慮而偷宴安之樂檜亦因是藉外權以專寵利竊主柄以遂姦謀而向者冒犯清議希意迎合之人無不夤緣驟至通顯或乃踵檜用事而君臣父子之大倫天之經地之義所謂民彛者不復聞於縉紳之間矣士大夫狃於積衰之俗徒見當時國家無事而檜與其徒皆享成功無後患顧以忘讐忍辱為事理之當然主議者慕為檜遊談者慕其徒一雄唱之百雌和之癸未之議發言盈廷其曰金世讐不可和者尚書張公闡左史胡公銓而止耳自餘葢亦有謂不可和者而其所以為説不出乎利害之間又其餘則雖平時號為賢士大夫慨然有六千里為讐人役之嘆者一日進而立乎廟堂之上顧乃惘然如醉如幻而忘其疇昔之言厥或告之則曰此處士之大言耳嗚呼秦檜之罪所以上通於天萬死而不足以贖者正以其始則倡邪謀以誤國終則挾敵勢以要君使人倫不明人心不正而末流之弊遺君後親至於如此之極也二十五年冬十月丙申秦檜死檜自和議之成擅國柄者十五年偷安江左專為粉飾太平計勸帝立太學耕籍田修舉彌文殆無虛日帝之視學也命其子禮部侍郎熺執經司業髙門講易泰卦知度州薛弼承檜意言州民朽柱中有文曰天下太平年檜大喜乞宣付史館自是四方祥瑞之奏日上舉朝晏然不復知有兵事矣殿前軍士施全候檜入朝挾刃刺之于道不中捕送大理獄檜親鞫之全對曰舉天下皆欲攻金人汝獨不肯故我欲殺汝也遂磔全于市檜懼毎出列五十兵持長梃以自衛晚年尤銜恨舊臣不已書趙鼎李光胡銓三人姓名於一德格天閣必欲殺之鼎時安置吉陽軍檜令本軍月具存亡申省鼎遣人語其子汾曰秦檜必欲殺我我死汝曹無患不爾禍及一家矣因不食而死檜憾未釋也江西運判張常先箋注前帥張宗元與張浚詩言于朝其詞連逮者數十家將誣以不􅁤而盡去之㑹汪召錫吿宗室知泉州令袊觀檜家廟記口誦君子之澤五世而斬謫居汀州至是檜乃諷殿中侍御史徐嚞論趙汾與令袊飲别厚贐必有姦謀詔送汾令袊大理鞫問使汾自誣與張浚李光胡寅胡銓等五十三人謀大逆獄成而檜病不能書矣帝幸檜第問其疾檜惟流涕無一語子熺奏請代居相位帝曰此事卿不當預遂命直學士院沈虛中草檜父子致仕制命下而檜死檜兩據相位倡和誤國忘讐斁倫包藏禍心刼制君父隂納内侍及醫師王繼先伺上微㫖動静必具知之郡國事惟申省無至上前者性隂險深阻如崖穽不可測同列論事上前未嘗力辨但以一二語傾擠之俾帝自怒一時忠臣良將誅鋤畧盡其頑鈍無耻者率為檜用事以誣陷善類為功凡無罪可狀者則曰立黨沽名曰訕謗曰指斥曰怨望甚則曰有無君心凡論人章疏皆檜自操以授言官識之者曰此老秦筆也自知惡極為衆論所嫉置邏卒布滿京城聞有議之者即捕治中以深文道路以目開門受賂富敵于國外國珍寶死猶及門檜毎事與帝争勝曹筠言水漲詔逐之檜陞為從官周葵欲言梁汝嘉檜不待帝言即改除之由是張扶請檜乘金根車呂愿中獻秦城王氣詩其勢漸不可制檜既死帝謂楊存中曰朕今日始免靴中置刀矣其畏之如此宋史紀事本末巻十七
