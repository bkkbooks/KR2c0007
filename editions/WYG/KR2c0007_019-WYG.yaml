body:
  text: 宋史紀事本末巻十九明馮𤦺原編陳邦瞻増輯建炎紹興諸政朝臣言事附髙宗建炎二年五月定詩賦經義試士法初元祐中科舉以經義詩賦兼取紹聖以來罷試詩賦至是命參酌元祐科舉條制定試士法中書省請習詩賦舉人不兼經義習經義人止習一經解試省試並計數各取通定髙下殿試仍對䇿三道故事廷試上十名内侍先以巻奏定髙下帝曰取士當務至公豈容以己意升降自今勿先進巻三年夏四月禁内侍干預朝政不得與主兵官交通及饋遺假貸借役禁軍外官非親戚亦不得徃還違者處以軍法重正三省官名自元豐肇建三省凡軍國事中書揆而議之門下審覆之尚書承行之三省皆不置官長以左右僕射兼兩省侍郎二相既分班進呈首相遂不復與朝廷議論元祐初司馬光乃請令三省合班奏事分省治事至是從吕頥浩之言詔左右僕射並同中書門下平章事改中書門下侍郎為參知政事省尚書左右丞三省始合為一六月以乆雨恒隂詔郎官以上言闕政司勲員外郎趙鼎上疏曰自熈寜間王安石用事變祖宗之法而民始病假闢國之謀造生邊患興理財之政窮困民力設虗無之學敗壊人材至崇寜􅀄蔡京托紹述之名盡祖安石之政凡今日之患始於安石成於蔡京今安石猶配享神宗而京之黨未除時政之缺莫大於此帝從之遂罷安石配享尋下詔以四失罪已一曰昧經邦之大畧二曰昧戡難之逺圖三曰無綏人之德四曰失馭臣之柄仍榜朝堂徧諭天下使知朕悔過之意中丞張守上疏曰陛下處宫室之安則思二帝母后穹廬毳幕之居享膳羞之奉則思二帝母后羶肉酪漿之味服細煖之衣則思二帝母后窮邊絶塞之寒操予奪之柄則思二帝母后語言動作受制於人享嬪御之適則思二帝母后誰為使令對臣下之朝則思二帝母后誰為尊禮思之又思兢兢業業聖心不倦而天不為之助順者萬無是理也今罪己之詔數下而天未悔禍實有所未至耳七月廣州教授林勲上本政書十三篇言國朝兵農之政率因唐末之故今農貧而多失職兵驕而不可用是以饑民竄卒類為盜賊宜倣古井田之制使民一夫占田五十畆其有羨田之家毋得市田其無田與游惰末作者皆驅之使為𨽻農以耕田之羡者而雜紐錢糓以為十一之稅米二稅之數視唐増至七倍今本政之制每十六夫為一井提封百里為三千四百井率稅米五萬一千斛錢石二千緡每井賦二兵馬一匹率為兵六千八百人馬三千四百匹歲取五之一以為上畨之額以給征役無事則又分為四畨以直官府以給守衛是民凡三十五年而役使一遍也悉上則歲食米萬九千餘斛錢三千六百餘緡無事則減四分之三皆以一同之租稅供之匹婦之貢絹三尺綿一兩百里之縣歲收絹四千餘疋綿三千四百斤非􅁞鄉則布六尺麻二兩所收視絹綿率倍之行之十年則民之日筭官之酒酤與凡茶鹽香礬之榷皆可弛以予民其説甚備書奏以勲為桂州節度使掌書記其後勲又獻比較書二篇大略謂桂州地東西六百里以古尺記之為方百里之國四十當墾田二百二十五萬二千八百頃有田夫二百四萬八千出米二十四萬八千斛禄卿大夫以下四千人禄兵三十萬人今桂州墾田約萬四十二頃丁二十一萬六千六百一十五稅錢萬五千餘緡苖米五萬二百斛有奇州縣官不滿百員官兵五千一百人蓋土地荒蕪而遊手末作之人衆是以地利多遺財用不足皆本政不修之故當世論者皆韙其言紹興元年九月知潮州汪藻上言本朝實録自艱難以來金匱石室之藏無復存者伏覩列聖自哲宗皇帝而上皆有成書流傳人間頗有真本朝廷已收而藏之御府矣若太上皇帝淵聖皇帝及陛下建炎改元至今三十餘年並無日厯臣竊惟自古無國無史史未嘗一日無書晉謂之乘楚謂之檮杌魯謂之春秋以此見無國無史也春秋以事繫日以日繫月以月繫時以時繫年必四時具謂之編年以此見史未嘗一日無書也漢法太史公位丞相上天下計書先上太史公副上丞相唐及本朝宰相皆兼史官其重如此故書榻前議論之辭則有時政記録柱下見聞之實則有起居注類而次之謂之日厯脩而成之謂之實録所以廣記備言成一代之典也若曠三十年之乆漫無一字之傳將何以示來世乎此其不可不纂述一也韓宣子適魯見易象與春秋曰周禮盡在魯矣吾今乃知周公之德與周之所以王則國家守文者不可無史蕭何入秦先收丞相御史律令圖書藏之沛公具知天下阸塞戸口多少强弱處民所疾苦以何得秦圖書也則國家創業者不可無史今陛下躬受天命雖名中興實兼創業守成之事乃一代典章殘闕如此恐於理未安此其不可不纂述二也恭惟太上皇帝淵聖皇帝縁奸臣誤朝馴至遐狩今若無書紀實恐千載之後徒見一朝陵遲之禍亟不知二聖積累之功深兹事非細羣臣當任其責此其不可不纂述三也自古史官無所不録况三十年之間朝廷之設施豪傑之謀謨政事之興廢人材之進退禮文之因革法度之罷行歲事之豐凶羌戎之服叛有本有末有源有流一法弛而不書則一法熄一事略而不載則一事隳且當時羣臣間有在者以為忠賢耶不著其素行安知其可嘉以為邪佞􅁘不條其宿姦安知其可棄茍因散逸遂廢其書豈孔子史闕文之義哉此其不可不纂述四也公羊傳曰所見異詞所聞異詞所傳聞異詞孔子作春秋於定哀則其事詳於隠莊則其事略聖人猶爾况其他乎中原失守三見閏矣及今耳目所接尚可追求更數年間事將湮沒雖有良史莫知所憑况比年風俗之衰公論不立士大夫取予皆出愛憎因一事為一人而著書行世者多矣若不乘時訂正則數世之後信以傳信疑以傳疑是非混淆白赤顛倒則小人之説行而君子受其誣矣可不懼哉此其不可不纂述五也臣政和中為著作佐郎修太上皇帝日厯東觀凡例臣得預聞今所領州又幸經兵火之餘獨不殘燬視諸故府案牘具存如御筆手詔賞功罰罪之文尚班班可考失今不輯臣實惜之古之有國家者雖在顛沛中史官不廢伏望許臣郡政之餘將本州所有文字截自元符庚辰自建炎己酉三十年間分年編類繕寫進呈以備修日厯官採擇帝從之即以命藻後因綦崇禮言專以其事付史官三年二月召知栁州常同還同首論朋黨之禍自元豐新法之行始分黨與邪正相攻五十餘年章惇倡於紹聖之初蔡京和於崇寧之後元祐臣僚竄逐貶死上下蔽蒙養成邉敵之禍今國歩艱難而分朋締交背公死黨者固自若也恩歸私門不知朝廷之尊重報私怨寧復公議之顧臣以為欲破朋黨先明是非欲明是非先辯邪正則公道開而奸邪息矣上曰朋黨亦難破同對曰朋黨之結葢縁邪正不分君子小人皆有黨而所以為黨則異君子之黨協心濟國小人之黨挾私害公且如元祐臣僚中遭讒謗竄殛流死而後禍亂成今在朝之士猶謂元祐之政不可行元祐子孫不可用上曰聞有此論同對曰禍亂未成元祐臣僚固不能以自明今則是非定矣尚猶如此葢今日士大夫猶宗京黼等傾邪不正之論朋黨如此公論何自而出願陛下始終主張善類勿為小人所惑四年夏四月以范冲直史館重修神宗哲宗實録冲祖禹之子也先是隆祐太后生辰置酒宫中從容謂帝曰宣仁太后之賢古今母后未有其比昔奸臣肆為謗誣雖嘗下詔明辨而國史尚未删定豈足傳信吾意在天之靈不無望於帝也帝悚然至是召冲直史館重修神宗哲宗實録冲乃為神宗考異明示去取舊文以墨書删去者以黄書新修者以朱書世號朱墨史又為哲宗辨誣録由是二史得其正而奸臣情狀益著既又除常同為起居郎中書舍人史館修撰且諭之曰是除以􅀸家世傳聞多得事實故也一日奏事上愀然曰向昭慈嘗言宣仁有保佑大功哲宗自能言之止為宫中有不得志於宣仁者因生誣謗欲辯白其事須重修實録具以保立勞効昭示來世此朕選卿意也同乞以所得聖語宣付史館仍記於實録巻末十一月以金齊兵退詔前宰執議攻戰備禦措置綏懐之方李綱上䟽曰陛下勿以敵退為喜而以仇敵未報為可憤勿以東南為安而以中原未復為可恥勿以諸將屢捷為可賀而以軍政未修士氣未振為可虞議者或以敵馬既退當遂用兵為大舉之計臣竊以生理未固而欲浪戰以僥倖非制勝之術也漢高祖先保闗中故能東向與項籍爭光武先保河内故能降赤眉銅馬之屬唐肅宗保靈武故能破安史而復兩京今朝廷以東南為根本茍不大修守備先為自固之計何以能萬全而制敵議者又謂敵人既退當且保據一隅以茍目前之安臣又以為不然秦師三伐晉以報殽之師諸葛亮佐蜀連年出師以圖中原不如是不足以立國高祖在漢中謂蕭何曰吾亦欲東光武破隗􅅝既平隴復望蜀此皆以天下為度不如是不足以混一區宇戡定禍亂况祖宗境土豈可坐視淪陷不思恢復若今歲不征明年不戰使敵勢益張而吾之所紏合精鋭士馬日以耗散何以圖敵唯宜於防守既固軍政既修之後即議攻討乃為得計其守備之宜則當料理淮甸荆襄以為東南屏蔽夫六朝之所以能保有江左者以强兵巨鎮盡在淮南荆襄間故以魏武之雄苻堅石勒之衆宇文拓跋之盛卒不能窺江表後唐李氏有淮南則可以都金陵其後淮南為世宗所取遂以削弱近年以來大將擁重兵於江南官吏守空城於江北雖有天險而無戰艦水軍之制故敵人得以侵擾窺伺今當於淮之東西及荆襄置三大帥屯重兵以臨之分遣偏師進守支郡加以戰艦水軍上連下接自為防守則藩籬之勢成守備之宜莫大於是然後可議攻戰之利分責諸路大帥因利乘便收復京畿以及故都斷以必為之志而勿失機㑹則以弱為强取威定亂逆臣可誅强敵可滅攻戰之利莫大於是若夫萬乘所居必擇形勝以為駐蹕之所臣昔舉天下形勢而言謂闗中為上今以東南形勢而言則當以建康為便今者舊都未復莫若權於建康駐蹕治城池修宫闕立官府剏營壁使粗成規模以待巡幸此措置之所當先也至於西北之民皆陛下赤子荷祖宗涵養之深其心未嘗忘宋特制於强敵不能自歸天威震驚必有願為内應者宜優加撫循使陷溺之民知所依怙益堅戴宋之心此綏懐之所當先也臣竊觀陛下臨御九年國不闢而日蹙事不立而日壊將驕而難御卒惰而未練國用匱而無贏餘之蓄民力困而無休息之期使陛下憂勤雖至而中興之效邈乎無聞則羣臣誤陛下之故也陛下觀近年以來所用之臣慨然敢以天下之重自任者幾人平居無事小亷曲謹似可無過忽有擾攘則錯愕無所措手足不過奉身以退天下安危之重委之陛下而已有臣如此何補於國而陛下亦安取此大槩近年閒暇則以和議為得計而以治兵為失䇿倉卒則以退避為愛君而以進禦為誤國上下偷安不為長乆之計國勢益弱職此之由今天啓宸衷悟前日和議退避之失親臨大敵天威所臨使北軍數十萬之衆震怖不敢南渡濳師宵奔則和議之與治兵退避之與進禦其效槩可見矣然敵兵雖退未大懲創安知其秋高馬肥不再來擾我疆埸使疲於奔命哉臣夙夜為陛下思所以為善後之䇿惟自昔創業中興之主必躬冒矢石履行陣而不避故髙祖既得天下擊韓王信陳豨黥布未嘗不親行光武自即位至平公孫述十三年間無一歲不親征本朝太祖太宗定維揚平澤潞下河東皆躬御戎輅真宗亦有澶淵之行措天下於大安此謂始憂勤而終逸樂也若夫退避之䇿可暫而不可常可一而不可再退一歩則失一歩退一尺則失一尺往時自南都退至維揚則河北河東闗陜失矣自維揚退至江浙則京東西失矣萬一敵騎南牧將復退避不知何所􅆘而可乎航海之䇿萬乘冒風濤不測之險此又不可之尤者也惟當於國家閒暇之時明政刑治軍旅選將帥修車馬備噐械峙糗糧積金帛敵來則禦俟時而奮以光復祖宗之大業此最上䇿也臣願陛下自今以往勿復為退避之計臣又觀古者敵國善鄰則有和親仇讐之邦鮮復遣使豈不以釁隙既深終無講好修睦之理故耶東晉渡江石勒遣使於晉元帝命焚其幣而却其使彼遣使來且猶却之此何可往金人造釁之深知我必報其措意為何如而我方且卑辭厚幣屈體以求之其不推誠以見信决矣噐幣禮物所費不貲使軺往來坐索士氣而又邀我以必不可從之事制我以必不敢為之謀是和卒不成而徒為此擾擾也况於吾自治自强之計動輒相妨臣願自今以往勿復遣和議之使二者既定擇所當為者一切以至誠為之俟吾之政事修倉廩實府庫充噐用備士氣振力可有為乃議大舉則兵雖未交而勝負之勢决矣惟陛下正心以正朝廷百官使君子小人各得其分則是非明賞罰當自然藩方協力將士用命雖强敵不足畏逆臣不足憂此特在陛下方寸間耳臣昧死上條六事一曰信任輔弼二曰公選人材三曰變革士風四曰愛惜日力五曰務盡人事六曰寅畏天威何謂信任輔弼夫興衰撥亂之主必有同心同德之臣相與有為如元首股肱之於一身父子兄弟之於一家乃能協濟今陛下選於衆以圖任遂能捍禦大敵可謂得人矣然臣願陛下待以至誠無事形跡乆任以責成功勿使小人得以間之則君臣之美垂於無窮矣何謂公選人材夫治天下者必資於人才而創業中興之主所資尤多何則繼體守文率由舊章得中庸之才亦足以共治至於艱難之際非得卓犖瓌瑋之才則未易有濟是以大有為之主必有不世出之才參贊翊佐以成大業然自昔抱不羣之才者多為小人之所忌嫉或中之以黯闇或指之為黨與或誣之以大惡或摘之以細故而以道事君者不可則止難於自進恥於自明雖負重謗遭深譴安於義命不復自辯茍非至明之主深察人之情偽安能辯其非辜哉陛下臨御以來用人多矣世之所許以為端人正士者往往閑廢於無用之地而陛下寤寐側席有乏材之歎盍少畱意而致察焉何謂變革士風夫用兵之與士風似不相及而實相為表裏士風厚則議論正而是非明朝廷賞罰當功罪而人心服考之本朝嘉祐治平以前可知已數十年來奔競日進論議狥私邪説利口足以惑人主之聽元祐大臣持正論如司馬光之流皆社稷之臣也而羣枉嫉之指為姦黨顛倒是非政事大壊馴致靖康之變非偶然也竊觀近年士風尤薄隨時好惡以取世資潝訿成風豈朝廷之福哉大抵朝廷設耳目及獻納論思之官固許之以風聞至於大故必湏覈實而後言使其無實則誣人之罪伏讒蒐慝得以中害善良皆非所以修政也何謂愛惜日力夫創業中興如建大厦堂室奥序其規模可一日而成鳩工聚材則積累非一日所致陛下臨御九年於兹境土未復僣逆未誅仇敵未報尚稽中興之業者誠以始不為之規模而後不為之積累故也邊事粗定之時朝廷所推行者不過簿書期㑹不切之細務至於攻討防守之䇿國之大計皆未嘗畱意夫天下無不可為之事亦無不可為之時惟失其時則事之小者日益大事之易者日益難矣何謂務盡人事夫天人之道其實一致人之所為即天之所為也人事盡於前則天理應於後此自然之符也故創業中興之主盡其在我而已其成功歸之於天今未嘗盡人事敵至先自退屈而欲責成於天其可乎臣願陛下詔二三大臣協心同力盡人事以聽天命則恢復土宇剪屠鯨鯢迎還兩宫必有日矣何謂寅畏天威夫天之於王者猶父母之於子愛之至則所以為之戒者亦至故人主之於天戒必恐懼修省所以致其寅畏之誠比年以來熒惑失次太白晝見地震水溢或乆隂不雨或乆雨不霽或當暑而寒乃正月之朔日有食之此皆天意眷佑陛下叮嚀反覆以致告戒惟陛下推至誠之意正厥事以應之則變災而為祥矣凡此六者皆中興之業所闗而陛下所當先務者今朝廷人才不乏將士足用財用有餘足為中興之資陛下春秋鼎盛欲大有為何施不可要在改前日之轍斷而行之耳昔唐太宗謂魏徴為敢言徴謝曰陛下導臣使言不然其敢批逆鱗哉今臣無魏徴之敢言然展盡底藴亦思慮之極也惟陛下赦其愚直而取其惓惓之忠䟽奏上為賜詔褒諭然不能用五年二月置總制司先是帝在揚州四方貢賦不以期至吕頥浩葉夢得等言政和間陳亨伯為轉運使創經制錢大率添酒價増稅額官賣契紙與凡公家出納每千收頭子錢二十三文其後行之東南及京東西河北歲入數百萬緡所補不細今邊事未寧費用日廣請復行之諸路一歲無慮數百萬計賢於緩急暴歛多矣帝從之至是又因經制之額増析為總制錢歲収至七百八十餘萬緡戸部侍即張致逺言陛下欲富國强兵大有為於天下願詔大臣力務省節明禁奢侈自朝廷始員額可减者减之司屬可併者併之使州縣無􅄭用歸其餘於監司監司無􅄭用歸其餘於朝廷朝廷無枉費日積月聚惟軍需是慮中興之業可致帝善其言十四年三月太學孔子廟成司業高閎表請臨視帝從之遂視太學止輦於聖殿門外歩趨升降退御敦化堂命禮部侍郎秦熺執經高閎講易泰卦胡宏移書責閎曰太學明人倫之所在也太上皇帝刼制於强敵生往死歸此臣子痛心切骨卧薪嘗膽宜思所以必報之大讐也太母天下之母其縱釋乃在金人此中華之大辱臣子所不忍言也而柄臣乃敢欺天罔人以大讐大辱為大恩師儒之臣既不能建大論明天人之理以正君心乃阿諛柄臣希合風㫖求舉太平之典又從而為之詞欺㒺孰甚焉十六年春正月帝親饗先農於東郊行籍田禮詔曰朕惟兵興以來田畆多荒故不憚卑躬與民休息今疆埸罷警流徙復業朕親耕籍田以先黎庶三推復進勞賜耆老嘉與世躋於富厚昔漢文帝頻年下詔首推農事之本至於上下給足减免田租光於史册朕心庶幾焉十八年秋七月寛諸郡雜稅帝曰人知取之為取而不知予之為取若稍與展免俟家給人足稅歛自然易辦於是蠲廬光二州上供錢米汀漳二州秋稅處州三縣被水民家紬絹鄂州舊額絹各一年又蠲四川積貸常平錢十三萬緡京西路請佃田租及州縣塲務稅錢二十四年八月禁百官避輪對自秦檜擅政以來屏塞人言蔽上耳目一時獻言者非誦檜功德則訐人語言以中傷善類欲有言者恐觸忌諱僅論銷金鋪翆乞禁鹿胎冠子之類以塞責而已故皆避免輪對至是上乃諭執政曰百官輪對正欲聞所未聞近輪對者多謁告避免可令檢舉約束二十五年十二月詔曰臺諌風憲之地用非其人黨於大臣濟其喜怒殊非耳目之寄朕今親除公正之士以革前弊繼此者宜盡心乃職毋合黨締交敗亂成法當謹兹戒毋自貽咎陳邦瞻曰建炎紹興之間其時事可謂亟矣然君臣之所欲有為者槩可覩也李綱曰邊事粗定之時朝廷所推行不過簿書期㑹不切之細務至於攻討防守之䇿國之大計皆未嘗措意嗚呼若是而猶望其戡大難成大功豈不難哉講和之後人主耳目壅蔽雖欲自逹無由試讀其約束輪對戒諭臺諌二詔亦可悲矣孝宗之立髙宗紹興二年春正月辛未育太祖後子偁之子伯琮於宫中元懿太子卒帝未有嗣范宗尹嘗造膝請建太子帝曰太祖以神武定天下子孫不得享之遭時多艱零落可憫朕若不法仁宗為天下計何以慰在天之靈於是詔知南外宗正事令廣選太祖後將育宫中㑹上虞縣丞婁寅亮上書曰先正有言太祖舍其子而立弟此天下之大公周王薨章聖取宗室子育宫中此天下之大慮仁宗感悟其説召英宗入繼大統文子文孫宜君宜王遭罹變故不斷如帶今有天下者陛下一人而已屬者椒寝未繁前星不耀孤立無助有識寒心天其或者深戒陛下追念祖宗公心長慮之所及乎崇寧以來諛臣進説獨推濮王子孫以為近屬餘皆謂之同姓遂使昌陵之後寂寥無聞僅同民庶藝祖在上莫肯顧歆此金人所以未悔祸也望陛下於伯字行内選太祖諸孫有賢德者視秩親王俾牧九州以待皇嗣之生退處藩服庶幾上慰在天之靈下繫人心之望書奏帝讀之大感嘆至是選秦王德芳五世孫左朝奉大夫子偁之子伯琮入宫命張婕妤鞠之生六年矣其後呉才人亦請於帝乃復取秉義即子彦之子伯􅅼命呉才人鞠之皆太祖後也尋以伯琮為和州防禦使改名瑗五年夏四月封和州防禦使瑗為建國公就學資善堂趙鼎請以行宫新作書院為資善堂命建國公聽讀且薦徽猷閣待制范冲兼翊善起居即朱震兼贊讀朝論二人極天下之選帝命瑗見之皆設拜尋以伯玖為和州防禦使賜名璩時岳飛詣資善堂見瑗退而喜曰社稷得人矣中興基業其在是乎飛前此亦䟽請建儲云陳邦瞻曰余觀岳少保請高宗建儲事未嘗不悲其忠而惜其智也夫造膝密謀為宗社計慮根本此誠忠臣事然惟腹心大臣得為之非將帥任也智名勇略葢一世挾震主之威而居不賞之功斯已危矣猶欲與人父子間事乎矧苖劉之變實立明受帝庸主也豈能遽忘諸將而飛乃觸其深忌安知讒人不以此為中傷地也史稱趙鼎請正建國皇子之號秦檜曰鼎欲立太子是謂陛下終無子也鼎由此𫉬罪然則飛之不免葢可見矣九年三月封和州防禦使璩為崇國公聽讀于資善堂十二年春正月進封建國公瑗為普安郡王崇國公璩為恩平郡王十三年九月宗室左朝奉大夫子偁卒詔普安郡王解官持服三十年二月甲戌以普安郡王瑗為皇子更名瑋初帝知瑋之賢欲立為嗣恐太后意所不欲遲囘乆之及后崩帝問吏部尚書張燾以方今大計對曰儲嗣者國之本也天下大計無踰於此今兩邸名分宜早定帝喜曰朕懐此乆矣開春當議典禮燾頓首謝至是荆州提㸃刑獄范如圭掇至和嘉祐間名臣奏章凡三十六篇合為一書囊封以獻請斷以至公勿疑帝意遂决制授瑋寧國軍節度使開府儀同三司進封建王丙午加恩平郡王璩開府儀同三司判大宗正事稱皇侄三十二年五月甲子立建王瑋為皇太子初金亮南侵兩淮失守朝臣多勸帝退避建王不勝其憤及帝下詔親征瑋請率師為前驅直講史浩聞之入言於瑋曰皇子不宜將兵因為草奏請扈蹕以供子職帝亦欲瑋徧識諸將遂命從幸金陵及還臨安帝欲遜位陳康伯密贊大議乞先正名俾天下咸知聖意遂草立太子詔以進帝從之瑋既立更名眘六月庚午詔集議子偁封爵戸部侍即汪應辰定其稱曰太子本生之親議入内降曰皇太子所生父可封秀王謚安僖母張氏為王夫人乙亥帝降手札皇太子可即皇帝位朕稱太上皇帝后稱太上皇后退居德夀宫太子固譲不許丙子遣中使召太子入禁中面諭之太子固辭即趨側殿門欲還東宫帝勉諭再三乃止於是百官拜禪詔畢宰相率百僚固請太子遂即帝位班退上皇即駕之德夀宫帝歩出祥曦門冒雨掖輦以行及宫門弗止上皇麾謝再三且令左右掖以還顧羣臣曰付托得人吾無憾矣史臣曰髙宗恭儉仁厚以之繼體守文則有餘撥亂反正則不足當其初立因四方勤王之師内相李綱外任宗澤天下之事宜無不可為者顧乃播遷窮僻坐失事機始惑於汪黄終制於秦檜偷安忍恥匿怨忘親以貽來世之譏悲夫丁丑帝朝太上皇帝於德壽宫戊寅大赦其文有曰凡今者發政施仁之目皆得之問安視膳之餘天下誦之庚辰帝五日一朝德壽宫太上皇不許自是月四朝隆興和議高宗紹興三十二年六月帝傳位於太子太子即位七月帝手書召張浚入見浚至帝改容曰乆聞公名今朝廷所恃惟公因賜之坐浚從容言人主之學以心為本一心合天何事不濟所謂天者天下之公理而已必兢業自持使清明在躬則賞罰舉措無有不當人心自歸敵讐可復帝悚然曰當不忘公言加浚少傅魏國公宣撫江淮浚見帝英武力陳和議之非勸帝堅意以圖恢復欲遣舟師自海道擣山東命諸將出師犄角以向中原翰林學士史浩以濳邸舊臣時與樞密議欲城采石𤓰洲浚言不守兩淮而守江干是示敵以削弱怠戰守之氣不若先城泗州浩不悦遂與有隙凡浚所䂓畫浩多沮之十一月金以布薩忠義為都元帥赫舍哩志寧副之時金主以朝廷欲正敵國禮乃詔忠義縂戎事居南京節制諸軍復令志寧駐軍淮陽忠義將行金主諭之曰宋若歸侵疆貢禮如故則可罷兵忠義至汴簡閲士卒分屯要害孝宗隆興元年春正月庚子以張浚為樞密使都督江淮東西路軍馬開府建康浚薦陳俊卿為江淮宣撫判官先是帝召俊卿及浚子栻赴行在浚附奏請帝臨幸建康以動中原之心用師淮壖以為呉璘聲援帝見俊卿問浚動静飲食顏貎曰朕倚魏公如長城不容浮言搖奪浚開府江淮參佐皆一時之選栻以少年内贊密謀外参庶務其所綜畫幕府諸人皆自以為不及及入奏事因進言曰陛下上念祖宗之讐恥下憫中原之塗炭惕然於中思有以振之臣謂此心之發即天理之所存也願益加省察而稽古親賢以自輔無使少息則今日之功可以立成帝嘉納之三月壬辰金帥赫舍哩志寧以書來求海泗唐鄧商州之地及歲幣先是金人十萬衆屯河南聲言規取兩淮朝廷震恐張浚請以大兵屯盱眙泗濠廬備之至是志寧乃以書抵浚欲凡事一依皇統以來故約不然請會兵相見且遣富察棟摩大周仁屯虹縣蕭琦屯靈壁積糧修城將為南攻計夏四月戊辰張浚被命入見帝銳意恢復浚乞即日降詔幸建康帝以問史浩浩對曰先為備守是為良規議戰議和在彼不在此儻聽淺謀之士時興不教之師敵退則論賞以邀功敵至則歛兵而遁迹取快一時含寃萬世及退詰浚曰帝王之兵當出萬全豈可嘗試以圖僥僥復辯論於殿上浚因内引奏浩意不可囘恐失機㑹且謂金人至秋必為邊患當及其未發攻之帝然其言乃議出師渡淮三省樞密院不預聞㑹李顯忠邵宏淵亦獻擣虹縣靈璧之䇿帝命先圖二城浚乃遣顯忠出濠州趨靈璧宏淵出泗州趨虹縣五月甲辰李顯忠及邵宏淵敗金人於宿州乙巳史浩罷省中忽見邵宏淵出兵狀始知不由三省徑檄諸將浩語陳康伯曰吾屬俱兼右府而出兵不預聞焉用相哉不去何待入對因奏陳康伯欲納歸正人臣恐他日必為子孫憂張浚銳意用兵若一失之後恐陛下不得復望中原因力乞罷王十朋論浩八罪曰懐奸誤國植黨盗權忌言蔽賢欺君訕上帝為出浩知紹興府十朋再䟽論之予祠李顯忠自濠梁渡淮至陡溝金右翼都統蕭琦用拐子馬來拒顯忠力戰敗之遂復靈璧顯忠入城宣布德意不戮一人於是中原歸附者接踵宏淵圍虹乆不下顯忠遣靈璧降卒開諭祸福金守將富察棟摩大周仁皆出降宏淵恥功不自已出㑹有降千戸訴宏淵之卒奪其佩刀顯忠立斬之由是二將不協未幾蕭琦復降於顯忠丙午李顯忠兵傅宿州城金人來拒顯忠大敗其衆追奔二十餘里邵宏淵至謂顯忠曰招撫真闗西將軍也顯忠閉營休士為攻城計宏淵等不從顯忠引麾下楊椿上城開北門不踰時抜其城宏淵等殿後趨之始渡濠登城城中巷戰又從斬䤋數千人擒八千餘人遂復宿州中原震動捷聞帝手書勞張浚曰近日邊報中外鼓舞十年來無此克捷既而宏淵欲發倉庫犒卒顯忠不可移軍出城止以見錢犒士士皆不悦詔以顯忠為淮南京東河北招討使宏淵副之癸丑金赫舍哩志寧自睢陽引兵攻宿州李顯忠擊却之金巴薩復自汴率歩騎十萬來攻宿州晨薄城下列大陣顯忠謂宏淵併力夾擊宏淵按兵不動顯忠獨以所部力戰俄而敵大至顯忠用克敵弓射却之宏淵顧衆曰當此盛夏搖扇清凉且不堪况烈日被甲苦戰乎人心遂搖無復鬬志至夜中軍統制周宏鳴鼓大譟陽為敵兵至與邵世雍劉侁各以所部兵遁繼而統制左師淵統領李彥孚亦遁顯忠移軍入城統制張訓通張師顏荔澤張淵等以顯忠宏淵不協各遁去金人乗虛復來攻城顯忠竭力捍禦斬首二千餘積屍與牛馬墻平城東北角敵兵二十餘人已上百餘歩顯忠取軍所執斧斫之敵始退却顯忠嘆曰若使諸軍相與犄角自城外掩擊則敵兵可盡敵帥可擒河南之地指日可復矣宏淵又言金添生兵二十萬來儻我兵不返恐不測生變顯忠知宏淵無固志勢不可孤立嘆曰天未欲平中原耶何沮撓如此遂夜引還甲寅至符離師大潰是舉所喪軍資器械略盡幸而金不復南時張浚在盱眙顯忠往見浚納印待罪浚以劉寳為鎮江諸軍都統制乃渡淮入泗州撫將士遂還揚州上䟽自劾乙夘下詔親征癸亥張浚乞致仕初宿師之還士大夫主和者皆議浚之非帝賜浚書曰今日邊事倚卿為重卿不可畏人言而懐猶豫前日舉事之初朕與卿任之今日亦須與卿終之浚乃以魏勝守海州陳敏守泗州戚方守濠州郭振守六合治高郵巢縣兩城為大勢修滁州闗山以扼敵衝聚水軍淮隂馬軍壽春大飭兩淮守備帝召浚子栻入奏事浚附奏曰自古有為之君心腹之臣相與協謀同志以成治功今臣以孤蹤動輙掣肘陛下將安用之因乞骸骨帝覽奏謂栻曰朕待魏公有加雖乞去之章日上朕必不許帝對近臣言必曰魏公未嘗斥其名每遣使至督府必令視浚飲食多少肥瘠如何至是帝以符離師潰乃議講和召湯思退為醴泉觀使奉朝請癸酉下詔罪已於是尹穡附湯思退劾張浚遂降授浚江淮東西路宣撫使邵宏淵降官階仍前建康都統制王十朋上䟽言臣素不識浚聞其誓不與敵俱生心實慕之前因輪對言金必敗盟乞用浚陛下嗣位命督師江淮今浚遣將取二縣一月三捷皆服陛下任浚之難及王師一不利横議蠭起臣謂今日之師為祖宗陵寢為二帝復讐為二百年境土為萬姓保聚室廬非前代好大生事者比益當内修俟時而動陛下恢復志立固不以一衂為羣議所搖然異論紛紛浚既待罪臣其可尚居風憲之職乞賜竄殛因言臣聞近日欲遣龍大淵撫諭淮南信否上曰無之又言聞欲以楊存中為御營使上嘿然改除十朋吏部侍郎復出知饒州已夘貶李顯忠官筠州安置八月丙寅陳俊卿以張浚降秩徙治上䟽曰若浚不用宜别屬賢將如欲責其後效降官示罰可也今削都督重權寘揚州死地如有奏請臺諌沮之人情觧體尚何後効之圗議者但知惡浚而欲殺之不復為宗社計願下詔戒中外協濟使浚自效䟽入帝悟即復浚都督江淮軍馬浚遂以劉寶為淮東招撫使戊寅金赫舍哩志寧復以書移三省密院求海泗唐鄧泗州地及歲幣稱臣還中原歸正人即止兵不然當俟農隙往戰帝以付張浚浚言金强則來弱則止不在和與不和湯思退秦檜黨也急於求和陳康伯周葵等皆上䟽謂敵意欲和則我軍民得以休息為自治之計以待中原之變而圖之是萬全之計也工部侍即張闡獨曰彼欲和畏我耶愛我耶直欵我耳力陳六害不可許帝曰朕意亦然姑隨宜應之丙戌遣盧仲賢持報書如金師云海泗唐鄧等州乃正隆渝盟之後本朝未遣使之前得之至於歲幣固非所較第兩淮凋瘵之餘恐未如數仲賢陛辭帝戒以勿許四郡而思退等命許之張浚奏仲賢小人多􅄭不可委信不聽冬十月戊午命廷臣議金帥所言四事其説不一帝曰四州地歲幣可許名分歸正人不可從十一月己丑盧仲賢至宿州布薩忠義懼之以威仲賢惶恐言歸當稟命遂以忠義貽三省密院書來上其畫定四事一欲通書稱叔侄二欲得唐鄧海泗四州三欲歲幣銀絹之數如舊四欲歸彼叛臣及歸正人仲賢還帝大悔庚子湯思退奏以王之望充金國通問使龍大淵副之許割棄四州求减歲幣之半初之望為都督府參贊軍事奏言人主論兵與臣下不同惟奉承天意而已竊觀天意南北之形已成未易相兼我之不可絶淮而北猶敵之不可越江而南也不若移攻戰之力以自守自守既固然後隨機制變擇利而應之思退悦其言故奏遣之會右正言陳良翰言前遣使已辱命大臣不悔前失而復遣王之望是金不折一兵而坐收四千里要害之地今不可許四郡若歲幣則俟得陵寢庶為有名今議未决而之望遽行恐其辱國不止於仲賢願先馳一介往俟議决然後行未晚帝然之癸丑以胡昉楊由義為金國通問所審議官張浚力言金未可和請帝幸建康以圖進兵帝乃手詔王之望等併一行禮物並囘待命境上而令胡昉等先往諭金以四州不可割之意詔以和戎遣使大詢於廷侍從臺諌與議者凡十有四人主和者半可否者半胡銓獨上議曰京師失守自汪伯彥黄濳善主和完顏亮之變自秦檜主和議者乃曰外雖和内不忘戰此向來權臣誤國之言也一溺於和不能自振尚能戰乎陳康伯等言金人來通和朝廷遣盧仲賢報之其所論最大者三事我所欲者削去舊禮彼亦肯從彼所欲者歲幣如數我不深較其未决者彼欲得四州而我以祖宗陵寢欽宗梓宫為言未之與也乞召張浚歸國特垂咨訪仍命侍從臺諌集議帝從之羣臣多欲從金人所請張浚及虞􅁢文胡銓閻安中上䟽力爭以為不可與和湯思退曰此皆以利害不切於已大言誤國以邀美名宗社大事豈同戲劇帝意遂定浚在邊聞王之望行上䟽力辯其失曰自秦檜主和隂懐他志卒成金亮之禍檜之大罪未正於朝致使其黨復出為惡臣聞立大事者以人心為本今内外之議未决而遣使之詔已下失中原將士四海傾慕之心他日誰復為陛下用命哉人心既失如水之覆難以復收而况於天則不順於義則不安竊為陛下憂之不聽二年春正月丙午金帥布薩忠義復以書來議和二月胡昉自宿州還初昉至金金人以失信執之帝聞昉被執謂張浚曰和議不成天也自此事當歸一矣詔王之望以幣還既而布薩忠義以書進金主覽之曰行人何罪即遣還邊事令元帥府從宜措畫三月丙戌詔張浚視事江淮金軍退初湯思退恐和議不成奏請以宗社大計奏稟上皇而後從事帝批示三省曰金無禮如此卿猶欲議和今日事勢非秦檜時比卿議論秦檜不若思退大駭隂謀去浚遂令王之望等驛奏兵少糧乏樓櫓噐械未備又言委四萬衆以守泗州非是帝惑之會戸部侍即錢端禮言兵者凶器願以符離之潰為戒早决國是為社稷至計乃詔浚行視江淮時浚所招徠山東淮北忠義之士以實建康鎮江兩軍凡萬二千人萬弩營所招淮南壯士及江西羣盗又萬餘人陳敏統之以守泗州凡要害之地皆築城堡其可因水為險者皆積水為櫃増置江淮戰艦諸軍弓矢噐械悉備金人方屯重兵為虛聲脅和有刻日决戰之語及聞浚復視師亟撤兵歸於是淮北之來歸者日不絶山東豪傑悉願受節度浚以蕭琦契丹望族沉勇有謀欲令盡領降衆且以檄諭契丹約為應援金人益懼丁亥貶盧仲賢械送彬州編管張浚遣子栻入奏仲賢辱國無狀帝怒遂下大理問其擅許四州之罪奪三官尋除名竄彬州夏四月丁丑罷張浚判福州湯思退諷右正言尹穡論浚跋扈且費國不貲奏令張深守泗不受趙廓之代為拒命復論督府叅議官馮方罷之浚乃請解督府詔以錢端禮王之望宣諭兩淮而召浚還端禮入奏言兩淮名曰備守守未必備名曰治兵兵未必精葢詆浚也浚畱平江凡八上䟽乞致仕帝察浚之忠欲全其去乃命以少師保信節度使判福州右司諌陳良翰侍御史周操言浚忠勤人望所屬不當使去國皆坐罷秋七月己巳命撤兩淮邊備湯思退急欲和好之成自撤邊備罷築壽春城散萬弩營兵輟修海船毁折水櫃不凖軍功賞典及撤海泗唐鄧之戌八月胡銓上䟽言自靖康迄今凡四十年三遭大變皆在和議則金人之不可與和彰彰矣肉食鄙夫萬口一談牢不可破非不知和議之害而爭言為和者是有三説焉曰偷懦曰茍安曰附㑹偷懦則不知立國茍安則不戒酖毒附㑹則覬得美官小人之情狀具於此矣今日之議若成則有可弔者十若不成則有可賀者亦十請為陛下極言之何謂可弔者十真宗皇帝時宰相李沆謂王旦曰我死公必為相切勿與敵講和吾聞出則無敵國外患如是者國常亡若與敵和自此中國必多事矣旦殊不以為然既而遂和海内虛耗旦始悔不用文靖之言此可弔者一也中原謳吟思歸之人日夜引領望陛下拯溺救焚不啻赤子之望慈父母一與敵和則中原絶望後悔何及此可弔者二也海泗今日之藩籬咽喉也彼得海泗且决吾藩籬以瞰吾室扼吾咽喉以制吾命則兩淮决不可保兩淮不保則大江决不可守大江不守則江浙决不可安此可弔者三也紹興戊午和議既成檜建議遣二三大臣如路􅁢迪等分往南京等州交割歸地一旦叛盟刼執􅁢迪等下親征之詔敵復請和其反覆變詐如此檜猶不悟奉之如初事之愈謹賂之愈厚卒有不意之變驚動輦轂太上謀欲入海行朝居民一空覆轍不逺忽而不戒臣恐後車又將覆也此可弔者四也紹興之和首議决不與歸正人口血未乾盡變前議凡歸正之人一切遣還如陳師囘趙良嗣等聚族數百幾為蕭墻憂今必盡索歸正之人與之則反側生變不與則敵决不肯但已夫反側則肘腋之變深敵决不肯但已則必别起釁端猝有意外之謀不知何以待之此可弔者五也自檜當國二十年間竭民膏血以餌強敵迄今府庫無旬月之儲千村萬落生理蕭然重以蝗蟲水潦自此復和蠧國害民殆有甚焉者矣此可弔者六也今日之患兵費已廣養兵之外又増歲幣且少以十年計之其費無慮數千億而歲幣之外又有私覿之費私覿之外又有賀正生辰之使賀正生辰之外又有泛使一使未去一使復來生民疲於奔命帑廩涸於將迎瘠中國以肥敵陛下何憚而為之此其可弔者七也側聞敵人嫚書欲書御名欲去國號大字欲用再拜議者以為繁文小節不必計較臣竊以為議者可斬也夫四郊多壘卿大夫之辱楚子問鼎義士之所深恥獻納二字富弼以死爭之今強敵横行與多壘孰辱國號大小與鼎輕重孰多獻納二字與再拜孰重臣子欲君父屈已以從之則是多壘不足辱問鼎不必恥獻納不必争此其可弔者八也臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至銜璧銜璧不已必至輿櫬輿櫬不已必至如晉帝青衣行酒然後為快此其可弔者九也事至於此求為匹夫尚可得乎此其可弔者十也竊觀今日之勢和决不成儻能獨斷追囘使者魏杞康湑等絶請和議以鼓戰士下哀痛之詔以収民心天下庶乎其可為矣如此則有可賀者亦十省數千億之歲幣一也專意武備足兵食二也無書名之恥三也無去大之辱四也無再拜之屈五也無稱臣之忿六也無請降之祸七也無納土之悲八也無銜璧輿櫬之酷九也無青衣行酒之惨十也去十弔而就十賀利害較然雖三尺童穉亦知之而陛下不悟春秋左氏謂無勇者為婦人今日舉朝之士皆婦人也如以臣言為不然乞賜流放竄殛以為臣子出位犯分之戒壬午遣宗正少卿魏杞如金議和書稱侄大宋皇帝某再拜奉于叔大金皇帝歲幣二十萬帝面諭杞曰今遣使一正名二退師三减歲幣四不發歸附人杞條陳十七事擬問對帝隨事畫可陛辭奏曰臣將㫖出疆豈敢不勉萬一無厭願速加兵帝善之錢端禮又請遣國信所大通事王抃如金師持周葵書致於布薩忠義及赫舍哩志寧九月癸夘命湯思退都督江淮軍馬不果行初思退急於求和諷侍御史尹穡言乞置獄取不肯撤備及棄地者二十餘人論罪因擢穡諌議大夫至是命思退都督江淮固辭不行乙巳復命楊存中為同都督冬十月辛巳金兵復渡淮初湯思退以帝悔悟恐事不成隂遣孫造諭敵以重兵脅和金布薩忠義等遂議渡淮始魏把行次盱眙忠義遣趙房長問把所以來之意求觀國書把曰書御封也見主當廷授房長馳白忠義疑國書不如式又求割商秦之地及歸正人且欲歲幣二十萬把以聞帝命盡依初式許割四州歲幣亦如其數再易國書忠義猶以未如所欲至是與赫舍哩志寧分兵自清河口以犯楚州都統制劉寶棄城遁時知楚州魏勝奉詔專一措置清河口金人乗間以舟載器甲糗糧自清河出欲侵邊勝覘知之帥忠義士拒於河口金兵詐稱欲運糧往泗州由清河口入淮勝欲禦之劉寶戒以方議和不可十一月乙酉金兵軼境魏勝帥諸軍拒於淮陽自夘至申勝負未决金圗克坦克寜帥生兵至勝與力戰矢盡依土阜為陣謂士卒曰我當死此得脱者歸報天子乃令歩卒居前騎兵為殿至淮隂東十八里中矢墜馬死楚州遂陷金人入濠滁州都統制王彦棄昭闗走庚寅以楊存中都督江淮軍馬時諸軍各守分地不相統一存中集諸將調護之於是始更相為援朝議欲舍淮保江存中持不可乃已辛夘湯思退罷落職永州居住太學生張觀等七十二人上書論思退及王之望尹穡姦邪誤國鉤致敵人之罪乞斬三人以謝天下併竄其黨洪适晁公武而用陳康伯胡銓陳良翰王十朋安節虞允文王大寶陳俊卿黄中龔茂良張栻以濟大計思退行至信州聞之憂悸而死戊戌復以陳康伯為尚書左僕射同平章事兼樞密使時金兵犯淮人情驚駭張浚已卒皆望康伯復相故有是命癸夘遣王之望勞師江上丙辰王忭見金二帥得報書以歸乙亥王之望罷先是金人至揚州或請擊之楊存中不敢渡江獨臨江固壘以自守之望與湯思退表裏專以割地啖敵為得計帝詔督府擇利害擊金軍之望下令諸將不得􅄭進言者論之遂罷丙子王忭使金持陳康伯報書以行十二月丙申以金人議和下詔曰比遣王忭逺抵潁濱得其要約尋澶淵盟誓之信倣大遼書題之儀正皇帝之稱為叔侄之國歲幣减十萬之數地界如紹興之時憐彼此之無辜約叛亡之不遣可使歸正之士咸起寜居之心重念數州之民罹此一時之難老稚有蕩析之災丁壯有係累之苦宜推蕩滌之宥少慰凋殘之情應沿邊被兵州軍除逃遁官吏不赦外餘並放遣洪适所草也論者謂前日之所貶損四方葢未聞知今著之赦文失國體矣乾道元年三月魏把還自金初杞至燕山金館伴張恭愈以國書稱大宋脅杞去大字杞拒之具言天子神聖才傑奮起人人有敵愾意北朝用兵能保必勝乎金君臣環聽拱竦金主許損歲幣不發歸正人命元帥府罷兵分戌杞卒正敵國禮而還帝慰藉甚厚夏四月庚子金報問使完顏仲等入見十一月詔収兩淮流散忠義人三年五月乙亥金遣使來取被俘人詔實俘在民間者還之軍中人及叛亡者不與六年閏五月以起居郎范成大為金國祈請使求陵寢地及更定受書禮葢泛使也初紹興要盟之日金先約毋得擅易大臣秦檜益思媚金禮文多可議者而受書之儀特甚凡金使者至捧書升殿北面立榻前跪進帝降榻受書以授内侍金主初立使者至陳康伯令伴使取書以進及湯思退當國復循紹興故事帝常悔恨每欲遣泛使直之陳俊卿既屢諌不聽罷去至是乃令成大使金臨行帝謂之曰朕以卿氣宇不羣親加選擇聞外議洶洶官屬皆憚行有諸成大對曰無故遣泛使近於起釁不執則戮臣已立後為不還計帝愀然曰朕不敗盟發兵何至害卿囓雪餐氊或有之成大奏乞國書併載受書禮一節弗許遂行辛夘吏部尚書陳良祐論奏陛下恢復之志未嘗忘懐然詞莫貴於僉同不可不察博訪歸於獨斷不可不審固有以用衆而興亦有以用衆而亡固有以獨斷而成亦有以獨斷而敗今遣使乃啓釁之端萬一敵騎犯邊則民力困於供輸州郡疲於調發兵連禍結未有息期將帥庸鄙類乏逺謀對君父則言效死臨戰陣則各求生有如符離之役不戰自潰𤓰州之遇望敵驚奔孰可仗者此臣所以未敢保其萬全且金之求地欲得河南􅇮歲常歸版圖不旋踵而又失如其不許徒費往來若其許我必邀重幣經理未定根本内虛又將隨而取之矣向之四郡得之亦難尚不能有今又無故而求侵地陛下度可以虛聲下之乎况止求陵寢地在其中􅇮亦議此觀其答書幾於相戲凡此二端皆是啓釁必須遣使則祈取欽宗梓宫猶為有辭内事不足何暇事外邇者未懐豈能綏逺奏入忤㫖貶瑞州居住尋移信州起居即張栻入對帝曰卿知敵國事乎栻對曰不知也帝曰金國饑饉連年盗賊四起栻曰金人之事臣雖未知境内之事則知之矣帝曰何也栻曰臣竊見比年諸道多水旱民貧日甚而國家兵弱財匱官吏誕謾不足倚頼正使彼實可圗臣懼我之未足以圗彼也帝黙然乆之栻復奏曰臣竊謂陵寢隔絶誠臣子不􅃘言之至痛然今日未能奉辭以討之又不能正名以絶之乃欲卑辭厚禮以求於彼則於大義已為未盡而或猶以為憂者葢見我未有必勝之形故也夫必勝之形當在於蚤正素定之時而不在於兩陣决機之日今日但當下哀痛之詔明復讐之義絶金人不與通使然後修德立政用賢養民選將練兵以圗恢復舉進戰退守通為一事必治其實而不為虛文則必勝之形隱然可見雖有淺陋畏怯之人亦且奮躍而爭先矣帝深納之九月壬辰范成大至自金初成大至金密草奏具言受書式并求陵寢地懐之入初進國書辭氣慷慨金君臣方傾聽成大忽奏曰兩國既為叔侄而受書禮未稱臣有䟽搢笏出之金主大駭曰此豈獻書處邪左右以笏摽起之成大屹不動必欲書達既而歸館所金庭紛然其太子􅁢恭欲殺成大或勸止之其復書略云和好再成界河山而如舊緘音遽至指鞏洛以為言既云廢祀欲伸追逺之懐止可奉遷即俟刻期之報至若未歸之旅櫬亦當並發於行塗抑聞附請之辭欲變受書之禮於尊卑之分何如顧信誓之誠安在於是二事皆無成功宋史紀事本末卷十九
