body:
  text: 宋史紀事本末卷二十四明馮琦原編陳邦瞻増輯史彌逺廢立寧宗慶元四年八月京鏜等以帝未有嗣請擇宗室子育之詔育太祖後燕懿王徳昭九世孫與愿于宫中年六歲矣尋以為福州觀察使賜名曮封衛國公開禧元年五月乙亥詔立衛國公曮為皇子進封榮王二年五月詔以宗室子均為沂靖惠王柄嗣賜名貴和柄孝宗孫魏惠獻王愷之子均之父曰希瞿太祖九世孫也三年十一月丁亥詔立榮王曮為皇太子更名懤又更名詢嘉定十三年八月癸亥皇太子詢卒謚曰景獻十四年六月立沂王嗣子貴和為皇子更名竑尋以宗室子貴誠為秉義郎貴誠初名與莒燕懿王德昭之後希瓐之子也母全氏家于紹興之山隂初慶年余天錫為史彌遠府童子師性謹愿彌遠器重之彌遠在相位久以帝未有儲嗣而沂王於帝為近屬亦未有後欲借沂王置後為名擇宗室中可立者以備皇子之選㑹天錫告還鄉秋試彌遠宻語之曰今沂王無後宗室子賢厚者幸具以來天錫渡浙舟抵越西門㑹天大雨過全保長家避雨保長知其為丞相客具雞黍甚肅湏臾有二子侍立天錫異而問之保長曰此吾外孫也日者嘗言二兒後極貴問其姓長曰趙與莒次曰與芮天錫因憶彌遠言及還臨安以告之彌遠命召二子來保長大喜鬻田治衣冠集姻黨送之且託其遇及見彌遠善相大竒之恐事泄不便遽使復歸保長大慙其鄉人亦竊笑之逾年彌遠忽謂天錫曰二子可復來乎天錫召之保長辭謝不遣彌遠乃遣天錫宻諭保長曰二子長者最貴宜還撫於其父家遂載至臨安及貴和立為皇子乃補與莒秉義郎賜名貴誠年十七矣十五年夏四月丁巳進封子竑為濟國公以貴誠為邵州防禦使竑好鼔琴史彌逺買羙人善鼓琴者納諸竑而厚撫其家使瞷竑動息羙人知書慧黠竑嬖之時楊皇后專國政彌逺用事久宰執侍從臺諌藩閫皆所引薦莫敢誰何權勢重灼竑心不能平嘗書楊后及彌逺之事于几上曰彌逺當决配八千里又嘗指宫壁輿地圖瓊崖曰吾他日得志置史彌逺於此又嘗呼彌逺為新恩以他日非新州則恩州也彌逺聞之大懼思以處竑而竑不知眞德秀時秉宫教諌竑曰皇子若能孝於慈母而敬大臣則天命歸之矣否則深可慮也竑不聽一日彌逺為其父浩飯僧淨慈寺與國子學録鄭清之登慧日閣屏人語曰皇子不堪負荷聞後沂邸者甚賢今欲擇講官君其善訓導之事成彌逺之座即君座也然出言于彌逺之口入于君之耳若一語泄吾與君皆族矣清之曰不敢乃以清之兼魏惠憲王府學教授清之日教貴誠為文又購高宗御書俾習焉清之見彌逺即示以貴誠詩文翰墨譽之不容口彌逺嘗問清之曰吾聞皇姪之賢已熟大要究竟何如清之曰其人之賢更僕不能數然一言以斷之曰不凡彌逺頷之再三策立之意益堅乃日媒孽竑之失言于帝覬帝廢竑立貴誠而帝不悟其意眞德秀聞其事力辭宫教去位十七年八月丙戌帝不豫史彌逺遣鄭清之往沂王府告貴誠以將立之意貴誠黙不應清之曰丞相以清之從游久故使布腹心今不荅一語則清之將何以荅丞相貴誠始拱手徐言曰紹興老母在清之以告彌逺益相與嘆其不凡壬辰帝疾篤彌遠稱詔以貴誠為皇子改賜名昀授武㤗軍節度使封成國公閠月丁酉帝崩彌遠遣皇后兄子谷石以廢立事白后后不可曰皇子竑先帝所立豈敢擅變谷等一夜七往返后終不許谷等乃拜泣曰内外軍民皆以歸心茍不立之禍變必生則楊氏無噍類矣后黙然良久曰其人安在彌逺即於禁中遣快行宣昀令之曰今所宣是沂清惠王府皇子非萬歲巷皇子茍誤則汝皆處斬皇子竑時聞帝崩跂足以需宣召久而不至乃屬目墻壁間見快行過其府而不入疑焉已而擁一人徑過天暝不知為誰甚惑之昀入宫見后后拊其背曰汝今為吾子矣彌逺引昀至柩前舉哀畢然後召竑竑聞命即赴至則每過宫門禁衛拒其從者彌遠亦引竑至柩前舉哀畢引出帷殿帥夏震守之遂召百官立班聽遺制則引竑至舊班竑愕然曰今日之事我豈當仍在此班震紿之曰未宣制前當在宣制後乃即位竑以為然已而遙見殿上燭影中有人在御座則昀已即位矣宣制畢閣門宣贊呼百官拜賀竑不肯拜震捽其首下拜遂稱遺詔以竑為開府儀同三司封濟陽郡王判寧國府尊楊皇后曰皇太后垂簾同聽政詔遵孝宗故事宫中自服三年喪尋進封竑為濟王出居湖州史臣曰寧宗恭儉守文初年以舊學輔導之功召用宿儒引㧞善類其政可觀中更韓侂胄蓄養羣奸指正為偽外挑强隣流毒淮甸函首求成國體虧矣及史彌逺擅權幸帝耄荒竊弄威福至於皇儲國綂亦得乘機伺間遂其廢立之私他可知也九月帝追封所生父希瓐為榮王生母全氏為國夫人而以弟與芮嗣之理宗寶慶元年春正月庚午湖州人潘壬與其從兄甫弟丙以史彌逺廢立不平乃遣甫宻告謀立濟王意于李全全欲坐致成敗陽與之期日進兵應接而實無意也壬等信之遂部分其衆以待及期全兵不至壬等懼事泄乃以其黨雜販鹽盗千餘人結束如全軍狀揚言自山東來夜入州城求濟王王聞變匿水竇中壬尋得之擁至州治以黄袍加王身王號泣不從壬等彊之王不得已乃與約曰汝能勿傷太后官家乎衆許諾遂發軍資庫金帛㑹子犒軍知州謝周卿卒官屬入賀壬子偽為李全榜揭於門數史彌逺廢立罪且曰今領精兵二十萬水陸並進人皆聳動比明視之則皆太湖漁人及廵尉兵卒耳王知事不成乃遣王元春告于朝而帥州兵討壬壬變姓名走楚州甫丙皆死元春至行在史彌逺懼甚急召殿司將彭任帥師赴之至執事平矣壬至楚將渡淮為小校明亮所獲送臨安斬之彌逺忌竑詐言竑有疾令余天錫召醫入湖州視之天錫至諭㫖逼竑縊于州治以疾薨聞尋詔追貶為巴陵郡公又降為縣公改湖州為安吉州起居郎魏了翁考功員外郎洪咨䕫相繼言竑之寃及禮部侍郎直學士院眞德秀入見奏曰三綱五常扶持宇宙之棟幹奠安生民之柱石晋廢三綱而劉石之變興唐廢三綱而安禄山之難作我朝立國根本仁義先正名分陛下初膺大寶不幸處人倫之變有所未盡流聞四方所損非淺霅川之變非濟王本志前有避匿之迹後聞捕討之謀情狀本末灼然可考願詔有司討論雍熈追封秦邸舎罪卹孤故事斟酌行之雖濟王未有子息興滅繼絶在陛下耳帝曰朝廷待濟王亦至矣德秀曰若論此事處置盡善臣未敢以為然觀舜所以處象則陛下不及舜明甚人主但當以二帝三王為師秦漢而下人君舉動不皆合理難以為法帝曰亦是一時倉卒耳德秀曰此已往之咎惟陛下知有此失益講學進德以贖前愆以收人心五月鄧若水上封事曰行大義然後可以弭大謗收大權然後可以固大位除大姦然後可以息大難寧宗皇帝晏駕濟王當繼大位者也廢黜不聞於先帝過失不聞於天下史彌逺不利濟王之立夜矯先帝之命棄逐濟王并殺王孫而奉迎陛下曾未半年濟王竟不幸死於湖州揆以春秋之法非弑乎非簒乎非攘奪乎當悖逆之初天下皆歸罪彌逺而不敢歸過於陛下者何也天下皆知倉卒之間非陛下所得知亦諒陛下必無是心也亦料陛下必能掃清妖氛以雪先帝濟王父子終天之憤今踰年矣而乾剛不决威斷不行無以大慰天下之望昔之信陛下之必無者今或疑其有昔之信陛下之不知者今或疑其知陛下何忍以清明天日而以此身受此汚辱也盍亦求明是心於天下而俾有辭於千古乎為陛下之計莫若遵泰伯之至德伯夷之清名季子之高節而後陛下之本心明於天下此臣所謂行大義以弭大謗䇿之上也當其廢立之間威動天下既立則𣺌視人主是故强臣挾恩以陵上小人恃强以無上久則内外相為一體為上者喑黙以聽其所為日脧月削殆有人臣之所不忍言者威權以去人主雖欲固其位保其身有不可得宣繒彌逺之肺腑也王愈其耳目也盛章李知孝其鷹犬也馮榯其爪牙也彌逺之欲行某事害某人則此數人者相與謀之曷嘗有陛下之意行乎其間哉臣以為不除此數兇陛下非惟不足以弭謗亦未可以必安其位然則陛下何憚久而不為哉此臣所以謂收大權以定大位䇿之次也次而不行又有一焉曰除大姦然後可以息大難李全一流民耳寓食於我兵非加多土地非加廣勢非特盛也賈渉為帥庸人耳全不敢妄動何也名正而言順也自陛下即位乃敢倔强何也彼有辭以用其衆也其意必曰濟王先皇帝之子也而彌逺放弑之皇孫先皇帝之孫也而彌逺戕害之其辭直其勢壯是以沿淮數十萬之帥而不敢睥睨其鋒雖曰今暫無事未能必知其不一日羽檄飛馳以濟王為辭以討君側之惡為名彌逺之徒死有餘罪不可復惜宗社生靈何辜焉陛下今日而誅彌逺之徒則全無辭以用其文矣上而不得則思其次次而不得則思其下悲夫奏上彌逺以筆横抹之秋七月罷工部尚書陳德剛金部員外郎洪咨䕫以論濟王之寃忤史彌逺故也竄大理評事胡夢昱于象州夢昱上言濟王不當廢引晋太子申生漢戾太子及秦王廷羙之事為證言甚切直史彌逺諷御史李知孝劾之故竄二年八月追降巴陵郡公竑為縣公從李知孝之請也端平元年詔復故濟王竑官爵太常少卿徐僑常侍講開陳友愛大義帝悟乃命復竑官爵有司檢視墓域以時致祭時竑妻呉氏自請為尼特賜號慧靜法空大師紹興府月給衣資緡錢金河北山東之沒寧宗嘉定八年冬十月蒙古主駐軍魚兒濼遣僧格巴圖帥萬騎自西夏趨京兆以攻金潼闗不能下乃由蒿山小路趨汝州遇山磵輒以鐵鎗相鎖連接為橋以渡遂赴汴京金主急召花帽軍於山東蒙古兵至杏花營距汴京二十里花帽軍擊敗之蒙古兵還至陜州適河氷合遂渡而北金人專守闗輔時蒙古兵所向皆下金主遣使求和蒙古欲許之謂徹爾瑪哈曰辟如圍場中獐鹿吾已取之矣掩羣有戒盍遂舍之徹爾瑪哈恥于無功不從遣人謂金主曰若欲議和以河北山東未下諸城來獻及去帝號稱臣當封汝為王議遂不成十二月蒙古以張鯨總北京十提控兵從圖埒訥色伯特南征鯨懷反側穆呼哩覺之令蕭額森監其軍至平州鯨稱疾逗遛不進額森執而殺之鯨弟致憤其兄被害乃殺長史復據錦州自稱瀛王改元興隆掠平灤瑞利義懿廣寧等州下之穆呼哩帥先鋒蒙古巴哈權帥烏葉爾等軍討之州郡皆降蒙古是年蒙古取金城邑凡八百六十有二九年夏四月金知平陽府胥鼎聞蒙古兵渡潼闗遣必拉克阿嚕台圖克坦伯嘉帥兵萬五千由便道濟河以趨闗陜自以精兵援汴京又遣布薩繅古出師兵㑹諸將以拒蒙古兵之自闗而東者金主以其忠拜鼎尚書左丞還平陽冬十月蒙古兵次嵩汝間金御史臺言敵兵踰潼闗崤沔深入重地近抵西郊彼知京師屯宿重兵不復叩城索戰但以遊騎遮絶道路而别兵攻擊州縣是亦困京師之漸也若專以城守為事中都之危又將見於今日况公私畜積視中都百不及一此臣等所以寒心也願陛下命陜西兵扼距潼闗與阿里布色為犄角之勢選在京勇敢之將十數各付精兵隨宜伺察且戰且守復諭河北亦以此待之金主以奏付尚書省平章珠格高琪曰臺官素不習兵備禦方畧非所知也遂止高琪以蒙古兵日逼欲以重兵屯駐汴京以自固州郡殘破不復恤金主惑之國勢益衰十一月蒙古穆呼哩以張致兵精且依險為阻欲設竒取之乃遣烏葉爾等别攻溜石山堡且諭之曰汝等急攻溜石賊必遣兵往援我出其不意斷其歸路可一戰擒也又令蒙古巴哈别屯永德縣西十里以伺之致聞溜石被圍以兵救蒙古巴哈遣騎扼其歸路且馳報穆呼哩夜半引軍疾馳比曙抵神水與致遇而蒙古巴哈兵亦㑹前後夾擊大破之致遂奔潰進圍錦州致屢戰不利乃閉門拒守月餘其監軍高益縛致出降穆呼哩殺之金胥鼎慮蒙古兵扼河乃檄絳解隰吉孟五州經畧司相與㑹師為夾攻之勢及蒙古自三門析津北渡至平陽鼎遣兵拒戰蒙古兵敗去金人復潼闗金以苖道潤為中都經畧使道潤有勇畧敢戰闘前後撫定五十餘城署保定張柔為元帥左監軍十年三月金主徴山東兵接應苖道潤共復中都而石海方據眞定叛慮為所梗乃集鈕祜禄珍郭文振及威州刺史武仙所部精鋭與東平為犄角之勢圖之武仙遂率兵斬石海及其黨二百餘人金以武仙同知眞定府事十二月蒙古主以穆呼哩有佐命功拜太師國王承制行事賜誓劵金印分鴻吉哩等十軍及蕃漢諸軍並𨽻麾下建行省於燕雲且謂之曰太行之北朕自經畧太行之南卿其勉之穆呼哩乃自中都南攻遂城及蠡州皆下之初蠡州拒守力屈乃降穆呼哩怒將屠其城時州人趙瑨從穆呼哩為署百户泣曰母與兄在城中乞以一身贖一城之命哀懇切至穆呼哩義而許之遂東擊齊定益都臨淄登萊濰宻等州而去十一年五月金將苖道潤為其副賈瑀所殺張柔檄召道潤部曲共討瑀㑹蒙古兵出自紫荆闗柔遇之遂戰于狼牙嶺柔馬跌為蒙古所執至軍前見主帥明安立而不跪左右强之柔叱曰彼帥我亦帥也大丈夫死即死終不偷生為他人屈明安壯而釋之蒙古以柔為河北都元帥八月蒙古穆呼哩圍太原環之數匝金元帥烏庫哩德升力拒之城西北隅壞德升聮車塞之三却三登矢石如雨守陴者不能立城破德升至府署謂其姑及妻曰吾守此數年不幸力窮乃自縊而死行省參政李革守平陽兵少援絶城陷或謂革宜上馬突圍出革歎曰吾不能保此何靣目見天子汝輩可去矣遂自殺節度使完顔鄂爾多守汾州元帥右監軍納哈塔布拉克圖守潞州城破皆力戰而死十二年五月金築汴京裏城初珠格高琪請修南京裏城金主曰此役一興民滋病矣雖完固能獨安乎高琪固請築之既而金主慮擾于民募人能致甓五十萬者遷一官百萬升一等於是平陽判官完顔阿拉左廂譏察霍定知發蔡京故居得甓二百萬有竒准格遷賞金主忽問曰人言此役恐不能就高琪曰茍防城有法正使兵來臣等愈得効力金主曰與其臨城曷若不令至此為善高琪無以對及城成高琪受金鼎之賞建碑書功于㑹朝門蒙古使張柔率兵南下遂克雄易保安諸州殺賈瑀進兵次滿城金將武仙㑹鎭定深冀兵數萬攻之柔全軍適出帳下纔數百人柔命老弱婦女乘城自率壯士突出仙軍後毀其攻具䇿馬杖槊大呼入圍仙兵皆披靡柔緣山多張旗幟聲言救至曳柴揚塵鼔譟以進仙兵大潰柔追擊之尸陳數十里乘勝攻下完州復敗仙將葛鐵鎗于新樂遂南掠深澤寧晋諸縣由是深冀以北鎮定以東三十餘城望風降附柔威名震于河朔十二月金殺右丞相珠格高琪高琪自執政專固權寵擅作威福與平章政事高汝礪相倡和高琪主機務汝礪掌利權附已者用不附者斥凡言事忤意及負才力或與已頡頏者對金主陽稱其才使幹當于河北隂置之死地又以已為相不得兼樞宻元帥以攬兵柄乃與汝礪力勸金主南侵置河北于意外凡精兵皆集河南茍且歲月不肯輙出一卒以應方靣之急至是使奴薩布殺其妻因歸罪于薩布而殺之以滅口事覺金主久知其奸遂下高琪于獄殺之初金主將遣汴欲置乣軍于平州高琪難之及發中都金主戒搏多厚撫乣軍而搏多輒殺人且勸金主取其元給器用故有多木達之難而中都以亡金主嘗嘆曰壞天下者高琪搏多二人也十三年夏四月金封經畧使王福等九人為郡公分河北山東地以𨽻之初太原為蒙古所有河北州縣不能自立金主詔百官議所以為長久之計圖克坦鎬等言制兵有三曰戰曰和曰守今欲戰則兵力不足欲和則彼不肯惟有守耳河朔州郡既殘毀不可一槩守之宜取願就遷徙者屯于河西陜西不願者許自推其長保聚險阻宣徽使伊喇光祖等謂當募土人威望服衆者假以方靣重權能復一道即授以本道總管能捍州郡即授以長佐必能各保一方宰臣欲置公府金主意未决中丞完顔伯嘉曰宋人以虛名致李全遂有山東茍能綂衆守土萬鍾三公何惜金主曰他日事定公府無乃多乎伯嘉曰若事定以三公就節鎮何不可金主從之同時九府惟武仙號富强秋七月金使烏庫哩仲端如蒙古求和呼蒙古主為兄蒙古主不允八月蒙古穆呼哩至滿城使蒙古巴哈將輕騎三千出倒馬闗適金恒山公武仙遣葛鐵槍戰敗仙遂舉城降史天倪説穆呼哩曰今中原已漸定而大兵所過猶縱鈔掠非王者吊民伐罪之意且王為天下除暴豈可效他軍所為乎穆呼哩善之即下令禁剽掠遣所俘老㓜軍中肅然冬十月蒙古主遣達呼報金謂烏庫哩仲端曰向欲汝主授我河朔地彼此罷兵汝主不從今念汝逺來河朔既為我有闗西數城未下者其割付我令汝主為河南王勿復違也十一月蒙古穆呼哩入濟南金嚴實挈所部三府六州户三十萬詣軍門降穆呼哩承制拜實行尚書省事實將李信乘實出殺其家屢謀歸朝實攻信殺之復取青崖崓以魏博等郡歸蒙古時金兵二十萬屯黄陵岡遣歩卒二萬襲穆呼哩于濟南穆呼哩迎戰敗之遂薄黄陵岡金兵陣河南岸穆呼哩令騎下馬短兵接戰金兵大敗溺死者甚衆穆呼哩遂進陷楚丘由單州趨東平圍之十二月蒙古穆呼哩因金兵固守東平不下乃謂嚴實曰東平糧盡必棄城去若然汝即入城安輯之勿苦郡縣以敗事也乃留索隆噶圖以蒙古兵屯守之以嚴實權行省謂千户薩里台曰東平破可命嚴實石珪分城内南北以守之遂北還金易水公靖安民出兵至礬山取擔車寨㑹蒙古兵圍安民所居山寨守寨者以安民妻子及老弱出降安民軍中聞之駭亂衆議欲降以保妻子安民不從遂為其所殺十四年夏四月金東莒公燕寧與蒙古兵戰敗死五月蒙古兵圍東平日久餉道復絶行省蒙古綱監軍王庭玉不能守率衆南趨邳州蒙古索隆噶圖邀擊斬首七千級嚴實遂入城建行省於府第薩里台以穆呼哩命中分其城以嚴實撫安東平以北恩愽等州石珪移治曹州冬十月蒙古穆呼哩由東勝州渉河引兵而西㑹西夏兵五萬復引而東入葭州金將王公佐遁穆呼哩以石天應守葭自將兵攻綏徳十一月蒙古穆呼哩攻延安金元帥哈達與納哈塔敏珠爾禦之哈逹以兵三萬陣于城東蒙古將蒙古巴哈以騎士三千趨之約夜半伏發穆呼哩乃命軍士銜枚濳進伏於城東兩谷間明日蒙古巴哈望見金兵佯棄旗鼓走金兵追之穆呼哩出伏乘其後鼔鼙震天金兵大亂穆呼哩追殺七千餘人合逹走入延安城堅壁不出穆呼哩以城堅難猝㧞乃留軍圍之而自將兵南攻鄜坊等州十五年秋七月金平陽公胡天作降于蒙古時穆呼哩徇青龍堡天作遂降冬十月蒙古穆呼哩取金河中所過州縣皆下時金于牛心寨僑治吉州事穆呼哩自隰州攻之知州楊貞令妻孥先墜崖已從之皆死穆呼哩入寨留兵守之且使蒙古巴哈引遊騎出秦隴以為聲援及視山川夷險而自將兵下孟州晋陽霍邑等寨以石天應權行臺平陽太原吉隰等帥並受節制穆呼哩遂趨長安使烏古納台哈布哈屯守之遣安赤將兵斷潼闗是年蒙古主入西域諸國進次痕都斯坦國鐵門闗侍衛見一獸鹿形馬尾綠色而獨角能為人言謂之曰汝君宜早囘蒙古主怪之以問耶律楚材對曰此獸名角端觧四夷語是惡殺之象今大軍征西已四年葢上天惡殺遣之告陛下願承天心宥此數國人命實無疆之福蒙古遂大掠痕都斯坦而還十六年春正月蒙古穆呼哩攻鳯翔府晝夜苦戰四十餘日不下將由河中北還金元帥右都監侯孝順襲河中破之殺石天應焚浮橋而退穆呼哩以天應子鄂特代領其衆初金主命元帥都監阿嚕岱守河中阿嚕岱恇怯不能軍竭民膏血為浚築之計及絳州破阿嚕岱懼馳奏河中孤城不可守上謂果不可守則棄之無至資敵阿嚕岱遂棄河中燒民居官舍一二日而盡尋有言河中重鎮國家基本所在設為敵人所據則大河之險我不得專恃矣金主命有司復修葺之終不能成故隨守隨陷三月蒙古穆呼哩自河中帥師還至觧州聞喜縣疾篤謂弟岱遜曰我為國家助成大業干戈垂四十年無復遺恨所恨者汴京未下耳汝等勉之言訖而卒是年金主珣殂太子守緒立蒙古取汴理宗寶慶三年五月蒙古遣使責歲幣于金六月金使請和于蒙古是月蒙古主滅夏以夏主睍歸十二月蒙古入京兆闗中大震復以兵破闗外諸隘時金人盡棄河北山東闗陜惟併力守河南保潼闗自洛陽三門析津東至邳州之源雀鎮東西二千餘里立四行省帥精兵二十萬以守禦之蒙古主特穆津殂于六盤山臨卒謂左右曰金精兵在潼闗南據連山北限太河難以遽破若假道于宋宋金世讐必能許我則下兵唐鄧直擣大梁金急必徵兵潼闗然以數萬之衆千里赴援人馬疲敝雖至勿能戰破之必矣言訖而卒紹定元年三月蒙古兵入大昌原金平章政事完顔哈逹以忠孝軍提控完顔陳華善為前鋒陳華善擐甲上馬以四百騎大敗蒙古八千之衆士氣皆倍葢自有蒙古之難二十年間始有此㨗奏功第一名震國中授定逺大將軍世襲謀克忠孝一軍皆囘鶻乃蠻羌渾及中原被俘避罪來歸者鷙狠難制陳華善馭之有方坐作進退皆中程式所過州邑秋毫無犯每戰則先登陷陣諸軍倚以為重二年冬十月蒙古兵圍金慶陽三年春正月蒙古兵入金大昌原金將伊喇莽阿敗之慶陽圍觧八月蒙古史天澤攻金武仙于汲先是武仙既降蒙古復殺蒙古將史天倪以叛天倪弟天澤屢擊敗之復真定仙歸金金復封為恒山公置府衛州史天澤合諸軍圍之金將完顔哈逹率衆來援蒙古兵皆北天澤獨以千人繞出仙後仙走屯胡嶺闗冬十月蒙古諤格徳依帥衆入陜西初蒙古使諤爾根至陜西議和金行省伊喇莽阿赫舍哩約赫徳等懼其泄事機留之及莽阿既解慶陽之圍志意驕滿乃遣諤爾根還謂之曰我已凖備軍馬能戰則來諤爾根還見蒙古主白之蒙古主怒即與其弟圖類帥衆入陜西翺翔京兆同華之間破諸山砦柵六十餘所遂趨鳯翔金以平原政事完顔哈逹及伊喇莽阿行省事于閿鄉以備潼闗四年夏四月蒙古圍鳯翔府金行省哈逹莽阿逗遛不進金主遣樞宻判官巴哈往諭之哈逹莽阿言北兵勢盛不可輕進巴哈還金主復遣諭以鳯翔圍久恐守者不能支可領軍出闗畧與渭北軍人交手計北軍聞之必當奔走少舒鳯翔之急哈逹莽阿乃始出闗行至華隂界與渭北軍交戰比晩收軍入闗不復顧鳯翔矣蒙古遂取鳯翔哈逹莽阿遷京兆民于河南使完顔慶善努戍之金完顔陳華善敗蒙古將蘇布特于倒囘谷五月金降人李昌國言于蒙古圖類曰金遷汴將二十年其所恃以安者潼闗黄河耳若出寶鷄以侵漢中不一月可逹唐鄧大事集矣圖類然之白于蒙古主蒙古主乃㑹諸將期以明年正月合南北軍攻汴遣圖類先趨寶鷄蘇布特來假道淮東以趨河南且請以兵㑹之秋七月蘇布特至沔州青野原綂制張宣殺之托壘聞蘇布特死曰宋自食言背盟棄好今日之事曲直有歸矣八月蒙古圖類分騎兵三萬入大散闗攻破鳯州徑趨華陽屠洋州攻武休開生山截焦崖出武休東南遂圍興元軍民散走死于沙窩者數十萬分軍而西西軍由别路入沔州取大安軍路開魚鱉山撒屋為筏渡嘉陵江入闗堡並江趨葭萌畧地至西水縣破城寨百四十而還東軍屯于興元洋州之間以趨饒風闗九月蒙古主將兵圍河中急金完顔慶善努棄京兆東還僉樞草火額爾克元帥板子額爾克懼軍力不足截故城之半以守蒙古築松樓高二百尺下瞰城中土山地穴百道並進晝夜力戰樓櫓俱盡白戰又半月力竭城陷草火額爾克猶親搏戰數十合始被擒就死板子額爾克以敗卒三千奪船走閿鄉初板子額爾克在鳯翔為監戰奉御六兒所制有隙及改河中總帥同赴召六兒遂譛額克奉㫖防秋畏怯違避金主信之至是怒其不能死節因杖殺之兩額爾克皆内族一得賊好以草火燒之一嘗誤呼宫中牙牌為板子故時人因以别之十一月蒙古圖類攻饒風闗入之由金州而東將趨汴京民皆入保城壁險阻以避之金主召宰執臺諌入議皆曰北軍冒萬里之險歴二年之久方入武休其勞苦已極為吾計者以兵屯睢鄭昌武歸徳及京畿諸縣以大將守洛陽潼闗懷孟等處嚴兵備之京師積糧數百萬斛令河南州郡堅壁青野彼欲攻不能欲戰不得師老食盡不擊自歸矣金主太息曰南渡二十年所在之民破田宅鬻妻子以養軍士今敵至不能迎戰徒以自保京城雖存何以為國天下其謂我何朕思之熟矣存亡有天命惟不負吾民可也乃詔諸將屯襄鄧十二月哈逹莽阿帥諸軍入鄧州楊沃衍陳華善武仙兵皆㑹之遂出屯順陽圖類將兵渡漢江哈逹莽阿召諸將議由光化截江與戰及放之渡而後戰孰是張惠額徳木皆曰截江便縱之渡則我腹内空虚必為所潰莽阿曰使彼在沙磧且當往求之况自來乎未幾蒙古兵畢渡哈逹莽阿始進至禹山分據地勢列歩卒于山前列騎士于山後蒙古兵觀之竟不前陣散如鴈翅轉山麓出金騎兵之後分三隊而來哈逹曰今日之勢未可戰也俄而蒙古騎兵突前金兵不得不戰短兵接三合蒙古兵少却其在西者望莽阿親軍環繞甲騎後而突之金富察鼎珠力戰始退哈逹曰彼衆號三萬而輜重居其一今相持二三日彼不得食若乘其郤而擁之必勝矣莽阿曰江路已絶黄河不氷彼入重地將安歸乎何以速為遂不逐明日蒙古兵忽不見邏騎還始知在光化對岸棗林中晝作食夜不下馬已而四日林外不聞音響哈逹莽阿議入鄧州就糧辰已間到林後蒙古忽至哈逹莽阿迎戰交接之際蒙古以百騎邀兩行省輜重而去金兵幾不成列逮夜二鼓哈逹莽阿乃入鄧州城懼軍士迷路鳴鐘招之哈逹莽阿隠其敗以大㨗聞百官表賀諸相置酒省中左丞李蹊且喜且泣曰非今日之㨗生靈之禍其可勝言哉葢以為實然也於是民保城堡者皆散還鄉社不數日蒙古游騎突至多被俘獲五年春正月金主聞蒙古兵趨汴召羣臣議尚書令史楊居仁請乘其逺至擊之平章巴薩不從而遣瑪爾沁楚等部民丁壯萬人開短堤决河水以衛京城命𤓰爾佳薩哈將歩騎三萬廵河渡起近京諸色軍家屬五十萬口入京城蒙古主用西夏人恤可計自河中由河清縣白坡渡河遣人馳報圖類以師來㑹𤓰爾佳薩哈行至封丘而還蒙古兵奄至瑪爾沁楚等皆死丁壯得免者僅三百蒙古主入鄭州遣蘇布特攻汴金主召羣臣議所守有言珠格高琪所築裏城决不可守外城决不可棄於是决計守外城命修樓櫓器具時京城諸軍不滿四萬而城周百二十里不能徧守故議以遷避之民充軍又召在京軍官於上清宫平日防城得功者截長補短假借而用得百餘人又集京東西沿河舊屯兩都尉及衛州義軍凡四萬併丁壯二萬分置四靣每靣選千名飛虎軍以專救應然亦不能軍矣命主命翰林學士趙秉文為赦文改元布宣悔悟哀痛之意指事陳義詞情俱盡聞者莫不感動洛陽人至於痛哭蒙古兵自禹山之戰散漫而北所過州縣無不降破遂自唐州以趨汴京金完顔哈逹伊喇莽阿自鄧州率歩騎十五萬赴援蒙古以騎三千尾之哈逹等謀曰敵兵三千而我不戰是弱也金軍至鈞州沙河蒙古兵不戰而退金軍方盤營蒙古兵復來襲金軍不得休息食飲且行且戰至黄榆店望鈞州二十五里雨雪不能進忽有㫖云兩省軍急赴京師哈逹等遂發蒙古兵自北渡者畢集前後以大樹塞道金將楊沃衍奪路得之金軍遂進次於三峯山軍士有不食至三日者蒙古兵以河北兵合四靣圍之熾薪燔肉更迭休息乘金困憊乃開鈞州路縱之走而以生兵擊之金軍遂潰聲如崩山武仙率三十騎入竹林中遂走宻縣楊沃衍樊澤張惠歩持大槍奮戰而死哈逹知大事已去欲下馬戰而莽阿已失所在哈逹遂與陳華善等以數百騎走入鈞州蒙古主在鄭州聞圖類與金相持遣扣肯布哈齊黙衮等赴之至則金軍已潰於是乃合攻鈞州塹其城哈逹匿窟室中城破發而殺之因揚言曰汝家所恃惟黄河與哈逹耳今哈逹為我殺黄河為我有不降何待陳華善趨避隱處殺掠稍定乃出自言曰我金國大將欲見白事蒙古兵士以數騎夾之詣圖類問其姓名曰我忠孝軍總領陳華善也大昌原衛州倒囘谷之勝皆我也我死亂軍中人將謂我負國家今日明白死天下必有知我者蒙古兵欲其降不肯乃斫足脛折之劃口吻至耳噀血而呼至死不屈蒙古將有義之者以馬潼酧而祝曰好男子他日再生當令我得之莽阿走蒙古兵追躡擒之械至官山圖類欲降之不從曰我金國大臣惟當金國境内死耳遂殺之金之徤將鋭卒自是俱盡不復可為矣二月金聞蒙古入饒風闗遣圗克坦烏勒登行省閿鄉以備潼闗圗克坦伯嘉為闗陜總帥便宜行事百官馳入陜榜縣鎮遷入大城糧斛輜重聚之陜州近山者入山寨避兵㑹阿里哈傳㫖召烏勒登援汴烏勒登遂與潼闗總帥納哈塔和碩秦藍總帥完顔重喜等帥軍十一萬騎五千盡撤秦藍諸闗之備從虢入陜同華閿鄉一帶軍糧數十萬斛備闗船二百餘艘皆順流東下俄聞蒙古兵近糧皆不及載船悉空下復盡起州民運靈寶硤石倉粟㑹蒙古游騎至殺掠不可勝計金守將李平以潼闗降于蒙古蒙古兵遂長驅至陜烏勒登發閿鄉軍士各以老㓜自隨由西南徑入大山氷雪中部將多叛去蒙古聞之自盧氏以數百騎追及之山路積雪晝日凍釋泥淖及脛隨軍婦女棄擲老㓜哀號盈路行至鐵嶺欲戰而饑憊於是重喜先降蒙古斬之於馬前金兵遂大潰烏勒登和碩從數十騎走山谷間追騎擒之皆被殺蒙古取金睢州圍歸德府金行省持嘉紐勒歡命經歴冀禹錫守禦禹錫竭其才智故得不陷金復以完顔薩布爲左丞相薩布先請致仕至是蒙古攻汴曰急財匱援絶金主大懼平章政事巴薩以爲勢必講和和議定則首相當往爲質乃力請金主起復薩布且括汴京民軍二十萬分𨽻諸帥三月蒙古立砲攻洛陽洛陽城中惟三峯潰卒三四千及忠孝軍百餘守禦而已留守薩哈連疽發於背不能軍遂投濠水死已而元帥任守貞復立府事及守貞援汴河南人共推齊克紳爲府僉事領所有軍二千五百人甫三日蒙古軍圍其三靣伸括衣帛爲幟立之城上率士卒赤身而戰以壯士數百往來救應大呼以憨子軍爲號其聲勢與萬衆無異兵器已盡以錢爲鏃得蒙古兵一箭截而為四以銅鞭發之又創遏砲用不過數人能發大石於百步外所擊無不中伸奔走四應所至必㨗蒙古益兵力攻凡三月餘不能㧞乃退蒙古主將北還遣使自鄭州至汴諭金主降且索翰林學士趙秉文衍聖公孔元宜等二十七家及歸順人家屬伊喇莽阿妻子并繡女鷹人等金主乃封荆王守純子額爾克為曹王命尚書左丞李蹊送之蒙古為質以請和諫議大夫費摩阿呼岱為講和使未行蒙古蘇布特聞之曰我受命攻城不知其他也乃立攻具沿濠列木柵驅漢俘及婦女老弱負薪草填濠頃刻平十餘歩平章巴薩以議和不敢與戰城中喧閧金主聞之從六七騎出端門至舟橋時新雨淖車駕忽出都人驚愕失措但跪於道旁老㓜遮擁至有誤觸金主衣者少頃宰相從官皆至進笠不受曰軍中暴露我何用此西南軍士五六十輩進曰北兵填濠過半平章傳令勿放一鏃恐壞和事豈有此計耶金主曰朕以生靈之故稱臣進奉無不順從止有一子養未長成今往作質子矣汝等畧忍待曹王出韃靼不退汝等死戰未晩是日曹王行蒙古兵併力進攻金龍徳宫造砲石取艮嶽太湖靈壁假山為之大小各有斤重其圓如燈毬之狀蒙古兵用砲則不然破大磑或碌碡為二三皆用之攅竹砲有至十三稍者餘砲稱是每城一角置砲百餘枚更迭上下晝夜不息數日石幾與裏城平而城上樓櫓皆故宫及芳華玉溪所拆大木為之合抱之木隨擊而碎以馬糞麥秸布其上綱索旃褥固護之其懸風板之外皆以牛皮為障蒙古兵以火砲擊之隨即延爇不可撲救父老所傳周世宗築京城取虎牢土為之堅宻如鐵受砲所擊惟凹而已蒙古兵濠外築城圍百五十里城有北口樓櫓壕深丈許濶亦如之約三四十歩置一舖舖置百許人守之初巴薩命築門外短墻委曲陿隘容二三人得過以防蒙古兵奪門及被攻諸將請乘夜斫營軍乃不能猝出比出又為蒙古所覺後又募死士千人穴城由濠徑渡燒其砲座城上懸紅紙燈為應約燈起渡濠又為蒙古所覺又放紙鳶置文書其上至蒙古營則斷之以誘被俘者識者謂宰相欲以紙鳶紙燈退敵難矣時有火砲名震天雷者用鐵鑵盛藥以火㸃之砲起火發其聲如雷聞百里外所爇圍半畆以上火㸃著鐡甲皆透蒙古又為牛皮洞直至城下掘城為龕間可容人則城上不可柰何矣人有獻䇿者以鐵繩懸震天雷順城而下至掘處火發人與牛皮皆破迸無迹又有飛火槍注藥以火發之輙前燒十餘歩人亦不敢近蒙古惟畏此二物蒙古攻城十六晝夜内外死者以百萬計於是金主母明惠皇后陵被發蘇布特知不可取乃為好語曰兩國已講和更相攻耶金人因就應之乃遣户部侍郎楊居仁出宜秋門以酒炙犒蒙古兵且以金帛珍異賂之蘇布特乃許退兵散屯河洛之間叅政持嘉喀齊喀以守城為已功欲率百官入賀叅政内族色哩曰城下之盟春秋以為耻况以罷攻為可賀耶喀齊喀怒曰社稷不亡君后免難汝等不以為喜耶乃命趙秉文為表秉文曰春秋新宫災三日哭今園陵如此酌之以禮當慰不當賀乃已金主御端門肆赦改元天興詔内外官民能完復州郡者功賞有差出金帛酒炙犒飫軍士减御膳罷冗員放宫女上書不得稱聖改聖㫖為制㫖釋衛紹王族禁錮汴京觧嚴歩兵始出封丘門外采蔬薪五月金汴京大疫凡五十日諸門出柩九十餘萬貧不能塟者不在是數尋以疫後園户僧道醫師鬻棺者擅厚利命有司倍征之以助國用秋七月金飛虎卒申福等殺蒙古行人唐慶等三十餘人於館金主不問和議遂絶金恒山武仙等㑹兵救汴初三峯之敗仙走南陽收潰軍得十萬人屯留山汴京被圍金主詔仙與鄧州行省完顔思烈鞏昌總帥完顔呼沙呼合兵入援仙至宻縣東遇蒙古兵即按軍眉山店報思烈曰阻間結營待仙至俱進思烈急欲至汴不聽金主又命樞宻使持嘉喀齊喀帥兵應仙思烈等至京水蒙古乘之不戰而潰仙衆亦散走還留山喀齊喀屯中牟三日聞思烈軍潰即夜棄輜重馳還八月金主以和議既絶懼兵再至乃復僉民兵為守禦備遂括汴京粟以完顔珠赫等主之置局以推舉為名珠赫諭民曰汝等當從實推舉果如一旦糧盡令汝妻子作軍食復能吝否既而罷括粟復以進奉取之且賣官及令民買進士第前御史大夫内族哈周復覬進用建言京城括粟尚可得百萬石金主乃命哈周為叅知政事與左丞李蹊復括之哈周先令各家自實壯者存石有三斗㓜者半之仍書其數門首敢有匿者以升斗論罪京城三十六坊各選深刻者主之完顔玖珠尤酷暴有寡婦二口實豆六斗内有蓬子約三升玖珠笑曰吾得之矣執寡婦以令衆婦泣訴曰妾夫死于兵姑老不能為養故雜蓬粃以自食耳非敢以為軍儲也且三升六斗之餘也玖珠不聽竟杖死聞者股慄盡棄其餘于糞溷中或白于李蹊蹊顰蹙曰白之叅政及白哈周哈周曰花不損何由成蜜且京城危急今欲存社稷耶存百姓耶衆莫敢言所括不能三萬斛而滿城蕭然死者相枕貧富束手待斃而已遂至人相食金主聞之出太倉米作粥以食餓者翰林直學士錫黙愛實嘆曰與其食之寧如勿奪為奉御博諾所告金主怒送愛實有司近侍李大節救免十二月金汴京糧盡援絶勢益危急召諸臣入議或言歸徳四靣皆水可以自保或言宜沿西山入鄧或言設欲入鄧蒙古蘇布特在汝州不如取陳蔡路轉往鄧下金主未决乃起院判巴哈為右司郎中問之華言歸徳城雖堅久而食盡坐以待斃决不可往既汝州有蘇布特則鄧下亦不可往計今事勢當直赴汝州與之一决汝州戰不如半途戰半途戰不如出城戰葢我軍食力猶在也若出京益逺軍食益减馬食野草事益難矣若我軍便得戰存亾决此一舉外則可激三軍之氣内則可慰都人之心或止為避遷之計人心顧戀家業未必毅然從行請詳審之金主不從而集軍士於大慶殿諭以京城食盡今擬親出諸將佐合辭奏曰聖主不可親出止可命將金主以富察古納為馬軍帥高顯為歩軍帥劉益副之三人者欲奉命叅政内族恩楚曰汝輩把鋤不知高下國家大事敢易承耶衆黙然古納曰若將相可了何至使我輩事亦中止遂以右丞相薩布平章巴薩右副元帥恩楚左丞相李蹊元帥左監軍圗克坦伯嘉等帥諸軍扈從叅政努申樞副兼知開封錫琳阿巴裏城四靣都總領珠赫外城元帥東靣博斯和南面持嘉約爾珠西靣崔立北靣富珠哩瑪努勒等留守乃發府庫及内府器皿宫人衣物賜將士民間閧傳車駕往歸徳軍士家屬留汴目今食盡坐視城中俱餓死矣縱能至歸徳軍馬所費支吾復得幾許日金主使布宣言曰前日廵狩之議為巴哈改今往汝州索戰矣金主發汴京與太后皇后妃主别大慟至開陽門詔諭留守兵士曰社稷宗廟在此汝等壯士毋以不與進發之數便謂無功將來功賞豈在戰士下聞者皆灑泣是日鞏昌元帥呼沙呼援兵至言于金主曰京西三百里之間無井竈不可徃不如幸秦鞏金主决意東行進次黄陵岡巴薩擊蒙古降其兩寨得河朔降將金主赦之授以印符羣臣固請以河朔諸將前導鼔行入開州取大名東平豪傑當有響應者鄂敦察遜曰太后中宫皆在南京北行萬一不如意聖主孤身欲何所為不如先取衛州還京為便巴薩曰京師且不能守就得衛州欲何為耶金主惑之遂一意向河朔蒙古蘇布特聞金主棄汴復進圍之六年春正月金主遣使徴糧於歸德總帥持嘉紐勒歡送糧千五百石至蒲城東六軍給糧盡因留船二百張布為幄金主遂乘以濟河㑹大風後軍不克濟蒙古呼爾古納追擊于南岸金元帥賀徳喜力戰而死金兵溺者近千人金主次于北岸望之震懼次于漚麻岡遣巴薩帥師攻衛州至城下以御旗招之城中不應蒙古聞之自河南渡河巴薩遂退師蒙古史天澤以騎兵踵其後戰于白公廟金師敗績巴薩棄軍東遁元帥劉益上黨公張開皆為民家所殺金主進次魏樓村猶欲俟蒙古兵至决戰少頃巴薩至倉皇言軍已潰北兵近在隄外請幸歸德金主遂與副元帥哈喇齊等六七人夜登舟潜渡河走歸德翌日諸軍始聞金主棄師遂大潰金主入歸德遣奉御持嘉達實布往汴京奉迎太后及后妃諸軍怨憤金主乃暴巴薩罪殺之初瀕河居民聞金主北渡築垣塞户濳伏洞穴見富察古納一軍號令明肅所過無絲毫犯老㓜婦女無復畏避及巴薩往衛州縱軍四掠哭聲滿野所過丘墟一飯之費至數十金公私皇皇民始思叛故衛州堅守而蒙古之追無來援者以至于敗初汴人以金主親出師日聽㨗報及聞軍敗始大懼時蘇布特攻城日急内外不通米升至銀二兩殍死相望縉紳士女多行乞于市至有自食妻子者諸皮器物皆煑充饑貴家第宅市樓肆館皆撤以㸑及金主遣使至汴奉迎兩宫人情益不安西南元帥崔立性淫姣因民洶洶濳謀作亂左司都事元好問謂錫琳阿巴曰自車駕出京今二十日許又遣使迎兩宫民間皆謂國家欲棄京城相公何以處之錫琳阿巴曰吾二人惟有一死耳好問曰死不難誠能安社稷救生靈死可也不然徒欲以一身飽五十紅衲軍亦謂之死耶錫琳阿巴不荅時兩宫已出至陳留見城外二三處火起疑有兵復馳還汴京明日崔立㧞劒指完顔納紳及錫琳阿巴曰京城危困已極二公坐視何也二相曰有事當好議之何遽如是立麾其黨先殺錫琳阿巴次殺納紳及左司郎中納哈塔輝等十餘人即諭百姓曰吾為二相閉門無謀今殺之為爾一城生靈請命衆皆稱快立遂勒兵入宫集百官議所立立曰衛紹王太子從恪其妹公主在北兵中可立之乃遣其黨韓鐸以太后命往召從恪至以太后誥命為梁王監國百官拜舞立自為太師都元帥尚書令鄭王弟倚為平章政事侃為殿前都㸃檢其黨皆拜官元好問亦為左右司員外郎遂送欵詣蘇布特軍蘇布特至青城立服御衣儀衛往見之蘇布特喜飲之酒立以父事之還城悉燒樓櫓蘇布特益喜始信其實降也立託以軍前索隨駕官吏家屬軍民子女聚之省中親閲之日亂數人猶以為不足乃禁民間嫁娶有以一女之故至數人死者未幾遷梁王及宗族近屬于宫中以腹心守之限其出入以荆王府為已私第取内府珍玩充實之羣小附和請建功德碑翟奕以尚書省命翰林學士王若虚為文若虚私謂好問曰今召我作碑不從則死作之則名節掃地不若死之爲愈然我姑以理諭之乃謂奕曰丞相功德碑當指何事為言奕曰丞相以京城降活生靈百萬非功德乎若虚曰學士代王言功德碑謂之代王言可乎且丞相既以城降則朝官皆出其門自古豈有門下人為主帥頌功德而可取信于後世者乎奕雖殘虐聞之不能對而去事遂得已史臣曰崔立乘時僣竊大肆淫虐其為罪不容誅矣金俘人之主帝人之臣百年之後適啓崔立之狂謀以成青城之烈禍曾子曰戒之戒之出乎爾者反乎爾者也豈不信哉夏四月金崔立以天子衮冕后服進于蘇布特又括在城金銀搜索熏灌訊掠慘酷貴族富人不堪其毒竊相語曰攻城之後七八日中諸門出塟者凡百萬人恨不早預其數而値此也立時與其妻入宫兩宫賜之不可勝計立因諷太后作書陳天時人事遣金主乳母入歸德招降立遂以太后王氏皇后圖克坦氏梁王及荆王守純諸妃嬪凡車三十七兩宗室男女五百餘人衍聖公孔元措名儒梁陟及三教醫流工匠繡女赴青城蘇布特殺二王及宗屬而送后妃等于和林在道艱楚萬狀尤甚于徽欽之時蘇布特入汴城立時在城外兵先入其家取其妻妾寶玉以出立歸大慟而已初蒙古之制凡攻城不降矢石一發則屠之汴京既陷蘇布特遣使言于蒙古主曰此城相抗日久士卒多傷請屠其城耶律楚材聞之馳見蒙古主曰將士暴露數十年所爭者土地人民耳得地無民將焉用之蒙古主未許楚材又曰凡弓矢甲仗金玉等匠及官民富貴之家皆聚此城殺之則一無所得是徒勞也乃詔除完顔氏一族外餘皆原免時避兵在汴者尚百四十萬户皆得保全遂為定制㑹蒙古兵滅金理宗紹定五年十二月䝉古遣王檝來京湖議夾攻金史嵩之以聞朝臣皆以為可遂復讐之舉獨趙范不喜曰宣和海上之盟厥初甚堅迄以取禍不可不鑒帝不從命嵩之報使許之嵩之乃遣鄒伸之往報蒙古俟成功以河南地來歸六年三月金主在歸德隨駕親軍及河北潰軍漸集持嘉紐勒歡懼不能給白于金主乞遣出城及就糧于徐陳宿三州金主不得已從之止留元帥富察古納忠孝馬軍四百五十人馬用軍七百人於城中諸軍既出城金主召古納謂曰紐勒歡盡散衛兵卿當小心古納以馬用本歸德小校一旦㧞起心常輕之又以金主時獨召用計事而不及已因謀圖用時蒙古特們德爾圍亳州且日遣兵薄歸德民心搖搖古納請北渡河再圖恢復紐勒歡沮之古納不悦乃私與完顔用安謀邀金主幸海州金主不從古納積忿異志益定李蹊以聞金主深憂之乃諭馬軍總領赫舍哩阿里哈内族錫馨隂察其動靜阿里哈反以金主意告古納金主復懼古納馬用相圖因以為亂命宰執置酒和解之馬用即撤備古納乘隙率衆攻用殺之遂以卒五十人守行宫刼朝官聚于都水毛和寜宅以兵監之驅紐勒歡至其家悉出所有金貝然後殺之乃遣都尉馬實被甲持刄刼直長把納紳於金主前金主擲所握劒於地謂實曰為我言于元帥我左右止有此人且留侍我實乃退古納因大殺朝官李蹊以下凡三百人軍士死者三千人薄暮古納提兵入見言紐勒歡反臣殺之矣金主不得已暴紐勒歡罪而以古納權叅知政事夏四月金唐鄧行省武仙次于順陽與唐州守將武天錫鄧州守將伊喇瓊相犄角謀迎金主入蜀遂犯光化其鋒甚鋭孟珙逼天錫壘一鼓㧞之壯士張子良斬天錫首以獻俘將士四百餘人又敗金人于吕堰俘獲不可勝計遂攻順陽武仙敗走馬蹬山縣令李英及申州安撫張林皆以城降伊喇瓊孤立而懼遣使謀䧏珙納之為易衣冠以賔禮見於是降者相繼珙言于史嵩之曰歸附之人宜因其鄉土而使之耕因其人民而立之長少壯籍為軍俾自耕自守才能者分以土地任以職事各招其徒以殺其勢嵩之從之五月金富察古納襲敗䝉古軍於亳州初衛州白公廟之潰古納母為䝉古所獲金主命古納因其母以計請和古納乃宻與特們德爾言欲刼金主以降特們德爾信之還其母因定和計古納乃日往來講議或乘舟中流㑹飲金主又宻令古納以金銀牌與來使而拘之遂定斫營之䇿端午日祭天軍中隂僃火槍戰具古納率忠孝軍四百五十人自南門登舟由東而北夜殺守隄邏卒徑至王家寺特們徳爾之營金主御北門繫舟待之慮不勝則走徐州四更接戰忠孝軍郤而復進古納以小船分軍五七十出栅外腹背攻之持火槍突入䝉古軍中特們德爾不能支遂大潰溺死三千五百人古納盡焚其栅而還遂真拜左副元帥叅知政事命錫馨總軍以守亳州金富察古納既敗特們徳爾勢益暴横居金主于照碧堂禁近無一人敢奏對者金主惟益悲泣語近侍云自古無不亡之國不死之君但恨我不知人為此奴所困耳於是内侍局令宋珪奉御努色爾恩楚烏克遜愛新等宻討古納且聞蔡州城堅池深兵衆糧廣咸勸幸之以救饑窘㑹蔡息陳頴等州便宜總帥烏庫哩鎬運米四百斛至歸徳且請臨幸金主意遂决及古納自亳州還金主諭以幸蔡古納力陳不可至於扼腕頓足意趣叵測因出號于衆曰敢言南遷者斬衆以古納為無君諷金主早為計金主遂與珪等謀召宰相議事而令恩楚伏于照碧堂門間古納進見恩楚從後刺其肋金主亦㧞劒斬之古納中創投城下以走恩楚愛實追殺之忠孝軍聞變皆擐甲恩楚請金主親撫慰之於是金主御雙門赦忠孝軍以安反側先是金主以齊克紳守中京有功降詔褒諭授中京留寺又以叅政内族思烈自南山領軍十餘萬入洛行省事齊克紳建堂洛川驛東名曰報恩刻詔文於石願以死自效已而䝉古自汴驅思烈之子于金昌府東門下誘思烈降思烈命左右射之聞崔立之變病不能語而死總帥烏凌阿呼圗代行省事齊克伸行總帥府事月餘糧盡軍民稍散䝉古兵復至陳于洛南齊克紳陳于水北䝉古韓元帥匹馬立水濵招降齊克紳躍而射之韓奔還陳率步卒數百奪橋齊克紳之旗手一卒獨出拒之殺數人齊克紳即手解都統銀牌與之佩士卒氣復振初城四隅至五門内外皆有屏謂之迷魂墻䝉古以五百騎迫之齊克紳率卒二百鼓譟而出䝉古退走朝士以䝉古兵强多以輕騎携妻子出奔蔡州於是鷹揚都尉獻西門以降齊克紳知城不能守率死士數十突東門以出轉戰至偃師力盡就執見䝉古帥語不遜左右持使北面齊克紳拗項南面遂殺之金主守緒留元帥王璧守歸徳遂如蔡州時乆雨朝士扈從者徒行泥水中掇青棗為糧足脛盡腫明日至亳州金主黄衣皂笠金兎鶻帶以青黄旗二導前黄繖擁後從者二三百人馬五十匹而已行次城中父老拜伏道左金主遣近侍諭以國家涵飬汝等百有餘年今朕無徳令汝塗炭朕亦無足言者汝輩無忘祖宗之徳可也皆呼萬嵗泣下留一日進次亳南六十里避雨雙溝寺中蒿艾滿目無一人迹金主太息曰生靈盡矣為之一慟及入蔡父老羅拜于道見金主儀衛蕭條莫不感泣金主亦歔欷遂以完顔呼沙呼為尚書右丞總領省院事烏庫哩鎬為御史大夫總帥如故張天綱權叅知政事富珠哩小羅索僉書樞宻院事呼沙呼有文武材事無鉅細率親為之選士括馬繕治甲兵未嘗一日忘奉金主幸秦鞏之志近侍乆困睢陽幸即汝陽之安皆娶妻營業不願遷徙日夕進言西幸不便金主信之呼沙呼惟深居燕山瞑目太息而已時䝉古兵去蔡差逺商販漸集金主安之命選室女備後宫及修建山亭為游息之所呼沙呼切諫乃止呼沙呼定進馬遷賞格得馬千餘匹又遣使分詣諸道選兵詣蔡得精鋭萬餘兵威稍振忠孝軍提控李徳率十餘人乘馬入省大呼以月糧不優幾于罵詈呼沙呼縛徳杖之金主曰此軍得力方以倚用卿何不容忍責罰乃爾對曰時方多故録功隱過自陛下之徳至於將帥之職則不然小犯則决大犯則誅其强兵悍卒不可使一日不在紀律小人之情縱則驕驕則難制睢陽之禍豈獨古納之罪亦有司縱之太過耳今欲易前轍不宜愛克厥威賞必由中罰則臣任其責軍士聞之自無有復犯法者是時從官近侍皆窮乏悉取給于烏庫哩鎬鎬不能繼日夕交譛于金主至以尚食闕供為言金主遂踈鎬鎬憂憤成疾多不視事秋七月孟珙大敗金武仙于馬蹬山武仙愛将劉儀詣珙降珙問仙虚實儀言仙所㨿九砦其大砦石穴山以馬蹬沙窩岵山三砦蔽其前三砦不破石穴未可圖也若破離金砦則岵山沙窩孤立矣珙乃遣兵攻離金掩殺幾盡是夕復令壮士搗王子山砦斬金將首而出遂圍馬蹬殺戮山積還至沙窩西遇金人大捷未幾丁順復破黙侯里砦於是仙之九砦六日破其七珙召儀曰此砦既破板橋石穴必震汝能為我招之乎儀選婦人三百偽逃歸懐招安榜以往珙料仙勢窮蹙必上岵山絶頂窺伺乃令樊文彬駐軍其下已而仙衆果登山及半文彬麾旗伏兵四起仙衆失措枕籍崖谷山為之赭殺其將烏蘓展擒七百三十人棄鎧甲如山薄暮珙進軍至小水河儀言仙謀往商州依險以守然老稚不願北去珙曰進兵不可緩夜漏下十刻召文彬等受方畧明日攻石穴丙夜蓐食啟行晨至石穴時積雨未霽文彬患之珙曰此雪夜擒吳元濟之時䇿馬直至石穴分兵進攻自寅至已遂破石穴仙走追及于鮎魚砦仙望見易服而遁復戰于銀葫蘆山又敗之仙與五六騎奔追之隱不見降其衆七萬珙還襄陽八月䝉古都元帥塔齊爾使王機至襄陽約攻蔡州史嵩之先以兵㑹伐唐州金將烏庫哩哈努勒戰死城遂降官軍駐于息州之南降者日衆息州刺史烏庫哩呼圗克懼請益兵為備金主以叅知政事穆延烏克登僉書樞宻院富珠哩中羅索帥忠孝軍五百往將行金主諭之曰北兵所以常取勝者恃北方之馬力就中國之技巧耳我實難與之敵至於宋人何足道哉朕得甲士三千縱横江淮間有餘力矣以呼圗畏縮命𤓰爾佳玖珠代之塔齊爾博勒呼之從孫也九月金使完顔阿呼岱來乞糧將行金主諭之曰宋人負朕深矣朕自即位以來戒飭邊将無犯南界邊臣有請征討者未嘗不切責之向得宋一州隨即付與近淮隂來歸彼多以金幣為贖朕若受財是貨之也付之全城秋毫無犯清口臨陣生獲數千人悉以資糧遣之今乗我疲敝㨿我壽州誘我鄧州又攻我唐州彼為謀亦淺矣䝉古滅國四十以及西夏夏亡及于我我亡必及于宋唇亡齒寒自然之理若與我連和所以為我者亦為彼也卿其以此意曉之阿呼岱至朝廷不許金主拜天于節度使㕔羣臣陪從成禮金主戒諭之因賜巵酒酒未竟邏騎馳奏敵兵數百突至城下将士踴躍咸請一戰金主許之是日分兵防守四面及子城衆既出接戰䝉古兵奔潰塔齊爾以數百騎復駐城東金主遣兵接戰又敗之自是䝉古不復薄城分築長壘圍之冬十月史嵩之命孟珙江海帥師二萬運米三十萬石赴䝉古之約塔齊爾大喜益修攻具斵木之聲聞于城中城中益恐往往竊議投降金呼沙呼日以國家恩澤君臣分義撫循其民且營畫禦備未嘗入私室軍民感奮始有固志南北兩軍以攻具薄城金盡籍民丁防守民丁不足復括婦人壯徤者假男子衣冠運木石金主親出撫諭之金人自東門出戰孟珙遮其歸路得降人言蔡城中饑珙曰已窘矣當盡死守之以防突圍珙與塔齊爾約南北軍毋相犯塔齊爾遣張柔帥精兵五千薄城金人鈎二卒以去柔中流矢如蝟珙麾先鋒救之挾柔以出明旦珙殊死戰進逼柴潭立栅潭上命諸將奪柴潭樓金人來爭諸軍魚貫而上遂㧞柴潭樓蔡州恃潭為固外即汝河潭髙於河五六丈城上金字號樓伏巨弩相傳下有龍人不敢近将士疑畏珙召麾下飲酒再行謂曰柴潭樓非天造地設伏弩能射逺而不能射近彼所恃此水耳決而注之涸可立待遂鑿隄潭果决入汝水珙命實以薪葦䝉古亦决練江於是兩軍皆濟攻其外城破之進逼土門金人驅其老穉熬為油號人油砲人不堪其楚珙遣道士説止之金總帥富珠哩中羅索帥精鋭五百夜出西門人荷束藁沃油其上将燒兩軍寨及砲具蒙古兵先覺之伏于隱處挽强弩百餘火發矢亦發金兵却走傷者甚衆羅索僅以身免兩軍合攻西城克之因墮其城先是呼沙呼命築寨浚濠為備及西城墮兩軍皆未能入但於城上立柵自蔽呼沙呼摘三面精鋭日夕戰禦金主謂侍臣曰我為金紫十年太子十年人主十年自知無大過惡死無所恨所恨者祖宗傳祚百年至我而絶與古荒淫暴亂之君等為亡國獨為此介介耳又曰亡國之君往往為人囚縶或為俘獻或辱於階庭或閉之空谷朕必不至於此卿等觀之朕志决矣以御用器皿賞戰士已而㣲服率兵夜出東城謀遁去及柵遇敵兵戰而還殺廐馬以犒将士然其勢不可為已時金徐州節度使郭頁嚕約源州叛将麻琮襲破徐州徐州将士以蔡州𬒳圍又迫于䝉古兵議出降完顔薩布弗從恐被執乃投河求死軍士援出之卒自縊麻琮遂以州降䝉古端平元年春正月戊申孟珙同䝉古兵圍蔡州㑹飲歌吹聲相接城中饑窘嘆息而已孟珙見黑氣壓城上日無光降者言城中絶糧已三月鞍靴敗鼓皆糜煑且聽以老弱互食諸軍日以人畜骨和芹泥食之又往往斬敗軍全隊拘其肉以食故欲降者衆珙乃下令諸軍銜枚分運雲梯布城下以議攻金自被圍以來戰没将帥甚衆至是禁近以及舍人牌印省部掾屬亦皆供役分守四城䝉古兵鑿西城為五門整軍以入督軍鏖戰及暮乃退聲言來日復集是夕金主永緒集百官傳位於東面元帥承麟承麟者世祖和哩布之後巴薩之弟也拜泣不敢受金主曰朕所以付卿者豈得已哉以朕肌體肥重不便鞍馬馳突卿平日趫捷有将畧萬一得免祚𦙍不絶此朕志也承麟起受璽己酉承麟即位時孟珙之師向南門至金字樓列雲梯令諸軍聞鼓則進馬義先登趙榮繼之萬衆競進大戰城上烏庫哩鎬及其将帥二百人皆降金百官稱賀禮畢亟出捍敵而南城之陴已立宋旗幟俄頃四面鼓譟夾攻聲震天地南門守者棄門走門洞開孟珙招江海塔齊爾之師以入呼沙呼帥精兵一千巷戰不能禦金主守緒知事急即取寳玉寘于幽蘭軒環之以草命近侍曰死便火我遂自經死呼沙呼聞之謂将士曰吾君已崩吾何以戰為吾不能死於亂兵之手吾赴汝水從吾君矣諸君其善為計言訖赴水死将士皆曰相公能死吾輩獨不能耶於是㕘政富珠哩小羅索烏凌阿呼圗總帥元志元帥約蘓赫舎哩栢壽烏庫哩和勒端及軍士五百餘人皆從死焉承麟退保子城聞守緒死帥羣臣入哭因謂衆曰先帝在位十年勤儉寛仁圖復舊業有志未就可哀也已宜謚曰哀宗奠未畢城已陷諸将禁近共舉火焚之奉御綘山收其骨将瘞之汝水上江海入宫執叅政張天綱孟珙問金主所在天綱曰城危時自經矣珙乃與塔齊爾分金主骨及寳玉法物是日承麟亦為亂兵所殺金亡金自宣宗之世為宰相樞宻者往往臨事推讓低言緩語以為養相體每有四方兵革灾異輙以聖主心困或俟再議因循茍且以度時日及出兵則以近侍監戰臨事多所牽制故師出無功國亂不聞以底于亡戊辰史嵩之露布告金亡以陳蔡西北地分屬䝉古䝉古以劉福為河南道總管史嵩之遣郭春按循故壤詣奉先縣汎掃祖宗諸陵孟珙還師屯襄陽江海還師屯信陽王旻戍隨州王安國守棗陽蒋成守光化楊恢守均州並益兵飭備經理屯田于唐鄧州夏四月詔遣朱復之詣八陵相度修奉荆襄以兵五十護之未至西京諜報敵騎且至兵不敢進使者潜偕數騎星馳而往行禮而還其諸陵之無恙與否皆不可究詰也史嵩之遣使以孟珙所獲金主完顔守緒遺骨及寳玉法物并俘囚張天綱完顔噶海等獻于臨安時相方侈大其事監察御史洪咨䕫上言曰此朽骨耳函之以塟大理寺可也第當以金亡告九廟歸諸祖宗徳澤况與大敵為鄰抱虎枕蛟事變叵測顧可侈因人之獲使邊臣論功朝臣頌徳且陛下知慕政受俘之元祐獨不鑒端門受降之崇寧乎上雖頷之不悉從也丙戌備禮告于太廟藏金主完顔守緒骨于大理寺獄庫加孟珙帶御器械江海以下論功行賞有差知臨安府薛瓊問張天綱曰有何面目到此天綱曰國之興亡何代無之我金之亡比汝二帝何如瓊叱之明日奏其語帝召天綱問曰汝真不畏死耶天綱對曰大丈夫患死之不中節耳何畏之有因祈死不已帝不聽初有司令天綱供狀必欲易其所書故主天綱曰殺即殺焉用狀為有司不能屈聽其所供天綱但書故主而已聞者憐之後莫知其所終三京之復理宗端平元年六月詔出師收復三京時趙范趙葵欲乗時撫定中原建守河據闗收復三京之議朝臣多以為未可獨鄭清之力主其説乃命趙范移師黃州刻日進兵范叅議官丘岳曰方興之敵新盟而退氣盛鋒鋭寧肯捐所得以與人耶我師若往彼必突至非惟進退失據開釁致兵必自此始且千里長驅以爭空城得之當勤餽餉後必悔之范不聽史嵩之亦言荆襄方爾饑饉未可興師杜杲復陳守境之利出師之害喬行簡時在告上䟽曰八陵有可朝之路中原有可復之機以大有為之資當大有為之㑹則事之有成固可坐而䇿也臣不憂師出之無功而憂事力之不可繼有功而至於不可繼則其憂始深矣夫自古英君必先治内而後治外陛下視今日之内治其已舉乎其未舉乎向未攬權之前其弊凡㡬今既親攻之後其已更新者凡幾欲用君子則其志未盡伸欲去小人則其心未盡革上有厲精更始之意而士大夫仍苟且不務任責朝廷有禁苞苴禁貪墨之令而州縣仍黷貨不知盈厭欲加楮令則外郡之新劵雖低價而莫售欲平物價則京師之百貨視舊直而不殊紀綱法度多頽弛而未張賞刑號令皆玩視而不肅此皆陛下國内之臣子猶令之而未從作之而不應乃欲闔闢乾坤混一區宇制姦雄而服逺人其能盡如吾意乎此臣之所憂者一也自古帝王欲用其民者必先得其心以為根本數十年來上下皆懐利以相接而不知有所謂義民方憾於守令緩急豈有效死勿去之人卒不愛其将校臨陳豈有奮勇直前之士畜怨含憤積於平日見難則避遇敵則奔惟利是顧遑恤其他人心如此陛下曾未有以轉移固結之遽欲驅之北向從事於鋒鏑忠義之心何由而發况乎境内之民困於州縣之貪刻阨於勢家之兼併饑寒之氓常欲乗時而報怨茶鹽之冦嘗欲伺間而竊發蕭墻之憂凛未可保萬一兵興於外綴於強敵而不得休潢池赤子復有如江閩東浙之事其将柰何夫民至愚而不可忽内郡武僃单弱民之所素易也往時江閩東浙之冦皆藉邊兵以制之今此曹猶多竄伏山谷窺伺田里彼知朝廷方有事於北方其勢不能以相及寧不動其姦心此臣之所憂者二也自古英君䂓恢進取必須選将練兵豐財足食然後舉事今邊面遼濶出師非止一途陛下之将足當一面者幾人非屈指得二三十輩恐不足以僃驅馳陛下之兵能戰者幾萬分道而趨京洛者幾萬留屯而守淮襄者幾萬非按籍得二三十萬衆恐不足以事進取借曰帥臣威望素著以意氣招徠以功賞激勸推擇行伍即可為将接納降附即可為兵臣實未知錢糧之所從出也興師十萬日費千金千里餽糧士有饑色今之餽運累日不已至於累月累月不已至於累歳不知累㡬千金而後可以供其費也今百姓多垂磬之室州縣多赤立之帑大軍一動厥費多端其将何以給之今陛下不愛金帛以應邊臣之求可一而不可再可再而不可三再三之後兵事未已欲中輟則棄前功欲勉強則無多力國既不足民亦不堪臣恐北方未可圖而南方已騷動矣中原蹂踐之餘所在空曠縱使東南有米可運然道里遼逺寧免乏絶由淮而進縱有河渠可通寧無盗賊邀取之患由襄而進必須負載三十鍾而致一石亦恐未必能達若使頓師千里之外糧道不繼當是之時孫吳為謀主韓彭為兵帥亦恐無以為䇿他日糧運不繼進退不能必勞聖慮此臣之所憂者三也願堅持聖意定為國論以絶紛紛之説皆不聽淮西總領吳潜又告執政論用兵復河南不可輕易金人既滅與北為隣法當以和為形以守為實以戰為應自荆襄首納空城合兵攻蔡兵事一開調度浸廣百姓狼狽死者枕籍使生靈肝腦塗地得城不過荆榛之區獲俘不過曖昧之骨而吾之内地荼毒如此邊臣誤國之罪不待言矣聞有進恢復之畫者其筭可謂俊偉然取之若易守之實難征行之具何所取資民窮不堪激而為變率為盗賊矣今日之事豈容輕議執政不能從詔知廬州全子才合淮西兵萬人赴汴時汴京都尉李伯淵李琦李遷努等為崔立所侮謀殺之及聞子才軍至伯淵等以書約降而陽與立謀僃禦之䇿伯淵燒封丘門以警動立立殊不安乃來約立視火立從苑秀折希顔等數騎往既還伯淵親送之倉卒中就馬上抱立立顧曰汝欲殺我耶伯淵曰殺爾何傷即出匕首横刺之立墜馬死伏兵起元帥薩哈殺苑秀折希顔後至見立墜馬謂與人闘欲前解之隨為軍所殺伯淵繫立屍馬尾至内前號于衆曰立殺害刼奪烝淫暴虐大逆不道古今無有當殺之否萬口齊應曰寸斬之未稱也乃梟立首望承天門祭哀宗軍民皆慟或剖其心噉之以三屍掛闕前槐樹上全子才次于汴趙葵自滁州以淮西兵五萬取泗州由泗趨汴以㑹之葵謂子才曰我輩始謀據闗守河今已抵汴半月不急攻洛陽潼闗何待耶子才以糧餉未集對葵督促益急乃檄鈐轄范用吉樊辛李先胡顯等提兵萬三千命淮西制置司機宜文字徐敏子為監軍先令西上又命楊誼以廬州強弩軍萬三千繼之各給五日糧秋七月徐敏子啟行遣和州寧淮軍正将張廸以二百人趨洛陽迪至城下城中寂然無應者至晩有民庶三百餘家登城投降迪與敏子遂帥衆入城䝉古聞之復引兵南下徐敏子入洛之明日軍食已竭乃采蒿和麺作餅而食之楊誼之洛東三十里方散坐蓐食忽數里外有立紅黃涼傘者衆方駭異而䝉古伏兵突起深蒿中楊誼倉卒無僃師遂大潰為䝉古擁入洛水者無數誼僅以身免是夜有潰卒奔告于洛曰楊誼一軍已為䝉古大陣衝㪚今䝉古兵已據北岸矣於是在洛之師皆奪氣八月䝉古兵至洛陽城下徐敏子與戰勝負相當士卒乏糧因殺馬而食敏子等不能留乃班師趙葵全子才在汴京以史嵩之不致餽糧用不繼所復州縣率皆空城無兵食可因䝉古兵又决黃河寸金淀之水以灌官軍官軍多溺死遂皆引師南還九月壬寅趙范以入洛之師敗績上表劾趙葵全子才輕遣偏師復西京趙楷劉子澄叅賛失計師退無律致後陣喪敗詔趙葵削一秩措置河南京東營田邊僃全子才削一秩措置唐鄧息州營田邊僃劉子澄趙楷並削秩放罷又言楊誼一軍之敗皆由徐敏子范用吉怠於赴援致不能支詔范用吉降武翼郎徐敏子削秩放罷楊誼削秩勒停自効十二月己夘䝉古遣王檝來責敗盟辛夘遣鄒伸之等報謝自是河淮之間無寧日矣宋史紀事本末卷二十四
