body:
  text: 宋史紀事本末卷二十三明馮琦原編陳邦瞻增輯蒙古侵金寧宗開禧二年十二月蒙古却特氏特穆津稱帝於鄂諾河特穆津之先有曰勃端察爾母曰阿倫果斡生二子而寡居夜寢屢有光明照其腹又生三子勃端察爾其季也其後子孫蕃衍各自為部居于烏濟之北與鄂囉奈曼九姓回鶻故城和琳接壤世奉貢于遼金而總𨽻于韃靼至伊蘇克依并吞諸部勢愈盛大攻塔塔爾部獲其部長特穆津還次于特哩衮盤陀山而生子因以特穆津名之伊蘇克依死特穆津年幼其部衆多歸于族人塔爾古岱部率部人為十三翼大戰塔爾古岱等敗因得少安時塔爾古岱部地廣民衆而無紀律其下謀曰特穆津衣人以己衣乘人以己乘真吾主也因悉歸之塔爾古岱部遂微未幾塔塔爾部叛金特穆津自鄂諾河帥衆會金師同滅之以功封特穆津為察罕圖嚕猶中國之招討使也特穆津以奈曼部強盛事之甚謹奈曼反侵掠之特穆津乃大會屬部于特默格川議伐奈曼奈曼迪延汗營于杭愛山與默爾竒斯諸部合兵勢頗盛特穆津與之大戰擒殺迪延汗諸部悉潰特穆津益以盛強明年遂攻西夏破伊奇哩寨經羅索城大掠而還至是大會諸部長于鄂諾河之源即位建九斿白旗諸王羣臣共上尊號曰青吉斯皇帝先是紹興中金人屢擊蒙古不能克遂與之和金主嘗遣衛王允濟往靖州受特穆津之貢允濟竒其狀貌歸言于金主請以事除之金主不許特穆津聞而憾之特穆津既即位遂發兵復征奈曼滅之執必里克汗以歸嘉定元年冬蒙古征托克托及庫楚類汗時衛喇特等部遇蒙古前鋒不戰而降因用為鄉導討默爾奇斯部滅之托克托中流矢死庫楚類汗奔契丹是年金主璟卒衛王允濟立二年三月輝和爾國降于蒙古輝和爾即唐之高昌也五月蒙古兵入靈州夏主安全納女請降於蒙古夏自是益衰三年十二月蒙古侵金先是金主永濟嗣位有詔至蒙古傳言當拜受蒙古主謂金使曰新天子為誰曰衛王也蒙古主遽南面唾曰我謂中原皇帝是天上人做此等庸懦亦為之耶何以拜為即乘馬北去金使還言永濟怒欲俟蒙古入貢就害之蒙古主知之遂與金絶益嚴兵為備數侵掠金西北之境其勢漸盛金人皇皇禁百姓傳説邊事四年夏四月金使人求和于蒙古蒙古不許初金納哈塔敏珠爾守北鄙知蒙古將侵邊奔告于金主金主曰彼於我無釁汝何言此敏珠爾曰近見其鄰部附從西夏獻女而造箭製楯不休凡行營則令男子乘車蓋欲惜馬力也非圖我而何金主以其擅生邊隙囚之及蒙古侵擾雲中九原連嵗不休遂破大水濼以進金主始恐乃釋敏珠爾之囚遣西北路招討使鈕祜祿哈達求和蒙古主不許金主乃命平章政事圖吉齊嘉努參知政事完顔哈沙行省事於撫州西京留守赫舍哩呼沙呼行樞密院事以備邊八月金通吉齊嘉努完顔哈沙至烏沙堡未及設備蒙古兵奄至拔烏沙堡及烏月營破白登城遂攻西京凡七日呼沙呼等懼以麾下棄城突圍遁去蒙古主以精騎三千馳之金兵大敗追至翠屏山遂取西京及桓撫州蒙古主復遣其子珠徹察罕台烏格台三人帥兵分取雲內東勝武朔豐靖等州由是金德興𢎞州昌平懷來縉山豐潤密雲撫寧集寧東過平灤南至清滄由臨潢過遼河西南至欣代皆降于蒙古閏九月蒙古主既破撫州休士牧馬將遂南向金主復命招討使完顔糾堅監軍完顔鄂諾等率兵號四十萬駐野狐嶺以備哈沙率重兵為後繼或謂紏堅曰蒙古新破撫州方以所獲賜其下馬牧于野當乘其不虞掩擊之糾堅曰此危道也不若馬步俱進為計萬全蒙古主聞之進兵于獾兒觜糾堅遣麾下明安問蒙古舉兵之故明安反降于蒙古以虛實告之蒙古主遂與糾堅等戰金兵大敗人馬蹂躪死者不可勝計蒙古乘鋭而前哈沙畏其鋒不敢拒戰引兵南行蒙古兵踵擊之至會河堡金兵又大敗哈沙僅以身免走入宣平蒙古兵乘勝薄宣平遂克晉安縣遊兵至居庸關守將完顔福夀棄關遁蒙古兵克之金中都戒嚴禁男子不得輒出城蒙古遊兵至都城下金主欲南奔汴會衛卒誓死迎戰蒙古兵多所損折遂襲金羣牧監驅其馬而去金主乃止命秦州刺史珠格髙琪屯通玄門外尋降哈沙為咸平路兵馬總管將士以其罰輕由是益不用命十一月金圖克坦鎰初為上京留守蒙古兵日攻西北曰事急矣乃選兵二萬遣同知烏克遜鄂特將之入衛金主嘉之徴拜右丞相鎰上言曰自國家與韃靼交兵以來彼聚而行我散而守以聚攻散其敗必然不若入保大城併力備禦昌桓撫三州素號富貴人皆健勇可內徙之以益兵勢人畜財貨不至亡失參政梁􅚻曰如此是自蹙境土也金主從􅚻謀鎰復奏曰遼東國家根本距中都數千里萬一受兵州府顧望必須報可誤事多矣可遣大臣行省以鎮之金主不悅曰無故置行省徒搖人心耳不從及失三州又聞東京不守金主乃大悔曰從丞相之言當不至此我見丞相恥哉呼沙呼之棄西京而還也至蔚州擅取官庫銀五千兩及衣幣諸物奪官民馬與從行人入紫荆關殺淶水令至中都金皆不問以為右副元帥呼沙呼益無所忌憚自請兵二萬北屯宣平金主與之三千令屯媯川呼沙呼不悅五年三月金呼沙呼欲移屯南口移文尚書省曰韃靼兵來必不能支一身不足惜三千兵為可憂十二關建春萬寧宫俱不保金主惡其言下有司按問詔數其十五罪罷歸田里蒙古主既克宣平遂攻德興府坎墉而登金人禦之蒙古兵不利蒙古主第四子圗類與沁布矩駙馬復擁楯先登而射之金兵引却蒙古遂盡拔德興境內諸城堡而去金人復守之六年五月金主永濟復以赫舍哩呼沙呼為右副元帥八月金主復用呼沙呼使將兵屯燕城北圖克坦鎰切諫不聽呼沙呼與其黨完顔綽諾富察魯爾錦烏庫哩達喇等謀作亂金主以蒙古兵在居庸關而呼沙呼日務馳獵不恤軍事遣使責之使者至呼沙呼怒遂妄稱知大興府圖克坦南平謀反奉詔入討分其軍為三由章義門入自將一軍由通玄門入恐城中兵出拒先遣一騎馳抵東華門大呼曰韃靼至此關已接戰矣既又遣一騎往亦如之乃使其黨圖克坦金夀召圖克坦南平南平不知行至廣陽門呼沙呼遇之於馬上手刃殺之完顔錫庫乃聞亂召兵五百迎戰不勝皆殺之呼沙呼至東華門護衛錫里竒爾等納之呼沙呼入宫盡以其黨易宿衛自稱監國都元帥居大興府陳兵自衛召聲伎與親黨會飲明日以兵逼金主出居衛邸遣武衛兵二百錮守之呼沙呼欲除拜其黨令黃門入宫收璽尚宫左夫人鄭氏掌寶璽拒之曰璽天子所用呼沙呼人臣取將何為黃門曰今天時大變主上且不保况璽乎御侍當思自脫計鄭氏厲聲罵曰若輩宫中近侍恩遇尤隆君難不以死報反為逆竪奪璽耶我死可必璽必不與遂瞑目不語黃門乃還呼沙呼復遣人奪取宣命之寶除拜其黨數十人丞相圖克坦鎰時以墜馬傷足在告聞難作命駕將入省或告之曰省府皆以軍士守之不可入矣少頃軍士索人於閭巷鎰乃還第呼沙呼欲僭位猶豫不決以鎰人望乃詣訪之鎰從容謂曰升王章宗之兄顯宗長子衆望所屬元帥決策立之萬世之功也呼沙呼默然乃遣宦者李思中弒金主於邸時完顔綱將兵十萬行省事于縉山呼沙呼誘而殺之因盡撤沿邊諸軍赴中都平州騎兵屯薊州以自重遣圖克坦銘等迎升王珣于彰德九月至燕即位立子守忠為太子追廢永濟為東海郡侯後追復衛王諡曰紹蒙古兵至懷來金元帥右監軍珠格高琪拒之敗績僵尸四十餘里蒙古乘勝至古北口金兵保居庸不能入蒙古主乃留克特卜齊等頓兵拒守而自以衆趨紫荆關敗金兵于五回嶺拔涿易二州分命遮别將兵反自南口攻居庸關破之出北口與克特卜齊軍合既而又選諸部精兵五千騎合竒塔特哈坦二將圍守中都方蒙古兵至皂河欲渡髙橋呼沙呼病足乘車督戰蒙古兵大敗翌日再戰呼沙呼創甚不能出期高琪以乣軍五千拒之高琪失期不至呼沙呼欲斬之金主以其有功諭令免死呼沙呼乃益其兵令出戰戒之曰勝則贖罪不勝斬汝高琪出戰自夕至曉北風大作吹石揚沙不能舉目金兵大潰高琪自度必為呼沙呼所殺乃以乣軍入中都圍呼沙呼之第呼沙呼聞難作登後垣欲走衣絓墜而傷股軍士就斬之高琪取其首詣闕請罪金主赦之因詔暴呼沙呼之罪奪其官爵以髙琪為左副元帥一行將士論功行賞時蒙古穆呼哩統兵侵金所向殘破永清人史秉直聚謀曰方今國家喪亂吾家百口何以自保既而知降者皆得免乃率里中數千人詣涿州軍門降穆呼哩欲用秉直秉直辭乃以其子天倪為萬户領降人家屬屯霸州十二月蒙古主留竒塔特及哈坦屯燕城北分降人楊伯遇劉林漢軍四十六都統并韃靼兵為三道命其子珠徹察罕台烏格台三人為右軍循太行而南破保州中山邢洛磁相衛輝懷孟諸郡徑抵黃河大掠平陽太原之間别將博爾濟等遵海而東破灤薊大掠於遼西之地蒙古主自將與子圗類由中道破雄漠清滄景獻河間濱隸濟南等郡引兵復自大口以逼中都時中原諸路之兵皆僉往山後防遏悉僉鄉民為兵上城守禦蒙古盡驅其家屬來攻父子兄弟往往遙呼相認由是人無固志故所至郡邑皆下凡破金九十餘郡兩河山東數千里人民殺戮幾盡金帛子女牛馬羊畜皆席捲而去屋廬焚燬城郭丘墟惟大名真定青鄆邳海沃順通州有兵堅守未能破七年三月蒙古主還自山東屯燕城北諸將請乘勝破城蒙古主不從遣使諭金主曰汝河東河北郡縣悉為我有汝所守惟燕京耳天既弱汝我復迫汝於險天其謂我何我今還軍汝不能犒師以弭我諸將之怒耶丞相高琪言於金主曰韃靼人馬疲病當決一戰完顔承暉曰不可我軍身在都城家屬各居諸路其心向背未可知戰敗必散茍勝亦思妻子而去社稷安危在此一舉莫如遣使議和待彼還軍更為之計金主然之遣承暉議和蒙古主欲得其公主金主乃以其故主永濟之女及金帛童男女各五百馬三千與之夏四月金及蒙古平蒙古主引歸出居庸關金主以蒙古既和大赦其國內五月金主珣以國蹙兵弱財用匱乏不能守中都乃議遷于汴左丞相圖克坦鎰諫曰鑾輿一動北路皆不守矣今已講和聚兵積粟固守京師策之上也南京四面受兵遼東根本之地依山負海其險足恃備禦一面以為後圖策之次也金主不從遂命平章政事都元帥完顔承暉左丞穆延盡忠奉太子守忠留守中都遂與六宫啓行蒙古主聞之怒曰既和而遷是有疑心而不釋憾特以解和為欵我之計耳復圖南侵金主至良鄉命扈衛乣軍元給鎧馬悉復還官乣軍怨之遂作亂殺其主帥素溫而推多木達巴實爾扎拉爾三人為帥北還完顔承暉聞變以兵阻盧溝卓多擊敗之遣使乞降於蒙古蒙古主遂遣明安援多木達合其兵圍燕京金主聞之遣人召太子應奉翰林文字完顔蘇哷以為不可平章珠格高琪曰主上居此太子宜從且汝能保都城必完乎蘇哷曰完固不敢必但太子在彼則聲勢俱重邊隘有守則都城無虞昔唐明皇幸蜀太子實在靈武蓋將以繫天下之心也不從竟召太子太子既行中都益懼九月蒙古將穆呼哩進兵攻金北京守將銀青帥衆二十萬禦於花道敗還嬰城自守其禆將完顔實哩髙德玉等殺伊濟推伊德爾為帥穆呼哩命史天祥等趣兵進攻伊德爾遂舉城降穆呼哩怒其降緩欲坑之蕭額森曰北京為遼西重鎮既降而坑之後豈有降者乎穆呼哩從之奏伊德爾權北京留守以烏葉爾權兵馬帥府事於是金順成懿通州相繼降於蒙古八年二月金中都被圍既久完顔承暉以穆延盡忠久在軍旅悉以兵付之而自總持大綱又遣人以礬寫奏告急金主命左監軍永錫將中山真定軍左都監烏庫哩慶夀將大名軍萬八千西南路步騎萬一千河北軍一萬御史中丞李英運糧大名行省富珠哩調遣繼發以救中都英至大名得兵數萬然馭衆素無紀律三月英被酒與蒙古遇於霸州北大敗盡失所運糧英死士卒殱焉慶夀永錫軍聞之皆潰歸自是中都援絶內外不通承暉與盡忠會議期同死社稷盡忠不從承暉怒即起還第然兵柄既屬盡忠承暉無如之何乃辭家廟召左右司郎中趙思文謂之曰事勢至此惟有一死以報國家耳五月一日承暉作遺表付尚書省令史師安石書之皆論國家大計及平章政事髙琪姦狀且謝不能終保都城之罪從容若平日盡出財物召家人分給之舉家號泣承暉神色泰然方與安石舉白引滿謂之曰承暉於五經皆經師受謹守而力行之不為虛文既被酒取筆與安石訣最後倒寫二字投筆曰遽爾謬誤得非神志亂耶謂安石曰子行矣安石出門聞哭聲復還問之則已仰藥死矣家人匆匆瘞庭中是日暮凡在中都妃嬪聞盡忠將南奔皆束裝至通玄門盡忠紿之曰我當先出與諸妃啓途諸妃信之盡忠乃與愛妾及所親者先出城不復反顧蒙古兵遂入中都吏民死者甚衆宫室為亂兵所焚月餘不滅時蒙古主在桓州聞燕陷遣使勞明安等而輦其府庫之實北去於是金祖宗神御及諸妃嬪皆沒焉盡忠行至中山謂所親曰若與諸妃偕來我輩豈得至此安石奉承暉遺表至汴贈尚書令盡忠至金主釋不問仍以為平章政事金好之絶寧宗嘉定四年六月遣金嶸賀金主生辰時金有蒙古之難不暇延使者至涿州而還冬十月以金國有難命江淮京湖四川制置使謹飭邊備七年三月金主珣遣使來督嵗幣五月金主珣遷都于汴遣使來告秋七月起居舍人真德秀上疏請罷金嵗幣其略曰女真以韃靼侵陵徙居于汴此吾國之至憂也蓋韃靼之圖滅女真猶獵師之志在得鹿鹿之所走獵必從之既能越三關之阻以致燕豈不能絶黃河一帶之水以趨汴使韃靼遂能如劉聰石勒之盜有中原則疆場相望便為鄰國固非我之利也或如耶律德光之不能即安中土則姦雄必將投隙而取之尤非我之福也今當乘彼之將亡亟圖自立之策不可幸彼之未亡姑為自安之計也夫用忠賢修政事屈羣策收衆心者自立之本訓兵戎擇將帥繕城池飭戍守者自立之具以忍恥和鄰為福以息兵忘戰為常積安邊之金繒飾行人之玉帛女真常存則用之女真強敵更生則施之強敵此茍安之計也陛下不以自立為規模則國勢日削人心日偷雖弱敵僅存不能無外憂蓋安危存亡皆所自取若夫當事變方興之日而示之以可侮之形是堂上召兵户內延敵也微臣區區竊所深慮反覆數千言帝納之遂罷金嵗幣八月癸卯金國復來督嵗幣八年十一月復遣使如金賀正旦刑部侍郎劉鑰等及太學諸生言其不可不報真德秀復上奏曰金自南遷其勢日蹙韃靼西夏東出潼關深入許鄭攻圍都邑逰騎布滿山東而金以河南數州之地抗西北方張之師加以羣盜縱橫叛者四起危急如此不亡何待臣謹按國史女真叛遼在政和甲午其滅遼也在宣和己巳而犯中原即於是年之冬今日天下之勢何以異政宣之時陛下亦宜以政宣為監夫以皇皇巨宋八葉重光至於政宣燕安湛溺之餘紀綱蕩然無一足恃本根既撥枝葉從之於是女真得以逞其鋒鏑攻陷我都城傾覆我社稷劫遷我二聖荼毒我蒸民自開闢以來強敵之禍未有若是之酷也臣嘗論政宣致禍之由其失有十自蔡京倡豐亨豫大之説王黼開應奉享上之門專以淫侈蠱上心奢靡蠧國用土木之功窮極盛麗花石之貢毒遍江南甚至內庭曲宴出女樂以娛羣臣大臣入侍飾朱粉以供戲笑於是荒嬉無度而朝政大壞矣其失一也自童貫高俅迭主兵柄教閲訓練之事盡廢上下階級之法不行潰敗者不誅而招以金帛死敵者不恤而誣以逃亡於是賞罰無章而軍政大壞矣其失二也政宣之失災異數見火星如月徐徐南行日黯無光洶洶欲動赤氛犯斗水冒都城當時羣臣恬不知警方且以怪孽為嘉祥變異為休證此上不畏天戒其失三也政宣之際以言為諱張根論征斂之煩散官安置李綱論大水之變逺謫監征於是薦紳不敢言矣鄧肅以進詩諷諫屏出太學朱夢説以冒言宦寺竄斥偏州於是布衣不敢言矣鈐結成風馴致禍敗此下不恤人言其失四也政宣用事之臣專以毁忠忌賢為事凡纍朝老成之望當代鴻碩之材不以姦黨廢則以邪等斥不以曲學貶則以異論逐排沮挫揠之餘舉國無君子矣雖欲久安得乎其失五也開國承家小人勿用而難壬人逺人率服政宣之世京黼繼尸宰柄卞攸濫厠樞庭其翺翔臺省布列館殿非歌頌書生即膏粱子弟非奴事閹尹即翼附權臣更引迭援在廷皆小人矣雖欲勿危得乎其失六也記曰四方有敗必先知之此之謂民之父母政宣小人顓為蒙蔽以欺上聽劉法敗死西陲而童貫乃以捷聞方臘破東南六郡而王黼匿不以告郭藥師反形已露而邊臣掩覆於外女真尅期入舉而大臣諱晦於中上下相蒙稔成大患至敵兵濟河而朝廷猶未之覺其失七也書曰民惟邦本本固邦寧政宣小人專務聚斂以搖根本朱勔以貢奉擾浙右李彥以括田困京東蔡京改鹽鈔法而比屋嘆息王黼創免夫錢而諸路騷動人不聊生散為盜賊雖微外患亦必有蕭牆之憂其失八也詩曰無兢維人四方其訓之古者以一事寢敵謀片言折外侮政和初遣使覘國而童貫實行遼之君臣相顧竊笑已有南朝無人之譏北事既興遂付戎律以僕𨽻之材當元戎之任節制不明諸將無所稟畏庸懦不武敵師得以慿陵未幾副之以蔡攸易之以談􅍬其為駑怯又益甚焉於是女真知中國之無人而異志興矣此授任非材其失九也昔子産以蕞爾之鄭﨑嶇強國間區區一環宜無愛於晉而子産則曰大國之人令於小邦而皆獲其求將何以給之一共一否為罪滋大大國之求無禮以斥之何饜之有卒不與秦求地於趙趙欲與之虞卿曰王之地有盡而秦之求無已以有盡之地而給無已之求其勢必無趙矣趙用其計而秦不能加蓋有國者不幸與強敵為鄰當有以服其心而不當徇其欲方女真欲遼國交雖能每戰輒克然視吾中國之尊如髙山大海未易測其雄深何敢遽有他志不幸姦臣庸夫希功寡謀惟恐無以順適其意彼方邀吾嵗幣則與以契丹舊數而不辭邀吾燕地稅賦則豫以銀絹百萬而不靳至於索犒師則許以犒師欲貸糧則許以貸糧一事方酬而一事已生前請未塞而後請復起一切順承無敢或戾而南牧之師已侵尋於境上矣蓋強敵徴求本無饜足徒知徇其欲而無以服其心其禍固應爾也或者惟以納張玨結伊都為造釁之由而不知召侮取輕其漸非一雖微結納之事其能保盟約之不寒乎此處置失宜其失十也今一人憂勤恭儉無愧仁祖之風而羣臣盤樂怠傲乃有宣和之習東南民力耗於軍餉者十八而士卒窮悴常有不飽之嗟災異頻仍修省之實未覩言路壅塞讜直之士弗容君子非不參用而正論未嘗獲伸小人非不欲遠而讒諂猶或得志蒙蔽之風日熾聚斂之政日滋此失未除臣恐後之視今猶今之視昔也雖然臣外有司也其於內事不敢盡言獨請為陛下深陳所以待外國者臣觀韃靼之在今日無異昔者女真方興之時一旦與吾為鄰亦以祖述女真已行之故智蓋女真嘗以燕城歸我矣今獨不能還吾河南之地以觀吾之所處乎受之則享虛名而召實禍不受則彼得以陵寢為辭仗大義以見攻女真嘗與吾通好矣今獨不能卑詞遣使以觀吾之所啓乎從之則要索無厭豈能滿其溪壑之欲不從則彼得藉口以開釁端度彼之情必出於此不可不預圖以應之也昔晉季之亂江左粗安者以諸雄並爭莫能相一故吾得以偷旦夕之安及苻堅既滅慕容旋啓吞晉之謀元魏已併拓跋遂萌飲江之志今新敵鴟張盡有河朔楊劉羣盜人皆服從臣恐今日之形勢未可如晉世江左茍安之計也昔孫氏以區區之吳能當強大之魏者其君臣能相與策勵也今國家幅員萬里帶甲百萬江漢為池豈下於吳陛下任九廟之託固不可付安危於度外養成深患也因以五不可為獻一曰宗社之恥不可忘言國家之於金國蓋萬世必報之讐髙宗孝宗值其方強不得已以太王自處而以勾踐望後人今天亡我讐近在朝夕誠能以待敵之禮而遇天下之豪傑以遺敵之費而厲天下之甲兵人心奮張士氣自倍亦何憚於彼而猶事之哉且重於絶彼者畏召怨而啓釁也然能不召怨於亡敵而不能不啓釁於新敵權其利害孰重孰輕臣願陛下勉勾踐之良圖懲謝玄之失策則王業興隆可冀也二曰比鄰之患不可輕言韃靼及山東之盜茍得志而鄰於吾莫大之憂也願朝廷毋輕二患日夜講求攻守之策以逆杜窺覬之心三曰幸安之謀不可恃言今之議者大抵以金國之存亡為我欣戚聞危蹙之報則冀其非實得安靜之耗則幸其必然是猶以朽壤為垣而望其能固藩衛也願陛下勵自強之志恢立武之經毋以敵存為喜敵亡為畏則大勢舉矣四曰導諛之言不可聽言今邊事方殷正君臣戒懼之日而縉紳大夫工為諛説或以五福足恃為言夫乾象告愆邇日尤甚其可恃讖緯不經之説而忽昭昭之警戒乎惟陛下監天人之相因察諛佞之有害益修其本以格天休宗社之慶也五曰至公之論不可忽言公論國之元氣也元氣痞鬲不可以為人公論堙鬱不可以為國深惟今日實公論屈伸之機朝廷之上若以言者為愛君為報國無猜忌之意而有聽用之誠則公論自此愈伸若以言者為沮事為徼名無聽用之誠而有猜忌之意則公論自此復屈夫公論伸屈乃治亂存亡之所由分故臣於篇終反覆極言惟陛下亮臣愚忠也不報十年二月陳伯震還自金金主謂之曰聞息州南境有盜此乃彼界飢民沿淮為亂耳宋人何故攻我蓋欲以為用兵之端也夏四月金人分道入侵初金有王世安者獻取旴𣅿楚州之策金主以為淮南招撫使遂有南侵之謀珠格高琪復勸金主侵宋以廣疆土金主始猶不然至是命烏庫哩慶夀完顔薩布帥師南侵遂渡淮犯光州中渡鎮執榷場官盛允升殺之慶夀分兵犯樊城圍棗陽光化軍别遣完顔阿林入大散關以攻西和階成州朝廷聞之詔京湖江淮四川制置使趙方李珏董居誼俱便宜行事以禦之先是金右司諫許古上疏請遣使與宋議和則韃靼聞之亦將斂迹不宜用兵以益敵金主即命古草議和牒文既成示參政高汝礪汝礪言有哀祈之意徒示微弱無足取者議遂寢平章政事胥鼎亦切諫南侵有六不可髙琪不從金主以南北用兵西夏復擾財匱兵弱為憂集百官議守禦之策髙琪心忌之有所言皆不用五月金人犯襄陽棗陽趙方語其子范葵曰朝廷和戰未定觀此益亂人意吾策決矣惟有提兵臨邊決戰以報國耳遂抗疏主戰因親往襄陽檄扈再興陳祥鈐轄孟宗政等禦之仍增戍光化信陽均州以聨聲勢金人來自團山勢如風雨冉興等分三陳設伏以待既至冉興佯却金人逐之宗政與祥合左右兩翼掩擊之金人三面受敵大敗血肉枕籍山谷間尋報棗陽圍急宗政午發峴首遲明抵棗陽馳突如神金人大駭宵遁方聞捷大喜以宗政權知棗陽軍未幾京湖將王辛劉世興亦敗金兵於光山隨州金人乃去六月趙方請以伐金詔天下乃下詔略曰朕勵精更化一意息民知鄭蛇之有妖天厭久矣方秦鹿之既失人競逐之豈不知機會可乘讐恥未復念甫申於信誓實重起于兵端若能立非常之勳則亦有不次之賞遂傳檄詔諭中原官吏軍民十二月金完顔贇以步騎萬人犯四川破天水軍守臣黃炎孫遁金人攻白環堡破之統制劉雄棄大散關遁十一年二月甲辰金人焚大散關復破皂郊死者五萬人戊辰金人圍隨州棗陽軍孟宗政權棗陽初視事一愛僕犯新令立斬之軍民股栗於是築堤積水修治城堞簡閲軍士完顔薩布擁步騎圍城宗政與扈再興合兵角敵歷三月大小七十餘戰宗政身先士卒金人戰輒敗忿甚周城開濠控兵列濠外飛鋒鏑以綯鈴自警鈴響則犬吠宗政厚募壯士乘間突擊金人不能支盛兵薄城宗政隨方力拒隨州守許國援師至白水鼓聲相聞宗政率諸將出戰金人奔潰三月利州統制王逸帥官軍及忠義人十萬復大散關及皂郊堡追斬金統軍完顔贇進攻秦州至赤谷口沔州都統劉昌祖命退師且放散忠義人軍遂大潰夏四月金兵合長安鳯翔之衆復攻皂郊遂趨西和州劉昌祖焚城遁還時西和守臣楊克家成州守臣羅仲甲階州守臣侯頥以昌祖遁棄城走金兵遂入諸州前後獲糧九萬斛錢數千萬軍實不可勝計復犯大散關守將王立亦遁又犯黃牛堡興元都統吳政拒却之政至大散關執立斬之以徇事聞政進三官昌祖奪官竄韶州克家等並竄逺州十二月金主欲乘勝來議和以開封府治中呂子羽為詳問使至淮中流不納乃去由是和好遂絶金主以布薩安貞為左副元帥輔太子守緒會師南侵十二年春正月辛卯金復侵西和州守將趙彥呐設伏待之殱其衆乃還乙未興元都統吳政及金人戰于黃牛堡死之二月癸卯金人乘勝攻武林關都統李貴遁還丁未金人破興元府權府趙希旨棄城走辛亥金人破大安軍連破洋州壬子四川制置使董居誼遁都統張威使石宣邀擊金人於大安軍大破之殱其精兵三千人俘其將巴圖魯安金人乃遁去金完顔額爾克復大舉圍棗陽塹其外繞以土城趙方計其空巢穴而來若搗其虛則棗陽之圍自解乃命知隨州許國及扈再興引兵三萬餘分二道出攻唐鄧二州又命其子范監軍葵為後殿閏三月癸亥金人圍安豐軍及滁濠光三州江淮制置使李珏命巴州都統制武師道忠義軍都統制陳孝忠救之皆不克進金人遂分兵自光州犯黃州之麻城自濠州犯和州之石磧自旴𣅿犯滁州之全椒來安及揚州之天長真州之六合淮南流民渡江避亂諸城悉閉金逰騎數百至采石楊林渡建康大震時賈涉以淮東提刑知楚州節制京東忠義慮忠義人兵為金所用乃遣陳孝忠向滁州石圭夏全時青向濠州季先葛平楊德廣趨滁濠李全李福要其歸路李全進至渦口與金左都監赫舍哩薩古察駙馬阿海連戰于化湖陂殺金將數人得其金牌金人乃解諸州之圍而去全追擊之復敗之于曹家莊而還金人自是不敢窺淮東初賈涉募能殺金太子者賞節度使殺親王者賞承宣使殺駙馬者賞觀察使李全因致所得金牌于涉云殺駙馬阿海所獲者涉請於朝乞如約授賞遂授全廣州觀察使而阿海實不死也秋七月孟宗政扈再興合擊金人于棗陽時金帥完顔額爾克擁步騎傳城宗政囊粳盛沙以覆樓棚列甕瀦水以隄火募炮手擊之一炮輒殺數人金人選精騎二千號弩手擁雲梯天橋先登又募鑿銀礦石工晝夜攻城運茒葦直抵圜樓下欲焚樓宗政先燬樓掘深坑防地道創戰棚防城損穿穽才透即施毒煙烈火鼓鞲以薰之金人窒以濕氊析路以刳土城頽樓陷宗政撤樓益薪架火山以絶其路列勇士以長鎗徑弩備其衝距樓陷所數丈築偃月城翼正城金人摘強兵披厚鎧氊衫鐵面而前又濕氊濡革蒙火山擁雲梯徑抵西北圜樓登城城中軍以長戈舂其喉殺之敢勇軍自下夾擊金兵墜死燎焰金人連不得志會扈再興許國兩道並進掠唐鄧境焚其城柵糧儲金頓兵棗陽城下八十餘日趙方知其氣已竭乃召國再興還併東師𨽻於再興尅期合戰再興敗金人于瀼河又敗之城南宗政自城出擊內外合勢士氣大振賈勇入金營自晡至三更殺其衆三萬金人大潰額爾克單騎遁獲其資糧器甲不可勝計追金人至馬磴寨焚其城入鄧州而還金人自是不敢窺襄漢棗陽中原遺民來歸以萬數宗政發廪贍之給田創屋與居籍其勇壯號忠順軍俾出沒唐鄧間宗政由是威振境外金人呼為孟爺爺冬十月己丑京湖制置使趙方以金人屢敗必將同時並攻當先發以制之乃遣扈再興許國孟宗政帥師六萬分三道伐金戒之曰毋深入毋攻城第潰其保甲燬其城寨空其資糧而已十三年春正月丁酉扈再興攻鄧州許國攻唐州皆不克而還金人追之遂攻樊城趙方督諸州拒退之孟宗政復敗金人于湖陽八月安丙遺夏人書定議夾攻金人以夏兵野戰我師攻城遂命利州統制王仕信帥師赴熙秦鞏鳯翔委丁焴節制且傳檄招諭陜西五路官吏軍民初夏人與金連和八十餘年未嘗交兵及為蒙古所攻求救于金金人不能出兵夏人怨之和好遂絶九月辛卯夏人遣其樞密使寧子寧帥衆二十萬圍鞏州且來趣兵王仕信帥師發宕昌是月安丙命諸將分道進兵統制質俊李實發下城都統制張威出天水程信出長道陳立出大散關田冒出子午谷陳昱出上津庚子質俊等克來遠鎮敗金人於定邊城辛丑王仕信克鹽川鎮乙巳會夏人於鞏州城下攻城不克遂趨秦州丙辰夏人自安遠此石退師冬十月丁巳程信復邀夏人共攻秦州夏人不從遂自伏羌城引兵還諸將皆罷兵安丙命信斬王仕信于西和罷張威官十四年二月戊辰金人圍光州己巳金人犯五關壬申金人圍黃州又遣將圍漢陽軍三月丙戌鄂州副都統扈再興引兵攻唐州金人圍黃州急詔馮榯援蘄黃榯遷延不進黃州守何大節取郡印佩之誓以死守一夕輿兵忽奔告曰城陷矣擁之登車才出門而敵兵已集大節竟自沉於江而死金人復陷蘄州知州事李誠之自殺家屬皆赴水死癸丑金兵退扈再興邀擊於天長敗之夏四月戊辰金人渡淮北去李全遣兵邀擊又大敗之冬十月夏人復乞會師伐金十五年夏四月金主以朝廷絶嵗幣國用以困乃命元帥左監軍額爾克行元帥府事節制三路軍馬同僉書樞密院事時全副之由頴夀進渡淮敗官軍於高塘市攻固始縣破廬州將焦思忠兵既而獲生口言時全之姪青受宋詔與全兵相拒全匿其事五月額爾克引還距淮二十里諸軍將渡全矯稱密詔諸軍且留收淮南麥遂下令人獲三石以給軍衆惑之留三日額爾克謂全曰今淮水淺狹可以速濟若值暴漲宋乘其後將不得完歸矣全力拒之是夕大雨明日淮水暴漲乃為橋渡軍官軍襲之全兵大敗橋壞全以輕舟先濟士卒皆覆沒金之兵財由是大竭金主詔數全罪而誅之十七年三月金主遣尚書令史李唐英至滁州通好既而復遣樞密判官伊喇莽阿率兵至光州榜諭軍民更不南侵李全之亂寧宗嘉定四年十一月金益都楊安兒兵起初益都人楊安國少無賴以鬻鞍材為業市人呼為楊安兒遂自名楊安兒金泰和中南侵山東無賴往往相聚剽掠命州縣招捕之安兒時為羣盜亦請降𨽻名軍中纍官至防禦使及蒙古兵薄中都金人招鐵亢敢戰軍得千餘人以唐古哈達為都統安兒副之以戍邊安兒至雞鳴山不進亡歸山東與張汝楫聚黨攻劫州縣殺掠官吏山東大擾七年十二月金濰州李全兵起全濰州北海農家子鋭頭蜂目權譎善下人弓馬趫捷能運鐵鎗人號李鐵鎗開禧中戚拱嘗結之以復漣水金主遷汴賦斂益橫河北山東遺民保寨阻險羣聚為盜冦掠州郡皆衣紅納襖以相識時目為紅襖賊全與仲兄福亦聚衆數千鈔掠山東劉慶福國安用鄭衍德田四于洋于潭等皆附之八年二月金布薩安貞敗楊安兒於益都安兒奔登州刺史耿格納之安兒遂僭號置官屬改元天順衆數十萬安貞復與山東行省完顔霆經歷黃國等將花帽軍討敗之殱其衆安兒乘舟入海走岠􅀈山舟人曲成等擊之安兒墜水死無子其妹四娘子狡悍善騎射劉全收餘黨奉之稱曰姑姑衆尚萬餘掠食至磨旗山李全以其衆附之楊氏因與私通遂以為夫安貞復遣瓜爾佳錫爾格破劉二祖斬之餘黨稱霍儀為帥彭義斌石圭夏全時青裴淵葛平楊德廣王顯忠附焉十年秋七月知楚州應純之以山東羣盜來歸置忠義軍時李全等出沒島嶼寶貨山積而不得食相率食人會鎮江武鋒卒沈鐸亡命山陽誘致米商獲利數十倍應純之償以玉貨北人至者輒舍之鐸因説純之以歸銅錢為名弛渡淮之禁由是來者莫可遏初楊安兒之未敗有意歸朝定遠民季先者大俠劉佑家厮養也常隨佑部綱客山陽楊安兒見而悅之處以軍職安兒死先至山陽夤緣鐸得見純之道山東豪傑願歸正之意純之命先為機察諭意羣豪以鐸為武鋒副將與高忠皎各集忠義民兵分二道伐金先遂以兵五千人附忠皎忠皎與合兵攻海州糧援不繼退屯東海純之見北軍屢捷密聞於朝謂中原可復時瀕嵗小稔朝野無事丞相史彌遠鑒開祐之事不明招納密敕純之慰接之號忠義軍就聽節制給忠義糧於是東海馬良髙林宋德珍等萬人輻輳漣水李全等生羡心焉十一月李全及其兄福襲金青莒州取之十一年春正月壬午李全率衆來歸詔以全為京東路總管五月金石州賊馮天羽敗死其黨國安用來降詔以安用同知孟州事十二年九月以賈涉主管淮東制置司節制京東河北軍馬初山東來歸者日衆而石圭以計殺沈鐸於漣水應純之亦罷去權楚州梁丙無以贍之季先乞預借兩月糧然後率所部五千併馬良等萬人往密州就食丙不許先請速遣李全代領其衆丙亦不從而以石圭權軍務圭乃奪運糧之舟渡淮大掠至楚州南渡門焚毁幾盡丙遣人諭之不止時涉知旴𣅿軍上書言忠義之人源源而來不立定額自為一軍處之北岸則安能以有限之財應無窮之需飢則噬人飽則用命其勢然也朝廷因命涉節制忠義人兵涉受命即遣傳翼諭石圭楊德廣以逆順禍福圭等乃謝罪涉慮其人衆思亂囚滁濠之役分石圭陳孝忠夏全為兩屯李全為五寨又用陜西義勇法涅其手合諸軍汰者三萬有竒涅者不滿六萬人正軍常屯七萬使主勝客朝廷嵗省費十三四至是分江淮為三司乃命涉管淮東是月金張林以山東諸郡附李全來歸初蒙古克益都不守而去益都府卒張林與其黨復立府歸金以功為治中凶險不逞知府田琢在山東徴求過當失衆心林率其黨逐之琢戰敗乃還汴林遂據益都山東諸郡皆附之林欲歸附以自固而未決會李全自齊州還揣知林意乃薄兵青州城下遣人陳説國家威德勸林早附林恐全誘已猶豫未納全挺身入城惟數人從林乃開門納之相見甚歡謂得所托置酒結為兄弟全既得林要領附表奉青莒密登萊濰淄濵棣寧海濟南十二郡版籍來歸表辭有云舉七十城之全齊歸三百年之舊主詔授林武翼大夫安撫使兼京東總管十二月李全襲泗州不克而還時大雨雪淮水合請於賈涉曰每恨泗州阻水今如平地矣請取東西城自效涉許之全以長槍三千人從夜半渡淮潛向泗之東城將踏濠水傳城下掩金人不備俄城上荻炬數百齊舉遙謂全曰賊李三汝欲偷城耶天黑故特燭之全知有備乃引兵還十三年六月壬午賈涉誘殺漣水忠義軍副都統季先其下推石圭為帥以拒涉初李全自化湖陂之捷有輕諸將心以季先威望出已上隂結賈涉所任吏吳覬使譖先欲反涉信之乃以計命先赴樞密院議事於道殺之而遣統制陳選總先衆於漣水先部曲裴淵宋德珍孫武正王義深張山張友六人拒選不納而潛迎石圭于旴𣅿奉為統帥圭道楚城涉不之覺遂入漣水選還涉恥之謀分圭軍為六請於朝出修武京東路鈐轄印誥各六授淵等以分統先衆淵等陽從命而實不奉涉教令涉恐甚詔以圭為漣水忠義軍統轄八月金長清縣令嚴實為主將所疑挈家壁於清崖崓依益都張林以避之會趙拱以朝命諭京東過清崖實因求內附賈涉以聞實亦分兵四出所至州縣皆下於是太行之東皆受實節制實乃舉魏博恩德懷衛開相等郡來歸涉因再遣拱往諭配以兵二千李全亦請往涉不能止乃帥楚州及旴𣅿忠義萬人以行拱説全曰將軍提兵渡河不用而歸非示武也今乘勝取東平可乎全乃合張林軍得數萬襲東平之城南金行省蒙古綱帥師固守全與林夾汶水而寨明日金監軍王庭玉以騎兵三百奄至全欣然上馬帥帳前所有騎赴之殺數人奪其馬逐北抵山谷遇金將鄂博岱盛兵出旁有繡旗女將馳槍突鬭全幾不免會諸將赴救拔全以出乃退保長清精鋭喪失大半全恐所携鎮江軍五百人懷憤乃使拱先將之以歸而自以餘衆道滄州假鹽利慰贍之尋還楚州張林攻金滄州王福以城降冬十月金以時青為濟州宣撫使初青與叔父全俱為紅襖賊及楊安兒劉二祖敗青承赦為濟州義軍萬户後附李全來歸處之龜山有衆數萬至是金帥府遣人招之青以書乞假邳州以屯老幼當襲取旴𣅿盡定淮南以贖罪金主乃有是命未幾青復自金來附以為京東鈐轄十二月漣水忠義軍統轄石圭自以入漣水非賈涉本意心懷不安李全復請討圭於涉涉遂以全所統衆列於楚州之南渡門而移淮隂戰艦於淮安以示圭有備因命一將招圭軍來者增錢糧不至者罷支給衆心遂散圭技窮乃殺裴淵而挾孫武正宋德珍降於蒙古圭既去漣水之衆未有所屬李全求併將之涉不能却遂以付全十四年春正月以李全還自山東賜緡錢六萬時青入泗州西城二月金人來救青敗乃還十一月京東安撫張林叛降於蒙古先是李全既併將漣水忠義益驕悍輕朝廷及遊金山作佛事以薦國殤知鎮江府喬行簡方舟逆全大合樂以享之全歸語其徒曰江南佳麗無比須與若等一到始造舭􅭥舟謀爭舟楫之利膠西當登寧海之衝百貨輻輳全使其兄福守之為窟宅計時互市始通北人猶重南貨價增十倍全誘商人至山陽以舟浮其貨而中分之自淮轉海達於膠西福又具車輦之而稅其半乃聽往諸郡貿易車夫皆督辦於張林林不能堪林財計仰六鹽場福恃弟有恩於林欲分其半林許福恣取鹽而不分場福怒曰若悖恩耶待與都統提軍取若頭耳林懼其黨李馬兒説林歸蒙古林遂以京東諸郡降於蒙古將穆呼哩福狼狽走還楚州林猶貽賈涉書言非已叛實由李福也十五年二月李全復泗州夏四月知濟南府种贇討張林林敗走李全入青州據之十二月以李全為保寧軍節度使京東路鎮撫副使初全有戰功史彌逺欲加全官賈涉止之及加節鉞涉嘆曰朝廷但知官爵可以得其心寧知驕則將至於不可勸耶十六年六月淮東制置使賈涉以李全驕暴難制力求還朝在道卒初涉欲制忠義兵乃以翟朝宗統鎮江副司八千人屯楚州城中又分帳前忠義萬人命趙邦永高友統五千屯城西王暉于潭統五千屯淮隂李全輕鎮江兵而忌帳前忠義乃數稱高友等勇遇出軍必請以自隨涉不許全每宴麾下併召涉帳前將校於是帳前亦願𨽻全然未能合也及涉卒丘夀邁攝帥事全請曰忠義烏合尺籍鹵莽莫若别置新籍一納諸朝一申制閫一留全所庶功過有考請給無弊夀邁從之全乃合帳前忠義與已軍盡籍之而併統其軍夀邁不悟八月李全攻邳州不克復還青州十二月以許國為淮東制置使初國為淮西都統奉祠家居欲傾賈涉而代之數言李全必反涉卒會召國入對國疏全姦謀益深反狀已著非有豪傑不能消弭蓋自鬻也遂易國文階為淮東安撫制置使兼知楚州命下聞者驚愕淮東參幕徐晞稷雅意開閫及聞國用乃注釋國疏以寄全全不樂理宗寶慶元年二月楚州軍作亂初許國至鎮李全妻楊氏郊迓國辭不見楊氏慙而歸國既視事痛抑北軍有與南軍競者無曲直偏坐之犒賞十損八九全自青州致書于國國誇于衆曰全仰我養育我略示威即奔走不暇矣全故留青州國不能致乃數致厚餽邀全還劉慶福亦使人覘國意向國左右語覘者曰制置無害汝等意慶福以報全全集將校曰我不參制閫則曲在我今不計生死必往遂還楚州上謁賔贊戒全曰節使當庭參制使必免禮及庭趨國端坐納全拜不為止全退怒曰全歸本朝拜人多矣但恨汝非文臣本與我等汝向以淮西都統謁賈制帥亦免汝拜汝有何勳業一朝位我上便不相假借耶全赤心報朝廷不反也國繼設盛會宴全遺勞加厚全終不樂慶福謁國之幕客章夢先夢先令隔幕貌喏慶福亦怒既而全欲往青州恐國苛留自計曰彼所爭者拜耳拜而得志吾何愛焉更折節為禮因會集間出劄白事國見其細故判從之全即席再拜謝自是動息必請得請必拜國大喜語家人曰吾折服此虜矣全往青州國集兩淮馬步軍十三萬大閲楚城外以挫北人之心楊氏及軍校留者懼其謀已內自為備後全遣慶福還楚為亂適湖州潘壬事敗全黨益不安或教楊氏畜一妄男子指謂人曰此宗室也且語僚佐曰會令汝為朝士濳約旴𣅿四將為應旴𣅿四將不從於是慶福謀中輟止欲快意於國計議官茍夢玉知之以告國國曰但使反反即殺之我豈文儒不知兵者耶夢玉懼禍及求檄往旴𣅿復告慶福曰制使欲圖汝兩為自結之計及是國晨起視事忽露刃充庭客駭走國厲聲曰不得無禮矢已及顙流血被面而走亂兵悉害其家人縱火焚宫寺兩司積畜盡為賊有親兵數十人翼國登城樓縋城走伏道堂中宿焉賊擁通判姚翀入城犒兩軍使歸營是日慶福首殺夢先以報其辱明日國縊於途事聞史彌遠懼激他變欲事含忍以徐晞稷嘗倅楚守海得全歡心乃授晞稷為制置使令屈意撫全全自青州還楚佯責慶福不能彈壓致忠義之閧斬數人上表待罪朝廷不問知揚州趙范得制置印於潰卒中以授晞稷晞稷至楚全及門下馬拜庭下晞稷降等止之賊衆乃悅晞稷至以恩府稱全恩堂稱楊氏而手足倒置矣五月李全牒彭義斌于山東曰許國謀反已伏誅矣爾軍並聽我節制義斌大罵曰逆賊背國厚恩擅殺制使我必報此仇乃斬齎牒人南向告天誓衆見者憤激於是全自青州攻東平不克乃攻恩州義斌出兵與戰全敗走獲其馬二千劉慶福引兵救全又敗全退保山崓抽山陽忠義以北楊氏及劉全皆欲親赴難會全遣人求徐晞稷書與義斌連和乃止義斌致書沿江制置使趙善湘曰不誅逆全恢復不成但能遣兵扼淮進據漣海以蹙之斷其南路此賊必擒賊平之後復一京三府然後義斌戰河北旴𣅿諸將襄陽騎士戰河南神州可復也旴𣅿四總管亦各遣使致書乞助討賊知揚州趙范亦以為言史彌遠令諭范無出位專兵各享安靖之福范復以書力論之曰今上自一人下自一人至公卿百執事又下至士民軍吏無不知禍賊之必反雖先生之心亦自知其必反也衆人知之則言之先生知而獨不言不言誠是也內無卧薪嘗膽之志外無戰勝攻取之備先生隱忍不言而徐思所以制之此廟謨所以為高也然以撫定責之晞稷而以鎮守責之范責晞稷者函人之事也責范者矢人之事也既責范以惟恐不傷人之事又禁其為傷人之痛惡其為傷人之言何哉賊見范為備則必忌而不得以肆其姦他日必將指范為首禍激變之人劫朝廷以去范先生始未之信左右曰可卿大夫曰可先生必將曰是何惜一趙范而不以紓禍哉必將縛范以授賊而范遂為宋朝錯雖然使以范授賊而果足以紓國禍范死何害哉諺曰護家之狗盜賊所惡故盜賊見有護家之狗必將指斥於主人使先去之然後肆穿窬之姦而無所忌然則殺犬固無益於彌盜也欲望矜憐别與間慢差遣彌遠不聽六月彭義斌既克山東復納李全降兵兵勢大振遂圍東平嚴實濳約蒙古將博囉罕合兵攻之兵久不至城中食盡乃與義斌連和義斌亦欲藉實取河朔而後圖之遂以兄禮事實時實衆尚數千義斌不之奪而留所掠實青崖之家屬不遣秋七月彭義斌下真定道西山與博囉罕等軍相望義斌分嚴實帳下兵陽助而隂伺之實知勢迫即赴博囉罕軍與之合遂及義斌戰於內黃之五馬山義斌兵潰史天澤以鋭卒略其後遂擒義斌説之降義斌厲聲曰我大宋臣義豈為他臣屬耶遂死之於是京東州縣復為實有二年六月蒙古圍李全于青州全北剽山東南仰錢糧且挾朝廷以疑蒙古蒙古攻之全大小百戰終不利嬰城自守蒙古築長圍夜布狗寨全糧援路絶與兄福謀福曰二人俱死無益也汝身係南北輕重我當死守孤城汝間道南歸提兵赴援可尋生路全曰數千萬勍敵未易支也全朝出城夕陷於是全留青福還楚九月徐晞稷罷以劉琸為淮東制置使朝廷聞李全為蒙古所圍稍欲圖之以晞稷畏懦謀易帥劉琸雅意建閫使鎮江副都統彭􅗘延譽􅗘亦垂涎代琸從臾尤力故以琸代晞稷􅗘代琸知旴𣅿十一月劉琸至楚州心知不能制馭旴𣅿四總管惟以鎮江兵三萬自隨夏全請從琸素畏其狡不許彭􅗘自以資望視琸更淺曰琸止夏全是欲遺患旴𣅿琸猶憚夏全我何能用乃激夏全曰楚城賊黨不滿三千健將又在山東劉制使圖之收功在旦夕太尉何不往赴事會夏全欣然帥兵徑入楚城時青亦自淮隂入屯城內琸駭懼勢不容却復就二人謀焉時傳李全已死李福欲分兵赴青州琸令夏全盛陳兵楚城李全之黨震恐李全妻楊氏使人行成于夏全曰將軍非山東歸附耶狐死兔悲李氏滅夏氏寧獨存願將軍垂盼全諾楊氏盛飾出迎與按行營壘曰人傳三哥死吾一婦人安能自立便當事太尉為夫子女玉帛干戈倉廪皆太尉有望即領此無多言也夏全心動乃置酒歡甚飲酣就寢如歸轉仇為好反與福謀逐琸遂圍楚州治焚官民舍殺守藏吏取貨物時琸精兵尚萬人窘束不能發一令太息而已夜半琸縋城僅以身免鎮江軍與賊戰死者大半將校多死器甲錢粟悉為賊有琸步至揚州借兵自衛夏全既逐琸暮歸李全營楊氏拒之全恐楊氏圖已因大掠趨旴𣅿欲為亂旴𣅿將張惠范成進閉城門夏全不得入狼狽降金朝廷聞之大恐琸自劾未幾死三年春正月以姚翀為淮東制置使朝廷以翀嘗與李全交歡故命之翀朝辭帝謂曰南北皆吾赤子何分彼此卿其為朕撫定之翀至楚城東艤舟以治事間入城見李全妻楊氏用徐晞稷故事而禮過之楊氏許翀入城翀乃入寄治僧寺中極意娛之三月趙范上書史彌遠曰淮東之事日異日新然有淮則有江無淮則長江以北港汊蘆葦之處敵人皆可濳師以濟江面數千里何從而防哉今或謂巽辭厚惠可以啖賊而不知陷彼欵兵之計或謂斂兵退屯可以緩賊而不知成彼深入之謀或欲行清野以嬰城或欲聚烏合而浪戰或以賊詞之乍順乍逆而為喜懼或以賊兵之乍進乍退而為寬緊皆失策也失策則失淮失淮則失江而其失有不勝悔者矣夫有遏冦之兵有遊擊之兵有討賊之兵今寶應之逼山陽天長之逼旴𣅿須各增戍兵萬人遣良將統之賊來則堅壁以挫其鋒不來則耀武以壓其境而又觀釁伺隙時遣偏師掩其不備以示敢戰使雖欲深入而畏吾之搗其虛此遏冦之兵也旴𣅿之冦素無儲蓄金人亦無以養之不過分兵虜掠而食當量出精兵授以勇校募土豪出竒設伏以勦殺之此遊擊之兵也維揚金陵合肥各聚二三萬人人物必精將校必勇器械必利教閲必熟紀律必嚴賞罰必公其心術念慮必人人思親其上而死其長信能行此半年而可以強國一年而可以討賊矣賊既不能深入虜掠復無所獲而又懷見討之恐則必反而求贍於金金無餘力及此則必怨之怒之吾於是可以嫁禍於金人矣或謂揚州不可屯重兵恐速賊禍是不然揚州者國之北門一以統淮一以蔽江一以守運河豈可無備哉善守者敵不知所攻今若設寶應天長二屯以扼其衝復重二三帥閫以張軍勢賊將不知所攻而敢犯我揚州哉設使賊不知兵勢而犯揚州是送死矣朝廷乃召范稟議復令知池州五月李全以青州降蒙古全被圍一年食牛馬及人且盡將自食其軍全欲降懼衆異議乃焚香南向再拜欲自經而使其黨鄭衍德田四救己曰譬如為衣有身愁無袖耶今北歸未必非福全乃降蒙古劉慶福在山陽自知已為厲階懷不自安欲圖李福以贖罪于朝李福知之亦謀殺慶福於是二人互相猜忌不復相見一日李福偽稱疾不出旬餘慶福往候之李福乃躍起拔刀傷慶福慶福走左右殺之李福以慶福首納于姚翀翀大喜幕客杜來曰慶福首禍一世姦雄今頭落措大手邪時楚州自夏全之亂儲積無餘綱運不續賊黨籍籍謂福所致福畏衆口數見翀促之翀謝以朝廷撥降未下六月福乘衆怒與李全妻楊氏謀召翀飲翀至而楊氏不出就坐賔次左右散去福以命召諸幕客以楊氏命召翀二妾諸幕客知有變不得已而往杜來至八字橋福兵腰斬之福兵欲害翀鄭衍德救之得免去鬚鬢縋城夜走歸明州死朝廷以淮亂相仍遣帥必斃姑欲輕淮而重江楚州不復建閫就以其帥楊紹雲兼制置改楚州為淮安軍命通判張國明權守視之若羈縻州然秋七月張林等歸淮安討李福斬之初李全之黨以贍軍錢糧不繼屢有怨言全將國安用閻通歎曰我曹米外日受銅錢二百楚州物賤可以樂生而劉慶福為不善怨仇相尋使我曹無所衣食時張林邢德亦在楚自謂嘗受朝廷恩中遭全間二今歸于此豈可不與朝廷立事王義深嘗為全所辱且謂我本賈帥帳前人與彭義斌舉義不成而歸五人相謂曰朝廷不降錢糧為有反者未除耳乃共議殺李福及全妻楊氏以獻遂帥衆趨楊氏家福走出邢德手刃之相屠者數百人有郭統制者殺全次子通及全妾劉氏妄稱楊氏函其首并福首獻于楊紹雲雲馳送臨安傾朝皆喜八月檄知旴𣅿軍彭􅗘及總管張惠范成進時青併兵往楚州使便宜盡戮李全餘黨􅗘輕儇不為惠等所服得檄不敢自決請制府及朝廷處之朝議以時青望重檄青區畫青恐禍及密遣人報全於青州遷延不決惠成進以朝檄專委青而不及已乃歸旴𣅿設燕邀􅗘乘其醉縛之渡淮以旴𣅿降于金李全得時青報慟哭力告蒙古大將求南還不許全因斷一指以示之誓還南必叛蒙古大將乃承制授全山東淮南行省得專制山東嵗獻金幣全遂與蒙古張宣差及通事數人還楚州服蒙古衣冠文移紀甲子而無年號楊紹雲聞其至遂留揚州不還王義深奔金國安用殺張林邢德以自贖郭統制亦為全所殺十二月金封李全為淮南王全不受時全敗完顔額爾克于龜山故也李全誘殺時青並其衆紹定三年二月起復趙范趙葵節制鎮江滁州軍馬五月以李全為彰化保康節度使京東鎮撫使全不受命初全自還楚即厚募人為兵不限南北天長民保聚為十六寨比嵗失業官賑不繼壯者亦皆就募射陽湖浮居者數萬家家有兵仗侵掠難制其豪周安民谷汝礪王十五長之亦蜂結水寨以觀成敗全知東南利舟楫謀習水戰米商至悉併舟糴之留其舵工以一教十又遣人泛江湖市桐油黏筏募南匠大治舭􅭥船自淮口及海相望時時試舟于射陽湖及海洋復以糧少為辭遣海舟自蘇州洋入平江嘉興實欲習海道以覘畿甸然以山東經理未定而嵗貢蒙古者不可缺故外恭順朝廷以就錢糧因以貿貨輸蒙古朝廷亦以全往來山東得以少寬北顧之憂遣餉不絶全因縱遊説于朝復請建閫山陽又遣使入金且欲銷朝廷兵備乃遣軍士穆椿濳入京師皇城縱火焚御前軍器庫於是先朝兵甲盡喪全欲先據揚州以渡江分兵徇通泰以趨海其下皆曰通泰鹽場在焉莫若先取為家計且使朝廷失鹽利全欲朝廷不為備且雖反而不敢遽絶其給乃挾蒙古李宣差宋宣差以恫疑虛喝而蒙古實未嘗資全兵其李宣差則青州賣藥人也朝廷雖知其姦姑事茍安不之詰及全糶麥舟過鹽城知揚州翟朝宗嗾尉兵奪之全怒以捕盜為名水陸數萬徑搗鹽城戍將陳益樓強知縣陳遇皆遁全入城據之朝廷倉皇遣幹官王節懇全退師全不許留鄭祥董友守鹽城而自提兵還楚州以狀白于朝曰遣兵捕盜過鹽城縣令自棄城遁去慮軍民驚擾不免入城安衆朝廷乃授全節鉞令釋兵命制置司幹官往諭之全曰朝廷待我如小兒啼則與果不受制命朝廷為罷朝宗命通判趙敬夫攝州事先是士大夫無賢愚皆策李全必反而不敢言國子監丞度正獨上疏極言之且獻斃全之策有三其言鯁亮激切時不能用至是趙范趙葵深以全必反為慮纍疏力言之史彌逺不納冬十月以趙善湘為江淮制置使時李全造舟益急至發塜取黏板煉鐵錢為釘熬囚脂搗油灰列炬繼晷招沿海亡命為水手又紿趙敬夫以蒙古為辭邀增五千人錢糧求誓書鐵劵朝廷猶遣餉不絶全得米即自轉輸淮海入鹽城以贍其衆他軍士見者曰朝廷惟恐賊不飽我曹何力殺賊射陽湖人皆怨至有養賊戕民之語聞者莫不太息全又遣人以金牌誘脅周安民等造浮橋于喻口以便鹽城往來時史彌遠多在告諸執政又不以為意獨鄭清之深憂之力勸帝討全帝乃以趙善湘制置江淮許便宜從事然猶有內圖進討外用調停之説惟趙范趙葵兄弟力請進兵討之十二月庚申李全突至揚州灣頭揚州副都統丁勝拒之全乃攻城南門趙敬夫得史彌逺書許增萬五千名糧勸全歸楚州即遣劉易就全壘示之全笑曰史丞相勸我歸丁都統與我戰非相紿耶擲書不受敬夫恐亟迎趙范于鎮江范亦刻日約葵葵帥雄勝寧淮武定強勇四軍萬四千赴之時全引兵攻泰州知州宋濟迎降全入坐郡治盡收其子女貨幣將趨揚聞范葵已入揚城乃鞭鄭衍德曰我計先取揚州渡江爾曹勸我取通泰今二趙已入揚州矣江其可渡耶既而曰今惟有徑搗揚州耳遂分兵守泰而悉衆攻揚州至灣頭立寨據運河之衝使胡義將先鋒至平山堂以俟三城機便全攻東門葵親搏戰全將張友呼城門請葵出葵出與全隔濠立馬相勞苦問全來何為全曰朝廷動見猜疑今復絶我糧餉我非背叛索錢糧耳葵曰朝廷待汝以忠臣孝子汝乃反戈攻陷城邑朝廷安得不絶汝糧餉汝云非叛欺人乎欺天乎全無以對彎弓抽矢向葵而去自是屢戰全兵多敗全每云我不要淮上州縣渡江浮海徑至蘇杭孰能當我然全志吞揚州三城而兵每不得傅城下宗雄武獻策曰城中素無薪且儲畜為總領所支借殆盡若築長圍三城自困全乃悉衆及驅鄉農凡數十萬列寨圍三城制司總所糧援俱絶范葵命三城諸門各出兵劫寨舉火為期夜半縱兵衝擊殱賊甚衆自是全一意長圍以持久困官軍不復薄城全張蓋奏樂于平山堂布置築圍范令諸門以輕兵牽制親帥將士出堡寨西攻之全分兵諸門鏖戰自辰至未殺傷相當官兵王青力戰死之明日范出師大戰獲全糧數十艘葵亦力戰敗之四年春正月壬寅趙范趙葵大敗李全於揚州時全浚圍城塹范葵遣諸將出揚州東門掩擊全走上城官軍躡之蹂溺甚衆范陳于西門賊閉壘不出葵曰賊俟我收兵而出耳乃伏騎破垣間收步卒誘之賊兵數千果趨濠側李虎力戰城上矢石如雨注賊退有頃賊别隊自東北馳至范葵揮步騎夾浮橋吊橋並出為三迭陳以待之自己至未與賊大戰别遣虎等以馬步五百出賊背而葵率輕兵橫衝之三道夾擊賊敗走始全反謀已成然多顧忌且懼其黨不順而邊陲喜事者欲挾全為重遂贊成之故全決計反及趙善湘趙范趙葵用事聲罪致討罷支錢糧攻城不得欲戰不利全始大悔忽忽不樂或令左右抱其臂曰是我手否人皆怪之范葵夜議詰朝所向葵曰出東門范曰西出常不利賊必見易因其所易而圖之必勝不如出堡塞西門全置酒高會于平山堂有堡塞候卒識全槍垂雙拂為號以告范范喜謂葵曰此賊勇而輕若果出必成擒矣乃悉精鋭數千而西取官軍素為賊所易者張其旗幟以易之全望見喜謂李宋二宣差曰看我掃南軍官軍見賊突鬬而前亦不知其為全也范麾兵並進葵親搏戰諸軍爭奮賊始疑非前日軍欲走入土城李虎軍已塞其甕門全窘從數十騎北走葵率諸將以制勇寧淮二軍蹙之全趨新塘自決水後淖深數尺會久晴浮戰塵如燥壤全騎過之皆陷淖中不能自拔制勇軍追及奮長槍三十餘亂刺之全呼曰無殺我我乃頭目羣卒碎其尸而分其鞍馬器甲併殺三十餘人皆將校也全死餘黨欲潰國安用不從議推一人為首莫肯相下欲還淮安奉全妻楊氏范葵追擊大破之乃散去范還揚州捷聞加趙善湘江淮制置大使范淮東安撫使葵淮東提刑善湘季子汝梅史彌遠壻也奏請無阻而善湘亦以范葵進取有方慰藉殷勤故能成功五月趙范趙葵復帥步騎十萬攻鹽城屢敗賊衆遂薄淮安城殺賊萬計焚二千餘家城中哭聲震天淮安五城俱破斬首數千燒寨柵萬餘家淮北賊歸赴援舟師又勦擊焚其水柵夷五城餘址賊始懼王旻趙必勝全子才等移寨西門與賊大戰又破之全妻楊氏謂鄭衍德曰二十年梨花槍天下無敵手今事勢已去撑拄不行汝等未降者以我在故爾遂絶淮而去其黨即遣馮垍等納欵軍門趙范許之淮安平宋史紀事本末卷二十三
