body:
  text: 宋史紀事本末卷六明馮琦原編陳邦瞻增輯夏元昊拒命仁宗天聖六年五月夏王德明使其子元昊襲回鶻甘州取之元昊小字嵬理性雄毅多大略善繪畫圓面髙凖曉浮圖學通畨漢文字德明雖臣事中國及契丹然自帝其國至是以元昊襲破回鶻奪甘州遂立為皇太子明道元年十一月夏王德明卒遣使立其子元昊為西平王初元昊數諫其父勿臣宋德明輒戒之曰吾用兵久疲矣吾族三十年衣錦綺此宋恩也不可負元昊曰衣皮毛事畜牧蕃性所便英雄之生當帝王耳何錦綺為既襲封明號令以兵法勒諸部凡六日九日則見官屬倣中國置文武班立畨漢學自中書令宰相樞密使以下分命畨漢人為之以衣冠采色别士庶貴賤每舉兵必率部長與獵有獲則下馬環坐而飲割鮮而食各問所見擇取其長因避父諱改明道為顯道稱于國中景祐元年秋七月慶州柔逺砦畨部巡檢嵬通攻元昊後橋諸堡破之元昊遂寇慶州縁邊都巡檢楊遵與戰敗績環慶都監齊宗矩援之次節義峰伏發被執既而放還下詔約束之元昊雖常奉貢然車服僣擬改元開運或言石晉敗亡之號也更曰廣運初華州有二生張吳者俱困塲屋薄遊不得志聞元昊有意窺中國遂叛徃以策干之元昊大悦日尊寵用事凡夏人立國規模入宼方略多二人敎之三年冬元昊攻回鶻𤓰沙肅州克之元昊既悉有夏銀綏宥靜靈鹽㑹勝甘凉又取𤓰沙肅州而洪定威龍皆即堡鎮號為州仍居興州阻河依賀蘭山為固地方萬里改元大慶設十六司以總庶務置十二監軍司委酋豪分統其衆河北置七萬人以備契丹河南鹽州路五萬人以備環慶鎮戎原州左廂宥州路五萬人以備鄜延麟州右廂甘州路三萬人以備吐畨回紇餘兵駐賀蘭靈州興州興慶府為鎮守總十五萬人選豪族善弓馬五千人迭直號六班直分鉄騎三千為十部元昊自製畨書形體頗類八分以教國人紀事寳元元年冬十月元昊僣稱帝建國號曰大夏先是元昊遣使詣五臺供佛以窺河東道路既還與諸酋㰱血約先攻鄜延欲自靖德塞門砦赤城路三道並入其叔父山遇數勸元昊勿反不聽山遇遂挈妻子來降知延州郭勸執還元昊元昊殺之遂反遣使奉表略曰臣祖宗本出帝胄當東晉之末運創後魏之初基逺袓思恭當唐季率兵拯難受封賜姓祖繼遷心知兵要手握乾符大舉義旗悉降諸部臨河五郡不旋踵而歸沿邊七州悉差肩而克父德明嗣奉世基勉從朝命臣偶以狂斐制小畨文字改大漢衣冠衣冠既就文字既行禮樂既張器用既備吐畨塔塔張掖交河莫不從服稱王則不喜朝帝則是從輻輳屢期山呼齊舉伏願一垓之疆土建萬乘之邦家再讓靡遑羣集又迫事不得已顯而行之遂以十月十一日郊壇備禮為世祖始文本武興法建禮仁孝皇帝國號大夏建元天授伏望許以西郊之地冊為南面之君敢竭愚庸常敦歡好二年六月詔削元昊賜姓官爵初元昊表至宰相張士遜即議絶和問罪羣臣皆曰元昊小醜也請出師討之旋即誅滅矣諫官吳育獨進曰元昊雖稱藩臣尺賦斗租不入縣官且叛服不常請置之示不足責且彼已僣輿服勢必不能自削宜援國初江南故事稍易其名可以順附而收之又上言姑許其所求彼將無詞然後隂敕邊臣密修戰備使年嵗之間戰守之計立則元昊雖欲妄作不能為深害矣奏入士遜笑之至是下詔削奪元昊官爵絶互市揭榜于邊募能擒元昊若斬首獻者即授定難節鉞已而元昊又遣賀永年齎嫚書納旌節及所授勅誥置神明匣留歸孃族而去七月戊午夏竦移知涇州與范雍各加兼經畧使馬歩軍都總管又命天章閣待制龎籍體量陜西詔籍就竦計事竦上奏曰繼遷當太宗時遁逃窮蹙而累歳不能勦滅先帝惟戒疆吏謹烽候嚴卒乘來即逐之去無追捕然自靈武䧟沒銀綏割棄以來假朝廷威靈其所役屬者不過河外小羌耳况德明元昊相繼猖獗以繼遷窮蹙比元昊富實勢可知也以先朝累勝之士較當今闗東之兵勇怯可知也以興國習戰之帥方今沿邊未試之將工拙可知也繼遷竄伏平夏元昊窟穴河池地勢可知也若分兵深入糗糧不支進則賊避其鋒退則敵躡其後老師費糧深可虞也若窮其巢穴須渉大河長舟巨艦非倉卒可具若浮囊挽綆聮絡而進我師半濟賦乘勢掩擊未知何謀可以捍禦臣以為不較主客之利不計攻守之便而議追討者非良策也因條上十事一教習強弩以為竒兵二羈縻屬羌以為藩籬三詔嘉勒斯賚并力破賊四度地勢險易逺近砦柵多少而增減屯兵五詔諸路互相應援六募土人為兵以代東兵七增置弓手壯丁以備城守八併並邊小砦以完兵力九聽闗中民入粟贖罪以贍邊計十損並邊冗兵冗官以紓饋餉朝廷多采用之然是時邊臣多議征討反以竦為怯吳育又上言天下久安務因循而厭生事政令紀綱邊防機要置不復修一有邊警則倉皇莫知所為逮稍安靜則又無敢輙言者若政令修紀綱肅財用富恩信洽賞罰明將帥練習士卒精鋭則四夷望風自無他志若一不備則乘間而起矣又曰漢通西域諸國斷匃奴右臂諸戎内附雖有桀黠不敢獨叛唐太宗嘗賜回鶻可汗并其相手書納其貢奉厚以金帛真宗命潘羅支攻殺李繼遷而德明乃降元昊苐見朝廷比年與西域諸戎不通朝貢乃得以利㗖鄰境固其巢穴無肘腋之患跳梁猖獗彼得以肆而不顧矣請募士諭嘉勒斯賚及他番部離散其黨與使併力以攻而均其恩賜此伐謀之要也因録上真宗時通西域諸番事迹十一月夏人冦保安軍巡檢指揮使狄青擊敗之青初以善騎射為騎御散直從西征戰安逺諸砦皆克捷臨敵被髪帶銅靣具出入賊中皆披靡莫敢當至是元昊冦保安軍鈐轄盧守懃使青擊走之以功加秦州刺史帝欲召見問以方略㑹賊㓂渭川命圖形以進康定元年春正月元昊冦延州延州當夏人出入之衝地濶砦踈土兵寡弱又無宿將知延州范雍聞元昊且至懼甚元昊詐遣人通欵于雍雍信之不設備既而元昊盛兵攻保安軍鄜延副總管劉平石元孫屯慶州雍以書召之平與元孫趨土門元昊既破金明砦執都監李士彬父子破安逺塞門永平諸砦乘勝至延州城下雍閉門堅守平元孫聞之督騎兵晝夜倍道而前明日至萬安鎮平先發步兵繼進夜至三川口西十里止營遣騎兵先趨延州爭門時鄜延都監黄德和巡檢万俟政郭遵分屯外境雍皆召還為援平與之合步騎萬餘結陣東行五里許遇賊平與賊皆為偃月陣相向有頃賊兵涉水為横陣遵擊退之賊復蔽盾為陣官軍復擊却之奪盾殺獲及溺死者近千人平中流矢日暮賊以輕兵薄戰官軍小却黄德和居陣後望見軍郤率麾下走保西南山衆從之皆潰平遣其子宜孫馳追德和執轡語曰當勒兵還并力拒賊柰何先奔德和不從驟馬遁赴甘泉平遣軍校杖劒遮留得千餘人轉闘三日賊退還水東平率餘衆保西南山立七柵自固夜四鼓賊環營呼曰如許殘兵不降何待平旦賊酋舉鞭麾騎自山四出合擊絶官軍為二平遂與元孫等皆沒于賊會大雪賊解去延州得不䧟詔殿中侍御史文彦博即河中置獄問狀黄德和坐腰斬范雍貶知安州贈平元孫官雍為治尚恕好謀而少成故及於敗帝因劉平石元孫之敗問所以禦邊判太常禮院丁度奏曰今士氣傷沮若復追窮巢穴饋糧千里輕用人命以快一朝之意非計之得也唐都長安天寳後河湟覆沒涇州西門不開京師距冦境不及五百里屯重兵嚴烽火雖常有侵軼然卒無事太祖時疆塲之任不用節將但審擇材器豐其廪賜信其賞罰方陲輯寧㡬二十年為今之策莫若謹亭障逺斥堠控扼要害為制禦之全計因條上十策名曰備邊要覽時西疆未寧二府三司雖旬休不廢務言苻堅以百萬師冦晉謝安命駕出遊以安人心請給假如故無使外藩窺朝廷淺深從之二月丁亥以夏守贇為陜西經畧安撫招討使内侍王守忠為都鈐轄知諫院富弼言唐之衰以内臣監軍取敗非一今守忠為鈐轄與監軍無異昨用夏守贇已失人望願罷守忠勿遣不聽時西事日擾括畿内京東西淮南馬詔樞密同宰臣議邊事出内藏緡錢八十萬於陜西糴軍儲訪知邊事者釋冦所至州縣罪命知制誥韓琦安撫陜西初𤦺使蜀歸論西師形勢甚悉即命安撫陜西琦言范雍節制無狀宜召知越州范仲淹委任之方陛下焦勞之際臣豈敢避形跡不言若渉朋比誤國家當族帝從之召仲淹知永興軍三月丙辰詔大臣條陜西攻守策戊寅王􅎦陳執中張觀罷初天聖中􅎦使河北過真定時曹瑋為總管􅎦見之瑋謂曰君異日當柄用願留意邊防􅎦曰何以教之瑋曰吾聞趙德明嘗使人以馬𣙜易漢物不如意欲殺之其少子元昊年方十餘諫曰我戎人本從事鞍馬而以資隣國易不急之物已為非策又從而殺之失衆心矣德明從之吾嘗使人覘元昊狀貌異常他日必為邊患􅎦未以為然比再入樞密元昊果反帝數問邊事􅎦不能對及劉平敗議刺鄉兵久未决帝怒遂與執中觀同罷􅎦始歎瑋之明識夏五月壬辰張士遜罷以吕夷簡同平章事時軍興機務填委士遜位首相無所補諫官以為言遂罷士遜而用夷簡戊寅以夏竦為陜西經畧安撫使范仲淹為陜西都轉運使夏守贇庸怯寡方畧召與王守忠俱還范仲淹言今邊城之備十有五七闗中之備十無二三若昊賊深入乘闗中之虚東阻潼闗隔兩川貢賦則朝廷不得安枕矣為今之計宜嚴戒邊城使持久可守實闗内使無虚可乘若冦至邊城清野不與大戰闗中稍實豈敢深入二三年間彼自困弱此上策也今邊城請五路入討臣恐承平歳久無宿將精兵一旦興深入之謀國之安危未可知也是月元昊䧟塞門諸砦執砦主髙延德以去又䧟安逺承平砦時著作郎張方平上平戎十策其畧以為宜屯重兵河東示以形勢賊入冦必自延渭而興州巢穴之守必虚我師自麟府渡河不十日可至此所謂攻其所必救形格𫝑禁之道也宰相吕夷簡見而韙之秋七月己卯除范仲淹龍圖閣直學士與韓琦並為陜西經畧安撫副使同管勾都部署司事初范仲淹與吕夷簡有隙及議加職夷簡請超遷之上悦以夷簡為長者既而仲淹入謝上諭使釋前憾仲淹頓首曰臣向所論葢國事於夷簡何憾也八月詔范仲淹兼知延州先是詔分邊兵總管領萬人鈐轄領五千人都監領三千人冦至禦之則官卑者先出仲淹曰將不擇人以官為序取敗之道也於是大閲州兵得萬八千人分六將領之日夜訓練量賊衆寡使更出禦敵人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也大范葢指雍也仲淹以民逺輸勞苦請建鄜城為軍以河中府同華州中下户租税就輸之春夏徙兵就食可省糴十之三他所減不與詔以為康定軍仲淹又修承平永平等砦稍招還流亡定堡障通斥堠城十二砦於是羗漢之民相踵歸業九月元昊冦三川砦都巡檢楊保吉死之連䧟乾溝乾福趙福三堡韓琦使環慶副總管任福等領兵七千聲言巡邊部分諸將夜趨七十里至白豹城平明克之破四十一族焚其積聚而還時塞門諸砦既䧟鄜州判官种世衡言延安東北二百里有故寛州請因廢壘而興之以當冦衝右可固延安之勢左可致河東之粟北可圖銀夏之舊朝廷從之命世衡董其役夏人屢來爭世衡且戰且城然處險無泉議不可守鑿地百五十尺遇石横亘工徒曰是不可井矣世衡曰過石而下將無泉邪爾其屑而出之凡屑石一畚定償百錢工乃致力過石數重泉果沛發城成賜名青澗以世衡知城事世衡開營田募商賈通貨利城遂富實教民習射以銀為的中者與之或争徭役亦使之射中者優免有過失者亦使之射中則釋之由是人人能射十二月癸未出内藏絹一萬助糴邊儲戊申鑄當十錢以助邊費慶厯元年春正月帝以元昊勢益猖獗遣翰林學士晁宗慤即陜西問攻守之策夏竦等具二説令副使韓𤦺判官尹洙詣闕奏之帝取攻策執政以為難杜衍亦曰徼倖成功非萬全計帝不聽詔鄜延涇原會兵期以正月進討范仲淹言正月塞外大寒我師暴露不如俟春深賊馬瘦人飢其勢易制且鄜延宻邇靈夏西羌必由之地苐按兵不動以觀其釁許臣稍以恩信招徠之不然情意阻絶臣恐偃兵無期矣乞留鄜延一路以備招納或擇利進城廢砦以牽制元昊帝從之仍詔仲淹與琦等同謀可以應機乘便即仍出師琦亦奏言兩路協力尚懼未能大剉黠敵若鄜延以牽制為名則是委涇原孤軍嘗于賊手非計之得乞督令鄜延進兵同入帝以奏示仲淹仲淹言臣與琦等皆一心非有怯弱但戰者危事當自謹守以觀其變未可輕兵深入琦又令尹洙至延州議仲淹堅執不可洙歎曰公於此不及韓公也韓公曰大凡用兵當置勝敗于度外琦復上奏曰仲淹意在招納使朝廷強之終非己謀將佐聞之必無鋭志臣以賊昊傾國入冦不過四五萬老弱婦女舉族而行吾逐路重兵自守勢分力弱故遇敵不支若大軍併出鼓行而前乘賊驕惰破之必矣今中外不究此故遂乃待賊太過屯二十萬重兵只守界壕中夏之弱自古未有臣恐邊障日虚士氣日䘮經費益蹙師老思歸賊乘此有吞陜右之心乞别命近臣以觀賊隙如何進討斷在不疑朝廷終難之時元昊遣延德還延州與范仲淹約和仲淹自為書貽元昊備陳利害韓琦聞之曰無約而請和者謀也命諸將戒嚴而自行邊二月韓𤦺行邊至髙平元昊果遣衆㓂渭州逼懷逺城琦乃趨鎮戎軍盡出其兵又募勇士萬八千人命環慶副總管任福將之以耿傅叅軍事涇原都監桑懌為先鋒朱觀武英王珪各以所部從福將行琦令福併兵自懷逺趨徳勝砦至羊牧隆城出敵之後諸砦相距纔四十里道逺糧餉便度勢未可戰即據險置伏要其歸路戒之再三且曰茍違節制有功亦斬福引輕騎數千趨懷逺捺龍川遇鎮戎西路巡檢常鼎劉肅與敵戰于張家堡南斬首數百敵棄馬羊槖駞佯北桑懌引騎趨之福踵其後諜傳敵兵少福等因易之薄暮與懌合軍屯好水川觀英屯籠絡川相距五里約明日㑹兵川口必使夏人匹騎無還然不知已䧟其伏中矣路既逺芻餉不繼士馬乏食者三日時元昊自將精兵十萬營于川口候者言夏人有砦不多明日福與懌循好水川西行出六盤山下距羊牧隆城五里與夏軍遇諸將方知堕計勢不可留遂前格戰懌於道旁得數銀泥合封襲謹宻中有動躍聲疑莫敢發福至發之乃懸哨家鴿百餘自中起盤飛軍上於是夏兵四合懌馳犯其鋒福陣未成列賊縱鐵騎突之自辰至午陣衆動欲據勝地忽夏人陣中樹鮑老旗懌等莫測既而旗左麾左伏兵起右麾右伏兵起自山背下擊士卒多墜崖塹相覆壓懌肅戰死敵分兵數千斷官軍後福力戰身被十餘矢有小校劉進勸福自免福曰吾為大將兵敗以死報國爾揮四刃鉄簡挺身决闘鎗中左頰絶其喉而死子懐亮亦死之敵乃併兵攻觀英戰既合珪自羊牧隆城引屯兵四千五百陣于觀軍之西渭川駐泊都監趙津將瓦亭騎兵二千繼至珪屢出畧陣陣堅不可破英被重傷不能視軍敵兵益至官軍大潰英津珪傅皆死士卒死者萬三百人惟觀以兵千餘保民垣四向縱射會暮敵引去得還闗右大震時元昊傾國入冦福臨敵受命所綂皆非素撫之兵又分出趨利故至甚敗琦還至半途陣亡者之父兄妻子數千人號於馬首持故衣紙錢招魂而哭曰汝昔從招討出征今招討歸而汝死矣汝之魂亦能從招討以歸乎哀慟之聲震天地琦掩泣駐馬不能進范仲淹聞之歎曰當是時難置勝負於度外也奏至帝震悼為之旰食宋庠請修潼闗以備衝突夏竦使人收散兵得琦檄於福衣帶間言罪不在琦琦亦上章自劾猶奪一官當時言者又謂福之敗由叅軍耿傅督戰太急後得傳書乃戒福使持重毋輕進經畧判官尹洙以傅文吏無軍責而死于行陣又為時所誣為作憫忠辨誣二篇三月元昊荅范仲淹書語極悖慢仲淹對來使焚之吕夷簡語宋庠曰人臣無外交希文乃擅與元昊書得其書又焚不奏他人敢爾邪時朝廷命仲淹陳對仲淹奏曰臣始聞敵有悔過之意故以書誘諭之會任福敗敵勢益張故復書悖慢臣以為使朝廷見之而不能討則辱在朝廷乃對官屬焚之使若朝廷初不知者則辱專在臣矣故不敢上聞奏下兩府共議宋庠遽曰仲淹可斬杜衍曰仲淹志在招叛葢忠於朝廷也何可深罪争之甚力宋庠謂夷簡必有言助己而夷簡黙無一語上顧問夷簡何如夷簡曰杜衍之言是也止可薄責而已乃降仲淹知耀州夏四月以陳執中同陜西安撫經畧招討使時夏竦判永興軍執中知軍中議多異同故分命竦屯鄜州執中屯涇州竦雅意在朝廷及任以西事頗依違顧避嘗出巡邊置侍婢軍中幾至兵變元昊命募得竦首與錢三千其見輕侮如此六月壬辰詔陜西諸路總管司嚴邊備毋輒入賊界賊至則禦之秋七月元昊冦麟府州折繼閔敗之八月元昊冦金明砦破寧逺砦砦主王世亶兵馬監押王顯死之進圍豐州孤城無援遂䧟知州王餘慶兵馬監押孫吉死之時元昊遣兵分屯要害以絶麟州餉道楊偕請棄河外保合河津帝不許會管勾麟府軍馬事張亢擊賊琉璃堡破之又戰于栢子砦及兎毛川皆敗之遂築建寧等五堡十餘柵河外始固冬十月夏竦陳執中罷時知諌院張方平言竦為統帥三嵗于兹師惟不出出則䘮敗冦惟不來來則殘傷安用為統帥也今將校被斥而帥不加罪非刑賞之公乃改竦判河中執中知陜州分秦鳯涇原環慶鄜延為四路以韓琦知秦州王㳂知渭州范仲淹知慶州龎籍知延州各兼經畧安撫招討使詔分領之張方平言涇原最當賊衝王㳂未愜人望不當與琦等同列不報琦上言請於鄜慶滑三州各更益兵三萬人㧞用有勇畧將帥統領訓練預分部曲逺斥候於西賊舉動之時先據要害來則命駐劄之兵觀利整陣併力擊之又于西賊未集之時出三州已整之兵淺入大掠或破其和市招其種落築壘拓地别立經制朝廷節儉省費傾内帑三分之一分助邊用使行間覘賊如此則二三年間賊力漸屈平定有期矣自元昊反延州城砦焚掠殆盡籍至稍葺治之戍兵十萬無壁壘皆散處城中畏籍莫敢犯法籍命部將狄青將萬人築招安砦於橋子谷傍以㫁冦出入之路又使周美襲取承平砦王信築龍安砦悉復所亡地築十一城延民以安初元昊隂誘屬羌為助而環慶酋長六百餘人約為鄉導事尋露仲淹以其反覆不常至部即奏行邊以詔書犒賞諸羌閲其人馬為立條約諸羗皆受命自是為中國用羌人親愛之呼為龍圖老子仲淹以慶州西北馬舖砦當後橋川口在賊腹中欲城之度賊必争宻遣其子純佑與番將趙明先據其地引兵隨之諸將不知所向行至柔逺版築皆具旬日城成即大順城也賊覺以三萬騎來戰佯北仲淹戒勿追已而果有伏大順既成而白豹金湯皆不敢犯環慶自此冦盜益少仲淹在邊純佑年方冠與將卒錯處鈎深摘隠得其材否由是仲淹任人無失所向有功自西方用兵帝為旰食然元昊亦困弊漸有自悔之意知諫院張方平言曰陛下猶天地父母也豈與犬豕豺狼較乎願因郊赦引咎示信開其自新之路帝喜曰是吾心也命方平以䟽付中書呂夷簡讀之拱手曰公言及此社稷之福也二年閠九月知延州龎籍言夏境䑕食稼且旱元昊思納欵詔命知保安軍劉拯諭元昊親信伊里剛朗凌伊齊兄弟言公方持靈夏兵儻内附當以西平茅土分冊之剛朗凌令朗黙竒沙密囊三人詣种世衡乞降又使其教練使李文貴至青澗報世衡言用兵以來資用困乏人情便於和世衡與籍咸疑其詐乃屯兵青澗留文貴不遣已而元昊果大舉入冦攻鎮戎軍王㳂使副總管葛懐敏督諸砦兵禦之分諸將為四路趨定州砦賊毁橋㫁其歸路四靣圍之懷敏突圍走由是大潰懐敏馳至長城濠路已斷遂及將校十四人死焉餘軍九千六百馬六百皆為敵所得元昊乘勝直抵渭州焚蕩廬舍屠掠民畜自涇汾以東皆閉壘自守范仲淹自將慶州番漢兵援之元昊乃還議者欲以金繒啖契丹使攻元昊命御史中丞賈昌朝徃使昌朝力辭使命且上疏曰太祖收方鎮之權以為萬世利及太宗時將帥率多舊人猶能伏威靈所向有功近嵗因西羌之叛驟擇將領而士不練習以屢易之將馭不練之士故戰則必敗此削方鎮太過之弊也况今武臣多親舊恩倖出即為將素不知兵一旦付以千萬人之命是驅之死地矣此用親舊恩倖之弊也請自今方鎮守臣無數更易刺史以上宜慎所授以待有功且命將之時去疑貳推恩惠務責以大効使一切便宜從事庶得馭將之道帝嘉納之冬十月戊午發定州禁軍二萬二千人屯涇原庚申詔恤將校陣亡其妻女無依者養之宫中十一月壬申黒氣貫北斗辛巳以韓琦范仲淹龎籍為陜西安撫經略招討使置司涇州初翰林學士王堯臣體量安撫陜西歸上疏論兵因言韓琦范仲淹皆忠義智勇不當置之散地及葛懐敏敗死中外震懼帝思堯臣之言會仲淹附王懐德入奏乞與韓𤦺同經畧涇原并駐涇州琦兼秦鳳臣兼環慶涇原有警臣與琦合秦鳳環慶之兵犄角而進若秦鳯環慶有警亦可率涇原之師為援臣當與琦練兵選將漸復横山以斷賊臂不數年間可期平定願詔龎籍兼領環慶以成首尾之勢秦州委文彦博慶州用滕宗諒總之渭州一武臣足矣帝采用其策於是復置陜西路經畧安撫招討使總四路之事置府涇州益屯兵三萬以琦仲淹籍分領之復以堯臣為體量安撫使徙彦博帥秦宗諒帥慶張亢帥渭州堯臣復言琦等既為陜西四路招討等使則四路當禀節制不當復帶使名各置司行事使所禀不一於是諸路並罷經畧使琦與仲淹在兵間久名重一時人心歸之朝廷倚以為重二人號令嚴明愛撫士卒諸羌來者推誠撫接咸感恩畏威不敢輒犯邊境人為之謠曰軍中有一韓西賊聞之心膽寒軍中有一范西賊聞之驚破膽三年春正月詔陕西沿邊招討使韓琦范仲淹龎籍凡軍期申覆不及皆便宜從事用安撫使王堯臣請也癸巳元昊上書請和時西鄙用兵日久帝心厭之㑹契丹使至亦言元昊欲歸欵乃宻詔龎籍招納之籍遣李文貴還以通意元昊聞之大喜仍使文貴至延州議和然猶倔強不肯削僣號且云如日方中止可順天西行安可逆天東下籍以其言未服乃令自請詔籍復書許之元昊知朝廷許和有緒乃遣其六宅使賀從朂與文貴至延州上書自稱男邦尼鼎國烏珠上書父大宋皇帝更名囊蘇而不稱臣烏珠即吾祖也如王汗號籍言名體未正不敢以聞從朂曰子事父猶臣事君也若得至京師天子不許更歸議之籍送使者闕下因陳便宜言羌久不通和市國人愁怨今辭理寖順必有改事中國之心請遣使諭之契丹使來請勿納元昊朝廷未知所荅禮部郎中吳育因上疏曰契丹受恩為日已久不可納一叛羌失繼世兄弟之懽今二番自鬬鬭久不解可觀形勢乘機立功萬一過計亟納元昊臣恐契丹窺兵趙魏朝廷不得元昊毫髪之助而太行東西且有烟塵之警矣宜使人諭元昊曰契丹汝世姻一旦自絶力屈而歸我我所疑也若無他者當順契丹如故然後許汝歸欵告契丹曰已詔元昊如能投謝轅門即聽内附若猶堅拒當為討之如此則彼皆不能歸罪我矣於是詔兩制出契丹書令兩制同上對不異育議范仲淹巡邊知環州屬羌多宻與元昊相通以种世衡素得屬羌心而青澗城已完乃奏徙世衡知環州以鎮撫之有牛諾爾阿素倔強未嘗出見州官聞世衡至乃來郊迎世衡與約明日當至其帳慰勞部落是夕雪深三尺左右曰諾爾阿凶詐難信且道險不可行世衡曰吾方以信結之豈可失期邪遂冐雪而往既至諾爾阿大驚曰吾世居此山漢官無敢至者公了不我疑耶帥部落羅拜皆感激心服夏四月癸卯賀從朂至京師帝用龎籍言命著作佐郎邵良佐如夏州許冊封元昊為夏國主歳賜絹十萬匹茶三萬斤富弼言元昊臣契丹而不臣我朝則是謂契丹無敵于天下矣須令稱臣乃可許和蔡㐮亦言元昊自稱烏珠既又譯為吾祖特以侮慢朝廷使朝廷賜之詔而亦曰吾祖是何等語邪不可許其請帝皆不聽良佐至夏州元昊亦遣嘉鼎聿舍張延夀等來議和及嵗幣甲辰朝廷以元昊請和遂詔韓琦范仲淹為樞宻副使命知永興軍鄭戬代之富弼言西冦未殄亦須藉材若二人俱來或恐闕事願召一人使處于内一人就授副樞且令在邊表裏相濟事無不集不聽時元昊倚契丹邀索無厭晏殊等厭兵將一切從之琦力陳其不便帝嘉納之四年五月元昊復遣使上誓表言兩失和好遂厯七年立誓自今願藏盟府其前日所掠將校民户各不復還自此有邊人逃亡亦毋得襲逐臣近以本國城砦進納朝廷其栲栳鎌刀南安承平故地及他邊境番漢所居乞畫中為界於内聽築城堡凡嵗賜銀綺絹茶二十五萬五千乞如常數臣不復以他相干乞頒誓詔葢欲世世遵守永以為好儻君親之義不存或臣子之心渝變當使宗祀不永子孫罹殃帝遣使賜元昊詔從之十二月遣尚書員外郎張子奭充冊禮使册元昊為夏國主仍賜對衣黄金帶銀鞍勒馬銀二萬兩絹二萬匹茶三萬斤冊以漆書竹冊籍以錦金塗銀印文曰夏國主印約稱臣奉正朔改所賜勑書為詔而不名許自置官屬使至京就驛貿賣宴坐朶殿使至其國相見用賔客禮置𣙜場於保安軍及髙平砦苐不通青鹽命國子博士髙良夫等會夏人畫疆界然朝廷使徃止留館宥州終不復至興靈而元昊帝其國中自若也五年夏四月夏人歸石元孫諫官御史奏元孫軍敗不死為國辱請斬于塞下以示西人賈昌朝曰春秋晉楚戰于邲楚獲晉知罃晉獲楚公子糓臣既而晉歸糓臣以求知罃楚人許之各全其生請如故事赦之因入對又袖出魏于禁傳以奏曰前代將臣覆没而還多不加罪帝乃貸元孫編管全州子弟嘗授陣亡恩澤者並奪追之八年春元昊死時年四十六子諒祚方期嵗黙藏氏所生也養于母族鄂特彭鄂特彭因與三大将分治國政謚元昊曰武烈皇帝廟號景宗尊黙藏氏為皇太后李燾曰元昊初娶伊齊從女伊里氏生寜凌格特愛之以為太子既而欲為寜凌格納摩伊克氏為妻見其美自取之寜凌格憤殺元昊不死劓其鼻而去匿鄂特彭家為鄂特彭所殺元昊因鼻創死夏四月冊諒祚為夏國主先是夏遣使來告哀朝廷及契丹皆遣使慰奠議者請因諒祚㓜弱母族専國以節鉞啖其三大將使各有所部分以披其勢可以得志陜西安撫使程琳曰幸人之䘮非所以柔逺人不如因而撫之帝乃遣使册諒祚為夏國主議者深惜朝廷之失機會儂智髙仁宗皇祐元年九月乙巳廣源州蠻儂智髙反冦邕州初儂氏自唐初即雄於西原世為廣源州首領唐末交阯強盛廣源服屬之知儻猶州儂全福為交人所殺其妻改適商人生智髙冒姓儂氏既壯與其母據儻猶州建國曰大厯交人攻而執之釋其罪使知廣源州智髙怨交阯乃乘間襲據安德州僣稱南天國改元景瑞因招納亡命貢獻中國求内附朝廷不許復奉金函書以請亦不報智髙怒與廣州進士黄師宻等謀據廣南乃數出敝衣易糓食紿言洞中饑饉部落離散知邕州陳珙信之不設備智髙一夕忽縱火焚其居因紿衆曰平生積聚今為天火所焚生計窮矣當取邕廣以自王否則兵死衆從之遂率衆五千沿江東下攻邕州横江寨守將張日新等戰死詔江南福建等路發兵備之四年五月智髙䧟邕横諸州遂圍廣州詔鈐轄陳曙等發兵討之智髙攻䧟邕州執知州陳珙等欲任司戸孔宗旦以事宗旦不屈大罵而死智髙即州建大南國自稱仁惠皇帝改元啟厯置官屬時天下久安廣南州郡無備智髙所向守臣輙棄城走遂䧟横貴藤梧康端龔封八州知封州曹覲知康州趙師旦皆戰死智髙進圍廣州知州魏瓘力戰禦之知英州蘇緘蒐募壯勇合數千人赴援扼賊歸路得黄師宻父斬之以狥而轉運使王罕亦自外至募民兵益修守備城得不䧟事聞命陳曙討之又以余靖為廣西安撫使同提刑李樞及曙經制賊盗事復以楊畋體量安撫廣西廣東鈐轄兵赴之六月丁亥以狄青為樞宻副使初尹洙與青談兵善之薦於韓琦范仲淹曰此良將材也二人待之甚厚仲淹授以左氏春秋且曰將不知古今匹夫勇耳青由是折節讀書悉通秦漢以來將帥兵法累進馬軍副都指揮使狄青起行伍十餘年而顯貴靣湼猶存帝嘗勑青傅藥除之青指其靣曰陛下以功擢臣不問門地臣所以有今日由此湼耳臣願留以勸軍中不敢奉詔帝益重之至是自知延州召拜副使臺諫王居正等諫其不可帝不聽秋七月儂智髙䧟昭州九月以孫沔為廣南安撫使初以沔知秦州入見帝以秦事勉之對曰秦州不足煩聖慮陛下當以嶺南為憂臣觀賊勢方張官軍朝夕當有敗奏既而昭州鈐轄張忠以敗聞帝乃除沔湖南江西安撫使沔請發騎兵求武庫精甲梁適折沔曰毋張皇沔曰前日惟亡備故至此乃今欲示鎮靜邪夫實備不至而貌為鎮静危亡之道也乃與兵七百人沔憂賊度嶺而北乃檄湖南江西曰大兵且至其繕治營壘多具燕犒賊疑不敢北侵行至鼎州加廣南安撫使智髙冦擾日甚嶺外騷動楊畋等久無功帝以為憂智髙移書行營求邕桂節度使帝將受其降梁適曰若爾則嶺表非朝廷有矣㑹狄青上表請行遂以為宣撫使提舉廣南經制盗賊事青入對自言曰臣起行伍非戰伐無以報國願得番落數百騎益以禁兵羈賊首致闕下帝壯其言時命入内都知任守忠為青副知諫院李兑言唐失其政以宦者觀軍容致主將掣肘是不足法遂罷守忠諫官韓絳復言青武人不宜專任帝以問龎籍籍力賛青可用且言號令不專不如不遣乃詔嶺南諸軍皆受青節度儂智髙䧟賔州復入于邕時交阯請出兵助討智髙余靖以便宜許之請于朝狄青奏曰假兵于外以除内冦非我利也以一智髙横踐二廣力不能制乃假蠻夷兵蠻夷貪得忘義因而啟亂何以禦之願罷交阯助兵帝從之十二月狄青勒兵賔州陳曙兵敗青斬之以狥青行軍立行伍明約束野戰皆成營柵至廣南合孫沔余靖之兵進次賔州戒諸將無得妄與賊鬬聽吾所為廣西鈐轄陳曙乘青未至輒以步兵八千擊賊潰于崑崙闗殿直袁用等皆遁青曰令之不齊兵所以敗晨㑹諸將堂上揖曙起并召用等三十二人按以敗亡狀驅出軍門斬之沔靖相顧􅌓眙諸將股栗莫敢仰視五年春正月狄青夜度崑崙闗大敗儂智髙于邕州智髙走大理廣南平青既誅陳曙因按兵止營令軍休十日衆莫測賊覘者還言軍未即進青明日即整兵自將前軍孫沔將次軍余靖為殿夕次崑崙闗黎明整大將旗鼓諸將環立帳前待令乃發而青已㣲服與先鋒度闗趣諸將會食闗外賊方覺悉出逆戰右將孫節摶賊死山下賊氣鋭甚沔等懼失色青執白旗麾番落騎兵從左右翼擊之縱横開合部伍不亂賊不知所為大敗走追奔五十里斬首數千級賊黨黄師宻儂建中等及偽官屬死者百五十七人生擒賊五百餘死者萬計智髙等夜縱火燒城遁去由合江口入大理遲明青按兵入城獲金帛鉅萬招復老壯七千二百嘗為賊所俘脇者慰遣之梟師宻等于城下歛屍築京觀于城北隅時賊屍有衣金龍衣者衆謂智髙已死欲以上聞青曰安知其非詐邪寧失智髙不敢誣朝廷以貪功也廣南悉平捷至帝喜曰青破賊龎籍之力也又曰向非梁適言南方安危未可知也詔余靖經制廣西追捕智髙而召青沔還後二年靖遣都監蕭注入特磨道生獲智髙母及其弟智光子繼宗繼封又募死士使大理求智髙重譯得至會智髙已死於大理函首至京師乃誅其母及其弟子五月以狄青為樞宻使孫沔為副使賞平廣南功也龎籍及臺諫朝士皆論青不可長省府不聽貝州卒亂王則仁宗慶厯七年十一月貝州賊王則據城反以明鎬為河北安撫使則涿州人初以歳饑流至貝州自賣為人牧羊後𨽻宣毅軍為小校貝冀俗尚妖幻相與習為五龍滴淚等經及諸圖䜟書言釋迦佛衰謝彌勒佛當持世則之與母訣也嘗刺福字於背以為記妖人因妄傳則字𨼆起争信事之州吏張巒卜吉主其謀黨與連德齊諸州約以明年正旦斷澶州浮梁作亂㑹其黨以書詣北京留守賈昌朝事覺被執則故不待期亟以冬至日反時知州張得一方與官屬謁天靈觀則率其徒刼庫兵執得一囚之從通判董元亨索庫鑰元亨厲聲罵賊賊遂殺之又殺司理王奬等兵馬都監田斌以從卒巷戰不勝而出城扉闔提㸃刑獄田京等縋城出保南闗入驍健營撫士卒凡有欲應賊者京以計盡誅之由是營兵在外者皆懾服南闗得不陷則僣稱東平王國曰安陽年號曰德勝旗幟號令皆以佛為稱城以一樓為一州書州名補其徒為知州毎靣置一總管然縋城下者日衆于是令民伍伍為保一人縋餘悉斬事聞以知開封府明鎬為體量安撫使而詔貝州有能獲賊者授諸衛上將軍鎬至于州民汪文慶自城上繫書射鎬帳約為内應夜垂絙以引官軍入城者數百人賊覺率衆拒戰官軍不利乃與文慶等復縋而出鎬以貝州城峻不可攻乃為距闉將成為賊所焚鎬乃即南為地道日攻其北以牽制之八年春正月朝廷以則未下命文彦博為河北宣撫使鎬為之副夏竦惡鎬恐其成功凡鎬所奏輙從中阻之彦博既受命請軍事得專行許之彦博至貝鎬穿道適通遂選壯士夜半由地道入城衆登城賊縱火牛官軍以槍中牛鼻牛還攻之賊大潰開東門遁總𬋩王信追則擒之餘衆保村舍者皆被焚死竦復言所獲恐非真盗乃詔檻送則京師磔于市賊據城凡六十六日而敗改貝州為恩州張得一以降賊伏誅詔以彦博同平章事加明鎬端明殿學士封賈昌朝為安國公侍讀學士楊偕言賊發昌朝部中至出大臣乃能平昌朝為有罪不當賞弗聽夏四月以明鎬參知政事彦博推鎬貝州之功且薦其才可大用故也浚六塔二股河仁宗天聖元年秋七月詔發丁夫三萬八千卒二萬一千緡錢五十萬塞滑州決河六年八月河決于澶州之王楚埽八年始詔河北轉運計塞河之備良山令陳曜請䟽鄆滑界糜丘河以分水勢遣使行視之慶厯元年詔權停修決河自此久不復塞而開河分水之議起焉皇祐元年三月河合永清渠注乾寧軍二年秋七月河復決大名府館陶縣之郭固至和二年遣使行度故道且詣銅城鎮海口約古道髙下之勢先是朝廷既塞郭固而河勢猶壅議者請開六塔以披其勢故有是命翰林學士歐陽修上疏曰朝廷欲俟秋興大役塞商胡開横隴囘大河於古道夫動大衆必順天時量人力謀於其始而審於其終然後必行計其所利者多乃可無悔比年以來興役動衆勞民損財不精謀慮於厥初輕信利害之偏説舉事之始既已倉皇羣議一揺尋復悔罷不敢逺指他事且如河決商胡是時執政之臣不慎計慮遽謀修塞凡科配梢芟一千八百萬騷動六路一百餘軍州官吏催驅急若星火民庶愁苦盈於道途或物已輸官或人方在路未及興役尋已罷修虚費民財為國歛怨舉事輕脱為害若斯今又聞復有修河之役三十萬人之衆開一千餘里之長河計其所用物力數倍往年當此天灾歳旱民困國貧之際不量人力不順天時知其有大不可者五葢自去秋至春半天下苦旱京東尤甚河北次之國家常務安靜振恤之猶恐民起為盜况於兩路聚大衆興大役乎此其必不可者一也河北自恩州用兵之後繼以㓙年人户流亡十失八九數年以來人稍歸復然死亡之餘所存者㡬瘡痍未歛物力未完又京東自去冬無雨雪麥不生苖將踰暮春粟未布種農心焦勞所向無望若别路差及又逺者難為赴役一出諸路則兩路力所不任此其必不可者二也徃年議塞滑州决河時公私之力未若今日之貧虚然猶儲積物料誘率民財數年之間始能興役今國用方乏民力方疲且合商胡塞大决之洪流此一大役也自横隴至海千餘里埽岸久廢頓須興緝補又一大役也往年公私有力之時興一大役尚須數年今猝興三大役於災旱貧虚之際此其必不可者三也就令啇胡可塞故道未必可開鯀障洪水九年無功禹得洪範五行之書知水潤下之性乃因水之流疏而就下水患乃息然則以大禹之功不能障塞但能因勢而疏决耳今欲逆水之性障而塞之奪洪河之正流使人力斡旋囘注是大禹之所不能此其必不可者四也横隴湮塞已二十年商胡决又數歳故道已平而難鑿安流已久而難囘此其必不可者五也臣伏思國家屢歳灾譴甚多其於京東變異尤大地貴安靜而有聲巨嵎山摧海水揺蕩如此不止者僅十年天地警戒宜不虚發臣謂變異所起之方尤當過慮防懼今乃欲於凶儉之年聚三十萬之大衆於變異最大之方臣恐災禍自此而發也况京都赤地千里饑饉之民正苦天灾又聞河役將動徃徃伐桑毁屋無復生計流亡盗賊之患不可不虞宜速止罷用安人心九月詔自商胡之決大河注食堤埽為河北患其故道又以河北京東饑故未興役今河渠司李仲昌議欲納水入六塔河使歸横隴舊河舒一時之急其令兩制至待制以上臺諌官與河渠司同詳定修又上疏曰伏見學士院集議修河未有定論豈由賈昌朝欲復故道李仲昌請開六塔互執一説莫知孰是臣愚皆謂不然言故道者未詳利害之原述六塔者近乎欺罔之繆今謂故道可復者但見河北水患而欲還之京東然不思天禧以來河水屢决之因所以未知故道有不可復之𫝑臣故謂未詳利害之原也若言六塔之利者則不待攻而自破矣今六塔既已開而恩冀之患何為尚告奔騰之急此則减水未見其利也又開六塔者云可以全囘大河使復横隴故道今六塔止是别河下流已為濵棣德博之患若全囘大河顧其害如何此臣故謂近乎欺罔之繆也且河本泥沙無不淤之理淤常先下流下流淤髙水行漸壅乃決上流之低處此勢之常也然避髙就下水之本性故河流已棄之道自古難復臣不敢廣述河源且以今所欲復之故道言天禧以來屢決之因初天禧中河出京東水行於今所謂故道者水既淤澀乃決天臺埽尋塞而復故道未㡬又決於滑州南鐡狗廟今所謂龍門埽者其後數年又塞而復故道已而又決王楚埽所決差小與故道分流然而故道之水終以壅淤故又於横隴大決是則決河非不能力塞故道非不能力復所復不久終必決於上流者由故道淤而水不能行故也及横隴既決水流就下所以十餘年間河未為患至慶厯三四年横隴之水又自海口先淤凡一百四十餘里其後游金赤三河相次又淤下流既梗乃決於上流之商胡口然則京東横隴兩河故道皆下流淤塞河水已棄之髙地京東故道屢復屢決理不可復不待言而易知也昨議者度京東故道工料但云銅城已上乃特髙爾其東北銅城已上則稍低比商胡已上則實髙也若云銅城已東地勢斗下則當日水流宜決銅城已上何縁而頓淤横隴之口亦何縁而大決也然則兩河故道既皆不可為則河北水患何為而可去臣聞智者之於事有所不能必則較其利害之輕重擇其害少者而為之猶愈害多而利少何況有害而無利此三者可較而擇也又商胡初決之時欲議修塞計用稍芟一千八百萬科配六路一百餘州軍今欲塞者乃徃年之商胡則必用徃年之物數至於開鑿故道張奎所計工費甚大其後李參減損猶用三十萬人然欲以五十步之狹容大河之水此可笑者又欲增一夫所開三尺之方倍為六尺且濶厚三尺而長六尺自一倍之功在於人力已為勞矣且六尺之方以開方法筭之乃八倍之功此豈人力之所勝是則前功既大而難興後功雖小而不實大抵塞商胡開故道凡二大役皆困國勞人所舉如此而欲開難復屢決已驗之故道使其虚費而商胡不可塞故道不可復此所謂有害而無利者也就使幸而暫塞以紓目前之患而終於上流必決如龍門横隴之比此所謂利少而害多也若六塔者於大河有分水之名而無減患之實今下流所散為患已多若全囘大河以注之則濵棣德博河北所仰之州不勝其患而又故道淤澀上流必有他決之虞此直有害而無利耳是皆智者之不為也今若因水所在增治隄防疏其下流浚以入海則可無決溢散漫之虞今河所厯數州之地誠為患矣隄防歳用之夫誠為勞矣與其虚費天下之財虚舉大衆之役而不能成功終不免為數州之患勞歳用之夫此則所謂害少者乃智者之所宜擇也大約今河之勢負三決之虞復故道上流必決開六塔上流亦決河之下流若不浚使入海則上流亦決臣請選知水利之臣就其下流求入海路而浚之不然下流梗澀則終虞上決為患無涯帝不聽卒從仲昌議嘉祐元年夏四月六塔河復決時殿中丞李仲昌等塞商胡北流入六塔河不能容以致復決溺兵夫漂芻藁不可勝計河北被害者凡數千里詔三司判官沈立徃行視内使劉恢遂奏六塔之役水死者數千萬人穿土干犯禁忌且河口乃趙征村於國姓御名有嫌而大興鍤斸非便詔罷其役令御史吳中復内侍鄧守㳟置獄于澶劾仲昌等違詔㫖不俟秋冬塞北流以致決潰於是流仲昌于英州餘各被謫有差五年春正月議鑿二股河自李仲昌貶河事久無議者至是都轉運使韓贄言四界首古大河所經即溝洫志所謂平原金堤開通大河入篤馬河至海五百餘里者也自春以丁壯三千浚之可一月而畢支分河流八金赤河使其深六尺為利可必商胡決河自魏至于恩冀乾寧入于海今二股河自魏恩東至于德滄入于海分而為二則上流不壅可以無决溢之患乃上四界首二股河圖英宗治平元年始命浚二股河以紓恩冀之患未㡬又併五股河浚之神宗熈寧元年六月河溢恩州又決冀州棗強埽七月又溢瀛州樂壽埽於是都水監丞李立之請於恩冀瀛等州創生堤三百六十七里以禦河宋昌言謂今二股河内變移請迎河港進約簽入河身以紓四州水患都水監復奏慶厯中商胡北流于今二十餘年自澶州下至乾寧軍創堤千有餘里公私勞擾近歳冀州而下河道梗塞致上下埽岸屢危雖創新岸終非久計願相六塔舊口并二股河導使東流徐塞北流便詔翰林院學士司馬光入内都知張茂則乘傳相度四州生堤囘日兼視六塔二股利害二年正月光入對請如宋昌言策於二股之西置上約擗水令東俟東流漸深北流淤淺即塞北流放出御河胡盧河下紓恩冀深瀛以西之患初商胡決河自魏之北至恩冀乾寧入于海是謂北流嘉祐八年河流派于魏之第六埽遂為二股自魏恩東至于德滄入于海是謂東流時議者多不同李立之力主生堤帝不聴卒用昌言策置上約會北京留守韓琦言今歳兵夫數少而舍堤兩埽修上下約甚急深進馬頭欲奪大河緣二股及嫩灘舊濶千一百歩是以可容漲水今截去八百步有餘則將束大河於二百餘步之間下流既壅上流蹙遏湍怒又無兵夫修護堤岸其衝决必矣況自德至滄皆二股下流既無隄防必侵民田設若河門束狹不能容納漲水上下約隨流而脱則二股與北流為一其患愈大帝因謂二府曰韓琦頗疑修二股趙抃曰人多以六塔為戒王安石曰異議者皆不考其事實故也帝又問程昉宋昌言同修二股何如安石以為可治帝曰欲作簽河甚善安石曰誠然若及時作之徃徃河可東北流可閉帝然之七月張鞏等奏上約屢經泛漲并下約各已無虞東流勢漸順快宜塞北流除恩冀深瀛等州水患司馬光言鞏等欲塞河北流臣恐勞費未易或幸而可塞則東流淺狹堤防未全必致決溢是移恩冀深瀛之患於滄德等州也不若俟二三年間東流益深濶北流漸淺塞之便帝曰今不俟東流順快而塞北流他日河勢改移柰何且若河水常分二流何時當有成功光曰若上約流失其事不可知上約存則東流必增北流必减借便分為二流於鞏等不見成功於國家亦無所害何則西北之水併於山東故為害大分則害小矣鞏等亟欲塞北流皆為身謀不顧國力與民患也帝卒從鞏議四年秋七月北京新隄第四第五埽決漂溺館陶永濟清陽以下八月河溢澶州曹村十月溢衛州王供時新隄凡六埽而決者三下屬恩冀貫御河奔衝為一帝憂之是時人争言導河之利張茂則等謂二股河地最下而舊防可因今堙塞者纔三十餘里若渡河之湍浚而逆之又存清水鎮河以析其勢則悍者可囘決者可塞帝然之十二月令河北轉運使開修二股河上流併塞決口五年夏四月二股河成六月河溢夏津帝語執政聞京東調夫修河有壞産者河北調急夫役猶多若河復決柰何且河决不過占一河之地或西或東若利害無所較聴其所趨如何王安石曰北流不塞占公私田至多又水散漫久復澱塞昨修二股費至少而公私田皆出向之潟鹵俱為沃壤庸非利乎況調夫已減於去嵗若夫葺理堤防則河北嵗夫愈减矣六年夏四月置疏濬黄河司先是有選人李公義者獻鐵龍爪揚泥車法以濬河其法用鐵數斤為爪形以繩繫舟尾而沈之水篙工急櫂乘流相繼而下一再過水已深數尺宦官黄懷信以為可用而患其太輕王安石請令懷信公義同議增損乃别制濬川杷其法以巨木長八尺齒長二尺列于木下如杷狀以石壓之兩傍繫大䋲兩端矴大船相距八十歩各用滑車絞之去來撓蕩沙泥已又移船而濬或謂水深則杷不能及底雖數徃來無益水淺則齒碍沙泥曵之不動卒乃反齒向上而曵之人皆知不可用惟安石善其法使懷信先試之以濬二股又謀鑿直河數里以觀其效且言於帝曰開直河則水勢分其不可開者以近河毎開數尺即見水不容施工爾今第見水即以杷濬之水當隨杷改趨直河茍置數千杷則諸河淺澱皆非所患歳可省開濬之費㡬百千萬帝曰果爾甚善聞河北小軍壘當起夫五千計合境之丁僅及此數一夫至用錢八緡故歐陽修嘗謂開河如放火不開如失火與其勞人不如勿開安石曰勞人以除害所謂毒天下之民而從之者至是遂置司將自衛州濬至海口以虞部郎范子淵為都大提舉公義為之屬當是時北流閉已數年水或横决散漫常虞壅遏外監丞王令圖獻議於北京第四第五埽等處開修直河使大河還二股故道從之十年秋七月河決澶州自開直河水勢漸漲田廬益壞至是遂大決於澶州曹村北流斷絶河道南徙東匯於梁山張澤濼分為二派一合南清河入于淮一合北清河入於海凡灌郡縣四十五而濮齊鄆徐尤甚遣使修閉判大名府文彦博言河𫝑變移四散漫流兩岸俱被水患而都水止䕶東流北岸希省費之賞未嘗增修隄岸今者之決溢非天灾實人力不至之咎元豐元年夏四月决口塞詔改曹村埽曰靈平五月新堤成閉口斷流河復歸北初河決澶州也北外監丞陳佑甫謂商胡決三十餘年所行河道填淤漸髙堤防嵗增未免泛濫今當修者有三商胡一也横隴二也禹舊迹三也然商胡横隴故道地勢髙平土性疏惡皆不可復復亦不得持久惟禹故瀆尚存在大伾太行之間地卑而勢固故秘閣校理李垂與今知深州孫民先皆有修復之議望召民先同河北漕臣一員自衛州王供埽按視訖於海口從之四年夏四月小吳掃復大決自澶注入御河恩州危甚六月戊午詔東流已填淤不可復將來更不修閉小吳決口候見大河歸納應合修立堤防令李立之經畫以聞帝謂輔臣曰河之為患久矣後世以事治水故常有礙夫水之趨下乃其性也以道治水則無違其性可也如能順水所向遷徙城邑以避之復有何患雖神禹復生不過如此輔臣皆曰誠如聖諭已而立之言河流自乾寧軍至劈地口入海宜自北京至瀛州分立東西隄五十八埽詔從之立之在熈寧初已主立隄今竟行其言大抵熈寧初專主導東流閉北流元豐以後因河決而北議者始欲復禹故迹帝愛惜民力思順水性而水官難其人王安石力主程昉范子淵故二人尤以河事自任然糜費財力卒無成功哲宗元祐元年三月降范子淵知峽州中丞吕陶劾其罪故也中書舍人蘇軾作制詞有曰汝以有限之財興必不可成之役驅無辜之民置之必死之地時以為至言九月詔秘書監張問相度河北水事時河流雖北而孫村低下夏秋霖雨漲水徃徃東出小吳之決既未塞又決大名之小張口河北諸郡皆被水灾知澶州王令圖建議濬迎陽埽舊河又於孫村金堤置約復故道轉運使范子竒仍請於大吳北岸修進鋸牙擗約河𫝑於是囘河東流之議起十一月問復上言臣至滑州決口相視迎陽埽至大小吳水勢低下舊河淤仰故道難復請於南樂大名埽開直河并簽河分引水勢入孫村口以解北京向下水患令圖亦以為然於是減水河之議復起既從之矣會北京留守韓絳奏引河近府非是詔問别相視二年二月令圖問欲必行前説朝廷又從之三月令圖死以王孝先代領都水亦請如令圖議三年十一月遣吏部侍郎范百禄等行河時王孝先請修減水河王覿言其便安燾深以東流為是上疏言之於是詔黄河未復故道終為河北之患宜興役囘之范純仁王存言使大河決可東囘而北流遂㫁何惜勞民費財以成經久之利今孝先等未有必然之論但僥倖萬一以兾成功耳不可輕舉也文彦博吕大防安燾等謂河不東則失中國之險為契丹之利力主其議范純仁又陳四不可之説且曰北流數年未為大患而議者恐失中國之利先事囘改正如頃時西夏本不為邇患而好事者以為不取恐失機會遂興靈武之師也於是收囘詔書而遣百禄等行視户部侍郎蘇轍上疏曰黄河西流議復故道事之經歳役兵二萬聚稍樁等物三千餘萬方河朔災傷困弊而興必不可成之功吏民竊嘆今囘河大議雖寢然聞議者固執來歳開河分水之策今小河決口入地已深而孫村所開丈尺有限不獨不能囘河亦必不能分水况黄河之性急則通流緩則淤澱既無東西皆急之勢安有兩河並行之理縱使兩河並行未免各立隄防其費又倍矣今建議者其説有三臣請折之一曰御河湮滅失饋運之利昔大河在東御河自懷衛經北京漸厯邊郡饋運既便商賈通行自河西流御河湮滅失此大利天實使然今河自小吳北行占壓御河故地雖使自北京以南折而東行則御河湮滅已一二百里何由復見此御河之説不足聽也二曰恩冀以北漲水為害公私損耗臣聞河之所行利害相半葢水來雖有敗田破税之害其去亦有淤厚宿麥之利况故道已退之地桑麻千里賦役全復此漲水之説不足聽也三曰河徙無常萬一自契丹界入海邊防失備按河昔在東自河以西郡縣與契丹接境無山河之限邊臣建為塘水以捍契丹之衝今河既西則西山一帶契丹可行之地無㡬邊防之利不言可知然議者尚恐河復北徙則海口出契丹界中造舟為梁便於南牧臣聞契丹之河自北南注以入于海葢地形北髙河無北徙之道而海口深浚勢無徙移此邊防之説不足聽也臣又聞謝卿材到闕昌言黄河自小吳決口乘髙注北水勢奔決上流隄防無復決怒之患朝廷若以河事付臣不役一夫不費一金十年保無河患大臣以其異已罷歸而使王孝先俞瑾張景先三人重畫囘河之計葢由元老大臣重於改過故假契丹不測之憂以取必于朝廷雖已遣百禄等出按利害然未敢保其不觀望風㫖也願亟囘收買稍草指揮來歳勿調開河役兵使百禄等明知聖意無所偏係不至阿附以誤國計會百禄行視東西二河亦奏言東流髙仰北流順下決不可囘明年使囘入對復言願罷有害無利之役未聽久之乃罷囘河及修減水河數月尚書省復議囘河是時吳安持李偉力主東流而謝卿材謂近世河流稍行地中無可囘之理上河議一篇召赴政事堂會議大臣不以為然㑹李偉復言今河已分流若興工可令全復故道朝廷今日當極力必閉北流乃為上策若不明詔有司即令囘河深恐上下遷延議終不决觀望之間遂失機㑹乞復置修河司從之五年二月詔開修減水河尋以外路旱暵權罷七年冬十月以大河東流賜都水使者吳安持三品服北都水監丞李偉再任八年二月詔北流軟堰並如都水監所奏門下侍郎蘇轍言水官之意欲以軟堰為名實作硬堰隂為囘河之計不宜聽趙偁亦上疏曰臣竊謂河事大利害有三而言者互進其説或見近忘逺徼倖盗功或取此捨彼譸張昧理遂使大利不明大害不去上惑朝聽下滋民患横役枉費殆無窮已臣竊痛之所謂大利害者北流全河患水不能分也東流分水患水不能行也宗城河決患水不能閉也是三者去其患則為利未能去則為害今不謀此而議欲專閉北流止知一日可閉之利而不知異日既塞之患止知北流伏槽之水易為力而不知闞村方漲之勢未可併以入東流也夫欲合河以為利而不惜上下壅潰之患是皆見近忘逺徼倖盗功之事也有司欲斷北流而不執其咎乃引分水為説姑為軟堰知河衝之不可以軟堰禦則又為決堰之計臣恐枉有工費而以河為戲也請俟漲水伏槽觀大河之勢以治東流北流不聽十二月監察御史郭知章言臣比緣使河北自澶州入北京渡孫村口見水趨東者河甚濶而深又自北京往洛州過楊家淺口復渡見水之趨北者纔十二三然後知大河宜閉北行東乞下都水監相度於是吳安持復領都水而吕大防力主其議范純仁蘇轍復爭之遂詔本路安撫轉提刑司詳議紹聖元年正月也轉運司趙偁議與純仁轍合偁之言曰河自孟津初行平地必須全流乃成河道禹之治水自冀北抵滄棣始播為九河以其近海無患也今河自横壠六塔商胡小吳百年之間皆從西決葢河徙之常勢而有司置埽創約横截河流囘河不成因為分水初決南宫再決宗城三決内黄亦皆西決則地勢西下較然可見今欲弭息河患而逆地勢戾水性臣未見其能就功也請開闞村河門修平鄉鉅鹿埽焦家等堤濬澶淵故道以備漲水大名安撫使許將言度今之利若舍故道止從北流則慮河下已湮而上流横潰為害葢廣若直閉北流東徙故道則復慮受水不盡而破隄為患竊謂宜因梁村之口以行東因内黄之口以行北而盡閉諸口以絶大名諸州之患俟春夏水大至乃觀故道足以受之則内黄之口可塞不足以受之則梁村之役可止定其成議則民心固而河之順復有時可以保其無害郭知章又言河復故道水之趋東已不可遏近日遣使按視議論未一臣謂水官朝夕從事河上望專委之十月都水使者王宗望言大河自元豐潰決以來東北兩流利害極大頻年分爭國論不決水官無所適從伏自奉詔凡九月上禀成筭自闞村下至栲栳堤七節河門並皆閉塞築金堤七十里盡障北流使全河還故道望付史官紀紹聖以來聖明獨斷致此成績元符二年六月河決内黄口東流遂斷絶左司諫王祖道請正吳安持鄭佑李仲李偉之罪投之逺方以明先帝北流之志詔可宋史紀事夲末卷六
