body:
  text: 宋史紀事本末卷二十七明馮琦原編陳邦瞻增輯賈似道要君度宗咸淳元年夏四月加賈似道太師封魏國公初理宗在位久儲宫尚虛帝時在忠邸欲立為嗣以問宰相吳潛潛密奏云臣無彌逺之才忠王無陛下之福理宗怒似道聞之因陳建儲之策意在傾潛潛去而似道獨相帝遂立為太子既即位以似道有定策功每朝必答拜稱之曰師臣而不名朝臣皆稱為周公理宗山陵事竣徑棄官還越而密令吕文德詐報蒙古兵攻下沱急朝中大駭帝與太后手詔起之似道乃至欲以經筵拜太師而典故須建節乃授鎮東軍節度使似道怒曰節度使粗人之極致耳遂命出節都人聚觀節出復曰時日不利亟命返之舊制節出撤關壞屋無倒節理以示不屈至是人皆駭異二年春正月江萬里罷時賈似道以去要君帝至拜留之萬里以身掖帝云自古無此君臣禮陛下不可拜似道不可復言去似道不知所為下殿因舉笏請萬里曰微公似道幾為千古罪人然以此益忌之帝在經筵每問經史疑義及古人姓名似道不能對萬里常從旁代對王夫人稍知書帝語夫人以為笑似道積慙怒謀逐萬里萬里亦四上疏求退乃以資政殿大學士奉祠三年二月賈似道上疏乞歸養帝命大臣侍從傳旨固留日四五至中使加賜日十數至夜即交卧第外以守之特授平章軍國重事一月三赴經筵三日一朝治事都堂賜第西湖之葛嶺使迎養其中似道於是五日一乘湖船入朝不赴都堂治事吏抱文書就第呈署大小朝政一決於館客廖瑩中堂吏翁應龍宰執充位而已似道雖深居簡出凡臺諫彈劾諸司薦辟及京尹畿漕一切事不關白不敢行正人端士斥罷殆盡吏爭納賂求美職圖為帥閫監司郡守者貢獻不可勝計一時貪風大肆兵喪於外匿不以聞民怨於下誅責無藝莫敢言者太府寺主簿陳蒙嘗入對極言似道為相國政闕失後為淮東總領似道誣以貪汚安置於建昌軍籍沒其家六年八月癸巳賈似道屢稱疾求去帝至涕泣留之不從詔六日一朝一月兩赴經筵尋又詔入朝不拜朝退帝必起避席目送之出殿廷始坐繼復詔十日一朝時蒙古攻圍襄樊甚急似道日坐葛嶺起樓閣亭榭作半間堂延羽流塑已像其中取宫人葉氏及娼尼有美色者為妾日肆淫樂與故博徒縱博人無敢窺其第者有妾兄來立府門若將入狀似道見之縛投火中嘗與羣妾踞地鬭蟋蟀所狎客戲之曰此軍國重事耶酷嗜寶玩建多寶閣一日一登玩聞余玠有玉帶求之已殉葬矣發其冢取之人有物求不與輒得罪自是或纍月不朝雖朝享景靈宫亦不從駕有言邊事者輒加貶斥一日帝問曰襄陽已圍三年矣奈何似道曰北兵已退陛下何從得此言對曰適有女嬪言之似道詰其人誣以他事賜死由是邊事雖日急無敢言者時賈似道欲制東南士心乃令御史陳伯大請制士籍開具鄉里姓名年甲三代妻室令鄉鄰結勘於科舉條制無礙方許納卷又嚴後省覆試法比校中省元卷字蹤稍異者黜之覆試之日露索懷挾有李鈁孫者少時戲雕股間索者視之駭曰此文身者事聞被黜時邊事危急束手無䇿而以科舉纍士人其悖謬至此八年九月辛未有事於明堂以賈似道為大禮使禮成幸景靈宫將還遇大雨似道期帝雨止升輅胡貴嬪之兄顯祖為帶御器械請如開禧故事却輅乘逍遙輦還宫帝曰平章得無不可顯祖紿曰平章已允帝遂歸似道大怒曰臣為大禮使陛下舉動不得預聞乞罷政即日出嘉會門帝固留之不得乃罷顯祖涕泣出貴嬪為尼似道始還似道專恣日甚畏人議已務以權術駕馭上下以官爵牢籠一時名士以故言路斷絶威福肆行相視以目十年春正月賈似道母胡氏死似道歸越治喪詔以天子鹵簿葬之起墳擬山陵百官奉襄事立大雨中終日無敢易位者既葬詔似道起復遂還朝蒙古陷襄陽度宗咸淳三年十一月蒙古主徵諸路兵命阿珠經略襄陽先是景定二年蒙古主以朝廷拘囚郝經屢遣使詳問不報乃諭將士舉兵攻宋且下詔曰朕即位之後深以戢兵為念故前年遣使於宋以通和好宋人不務逺圖伺我小隙反啓邊釁東剽西掠曽無寧日朕今春還宫諸大臣皆以舉兵南伐為請朕重以兩國生靈之故猶待信使還歸庶有悛心以成和議留而不至者今又半載矣往來之禮遽絶侵擾之暴不已彼嘗以衣冠禮樂之國自居理當如是乎曲直之分灼然可見今遣王道貞往諭卿等約會諸將秋髙馬肥水陸並道而進以為問罪之舉時賈似道方論鄂功專務欺蔽朝廷不以聞似道又忌諸將欲汚衊置之罪乃行打算法於諸路以軍興時支取官物為贓私於是趙葵史巖之杜庶皆坐侵盜掩匿罷而向士璧曹世雄下獄死劉整時為潼川安撫使亦以邊費為蜀帥俞興所持整素與興有隙自遣使訴於朝不得達心益疑懼遂籍瀘州十五郡户三十萬降於蒙古整驍將也蒙古既得整由是盡知國事虛實南伐之謀益決而似道自若不以為虞時吕文德守鄂有威名整言於蒙古主曰南人惟恃吕文德耳然可以利誘也請遣使賂以玉帶求置𣙜場於襄陽城外以圗之至鄂請於文德文德果許之遂開𣙜場於樊城築土牆於鹿門山外通互市內築堡壁由是敵有所守以遏南北之援時出兵哨掠襄樊城外兵勢益熾文德知為所賣然已無及矣至是整又言於蒙古主曰攻宋方略宜先從事襄陽襄陽吾故物由棄弗戍使宋得竊築為強藩如復襄陽浮漢入江則宋可平也蒙古主從之遂徵諸路兵命阿珠與整經略取襄陽阿珠駐馬虎頭山顧漢東白河口曰若築壘於此以斷宋餉道襄陽可圗也遽城其地吕文煥大懼遣人以蠟書告吕文德文德怒且罵曰汝勿妄言邀功賞設有之亦假城耳襄樊城池堅深兵儲支十年令吕六堅守果整妄作春水至吾往取之比至恐遁去耳識者竊笑之四年九月蒙古劉整與阿珠計曰我精兵突騎所當者破惟水戰不如宋耳奪彼所長造戰艦習水軍則事濟矣乃造船五千艘日練水軍雖雨不能出亦畫地為船而習之練卒七萬遂築白河城以逼襄陽五年三月乙卯蒙古軍圍樊遂城鹿門己未詔浙西六郡屯田設官督租有差辛酉京湖都統張世傑將兵拒蒙古圍樊之軍戰於赤灘圃敗績秋七月夏貴襲蒙古阿珠於新郢敗績初貴以沿江制置副使援襄樊乘春水漲輕兵部糧至襄陽城下懼蒙古軍掩襲僅能與吕文煥交語而還及秋大霖雨漢水溢貴分遣舟師出沒東岸林谷間阿珠謂諸將曰此虛形不可與戰宜整舟師以備新城明日貴舟果趨新城至虎尾洲為阿珠所敗士卒溺漢水死者甚衆范文虎復以舟師援貴至灌子灘亦為阿珠所敗文虎以輕舟遁十二月癸酉吕文德卒文德以許蒙古置𣙜場為恨每曰誤國家者我也因疽發背乞致仕詔授少師封衛國公至是卒六年春正月以李庭芝為京湖制置大使督師援襄樊時夏貴范文虎相繼大敗及聞庭芝至文虎貽書賈似道曰吾將兵數萬入襄陽一戰可平但願無使聽命於京閫事成則功歸恩相矣似道即命文虎之兵從中制之庭芝屢欲進兵文虎但與妓妾嬖幸擊鞠飲宴為樂以取旨未至為辭十二月己亥蒙古張𢎞範言於史天澤曰今規取襄陽周於圍而緩於攻者計待其自斃也然夏貴乘江漲送衣糧入城我無禦之者而江陵歸峽行旅休卒道出襄陽南者相繼也寧有自斃之時乎若築萬山以斷其西立柵灌子灘以絶其東則庶幾斃之之道也天澤從之遂城萬山徙𢎞範軍於鹿門自是襄樊道絶而糧援不繼七年五月蒙古詔東道兵圍襄陽各道宜進兵以牽制之於是秦蜀行省平章政事賽音迪延齊沙木斯迪音率諸將水陸並進鄭鼎出嘉定汪良臣出重慶北朗布哈出瀘州所至順流縱筏斷浮橋獲將卒戰艦甚衆六月范文虎將衛卒及兩淮舟師十萬進至鹿門時漢水溢阿珠夾江東西為陳别令一軍趨會丹灘犯其前鋒諸將順流鼓譟文虎軍逆戰不利棄旗鼓鎧仗乘夜遁去蒙古俘其軍獲戰船甲仗不可勝計八年五月己巳李庭芝將兵救襄陽時襄陽被圍五年援兵不至吕文煥極力拒守幸城中稍有積粟所乏者鹽薪布帛爾張漢英守樊城募善泅者置蠟書於髻藏積草下浮水而出謂鹿門既築勢須自荆郢救援至隘口元卒見積草多鈎致欲為焚㸑之用泅者遂被獲於是郢鄧之路亦絶至是詔李庭芝移屯郢州將帥悉駐新郢及均州河口以守要津庭芝闖知襄陽西北一水曰清泥河源於均房即其地造輕舟百艘以三舟聨為一舫裝載左右舟則虛其底而掩覆之出重賞募死士得襄郢山西民兵之驍悍善戰者三千人求將得民兵部轄張順張貴俱智勇素為諸將所服俾為都統號貴曰矮張順曰竹園張出令曰此行有死而已汝輩或非本心宜亟去毋敗吾事人人感奮漢水方生乘順流發舟百艘稍進團山下又進髙頭港口結方陳各船置火鎗火炮熾炭巨斧徑弩夜漏下三刻起矴出江以紅燈為號貴先登順殿之乘風而破浪徑犯重圍至磨洪灘以上元兵布舟蔽江無隙可入順等乘鋭斷鐵絙攢筏數百轉戰百二十里元兵皆披靡以避其鋒黎明抵襄陽城下城中久絶援聞順等至踴躍過望勇氣百倍及收軍獨失順越數日有浮尸遡流而上被甲胄執弓矢直抵浮梁視之則順也身中創六箭怒氣勃勃如生諸軍驚以為神結塜斂葬之貴入襄陽文煥固留共守貴恃其驍勇欲還郢乃募二士能伏水中數日不食持蠟書赴范文虎於郢求援元兵增守益密水路連鎖數十里列撒星樁雖魚蝦不得渡二人遇樁即鋸斷之竟達郢還報發兵五千駐龍尾洲以助夾擊刻日既定乃别文煥東下點視所部軍洎登舟帳前一人亡去乃有過被撻者貴驚曰吾事泄矣亟行彼或未及知復不能銜枚隱迹乃舉炮鼓噪發舟乘夜順流斷絙破圍冒進元兵皆辟易既出險地夜半天黑至小新河阿珠劉整分艤戰艦邀擊以死拒戰沿岸束荻列炬火光燭天如白晝至勾林灘漸近龍尾洲遙望軍船旗幟紛披貴兵以為郢兵來會喜躍而進舉流星火示之軍船見火即前迎及勢近欲合則來舟皆元軍也蓋郢兵前二日以風水驚疑退屯三十里而元兵得逃卒之報先據龍尾洲以逸待勞貴與戰而困且出於不意所部殺傷殆盡身被數十創力不能支遂被執見阿珠於匱門關阿珠欲降之貴誓不屈乃見殺元令降卒四人舁貴尸至襄陽城下曰識矮張都統乎此是也守陴皆哭城中喪氣文煥斬四卒以貴附葬順塜立雙廟祀之時朝廷患劉整為元用荆湖制置李庭芝請以整為盧龍軍節度使封燕郡王朝廷從之遣永寧僧齎告身金印牙符及庭芝書期致之僧既入元事覺元主敕張易姚樞雜問整自軍中入見元主曰此宋患臣用兵襄陽欲以此殺臣耳臣實不知元主賞整使還誅僧且令整移書來責執政九年春正月乙丑樊城陷樊被圍四年范天順牛富力戰不為衄富又數射書襄陽城下期吕文煥相與固守為唇齒未幾阿爾哈雅得西域人所獻新炮法乃進攻樊破外郛張𢎞範為流矢中其肘束創見阿珠曰襄在江南樊在江北我陸攻樊則襄出舟師來救終不可取若截江道斷援兵水陸夾攻則樊破而襄亦下矣阿珠從之初襄樊西城漢水出其間文煥植一木江中鎖以鐵絙上造浮橋以通援兵樊亦恃此以為固至是阿珠以機鋸斷木以斧斷絙燔其橋襄兵不能救乃以兵截江而出鋭師薄樊城城遂破天順仰天嘆曰生為宋臣死為宋鬼即所守地縊死富率死士百人巷戰元兵死傷者不可計渴飲血水轉戰而進遇民居燒絶街道富身被重傷以頭觸柱赴火死禆將王福見富死嘆曰將軍死國事吾豈宜獨生亦赴火死二月庚戌吕文煥以襄陽叛降元襄陽久困援絶撤屋為薪緝關會為衣文煥每一巡城南望慟哭而後下告急於朝賈似道纍上書請行邊而陰使臺諫上章留已樊城既陷復申請之事下公卿雜議監察御史陳堅等以為師臣出顧襄未必能及淮顧淮未必能及襄不若居中以運天下帝從之時羣臣多言髙達可援襄陽者御史李旺入言於似道似道曰吾用達如吕氏何旺出嘆曰吕氏安則趙氏危矣文煥聞達且至亦不樂以語其客客曰易耳今朝廷以襄急故遣達吾以捷聞則達必不成遣矣文煥以為然會獲元哨騎數人文煥即繆以大捷奏然不知朝中實無援襄事也未幾阿爾哈雅帥總管索多等移兵破樊攻具以向襄陽一炮中其譙樓聲如震雷城中洶洶諸將多踰城降者初劉整嘗躍馬獨前與文煥語為文煥伏弩所中幸甲堅不入至是欲立碎其城執文煥以快意阿爾哈雅不可乃身至城下宣元主所降招諭文煥詔曰爾等拒守孤城於今五年宣力於主固其宜也然勢窮援絶如數萬生靈何若能納欵悉赦勿治且加遷擢文煥狐疑未決因折矢與之誓文煥乃出降先納管鑰以獻城邑且陳攻郢之䇿請已為先鋒阿珠入襄陽阿爾哈雅遂偕文煥朝燕元主以文煥降命如詔遷擢事聞似道言於帝曰臣始屢請行邊陛下不之許向使早聽臣當不至此文煥兄文福文德文福知廬州文德子師夔知靜江府俱上表待罪似道庇之詔皆不問三月詔機速房於中書襄城既失賈似道復上書言事勢如此非臣上下驅馳聨絡氣勢將有大可慮者帝曰師相豈可一日離左右似道乃建機速房以革樞密院漏泄兵事稽遲邊報之弊夏四月宣撫司參議官張夢發陳危急三䇿曰鎖漢口岸曰城荆門軍當陽界之玉泉山曰峽州宜都而下聨署堡寨以保聚流民且守且耕并圖上築城形勢似道不以上聞下荆湖制司審度可否事竟不行六月己丑給事中陳宜中言襄樊之失皆由范文虎怯懦逃遁乞斬之賈似道不許止降一官監察御史陳文龍言文虎失襄陽猶使知安慶府是當罰而賞也趙溍乳臭小子何足以當大閫之寄請皆罷之似道大怒黜文龍知撫州旋又使臺官李可劾退之汪立信言臣奉命分閫延見吏民皆痛哭流涕言襄樊之禍皆由范文虎及余興父子文虎以三衙長聞難怯戰僅從薄罰有子天順守節不屈猶可少贖其愆興奴𨽻庸材務復私怨激叛劉整流毒至今其子大忠挾多資為父行賄且自希進雖寸斬未足以快天下之忿乞置重典則人心興起事功可圗詔除大忠名循州拘管時國勢危甚陳仲微上封事其略曰誤襄者老將也失襄之罪不專在於庸閫禆將孩兵也君相當分受其責以謝先皇帝在天之靈天子若曰罪在朕躬大臣宜言咎在臣等宣布十年養安之往繆深懲六年輕敵之昨非救過未形固已無及追悔既往尚愈於迷或謂覆護之意多尅責之辭少謂陛下乏哭師之誓師相飾分過之言甚非所以慰恤死義祈天悔禍之道也往往代言乏知體之士翹館鮮有識之人吮脂茹柔積習成痼君道相業兩有所虧方今何時而在廷無謀國之臣在邊無折衝之帥監之先朝宣和未亂之前靖康既敗之後凡前日之日近冕旒未輪華轂俯首吐心奴顔婢膝即今日奉敵稱臣之人也強力敏事疾捷快意即今日畔君賣國之人也為國者亦何便於若人哉迷國者進慆憂之欺以逢其君誤國者護恥敗之局而莫敢議當國者昧安危之機而莫之悔臣嘗思之今之所少不止於兵閫外之事將軍制之而一級半階率從中出斗粟尺布退有後憂平素無權緩急有責或請建督或請行邊或請築城創聞駭聽因諸閫有辭於緩急之時故廟堂不得不掩惡於敗闕之後有謀莫展有敗無誅上下包羞噤無敢議是以下至器仗甲馬衰颯龎涼不足下肅軍容壁壘堡柵折樊駕漏不足以當衝突之騎號為帥閫名存實亡也城而無兵以城與敵兵不知戰以將與敵將不知兵以國與敵光景蹙近目睫矣惟君相幡然改悟天下事尚可為也轉敗為成在君一念間耳似道大怒乃出仲微江東提點刑獄度宗咸淳十年春正月元阿爾哈雅言荆襄自古用武之地漢水上流已為我有順流下驅宋必可平阿珠又言臣略地江淮備見宋兵之弱今不取之時不能再元主趣召史天澤同議天澤對曰此國家大事可命重臣一如安圖巴延都督諸軍則四海混同可計日而待矣臣老矣如副將者猶足為之元主曰巴延可以任吾此事矣阿爾哈雅因言我師南征必分為三舊軍不足非益兵十萬不可遂詔中書省僉軍十萬人六月元主諭諸將率兵南伐且數賈似道違約執郝經之罪詔曰爰自太祖皇帝以來與宋使介交通憲宗之世朕以藩職奉命南伐彼賈似道復遣宋京詣我請罷兵息民朕即位之後追憶是言命郝經等奉書往聘蓋為生靈計也而乃執之以致師出連年死傷相藉係纍相屬皆彼宋自禍其民也襄陽既降之後冀宋悔禍或起令圗而乃執迷罔有悛心所以問罪之師有不能已者今遣汝等水陸并進布告遐邇使咸知之無辜之民初無預焉將士毋得妄加殺掠有去逆效順别立奇功者驗等第遷賞其或固拒不從及逆敵者俘戮何疑秋七月罷京湖制置使汪立信立信移書賈似道謂今天下之勢十去八九誠上下交修以迓續天命之幾重惜分陰以趨事赴功之日也而乃酣歌深宫笑傲湖山玩嵗愒月緩急倒施卿士師師非度百姓鬱怨欲上以求當天心俯遂民物拱揖指揮而折衝萬里者不亦難乎為今之計者其䇿有三夫內都何事乎多兵宜盡出之江干以實外禦算兵帳見兵可七十餘萬人而沿江之守則不過七千里若距百里而屯屯有守將十屯為府府有總督其尤要害處輒三倍其兵無事則屯舟長淮往來遊徼有事則東西齊奮戰守並用刁斗相聞餽餉不絶互相應援以為聨絡之固選宗室大臣忠良有幹用者立為統制分東西二府以涖任得其人成率然之勢此上䇿也久拘聘使無益於我徒使敵得以為辭請禮而歸之許輸嵗幣以緩師期不二三年邊儲稍休藩垣稍固生兵日增可戰可守此中䇿也二䇿果不得行則天敗我也銜璧輿櫬之禮請備以俟似道得書大怒抵之地詬曰瞎賊狂言敢爾蓋立信一目微眇云尋中以危法廢斥之是月元巴延南攻陛辭元主諭之曰古之善取江南者唯曹彬一人汝不嗜殺是吾曹彬也九月元吕文煥以巴延趨郢州劉整以博囉歡趨淮西巴延分大軍為兩道自與阿珠由襄陽入漢濟江以吕文煥將舟師為前鋒博囉歡由東道取揚州監淮東兵以劉整將騎兵先行巴延一軍自分三道索多將一軍由棗陽哨司空山翟招討將一軍由老鴉山徇荆南而自與阿珠帥阿勒哈張𢎞範諸軍水陸趨郢旌旗延袤前後數百里丁巳元巴延至濼水前部將武顯言水溢未可渡巴延曰此小水不敢渡敢渡大江耶使一騎前導麾諸軍畢濟遂薄郢州軍於城西時張世傑將兵屯郢郢在漢北以石為城新城在漢南橫鐵絙鎖戰艦密植樁木水中夾以炮弩凡要津皆施㭖設攻具元軍襲城世傑力戰元軍不能前遣人招世傑不聽阿珠獲俘民言沿江九郡精鋭皆萃於二郢若舟師出其間騎兵不得護岸此危道也不若取黃家灣堡東有河口由中拖船入藤湖轉而下江僅三里吕文煥亦以為便諸將曰郢城我之喉噤不取恐為歸路患巴延不從遣總營李廷劉國傑攻黃家灣堡拔之諸軍破竹席地蕩舟由藤湖入漢巴延阿珠殿後不滿百騎郢州副都統趙文義帥精騎二千追之至泉子湖力戰而敗巴延手殺之郢卒皆潰元兵進至沙洋遣俘持黃榜檄文入城守將王虎臣王大用斬俘焚榜文煥復至城下招之亦不應日暮風大起巴延命順風掣金汁炮焚其廬舍煙焰漲天城遂破生擒虎臣大用餘悉屠之進薄新城文煥到沙洋所馘於城下縛大用等至壁使招降都統邊居誼不答明日又至曰吾欲與吕參政語耳文煥以為降已馳馬至伏弩發中文煥右臂并馬仆幾鉤得之衆挾文煥以他馬奔走會其總制黃順副將任寧俱出降其部曲多欲縋城出者居誼悉驅入當門斬之文煥乃麾兵攻城居誼以火具却之旋蟻附而上居誼度力不支拔劔自殺不死赴火死所部三千人猶力戰悉死焉巴延壯其勇購其尸觀之遂進攻渠復州居誼隨人初事李庭芝積戰功至都統制至是死節事聞立廟死所十二月元巴延至蔡店大會諸將刻期渡江遣人觀漢口形勢時夏貴以漢鄂舟師分據要害彌亘三十餘里王達守陽邏堡朱䙫孫以遊擊軍扼中流兵不得進軍將馬福言淪河穿湖中可從陽邏堡西沙蕪口入江巴延使覘沙蕪口夏貴亦以精兵守之巴延乃進圍漢陽聲言取漢口渡江貴果移兵援漢陽巴延乘間遣阿喇哈將竒兵倍道襲沙蕪口奪之因自漢口開壩引船入淪河轉沙蕪口以逹江戰艦萬計相踵而至以數千艘泊淪河灣口屯布蒙古漢軍數十萬騎於江北遣人招諭陽邏堡不應因以白鷂子千艘攻之三日不克巴延因密謀於阿珠曰彼謂我必拔此堡方能渡江此堡甚堅攻之徒勞汝今夜以鐵騎三千泛舟直趨上流為搗虛之計明日渡江襲南岸已過則急遣人報我阿珠亦曰攻城下䇿也若分軍船之半循岸西上泊青山磯下伺隙而動可以如志巴延遂遣阿爾哈雅進薄陽邏堡貴率衆來援阿珠即以昏時率四翼軍遡流二十里至青山磯是夜雪大作黎明阿珠遙見南岸多露沙洲即登舟指諸將令徑渡載馬後隨萬户史格一軍先渡為荆鄂都統程鵬飛所敗阿珠引兵繼之大戰中流鵬飛軍却阿珠遂登沙洲扳岸步鬭散而復合者數四出馬急擊追至鄂東門鵬飛被重創走阿珠獲其船千餘艘阿珠遣人還報巴延大喜揮諸將急攻陽邏堡夏貴聞阿珠飛渡大驚引麾下三百艘先遁沿流東下縱火焚西南岸大掠還廬州都統制王達領所部八千人及定海水軍統制劉成俱戰死元諸將請追貴巴延曰陽邏之捷吾將遣使前告宋人今貴走是代吾使也遂渡江與阿珠會議師所向或欲先取蘄黃阿珠曰若赴下流退無所據上取鄂漢雖遲旬日可以萬全巴延遂趨鄂州己未知漢陽軍王儀以城畔降元朱祀孫聞元兵趨鄂帥師援之道聞陽邏堡之敗乃夜奔還江陵府時鄂州恃漢陽為蔽及京湖之援朱祀孫既遁漢陽復失鄂勢遂孤吕文煥列兵城下曰汝國恃者江淮而已今大軍渡江淮如蹈平地汝輩不降何待會元軍焚艨艟三千艘火照城中權守張晏然與都統程鵬飛度不能守遂以州軍降幕僚張山翁獨不屈元諸將欲殺之巴延曰義士也釋之因檄下信陽諸郡以鵬飛為京湖宣撫使撤宋兵分𨽻諸將取夀昌糧四十萬斛以充軍餉命阿爾哈雅及賈居貞以四萬人守鄂規取荆湖而自率大衆與阿珠東下趨臨安癸亥詔賈似道都督諸路軍馬時鄂州既破朝廷大懼羣臣上疏以為非師相親出不可似道不得已始開都督府於臨安以孫虎臣總統諸軍以黃萬石等參贊軍事所辟官屬皆先命後奏仍於封樁庫撥金十萬兩銀五十萬兩關子一千萬貫充都督府公用詔天下勤王庚午元巴延遣程鵬飛至黃州招諭陳奕以沿江大都督許之奕喜遂以城降仍以書招知蘄州管景模景模亦降時沿江諸郡皆呂氏舊部曲望風欵附奕又以書誘其子巖以安東州降元是時李庭芝遣兵入援帝顯德祐元年春正月壬午元兵入蘄州己酉吕師夔以江州降元初師夔提舉江州興國宫請募兵以禦元詔與知州錢真孫同募至是賈似道承制召為都督參贊任中流調遣師夔不受命與真孫遣人請於蘄州以江州降元巴延以師夔知江州丙戌元兵徇江州知安東州陳巖夜遁時知夀昌軍胡夢麟寓治江州自殺知南康軍葉閶知德安府來興國知六安軍曹明俱迎降於江州師夔設宴庾公樓選宗室女二人盛飾以獻巴延巴延怒曰吾奉天子命興義師問罪於宋豈以女色移吾志乎斥遣之初元人南侵吕文煥與劉整為嚮導尋别命整出淮南整鋭欲渡江曰大軍自襄樊東下宋悉力西拒東方虛弱徑造臨安可一鼓而捷也巴延不可曰吾受詔特綴東兵使無西耳濟江非所聞至是整帥騎兵攻無為軍久而不克聞吕文煥入鄂捷至失聲曰主帥束我使我失功後於人善作者不必善成果然遂發憤死於無為城下知安慶府范文虎以城降於巴延通判夏琦仰藥死是月賈似道出師江上夏貴以兵來會初似道欲出師畏劉整不敢行及聞整死曰吾得天助也乃上表出師抽諸路精兵十三萬以行金帛輜重之舟舳艫相銜百有餘里命宰執小事專決大事則關白於督府不得擅行又以所親信韓震為殿帥總禁兵至安吉似道所乘舟膠於塸中劉師勇以千人入水拽之不能動乃易他舟而出遂由新安池口以進次於蕪湖遣人通吕師夔以議和未幾夏貴引兵來會袖中出一編書示似道曰宋厯三百二十年似道俯首而已二月以汪立信為江淮招討使募兵江淮以援江上州郡立信受詔即日上道以妻子托愛將金明執其手曰我不負國家爾亦必不負我遂行與賈似道遇於蕪湖似道拊立信背哭曰不用公言以至於此立信曰平章平章瞎賊今日更説一句不得似道因問立信何向立信曰今江南無一寸乾淨地吾去尋一片趙家地上死第要死得分明耳既至建康守兵悉潰而四面皆北軍立信知事不成歎曰吾生為宋臣死為宋鬼終為國一死但徒死無益耳率所部數千人至髙郵欲控引淮漢以為後圖賈似道自蕪湖遣還元俘曾安撫且以荔子黃柑遺巴延復使宋京如元軍請稱臣奉歲幣如開慶約阿珠謂巴延曰宋人無信當進兵若避似道不擊恐已降州郡今夏難守巴延乃令囊嘉特來答書曰未渡江時議和入貢則可今沿江州郡皆已內屬欲和則當來面議也似道不答囊嘉特歸報京亦還庚戌元兵犯池州知州事王起宗遁去通判趙卯發攝州事繕壁聚糧為固守計元遊騎至季陽河都統張林屢諷之降卯發忿氣填膺瞪目視林林不敢復言已而林帥兵巡江陰遣人納欵而陽助卯發為守兵皆歸於林卯發知事不濟乃置酒會諸友與訣謂妻雍氏曰城將破吾守臣不當去汝先出走雍曰君為忠臣我獨不能為忠臣婦乎卯發笑曰此豈婦人女子所能也雍曰吾請先君死卯發笑止之明日乃散其家資與弟姪僕婢悉遣之元兵薄城卯發晨起書几上曰國不可背城不可降夫婦同死節義成雙遂與雍氏同縊死於從容堂林開門降巴延入城問太守何在左右以死對深歎息之命具棺衾合葬於池上祭其墓而去賈似道以精鋭七萬餘人盡屬孫虎臣軍於池州下流之丁家洲夏貴以戰艦二千五百艘橫亘江中似道自將後軍軍魯港貴嘗失利於鄂恐督府成功無所逃罪又恐虎臣新進出已上殊無鬭志會巴延令軍中作大筏數採薪芻置其上陽言欲焚舟諸軍但晝夜嚴備而戰心少懈巴延分步騎夾岸而進麾戰艦合勢衝虎臣軍時阿珠與虎臣對陳巴延命舉巨炮擊虎臣中堅虎臣軍動阿珠以划船數千艘乘風直進呼聲動天地虎臣前鋒將薑才方接戰虎臣遽過其妾所乘舟衆見之歡曰步師遁矣軍遂亂夏貴不戰而走以扁舟掠似道船呼曰彼衆我寡勢不支矣似道聞之錯愕失措遽鳴鉦收軍舳艫簸蕩乍分乍合阿珠以小旗麾將校帥輕鋭橫擊深入諸軍回棹前走巴延以步騎左右掎之殺溺死者不可勝計水為之赤軍資器械盡為元所獲似道夜駐珠金沙召貴計事頃之虎臣至撫膺哭曰吾兵無一人用命者貴微笑曰吾嘗血戰當之矣似道曰計將安出貴曰諸軍已膽落吾何以戰師相惟有入揚州招潰兵迎駕海上吾當以死守淮西耳遂解舟去似道乃與虎臣單舸奔還揚明日潰兵蔽江而下似道使人登岸揚旗招之皆莫應有為惡語嫚罵之者江漢守臣皆棄城遁太平和州無為俱相繼降元壬戌元軍略饒州知州唐震發州民城守時元遣使來取降欵通判萬道同陰使所部斂白金牛酒備降禮微諷震降震叱之曰我忍偷生負國耶城中少年感震言殺元使者已而元軍登陴衆皆散震入坐府中元軍執牘使署降震擲筆於地不屈遂死之郴州守趙崇榞寓居城中亦死之萬道同以城降初江萬里聞襄樊破鑿池芝山後圃扁其亭曰止水人莫喻其意及聞警執門人陳偉器手曰大勢不可支余雖不在位當與國為存亡至是元軍執其弟知南劔州江萬頃索金銀不得支解之萬里赴止水死左右及子鎬相繼投池中積尸如疊翌日萬里尸獨浮出水上從者斂葬之乙丑賈似道至揚州檄列郡如海上迎駕上書請遷都太皇太后不許詔下公卿雜議左丞相王爚請堅蹕未決以已不能與大計乞罷政不待報徑去已而宗學生上言陛下移蹕不於慶元則於平江事勢危急則航海幸閩不思我能往彼亦能往徒驚擾無益乃止時方危急徵諸將勤王多不至惟郢州守將張世傑率兵入衛復饒州陳宜中疑世傑歸自元易其所部軍丙寅以文天祥為江西安撫副使知贛州勤王詔至贛天祥捧之涕泣發郡中豪傑并結溪洞山蠻有衆萬人遂入衛其友止之曰今元兵三道鼓行破郊畿薄內地君以烏合萬餘赴之是何異驅羣羊而摶猛虎天祥曰吾亦知其然也第國家養育臣庶三百餘年一旦有急徵天下兵無一人一騎入關者吾深恨於此故不自量力而以身徇之庶天下忠臣義士將有聞風而起義勝者謀立人衆者功濟如此則社稷猶可保也天祥性豪華平生自奉甚厚聲妓滿前至是痛自抑損盡以家資為軍費每與賓客僚佐語及時事輒撫几曰樂人之樂者憂人之憂食人之食者死人之事聞者為之感動戊辰湖南提刑李芾以兵勤王芾性剛直忤賈似道貶官家居者久之至是提刑湖南發壯士三千人使將將之勤王時元行人郝經尚留儀真元主復使禮部尚書中都哈雅及經弟行樞密院都事郝庸等來問執行人之罪賈似道震恐乃遣總管段佑以禮送經歸經道病元主敕樞密院及尚醫近侍迎勞所過父老望經流涕江淮招討使汪立信卒於軍立信聞賈似道師潰江漢守臣望風降遁嘆曰吾今日猶得死於宋土也乃置酒召賓僚與訣手自為表起居三宫與從子書屬以家事夜分起步庭中慷慨悲歌握拳撫案者三以是失聲三日扼吭而卒後元軍至建康金明以其家人免或以立信二䇿及死告巴延請戮其孥巴延嘆息久之曰宋有是人有是言哉使果用之我安得至此命求其家厚恤之曰忠臣之家也元博囉歡軍下邳取清河漣海守臣俱以城降三月癸酉元巴延入建康居之時江東大疫居民乏食巴延開倉賑之且遣醫治疾民大恱會元主有詔以時方暑不利行師俟秋再舉巴延上言曰百年逋敵已扼其吭少爾遲回奔播海島後悔無及元主從之詔巴延以行中書省駐建康阿珠分兵駐揚州與博囉歡托爾楚絶宋淮南之援巴延分兵四出鎮江統制石祖忠請降朝廷以元兵漸迫臨安命浙西提刑劉經戍吳江兩浙轉運羅林浙西安撫張濡戍獨松關山陰縣丞徐垓正將郁天興戍西安鎮起趙淮為寺丞戍銀樹東壩甲戌元兵犯無錫縣知縣阮應得出戰一軍皆沒應得赴水死乙亥元兵入常州知常州趙與鑑遁州人錢訔以城降甲申元兵至西海州安撫丁順降丙戌知廣德軍令狐槩以城降元張世傑遣其將閻順李存進軍廣德謝洪永進軍平江李山進軍常州順遂復廣德軍庚寅元兵既近臨安戒嚴同知樞密院曾淵子左司諫潘文卿右正言季可兩浙轉運副使許自浙東安撫王霖龍侍從陳堅何夢桂曽希顔等數十人皆遁朝中為之蕭然僉書樞密院事文及翁同僉書事倪普諷臺諫劾已章未上亟出關遁太皇太后聞之詔榜朝堂云我朝三百餘年待士大夫以禮吾與嗣君遭家多難爾大小臣工未嘗有出一言以救國者內而庶僚畔官離次外而守令委印棄城耳目之司既不能為吾紏擊二三執政又不能倡率羣工方且表裏合謀接踵宵遁平日讀聖賢書自許謂何乃於此時作此舉錯生何面目對人死亦何以見先帝天命未改國法尚在其在文武並轉二資其負國棄豫者令御史臺覺察以聞然不能禁也辛卯元主遣禮部尚書廉希賢工部侍郎嚴忠範奉國書來至建康希賢請兵自衛巴延曰行人以言不以兵兵多反致疑耳希賢固請遂以兵五百送之巴延仍下令諸將各守營壘勿得妄有侵掠希賢等至獨松關張濡部曲殺忠範執希賢送臨安希賢病創死濡俊之曽孫也朝廷使人移書元軍言殺使之事乃邊將太后及嗣君實不知當按誅之願輸幣請罷兵通好巴延曰彼為詐計視我虛實耳當擇人同往觀其事體令彼速降乃遣議事官張羽同使人還臨安羽至平江被殺壬辰元阿爾哈雅入嶽州嶽州安撫使髙世傑復會郢復嶽三州及上流諸軍戰船數千艘扼荆江口阿爾哈雅督諸翼水軍屯東岸世傑乘夜陳於洞庭湖中阿爾哈雅分道擊之世傑敗走力屈乃降阿爾哈雅斬世傑以徇嶽州總制孟之紹舉城降夏四月元兵入廣德縣知縣王汝翼與寓居官趙時晦率義兵戰孟唐老與其二子皆死汝翼被執至建康死之丙午元兵破沙市城都統孟紀死之監鎮司馬夢求自經死戊申京湖宣撫朱祀孫湖北制置副使髙達以江陵降元初髙達解鄂州之圍賈似道許以建節後忌而不與達遂怨望至是元阿爾哈雅自鄂州攻江陵達戰纍敗及元屠沙市達與祀孫及提刑青陽夢炎等遂出降阿爾哈雅入城命祀孫檄所部歸附於是歸岐郢復鼎澧辰沅靖隨常德均房施荆門諸郡相繼皆降阿爾哈雅承制並復官守江陵捷聞元主喜謂近臣曰巴延東下阿爾哈雅孤軍守鄂朕常憂之今荆南定吾東兵可無後患矣乃親作手詔褒之授髙達參知政事祀孫至上都死庚申知金壇縣李成大率義勇兵與元兵戰被執不屈與二子俱死之時元兵東下所過迎降李庭芝率勵所部固守揚州阿珠遣李虎持降榜入城庭芝殺虎焚其榜總制張俊出戰持降臣孟之縉書來招降庭芝復焚其書梟俊首於市時出金帛牛酒燕犒將士人人感激自奮壬戌阿珠攻真州知州苗再成宗子趙孟錦帥兵大戰於老鸛觜敗績庚午阿珠乘勝進趨揚州薑才為三疊陳逆之於三里溝敗之阿珠佯退才逐之阿珠反戰至揚子橋揚州撥發官雷大震出戰死之兩軍夾水而陳元張𢎞範以十二騎絶渡衝才軍才軍堅不可動𢎞範引却以誘之才將回回躍馬出衆奮大刀直前向𢎞範𢎞範反轡迎刺之回回應手而仆才軍遂潰阿珠與𢎞範追之自相蹂踐俱陷壕水死者甚衆流矢中才肩才拔矢揮刀而前元軍辟易不敢逼遂以身死元軍進薄揚州南門五月劉師勇復常州加和州防禦使助姚訔守常以張彥守吕城兵威稍振由是浙右諸城降元者復與張世傑軍合秋七月辛未張世傑與劉師勇孫虎臣等大出舟師萬餘艘次於焦山令以十舟為方碇江中流非有號令無得發碇示以必死元阿珠登石公山望之曰可燒而走也遂選健卒善彀者千人載以巨艦分兩翼夾射阿珠居中合勢進戰繼以火失篷檣俱焚煙焰蔽江諸軍死戰欲走不能前多赴江死張𢎞範董文炳復以鋭卒橫衝世傑不復能軍奔圌山𢎞範追之獲白鷂子七百餘艘師勇還常州虎臣還真州世傑請濟師竟不報是月元主召巴延還至上都面陳形勢乞即進兵遂拜右丞相巴延辭曰阿珠功多臣宜居後乃進阿珠左丞相仍詔巴延直趨臨安阿珠仍攻淮南阿爾哈雅取湖南萬户宋都䚟及吕師夔李恆等取江西八月文天祥至臨安上疏言本朝懲五季之亂削藩鎮建都邑一時雖足以矯尾大之弊然國以寖弱故敵至一州則一州破至一縣則一縣殘中原陸沉痛悔何及今宜分境內為四鎮建都統居中以廣西益湖南而建閫於長沙以廣東益江西而建閫於隆興以福建益江東而建閫於番陽以淮西益淮東而建閫於揚州責長沙取鄂隆興取蘄番陽取江東揚州取兩淮地大力衆乃足以抗敵約日齊奮有進無退日夜以圗之彼備多力分疲於奔命而吾民之豪傑者又伺間出於其中如此則敵不難却也時議以為迂濶不報九月鄭虎臣殺賈似道於漳州先是臺諫三學生皆上書請誅似道詔謫似道髙州團練副使循州安置遣使監押之貶所會稽縣尉鄭虎臣以其父嘗為似道所配欲報之欣然請行舟次南劔州黯淡灘虎臣曰水清甚何不死於此似道曰太皇許我不死俟有詔即死至漳州木綿菴虎臣曰吾為天下殺似道雖死何憾遂拘其子與妾於别館即厠上拉其胸殺之後虎臣為陳宜中所殺冬十月壬戌元兵發建康分為三道阿勒哈鄂囉齊將右軍出四安鎮趨獨松關董文炳范文虎將左軍出江入江陰軍巴延將中軍入常州十一月甲申元巴延至常州會兵圍城知州姚訔通判陳照都統王安節劉師勇力戰固守巴延遣人招之不聼巴延怒命降人王良臣役城外居民運土為壘土至併人以築之且殺民煎膏取油以作炮焚其牌􅒎日夜攻不息城中甚急而訔等守志益堅巴延叱帳前諸軍奮勇爭先四面並進攻二日城破訔死之照與安節猶巷戰或謂照曰城東北門未合可走照曰去此一步非死所矣日中兵至死焉巴延命盡屠其民執安節至軍前不屈亦死師勇以八騎潰走平江丘濬曰作元史者謂巴延下江南不殺一人嗚呼常州非江南地耶元之號令凡攻城臨敵但以一矢相加遺者得即屠之巴延前此潛兵渡漢固已屠沙洋矣至是攻常州忿其久不下招之不從於是役城外居民運土為壘併人築之殺人煎膏取油作炮及城陷之日盡屠戮之一城生聚何啻千萬斬艾之餘止有七人伏於橋坎獲免秉性殘忍一至此哉在巴延統兵伐國殺人固所不免而後之人秉史筆者乃亦曲為之諱至比之曹彬豈其倫哉或曰所謂不殺謂入臨安時也嗚呼巴延至臯亭謝太后即遣使奉璽迎降寂無一人敢出一語者當是時苟有人心者皆不殺也豈但巴延哉己丑元軍破獨松關馮驥死之守將張濡遁獨松既破鄰邑望風皆遁朝廷大懼時勤王師尚三四萬人文天祥與張世傑議以為淮東堅壁閩廣全城若與敵血戰萬一得捷則命淮師以截其後國事猶可為也世傑大喜陳宜中白太后降詔以王師務宜持重議遂止是年元軍盡陷江西諸郡縣都統密祐死之宋史紀事本末卷二十七
