body:
  text: 宋史紀事本末卷十明馮𤦺原編陳邦瞻増輯元祐更化神宗元豐八年三月帝崩皇太子煦即位時年十嵗太皇太后髙氏臨朝同聴政太后既聴政即散遣修京城役夫止造軍器及禁廷工技出近侍尤無狀者戒中外無苛斂寛民間保户馬事由中㫖宰相王珪等弗與知也司馬光聞先帝喪入臨時光罷官居洛十五年矣田夫野老皆號為司馬相公婦人孺子亦知有君實至是入臨衛士見光皆以手加額民遮道呼曰公無歸洛留相天子活百姓所至人聚觀之光懼亟還太后遣梁惟簡勞光問為政所當先光疏曰臣聞周易天地交則為泰不交則為否君父天也臣民地也是故君降心以訪問臣竭誠以獻替則庶政修治邦家乂安君惡逆耳之言臣營便身之計則下情壅蔽衆心離叛自生民以來治亂未有不由斯道者也夫道猶岐路近差跬步逺失千里今陛下新臨大寶太皇太后同㫁萬幾初發號令斯乃治亂之岐塗安危之所由分也當以要切為先以瑣細為後臣竊見近年以來風俗頺弊士大夫以偷合茍容為智以危言正論為狂是致下情蔽而不上通上恩壅而不下達閭閻愁苦痛心疾首而上不得知明主憂勤宵衣旰食而下無所訴皆罪在羣臣而愚民無知往往怨歸先帝臣愚以為今日所宜先者莫若明下詔書廣開言路不以有官無官之人應有知朝政闕失及民間疾苦者並許進實封狀盡情極言仍頒下諸路州軍出榜曉示在京則於鼓院投下委主判官畫時進入在外則於州軍投下委長吏即日附逓奏聞皆不得取責副本强有抑退羣臣若有沮難者其人必有姦惡畏人指陳專欲壅蔽聰明此不可不察詔從之夏四月甲戌詔曰先皇帝臨御十有九年建立政事以澤天下而有司奉行失當幾於煩擾或茍且文具不能宣布實惠其申諭中外協心奉令以稱先帝惠安元元之意五月丙申詔百官言朝政闕失榜于朝堂時大臣有不悦者設六事於詔語中以禁遏之曰若隂有所懐犯非其分或扇搖機事之重或迎合已行之令上以觀望朝廷之意以僥倖希進下以眩惑流俗之情以干取虛譽若此者必罰無赦太后復封詔草示司馬光光曰此非求諫乃拒諫也人臣惟不言言則入六事矣太府少卿宋彭年水部員外郎王諤皆應詔言事有欲借此二人以懲天下言者謂其非職而言罰銅三十斤光具論其情改詔行之於是上封事者千數丙辰以蔡確韓縝為尚書左右僕射兼門下中書侍郎章惇知樞密院事詔起司馬光知陳州光過闕入見留為門下侍郎是時天下之民引領拭目以觀新政而議者猶謂三年無改於父之道光曰先帝之法其善者雖百世不可變也若王安石吕惠卿所建為天下害者改之當如救焚拯溺况太皇太后以母改子非子改父也於是衆議少止羅從彦曰孔子曰三年無改於父之道此孝子居喪志存父在之道不必主事而言也况當易危為安易亂為治之時速則濟緩則不及改之乃所以為孝也天子之孝在於保天下光不即理言之乃曰以母改子非子改父以此遏衆議則失之矣其後至紹聖時排䧟忠良以害于治豈亦光有以召之耶召程顥為宗正寺丞時朝政方新賢徳登進顥雖小官特為時望所屬故有是召㑹顥以疾不行尋卒丁亥詔中外臣庶許直言朝政得失民間疾苦秋七月戊戌以吕公著為尚書左丞初公著知揚州被召侍讀太后遣使迎問所欲言公著曰先帝本意以寛省民力為先而建議者以變法侵民為務與已異者一切斥去故日乆而弊愈深法行而民愈困誠得中正之士講求天下利病協力而為之宜不難矣因上十事曰畏天愛民修身講學任賢納諌薄歛省刑去奢無逸既至遂有是拜公著既居政府與司馬光同心輔政推本先帝之志凡欲革而未暇與革而未盡者一一舉行之又乞備置諌員以開言路民懽呼鼔舞稱便詔罷保甲法初保甲法行于京畿及河北河東陜西三路凡置㑹校都保三千二百六十六正長壯丁六十九萬一千九百四十五人嵗省舊募兵錢六十六萬一千四百八十三緡而民間應調不勝其苦先是司馬光言于太后曰兵出民間雖云古法然古者八百家纔出甲士三人步卒七十二人閒民甚多三時務農一時講武不妨稼穡自兩司馬以上皆選賢士大夫為之無侵漁之患故卒乘輯睦動則有功今籍鄉村之民二丁取一以為保甲授以弓弩教之戰陳是農民半為兵也三四年來又令三路置都教塲無問四時每五日一教特置使者比監司專切提舉州縣不得闗預每一丁教閱一丁供送雖云五日而保正長以泥堋除草為名聚之教塲得賂則縱否則留之是三路耕耘収穫稼穡之事幾盡廢也至是復力言其公私勞擾有害無益遂詔罷之十一月丙戌罷方田以鮮于侁為京東轉運使熈寧末侁已嘗為是官至是吳居厚貶復用之司馬光語人曰今復以子駿為轉運使誠非所宜然朝廷欲救東土之弊非子駿不可此一路福星也安得百子駿布在天下乎十二月壬戌罷市易法時言者交論市易之患被於天下本錢無慮千二百萬緡率二分其息十有五年之間子本當數倍今乃僅足本錢蓋買物入官未轉售而先計息取償至於物貨苦惡上下相䝉虧折日多空有虚名而已監察御史韓川論市易以為雖曰平均物值而其實不免貨交取利就使有𫉬尚不可為况所獲不如所亡願趣罷其法於是詔罷市易而削前提舉市易光祿卿吕嘉問三秩貶知淮陽軍罷保馬法哲宗元祐元年閏二月庚寅右司諫王覿上疏言國家安危治亂繫於大臣今執政八人而姦邪居半使一二元老何以行其志哉因極論蔡確章惇韓縝張璪朋邪害正章數十㑹右諌議大夫孫覺侍御史劉摰右司諫蘇轍御史王巖叟朱光庭上官均等連章論蔡確罪且言確在熈豐時寃獄苛政首尾預其間及至今日稍語於人曰當時確豈敢言此其意欲固竊名位反歸曲於先帝也司馬光吕公著進用蠲除煩苛確言皆其所建白於是公論益不容太后不忍斥之但罷政出知陳州以司馬光為尚書左僕射兼門下侍郎時光已得疾而青苗免役將官之法猶在西夏未降光歎曰四害未除吾死不瞑目矣與吕公著書曰光以身付醫以家事付子惟國事未有所托今以屬公既而詔免朝㕘乘肩輿三日一入省光不敢當曰不見君不可視事詔令子康扶入對遼人聞之敕其邊吏曰中國相司馬矣慎無生事開邊隙辛亥章惇罷言者論惇讒賊狠戾罔上蔽明不忠之罪與蔡確等惇不自安及確罷論者益力㑹與司馬光爭辯役法于太后簾前其語甚悖太后怒斥知汝州三月司馬光請悉罷免役錢復差役法諸色役人皆如舊制其見在役錢撥充州縣常平本錢於是詔修定役書凡役錢惟元定額及額外寛剩二分以下許著為凖餘並除之若寛剩元不及二分者自如舊則尋詔耆户長壯丁仍舊募人供役保正甲頭承帖人並罷侍御史劉摰乞並用祖宗差法監察御史王巖叟請立諸役相助法中書舎人蘇軾請行熈寧給田募役法因列其五利王巖叟言五利難信而有十弊軾議遂格司馬光復言免役之法其害有五上户舊充役固有陪備而得番休今出錢比舊費特多年年無休息下户舊不充役今例使出錢舊所差皆土著良民今皆浮浪之人恣為姦欺又農民出錢難于出力凶年則賣莊田牛具以錢納官又提舉司惟務多歛役錢積寛剩以為功此五害也今莫若直降敕命委縣令佐掲簿定差其人不願身自供役許擇可任者雇代惟衙前一役最號重難今仍行差法陪備既少當不至破家若猶矜其力難獨任即乞如舊於官户寺觀單丁女户有屋産莊田者隨貧富以差出助役錢尚慮役人利害四方不能齊同乞許監司守令審其可否可則亟行如未究盡縣五日具措畫上之州州一月上轉運司以聞朝廷委執政審定隨一路一州各為之敕務要曲盡初章惇取光所奏疎畧未盡者駁奏之吕公著言惇專欲求勝不顧命令大體望選差近臣詳定於是資政殿大學士韓維及范純仁吕大防孫永等詳定以聞蘇軾言於光曰差役免役各有利害免役之害聚歛於上而下有錢荒之患差役之害民常在官不得專力於農而吏胥緣以為姦此二害輕重葢畧等矣光曰於君何如軾曰法相因則事易成事有漸則民不驚三代之法兵農為一至秦始分為二及唐中葉盡變府兵為長征卒自是以來民不知兵兵不知農農出榖帛以養兵兵出性命以衛農天下便之雖聖人復起不能易也今免役之法實大類此公欲驟罷免役而行差役正如罷長征而復民兵葢未易也光不以為然初差役行於祖宗之世法乆多弊編户充役不習官府吏虐使之多以破産而狹鄉之民或有不得休息者免役使民以户髙下出錢而無執役之苦但行法者不循上意於雇役實費之外取錢過多民遂以病若量入為出毋多取于民則善矣光知免役之害而不知其利欲一切以差役代之軾獨以實告而光不察軾又陳於政事堂光色忿然軾曰昔韓魏公刺陜西義勇公為諫官爭之甚力韓公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶光謝之自是役人悉用見數為額惟衙前用坊場河渡錢雇募餘悉定差仍罷官户寺觀單丁女户尋以衙前不皆有雇直遂改雇募為招募范純仁謂光曰治道去其太甚者可也差役一事尤當熟講而緩行不然滋為民病願公虚心以延衆論不必謀自己出謀自己出則諂諛得乘間迎合矣設議或難回則可先行之一路以觀其究竟光不從持之益堅純仁曰是使人不得言耳若欲媚公以為容悦何如少年合安石以速富貴哉又云熈寧按問自首之法既已改之有司立文太深四方死者視舊數倍殆非先王寧失不經之意純仁素與光同志及臨事規正類如此初差役之復為期五日同列病其太迫知開封府蔡京獨如約悉改畿縣雇役無一違者詣政事堂白光光喜曰使人人奉法如君何不可行之有光居政府凡王安石吕惠卿所建新法剗革畧盡或謂光曰熈豐舊臣多憸巧小人他日有以父子之義間上則禍作矣光正色曰天若祚宋必無此事於是天下釋然曰此先帝本意也衛尉丞畢仲游與光書曰昔安石以興作之說動先帝而患財不足也故凡政之可得民財者無不用蓋散青苗置市易斂役錢變鹽法者事也而欲興作患不足者情也茍未能杜其興作之情而徒欲禁其散斂變置之法是以百說而百不行今遂廢青苗罷市易蠲役錢去鹽法凡號為利而傷民者一掃而更之則向來用事于新法者必不喜矣不喜之人必不但曰不可廢罷蠲去必操不足之情言不足之事以動上意雖致石而使聴之猶將動也如是則廢罷蠲去者皆可復行矣可不預治哉為今之䇿當大舉天下之計深明出入之數以諸路所積之錢粟一歸地官使經費可支二十年之用數年之間又將十倍於今日使天子曉然知天下之餘於財也則不足之論不得陳於前然後所論新法者始可永罷而不可復矣昔安石之居位也中外莫非其人故其法能行今欲救前日之弊而左右侍從職司使者十有七八皆安石之徒雖起二三舊臣用六七君子然累百之中存其十數烏在其勢之可為也勢未可為而欲為之則青苖雖廢將復散况未廢乎市易雖罷且復置况未罷乎役錢鹽法亦莫不然以此救前日之敝如人乆病而少間其父子兄弟喜見顔色而未敢賀者以其病之猶在也光得書竦然亦竟不為之慮以劉摰為御史中丞摰上疏曰上之所好下必有甚朝廷意在綜覈下必有刻薄之行朝廷務在寛大下必有茍簡之事習俗懐利迎意趨和所為近似而非上之意本然也今因革之政本殊而觀望之俗固在昨差役初行監司已有迎合爭先不校利害一槩定差一路為之騷動者以是觀之大約類此向來黜責數人者皆以非法掊克市進害民然非欲使之漫不省事昧者不達矯枉過正顧可不為之禁哉壬寅以吕公著為尚書右僕射兼中書侍郎詔起文彦博平章軍國重事班宰相上五月丁巳以韓維為門下侍郎神宗崩維自提舉嵩山崇福宫入臨太后手詔勞問維對曰人情貧則思富苦則思樂困則思息鬱則思通誠能常以利民為本則民富常以憂民為心則民樂賦役非人力所堪者去之則勞困息法禁非人情所便者蠲之則鬱塞通推此而廣之盡誠而行之則子孫觀陛下之徳不待教而成矣未幾起知陳州召為資政殿大學士兼侍讀及詳定役法四方多言差役便民維曰是小人希意迎合者也不可盡信司馬光不能從六月甲辰貶吕惠卿為建寧軍節度副使建州安置中書舍人蘇軾草其制曰惠卿以斗筲之才穿窬之智諂事宰輔同升廟堂樂禍貪功好兵喜殺以聚斂為仁義以法律為詩書首建青苗次行助役均輸之政自同商賈手實之禍下及鷄豚茍可蠧國害民率皆攘臂稱首先皇帝求賢如不及從善若轉圜始以帝堯之仁姑試伯鯀終焉孔子之聖不信宰予尚寛兩觀之誅薄示三苗之竄天下傳誦稱快焉時惠卿章惇吕嘉問鄧綰李定蒲宗孟范子淵等皆已斥外言者論之不已范純仁言于太后曰錄人之過不宜太深后然之乃詔前朝希合附㑹之人一無所問言者勿復彈劾惠卿黨稍安或謂吕公著曰今除惡不盡將貽後患公著曰治道去太甚耳文景之世網漏吞舟且人材實難宜使自新豈宜使自棄耶八月辛卯詔復常平舊法罷青苗錢司馬光以疾在告范純仁以國用不足請再立常平錢榖給歛出息之法限正月以散及一半為額民間絲麥豐熟隨夏税先納所輸之半願半納者止出息一分臺諌劉摰上官均王覿蘇轍交章論其非光謂先朝散青苗本為利民並取情願後提舉官速要見功務求多散今禁抑配則無害也中書舍人蘇軾錄黄奏曰熈寧之法未嘗不禁抑配而其為害至此民家量入為出雖貧亦足若令分外得錢則費用自廣今若許人情願則未免設法罔民使快一時非理之用而不慮後日催納之患非良法也㑹臺諌王巖叟朱光庭王覿等交章乞罷青苗光大悟力疾請對太后從之詔常平錢榖止令州縣依舊法趂時糴糶青苗錢更不支俵除舊欠二分之息元支本錢驗見欠多少分科次隨二稅輸納九月丙辰朔司馬光卒時兩宫虚己以聴光為政光亦自見言行計從欲以身殉社稷躬親庶務不舍晝夜賓客見其體羸舉諸葛亮食少事煩以為戒光曰死生命也為之益力病革諄諄如夢中語皆朝廷天下事也及卒其家得遺表八紙上之皆當世要務太后為之慟與帝臨其喪贈太師温國公諡文正十一月以吕大防為中書侍郎劉摰為尚書侍郎二年夏四月己丑文彦博乞致仕詔十日一至都堂議事三年夏四月辛巳吕公著以老懇辭位乃拜司空同平章軍國事詔建第于東府之南啟北扉以便執政㑹議凡三省樞密院之職皆得總理間日一朝因至都堂其出不以時葢異禮也時熈豐用事之臣雖去其黨分布中外起私說以搖時政鴻臚丞常安民貽公著書曰善觀天下之勢猶良醫之視疾方安寧無事之時語人曰其後必將有大憂則衆必駭笑惟識㣲見幾之士然後能逆知其漸故不憂於可憂而憂之於無足憂者至憂也今日天下之勢可為大憂雖登進忠良而不能搜致海内之英才使皆萃于朝以勝小人恐端人正士未得髙枕而卧也故去小人為不難而勝小人為難陳蕃竇武協心同力選用名賢天下想望太平卒死曹節之手遂成黨錮之禍張柬之五王中興唐室以為慶流萬世及武三思一得志至於竄夷淪沒凡此者皆前世已然之禍也今用賢如倚孤棟拔士如轉鉅石雖有奇特瓌卓之才不得一行其志甚可歎也猛虎負嵎莫之敢攖而卒為人所勝者人衆而虎寡也故以十人而制一虎則人勝以一人而制十虎則虎勝奈何以數十人而制千虎乎今怨忿已積一發其害必大可不為大憂乎公著得書黙然以吕大防范純仁為尚書左右僕射兼門下中書侍郎大防朴厚戅直不植黨與純仁務以博大開上意忠厚革士風二人同心戮力以相王室太后亦傾心委之故元祐之治比隆嘉祐四年二月甲辰吕公著卒太皇太后見輔臣泣曰邦國不幸司馬相公既亡吕司空復逝痛憫乆之帝亦悲感即詣其家臨奠贈太師申國公諡正獻六月甲辰范純仁罷冬十月癸丑帝御邇英殿講官進講三朝寶訓時吕大防見帝年益壯日以進學為急請敕講讀官取仁宗邇英御書解釋上之寘于座右又摭乾興以來四十一事足為勸戒者分上下篇標曰仁宗聖學至是帝御邇英閣召宰執講讀官講三朝寶訓至漢武帝籍南山提封為上林苑仁宗曰山澤之利當與衆共之何用此也丁度進曰臣事陛下二十年每奉徳音未始不及於憂勤此葢祖宗家法耳大防因推祖宗家法以進曰自三代以後惟本朝百二十年中外無事蓋由祖宗所立家法最善臣請舉其畧因數其事親事長治内待外戚尚儉勤身尚禮寛仁八法以進且曰虚己納諫不好畋獵不尚翫好不用玉器不貴異味此皆祖宗家法所以致太平者不須逺法前代但盡行家法足以為天下帝深然之五年春正月庚戌文彦博罷五月壬申詔差役法有未備者令具利害以聞初蘇軾言差役之法天下皆云未便昔日雇役中户嵗出幾何今日差役中户嵗費㡬何更以幾年一役較之約見其數則利害灼然而况農民在官吏百端𧖟食比之雇人苦樂十倍李常亦言差法廢乆版籍不明重輕無凖鄉寛户多者僅得更休鄉狹户窄者頻年在役望詔一二練事臣僚使與賦臣取差雇二法便者行之於是論差役未便者甚衆遂詔差役法有未備者令中書舍人王巖叟樞密都承㫖韓川諫議大夫劉安世同看詳具利害以聞以蘇轍為御史中丞時熈豐舊臣爭起邪説以撼在位吕大防劉摰患之欲稍引用以平宿怨謂之調停太后疑不决轍面斥其非復上疏曰親君子逺小人則主尊國安疎君子任小人則主憂國殆此理之必然夫以小人在外憂其不悦而引於内以自遺患也且君子小人勢同氷炭同處必爭一爭之後小人必勝君子必敗何者小人貪利忍恥擊之則難去君子潔身重義沮之則引退先帝聰明聖智疾頺靡之俗以綱紀四方比隆三代而臣下不能將順造作諸法上逆天意下失民心二聖因民所願取而更之上下忻慰則前者用事之臣今朝廷雖不加斥逐其勢亦不能復留矣尚賴二聖慈仁宥之於外葢已厚矣而議者惑於衆說乃欲招而納之與之共事謂之調停此輩若返豈肯但已哉必將戕害正人漸復舊事以快私忿人臣被禍葢不足言臣所惜者祖宗朝廷也惟陛下㫁自聖心勿為流言所惑勿使小人一進後有噬臍之悔則天下幸甚疏入太后曰轍疑吾君臣兼用邪正其言極有理諸臣從而和之調停之説遂已六年二月以劉摰為尚書右僕射兼中書侍郎王巖叟僉書樞密院事巖叟居言職五年正諫無隠及拜僉樞密謝因進曰太后聴政以來納諫從善務合人心所以朝廷清明天下安靜願信之勿疑守之勿失復進言於帝曰陛下今日聖學當深辨邪正正人在朝則朝廷安邪人一進便有不安之象非謂一人能然葢其類應之者衆上下蔽䝉不覺養成禍胎爾又曰或聞有以君子小人參用之説告陛下者不知果有之否此乃深誤陛下也自古君子小人無參用之理聖人但云内君子而外小人則泰内小人而外君子則否小人既進君子必引類而去若君子與小人競進則危亡之基也不可不察十一月乙酉劉摰罷七年夏四月丙午王巖叟罷六月辛酉以吕大防為右光祿大夫蘇頌為尚書右僕射兼中書侍郎蘇轍為門下侍郎范百祿為中書侍郎梁燾鄭雍為尚書左右丞韓忠彦知樞密院事劉奉世僉書樞密院事八年秋七月丙子召范純仁為尚書右僕射兼中書侍郎純仁入謝太后謂曰或謂卿必引用王覿彭汝礪卿宜與吕大防一心對曰此二人實有士望臣終不敢保位蔽賢望陛下加察純仁之將召也殿中侍御史楊畏附蘇轍欲相之因與來之邵上疏論純仁闇猥不可復相不報純仁既視事吕大防欲引畏為諫議大夫以自助純仁曰諫官當用正人畏不可用大防曰豈以畏嘗言相公耶轍即從旁誦其彈文然純仁初不知也已而竟遷畏禮部侍郎宣仁之誣神宗元豐八年春正月戊戌帝不豫二月癸巳帝疾甚三省樞密院入見請立皇太子及請皇太后權同聴政許之三月甲午朔立延安郡王傭為皇太子賜名煦先是岐王顥嘉王頵日問起居髙太后既垂簾命二王母輙入且隂敕中人梁惟簡妻製十嵗兒一黄袍懐以來葢密為踐祚倉卒備也初太子之未立也職方員外郎邢恕與蔡確成謀密語太后之姪髙公繪公紀曰上疾不可諱延安㓜冲宜早有定論岐嘉皆賢王也公繪驚曰此何言君欲禍吾家耶恕知計不行反宣言太后屬意岐王而與王珪表裏導確約珪入問陽鉤致珪語使知開封府蔡京伏劒士於外須珪小持異則執而誅之既而珪言上自有子定議立延安恕益無所施及太子已立猶與確自謂有定策功傳播其語于朝庚子尊皇太后曰太皇太后甲寅羣臣請帝同太皇太后聴政蔡確思求媚于太后以自固太后從父髙遵裕坐西征失律扺罪因上言乞復遵裕官后曰遵裕靈武之役塗炭百萬先帝中夜得報起環榻而行徹旦不能寐自是驚悸馴致大故禍由遵裕得免刑誅幸矣先帝肉未冷吾何敢顧私恩而違天下公議乎確悚慄而退哲宗元祐元年春正月丙辰立神宗原廟太皇太后詔曰原廟之立所從來乆矣前日神宗皇帝初即祠宫並建寢殿以崇嚴祖考其孝可謂至矣今神宗既已升祔於故事當營館御以奉神靈而宫垣之東密接民里欲加開展則懼成煩擾欲採縉紳之議皆合帝后為一殿則慮無以稱神宗欽奉祖考之意聞治隆殿後有園池以后殿推之本留以待未亡人也可即其地立神宗原廟吾萬嵗之後當從英宗皇帝於治隆上以寧神明中以成吾子之志下以安民之心不亦善乎二年三月神宗既祥太皇太后詔曰祥禫既終典策告具而有司遵用章獻明肅皇后故事謂予當受冊於文徳殿雖皇帝盡孝養之意務極尊崇而朝廷有損益之文各從宜稱仰惟章獻明肅皇后輔佐真廟擁佑仁宗茂業豐功宜見隆異顧予涼薄敢企徽音稽用舊儀實有慙徳將來受冊可止就崇政殿又諭執政曰母后臨朝非國家盛事文徳殿天子正牙豈女主所當御哉三年八月邢恕為太后姪公繪作書上太后乞尊禮髙氏太后怒罷恕十二月甲寅太皇太后詔曰官冗之患所從來尚矣流弊之極實萃于今上有乆閒失職之吏則下有受害無告之民故命大臣考求其本茍非裁損入流之數無以澄清取士之原吾今自以渺身率先天下永惟臨御之始嘗敕有司蔭補私親舊無定限自惟薄徳敢配前人已詔家庭之恩止從母后之比今當又損以示必行夫以先帝顧託之深天下責望之重茍有利於社稷吾無愛於髪膚矧此恩私實同毫末忠義之士當識此誠各忘内顧之恩共成節約之制今後每遇聖節大禮生辰合得親屬恩澤並四分減一皇太后皇太妃凖此四年五月安置蔡確于新州確失勢已乆遂懐怨望在安州嘗遊車蓋亭賦詩十章知漢陽軍吳處厚與確有隙因解釋其語以為謗訕且論其用郝處俊上元間諫髙宗欲傳位武后事指斥東朝上之中書於是臺諌上確怨謗乞正其罪詔確具析確自辨甚悉右正言劉安世等又言確罪狀著明何待具析此乃大臣曲為之地耳乃貶確光祿卿分司南京臺諫論之不置而諫議大夫范祖禹亦言確之罪惡天下不容尚以列卿分務留京未厭衆論執政議寘確于法范純仁王存以為不可爭之未决文彦博欲貶確嶺嶠純仁聞之謂吕大防曰此路乾興以來荆棘近七十年吾輩開之恐自不免大防乃不復言越六日再貶確英州别駕新州安置純仁又言於太后曰聖朝宜務寛厚不可以語言文字之間曖昧不明之過竄誅大臣今舉動宜為將來法此事甚不可開端也且以重刑除惡如以猛藥治病其過也不能無損焉不聴時中丞李常中書舍人彭汝礪侍御史盛陶皆言以詩罪確非所以厚風俗常坐貶知鄧州中書舍人彭汝礪曰此羅織之漸也封還詞頭汝礪坐貶知徐州侍御史盛陶言不可長告訐之風亦坐貶知汝州初確之具析未上也梁燾自潞州召為諫議大夫過河陽邢恕極論確有策立勲燾至奏之太后諭三省曰帝是先帝長子子繼父業其分當然確有何策立勲耶若使確他日復來欺罔上下豈不為朝廷害恐帝年少制御不得故今因其自敗如此行遣蓋為社稷也六月甲辰范純仁罷吕大防言蔡確黨盛不可不治純仁言朋黨難辨恐誤及善人司諫吳安時正言劉安世因論純仁黨確純仁亦力求罷政乃出知潁昌府傅堯俞言于太后曰蔡確之黨其尤者固宜逐餘可一切置之以陛下盛徳何所不容確詞縱涉謗訕願聴之如蚊䖟過耳無使有􅊏芥之忤以奸太和之氣事至以無心應之聖人所以養至誠而御遐福也六年十一月乙酉劉摰罷摰與吕大防同位國家大事多决於大防惟進退士大夫實執其柄然持心少恕勇於去惡竟為朋讒奇中遂與大防有隙先是蔡確之貶邢恕亦謫監永州酒税以書抵摰摰故與恕善答其書有永州佳處第往以俟休復之語排岸官茹東濟險人也有求於摰不得見其書陰錄以示中丞鄭雍殿中侍御史楊畏二人方附吕大防因箋釋其語上之曰休復者語出周易以俟休復者俟他日太皇太后復子明辟也又章惇諸子故與摰子游摰亦間與之接雍畏謂摰延見接納為牢籠之計以覬後福且論王巖叟梁燾劉安世朱光庭等三十人皆其死友太后於是面諭摰曰言者謂卿交通匪人為異日地卿當一心王室若章惇者雖以宰相處之未必樂也摰惶恐退上章自辨而梁燾王巖叟果上疏論救之太后曰垂簾之初摰斥排奸邪實為忠直但此二事非所當為也遂罷知鄆州給事中朱光庭駁之曰摰忠義自奮朝廷擢之大位一旦以疑而罷天下不見其過言者以光庭為黨亦罷知亳州八年九月戊寅太皇太后髙氏崩初太后不豫吕大防范純仁等問疾太后曰老身受神宗顧託同官家御殿聴㫁卿等試言九年間曽施恩髙氏否只為至公一男一女病且死皆不得見言訖泣下又曰先帝追悔往事至於泣下此事官家宜深知之老身沒後必多有調戲官家者宜勿聴公等亦宜早退令官家别用一畨人乃呼左右賜社飯曰明年社飯時思量老身也太后聴政召用故老名臣罷廢新法苛政於是宇内復安遼主戒其臣下勿生事於疆埸曰南朝盡行仁宗之政矣臨朝九年朝廷清明華夏綏定力行故事抑絶外家私恩人以為女中堯舜十二月乙巳范純仁乞罷政不許初太皇太后寢疾召純仁曰卿父仲淹可謂忠臣在明肅垂簾時惟勸明肅盡母道明肅上賓惟勸仁宗盡子道卿當似之純仁泣曰敢不盡忠及帝親政純仁乞避位帝語吕大防曰純仁有時望不宜去可為朕留之旦輙入覲帝問先朝行青苗法如何純仁對曰先帝愛民之意本深但王安石立法過甚激以賞罰故官吏急切以致民害退而上疏其要以為青苗非所當行行之終不免擾民也時羣小力排太后時事純仁奏曰太后保佑聖躬功烈誠心幽明共鑒議者不恤國是一何薄哉因以仁宗禁言明肅垂簾時事詔書上之曰望陛下稽放而行以戒薄俗韓忠彦亦言于帝曰昔仁宗始政羣臣亦多言章獻之非仁宗惡其持情近薄下詔戒飭陛下能法仁祖則善矣給事中吕陶復進曰太后保佑九年陛下尊而報之惟恐不盡萬一有姦邪不正之人謂某人宜復用某事宜復行此乃治亂安危之機不可不察哲宗紹聖元年三月乙亥吕大防罷大防宣仁時懇乞避位后曰上富於春秋公未可即去少須嵗月吾亦就東朝矣及后崩大防為山陵使殿中侍御史來之邵逆探時㫖首劾大防而大防亦自求去帝從之十一月壬子特追復蔡確觀文殿大學士四年冬十月以邢恕為御史中丞追貶王珪為萬安軍司户㕘軍初恕乆斥外心懐憤恨自河陽間道謁蔡確於鄧州將緒成太后王珪廢立事以明確與已定策功謀已定而無左驗㑹司馬光子康赴闕過河陽恕乃紿康手書稱確功既而梁燾以諫議召過河陽恕復頌確功於燾且出康書為證既而恕帥中山置酒誘髙遵裕之子士京曰公知元祐間獨不與先公推恩否士京曰不知又問有兄弟無曰有兄士充已死恕曰此乃傳王珪語言之人也當時王珪為相欲立岐王遣士充傳道語言於禁中公知否士京曰不知恕因㗖以官爵曰不可言不知為公作此事第勿以語人士京庸暗從之至是章惇蔡卞將甘心元祐諸人引恕自助遂召還三遷為中丞恕遂以北齊婁太后宫名宣訓嘗廢孫少帝立子演設為司馬光語范祖禹曰方今主少國疑宣訓事尤可慮又令王棫為髙士京作奏言父遵裕臨死屏左右謂士京曰神宗彌留之際王珪遣士充來問曰不知皇太后欲立誰我叱士充去之事遂已㑹給事中葉祖洽亦以王珪於冊立時有異論於是詔追貶珪而贈遵裕奉國軍節度使元符元年三月下文及甫於同文館獄及甫彦博之子也初劉摰嘗論列及甫又嘗論其父彦博不可為三省長官故止為平章事彦博既致仕及甫自權侍郎以修撰補外父母喪將除摰與吕大防猶當國及甫恐不得京官扺書邢恕曰改月遂除入朝之計未可必當塗猜忌於鷹揚者益深其徒實繁司馬昭之心路人所知也又濟之以粉昆朋類錯立必欲以𦕈躬為甘心快意之地可為寒心其謂司馬昭者指吕大防獨當國乆粉昆世謂駙馬都尉為粉侯韓嘉彦尚主其兄忠彦則粉昆也恕以書示蔡確之弟碩至是恕令確子渭上書訟摰等陷其父陰圖不軌謀危宗社引及甫書為證章惇蔡卞因是欲殺摰及梁燾王巖叟等以為摰有廢立意遂置獄于同文館令蔡京安惇雜治逮問及甫及甫詭言其父彦博稱摰為司馬昭粉則以王巖叟面白昆則梁燾字況之況猶兄也京惇因組織萬端將陷諸人以族罪奏劉摰等大逆不道死有餘責不治無以示天下帝曰元祐人果如是乎京惇對曰誠有是心特反形未具耳㑹劉摰梁燾已貶死京等奏上不及考驗乃下詔禁錮摰燾子孫于嶺南勒停王巖叟朱光庭諸子官職蔡京覬求執政故治獄極意羅織元祐諸賢既成而曽布忌京密言于帝曰蔡卞備位丞轄京不可以同升遂止進承㫖京布由是有隙章惇蔡卞恐元祐諸臣一日復起日夜與邢恕等謀且結内侍郝隨為助媒蘖宣仁嘗欲危帝之事既貶王珪又起同文館獄又誣司馬光劉摰梁燾吕大防等結主宣仁閣内侍陳衍謀廢立時衍已先得罪配朱崖又以内侍張士良嘗與衍同主后閣自郴州召還使蔡京安惇雜治之以實其說京等列鼎鑊刀鋸於前謂之曰言有即還舊職無則就刑士良仰天大哭曰太皇太后不可誣天地神祇不可欺乞就戮京等鍜鍊無所得乃奏衍疏隔兩宫斥隨龍内侍劉瑗等于外以剪除人主腹心羽翼為大逆不道處死帝頗惑之至是惇卞自作詔書請廢宣仁為庶人皇太后方寢聞之遽起謂帝曰吾日侍崇慶天日在上此語曷從出且帝必如此亦何有於我帝感悟取惇卞奏就燭焚之郝隨覘知之密語惇卞明日惇卞再具狀堅請施行帝怒曰卿等不欲朕入英宗廟乎抵其奏於地事得寢洛蜀黨議哲宗元祐元年三月辛巳以程頥為崇政殿説書頥在治平元豐間大臣屢薦皆不起至是司馬光吕公著共疏其行義曰伏見河南處士程頥力學好古安貧守節言必忠信動遵禮度年踰五十不求仕進真儒者之髙蹈聖世之逸民望擢以不次使士類有所矜式詔以為西京國子監教授力辭尋召為秘書省校書郎及入對改崇政殿說書頥即上疏言習與智長化與心成今夫民善教其子弟者亦必延名徳之士使與之處以薫陶成性況陛下春秋方富雖睿聖得於天資而輔養之道不可不至大率一日之中接賢士大夫之時多親宦官宫妾之時少則氣質變化自然而成願選名儒入侍勸講講罷留之分直以備訪問或有小失隨時獻規嵗月積乆必能養成聖徳頥每進講色甚莊繼以諷諫聞帝在宫中盥而避蟻問有是乎帝曰然誠恐傷之耳頥曰推此心以及四海帝王之要道也帝嘗憑檻偶折栁枝頥正色曰方春時和萬物發生不當輕有所折以傷天地之和帝頷之九月丁夘以蘇軾為翰林院學士軾自登州召還十月之間三陟華要尋兼侍讀每經筵進讀至治亂興衰邪正得失之際未嘗不反覆開導覬有所啟悟常鎖宿禁中召見便殿太后問曰卿前年為何官對曰常州團練副使曰今為何官對曰待罪翰林學士曰何以遽至此對曰遭遇太皇太后皇帝陛下曰非也對曰豈大臣論薦乎曰亦非也軾驚曰臣雖無狀不敢自他途進曰此先帝意也先帝每誦卿文章必歎曰竒才奇才但未及進用卿耳軾不覺哭失聲太后與帝亦泣左右皆感涕已而命坐賜茶撤御前金蓮燭送歸院軾在翰林頗以言語文章規切時政畢仲游以書戒之軾不能從二年三月程頥請就崇政延和殿講讀上疏曰臣近言邇英漸熱只乞就崇政延和殿聞給事中顧臨以延和講讀為不可臣料臨之意不過謂講官不可坐於殿上以尊君為說爾臣不暇逺引只以本朝故事言之太祖召王昭素講易真宗令崔頥正講尚書邢昺講春秋皆在殿上當時仍是坐講立講之儀只始於明肅太后之意此又祖宗尊儒重道之美盛豈獨子孫所當為亦萬世帝王所當法也今世俗之人能為尊君之言而不知尊君之道人君惟道徳益髙則益尊若勢位則崇髙極矣尊嚴至矣不可復加也又曰天下重位惟宰相與經筵天下治亂係宰相君徳成就責經筵八月辛巳罷崇政殿說書程頥頥在經筵多用古禮蘇軾謂其不近人情深嫉之每加玩侮方司馬光之卒也百官方有慶禮事畢欲往吊頥不可曰子於是日哭則不歌或曰不言歌則不哭軾曰此枉死市叔孫通制此禮也二人遂成嫌隙軾嘗發策試館職有曰今朝廷欲師仁宗之忠厚懼百官有司不舉其職而或至於媮欲法神宗之勵精恐監司守令不識其意而流入於刻於是頥門人右司諫賈易左正言朱光庭等劾軾策問謗訕軾因乞補郡殿中侍御史吕陶言臺諌當循至公不可假借事權以報私隙右司諫王覿言軾命辭不過失輕重之體若悉考同異深究嫌疑則兩岐遂分黨論滋熾夫學士命詞失指其事尚小使士大夫有朋黨之名大患也太后然之臨朝宣諭曰嘗覽軾文意是指今日百官有司監司守令言之非是譏諷祖宗范純仁亦言軾無罪遂置不問㑹帝患瘡疼不出頥詣宰臣吕公著問上不御殿知否且曰二聖臨朝上不御殿太后不當獨坐且人主有疾而大臣不知可乎明日宰臣以頥言問疾由是大臣亦多不悦於是御史中丞胡宗愈給事中顧臨連章力詆頥不宜在經筵諫議大夫孔文仲因奏頥汙下憸巧素無鄉行經筵陳說僣横忘分徧謁貴臣歴造臺諫騰口間亂以償恩讐致市井目為五鬼之魁請放還田里以示典刑乃罷頥出管勾西京國子監時吕公著獨當國羣賢咸在朝不能不以類相從遂有洛黨蜀黨朔黨之語洛黨以頥為首而朱光庭賈易為輔蜀黨以蘇軾為首而吕陶等為輔朔黨以劉摰梁燾王巖叟劉安世為首而輔之者尤衆是時熈豐用事之臣退休散地怨入骨髓陰伺間隙諸賢不悟各為黨比以相訾議惟吕大防秦人戅直無黨范祖禹師司馬光不立黨既而帝聞之以問胡宗愈宗愈對曰君子指小人為奸則小人指君子為黨陛下能擇中立之士而用之則黨禍熄矣因具君子無黨論以進冬十月貶右司諫賈易時程頥蘇軾交惡其黨互相攻訐易因劾吕陶黨軾兄弟語侵文彦博范純仁太后怒欲峻責易吕公著言易言亦直惟詆大臣太甚耳乃罷知懐州公著退語同列曰諫官所言未論得失顧主上春秋方盛慮異時有導諛惑上心者正賴左右爭臣不可豫使人主輕厭言者衆皆歎服三年三月孔文仲卒吕公著曰文仲本以抗直稱然惷不曉事為諫議時乃為浮薄輩所使以害善良晩乃知為所紿憤鬱嘔血以致不起公著之言葢指其劾程頥也以胡宗愈為尚書右丞諫議大夫王覿以宗愈進君子無黨論惡之因疏宗愈不可執政太后大怒純仁與文彦博吕公著辨於簾前太后意未解純仁曰朝臣本無黨但善惡邪正各以類分彦博公著皆累朝舊人豈容雷同罔上昔先臣與韓琦富弼在慶厯時同為執政各舉所知當時飛語指為朋黨三人相繼補外造謗者公相慶曰一網打盡矣此事未逺願陛下戒之因極言前世朋黨之禍并錄歐陽修朋黨論上之然竟出覿知潤州而宗愈居位如故五年春正月程頥以父憂守制去臺諫復論賈易諂事頥再貶易知廣徳軍六年二月以蘇轍為尚書右丞轍除名既下右司諌楊康國奏曰轍之兄弟謂其無文學則非也蹈道則未也其學乃學為儀秦者也其文率務馳騁好作為縱横捭闔無安靜理陛下若悦蘇轍文學而用之不疑是又用一王安石也轍以文學自負而剛狠好勝則與安石無異不報翰林院學士承㫖蘇軾罷軾自杭州召還未幾侍御史賈易復劾軾元豐末在揚州聞先帝厭代作詩及草吕惠卿制皆誹怨先帝無人臣禮御史中丞趙君錫亦繼言之太后怒罷易知宣州君錫知鄭州吕大防請併軾兩罷乃出軾知潁州尋改知揚州七年三月程頥服闋三省擬除館職判檢院蘇轍進曰頥入朝恐不肯靜太后納之范祖禹言頥經術行義天下共知司馬光吕公著豈欺罔上耶但草茅之人未習朝廷事體則有之寧有他故如言者所指哉乞召勸講必有補於聖明除頥直秘閣判西監頥再上表辭御史董敦逸摭其有怨望語改授管勾崇福宫九月召蘇軾為兵部尚書兼侍讀軾自揚州召為兵部尚書兼侍讀尋又遷禮部兼端明侍讀二學士御史董敦逸黄慶基言軾為中書舍人時草吕惠卿制詞指斥先帝其弟轍相為表裏以紊朝政吕大防奏曰先帝欲富强中國鞭撻羌戎而一時羣臣將順太過故事或失當太皇太后與皇帝臨御因民所欲隨事捄改葢理之當然比來言官用此以中傷士人兼欲搖動朝廷意極不善轍亦為其兄辯所撰惠卿謫詞其言及先帝者有曰始以帝堯之仁姑試伯鯀終焉孔子之聖不信宰予初非謗誹先帝太后曰先帝追悔往事至於泣下大防曰先帝一時過舉非其本意太后曰此事官家宜深知於是罷敦逸慶基為湖北福建路轉運判官紹述哲宗元祐八年冬十月帝始親政時太后既崩中外洶洶人懐顧望在位者畏懼莫敢發言翰林學士范祖禹慮小人乘間害政上疏曰陛下方攬庶政延見羣臣今日乃國家隆替之本社稷安危之機生民休戚之端君子小人進退消長之際天命人心去就離合之時也可不畏哉先后有大功於宗社有大徳於生靈九年之間始終如一然羣小怨恨亦不為少必將以改先帝之政逐先帝之臣為言以事離間不可不察也先后因天下人心變而更化既改其法則作法之人有罪當退亦順衆言而逐之是皆上負先帝下負萬民天下之所仇疾而欲去之者也豈有憎惡於其間哉唯辨析是非深拒邪説有以奸言惑聴者付之典刑痛懲一人以警羣慝則帖然無事矣此等既誤先帝又欲誤陛下天下之事豈堪小人再破壊邪時蘇軾方具疏將諌及見祖禹奏曰經世之文也遂附名同進而毁已草疏入不報㑹有㫖召内侍劉瑗樂士宣等十人復職蘇轍諫曰陛下視政以來未聞訪一賢臣而所召乃先内侍四海必謂陛下私於近習不可弗聴侍講豐稷亦以為言出知潁州范祖禹復請對曰熈寧之初王安石吕惠卿造立新法意變祖宗之政多引小人以誤國勲舊之臣屏棄不用忠正之士相繼逺引又用兵開邊結怨外夷天下愁苦百姓流徙賴先帝覺悟罷逐兩人而所引羣小已布滿天下不可復去蔡確連起大獄王韶創取熈河章惇開五溪沈起擾交管沈括徐禧俞允种諤興造西事兵民死傷者不下二十萬先帝臨朝悼悔謂朝廷不得不任其咎以至吳居厚行鐵冶之法于京東王子京行茶法於福建蹇周輔行鹽法于江西李稷陸師閔行茶法市易于西川劉定教保甲于河北民皆愁痛嗟怨比屋思亂賴陛下與先后起而捄之天下之民如解倒懸惟向來所斥逐之人窺伺事變妄意陛下不以修改法度為是如得至左右必進奸言萬一過聴而復用之臣恐國家自此陵遲不復振矣又言漢有天下四百年唐有天下三百年及其亡也皆由宦官同一軌轍葢與亂同事未有不亡者也漢自元帝任用石顯委以政事殺蕭望之周堪廢劉向等漢之基業壊于元帝唐自明皇使髙力士省决章奏宦官遂盛李林甫楊國忠皆自力士以進唐亡之禍基于開元熈寧元豐間李憲王中正宋用臣輩用事總兵權勢震灼中正兼幹四路口敇募兵州郡不敢違師徒凍餒死亡最多憲陳再舉之策致永樂摧陷用臣興土木之工無時休息㒺市井之㣲利為國斂怨此三人者雖加誅戮未足以謝百姓憲雖已亡而中正用臣尚在今召内臣十人而憲中正之子皆在其中二人既入則中正用臣必將復用臣所以敢極言之上曰所召内臣朕豈有意任用止欲各與差遣爾祖禹乃退十二月端明殿侍讀學士蘇軾乞外補出知定州時國事將變軾不得入辭既行上書言天下治亂出於下情之通塞至治之極小民皆能自通迨於大亂雖近臣不能自達陛下臨御九年除執政臺諫外未嘗與羣臣接今聴政之初當以通下情除壅蔽為急務臣日侍帷幄方當戍邊顧不得一見而行況疎逺小臣欲求自通難矣然臣不敢以不得對之故不效愚忠古之聖人將有為也必先處晦而觀明處靜而觀動則萬物之情畢陳于前陛下聖智絶人春秋鼎盛臣願虚心循理一切未有所為黙觀庶事之利害與羣臣之邪正以三年為期俟得其實然後應物而作使既作之後天下無恨陛下亦無悔由此觀之陛下之有為惟憂太蚤不患稍遲亦已明矣臣恐急進好利之臣輙勸陛下輕有改變故進此説敢望陛下留神社稷宗廟之福天下幸甚吕大防為山陵使甫出國門楊畏首叛大防上疏言神宗更法立制以垂萬世乞賜講求以成繼述之道即召對詢以先朝故臣孰可召用者畏遂列上章惇安燾吕惠卿鄧潤甫王安中李清臣等行義各加題品且言神宗所以建立法度之意與王安石學術之美乞召章惇為相帝深納之遂復章惇為資政殿學士吕惠卿為中大夫王中正復遙授團練使給事吳安詩不書惇錄黄中書舍人姚勔不草惠卿中正誥詞皆不聴劉安世極諌章惇等不可用貶出知成徳軍紹聖元年二月丁未以李清臣為中書侍郎鄧潤甫為尚書右丞潤甫首陳武王能廣文王之聲成王能嗣文武之道以開紹述故有是命范純仁以時用大臣皆從中出侍從臺諌亦多不由進擬乃言于帝曰陛下親政之初四方拭目以觀天下治亂實本於此舜舉臯陶湯舉伊尹不仁者逺縱未能如古人亦須極天下之選帝不納三月策進士于集英殿李清臣發策曰今復詞賦之選而士不知勸罷常平之官而農不加富可差可募之說雜而役法病或東或北之論異而河患滋賜土以柔逺也而羌夷之患未弭弛利以便民也而商賈之路不通夫可則因否則革惟當之為貴聖人亦何有心焉其意葢絀元祐之政也蘇轍諫曰伏見策題力詆近嵗行事有紹復熈寧元豐之意臣謂先帝設施葢有百世不可改者元祐以來上下奉行未嘗失墜至於事或失當何世無之父作於前子救於後前後相濟此則聖人之孝也漢武帝外事四夷内興宫室財用匱竭於是修鹽鐵𣙜酤均輸之政民不堪命幾至大亂昭帝委任霍光罷去煩苛漢室乃定光武顯宗以察為明以䜟決事上下恐懼人懐不安章帝深鑒其失代之寛厚愷悌之政後世稱焉本朝真宗天書章獻臨御攬大臣之議蔵之梓宫及仁宗聴政絶口不言英宗濮議朝廷洶洶者數年先帝寢之遂以安靜夫以漢昭章之賢與吾仁宗神宗之聖豈其薄於孝敬而輕事變易也哉陛下若輕變九年已行之事擢任屢嵗不用之人懐私忿而以先帝為詞大事去矣帝覽奏大怒曰安得以漢武比先帝轍下殿待罪衆莫敢救范純仁從容言曰武帝雄才大畧史無貶詞轍以比先帝非謗也陛下親事之始進退大臣不當如訶斥奴僕右丞鄧潤甫越次進曰先帝法度為司馬光蘇轍壊盡純仁曰不然法本無弊弊則當改帝曰人謂秦皇漢武純仁曰轍所論事與時也非人也帝為之少霽轍平日與純仁多異至是乃服曰公佛地位中人也轍竟落職知汝州及進士對策考官第主元祐者居上禮部侍郎楊畏覆考乃悉下之而以主熈豐者置前列自是紹述之論大興國是遂變矣以曾布為翰林學士承㫖初司馬光諭布增損役法布辭曰免役一事法令纎悉皆出已手遽自改易義不可為遂以户部尚書出知太原府至是徙江寧過京留拜承㫖夏四月以張商英為右正言帝初即位稍更新法之不便于民者商英時為開封推官上書言三年無改於父之道可謂孝矣今先帝陵土未乾即議變更得為孝乎復屢詣執政求進且為諛詞貽蘇軾求入臺吕公著聞之不悦出為河東提刑至是召為右正言商英在外乆積憾元祐大臣不用已因極力攻之上䟽言神宗盛徳大業跨絶今古而司馬光吕公著劉摰吕大防援引朋儔敢行譏議凡詳定局之建明中書之勘㑹户部之行遣言官之論列詞臣之誥命無非指摘抉揚鄙薄嗤笑剪除陛下羽翼於内擊逐股肱於外天下之勢岌岌殆矣今天日清明誅賞未正乞下禁省檢索前後章牘付臣等看詳簽掲以上望陛下與大臣斟酌可否商英又論司馬光文彦博奸邪負國至比宣仁為吕武全臺御史趙挺之等復㑹劾蘇軾草麻有民亦勞止之語以為誹謗先帝黜軾知英州范純仁諫曰熈寧法度皆惠卿附㑹王安石建議不副先帝愛民求治之意至垂簾之際始用言者特行貶竄今已八年矣言者多當時御史何故畏避不即納忠今乃有是奏豈非觀望耶帝不聴癸丑白虹貫日曾布上疏請復先帝政事且乞改元以順天意帝從之詔改元祐九年為紹聖元年於是天下曉然知帝意所向矣罷翰林院學士范祖禹時帝欲相章惇祖禹力言惇不可用遂罷壬戌以章惇為尚書左僕射兼門下侍郎時帝有紹復熈豐之志首起惇為相於是專以紹述為國是遂引其黨蔡卞林希黄履來之邵張商英周秩翟思上官均等居要地任言責協謀報復惇之被召也通判陳瓘從衆道謁之惇聞瓘名邀與同舟詢當世之務瓘因問惇曰天子待公為政敢問何先惇曰司馬光姦邪所當先辨勢無急於此瓘曰公誤矣果爾將失天下之望惇厲聲曰光不務纘述而大改成緒誤國如此非奸邪而何瓘曰不察其心而疑其迹則不為無罪若指為姦邪又復改作則誤國益甚矣為今之計惟消朋黨持中道庶可以救弊又曰譬如此舟移置之左則左重移置之右則右重俱不可也熈寧未必全是元祐未必全非惇不悦帝既相惇范純仁請去益力乃以觀文殿大學士出知穎昌府召蔡京為户部尚書以林希為中書舎人章惇嘗言元祐初司馬光作相用蘇軾掌制所以能鼓動四方安得斯人而用之或曰林希可㑹希赴成都過闕惇欲使典書誥逞毒於元祐諸臣且許以為執政希乆不得志請甘心焉凡元祐名臣貶黜之制皆希為之極其醜詆至以老姦擅國之語陰斥宣仁讀者無不憤歎一日草制罷擲筆於地曰壊名節矣丁卯章惇請復行免役法差雇兩法置司講議乆而不決蔡京謂惇曰取熈寧成法施行之耳何以講為惇然之雇役遂定初司馬光盡革熈豐之政而罷雇役復差役獨於人情未協至是京惇相倚遂執以為詞復行免役法識者愈見其姦戊辰以蔡卞為國史修撰元祐中史官范祖禹等修神宗實錄盡書王安石之過以明先帝之聖蔡卞安石壻也上疏言先帝盛徳大業卓然出千古之上而實錄所紀類疑似不根乞重行刋定詔從之卞遂從安石從子防所求安石舊作日錄盡改正史閏月壬申復以陸師閔等為諸提舉常平官五月以黄履為御史中丞元豐末履為中丞與蔡確章惇邢恕相交結每惇確有所嫌惡則使恕道風㫖於履履即排撃之時謂之四凶為劉安世所論而出至是惇復引用俾報復仇怨元祐舊臣無一得免者矣秋七月丁巳追奪司馬光吕公著等贈諡貶吕大防劉摰蘇轍梁燾等官詔諭天下時臺諌黄履周秩張商英上官均來之邵翟思劉拯井亮采等交章論司馬光等變更先朝之法畔道逆理章惇蔡卞請發光公著塜斵棺暴尸帝問許將將對曰此非盛徳事也帝乃止於是追奪光公著贈諡仆所立碑奪王巖叟贈官貶大防為秘書監摰為光祿卿轍為少府監並分司南京初李清臣兾為相首倡紹述之説以計去蘇轍范純仁亟復青苗免役法及章惇至心甚不悦復與為異惇既貶司馬光等又籍文彦博以下三十人將悉竄嶺表清臣進曰更先帝法度不能無過然皆累朝元老若從惇言必大駭物聴帝乃下詔曰大臣朋黨司馬光以下各以輕重議罰其布告天下初朋黨論起帝曰梁燾每起中正之論其開陳排擊盡出公議朕皆記之又曰蘇頌知君臣之義無輕議也由是頌獲免而燾止謫提舉舒州靈仙觀摰語諸子曰上用章惇吾且得罪若惇顧國事不遷怒百姓但謫吾曹死無所恨正慮意在報復奈天下何八月罷廣惠倉復免行錢冬十月以吕惠卿知大名府監察御史常安民言北都重鎮而除惠卿惠卿賦性深險背王安石者其事君可知今將過闕必言先帝而泣感動陛下希望留京矣帝納之及惠卿至京請對見帝果言先帝事而泣帝正色不答計卒不施而去時論快之十一月壬子特追復蔡確觀文殿大學士十二月蔡卞進重修神宗實錄於是范祖禹及趙彦若黄庭堅等坐詆誣降官安置永豐黔州遷卞為翰林學士初禮部侍郎陸佃預修實錄數與祖禹等爭辨大要言王安石多有是處庭堅曰如公言葢佞史也佃曰盡用君意豈非謗書乎至是佃亦落職言者又以吕大防監修神宗實錄徙安州居住二年冬十月貶監察御史常安民時蔡京深結中官裴彦臣安民因論之謂京姦足以惑衆辨足以飾非巧足以移奪人主之視聴力足以顛倒天下之是非内結中官外連朝士一不附己則誣以黨於元祐非先帝法必擠之而後已今在朝之臣京黨過半陛下不可不早覺悟而逐之他日羽翼成就悔無及矣是時京之姦尚隠人多未測獨安民首發之又言今大臣為紹述之説皆借此名以報復私怨朋附之流遂從而和之張商英在元祐時上吕公著詩求進諛佞無恥近乃乞毁司馬光吕公著神道碑周秩為博士親定光諡為文正近乃乞斵棺鞭尸陛下察此輩之言果出於公論乎章疏前後至數十百上度終不能囘遂乞外帝慰勉而已至是復論章惇顓國植黨乞収主柄而抑其權反覆曲折言之不置惇遣所親信語之曰君本以文學聞于時奈何以言語自任與人為怨少安靜當以左右相處安民正色斥之曰爾乃為時相游説耶惇益怒安民又言曾布之姦於是惇布比而排之取所貽吕公著書白帝以為比帝于漢靈帝怒安民不辨賴安燾救得免至是御史董敦逸論安民黨于蘇軾兄弟遂出為滁州監酒税十一月安燾罷時章惇用白帖貶謫元祐臣僚燾言于帝帝疑之鄭雍謂惇曰王安石作相嘗用白帖行事惇大喜取其案牘懐之以白帝燾言不行惇怨燾言燾與常安民表裏出知鄭州時吕大防等竄居逺州㑹明堂赦章惇豫言此數十人當終身勿徙范純仁聞之憂憤欲齋戒上疏申理之所親勸其勿觸怒萬一逺斥非髙年所宜純仁曰事至於此無一人敢言若上心遂囘所繫大矣如其不然死亦何憾因上言大防等所犯亦因持心失恕好惡任情違老氏好還之戒忽孟軻反爾之言然牛李之黨禍數十年淪胥不解豈可尚遵前軌即今大防等年老疾病不習水土炎荒非乆處之地又憂虞不測何以自存臣曾與大防等共事多被排斥陛下之所親見臣之激切止是仰報聖徳向來章惇吕惠卿雖為貶謫不出里居今趙彦若已死貶所願陛下㫁自淵衷將大防等原放疏奏章惇大怒遂落觀文殿大學士徙知隨州四年春正月李清臣罷知河南府史臣曰哲宗親政之初見慮未定范吕諸賢在廷左右弼謨俾日邇忠讜絶囘遹以端其志向元祐之治業庶可守也而清臣怙才躁進陰覬柄用首發紹述之說以亂國是羣姦嗣之衡決莫障遂重為縉紳之禍二月己未追貶司馬光吕公著等官三省言司馬光等倡為姦謀詆毁先帝變易法度罪惡至深當時凶黨雖已死及告老亦宜薄示懲責遂追貶司馬光為清逺軍節度副使吕公著為建武軍節度副使王巖叟為雷州别駕奪趙瞻傅堯俞贈諡追韓維到任及孫固范百祿胡宗愈等遺表恩未幾復追貶光朱崖軍司户公著昌化軍司户癸未流吕大防劉摰蘇轍梁燾范純仁于嶺南貶韓維等三十人官大防之徙安州也其兄大忠自涇原入朝帝訪大防安否且曰執政欲遷諸嶺南朕獨令處安陸為朕寄聲問之大防朴直為人所賣二三年可復見也大忠泄其語于章惇惇繩之益力會侍御史來之邵言司馬光畔道逆理典刑未正鬼得而誅獨劉摰尚存實天以遺陛下於是三省言吕大防等為臣不忠罪與司馬光等不異頃朝廷雖嘗懲責而罰不稱愆生死異罪無以垂示萬世遂貶大防舒州摰鼎州團練副使轍化州燾雷州别駕純仁武安軍節度副使安置于循新雷化永五州劉奉世光祿少卿郴州居住尋安置栁州韓維落職致仕再謫均州安置王覿韓川孫升吕陶范純禮趙君錫馬黙顧臨范純粹孔武仲王欽臣吕希哲吕希純吕希績姚緬吳安詩秦觀十七人通隨峽衡蔡亳單饒均池信和金光衢連横等諸州居住王攽落職致仕孔平仲落職知衡州張耒眺補之賈易並監當官朱光庭孫覺趙卨李之純杜純李周並追奪官秩復追貶孔文仲李周為别駕中書舍人葉濤當制文極醜詆聞者切齒先是左司諌張商英上言願陛下無忘元祐時章惇無忘汝州時安燾無忘許昌時李清臣曾布無忘河陽時以激怒之由此諸賢皆不免純仁時因疾失明聞命怡然就道或謂近名純仁曰七十之年兩目俱喪萬里之行豈其欲哉但區區之愛君有懐不盡若避好名之嫌則無為善之路矣時韓維謫均州其子訴維執政日與司馬光不合得免行純仁之子欲以純仁與光議役法不同為請冀得免行純仁曰吾用君實薦以致宰相昔同朝論事不合則可汝輩以為今日之言則不可也有愧心而生不若無愧心而死其子乃止每戒子弟不可小有不平聞諸子怨章惇必怒止之及在道舟覆于江純仁衣盡濕顧諸子曰此豈章惇為之哉甲申貶太師致仕文彦博為太子少保先是左司諌張商英嘗言彦博背國負恩朋附司馬光故貶甲辰蘇軾謫授瓊州别駕移昌化軍安置范祖禹移賓州安置劉安世移髙州安置章惇議遣吕升卿董必察訪嶺南將盡殺流人帝曰朕遵祖宗遺志未嘗殺戮大臣其釋勿治惇志不快於是中書舍人蹇序辰上疏言朝廷前日正司馬光等姦惡明其罪罰以告中外唯變亂典刑改廢法度訕讟宗廟睥睨兩宫觀事考言實狀章著其章疏案牘散在有司若不彚緝而蔵之嵗乆必致淪棄願悉討姦臣所言所行選官編類人為一帙置之二府以示天下後世之大戒章惇蔡卞請即命序辰及直學士院徐鐸編類凡司馬光等一時施行文書攟拾附著􅊏悉不遺凡一百四十三帙上之由是縉紳之士無得脱禍者矣鄒浩言初㫖但分兩等謂語及先帝并語言過差而已而今所施行混然莫辨以其近似難分之迹而典刑輕重隨以上下是乃陛下之威福操柄下移於近臣願加省察以為來事之鑑卞黨薛昻林自又乞毁司馬光資治通鑑板太學博士陳瓘因策士引神宗所製序文以問昻自議沮己亥吕大防將赴舒州卒于䖍州之信豐大防為相用人各盡其能不事邊幅而天下臻於富庶竟以貶死天下惜之上聞之曰大防何以至䖍州及請歸葬即許之一時議者謂痛貶元祐黨人皆非上意也十一月癸酉貶劉奉世于栁州安置程頥于涪州頥時放歸田里帝一日與輔臣語及元祐政事曰程頥妄自尊大在經筵多不遜於是言者論頥與司馬光同惡相濟遂削籍竄涪州頥在涪與門人講學不輟周易傳亦在涪所著也復立市易務元符元年六月戊寅朔改元甲午蔡京等上常平免役法秋七月再竄范祖禹于化州安置劉安世于梅州初章惇怨范祖禹劉安世尤深必欲置諸死地至是諷蔡京併陷二人安世至貶所惇陰令殺陳衍使者過梅脇安世自裁使者不忍而止惇又擢土豪為轉運判官使殺之判官承意疾馳且至家人號泣不食安世飲食起居如平時至夜半其人忽嘔血而死安世獲免祖禹尋卒祖禹在經筵勸講論諌常數十萬言開陳治道辨釋事宜平易明白洞見底蘊雖賈誼陸䞇不能過也二年八月癸酉章惇等進新修敇令式惇讀於帝前間有元豐所無而用元祐敇令修立者帝曰元祐亦有可取者乎惇等對曰取其善者九月癸卯命御史㸃檢三省樞密院並依元豐舊制閏月置看詳訴理局安惇言陛下未親政時姦臣置訴理所凡得罪熈豐之間者咸為除雪歸怨先朝収恩私室乞取公案看詳從初加罪之意得依㫁施行蔡卞勸章惇置局命中書舎人蹇序辰及安惇看詳由是重得罪者八百三十家士大夫或千里㑹逮天下怨疾有二蔡二惇之謠宋史紀事本末卷十
