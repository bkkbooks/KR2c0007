body:
  text: 宋史紀事夲末卷七明馮琦原編陳邦瞻增輯英宗之立仁宗景祐二年春二月育宗室子宗實于宫中宗實太宗之曾孫商王元份之孫江寧節度使允讓之子也帝未有儲嗣取入宫命皇后撫鞠之生四年矣嘉祐元年五月罷知諫院范鎮先是帝暴疾宰相文彥博因請帝建儲帝許之㑹疾瘳而止至是鎮奮然曰天下事尚有大於此者乎即上疏曰置諫官者為宗廟社稷計也諫官而不以宗廟社稷計事陛下是愛死嗜利之人臣不為也方陛下不豫海內皇皇莫知所為陛下獨以祖宗後裔為念是為宗社之慮至深且明也昔太祖舍其子而立太宗天下之大公也真宗以周王薨養宗子于宫中天下之大慮也願以太祖之心行真宗故事拔近屬之尤賢者優其禮秩置之左右而試以政事以繫億兆人心俟有聖嗣復遣還邸章上不報文彥博乃曰奈何效希名干進之人鎮貽書曰比天象見變當有急兵鎮義當死職不可死亂兵之下此乃鎮擇死之時尚何顧希名干進之嫌哉又上言陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣皆設辭拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原大臣畏避之意恐行之而陛下中變耳中變之禍不過一死國本不立萬一有如天象所告急兵之變死且有罪其為計亦已踈矣願以臣章示大臣使其自擇死所聞者股栗除兼侍御史知雜事鎮以言不從固辭彥博諭之曰今間言已入為之甚難鎮曰事當論其是非不當問其難易諸公謂今日難於前日安知異日不難於今日乎凡見帝靣陳者三因泣下帝亦泣謂曰朕知卿忠卿言是也當更俟二三年鎮前後章凡十九上待命百餘日鬚髮皆白朝廷知不可奪乃罷知諫院改紏察在京刑獄時并州通判司馬光亦言建儲事且勸鎮以死爭之翰林學士歐陽修上言陛下臨御三十餘年而儲宮未建此久闕之典也漢文帝即位羣臣請立太子羣臣不自疑而敢請文帝亦不疑臣有二心後唐明宗尤惡人言太子事然文帝立太子之後享國長久為漢太宗明宗儲嗣不早定而秦王以窺覬陷於大禍後唐遂亂陛下何疑而久不定乎殿中侍御史包拯呂景初趙抃知制誥吳奎劉敞等皆上疏力請於是宰輔文彥博富弼王堯臣等相繼勸帝早定大計皆不聽三年六月以韓琦同平章事時羣臣皆以建儲為言帝依違不決琦既相乘間進曰皇嗣者天下安危之所繫自昔禍亂之起皆由䇿不早定陛下何不擇宗室之賢以為宗廟社稷計帝曰後宮將有就館者姑待之已而又生女琦懷漢書孔光傳以進曰成帝無嗣立弟之子彼中材之主猶能如是况陛下乎願以太祖之心為心則無不可者帝不答以包拯為御史中丞拯言東宮虛位日久天下以為憂夫萬物皆有根本而太子者天下之根本也根本不立禍孰大焉帝曰卿欲誰立拯曰臣非才備位所以乞豫建太子者為宗廟萬世計爾陛下問臣欲誰立是疑臣也臣年七十且無子非邀後福者帝喜曰徐當議之四年十一月汝南王允讓卒追封濮王允讓天資渾厚內寬外莊喜怒不見于色知大宗正寺二十年宗子有好學者勉進之以善若不率教則勸戒之至不變始正其罪故皆畏服及卒諡安懿以其子宗實育宮中故恤典有加六年六月以司馬光知諫院光入對首言臣昔通判并州所言三章願陛下果斷力行帝沉思久之曰得非欲選宗室為繼嗣乎此忠臣之言但人不敢及耳光對曰臣言此自謂必死不意陛下開納帝曰此何害自古皆有之十月壬辰起復宗實知宗正寺初帝既連失三王自至和中得疾不能御殿中外惴恐臣下爭以立嗣固根本為言包拯范鎮尤激切積五六嵗依違末之行言者亦稍怠先年韓琦初入相嘗乘間言之及懷孔光傳以進帝不答又與曾公亮張升歐陽修極言之至是司馬光上疏曰向者臣進豫建太子之說意謂即行今寂無所聞此必有小人言陛下春秋鼎盛何遽為此不祥之事小人無逺慮特欲倉卒之際援立其所厚善者耳定䇿國老門生天子之禍可勝言哉帝大感動曰送中書光見韓琦等曰諸公不及今定議異日禁中夜半出寸紙以某人為嗣則天下莫敢違琦等拱手曰敢不盡力時知江州呂誨亦上疏言之及琦入對以光誨二疏進讀帝遂曰朕有意久矣誰可者琦皇恐對曰此非臣輩所可議當出自聖擇帝曰宮中嘗養二子小者甚純近不慧大者可也琦請其名帝曰宗實琦等遂力贊之議乃定宗實天性篤孝好讀書不為燕嬉褻慢服御儉素如儒者時居濮王喪乃起復知宗正寺琦曰事若行不可中止陛下斷自不疑乞內中批出帝意不欲宮人知曰只中書行足矣命下宗實固辭乞終喪帝復以問琦琦對曰陛下既知其賢而選之今不敢遽當蓋器識逺大所以為賢也願固起之帝曰然凡十八章而後許之七年八月己卯立宗實為皇子賜名曙九月乙巳朔進封皇子曙巨鹿郡公宗實既終喪韓琦言宗正之命初出外人皆知必為皇子不若遂正其名帝從之琦至中書召翰林學士王圭草詔圭曰此大事也非靣受㫖不可明日請對曰海內望此舉久矣果出自聖意乎帝曰朕意决矣圭再拜賀始退而草詔歐陽修聞之歎曰王圭真學士也詔下宗實復稱疾固辭章十餘上記室周孟陽請其故宗實曰非敢徼福以避禍也孟陽曰今已有此迹設固辭不受中人别有所奉遂得燕安無患乎宗實始悟司馬光言於帝曰皇子辭不資之富至於旬月其賢於人逺矣然父召無諾君命召不俟駕願以臣子大義責之宜必入帝從之宗實始受命將入宮戒其舍人曰謹守吾舍上有適嗣吾歸矣因肩輿赴召良賤不滿三十人行李蕭然唯書數厨而已中外相賀八年春二月癸未帝不豫丙戌中書樞密奏事于福寧殿之西閣三月辛未帝崩于福寧殿年五十四遺制皇子即皇帝位山陵制度務從儉約於是皇后悉斂諸門鑰置於前黎明召皇子入嗣位皇子驚再言曰曙不敢為因反走韓琦等共掖留之夏四月壬申朔皇子即位欲亮隂三年命韓琦攝冢宰宰臣不可乃止乙亥帝有疾丙子尊皇后曰皇太后巳卯詔請皇太后權同處分軍國事后乃御內東門小殿垂簾宰臣日奏事后性慈儉頗涉經史多援以決事中外章奏日數十上一一能記綱要有疑未決者則曰公輩更議之未嘗出巳意曹氏及左右臣僕毫分不假借宮省肅然庚子立髙氏為皇后后侍中瓊之曾孫母曹氏太后姊也故少育于宮中與帝同年生又俱撫鞠於太后仁宗嘗曰異日必以為配既長出宮婚于濮邸封京兆郡君生三子至是冊為皇后秋七月帝疾瘳初帝疾甚舉措或改常度遇宦者尤少恩左右多不悅乃共為讒間兩宮遂成隙內外洶懼知諫院呂誨上書兩宮開陳大義詞㫖深切多人所難言者然兩宮猶未釋然一日韓琦歐陽修奏事簾前太后嗚咽流涕且道所以琦曰此病故爾疾已必不然子疾母可不容之乎后意不解修進曰太后事先帝數十年仁德著于天下昔溫成之寵太后處之裕如今母子間反不能容邪后意稍和修復曰先帝在位久德澤在人故一日晏駕天下奉戴嗣君無敢異同者今太后一婦人臣等五六書生耳非先帝遺意天下誰肯聽從后默然久之琦進曰臣等在外聖躬若失調護太后不得辭其責后驚曰是何言我心更切也同列聞者莫不流汗後數日琦獨見帝帝曰太后待我少恩琦對曰自古聖帝明王不為少矣獨稱舜為大孝豈其餘盡不孝哉父母慈而子孝此常事不足道惟父母不慈而子不失孝乃為可稱但恐陛下事之未至耳父母豈有不慈者哉帝大感悟帝自六月不御殿至是月壬子初御紫宸殿見百官琦因請乘輿禱雨具素服以出人情大安冬十月甲午葬仁宗于永昭陵十二月巳巳開經筵翰林學士劉敞進讀史記至堯授舜以天下拱而言曰舜至側微堯禪之以位天地享之百姓戴之非有他道惟孝友之德光於上下耳帝悚然改容太后聞之亦大喜兩宮之疑漸釋英宗治平元年春正月帝疾大瘳韓琦欲太后撤簾還政乃取十餘事禀帝帝裁決悉當琦即詣太后覆奏后每事稱善琦因白后求去后曰相公不可去我當居深宮耳却每日在此甚非得已琦曰前代之后賢如馬鄧不免顧戀權勢今太后便能復辟誠馬鄧之所不及未審決取何日撤簾太后遂起琦即命撤簾簾既落猶於御屏後見太后衣也帝親政加琦尚書右僕射呂中曰當國家危疑之日大臣以能任事者一曰德望二曰才智有才智而無德望以鎮之則未足以服天下之心有德望而無才智以充之則未足以辦天下之事故曰可以托六尺之孤可以寄百里之命臨大節而不可奪韓魏公蓋自慶厯嘉祐之時可屬大事其德望服人心久矣至於處事應變胸中才智又足以運用天下此其所以正英宗之始歟在真宗之初則有呂端在仁宗之初則有王曾此皆安國家定社稷之名臣也丙辰上皇太后宮名曰慈夀秋八月內侍都知任守忠竄蘄州初章獻太后臨朝守忠與都知江德明等交通請謁權寵過盛纍遷宣政使入內都知仁宗以未有儲嗣屬意于帝守忠建議欲援立昏弱以邀大利及帝即位又乘帝疾交搆兩宮知諫院司馬光論守忠離間之罪國之大賊乞斬于都市呂誨亦上疏論之帝納其言明日韓琦出空頭敇一道歐陽修已僉趙槩難之修曰第書之韓公必自有說既而琦坐政事堂召守忠立庭下曰汝罪當死遂責蘄州安置取空頭敕填與之即日押行琦意以為少緩則中變也其黨史昭錫等悉竄南方中外快之二年二月罷三司使蔡襄帝自濮邸立為皇子聞近臣中有異議人疑為襄及即位數問襄何如人韓琦等為救解帝意不釋襄請罷出知杭州秋七月富弼罷嘉祐中韓琦與弼同相或中書有疑事往往與樞密謀之自弼為樞密使非得㫖合議者琦未嘗詢弼弼不懌及太后還政弼大驚曰弼備位輔佐他事固不可預聞此事韓公獨不能共之邪或以咎琦琦曰此事當時出太后意安可顯言于衆弼愈不懌帝親政加弼户部尚書弼辭曰制詞取嘉祐中嘗議建儲推恩此特絲髮之勞何足加賞仁宗太后於陛下有天地之恩尚未聞所以為報可謂倒置再奏不聽乃受至是以足疾力求解政章二十餘上遂以使相鄭國公判揚州未幾徙判汝州以文彥博為樞密使彥博自河南入覲帝曰朕之立卿之功也彥博悚然對曰陛下入繼大統乃先帝意皇太后協贊之力臣何功之有且其時臣方在外皆韓琦等承聖志受顧命臣無預焉因避謝不敢當帝曰暫煩卿西行即召還矣乃改判永興軍尋有是召刺義勇英宗治平元年十一月刺陜西民為義勇軍時韓琦言三代漢唐以來皆籍民為兵故其數雖多而贍養至薄所以維制萬㝢而威服四海非近所畜冗兵可及也唐制府兵最為近古天寶以後廢不能復因循至于五代廣募長征之兵故困天下而不能給今之義勇河北幾十五萬河東幾八萬勇悍純實生于天性而有物力資産父母妻子之所係若稍加簡練亦唐之府兵也陜西當西事之初亦嘗三丁選一丁為弓手其後刺為保捷正軍及夏國納欵朝廷揀放于今所存者無幾河東河北陜西三路當西北控禦之地事當一體今若於陜西諸州亦㸃義勇止刺手背則人知不復刺面可無驚駭或令永興河中鳳翔三府先刺觀聽既安然後次及諸郡一時不無少擾而終成長利矣詔從之乃命徐億等往籍陜西主戶三丁之一刺之凡十五萬六千餘人人賜錢二千民情驚擾而紀律踈略不可用知諫院司馬光上疏曰臣傳聞朝廷差陜西提㸃刑獄陳安石於本路人户三丁之內刺一丁充義勇不知虛實若果如此大為非便臣切意議者必以為河北河東皆有義勇而陜西獨無近因趙諒祚寇邊故欲廣籍兵民以備緩急使之捍禦也臣伏見康定慶厯之際趙元昊叛亂王師屢敗死者動以萬數國家乏少正軍遂籍陜西之民三丁之內選一丁以為鄉弓手尋又刺充保捷指揮差於㳂邊戍守當是之時閭里之間惶擾愁怨不可勝言耕桑之民不習戰鬭官中既費衣糧私家又須供送骨肉流離田園蕩盡陜西之民比屋凋􅋊今二十餘年不復舊者皆以此也其謀䇿之失亦足以為戒矣是時河北河東邊事稍緩故朝廷但籍其民以充義勇更不刺為軍雖比之陜西保捷為害差小然國家何嘗使之捍禦戎狄得其分毫之益乎今議者但怪陜西獨無義勇不知陜西之民三丁之內已有一丁充保捷矣自西事以來陜西困於科調比於景祐以前民减耗三分之二加之近嵗屢遭凶歉今秋方獲小稔且望息肩又值邊鄙有警衆心已搖若更聞此詔下必致驚擾人人愁苦一如康定慶厯之時是賊寇未來而先自困敝也况即日陜西正軍甚多不至闕乏何為遽作此有害無益之事以循覆車之轍也伏望朝廷審察利害特罷此事誠一方之大幸連上六疏力言不聼乃至中書與韓琦辨琦曰兵貴先聲諒祚方桀驁使驟聞益兵二十萬豈不震懾光曰兵貴先聲為其無實也獨可欺於一日之間耳今吾雖益兵實不可用不過十日彼將知其詳尚何懼琦曰君但見慶厯間鄉兵刺為保捷憂今復然已降敕與民約永不充軍遣戌邊矣光曰朝廷嘗失信於民未敢以為然琦曰吾在此君無憂光曰公長在此地可也異日他人當位用以運糧戍邊反掌間耳琦不從竟為陜西之患初琦嘗曰養兵雖非古然亦自有利處議者但謂不如漢唐調兵於民獨不見唐杜甫石壕吏一篇調兵於民其弊乃如此後世既籍强悍無賴者以為兵良民雖不免養兵之費而免父子兄弟夫婦生離死别之苦乃知養兵之制實萬世之仁也至是陜西義勇之制實出於琦雖光六疏極言其不便竟不為止濮議英宗治平二年夏四月戊戌詔議崇奉濮王典禮初知諫院司馬光以帝必將追隆所生嘗因奏事言漢宣帝為孝昭後終不追尊衛太子史皇孫光武上繼元帝亦不追尊巨鹿南頓君此萬世法也既而韓琦等言禮不忘本濮安懿王德盛位隆所宜尊禮請下有司議及夫人王氏韓氏仙游縣君任氏合行典禮用宜稱情帝令須大祥後議之至是詔禮官與待制以上議翰林學士王圭等相視莫敢先發司馬光獨奮筆立議略云為人後者為之子不得顧私親若恭愛之心分於彼則不得專於此秦漢以來帝王有自旁支入承大統者或推尊其父母以為帝后皆見非當時取譏後世臣等不敢引以為聖朝法况前代入繼者多宮車晏駕之後援立之䇿或出臣下非如仁宗皇帝年齡未衰深惟宗廟之重於宗室中簡推聖明授以大業陛下親為先帝之子然後繼體承祧光有天下濮安懿王雖於陛下有天性之親顧復之恩然陛下所以負扆端冕子孫萬世相承皆先帝德也臣等竊以為濮王宜凖先朝封贈期親尊屬故事尊以髙官大國譙國襄國仙遊並封太夫人考之古今為宜稱於是圭即命吏具以光手稿為案議上中書奏圭等所議未見詳定濮王當稱何親名與不名圭等議濮王於仁宗為兄於皇帝宜稱皇伯而不名歐陽修引喪服大記以為為人後者為其父母降服三年為期而不沒父母之名以見服可降而名不可沒也若本生之親改稱皇伯厯考前世皆無典據進封大國則又禮無加爵之道請下尚書集三省御史臺諫議而太后手詔詰責執政帝乃詔曰如聞集議不一權宜罷之令有司博求典故以聞三年春正月濮王崇奉之議久而未定侍御史呂誨范純仁監察御史呂大防引義固爭以為王圭議是乞從之章七上不報遂劾韓琦專權導諛罪曰昭陵之土未乾遂欲追崇濮王使陛下厚所生而薄所繼隆小宗而絶大宗又共劾歐陽修首開邪議以枉道說人主以近利負先帝陷陛下於過舉而韓琦曾公亮趙槩附㑹不正乞皆貶黜不報時中書亦上言請明詔中外以皇伯無稽决不可稱今所欲定者正名號耳至於立廟京師干紀亂統之事皆非朝廷本意帝意不能不嚮中書然未即下詔也既而皇太后手詔中書宜尊濮王為皇夫人為后皇帝稱親帝下詔謙讓不受尊號但稱親即園立廟以王子宗朴為濮國公奉祠事仍令臣民避王諱時論以為太后之追崇及帝之謙讓皆中書之謀也於是呂誨等以所論奏不見聽用􅌳納御史勑誥家居待罪帝命閣門以誥還之誨力辭臺職且言於輔臣勢兩立帝以問執政琦修等對曰御史以為理難竝立若臣等有罪當留御史帝猶豫久之命出御史乃下遷誨知蘄州純仁通判安州大防知休寧縣時趙鼎趙瞻傅堯俞使契丹還以嘗與呂誨言濮王事即上疏乞同貶乃出鼎通判淄州瞻通判汾州帝眷注堯俞獨進除侍御史堯俞曰誨等已逐臣義不當止帝不得已命知和州知制誥韓維及司馬光皆上疏乞留誨等不報遂請與俱貶亦不許侍讀呂公著言陛下即位以來納諌之風未彰而屢詘言官何以風天下帝不聽公著乞補外乃出知蔡州誨等既出濮議亦寢程頥曰言事之臣知稱親之非而不明尊崇之禮使濮王與諸父等若尊稱為皇伯父濮國大王則在濮王極尊崇之道於仁宗無嫌二之生矣歐陽修為後或問上篇曰為人後者不絶其所生之親可乎曰可矣古之人不絶也而降之何以知之曰於經見之何謂降而不絶曰降者所以不絶若絶則不待降也所謂降而不絶者禮為人後者降其所生父母三年之服以為朞而不改其父母之名者是也問者曰今之議者以謂為人後者必使視其所生若未嘗生巳者一以所後父為尊卑踈戚若於所後父為兄則以為伯父為弟則以為叔父如此則如之何余曰吾不知其何所稽也茍如其說沒其父母之名而一以所後父為尊卑踈戚則宗從世數各隨其逺近輕重自有服矣聖人何必特為制降服乎此余所謂若絶則不待降者也稽之聖人則不然昔者聖人之制禮也為人後者於其父母不以所後之父尊卑踈戚為别也直自於其父子之間為降殺爾親不可降降者降其外物爾喪服是也其必降者示有所屈也以其承大宗之重尊祖而為之屈爾屈於此以伸於彼也生莫重於父母而為之屈者以見承大宗者亦重也所以勉為人後者知所承之重以專任人之事也此以義制者也父子之道天性也臨之以大義有可以降其外物而本之於至仁則不可絶其天性絶人道而滅天理此不仁者之或不為也故聖人之於制服也為降三年以為朞而不沒其父母之名以著於六經曰為人後者為其父母報以見服可降而父母之名不可沒也此所謂降而不絶者以仁存也夫事有不能兩得勢有不能兩遂為子於此則不能為子於彼矣此里巷之人所共知也故其言曰為人後者為之子此一切之論非聖人之言也是漢儒之說也乃衆人之所能道也質諸禮則不然方子夏之傳喪服也茍如衆人一切之論則不待多言也直為一言曰為人後者為之子則自然視其父母絶若未嘗生己者矣自然一以所後父為尊卑踈戚矣奈何彼子夏者獨不然也其於傳經也委曲而詳言之曰視所後之某親某親則若子若子者若所後父之真子以自處而視其族親一以所後父為尊卑踈戚也故曰為所後者之祖父母妻妻之父母昆弟昆弟之子若子猶嫌其未備也又曰為所後者之兄弟之子若子其言詳矣獨於其所生父母不然而别自為服曰為其父母報蓋於其所生父母不使若為所後者之真子者以謂遂若所後者之真子以自處則視其所生如未嘗生己者矣其絶之不已甚乎此人情之所不忍者聖人亦所不為也今議者以其所生於所後為兄者遂以為伯父則是若所後者之真子以自處矣為伯父則自有服不得為齊衰期矣亦不得云為其父母報矣凡見於經而子夏之所區區分别者皆不取而又忍為人情之所不忍者吾不知其何所稽也此大義也不用禮經而用無稽之說可乎不可也問者曰古之人皆不絶其所生而今人何以不然曰是何言歟今之人亦皆然也而又有加於古焉今開寶禮及五服圖乃國家之典禮也皆曰為人後者為其所生父母齊衰朞服雖降矣必為正服者示父母之道在也為所後父斬衰三年服雖重矣必為義服者示以義制也而律令之文亦同五服者皆不改其父母之名質於禮經皆合無少異而五服之圖又加以心喪三年以謂三年者父母之喪也雖以為人後之故降其服於身猶使行其父母之喪於其心示於所生之恩不得絶於心也則今人之為禮比於古人又有加焉何謂今人之不然也下篇曰子不能絶其所生見於經見於通禮見於五服之圖見於律見於令其文則明矣其所以不絶之意如之何曰聖人以人情而制禮者也問者曰事有不能兩得勢有不能兩遂為子於此則不得為子於彼此豈非人情乎曰是衆人之論也是不知仁義者也聖人之於人情也一本於仁義故能兩得而兩遂此所以異乎衆人而為聖人也所以貴乎聖人而為衆人法也父子之道正也所謂天性之至者仁之道也為人後者權也權而適宜者義之制也恩莫重於所生義莫重於所後仁與義二者常相為用而未嘗相害也故人情莫厚於其親抑而降其外物者迫於大義也降而不絶於其心者存乎至仁也抑而降則仁不害乎義降而不絶則義不害乎仁此聖人能以仁義而相為用也彼衆人者不然也其為言曰不兩得者是仁則不義義則不仁矣夫所謂仁義者果若是乎故曰不知仁義者衆人也嗚呼聖人之以人情而制禮也順適其性而為之節文爾有所强焉不為也有所拂焉不為也况欲反而易之其可得乎今謂為人後者必絶其所生之愛豈止强其所難而拂其欲也是直欲反其天性而易之曰爾所厚者為我絶之易爾之厚於彼者一以厚於此是豈可以强乎夫父母猶天地其大恩至愛無以加者以其生我也今苟以為人後之故一旦反視若未嘗生我者其絶之固已甚矣使其真絶之歟是非人情也迫於義而絶之歟則是仁義者教人為僞也是故聖人知其無一可也以謂進承人之重而不害於仁退得伸其恩而不害於義又全其天性而使不陷於僞惟降而不絶則無一不可矣可謂曲盡矣夫惟仁義能曲盡人情而善養人之天性以濟於人事無所不可也故知義可以為人後而不知仁不絶其親者衆人之偏見也知仁義相為用以曲盡人情而善養人之天性使不入於僞惟逹於禮者可以得聖人之深意也問者曰為人後而有天下者不絶其所生則將干乎大統奈何曰降則不能干矣自漢以來為人後而有天下者尊其所生多矣何嘗干於大統使漢宣哀不立廟京師以亂昭穆則其於大統亦何所干乎曾鞏為人後議曰禮大宗無子則族人以支子為之後為之後者為所後服斬衰三年而降其父母期禮之所以如此者何也以謂人之所知者近則知親愛其父母而已所知者逺則知有嚴父之義知有嚴父之義則知尊祖知尊祖則知大宗者上以繼祖下以收族不可以絶故有以支子為之後者為之後者以受重於斯人故不得不以尊服服之以尊服服之而不為之降己親之服則尤恐未足以明所後者之重也以尊服服之又為之降己親之服然後以謂可以明所後者之重而繼祖之道盡此聖人制禮之意也夫所謂收族者記稱與族人合食序以昭穆别以禮義之類是特諸矦别子之大宗而嚴之如此况如禮所稱天子及其始祖之所自出者此天子之大宗是為天地宗廟百神祭祀之主族人萬世之所依歸而可以不明其至尊至重哉故前世人主有以支子繼立而崇其本親加以號位立廟奉祀者皆見非於古今誠由所知者近不能割棄私愛節之以禮故失所以奉承正統尊無二上之意也若於所後者以尊服服之又為之降己親之服而於己親號位不敢以非禮有加也廟祀不敢以非禮有奉也則為至恩大義固已僃矣而或謂又當易其父母之名從所後者為屬是未知考於禮也禮為人後者為所後者之祖父母父母妻之父母昆弟昆弟之子若子者此其服為所後者而非其為已也為其父母期為其昆弟大功為其姊妹適人者小功皆降本服一等者此其服為已而非為所後者也使於其父母服則為己名為所後者是則名與實相違服與恩相戾矣聖人制禮不如是之舛也且自古為人後者不必皆親昆弟之子族人之同宗者皆可為之則有以大功小功昆弟之子而為之者矣若當從所後者為屬則亦當從所後者為服則於其父母有宜為大功為小功為緦麻為袒免無服者矣而聖人制禮皆為其父母期使足以明所後者重而已非遂謂當變其親也親非變則名固不得而易矣戴德王肅喪記曰為人後者為其父母降一等服齊衰期其服之節居倚廬言語飲食與父在為母同其異者不祥不禫雖除服心喪三年故至於今著於服令未之有改也豈有製服之重如此而其名遂可以絶乎又崔凱喪服駮曰本親有自然之恩降一等則足以明所後者為重無緣乃絶之矣夫未嘗謂可以絶其親而輒謂可以絶其名是亦惑矣且支子所以後大宗者為推其嚴父之心以尊祖也顧以尊祖之故而不父其父豈本其恩之所由生而先王教天下之意哉又禮適子不可為人後者以其傳重也支子可以為人後者以非傳重也使傳重者後已宗非傳重者後大宗其意可謂即乎人心而使之兩義俱安也今若使為人後者以降其父母之服一等而遂變革其名不以為父母則非使之兩義俱安而不即乎人心莫大乎如是也夫人道之於大宗至尊至重不可以絶尊尊也尊尊親親其義一也未有可廢其一者故為人之後者為降其父母之服禮則有之矣為之絶其父母之名則禮未之有也或以謂欲絶其名者蓋惡其為二而使之為一所以使為人後者之道盡也夫迹其實則有謂之所後有謂之所生制其服則有為已而非為所後者有為所後而非為己者皆知不可以惡其為二而强使之為一也至於名者蓋生於實也乃不知其不可以惡其為二而欲强使之為一是亦過矣藉使其名可以强使之為一而迹其實之非一制其服之非一者終不可易則惡在乎欲絶其名也故古之聖人知不以惡其為二而强使之為一而能使其屬之踈者相與為重親之厚者相與為輕則以禮義而已矣何則使為人後者於其所後非己親也而為之服斬衰三年為其祭主是以義引之也於其所生實己親矣而降服齊衰期不得與其祭是以禮厭之也以義引之則屬之疏者相與為重以禮厭之則親之厚者相與為輕而為人後之道盡矣然則欲為人後之道盡者在以禮義明其內而不在於惡其為二而强易其名於外也故禮喪服齊衰不杖期章曰為人後者為其父母服此見於經為人後者於其本親稱父母之明文也漢祭義以謂宣帝親諡宜曰悼魏相以謂宜稱尊號曰皇考立廟後世議者皆以其稱皇立廟為非至於稱親稱考則未嘗有以為非者也其後魏明帝尤惡為人後者厚其本親故非漢宣加悼考以皇號又謂後嗣有由諸侯入繼正統者皆不得謂考為皇稱妣為后蓋亦但禁其猥加非正之號而未嘗廢其考妣之稱此見於前世議論為人後者於其本親稱考妣之明文也又晉王坦之喪服議曰罔極之重非制教之所裁昔日之名非一朝之所去此出後之身所以有服本親也又曰情不可奪名不可廢崇本敘恩所以為降則知為人後者未有去其所出父母之名此古人之常理故坦之引以為制服之證此又見於前世議論為人後者於其本親稱父母之明文也是則為人後者之親見於經見於前世議論謂之父母謂之考妣者其大義如此明文如此至見於他書及史官記亦謂之父母謂之考妣謂之私考妣謂之本親謂之親者則不可一二數而以為世父叔父者則不特禮未之有載籍以來固未之有也今欲使從所後者為屬而革變其父母之名此未嘗異義也不從經文於前世數千載之議論亦未嘗異義也而無所考據以持其說將何以示天下乎且中國之所以為貴者以有父子之道又有六經與前世數千載之議論以治之故也今忽欲棄之而伸其無所考據之說豈非誤哉或謂為人後者於其本親稱父母則為兩統二父其可乎夫兩統二父者謂加考以皇號立廟奉祀是不一於正統懷二於所後所以著其非而非謂不變革其父母之名也然則加考以皇號與禮及立廟稱皇考者有異乎曰皇考一名而為說有三禮曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟是則以皇考為曾祖之廟號也魏相謂漢宣帝父宜稱尊號曰皇考既非禮之曾祖之稱又有尊號之文故魏明帝非其加悼考以皇號至於光武亦于南頓君稱皇考廟義出於此是以加皇號為事考之尊稱也屈原稱朕皇考曰伯庸又晉司馬機為燕王告禰廟文稱敢昭告於皇考清惠亭矦是又達於群下以皇考為父殁之通稱也以為曽祖之廟號者於古用之以為事考之尊稱者於漢用之以為父殁之通稱者至今用之然則稱之亦有可有不可者乎曰以加皇號為事考之尊稱者施於為人後之義是干正統此求之於禮而不可者也達於群下以皇考為父殁之通稱者施於為人後之義非干正統此求之於禮而可者也然則以為父殁之通稱者其不可如何曰若漢哀帝之親稱尊號曰恭皇安帝之親稱尊號曰孝德皇是又求之於禮而不可者也且禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也前世失禮之君崇本親以位號者豈獨失為人後奉祀正統尊無二上之意哉是以子爵父以卑命尊亦非所以尊厚其親也前世崇飾非正之號者其失如此而後世又謂宜如期親故事增官廣國者亦可謂皆不合於禮矣夫考者父殁之稱然施於禮者有朝廷典䇿之文有宗廟祭祀之辭而已若不加位號則無典䇿之文不立廟奉祀則無祝祭之辭則雖正其名豈有施於事者顧言之不可不順而已此前世未嘗以為可疑者以禮甚明也今世議者紛紛至於曠日纍時不知所決者蓋由不考於禮而率其私見也故采於經列其㫖意庶得以商榷焉宋史紀事夲末卷七
