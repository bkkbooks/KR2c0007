body:
  text: 宋史紀事本末卷十四明馮琦原編陳邦瞻增輯高宗嗣統欽宗靖康元年冬十月戊辰詔馮澥副康王使金斡里雅布軍先是王雲至真定斡里雅布軍遣從吏先還言金人須康王至軍乃議和會金使王汭等亦來帝乃命澥副康王往會雲還復詔雲以資政殿學士副王王由滑濬至磁州守臣宗澤迎謁曰肅王一去不返今敵又詭辭以致大王其兵已迫復去何益願勿行王出謁嘉應神祠雲在後民遮道諫王勿北去厲聲指雲曰真姦賊也因執雲殺之時斡里雅布濟河遊兵日至磁城下迹王所在知相州汪伯彥亟以帛書請王如相服櫜鞬部兵以迎于河北王至相勞伯彥曰他日見上當首以京兆薦公伯彥由此受知相人嶽飛亦因劉韐見王王令招賊吉倩倩降以飛為承信郎議者謂是役王雲不死王必至金無還理閏月殿中侍御史胡唐老言康王奉使至磁為士民所留乃天意也乞就拜為大元帥率天下兵入援何栗亦以為然密草詔藁上之帝令募死士得秦仔等四人遣持蠟詔如相州拜王為兵馬大元帥知中山府陳遘為元帥汪伯彥宗澤為副元帥使盡起河北兵速入衛仔至相州于頂髮中出詔王讀之哽咽軍民感動十二月康王開大元帥府于相州有兵萬人分為五軍而進次于大名宗澤以二千人與金人力戰破其三十餘寨履氷渡河見王曰京城受圍日久入援不可緩王納之既而知信德府梁揚祖以三千人至張俊苗傅楊沂中皆在麾下兵威稍振會帝遣曹輔齎蠟詔至云金人登城不下方議和好可屯兵近甸毋動汪伯彥等皆信之宗澤獨曰金人狡譎是欲欵我師爾君父之望入援何啻飢渴宜急引軍直趨澶淵次第進壘以解京城之圍萬一敵有異謀則吾兵已在城下伯彥難之勸王遣澤先行王乃命澤趨澶淵自是澤不得預帥府事矣耿南仲及伯彥請移軍東平從之二年春正月宗澤自大名至開德與金人十三戰皆捷遂以書勸康王移諸道兵會京城又移書北道總管趙野河東北路宣撫范訥知興仁府曽懋合兵入援三人皆以澤為狂不答澤遂以孤軍進至衛南先驅云前有敵營澤揮衆直前與戰敗之轉戰而東敵益生兵至澤將王孝忠戰死前後皆敵壘澤令曰今日進退皆死不可不死中求生士卒知必死無不一當百斬首數千金人大敗退却數十里澤計敵衆勢必復來乃暮徙其營金人夜至得空營大驚自是憚澤不敢出澤出其不意遣兵過大河襲擊破之二月庚辰康王至濟州時王有衆八萬分屯濟濮諸州高陽關路安撫使黃潛善總管楊惟忠亦以部兵數千至東平王遣真定總管王淵以三千人入援金人聞之遣甲士及中書舍人張澄齎帝蠟詔自汴京至命王以兵付副帥而還京王問計於左右後軍統制張俊曰此金人詐謀爾今大王居外此天授豈可徒往因請進兵王遂如濟州既而金人謀以五千騎取康王吕好問聞之遣人以書白王曰大王之兵度能擊則邀擊之不能即宜逺避夏四月金人以二帝北去宗澤在衛聞之即提軍趨滑走黎陽至大名欲徑渡河據金人歸路邀還二帝而勤王之兵卒無至者遂不果時張邦昌請元祐皇后孟氏入居禁中垂簾聽政后以馮澥為奉迎使與謝克家及康王舅忠州防禦使韋淵奉大宋受命寶詣濟州勸進既至王慟哭受寶命遣克家還京辦即位儀物后手書告中外曰比以敵國興師都城失守祲纒宫闕既二帝之蒙塵誣及宗祊謂三靈之改卜衆恐中原之無主姑令舊弼以臨朝雖義形於色而以死為辭然事迫於危而非權莫濟內以拯黔首將亡之命外以紓鄰國見逼之威遂成九廟之安坐免一城之酷乃以衰癃之質起於間廢之中迎置宫闈進加位號舉欽聖已還之典成靖康欲復之心永言運數之屯坐視邦家之覆撫躬獨在流涕何從緬惟藝祖之開基實自高穹之眷命歷年二百人不知兵傳序九君世無失德雖舉族有北轅之釁而敷天同左袒之心乃眷賢王越居近服已徇羣情之請俾膺神器之歸繇康邸之舊藩嗣宋朝之大統漢家之厄十世宜光武之中興獻公之子九人唯重耳之尚在兹惟天意夫豈人謀尚期中外之協心同定安危之至計庶臻小愒同底丕平用敷告於多方其深明於吾意濟州父老詣軍門言四旁望見城中火光屬天請王即皇帝位會宗澤及權應天府朱勝非來言南京藝祖興王之地取四方中漕運尤易王遂決意趨應天府既發滑州鄜延副總管劉光世西道都總管王襄宣撫司統制官韓世忠皆以師來會王至應天命築壇於府門之左期以五月庚寅朔即位改靖康二年為建炎元年高宗建炎元年五月庚寅朔帝登壇受命畢慟哭遙謝二帝遂即位于應天府治大赦張邦昌及應干供奉金國之人一切不問惟蔡京童貫朱勔李彥孟昌齡梁師成􅀈稹子孫更不收敘是日元祐皇后於東京撒簾辛卯遙上靖康帝尊號曰孝慈淵聖皇帝以黃潛善為中書侍郎汪伯彥同知樞密院事尊元祐皇后為元祐太后遙尊生母韋氏為宣和皇后遙立夫人邢氏為皇后乙未以吕好問為尚書右丞初元祐太后遣好問奉手書詣應天帝勞之曰宗廟獲全卿之力也遂有是命時王淵楊惟忠以河北兵劉光世以陜西兵張俊苗傅以帥府及降盜兵皆在行朝不相統一乃置御營司主行幸總齊軍政命黃潛善兼御營使汪伯彥副之而以王淵為都統制劉光世提舉一行事務韓世忠為左軍統制張俊為前軍統制楊惟忠主管殿前公事李綱輔政高宗建炎元年五月甲午召李綱為尚書右僕射兼中書侍郎初綱再貶寧江金兵復至淵聖悟和議之非召綱為開封尹行次長沙被命即帥湖南勤王師入援未至而京城失守至是召拜右相趣赴行在所中丞顔岐奏曰張邦昌為金人所喜雖已封為三公郡王宜更加同平章事增重其禮李綱為金人所惡雖已命相宜及其未至罷之章五上帝曰如朕之立恐亦非金人所喜岐語塞而退岐又遣人封其章示綱覬沮其來右諫議大夫范宗尹論綱名浮于實有震主之威帝亦不聽汪伯彥黃潛善自謂有扳附之勞擬必為相及召李綱于外二人不悅遂與綱忤綱行至太平上疏曰興衰撥亂之主非英哲不足以當之英則用心剛足以涖大事而不為小故之所搖哲則見善明足以任君子而不為小人之所間願陛下以漢之高光唐之太宗國朝之藝祖太宗為法六月己未朔李綱至行在入見涕泗交集帝為動容因奏曰金人不道專以詐謀取勝中國不悟一切墮其計中賴天命未改陛下總帥於外為天下臣民所推戴內修外攘還二聖撫萬邦責在陛下與宰相臣自視缺然不足以副委任且臣在道顔岐嘗封示論臣章謂臣為金人所惡不當為相因力辭帝命岐奉祠併出范宗尹綱猶力辭帝曰朕知卿忠義智略久矣欲使敵國畏服四方安寧非相卿不可卿其勿辭綱頓首泣謝且言昔唐明皇欲相姚崇崇以十事要説皆中一時之病今臣亦以十事仰干天聽陛下度其可行者賜之施行臣乃敢受命一曰議國是謂中國之御外侮能守而後可戰能戰而後可和而靖康之末皆失之今欲戰則不足欲和則不可莫若先自治專以守為䇿俟吾政事修士氣振然後可議大舉二曰議巡幸謂車駕不可不一至京師見宗廟以慰都人之心度未可居則為巡幸之計以天下形勢而觀長安為上襄陽次之建康又次之皆當詔有司預為之備三曰議赦令謂宗祖登極赦令皆有常式前日赦書乃以張邦昌偽赦為法如赦惡逆及罪廢官盡復官職皆泛濫不可行宜悉改正四曰議僣逆謂張邦昌為國大臣不能臨難死節而挾金人之勢易姓改號宜正典刑垂戒萬世五曰議偽命謂國家更大變鮮有仗節死義之士而受偽官以屈膝于其庭者不可勝數昔肅宗平賊汚偽命者以六等定罪宜放之以厲士風六曰議戰謂軍政久廢士氣怯惰宜一新紀律信賞必罰以作其氣七曰議守謂敵情狡獪勢必復來宜於沿河江淮措置控禦以扼其衝八曰議本政謂政出多門綱紀紊亂宜一歸之中書則朝廷尊九曰議久任謂靖康間進退大臣太速功效蔑著宜慎擇而久任之以責成功十曰議修德謂上始膺天命宜益修孝弟恭儉以副四海之望而致中興翌日班綱議於朝惟僣逆偽命二事留中不出李綱以二事留中言於帝曰二事乃今日刑政之大者邦昌當道君朝在政府者十年淵聖即位首擢為相方國家禍難金人為易姓之謀邦昌如能以死守節推明天下戴宋之義以感動其心金人未必不悔禍而存趙氏而邦昌方自以為得計偃然正位號處宮禁擅降偽詔以止四方勤王之師及知天下之不與乃不得已請元祐太后垂簾聽政而議奉迎邦昌僣逆始末如此而議者不同臣請以春秋之法斷之夫春秋之法人臣無將將而必誅趙盾不討賊書以弒君今邦昌已僣位號敵退而止勤王之師非特將與不討賊而已劉盆子以漢宗室為赤眉所立其後以十萬衆降光武但待之以不死邦昌以臣易君罪大於盆子不得已而自歸朝廷既不正其罪又尊崇之此何理也陛下欲建中興之業而尊僣逆之臣以示四方其誰不解體又偽命臣僚一切置而不問何以勵天下士大夫之節時執政中有異議不同者帝召黃善等語之善主邦昌甚力帝顧吕好問曰卿在圍城中知其故以為何如好問附善持兩端綱言邦昌僣逆豈可留之朝廷使道路指目曰此亦一天子哉因泣拜曰臣不可與邦昌同列當以笏擊之陛下必欲用邦昌第罷臣帝頗感動汪伯彥曰李綱氣直臣等所不及帝乃出綱奏責授邦昌保化軍副使潭州安置并安置王時雍徐秉哲吳幵莫儔李擢孫覿于高梅永全栁歸州而顔博文王紹以下論罪有差邦昌後至潭州伏誅贈李若水霍安國劉韐官李綱言近世士大夫寡廉鮮恥不知君臣之義靖康之禍仗節死義者在內惟李若水在外惟霍安國願加贈恤帝從其請遂贈若水觀文殿學士諡忠愍安國延康殿學士韐資政殿學士仍詔有死節者諸路詢訪以聞甲子以李綱兼御營使綱入對言曰今國勢不逮靖康間逺甚然而可為者陛下英斷於上羣臣輯睦於下庶幾中興可圖然非有規模而知先後緩急之序則不能以成功夫外禦強敵內銷盜賊修軍政變士風裕邦財寬民力改弊法省冗官誠號令以感人心信賞罰以作士氣擇帥臣以任方面選監司郡守以奉行新政俟吾所以自治者政事已修然後可以問罪金人迎還二聖此所謂規模也至於所當急而先者則在於料理河北河東蓋河北河東國之屏蔽也料理稍就然後中原可保而東南可安今河東所失者恆代太原澤潞汾晉餘郡猶存也河北所失者不過真定懷衛濬四州而已其餘三十餘郡皆為朝廷守兩路士民兵將所以戴宋者其心甚堅皆推豪傑以為首領多者數萬少者亦不下萬人朝廷不因此時置司遣使以大慰撫之分兵以援其危急臣恐糧盡力疲坐受金人之困雖懷忠義之心援兵不至危迫無告必且憤怨朝廷金人因得撫而用之皆精兵也莫若於河北置招撫司河東置經制司擇有才略者為之使宣諭天子恩德所以不忍棄兩河於敵國之意有能全一州復一郡者以為節度防禦團練使如唐方鎮之制使自為守非惟絶其從敵之心又可資其禦敵之力使朝廷永無北顧之憂最今日之先務也帝善其言問誰可任者綱薦張所傅亮綱又立軍法五人為伍伍長以牌書同伍四人姓名二十五人為甲甲正以牌書伍長五人姓名百人為隊隊將以牌書甲正四人姓名五百人為部部將以牌書隊將正副十人姓名二千五百人為軍統制官以牌書部將正副十人姓名命招置新軍及御營司兵並以此法團結及詔陜西山東諸路帥臣並依此法互相應援有所呼召使令按牌以遣辛未子敷生大赦李綱言陛下登極曠蕩之恩獨遺河北河東而不及勤王之師夫兩河為朝廷堅守而赦令不及人皆謂已棄之何以慰忠臣義士之心勤王之師在道路半年擐甲荷戈冒犯霜露雖未效用亦已勞矣加以疾病死亡恩恤不及後有急難何以使人願因今赦廣示德意帝從之於是人情翕然間有破敵捷書至者金人圍守諸郡之兵往往引去丁亥詔諸路募兵買馬勸民出財用李綱之言也綱上三議一曰募兵二曰買馬三曰募民出財助軍費且言熙豐間內外禁旅五十九萬今禁旅單弱何以捍強敵而鎮四方莫若取財于東南募兵于西北若得數十萬付諸將以時練之不久皆成精兵此最為急務於是詔陜西河北京東西路募兵十萬更畨入衛河北西路括買官民馬勸民出財助國綱又言步不足以勝騎騎不足以勝車請以戰車之制頒于京東西路使製造而教習之丁亥以張所為河北招撫使初靖康中所以蠟書冒圍募河北兵士民得書喜曰朝廷棄我猶有一張察院能拔而用之應募者十七萬人由是所聲振河北帝即位遣所按視陵寢所還上言曰河東河北天下之根本昨者誤用姦臣之謀始割三鎮繼割兩河其民怨入骨髓至今無不扼掔若因而用之則可藉以守否則兩河兵民無所繫望陛下之事去矣且請帝亟還京城因言其有五利奉宗廟保陵寢一也慰安人心二也繫四海之望三也釋河北割地之疑四也早有定處而一意於邊防五也夫國之安危在乎兵之強弱與將相之賢不肖而不在乎都之遷與不遷也誠使兵弱而將士不肖雖渡江而南安能自保又言黃潛善姦邪恐害新政帝方信任潛善貶所江州至是以李綱薦用為河北招撫使賜內府錢百萬緡給空名告身千餘道以京西卒三千自衛將佐官屬許自辟置一切以便宜從事所入對條上利害且乞置司北京俟措置有緒乃渡河河北轉運副使張益謙附黃潛善意奏招撫使之擾且言自置司河北盜賊愈熾李綱言張所尚留京師益謙何以知其擾河北民無所歸聚而為盜豈由置司益謙非理沮抑如此必有使之者上乃命益謙分析命下樞密院汪伯彥猶用其奏詰責招撫司李綱與伯彥力爭伯彥語塞所招來豪傑擢王彥為統制時嶽飛上書言陛下已登大寶社稷有主已足伐敵之謀而勤王之師日集彼方謂吾素弱宜乘其怠而擊之黃潛善汪伯彥不能承聖意恢復日謀南幸恐不足繫中原之望願陛下乘敵穴未固親率六軍北渡則將士作氣中原可復坐飛越職言事奪官歸河北詣所所以飛為中軍統領問之曰爾能敵幾何飛曰勇不足恃用兵在先定謀欒枝曳柴以敗荆莫敖采樵以致絞皆謀定也所矍然曰君殆非行伍中人飛因説所曰國家都汴恃河北以為固茍馮據要衝峙列重鎮一城受圍則諸城或撓或救金人不能窺河南而京師根本之地固矣招撫誠能提兵壓境飛惟命是從所大喜借補飛武經郎秋七月己丑朔以王􅊅為河東經制使傅亮副之又以錢蓋為陜西經制使甲辰右諌議大夫宋齊愈棄市初齊愈論李綱募兵買馬括財三事之非不報時方論僣逆偽命之罪齊愈實書邦昌姓名以示衆於是逮齊愈於獄齊愈引伏遂命戮於東市時帝手詔擇日巡幸東南綱言車駕巡幸之所關中為上襄陽次之建康為下陛下縱未能行上䇿猶當且適襄鄧示不忘故都以繫天下之心不然中原非復我有車駕還闕無期矣帝乃諭兩京以還都之意讀者感泣已而帝意復變綱又極言其不可且曰自古中興之主起於西北則足以據中原而有東南起於東南則不能復中原而有西北蓋天下精兵健馬皆在西北若委中原而棄之豈惟金人將乘間以擾內地盜賊亦將蜂起為亂跨州連邑陛下雖欲還闕不可得矣况欲治兵勝敵以歸二聖哉夫南陽光武之所興有高山峻嶺可以控扼有寬城平野可以屯兵西鄰關陜可以召將士東達江淮可以運穀粟南通荆湖巴蜀可以取財貨北距三都可以遣救援暫議駐蹕乃還汴都䇿無出於此者今乘舟順流而適東南固甚安便第恐一失中原則東南不能必其無事雖欲退保一隅不可得也况嘗降詔許留中原人心恱服奈何詔墨未乾遽失大信帝然之丙午詔定議巡幸南陽以范致虛知鄧州修城池繕宫室輸錢穀以實之而汪伯彥黃潛善隂主揚州之議或謂綱曰外論洶洶咸謂東幸已決綱曰國之存亡於是焉分吾當以去就爭之八月壬戌以李綱黃潛善為尚書左右僕射兼門下中書侍郎綱常侍帝論及靖康時事帝曰淵聖勤於政事省覽章奏至終夜不寐然卒至播遷何也綱對曰人主之職在知人進君子退小人則大功可成否則衡石程書無益也因勉帝以明恕盡人言恭儉足國用英果斷大事帝嘉納之綱所論諌其言切直帝初無不容納至是惑於黃潛善汪伯彥之言常留中不報呂中曰自綱之入相也以英哲全德勉人主以修政攘夷為己任抗忠數疏中時膏肓和守之議決而國是明僣逆之罪正而士氣作幸都之謀定而人心安他如修軍政變士氣定經制改弊法招兵買馬分布要害遣張所招撫河北王􅊅經制河東宗澤留守京城西顧關陜南葺襄鄧且將益據形便以為必守中原之計朱子謂李綱入來方成朝廷者正為此也乙亥召河東經制副使傅亮還行在李綱罷時傅亮軍行十餘日黃潛善等以為逗遛令東京留守節制亮軍即日渡河亮言措置未就而渡河恐誤國事李綱為之請潛善等不以為然綱言招撫經制二司臣所建明而張所傅亮又臣所薦用今黃潛善汪伯彥沮所亮所以沮臣臣每鑒靖康大臣不和之失事未嘗不與潛善伯彥議而後行而二人設心如此願陛下虛心觀之既而召亮赴行在綱言聖意必欲罷亮乞付黃潛善施行臣得乞身歸田里綱退而亮竟罷綱乃再疏求去帝曰卿所爭細事胡乃爾綱言方今人才將帥為急恐非小事臣昨議遷幸與潛善伯彥異宜為所嫉然臣東南人豈不願陛下東幸為安便哉顧一去中原後患有不可勝言者願陛下以宗社為心以生靈為意以二聖未還為念勿以臣去而改其議臣雖去左右不敢一日忘陛下泣辭而退或曰公決於進退於義得矣如讒者何綱曰吾知盡事君之道不可則全進退之節禍患非所恤也會侍御史張浚劾綱以私意殺宋齊愈且論其招軍買馬之非潛善伯彥等復力排綱請帝去之遂罷綱為觀文殿大學士浚論綱不已乃落職提舉洞霄宫凡在相位七十七日綱罷而招撫經制司廢車駕遂東幸兩河郡縣相繼淪陷凡綱所規畫軍民之政一切廢罷金兵益熾關輔殘毁而中原盜賊蜂起矣壬午殺太學生陳東布衣歐陽徹東自丹陽召至未得對會李綱罷乃上書乞留綱而罷黃潛善汪伯彥不報又上疏請帝親征以還二聖治諸將不進兵之罪以作士氣車駕宜還京師勿幸金陵又不報會撫州布衣歐陽徹徒步詣行在伏闕上書極詆用事大臣潛善遽以語激帝怒言若不亟誅將復鼓衆伏闕書獨下潛善所府尹孟庾召東議事東請食而行手書區處家事字畫如平時已乃授其從者曰我死爾歸致此於吾親食已如厠吏有難色東笑曰我陳東也畏死即不敢言已言肯逃死乎吏曰吾亦知公安敢相迫頃之東具冠帶别同邸乃與徹同斬於市四明李猷贖尸瘞之東初未識綱特以國故為之死識與不識皆為流涕乙酉許翰罷翰言李綱忠義英發捨之無以佐中興今罷綱臣留無益力求去帝不許及陳東見殺翰曰吾與東皆爭李綱者東戮於市吾在廟堂可乎凡八上章求罷遂以資政殿大學士提舉洞霄宫宗澤守汴高宗建炎元年五月庚戌以宗澤知襄陽府澤見帝應天陳興復大計帝欲留澤黃潛善等沮之故出六月乙酉以宗澤為東京留守澤在襄陽聞黃潛善復倡和議上疏曰自金人再至朝廷未嘗命一將出一師但聞姦邪之臣朝進一言以告和暮入一説以乞盟終至二聖北遷宗社蒙恥臣意陛下赫然震怒大眀黜陟以再造王室今即位四十曰矣未聞有大號令但見刑部指揮云不得謄播赦文於河之東西陜之蒲解是禠天下忠義之氣而自絶其民也臣雖駑怯當躬冒矢石為諸將先得捐軀報國恩足矣帝覽其言而壯之及開封尹闕李綱言綏復舊都非澤不可乃以為東京留守知開封府時敵騎留屯河上金鼓之聲日夕相聞而京城樓櫓盡廢兵民雜居盜賊縱橫人情洶洶澤威望素著既至首捕誅舍賊者數人下令曰為盜者贓無輕重悉從軍法由是盜賊屏息因撫循軍民修治樓櫓屢出師以挫敵上疏請帝還京師俄有詔荆襄江淮悉備巡幸澤又疏言開封物價市肆漸同平時將士農民商旅士大夫之懷忠義者莫不願陛下亟歸京師以慰人心其倡為異議者不過如張邦昌輩隂與金人為地爾既而金人遣使以使偽楚為名至開封澤拘其人乞斬之有詔延置别館澤奏曰金人假使偽楚來覘虛實臣愚乞斬之以破其姦而陛下惑於人言優加禮遇愚不敢奉詔以彰國弱帝乃手札諭澤竟縱遣之真定懷衛間敵兵甚盛方密修戰具為入攻之計宗澤以為憂乃渡河約諸將共議事宜以圖收復而於京城四壁各置使以領招集之兵造戰車千二百乘又據形勝立堅壁二十四所於城外沿河鱗次為連珠寨連結河東河北山水寨忠義民兵於是陜西京東西諸路人馬咸願聽澤節制澤又開五丈河以通西北商旅守禦之具既備纍表請帝還京而帝用黃潛善計決意幸東南不報秉義郎嶽飛犯法將刑宗澤一見竒之曰將材也會金人攻汜水以五百騎授飛使立功贖罪飛大敗金人而還升飛為統制而謂之曰爾智勇材藝古良將不能過然好野戰非萬全計因授飛陳圖飛曰陳而後戰兵法之常運用之妙存乎一心澤是其言飛由此知名秋七月宗澤復上表曰今敵氛尚熾羣盜方興比聞逺近之驚傳已有東南之巡幸恐增四海之疑心謂置兩河於度外因成解體未諭聖懷不報又上疏曰陛下回鑾汴京是人心之所欲妄議巡幸是人心之所惡又不報澤又抗疏極言祖宗二百年基業陛下奈何棄之以遺狂敵今陛下一歸王室再造中興之業復成如以臣為狂率願延左右之將士試一諭之不獨謀之一二大臣天下幸甚時澤每疏奏上以付中書省潛善伯彥以為狂張慤獨曰如澤之忠義若得數人天下定矣二人語塞冬十月帝如揚州宗澤上疏諌曰京師天下腹心不可棄也昔景德間契丹寇澶淵王欽若江南人勸幸金陵陳堯叟閬中人勸幸成都惟寇凖毅然請親征卒用成功因條上五事極言黃潛善汪伯彥贊南幸之非時兩河雖多陷於金而其民懷朝廷舊恩所在結為紅巾出攻城邑皆用建炎年號金人稍稍引去及聞帝南幸無不解體澤復上疏言欲遣閭勍王彥各統大軍盡平敵壘望陛下早還京闕臣之此舉可保萬全或姦謀蔽欺未即還闕願陛下從臣措畫勿使姦臣沮抑以誤社稷大計陳師鞠旅盡掃敵氛然後奉迎鑾輿還京以塞姦臣之口以快天下之心帝優詔答之敵十二月宗澤聞金人將謀侵汴遣劉衍趨滑州劉達趨鄭州以分其勢戒諸將保護河梁以俟大兵之集烏珠乃不敢向汴夜斷河梁而去二年春正月金烏珠自鄭抵白沙去汴京密邇都人震恐僚屬入問計宗澤曰何事張皇劉衍等在外必能禦敵乃選精鋭數千使繞出敵後伏其歸路金人方與衍戰伏兵起前後夾擊之金人果敗尼瑪哈據西京與澤相持澤遣部將閻中立郭俊民李景良等帥兵趨鄭遇敵大戰兵敗中立死之俊民降景良遁去澤捕景良斬之既而俊民與金將持書來招澤澤皆斬之劉衍還金人復入滑澤部將張撝往救之撝至滑衆寡不敵或請少避之撝曰避而偷生何面目見宗公力戰而死澤聞撝急遣王宣往援已不及因與金人大戰破走之澤以宣知滑州金自是不復犯東京澤得金將遼臣王䇿於河上解其縳問金人虛實得其詳遂決大舉之計召諸將曰汝等有忠義心當協謀勦敵期還二聖以立大功言訖泣下諸將皆奮澤復上疏請帝還京曰臣為陛下保護京城自去年秋至今春又三月矣陛下不早還則天下之民何依戴不報澤威聲日著敵聞其名畏憚對南人言必稱宗爺爺二月乙丑河北盜楊進等降於宗澤楊進聚衆三十萬與丁進王再興李貴王大郎等擁衆各數萬往來京西淮南河南北侵掠澤遣人諭以禍福悉招降之有王善者河東巨寇也擁衆七十萬車萬乘欲據京城澤單騎馳至善營泣謂之曰朝廷危難之時使有如公一二輩豈復有敵患乎今日乃汝立功之秋不可失也善感泣曰敢不效力遂解甲降時澤招撫羣盜聚城下又募兵儲糧召諸將約日渡河諸將皆掩泣聽命澤乃上疏大約言祖宗基業可惜陛下父母兄弟蒙塵沙漠日望救兵西京陵寢為敵所占今年寒食節未有祭享之地而兩河二京陜右淮甸百萬生靈陷於塗炭乃欲南幸湖外蓋姦邪之臣一為敵人方便之計二為親屬皆已津置在南故也今京城已增固兵械已足備士氣已勇鋭望陛下毋沮萬民敵愾之氣而循東晉既覆之轍奏至帝乃降詔擇日還京既而不果宗澤召王彥兵還汴使屯滑州先是彥率嶽飛等一十將部七千人渡河至新鄉金兵盛彥不敢進飛獨引所部鏖戰奪其纛而舞諸軍爭奮遂復新鄉明日戰於侯兆川飛身被十餘創士皆死戰又敗之會食盡詣彥壁乞糧彥不許飛乃引兵益北與金人戰於太行山擒其將圖卜烏哩頁居數日又與敵遇飛單騎持丈八鐵鎗刺殺其將黑風大王金人退走飛知彥不悅己遂率所部復歸宗澤澤復以為留守司統制彥以屢勝因傳檄州郡金人以為大軍至率騎數萬薄彥壘圍之數匝彥以衆寡不敵潰圍出走諸將敗去彥獨保共城西山遣腹心結兩河豪傑圖再舉金人購求彥急彥慮變夜寢屢遷其部曲覺之相率刺面作赤心報國誓殺國賊八字以示無他意彥益感勵撫愛士卒與同甘苦未幾兩河響應忠義民兵首領傅選孟德劉澤焦文通等皆附之衆十餘萬綿亘數百里皆受彥約束金人患之召其首領俾以大兵破彥壘首領跪而泣曰王都統寨堅如鐵石未易圖也金人乃間遣騎兵撓彥糧道彥勒兵待之斬獲甚衆至是澤恐彥孤軍不可獨進召彥計事彥悉召諸寨指授方略以俟會合乃以萬餘人先發金人以重兵躡其後而不敢擊既至汴澤令宿兵近甸以衛根本彥遂屯滑州之沙店澤上疏曰臣欲乘此暑月遣彥等自滑州渡河取懷衛濬相等州王再興等自鄭州直護西京陵寢馬擴等自大名取洺相真定楊進王善丁進等各以所領兵分路並進計渡河則山寨忠義之民相應者不啻百萬願陛下早還京師臣當躬冒矢石為諸將先中興之業必可立致疏入黃潛善等忌澤成功從中沮之秋七月宗澤卒澤既招集羣盜聚兵儲糧結諸路義兵連燕趙豪傑自謂渡河克復可指日計前後請帝還京二十餘奏皆為黃潛善汪伯彥所抑潛善伯彥又疑澤為變以郭仲荀為副留守以察之澤憂憤成疾疽發於背諸將入問疾澤矍然曰吾以二帝蒙塵憤憤至此汝等能殱敵則我死無恨衆皆流涕曰敢不盡力諸將出澤嘆曰出師未捷身先死長使英雄淚滿襟無一語及家事但連呼過河者三而卒年七十都人號慟訃聞贈觀文殿學士諡忠簡澤子頴居戎幕素得士心都人請以頴繼父任時已命杜充代澤不許充酷而無謀至汴悉反澤所為於是豪傑離心羣盜聚城下者復去剽掠矣史臣曰方二帝北行宗社失主澤一呼而河北義旅數十萬衆若響之應聲實澤之忠義有以風動之也使當時無或齟齬牽制之則反二帝復舊都一指顧間耳黃潛善汪伯彥嫉能忌功而高宗惑於姦邪之口善善而不能用使澤不得信其志發憤而卒悲哉澤卒後王彥以所部兵馬付東京留守司而率親兵趨行在見黃潛善汪伯彥力陳兩河忠義延頸以望王師願因人心大舉北伐言辭憤激二人大怒遂請降旨免對差充御營平寇統領彥遂稱疾致仕兩河中原之陷高宗建炎元年五月金人陷河中府先是尼瑪哈等既北去留萬戶尼楚赫屯太原副統碩格屯真定羅索圍河中蒙格進據磁相渤海大托卜嘉圍河間帝命馬忠及欣州觀察使張換將所部合萬人自恩冀趨河間以襲之已而黃潛善等復主和議遂詔追襲兵屯大河之南應機進止至是羅索以重兵壓河中守臣席益遁去權府事郝仲連力戰外援不至度不能守先自殺其家人己而城陷與其子致厚皆不屈而死十二月金人分道南侵尼瑪哈自雲中下太行由河陽渡河攻河南分遣尼楚赫等攻漢上鄂爾多烏珠自燕山由滄州渡河攻山東分阿里富勒琿軍趨淮南羅索與薩里罕哈富自同州渡河攻陜西尼瑪哈至汜水關留守孫昭逺走死羅索至河中官軍扼河西岸不得渡乃自韓城履氷過陷同州華州安撫使鄭驤死之金兵遂破潼關王􅊅棄陜州走入蜀中原大震二年春正月戊子金人陷鄧州尼瑪哈諜知鄧州將為行在所令尼楚赫急攻之知州范致虛遁去安撫使劉汲分兵守要害自以牙兵四百登陴死鬬城陷死之初議南陽備巡幸儲峙甚多悉為金有乙未金羅索既陷同華諸州遂圍永興軍時京兆兵皆為經制使錢蓋調赴行在經略使唐重與守臣誓死守已而經制副使傅亮以兵奪門出降重死之金人陷均州又陷房州辛丑金人陷鄭州通判趙伯振死之癸卯金帥額爾衮陷濰州知州韓浩與通判朱廷傑皆力戰死之金人又陷青州二月丙子金人陷淮寧府守臣向子韶死之金羅索既陷永興鼓行而西秦州帥臣李積降敵勢益張引兵犯熙河經略使張深遣都監劉惟輔以精騎二千人禦之夜趨新店金人恃勝不虞黎明軍進惟輔舞矟刺其帥哈富洞胸墮馬死敵為奪氣深更檄右都護張嚴往追之嚴追羅索及鳯翔境上鋭意擊敵至五里坡羅索伏兵坡下嚴與曲端期不至徑前遇伏而敗死之丁酉尼瑪哈聞張嚴東出自河南西入關以援羅索盡焚西京廬舍虜其民而北時韓世忠以所部萬人赴西京捉殺盜賊尼瑪哈復留烏珠河陽以待之金人陷中山府中山受圍三年城中糧絶知府陳遘欲盡括城中人為兵力戰部將沙振潛害遘城遂陷庚子河南統制官翟進復西京夏四月乙丑翟進以兵襲金烏珠於河南兵敗其子亮死之進又率韓世忠等兵戰於文家寺又敗世忠南歸烏珠復入西京尋棄去五月金羅索大掠而東遂陷絳州初宗澤承制以王庶為陜西制置使曲端為河東經制使未幾錢蓋聞敵陷長安檄庶兼節制懷慶涇原兵既而金人東還庶以金人重載可襲取勝移文兩路協力更戰而環慶帥王似涇原帥席貢不欲受庶節度遂具文以報而實不出兵金人至清溪為吳玠所扼至咸陽望渭南義兵滿野不得渡遂循渭而東其支軍入鄜延攻康定庶急遣兵斷河橋又令劉延亮屯神水峽斷其歸路敵遂去曲端乘敵退復下秦州端雅不欲屬庶會延亮自鳳翔歸端斬之庶猶以書約似貢欲逼餘寇渡河復限大河自守二人竟不應時絳州猶為國拒守羅索還軍陷之六月以王庶節制陜西六路軍馬曲端為都統制時陜西撫諭使謝亮持詔賜夏國庶移書曰大夫出疆有可以安社稷利國家專之可也今敵人占據同華畏暑休兵秋高必大舉盍仗節督諸路協同義舉爭先並進驅逐渡河徐圖恢復亮不從八月癸巳金人陷冀州將官李政死之甲午金人再犯永興軍辛丑陜西節制司賀師範及金人戰於八公原死之九月金將鄂爾多襲破信王榛於五馬山初和州防禦使馬擴聚兵於真定五馬山得上皇子信王榛於民間奉之以總制諸寨兩河遺民聞風響應王遣擴赴行在奏事還至大名鄂爾多恐擴以援兵至急發兵攻五馬山諸寨諸寨皆陷時詔韓世忠以所部自彭城至東平張俊自東京至開德馬擴為河北應援使以備金鄂爾多既破五馬山探知擴兵南來使人馳報尼瑪哈尼瑪哈將歷懷衛而東聞鄂爾多已敗擴軍於清平遂由黎陽渡河會兵以攻澶濮榛亡走不知所終十一月金人陷延安府通判魏彥明死之先是王庶至京兆曲端不欲屬庶凡有命多托辭不行庶無如之何復還端涇原時金羅索渡河諜知庶端不協乃併兵攻鄜延庶調兵自沿河至馮翊據險以守金人先已乘氷渡河犯晉寧侵丹州又渡清水河破潼關秦隴皆震庶傳檄諸路會兵禦之時端盡統涇原精兵駐淳化庶日移文趣端進端不聼而遣其副將吳玠復華州自引兵遷延迂道自邠之三水與玠會于襄樂金攻延安急庶自坊州收散亡往援知興元府王􅊅亦將所部赴之比庶至甘泉延安已陷庶無所歸以兵付􅊅自將百騎與官屬馳赴襄樂勞軍端見庶問延安失守狀欲殺之不果乃奪其節制使印庶自劾得詔罷守京兆乃去乙未金尼瑪哈鄂爾多合兵圍濮州以濮州小易之知州楊粹中固守命將姚端夜搗其營尼瑪哈跣足走僅以身免遂攻城益急凡三十三日而陷粹中被執不屈而死金人又陷開德府守臣王棣死之庚子金人陷相州守臣趙不試死之不試太宗六世孫也甲辰金人陷德州兵馬都監趙叔昄死之金人侵晉寧軍知軍事徐徽言拒却之知府州折可求叛降金先是徽言隂結汾晉土豪約以復故地則奏官為守長聽其世襲會朝論與金結和抑其所請敵忌徽言欲速拔晉寧以除其患既破延安遂自綏德渡河圍之三月徽言屢破却之至是徽言約可求出兵夾攻金羅索聞之執可求之子彥文使為書招可求遂以所屬麟府豐三州降金可求與徽言連兵金人使招徽言於城下徽言引弓射之可求走徽言引兵擊敵大破之斬羅索之子十二月庚申金人陷東平府又陷濟南府甲子金鄂爾多攻大名府守臣張益謙欲遁提點刑獄郭永曰北門所以遮梁宋敵得志則朝廷危矣因自率兵晝夜乘城且縋死士告急於行在會大霧四塞城遂陷益謙與轉運判官迎降鄂爾多問曰城破乃降何也二人以永不從為辭鄂爾多遣騎召永謂曰沮降者誰永曰不降者我鄂爾多以富貴啖之永罵曰我恨不能醢爾以報國何説降乎鄂爾多怒併其家屬皆殺之己巳金尼瑪哈陷襲慶府軍士有欲發孔子墓者尼瑪哈問其通事高慶裔曰孔子何人曰古之大聖人尼瑪哈曰大聖人墓安可發遂殺軍士三年二月金羅索破晉寧軍徐徽言據子城拒戰因潰圍走被擒使之拜不拜臨之以兵不動命折可求諭使降徽言大罵羅索併其子岡殺之統制孫昂及士卒皆不屈死事聞贈徽言晉州觀察使諡忠壯徽言父翊宣和末救太原死之世著忠義秋七月留守杜充棄東京歸行在充將發汴嶽飛諌曰中原地尺寸不可棄今一舉足此地非我有他日取之非數十萬衆不可充不聽遂與俱歸朝廷命郭仲荀程昌寓相繼代充然留守司亦名存而已四年二月金人入東京權留守上官悟出奔為盜所殺自是四京皆沒於金南遷定都高宗建炎元年秋七月帝以京師未可往手詔巡幸東南丁未元祐太后如揚州帝從汪伯彥黃潛善言決意幸揚州避敵詔副都指揮使郭仲荀奉太后先行六宫及衛士家屬皆從遣使詣汴京奉太廟神主赴行在九月壬辰以金人犯河陽汜水詔擇日巡幸淮甸命淮浙沿海諸州增修城堡招訓民兵冬十月丁巳朔帝如揚州時金兵日迫許景衡亦言建康天險可據帝從之命揚州守臣呂頥浩繕修城池至是諜者言金人欲犯江浙乃詔暫駐淮甸捍禦稍定即還京闕有敢妄議惑衆沮巡幸者許告而罪之不告者斬二年春正月丙戌朔帝在揚州以葉夢得為戶部尚書夢得陳待敵之計有三曰形曰勢曰氣而已形以地里山川為本勢以城池芻粟器械為重氣以將帥士卒為急形固則可恃以守勢強則可資以立氣振則可作以用如是則敵皆在吾度內矣因請上南巡阻江為險以備不虞又請命重臣為宣撫總使一居泗上總兩淮及東方之師以待敵一居金陵總江浙之路以備退保疏入不報冬十月甲子侍御史張浚請先定六宫所居地詔孟忠厚奉太后及六宫皇子如杭州以苗傅劉正彥為扈從都副統制十一月庚子朔享祖宗神主於夀寧寺壬寅郊祀天配祖敕東京起奉大樂登歌法物等赴行在所就揚州江都築壇行事凡鹵簿樂舞之類率多未備嚴更警場就取軍中金鼓權一時之用是日大赦十二月乙卯太后至杭州扈從統制苗傅以其軍八千人駐奉國寺己巳以黃潛善汪伯彥為尚書左右僕射兼門下中書侍郎入謝帝曰潛善作左相伯彥作右相朕何患國事不濟時金兵橫行山東羣盜蜂起潛善伯彥既無謀略專權自恣東京委之御史南京委之留臺泗州委之郡守言事者不納其説請兵者不以上聞金兵日南而潛善等以為李成餘黨無足慮者戊寅以張浚參贊御營事浚極言金人必來請預為備黃潛善汪伯彥以為過計而笑之三年春正月帝在揚州丙午金尼瑪哈陷徐州知州王復死之時韓世忠屯淮揚會山東兵以援濮州尼瑪哈聞之分兵萬人趨揚州自率大軍迎戰世忠以衆寡不敵夜引還尼瑪哈躡之至沭陽世忠棄軍走鹽城衆遂潰尼瑪哈入淮陽以騎兵三千取彭城間道取淮東入泗州二月庚戌詔聽士民從便避兵劉正彥部兵衛皇子六宫如杭州壬子金尼瑪哈至楚州守臣朱琳降遂乘勝而南陷天長軍內侍鄺詢報金兵至帝即被甲乘騎馳至瓜州步得小舟渡江惟護聖軍卒數人及王淵張浚內侍康履等從行日暮至鎮江府汪伯彥黃潛善方率同列聽浮圖説法罷會食堂吏大呼曰駕已行矣二人相顧倉皇乃戎服䇿馬南馳居民爭門而出死者相枕籍無不怨憤司農卿黃諤至江上軍士以為黃潛善罵之曰誤國誤民皆爾之罪諤方辨其非是而首已斷矣金將馬五率五百騎先馳至揚州城下聞帝已南行乃追至楊子橋時事起倉卒朝廷儀物皆棄太常少卿季陵亟取九廟神主以行出城未數里城中已煙焰燭天矣陵為金人所追亡太祖神主于道帝至鎮江宿於府治翌日召從臣問去留吕頥浩乞留蹕以為江北聲援羣臣皆以為然王淵獨言鎮江止可捍一面若金人自通州渡江以據姑蘇將若之何不如錢塘有重江之險帝意遂決張邵上疏曰有中原之形勢有東南之形勢今縱未能遽爭中原宜進都金陵因江淮蜀漢閩廣之資以圖恢復不報是夕帝發鎮江越四日次平江命朱勝非節制平江秀州軍馬張浚副之又命勝非兼御營副使留王淵守平江又二日次崇德時吕頥浩從行即拜同僉書樞密院事江淮兩浙制置使以兵二千還屯京口又命張浚以兵八千守吳江用朱勝非計詔録用張邦昌親屬遣閣門祇候劉俊民使金軍仍命俊民持邦昌貽金人約和書藁以行壬戌帝駐蹕杭州即州治為行宫下詔罪己求言赦死罪以下放還士大夫被竄斥者惟李綱不赦更不放還蓋用黃潛善計罪綱以謝金也和州防禦使馬擴應詔上書言前日之事其誤有四其失有六今願陛下西幸巴蜀用陜右之兵留重臣使鎮江南撫淮甸破金人之計回天下之心是為上䇿都守武昌襟帶荆湖控引川廣招集義兵屯布上流扼據形勢密約河南諸路豪傑許以得地世守是為中䇿駐蹕金陵備禦江口通達漕運精習水軍厚激將士以幸一勝觀敵事勢預備遷徙是為下䇿若倚長江為可恃幸金人之不來猶豫遷延候至秋終金人再舉驅虜舟楫江淮千里數道並進方當此時然後又悔是謂無䇿擴纍數千言皆中事機戊辰金人焚揚州而去吕頥浩遣陳彥渡江襲金餘兵復揚州己巳黃潛善汪伯彥罷中丞張徴論二人大罪二十致陛下蒙塵天下怨懟乞加罪斥乃罷潛善知江寧府伯彥知洪州潛善猥持國柄嫉害忠良逐李綱沮宗澤臺諌內侍言者隨陷以竒禍中外為之切齒而帝不悟夏四月丁卯帝發杭州留鄭玨衛太后五月戊寅朔帝次常州辛巳帝次鎮江乙酉帝至江寧府改府名建康六月戊午命江淮引塘濼開畎澮以阻金兵庚申皇太后至建康府乙亥諭中外以迫近防秋請太后率宗室迎奉神主如江表百司庶府非軍旅之事者並令從行朕與輔臣宿將備禦寇敵士民家屬南遷者有司毋禁八月己未太后發建康帝聞金兵迫求可使緩師者乃遣京東轉運判官杜時亮及修武郎宋汝為使金軍以請和致書於尼瑪哈曰古之有國家而迫於危亡者不過守與奔而已今以守則無人以奔則無地所以諰諰然惟冀閣下之見哀而已故前者連奉書願削去舊號是天地之間皆大金之國而尊無二上亦何必勞師逺涉而後為快哉閏月庚寅起居郎胡寅上疏曰陛下以親王介弟受淵聖皇帝之命出師河北二帝既遷則當紏合義師北向迎請而乃亟居尊位建立太子不復歸覲宫闕展省陵寢偷安嵗月略無捍禦及敵騎乘虛匹馬南渡一向畏縮惟務逺逃軍民怨恣恐非自全之計也因進七䇿一罷和議而修戰略二置行臺以區别緩急之務三務實效去虛文四大起天下之兵以自強五都荆襄以定根本六選宗室之賢才封建任使之七存紀綱以定國體書凡數千言吕頥浩惡其切直罷之辛卯帝召諸將議駐蹕之地張浚辛企宗請自鄂嶽幸長沙韓世忠曰國家已失河北山東若又棄江淮更有何地吕頥浩曰金人之謀以陛下所至為邊面今當且戰且避奉陛下於萬全之地臣願留常潤死守帝曰朕左右不可無相乃命杜充守建康韓世忠守鎮江劉光世守太平池州丁卯太后至洪州壬寅帝發建康將如臨安考功貟外郎婁照上疏言今日之計當思古人量力之言察兵家知己之計力可以保淮南則以淮南為屏蔽權都建康漸圖恢復力未可以保淮南則因長江為險阻權都吳會以養國力於是帝一意還臨安不復防淮矣九月辛亥帝次平江府冬十月癸未帝至臨安遂如越州丁卯詔曰國家近遭金人侵逼無嵗無兵朕纂承以來深軫念慮謂父兄在難而吾民未撫不欲使之陷於鋒鏑故包羞忍恥為退避之謀冀其逞志而歸稍得休息自南京移淮甸自淮甸移建康而會稽播遷之逺極於海隅卑詞厚禮使介相望以至願去尊稱甘心貶屈請用正朔比於藩臣遣使哀祈無不曲盡假使金石無情亦當少動纍年卑屈卒未見從生民嗷嗷何時寧息今諸路之兵聚於江浙之間朕不憚親行據其要害如金人尚容朕為汝兵民之主則朕於事大之體敢有不恭或必用兵窺我行在傾我宗室塗炭生靈竭取東南金帛子女則朕亦何愛一身不臨陳以踐前言以保羣生朕已取十一月二十五日移蹕前去浙西為迎敵計惟我將士人民念國家涵養之恩二聖拘縻之辱憚殺戮􅋊焚之禍與其束手待斃曷若并計合謀同心戮力奮勵而行以存國家是日金人陷吉州又陷六安軍己巳帝發越州次錢清鎮將如浙西迎敵親征百司有至曹娥江者有至錢清鎮者侍御史趙鼎力諌以為衆寡不敵不若為避敵之計庚午遂復召百司回越州十二月丙子帝至明州壬午定議航海避兵庚子帝移溫台四年春正月甲辰朔帝舟居於海三月帝發溫州夏四月癸未帝還越州初金人退帝自溫將西還召羣臣議駐蹕之所吕頥浩曰將來宜駐浙右徐圖入蜀范宗尹曰若便入蜀恐兩失之據江表而圖關陜則兩得之帝曰善至是遂駐越尋升越州為紹興府八月隆祐太后至越州十一月壬子日南至帝率百官遙拜二帝自渡江至是始有此禮其後正旦亦然紹興元年春正月己亥朔帝在越州夏四月隆祐太后崩九月辛亥合祭天地於明堂太祖太宗並配時初駐會稽而渡江舊樂復皆燬散太常奏權用望祭禮二年春正月丙午帝自紹興如臨安從吕頥浩之請也三年春正月丁巳朔帝在臨安四年春正月辛巳朔帝在臨安九月辛酉合祭天地於明堂用國子丞王普議正樂舞先是帝嘗以時難偹物禮有從宜敕戒有司參酌損益務崇簡儉仍權依元年例令登歌通作宫架其押樂舉麾官及樂工器服等蠲省甚多既而國步漸安始以保境息民為務而禮樂之事寢以興矣冬十月帝以劉豫入寇詔親征戊戌發臨安壬寅次於平江五年春正月乙巳朔帝在平江府二月壬午帝還臨安己丑建太廟於臨安時太廟神主寓溫州嵗時委守臣薦享司封郎中林待聘言神主禮宜在都今新邑未奠請考古師行載主之義遷之行闕以彰聖孝於是始就臨安建太廟遣太常少卿迎神主奉安帝行欵謁禮侍御史張致逺言創建太廟甚失興復大計殿中侍御史張絢亦言去年建明堂今年立太廟是將以臨安為久居之地不復有意中原不報六年七月建行營於建康府時張浚奏東南形勝莫重於建康實為中興根本且使人主居此北望中原常懷憤惕不敢暇逸而臨安僻在一隅內則易生玩肆外則不足以號召逺近繫中原之心請臨建康撫三軍以圖恢復帝從之詔以秦檜為行營留守孟庾副之九月丙寅帝發臨安以劉豫將入寇故也癸酉帝次于平江七年春正月癸亥朔帝在平江詔移蹕建康八年春正月戊子朔帝在建康車駕將幸平江李綱以為平江去建康不逺徒有退避之名不宜輕動具奏曰臣聞自昔用兵以成大業者必先固人心作士氣據地利而不肯先退盡人事而不肯先屈是以楚漢相距於滎陽成臯間高祖雖屢敗不退尺寸之地既割鴻溝羽引而東遂有垓下之變曹操袁紹戰於官渡操雖兵弱糧乏荀彧止其退避既焚紹輜重紹引而歸遂喪河北由是觀之今日之事豈可因一叛將之故望風怯敵遽自退屈果出此謀六飛回馭之後人情動搖莫有固志士氣銷縮莫有鬬心我退彼進使敵馬南渡得一邑則守一邑得一州則守一州得一路則守一路亂臣賊子黠吏姦氓從而附之虎踞鴟張雖欲如前日返駕還轅復立朝廷於荆棘瓦礫之中不可得也借使敵騎衝突不得已而權宜避之猶為有説今疆場未有驚急之報兵將初無不利之失朝廷正可懲往事修軍政審號令明賞罰益務固守而遽為此擾擾棄前功蹈後患以自趨於禍敗豈不重可惜哉戊戍帝議還臨安張守言建康自六朝為帝王都氣象雄偉且據都會以經理中原依險阻以捍禦強敵陛下席未及暖今又巡幸百司六軍有勤動之苦民力邦用有煩費之憂願少安於此以繫中原民心癸亥帝發建康戊寅帝至臨安自是始定都矣宋史紀事本末卷十四
