body:
  text: 宋史紀事本末卷十五明馮琦原編陳邦瞻增輯金人渡江南侵髙宗建炎三年六月金烏珠請大起燕雲河朔兵南侵金主烏竒邁從之是月遂陷磁州九月諜報金人治舟師將由海道窺浙遣韓世忠控守圌山福山冬十月金烏珠分兵南侵一自滁和入江東一自蘄黃入江西遂取夀春掠光州復陷黃州守臣趙令􅍲死之令􅍲燕懿王玄孫也金人陷江州時劉光世在江州日置酒髙會金兵渡江凡三日尚未之知及薄城下遂引兵遁趨南康知江州韓梠棄城走金人入城殺掠遂由大治趨洪州十一月乙巳朔金人犯廬州守臣李會以城降戊申金烏珠犯和州守臣李儔以城降己酉烏珠陷無為軍守臣李知幾棄城走丁巳金人陷臨江戊午陷臨江撫袁二州守臣俱降庚申金人陷真州壬戌金人陷溧水縣尉潘振死之癸亥金人陷太平州甲子杜充遣統制陳淬等及金人戰於馬家渡王􅊛先遁淬獨與戰死之金兵至廬陵太守楊淵棄城走時胡銓為舉子居薌城團結丁壯以保廬井乃自領民兵入城固守卒完其城辛未烏珠渡江入建康杜充叛降金時江浙倚重於充充日事誅殺且無制敵之方烏珠與李成合兵攻烏江充閉門不出統制嶽飛泣諫請視師充不從烏珠遂乘充無備由馬家渡渡江陷太平長驅至建康充渡江遁真州諸將怨充嚴刻欲乘其敗害之充聞不敢入營居長蘆寺烏珠遣人説之曰若降當封以中原如張邦昌故事充遂還建康與守臣陳邦之户部尚書李梲率官屬迎金師拜烏珠於馬首通判楊邦乂獨不肯屈膝以血大書衣裾曰寧作趙氏鬼不為他邦臣烏珠使人誘以官終不屈大罵求死遂殺之事聞贈直祕閣諡忠襄癸酉帝聞杜充敗謂呂頥浩曰事迫矣若何頥浩遂進航海之策其言曰敵兵多騎必不能乘舟襲我江浙地熱必不久留俟其退去復還二浙彼出我入彼入我出此兵家之奇也帝然之遂如明州甲戌韓世忠自鎮江退守江陰是月知徐州趙立聞詔諸路以兵勤王乃將兵三萬趨行在金人邀立於淮陰立麾下勸立不如還保徐州立奮怒嚼其齒曰回顧者斬於是率衆徑進與金人遇轉戰四十里至楚州城下立中箭貫兩頰口不能言以手指麾諸軍憩歇定方拔箭出之議者謂自燕山之役南兵未有如此之鏖戰者十二月丙子帝至明州辛巳金人攻常州守臣周杞遣赤心隊官劉晏擊之迎嶽飛移屯宜興盜郭吉聞飛來遁入湖飛遣王貴等追破之盡降其衆時烏珠將趨杭州遂進攻廣德軍飛聞之邀擊至廣德境中六戰皆捷擒其將王權駐軍鐘村將士無糧忍飢不敢擾民會金復遣兵攻常州飛復追至四戰皆捷於是廣德無援金人殺守臣張烈乙酉烏珠自廣德過獨松關見無戍者謂其下曰南朝若以羸兵數百守此吾豈能遽度哉遂犯臨安守臣康允之棄城走錢塘縣令朱蹕率弓手土軍前路拒戰兩中流矢猶奮勇而進力竭死之烏珠聞帝在明州遣阿里富勒琿帥精騎渡浙來追己丑帝乘樓船次定海縣留范宗尹趙鼎於明州以待金使又謂張俊曰若能扞敵成功當加王爵吕頥浩奏令從官以下各從便去帝曰士大夫當知義理豈可不扈從若然則朕所至乃同冦盜耳於是郎官以下多從衛癸巳帝舟次昌國縣戊戌金人犯越州安撫使李鄴以城降金人帕克巴守之衛士唐琦袖石伏道旁伺其出擊之不中被執帕克巴詰之琦曰欲碎爾首我即死為趙氏鬼耳帕克巴曰使人如此趙氏豈至是哉又問李鄴為帥尚以城降汝何人敢爾琦曰鄴為臣不忠恨不得手刃之尚言及斯人耶仍顧鄴曰我月給石米不肯悖其主汝享國厚恩乃至此豈人類哉詬罵不少屈帕克巴趣殺之至死不絶口四年春正月乙巳金人犯明州張俊及守臣劉洪道擊却之庚戌金人再犯明州張俊引兵遁去己未金人陷明州夜大雨震電乘勝破定海昌國以舟師來襲御舟追三百餘里弗及提領海舟張公裕引大舶擊却之金人引還辛酉帝發章安甲子泊溫州港口時金人既破江西諸郡乃引兵犯湖南遂陷潭州將吏王􅌔劉玠趙聿之戰死向子諲率兵奪門而出金兵遂大掠屠其城而去丙子金烏珠引兵北還至臨安縱火焚掠以輜重不能遵陸取道秀州而北庚寅帝次溫州時諸將無功翰林學士汪藻上言敵人之來諸將擁兵相望曾不能為陛下施矢鏃之勞獨張俊守明州僅能少抗若更堅守數日待敵再來乘其機會極力分戰敵若失利終身懲創不敢復南奈何敵未退數里間遽狼狽引去方其行也三尺童子知其不可以為敵性強愎不嬰其鋒猶懼屠戮況以致怨而去不增兵益戍反旋軍空城以挑之是前日之小捷乃莫大之禍也未幾果殘明州無噍類是殺明州一城生靈而陛下再有館頭之行者張俊使之也臣復痛念自秋以來陛下為宗社大計懼敵人之侵逼宵旰勞焦未嘗頃刻少安以建康京口九江皆要害之地當宿重兵故以杜充守建康韓世忠守京口劉光世守九江而以王􅊛𨽻杜充其措置非不盡善也若敵騎渡江充世忠􅊛并力扼其前光世掩其後可使奔北之不暇而世忠八九月間已掃鎮江所儲之資盡裝海舶焚其城郭為逃遁之計及杜充危急王􅊅劉光世亦偃然坐視不出一兵竟至陷沒臣竊觀今日諸將在古法當誅然不可盡誅也惟王􅊛本𨽻杜充充敗於前而􅊛不救此不可赦當先斬􅊛以令天下其他以次重行貶降使以功贖過庶幾國威少振敵人知忌不報辛卯金人陷秀州金遊騎至平江周望奔太湖守臣湯東野棄城遁烏珠入城縱火焚掠死者五十萬人三月壬子金人入常州守臣周祀棄城走丁巳金人至鎮江初韓世忠以前軍駐青龍鎮中軍駐江灣後軍駐海口欲俟烏珠師還擊之及烏珠由秀州趨平江世忠事不就遂移師鎮江以待之先以八千人屯焦山寺烏珠欲濟之乃遣使通問且約戰期世忠許之因謂諸將曰是間形勢無如金山龍王廟者敵必登之以覘我虛實乃遣蘇德將百人伏廟中岸側戒之曰聞江中鼓聲則岸兵先入廟兵繼出以合擊之及敵至果有五騎趨廟廟兵先鼓而出獲其兩騎其三騎振策以馳一人紅袍玉帶既墜復跳而免詰諸獲者則烏珠也既而接戰江中凡數十合世忠力戰妻梁氏親執桴鼓敵終不得濟俘獲甚衆擒烏珠之壻龍虎大王烏珠懼請盡歸所掠以假道世忠不許復益以名馬又不許遂自鎮江泝流西上烏珠循南岸世忠循北岸且戰且行世忠艨艟大艦出金師前後數里擊柝之聲達旦將至黃天蕩烏珠窘甚或曰老鸛河故道今雖湮塞若鑿之可通秦淮烏珠從之一夕渠成凡五十里遂趨建康嶽飛設伏牛頭山待之夜令百人黑衣混金營中擾之金兵驚自相攻擊烏珠次龍灣飛以騎兵三百步兵三千邀擊于新成大破之烏珠奔竄達蘭自濰州遣貝勒太一引兵來援烏珠乃復引還欲北渡世忠與之相持於黃天蕩太一軍江北烏珠軍江南世忠以海艦進泊金山下預以鐡綆貫大鉤授健者明旦敵舟譟而前世忠分海舟為兩道出其背每縋一綆則曵一舟沉之烏珠窮蹙求會語祈請甚哀世忠曰還我兩宫復我疆土則可以相全又數日求再會而言不遜世忠引弓欲射之烏珠亟馳去見海舟乘風使篷往來如飛謂其下曰南軍使船如使馬奈何乃募人獻破舟之策於是閩人王姓者教其舟中載土以平板鋪之穴船板以棹槳俟風息則出海舟無風不能動也且以火箭射其篛篷則不攻自破矣烏珠然之刑白馬以祭天及天霽風止烏珠以小舟出江世忠絶流擊之海舟無風不能動烏珠令善射者乘輕舟以火箭射之煙熖蔽天師遂大潰焚溺死者不可勝數世忠僅以身免奔還鎮江烏珠遂濟江屯於六合縣是役也世忠以八千人拒烏珠十萬之衆凡四十八日而敗然金人自是亦不敢復渡江矣夏四月金人犯江西者聞烏珠北還亦自荆門引去統制牛皋潛軍邀擊敗之于寶豐之宋村金達蘭圍楚州急趙立命撤廢屋城下然火池壯士持長矛以待金人登城鉤取投火中金人選死士突入又搏殺之乃稍引退至是烏珠將北歸以輜重假道于楚立斬其使烏珠怒乃設南北兩屯絶楚餉道九月金人攻楚州趙立遣人告急朝廷欲遣張俊救之俊辭不行乃命劉光世督淮南諸鎮救楚海州李彥光首以兵至淮河扼不得進光世諸將王德酈瓊多不用命惟嶽飛僅能為援而衆寡不敵帝覽立奏以書趣光世會者五光世迄不行金人知外援絶進攻東城立登磴道以觀飛􅀈中其首左右馳救之立曰我終不能為國殄賊矣言訖而絶金人疑立詐死不敢動越旬餘城始陷嶽飛亦自泰州引還苖劉之變建炎三年三月庚辰以朱勝非為尚書右僕射兼中書侍郎張浚駐平江辛巳葉夢得罷以王淵同僉書樞密院事吕頥浩為江東安撫制置使先是帝渡江劉光世見帝泣曰王淵專管江上海船每言緩急不誤今臣所部數萬騎二千餘不能濟淵忿其言斬江北都巡檢使皇甫佐以自解朱勝非馳見淵督之淵始經畫已無所及遂失諸將心至是僉樞制下諸將口語籍籍壬午詔王淵免進呈書押扈從統制苗傅自負世將以王淵驟得君遷顯職心忿不平劉正彥以招降劇盜功大賞薄懷怨二人因相結時內侍康履藍圭恃恩用事履尤妄作威福凌忽諸將諸將嫉之會內侍臨浙觀潮供帳遮道傅等怒曰汝輩使天子顛沛至此猶敢爾耶中大夫王世修亦嫉內侍恣橫言於正彥正彥曰會當共除之及王淵入樞府傅等疑其由內侍以進遂與世修謀先斬淵然後殺宦者議既定明日癸未值劉光世進殿前都指揮使百官入聽宣制傅正彥令世修伏兵城北橋下俟淵退朝即捽下馬誣以結宦者謀反正彥手斬淵即與傅擁兵至行宫門外梟淵首于行闕分捕內侍百餘皆殺之履馳入宫白帝帝大驚朱勝非急趨樓上詰傅等擅殺之故中軍統制吳湛排門引傅黨入內奏曰傅等不負國家正為天下除害耳知杭州康允之見事急請帝御樓撫諭之日將午帝登樓苗傅等望見黃蓋猶山呼而拜帝憑欄呼傅等問故傅厲聲對曰陛下信任中官賞罰不公軍士有功者不賞內侍所主者得官黃潛善汪伯彥誤國至此猶未逺竄王淵遇賊不戰首先渡江因交康履乃除樞密臣自陛下即位以來功多賞薄臣已將王淵斬首中官在外者皆誅訖更乞康履曾擇誅之以謝三軍帝曰潛善伯彥已降黜履擇當重與降責卿等可歸營傅曰天下生靈無辜肝腦塗地止緣中官擅權若不斬履擇臣不還營帝猶未許逾時傅兵不退帝不得已命湛執履與之傅即於樓下腰斬履臠其肉梟首與淵首相望帝遂以傅為慶逺軍承宣御營使都統制正彥渭州觀察使副都統制諭傅等歸營傅等進曰陛下不當即大位將來淵聖皇帝來歸未知何以處之帝命朱勝非縋樓下委曲諭之傅請隆祐太后同聽政及遣人使金議和帝許之即下詔請隆祐太后垂簾傅等聞詔不拜曰自有皇太子可立况道君皇帝已有故事勝非還白帝帝曰朕當退避但須太后手詔也乃遣顔岐入內請太后御樓太后至帝立楹側從官請帝坐帝曰不當坐此矣太后因乘肩輿下樓出門見傅等諭之曰自道君皇帝任蔡京王黼更祖宗法度童貫起邊事所以招致金人養成今日之禍豈關今上皇帝事况皇帝初無失德止為黃潛善汪伯彥所誤今已竄逐統制豈不知之傅等對曰臣等必欲太后為天下主奉皇子為帝后曰今強敵在前吾以一婦人抱三嵗兒決事何以令天下敵國聞之豈不轉加輕侮傅等不從后顧勝非曰今日政須大臣果決相公何無一言勝非還白帝曰傅等腹心有王鈞甫者適語臣云二將忠有餘而學不足此語可為後圖之緒帝即坐上作詔禪位于皇子請太后同聽政宣詔畢傅等麾其軍退於是皇子敷即位太后垂簾決事是夕帝移御顯寧寺甲申尊帝為睿聖仁孝皇帝以顯寧寺為睿聖宫大赦以張澄兼中書侍郎韓世忠為御營使司提舉一行事務張俊為秦鳯副總管分其衆𨽻諸軍丁亥分竄內侍藍圭曾擇等于嶺南諸州傅追還殺之戊子以王孝迪為中書侍郎盧益為尚書左丞加傅為武當軍節度使正彥為武成軍節度使以吳湛主管步軍司王孝迪盧益為大金國信使朱勝非奏母后垂簾須二人同對此承平故事今日事機須密奏者乞許臣僚獨對而日引傅黨二人上殿以弭其疑太后語帝曰賴相此人若汪黃在位事已狼籍矣傅等欲挾帝幸徽越勝非諭之以禍福乃止己丑改元明受赦書至平江張浚命守臣湯東野祕不宣既而得苗傅等所傳檄浚慟哭召東野及提刑趙哲謀起兵討之時傅令張俊以三百人赴秦鳯而以餘兵屬他將俊知其偽拒不受軍士洶洶俊諭之曰當詣張侍郎決之即引所部八千人至平江浚見俊語故相持而泣且諭俊以決策起兵問罪俊泣拜曰此須侍郎濟以機術母驚動乘輿也赦至江寧吕頥浩曰是必有兵變其子抗曰主上春秋鼎盛二帝蒙塵沙漠日望拯救其肯遽遜位于幼沖乎灼知兵變無疑也即遣人寓書于浚會諫議大夫張玨所親謝嚮變姓名微服為賈人徒步如平江見浚等具言城中事以為嚴設兵備大張聲𫝑持重緩進使賊自遁無驚動三宫此上策也浚以頥浩有威望能斷大事乃答書約共起兵且告劉光世于鎮江令以兵來會頥浩得書因上書請睿聖復辟癸巳張浚命節制司參議官辛道宗措置海舶又念傅等居中欲得辨士往説之遣布衣馮轓持書説傳正彥轓至杭浚命張俊分兵扼吳江上疏請睿聖復辟苗傅等謀除浚禮部尚書命將所部詣行在浚以大兵未集未敢誦言討賊乃託云張俊驟回人情震讋不可不少留以撫其軍甲午吕頥浩率勤王兵萬人發江寧乙未劉光世部兵會吕頥浩于丹陽丙申韓世忠自鹽城收散卒由海道將赴行在至常熟張俊聞之曰世忠來事濟矣因白浚以書招之世忠得書以酒酬地曰誓不與此賊共戴天至平江見浚慟哭曰今日之事世忠願與張俊任之公無憂也浚因大犒俊世忠將士衆皆感憤於是令世忠帥兵赴闕戒曰投鼠忌器事不可急急恐有他變宜趨秀州據糧道以俟大軍之至世忠發平江至秀州稱病不行而大修戰具傅等聞之始懼欲拘世忠妻子以為質朱勝非紿傅曰不若遣之使迓世忠而慰撫之則平江諸人益安矣傅從之乃白太后封世忠妻梁氏為安國夫人俾迓世忠梁氏疾馳出城一日夜會世忠于秀州勝非喜曰二凶真無能為也張浚復遣馮轓往杭因報書于正彥曰自古言涉不順謂之指斥乘輿事涉不遜謂之震驚宫闕廢立之事謂之大逆不道大逆不道者族今建炎皇帝不聞失德一旦遜位豈所宜聞傅等得書而恐辛丑苗傅等以韓世忠為定國軍節度使張俊為武寧軍節度使知鳯翔府而誣張浚欲謀危社稷謫黃州團練副使郴州安置俊等皆不受傅遣苗瑀馬柔吉將重兵扼臨平拒勤王兵壬寅吕頥浩將至平江張浚乘輕舟迓之咨以大計頥浩曰曩諌開邊幾死宦臣之手承乏漕挽幾陷腥羶之域今事不諧不過赤族為社稷死豈不快乎浚壯其言既而劉光世兵亦至癸卯吕頥浩張浚傳檄中外聲苗傅劉正彥之罪以韓世忠為前軍張俊翼之劉光世為遊擊頥浩浚總中軍光世分兵殿後討之乙巳太后降旨睿聖皇帝處分兵馬重事丙午以張浚同知樞密院事李邴鄭瑴並同僉書院事張浚吕頥浩發平江丁未次吳江上疏乞建炎皇帝還即位傅正彥等聞之憂恐不知所為朱勝非謂之曰勤王之師未進者使是間自反正耳不然下詔率百官六軍請帝還宫公等置身何地乎即召李邴張守作百官章及太后手詔賜傅正彥鐵劵傅等遂率百官朝于睿聖宫帝慰勞之傅正彥以手加額曰聖天子度量如是也傅黨張逵曰趙氏安苗氏危矣夏四月太后下詔還政帝復位與太后御前殿垂簾詔尊太后為隆祐皇太后己酉以苗傅為淮西制置使劉正彥副之庚戌復紀年建炎張浚知樞密院事苗傅劉正彥並檢校少保吕頥浩張浚軍次秀州頥浩諭諸將曰今雖反正而賊猶握兵居內事若不濟必反以惡名加我翟義徐敬業可監也進次臨平苗翊馬柔吉負山阻為陳中流植鹿角以梗行舟韓世忠舍舟力戰張俊劉光世繼之翊衆少却世忠復舍馬操戈而前令將士曰今日當以死報國面不被數矢者皆斬於是士卒爭用命翊引神臂弩持滿以待世忠瞋目大呼挺刃突前翊衆辟易矢不及發遂敗走勤王兵入北闕傅正彥急趣都堂取鐵劵擁精兵二千遂開湧金門夜遁犯富陽新城將南趨閩中統制王德喬仲福追之辛亥皇太后徹簾頥浩浚等入城世忠手執王世修以屬吏浚等見帝伏地涕泣待罪帝慰勞再三謂浚曰曩在睿聖兩宫隔絶一日啜羮忽聞貶卿不覺覆手念卿被謫此事誰任解所服玉帶賜之帝握世忠手慟哭曰中軍統制吳湛佐逆為最尚留朕肘腋能先誅乎世忠即謁湛握手與語折其中指與王世修俱斬于市逆黨王元左言馬瑗范仲熊時希孟皆貶癸丑右相朱勝非及執政顔岐王孝迪張澄路允迪盧益罷初朱勝非見帝曰臣昔遇變義當即死偷生至此欲圖今日之事耳因乞罷政帝問誰可代者對曰吕頥浩張浚帝問孰優對曰頥浩練事而暴浚喜事而疏帝曰浚太年少對曰臣向被召軍旅錢穀悉付浚此舉浚實主之中丞張守論勝非不能預防致賊猖獗宜罷之不報至是與顔岐等俱罷初張浚在秀州議舉勤王之師一夕獨坐從者皆寢忽一人持刃立燭後浚知為刺客徐問曰豈非苗傅劉正彥遣汝來殺我乎曰然浚曰若是則取吾首以去可也曰我亦知書寧肯為賊用况公忠義如此豈忍害公恐公防間不嚴有繼至者故來相告爾浚問欲金帛乎笑曰殺公何患無財然則留事我乎曰我有老母在河北未可留也問其姓名俯而不答攝衣躍而登屋屋瓦無聲時方月明去如飛明日浚命取死囚斬之曰夜來獲姦細浚後嘗於河北物色之不可得以吕頥浩為尚書右僕射兼中書侍郎李邴為尚書右丞鄭玨僉書樞密院事甲寅以劉光世為御營副使韓世忠張浚為御前左右軍都統制凡勤王僚屬將佐各進官有差五月韓世忠言苗傅劉正彥擁精兵距甌閩甚邇儻成巢穴卒未可滅帝詔世忠與劉光世追討之世忠自衢信進至浦城之魚梁驛與賊遇世忠步走挺戈而前賊望見咋曰此韓將軍也皆驚潰遂擒正彥及傅弟翊王德亦執苗瑀斬馬柔吉傅亡入建陽縣人詹標執之獻于世忠悉械送行在帝手書忠勇二字揭旗以賜世忠秋七月辛巳苗傅劉正彥伏誅甲申詔以苖劉之變當軸大臣不能身衛社稷朱勝非顔岐並落職張澄衡州居住丁亥皇太子敷卒太子從幸建康屬疾宫人蹴地上金爐有聲驚悸疾轉劇遂不起初張浚以敷嘗姦帝位議去之至是竟連其保毋置死壬辰范瓊伏誅初汴京破二帝及宗室北遷多瓊之謀又乘時剽掠左右張邦昌為之從衛至是自洪州入朝悖慢無禮且乞貸苗劉等死帝畏其威以為御營司提舉一行事務張浚將赴川陜與樞密檢詳文字劉子羽密謀誅之一日命張俊以千兵渡江若備他盜者使皆甲而來因召瓊俊及劉光世赴都堂議事為設食食已諸公相顧未發子羽詣廡下恐瓊覺取黃紙趨前舉以麾瓊曰瓊下有敕可詣大理寺置對瓊愕不知所為子羽顧左右擁至輿中衛以俊兵送獄光世出撫其衆數瓊在圍城中附金迫二帝北狩之罪且曰誅止瓊爾汝等固天子自將之軍也衆皆投刃曰諾有旨分𨽻御營五軍瓊下獄具伏賜死子弟皆流嶺南平羣盜髙宗建炎元年秋七月命都統制王淵劉光世韓世忠張俊分討江淮羣盜自宣和末羣盜蜂起至是祝靖薛廣黨忠閻僅王存之徒皆招安赴行在李綱言今日正當因其力而用之如銅馬緑林黃巾之比然不移其部曲則易叛而徙之則生疑正當以術制之使由而不知乃命御營司分揀凡潰兵願歸營與良農願歸業者皆聽所發至數萬其他以新法團結分𨽻諸將由是無叛去者獨淮寧之杜用山東之李昱河北之丁順皆擁兵數萬而拱州之黎驛單州之魚臺皆有潰卒數千為亂綱以招安則彼無畏憚勢難遽平乃白遣淵等分討之既而光世遣部將擊李昱斬之淵殺杜用丁順赴河北招討司自效盜自是少衰八月戊午勝捷軍校陳通作亂於杭州執帥臣葉夢得殺轉運判官吳昉等尋詔王淵兼領杭州制置盜賊使以討之冬十月丙戌王淵誘賊趙萬誅之十一月軍賊張遇陷池州遇本真定軍校聚衆為盜自淮西渡江水陸並進至是犯池州入城縱掠驅強壯以益其軍守臣滕祜棄城遁軍賊丁進圍壽春府守臣康允之拒却之十二月王淵討杭州亂卒陳通等誅之丙寅張遇犯江州辛巳丁進詣宗澤降二年春正月東平軍校孔彥舟聞金兵將至山東遂帥所部劫殺居民燒廬舍掠財物南渡淮犯黃州守臣趙令􅍲拒之丁未詔諭流兵潰兵之為盜賊者釋其罪辛亥王淵招降張遇以所部萬人𨽻韓世忠五月己酉秀州卒徐明等作亂執守臣朱芾迎前守趙叔近復領州事詔命御營中軍張俊討之六月癸亥建州卒葉濃等作亂冦福州乙丑張俊至秀州殺趙叔近執徐明斬之甲戌葉濃陷福州秋七月甲申葉濃入寧德縣復還建州命張俊同兩浙提刑獄趙哲率兵討之八月河北京東捉殺使李成叛犯宿州詔江淮制置使劉光世討之光世至光州大破成衆招降二萬餘人成遁去九月丁進叛復冦淮西冬十月楊進復叛衆至數萬剽掠汝洛間翟進患之與其兄興謀擊之未果楊進遣騎數百絶洛水犯進營進乘半渡擊之追奔數十里至鳴皋山破賊四寨馬驚墜塹為賊所殺賊乘勝大敗官軍詔以興為京西北路安撫招討使劉正彥擊丁進降之十一月濱州賊蓋進陷棣州守臣薑綱之死之建州賊葉濃降復謀為變張俊擒斬之吳玠襲史斌斬之史斌圍興元不克引兵趨關中義兵統領張宗誘斌還長安欲徐圖之曲端怒宗遣玠襲斬斌而自襲宗殺之三年春正月庚子盜張用王善復叛冦淮寧用善駐京西連亘數州自京西至光壽據千里之地兵馬接迹不斷虜掠糧食所至一空二月帝出手詔以弭盜保民之要訪于直學士胡交修交修疏言昔人謂甑有麥飯牀有故絮雖儀秦説之不能使為盜惟其凍餒無聊日與死迫然後忍以其身棄之於盜賊陛下下寬大之詔開其自新之路禁苛刻之暴豐其衣食之源則悔悟者更相告語歡呼而歸其不變者黨與携落亦為吏士所捕獲而盜可弭盜弭則可以保民矣沃野千里殘為盜區皆吾粳稻之地操弓矢帶刀劍推牛發塜白晝為盜皆吾南畝之民陛下撫而納之反其田里無急征暴斂啓其不肖之心耕桑以時各安其業穀帛不可勝用而財可豐財豐則可以裕國矣日者翟興連西路董平據南楚什伍其人為農為兵不數年積粟充牣雄視一方盜賊猶能爾况以中興二百郡地欲強兵以禦冦不能為翟興輩之所為乎世以為名言三月盜邵青掠泗州青本五丈河舟人去為盜聚兵劫楚泗州夏四月盜薛慶據髙郵有衆數萬張浚恐其滋蔓請往招之入慶壘諭以朝廷恩意慶感服遂降浚留撫其衆秋七月山東盜郭仲威掠淮陽軍仲威本李成之黨成先在泗上仲威乃引兵圍淮陽凡四月城陷仲威入城大掠取強壯以充軍冬十月郭仲威降于平江守臣周望李成掠淮北陷泗州殺知州耿堅據其城帝降詔撫諭之命成知泗州成復陷滁州守臣向子伋及諸官屬皆被殺十一月淮盜劉忠初聚兵于東京自蘄轉入湖南遂陷舒州通判孫知微死之京西制置使程千秋軍襄陽招降劇盜曹端桑仲未幾疑仲有異命端圖之端及千秋所部俱為仲所敗千秋棄城自金州入蜀仲遂據襄陽京西列城皆為仲有十二月孔彥舟犯荆南詔諭降之以為湖北捉殺使四年二月金人去潭州羣盜大起鼎州人鍾相嘗以左道惑衆因結集忠義以捍賊為名自稱楚王改元天載冦澧州陷之李成入舒州三月孔彥舟獲盜鍾相及其子子昻檻送行在誅之其黨楊大復聚衆于龍陽己巳盜戚方陷廣德軍初韓世忠退保江陰潰卒戚方等遂趨鎮江劫知府胡唐老部衆以行唐老怒罵不從遇害五月以翟興等為京湖淮南諸路鎮撫使分地處之時京東西荆湖南北淮南諸路盜賊蜂起大者數萬人據有州郡朝廷不能制范宗尹言于帝曰羣盜皆烏合之衆急之則併死力以拒官軍莫若析地以處之盜有所歸則可以漸制帝善之乃以翟興等並為鎮撫使分地卑焉翟興河南府孟汝唐州趙立楚泗州漣水軍劉位滁濠州趙霖和州無為軍李成舒蘄州吳翊光黃州李彥先海州淮陽軍薛慶髙郵天長軍未幾又授陳規德安府復州漢陽軍解潛荆南府歸陝州荆門公安軍程昌宇鼎澧州陳求道襄陽府鄧隨郢州范之才金均房州馮長寧順昌府蔡州軍翟興聽便宜從事俾立顯功許以世襲然李成薛慶輩起于羣盜翟興劉位土豪李彥先等皆潰將既無統屬有急又不遣援故諸鎮鮮能自守未幾求道與劉忠戰敗沒又命孔彥舟為辰沅靖州郭仲威為真陽鎮撫使六月甲申嶽飛破戚方于廣德丙戌戚方降于張俊秋七月建州民范汝為作亂時方艱食民從者甚衆州遣兵出戰為所敗賊勢滋盛統制李捧捕之軍大潰而遁詔福建安撫使程邁會兵進討時汝為己破建陽乃移命神武副軍統制辛企宗討之冬十月江東賊張琪犯建康府虔州賊李敦仁及弟世雄破石城縣鍾相王善餘黨楊祝友復作亂十一月以王彥為金均房州鎮撫使時所在盜起加以飢饉無所資食惟蜀富饒巨盜往往窺覬桑仲既陷均房遂乘勢直搗金州白土關衆號三十萬仲彥舊部曲也以申牘請於彥曰仲於公無敢犯願假道入蜀就食耳彥遣統領閔立為先鋒擊之賊鋭甚立戰死將士失色或請避之彥叱曰樞相張公方有事關陜若仲越金而至梁洋則腹背受敵大事去矣敢言避者斬即勒兵趨長沙平阻水據山設伏以待仲見官軍少蟻附搏戰彥執幟一麾士殊死鬭仲敗走彥休士進擊追奔至白磧遂復房州紹興元年春正月孔彥舟據武陵張用據襄漢李成據江淮湖湘十餘郡連兵數萬有席卷東南之意多造符讖幻惑中外久圍江州朝廷患之以張俊為招討使嶽飛副之李成陷江州未幾復陷筠州三月張俊聞李成將馬進在筠州以豫章介江湖之間遂急趨之既入城喜曰我已得洪破賊決矣及進犯洪州連營西山俊斂兵若無人者居月餘進以大書牒索戰俊以細書狀報之進以俊為怯嶽飛曰賊貪而不慮後若以騎兵自上流絶生米渡出其不意破之必矣因請自為先鋒俊大喜乃令楊沂中絶生米渡飛重鎧躍馬潛出賊右突其陳所部從之進大敗走筠州飛抵東城進出城布陳飛設伏以紅羅為幟上刺嶽字選騎二百隨幟而前賊易其少薄之伏發進大敗走飛使人呼曰不從賊者坐吾不汝殺坐而降者八萬人俊與沂中復前後夾擊賊大潰進以餘卒奔南康飛夜引兵至朱家山又斬其將趙萬成成聞進敗自引兵十餘萬來飛遇於樓子莊大破之追斬進遂復筠州成復以十萬衆與俊夾河而營沂中夜銜枚渡河與俊夾攻成又大敗俊乘勝追至江州成勢迫絶江而去走蘄州降于偽齊已而興國軍等處羣盜皆遁五月劉光世使都統制王德襲揚州擒郭仲威送行在斬之時仲威謀據淮南以通劉豫故也辛亥水軍統制邵青叛圍太平州劉光世招降之張俊引兵渡江追李成至蘄州黃梅縣大敗之其衆數萬皆潰成北走降劉豫張用復冦江西嶽飛與用俱相人以書諭之曰吾與汝同里欲戰則出不戰則降用得書遂帥衆降江淮悉平張俊奏飛功第一詔進飛右軍都統制屯洪州彈壓盜賊六月邵青復叛犯江隂之福山遣海州鎮撫使李彥進中軍統制耿進率舟師會劉光世討之冬十月邵青聚其黨于崇明沙將犯江隂劉光世令王德討之德執旗麾兵拔柵以入青衆大潰翊日餘黨復索戰諜言賊將用火牛德笑曰此古法也可一不可再命合軍持滿陳始交萬矢齊發牛皆返奔賊衆殱焉青自縛請命德獻諸行在餘黨悉平十二月盜曹成陷道州成初陷漢陽鄂州屯攸縣湖東安撫向子諲招之成聽命子諲遣兵扼衡陽欲圖之而援兵不至成忿子諲扼已即擁衆而南官軍悉潰成大掠執子諲而去二年春正月辛丑韓世忠聞范汝為入建州曰建居閩嶺上流賊沿流而下七郡皆血肉矣亟率步卒三萬水陸益進直抵鳯凰山五日破之汝為自焚死斬其二弟嶽吉以徇擒其謀主謝嚮施逵及禆將陸必強等五百餘人世忠初欲盡誅建民李綱自福州馳見世忠曰建民多無辜世忠乃令軍士駐城上聽民自别農給牛穀商賈弛征禁脅從者汰遣獨取附賊者誅之民感更生家為立祠捷聞帝曰雖古名將何以加世忠因進討江西湖廣諸盜二月庚午以李綱為湖廣宣撫使仍命嶽飛等共討曹成丁丑分降盜崔增李捧邵青趙延壽李振單德忠徐文所部兵為七賜名御前忠鋭軍𨽻步軍司非樞密奉旨不許調遣閏四月曹成擁衆十餘萬由江西厯湖湘據道賀二州命嶽飛權知潭州兼權荆湖東路安撫都總管付金字牌黃旗招成成聞飛至驚曰嶽家軍來矣即遁飛追至賀州力戰大破之成乃自桂嶺置寨至北藏嶺連控隘道以衆十餘萬守蓬頭嶺丙午嶽飛八千人登桂嶺破曹成成奔連州飛謂部將張憲徐慶王貴曰成黨散去追而殺之則脅從者可憫縱之則復聚為盜今遣若等誅其酋而撫其衆慎勿妄殺纍上保民之仁於是憲自賀連慶自邵道貴自郴桂招降者二萬與飛會連州進兵追成成走入邵州五月韓世忠招曹成降之世忠既平范汝為旋師永嘉若將休息者忽由處信徑至豫章連營江邊數十里羣賊不虞其至大驚世忠因使董攸招成成方為嶽飛所追乃率衆降得戰士八萬遣詣行在六月孔彥舟叛降劉豫彥舟暴橫不法朝廷將以兵執之遂以所部叛去九月韓世忠大敗劉忠于蘄陽世忠自豫章移師長沙劉忠有衆數萬據白面山營柵相望世忠至與賊對壘奕碁張飲堅壁不動衆莫能測一夕與蘇格聯騎穿賊營候者訶問世忠先得賊軍號隨聲應之周覽以出喜曰此天賜也夜伏精兵二千於山下與諸將拔營而進賊方迎戰伏兵已馳入中軍奪望樓植旗蓋傳呼如雷賊回顧驚潰世忠麾將士夾擊大破之忠走降劉豫十一月甲戌命李綱劉洪道程昌宇解潛會兵討湖冦綱至潭州湖南流民潰卒羣聚為盜者數萬人綱悉平之王彥守金州數立竒功以捍蜀桑仲既死劇盜王闢董貴祁守忠等悉阻兵窺蜀彥皆擊平之三年夏四月詔統制王􅊅會兵討楊太時太衆日盛自號大聖天王立鍾相少子儀為太子太以下皆臣事之太又名么蓋楚人謂年少者為么云六月己酉嶽飛自虔州班師時虔吉盜連兵寇掠循梅廣惠英韶南雄南安建昌邵武汀諸州帝專命飛平之飛至虔固石洞賊彭友悉衆至雩都迎戰躍馬馳突飛揮兵即馬上擒之餘黨退保固石洞洞髙峻環水止一徑可入飛列騎山下令皆持滿黎明遣死士疾馳登山賊衆亂棄山而下騎兵圍之賊呼丐命飛令勿殺受其降因授徐慶方略捕諸郡餘賊皆破降之初帝以隆祐太后震驚之故密令飛屠虔城飛請誅首惡而赦脅從帝許焉虔人感其德繪像祠之及入見帝手書精忠嶽飛字製旗以賜之冬十月李成冦襄鄧李橫奔荆南成遂陷京西六郡四年五月庚戌朔以嶽飛兼荆南制置使時楊太與劉豫通欲順流而下李成既據襄陽又欲自江西陸行趨浙與太會帝命飛為之備朱勝非言襄陽國之上流不可不急取飛亦奏襄陽等六郡為恢復中原基本今當先取六郡以除心膂之病李成逺遁然後加兵湖湘以殄羣盜帝以語趙鼎鼎曰知上流利害無如飛者遂有是除飛渡江中流顧幕屬曰飛不擒賊不涉此江秋七月飛復襄陽等六郡先是飛至郢偽齊將京超號萬人敵乘城拒飛飛鼓衆而登超投崖死飛復郢州遂趨襄陽李成迎戰左臨襄江飛笑曰步兵利險阻騎兵利平曠成左列騎江岸右列步平地雖衆十萬何能為舉鞭指王貴曰爾以長槍步卒擊其騎兵指牛皋曰爾以騎兵擊其步卒合戰馬應槍而斃後騎皆擁入江步卒死者無數成夜遁飛遂復襄陽偽齊收成餘衆益兵屯新野飛與别將王萬夾擊大敗之又使牛皋復隨郢王貴張憲復唐鄧州信陽軍襄漢悉平飛移屯德安軍聲大振捷聞帝喜曰朕素聞飛行軍有紀律未知其能破敵如此飛因奏金兵所愛惟子女玉帛志已驕惰劉豫僣偽人心終不忘宋如以精兵二十萬直搗中原恢復故疆誠易為力襄陽隨郢地皆膏腴茍行營田其利甚厚臣俟糧足即過江北𠞰敵時方重深入之舉而營田之議自是興矣八月王􅊅遣忠鋭統制崔增等討楊太于鼎江師敗皆沒太乘大水出兵攻破鼎州社木寨守將許筌戰沒官軍死者甚衆於是授嶽飛清逺軍節度使代􅊅討太飛時年三十二中興諸將建節未有如飛之年少者五年六月嶽飛大破楊太于洞庭初飛奉命討太而所部皆西北人不習水戰飛曰兵何常顧用之何如耳乃先遣使招諭之賊黨黃佐曰嶽節使號令如山若與之戰萬無生理不如往降節使誠信必善遇我遂降飛表授佐武義大夫單騎按其部拊佐背曰子知逆順者果能立功封侯豈足道欲復遣子歸湖中視其可勝者擒之可勸者招之如何佐感泣誓以死報時張浚以都督軍事至潭州參政席益疑飛玩冦欲以聞浚曰嶽侯忠孝人也兵有深機胡可易言益慙而止黃佐襲周倫寨殺倫飛上其功遷武功大夫統制任士安不稟王􅊅令軍以此無功飛鞭士安使餌賊曰三日賊不平斬爾士安出宣言嶽太尉兵二十萬至矣賊見止士安軍併力攻之飛設伏士安戰急伏四起擊賊賊走會朝旨召張浚還防秋飛袖小圖示浚浚欲俟來年議之飛曰已有定畫都督能少留不八日可破賊浚曰何言之易飛曰王四廂以王師攻水冦則難飛以水冦攻水冦則易水戰我短彼長以所短攻所長是以難若因敵將用敵兵奪其手足之助離其腹心之托使孤立而後以王師乘之八日之內當俘諸酋浚許之飛遂如鼎州黃佐招楊欽來降飛喜曰楊欽驍悍既降賊腹心潰矣表授欽武義大夫禮遇甚厚乃復遣歸湖中兩日欽説全琮劉詵來降飛詭罵欽曰賊不盡降何來也杖之復令入湖是夜掩賊營降其衆數萬太負固不服方浮舟湖中以輪激水其行如飛旁置撞竿官舟迎之輒碎飛伐君山木為巨筏塞諸港汊又以腐木亂草浮上流而下擇水淺處遣善罵者挑之且行且罵賊怒來追則草木壅積舟輪礙不行飛急擊之賊奔港中為筏所拒官軍乘筏張牛革以蔽矢石舉巨木撞其舟盡壞太技窮赴水牛皋擒斬之飛入賊壘餘酋驚曰何神也俱請降衆凡二十餘萬飛親行諸寨慰撫之縱老弱歸田籍少壯為軍果八日而捷書至潭浚嘆曰嶽侯神算也黃誠取楊太首挾鍾子儀周倫詣浚降湖湘悉平初太據洞庭恃其險陸耕水戰樓船十餘丈官軍仰視不得近飛謀益造大舟薛弼為湖南運判謂飛曰若是則未可以嵗月勝矣且彼之所長可避而不可鬬也今大旱湖水落洪若重購舟首勿與戰連筏斷江路藁其上流使彼之長坐廢而精騎直搗其壘則破壞在目前矣飛曰善遂用其策決勝於八日之間先是太自以陸攻則入湖水攻則登岸嘗曰欲犯我者除是飛來至是人以其言為讖云金人立劉豫髙宗建炎二年春正月以劉豫知濟南府豫景州人為河北提刑金人南侵豫棄官奔真州張慤薦之起知濟南時盜起山東豫不願行請易東南一郡執政不許豫忿而去十二月庚申金人陷東平府又攻濟南府劉豫遣子麟出戰敵縱兵圍之數重郡倅張東益兵來援却之達蘭遣人啖豫以利豫遂殺濟南驍將關勝率百姓降金百姓不從豫縋城歸于達蘭三年三月金人陷京東諸郡以劉豫知東平府金界舊河以南俾豫統之又以豫子麟知濟南府四年九月戊申金立劉豫為齊帝初金主聞帝如東南遣尼瑪哈南伐諭之曰俟宋平當援立藩輔如張邦昌者及烏珠北還衆議折可求劉豫皆可立豫以重寶賂達蘭請立已達蘭許之乃言于尼瑪哈未之許髙慶裔説之曰吾家舉兵只欲取兩河故汴京既得則立張邦昌今河南州郡官制不易者豈非欲循邦昌故事耶元帥曷不早建議而使恩歸他人也尼瑪哈從之乃遣使即豫所部咨軍民所宜立者衆未及對豫鄉人張浹請立豫議遂定達蘭以聞於是金乃遣慶裔及知制誥韓昉備璽綬寶册立豫為大齊皇帝世修子禮奉金正朔置丞相以下官豫即位都大名府以張孝純為丞相李孝揚為左丞張東為右丞鄭億年為工部侍郎李儔為監察御史王瓊為汴京留守子麟為提領諸路兵馬兼知濟南府弟益為北京留守册其母翟氏為皇太后妾錢氏為皇后改明年為阜昌元年朝廷聞之凡偽仕於豫而其家屬之在東南者悉厚加撫恤博州判官劉長孺以書勸豫反正豫囚之紹興元年六月劉豫置招討司于宿州誘宋逋逃十二月金以陝西地卑劉豫於是中原盡屬於豫二年夏四月庚寅劉豫徙居汴豫至汴尊其祖考為帝置于宋太廟是日暴風捲旗屋瓦皆振士民大懼時河南山東陜西皆屯金軍劉麟籍鄉兵十餘萬為皇太子府軍分置河南汴京淘沙官兩京塜墓發掘殆盡賦斂煩苛民不聊生先是襄陽鎮撫使柔仲上疏請正劉豫罪朝廷尋命仲兼節制應援京城軍馬量度事勢復豫所陷州郡仍命河南翟興荆南解潛金房王彥德安陳規蘄黃孔彥舟盧壽王亨相為應援未幾仲為其下所殺翟興進屯伊陽山豫患之使人招興許以王爵興焚偽詔併戮其使豫乃陰結興麾下楊偉圖之偉殺興持興首降豫十二月李橫敗劉豫兵於陽石乘勝趨汝州偽守彭玘以城降三年春正月庚申李橫破頴順軍偽守蘭和降壬戌敗偽兵于長葛甲子李橫引兵至頴昌府偽安撫趙弼固守橫急攻下之弼遁復頴昌二月統制李吉敗劉豫將梁進於伊陽臺殪之三月劉豫聞李橫入頴昌求援于金金遣烏珠赴之豫亦遣將李成率兵二萬逆戰于京城西北之牟駝岡橫敗績復陷頴昌夏四月劉豫陷虢州獲統制官謝皋皋指腹示賊曰此吾赤心也自剖心以死水軍都統制徐文以衆叛降劉豫文勇力過人揮刀重五十斤所向無前衆呼為徐大刀以功為淮東浙西沿海水軍都統制諸將忌之譛其將叛朝廷遣兵襲之文遂以所部海舟六十艘官軍四千餘自明州浮海抵鹽城降于豫且曰沿海無備二浙可襲也豫大喜以文知萊州令帥其衆冦通泰州五月朝廷遣韓肖胄胡松年使偽齊劉豫欲以臣禮見肖胄無以應松年曰均為宋臣遂長揖不拜豫不能屈因問帝意所向松年曰必欲復故疆耳豫大沮詔李橫等班師還鎮禁邊兵侵齊以與金議和也十一月金人遣李永壽王翊來永壽等驕倨請還豫俘及西北士民之流寓者復要畫江以益豫翰林學士綦宗禮言豫父子倚重金人且永壽等從豫所來畫江之請必出於豫觀其姦謀在窺吾境土恐既通使人情必懈弛宜戒將帥嚴為之備四年夏四月熙河路總管關師古與劉豫兵戰于左要嶺敗績遂降賊洮岷之地盡歸豫九月劉豫使其子麟以金兵入冦先是金主晟與尼瑪哈議南侵會烏珠還力言不可曰江南卑濕今士馬困憊糧儲未豐足恐無成功尼瑪哈曰都監務偷安耳金主以議不合乃止至是豫聞嶽飛復襄鄧懼遂乞師于金晟乃命鄂爾多達蘭調渤海漢軍五萬以應豫謂烏珠知地險易使將前軍豫遣其子麟姪猊各將兵分道南侵騎兵自泗攻滁步兵自楚攻承州冬十月丙子詔韓世忠屯楊州初金兵渡淮世忠自承州退保鎮江至是奉詔感泣曰主憂如此臣子何以生為遂濟師進屯揚州時張浚在福州慮金齊必併力窺東南而朝廷已議講解因上疏極言其狀及兵至帝思其言會趙鼎勸帝親征帝從之喻樗謂鼎曰六龍臨江兵氣百倍然公自度此舉果出萬全乎或姑試一擲也鼎曰中國纍年退避不振敵情益驕義不可更屈故贊上行耳若事之濟否則非鼎所能逆知也樗曰然則當思歸路耳張德遠有重望若使宣撫江淮荆浙福建俾以諸道兵赴闕則其來路即朝廷歸路也鼎然之入言于帝遂召浚還戊子韓世忠至揚州使統制解元守承州候金步卒親提騎兵至大儀以當敵騎伐木為柵自斷歸路會魏良臣使金過之世忠撤炊㸑紿良臣有詔移屯平江良臣疾馳去世忠度良臣已出境即上馬令軍中曰視吾鞭所嚮於是移軍復向大儀勒五陳設伏二十餘所約聞鼓即起擊良臣至金軍中金前將軍鼐爾貝勒問官軍動息具以所見對貝勒大喜即引兵至江口距大儀五里别將托卜嘉擁鐵騎過五陳東世忠傳小麾鳴鼓伏兵四起旗色與金人雜出金軍亂官軍迭進世忠令背嵬軍各持長斧上揕人胸下斫馬足敵被甲陷泥淖世宗麾徑騎四面蹂躪人馬俱斃遂擒撻不野等二百餘人而世忠所遣董攸亦擊敗金人于天長之鴉口橋己丑金人攻承州解元遇敵于州之北門設水軍夾河陳一日十三戰相拒未決世忠遣成閔將騎士往援復大戰俘獲甚多世忠復親追至淮金人驚潰相蹈籍溺死者甚衆捷聞羣臣入賀帝曰世忠忠勇朕知其必能成功沈與求曰自建炎以來將士未嘗與金人迎敵今世忠連捷厥功不細論者以此舉為中興武功第一金齊之兵曰迫羣臣復勸帝他幸散百司以避之張浚曰避將安之惟進禦乃可耳趙鼎曰戰而不捷去未晚也帝因曰朕為二聖在逺屈己請和而彼復肆侵陵朕當總六師臨江決戰沈與求復力贊之鼎喜曰纍年退怯敵志益驕今聖斷親征將士必奮成功可必臣願效區區以圖報國於是以孟庾為行宫留守命百司不預軍旅之務者從便避兵以張俊為浙西江東宣撫使王􅊅為江西沿江制置使胡松年詣江上會諸將進兵劉光世移軍建康後宫自溫州泛海如泉州光世遣人諷鼎曰相公自入蜀何事為他人任患韓世忠亦曰趙丞相真敢為者鼎聞之恐帝意中變乘間言陛下養軍十年用之正在今日若少加退沮即人心渙散長江之險不可復恃矣帝遂發臨安劉錫楊存忠以禁兵扈從次平江帝欲渡江決戰鼎曰賊逺來利在速戰遽與爭鋒非策也且豫尚不自來陛下豈可與逆雛決勝負哉乃止十一月壬子下詔暴劉豫罪逆於六師自豫僣逆朝廷以金故至名為大齊至是始聲其罪以勵六師己未以張浚知樞密院視師江上初浚以召命至見鼎執其手曰此行舉措皆合人心鼎笑曰喻子才之功也復命浚知樞密院事浚既受命即日赴江上視師時達蘭烏珠擁兵十萬約日渡江決戰浚長驅臨江召劉光世韓世忠張俊議事將士見浚勇氣十倍浚既部分諸將身留鎮江以節制之十二月壬辰金齊合兵圍廬州守臣仇悆嬰城固守求援于嶽飛飛遣牛皋徐慶援之皋至遙語金將曰牛皋在此爾輩胡為見犯衆愕然不戰而潰飛謂皋曰必追之去而復來無益也皋乃追擊三十餘里金人相踐及殺死者不可勝計金兵自淮引還達蘭屯泗州烏珠屯竹墩鎮為韓世忠所扼以書幣約戰世忠遣麾下王愈及兩伶人以橘茗報之且言張樞密己在鎮江烏珠曰張樞密貶嶺南何乃在此愈出浚所下文書示之烏珠色變遂有歸意會雨雪餽道不通野無所掠殺馬而食蕃漢軍皆怨又聞金主晟病篤乃夜引還烏珠等既去劉麟劉猊亦棄輜重而遁六年春正月韓世忠聞劉豫聚兵淮陽即引軍渡淮傍符離而北至其城下為賊所圍奮戈潰圍而出不遺一鏃呼延通與金將雅哈貝勒搏戰扼其吭而擒之乘鋭掩擊金人敗去遂進兵圍淮陽賊約受圍一日則舉一烽至六烽具舉烏珠與劉猊皆引兵至世忠求援於張俊俊以世忠有見吞意不從世忠勒陳向敵遣人語之曰錦衣驄馬立陳前者韓相公也或危之世忠曰不如是不足以致敵敵果至殺其導騎二人遂引去世忠復還楚州淮陽之民從而歸者以萬計夏四月劉豫陷唐州九月嶽飛遣將敗劉豫兵於唐州冬十月丁酉劉麟劉猊分道寇淮西先是劉豫聞張浚會諸將于江上榜其罪逆將進兵討之告急于金請先出師南侵而乞師救援金主亶召諸將相議之富勒呼曰先帝所以立豫者欲以開疆保境我得安民息兵也今豫進不能取又不能守兵連禍結愈無休期從其請勝則豫收其利敗則我受其弊況前年因豫出師嘗不利于江上矣奈何許之金主遂不許豫而遣烏珠提兵黎陽以觀釁於是豫僉鄉兵三十萬分三道入寇麟率中路兵由壽春以犯合肥猊率東路兵由紫荆山出渦口以犯定逺孔彥舟率西路兵由光州以犯六安時張俊劉光世楊沂中韓世忠嶽飛分屯諸州而沿江上下無兵趙鼎深以為憂移書張浚欲令俊與沂中同保合肥浚以為然乃遣沂中張宗顔等分道禦之且令沂中趨濠州以與張俊合因謂沂中曰上待統制厚宜及時立功會邊報日急張俊欲棄盱眙劉光世欲舍廬州皆張大賊勢以聞浚以書戒二將曰賊豫之兵以逆犯順若不𠞰除何以立國平日亦安用養兵為哉今日之事有進戰無退保及劉麟進逼合肥趙鼎曰今賊渡淮當急遣張俊合光世之軍盡掃淮南之寇然後議去留帝善之然慮俊光世不足任因命嶽飛盡以兵東下而手札付浚令俊光世沂中等還保江浚上言諸將渡江則無淮南而長江之險與賊共有淮南之屯正所以屏蔽大江使賊得淮南因糧就運以為家計江南其可保乎今正當合兵掩擊可保必勝一有退意則大事去矣且嶽飛一動襄漢有警何所恃乎願朝廷勿專制于中使諸將有所觀望也帝手書報浚曰非卿識髙慮逺何以及此由是異議乃息沂中兵至濠光世已舍廬州將趨采石淮西大震浚聞之令吕祉馳往光世軍諭之曰有一人渡江即斬以徇光世不得已復還廬州與沂中俊等相應劉猊軍至淮東為韓世忠所阻乃引趨定逺劉麟從淮西繫三浮橋而渡次于濠壽之間張俊以兵拒之猊率衆犯定逺欲趨宣化以寇建康沂中以兵二千進禦與猊前鋒遇于越家坊敗之猊恐孤軍深入為王師所襲乃欲趨合肥與麟合而後進至藕塘沂中復遇之猊據山列陳矢下如雨沂中急擊之使統制吳錫率徑卒五十突入其軍猊衆潰亂沂中縱大軍乘之而自以精騎衝其脅大呼曰賊破矣賊衆錯愕駭視張宗顔自泗來乘背擊之張俊大軍復與戰於李家灣賊衆大敗橫尸滿野猊以首抵謀主李愕曰適見髯將軍鋭不可當果楊殿前也即與數騎遁去沂中躍馬叱之餘衆皆怖而降麟在順昌聞猊敗亦拔寨去沂中及王德乘勢追麟至南壽春而還孔彥舟亦解光州圍而去時嶽飛自破曹成平楊么凡六年皆盛夏行師以致目疾至是逾甚及一聞召命即日起行未至麟敗帝語趙鼎曰劉麟敗北不足喜諸將知尊朝廷為可喜賜飛札言敵兵已去淮卿不須進發飛乃還軍金人聞劉豫敗來詰其狀始有廢豫之意七年閏十月金人襲汴執劉豫廢之初豫由尼瑪哈髙慶裔得立故奉二人特厚烏珠及諸將多憾之豫兵敗藕塘金人欲廢豫及尼瑪哈死嶽飛因遣間齎蠟書與豫約同誅烏珠烏珠得書大驚馳白金主於是廢豫之意益決會豫請立麟為太子金主亶曰徐當咨訪河南百姓豫雖意沮而猶日遣使乞師南侵金乃建元帥府于太原令豫兵悉聽節制而以蘇泊為左都監屯太原托卜嘉為右都監屯河間復分戍陳蔡汝亳頴許諸郡至是尚書省奏豫治國無狀金主遂令達蘭烏珠偽稱南侵以襲之將至汴遣人召劉麟渡河議事麟以二百騎至武城烏珠麾騎翼而擒之遂馳入汴豫方射講武殿烏珠從三騎突入東華門下馬逼豫出見因執其手偕至宣德門強乘以羸馬露刃夾之囚于金明池翌日集百官宣詔責豫而廢之其詔有曰建爾一邦逮茲八稔尚勤兵戍安用國為乃以鐵騎數千圍宫因遣小校巡閭巷間宣言自今不僉爾為軍不取爾免行錢為汝敲殺貌似人請汝舊主少帝來由是人心稍安遂置行臺尚書省于汴以張孝純權行臺左丞相呼沙呼為汴京留守李儔副之諸軍悉令歸農豫求哀于二帥達蘭謂之曰昔趙氏少帝出京百姓燃頂煉臂號泣今汝廢無一人憐者汝何不自責也豫語塞與家屬徙臨潢嶽飛奏乘廢劉豫之際搗其不備長驅以取中原韓世忠亦上疏言機不可失請全師北討皆不報宋史紀事本末卷十五
