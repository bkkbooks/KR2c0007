body:
  text: 宋史紀事本末卷二十一明馮琦原編陳邦瞻增輯道學崇詘高宗紹興元年秋七月丁亥詔贈程頤直龍圖閣制詞略曰周衰聖人之道不得其傳世之學者其欲聞仁義道德之說孰從而求之亦孰從而聽之爾頤濳心大業高明自得之學可信而不疑而浮僞之徒自學問文采不足表見於世乃竊借名以自售外示恬默中實奔競使天下之士聞其風而疾之是重不幸焉朕所以振耀褒顯之者以明上之所與在此而不在彼也六年十二月左司諌陳公輔請禁程氏學從之先是崇寧以來禁錮元祐學術帝渡江復尊尚程頤之學至是公輔上疏言今世取程頤之說謂之伊川之學相率從之倡為大言謂堯舜文武之道傳之仲尼仲尼傳之孟軻孟軻傳之頤頤死遂無傳焉狂言怪語淫說鄙論曰此伊川之文也幅巾大袖高視濶步曰此伊川之行也師伊川之文行伊川之行則為賢士大夫捨此者非也誠恐士習從此大壞乞禁止之遂詔士大夫之學一以孔孟為師庶幾言行相稱可濟時用臣僚所奏可布中外使知朕意時方召尹焞焞頤門人也公輔之意蓋有所指云七年五月張浚薦胡安國帝召之安國聞陳公輔請禁程頤之學乃上疏曰孔孟之道不傳久矣自頤兄弟始發明之然後知其可學而至今使學者師孔孟而禁從頤學是入室而不由户也夫頥於易因理以明象而知體用之一原於春秋見於行事而知聖人之大用諸經語孟皆發其微㫖而知其入德之方則狂言怪語豈其文哉孝弟顯於家忠誠動於鄉非其道義一介不以取豫則高視濶步豈其行哉自嘉祐以來西都有邵雍程皓及其弟頥關中有張載皆以道德名世著書立言公卿大夫所欽慕而師尊之及王安石蔡京等曲加排抑故其道不行願下禮官討論故事加之封爵載在祀典仍詔館閣裒其遺書羽翼六經使邪說者不得作而道術定矣疏入公輔與中丞周祕侍御史石公揆交章論安國學術頗僻安國遂辭召命孝宗淳熙五年春正月侍御史謝廓然乞戒有司母以程頥王安石之說取士未幾祕書郎趙彥中復疏言科舉之文成式具在今乃祖性理之說以浮言游詞相高士之信道自守以六經聖賢為師可矣而别為洛學飾怪驚愚士風日弊人才日偷望詔執事使明知聖朝好惡所在以變士風從之十年六月監察御史陳賈請禁道學先是朱熹為浙東提刑行部至台州知州事唐仲友為其民所訟熹劾治之仲友與宰相王淮同里且為姻家淮由此怨熹欲沮之風吏部尚書鄭丙上疏言近世士大夫有所謂道學者欺世盜名不宜信用帝已惑其說淮又以太府丞陳賈為御史賈因面對首論曰臣竊謂天下之士所學於聖人之道未嘗不同既同矣而謂已之學獨異於人是必假其名以濟其僞者也邪正之辨誠與僞而已矣表裏相副是之謂誠表裏相違是之謂僞臣伏見近世士大夫有所謂道學者其說以謹獨為能以踐履為高以正心誠意克已復禮為事若此之類皆學者所共學也而其徒乃謂已獨能之夷考其所為則又大不然不幾於假其名以濟其僞者耶臣願陛下明詔中外痛革此習每於聽納除授之間考察其人擯斥勿用以示好惡之所在庶幾多士靡然向風言行表裏一出于正無或肆為詭異以干治體實宗杜無疆之福蓋指熹也帝從之由是道學之名貽禍于世後直學士院尤袤以程氏之學為賈所攻言于帝曰道學者堯舜所以帝禹湯文武所以王周公孔孟所以設教近立此名詆訾士君子故臨財不茍得所謂廉介安貧守道所謂恬退擇言顧行所謂踐履行已有恥所謂名節皆目之為道學此名一立賢人君子欲自見於世一舉足且入其中俱無所免此豈盛世所宜有願循名責實聽言觀行人情庶不懷於疑似帝曰道學豈不美之名正恐假托為姦真僞相亂爾十五年六月除朱熹為兵部郎官先是熹以周必大薦為江西提刑入奏事或要於路曰正心誠意之論上所厭聞慎勿復言熹曰吾平生所學惟此四字豈可隱默以欺吾君乎及入對上迎謂之曰久不見卿卿亦老矣浙東之事朕自知之今當處卿以清要不復以州縣煩卿奬諭甚渥遂除兵部郎官熹以足疾乞祠兵部侍郎林栗與熹論易西銘不合遂論熹本無學術徒竊張載程頤之緒餘為浮誕宗主謂之道學妄自推尊所至輒携門生數十人習為春秋戰國之態妄希孔孟歷聘之風繩以治世之法則亂人之首也今采其虛名俾之入奏將置朝列以次收用而熹聞命之初遷延道途邀索高價門徒迭為游說政府許以風聞然後入門既經陛對得㫖除郎而輒懷不滿傲睨纍日不肯供職是豈程頥張載之學教之然也望將熹停罷以為事君無禮者之戒帝謂栗言過當而大臣畏栗之强莫敢深論乃命熹依舊江西提刑周必大言熹上殿之日足疾未瘳勉强登對帝曰朕亦見其跛曵太當博士葉適上疏曰考栗劾熹之辭始末參驗無一實者特發其私意而遂忘其欺耳至於其中謂之道學一語利害所係不獨於熹蓋自昔小人殘害忠良率有指名或以為好名或以為立異或以為植黨近又創為道學之目鄭丙倡之陳賈和之居要津者密相付授見士大夫有稍慕潔修者輒以道學之名歸之以為善為玷缺以好學為已愆相與指目使不得進於是賢士惴栗中材解體銷聲滅影穢德垢行以避此名往日王淮表裏臺諌隂廢正人蓋用此術栗為侍從無以逹陛下之德意志慮而更襲用鄭丙陳賈密相付授之說以道學為大罪文致語言逐去一熹固未甚害第恐自此游詞無實讒言橫生良善受禍何所不有伏望陛下正紀綱之所在絶欺罔于既形摧折暴橫以扶善類奮發剛斷以慰公言疏入不報詔熹仍赴江西熹力辭不赴光宗紹熙元年二月殿中侍御史劉光祖入對言近世是非不明則邪正互攻公論不立則私情交起此固道之消長時之否泰而實國家之禍福社稷之存亡係焉甚可畏也本朝士大夫學術最為近古初非有强國之術而國勢尊安根本深厚咸平景德之間道臻皇極治保太和至於慶厯嘉祐盛矣不幸而壞於熙豐之邪說疏棄正士招徠小人幸而元祐君子起而救之末流大分事故反覆紹聖元符之際羣凶得志絶滅綱常其論既勝其勢既成崇觀而下尚復何言臣始至時聞有譏貶道學之說而實未覩朋黨之分中更外艱去國六載已憂兩議之各甚而恐一旦之交攻也逮臣復來其事果見因惡道學乃生朋黨因生朋黨乃罪忠諫夫以忠諫為罪其去紹聖幾何陛下即位之初凡所進退率用人言初無好惡之私豈以偏黨為主而一歲之內斥逐紛紛往往納忠之言謂為沽名之舉事勢至此循默乃宜循默成風國家安賴臣欲息將來之禍故不憚反覆以陳伏兾聖心豁然永為皇極之主使是非由此而定邪正由此而别公論由此而明私意由此而熄道學之譏由此而消朋黨之迹由此而泯則生靈之幸社稷之福也不然相激相勝展轉反覆為禍無窮臣實未知稅駕之所帝下其章讀者至於流涕寧宗慶元元年六月右正言劉德秀請考核道學真僞從之先是上在嘉府黃裳為嘉王府翊善光宗諭之曰嘉王進學皆卿之功裳謝曰若欲進德修業追跡古先王則須尋天下第一等人物光宗問為誰裳以朱熹對直講彭龜年因講魯莊公不能制其母云母不可制當制其侍御僕從上問此誰之說對曰朱熹說也自後每講必問熹說如何及上即位宰相趙汝愚首薦熹遂自潭州召為煥章閣待制兼侍講熹在道聞近習已有用事者即具奏言幸門一開其弊將不可復塞及至每進講務積誠意以感動上心上亦稍稍嘉納焉熹復奏疏極言陛下即位未能旬月而進退宰臣移易臺諌皆出陛下之獨斷中外咸謂左右或竊其柄臣恐主威下移求治反亂矣時韓托胄方用事熹意蓋指托胄也托胄由此大恨使優人峩冠濶䄂象大儒戲於上前因乘間言熹迂濶不可用遂出內批罷熹經筵除宫觀熹去托胄益無忌憚矣其黨復為言凡相與異者皆道學之人也隂疏姓名授之俾以次斥逐或又為言以道學目之則有何罪當名曰僞學由是有僞學之目善類皆不自安至是德秀上言曰邪正之辨無過於真與僞而已彼口道先王之言而行如市人所不為在興王之所必斥也昔孝宗鋭意恢復首務核實凡言行相違者未嘗不深知其姦臣願陛下以孝宗為法考核真僞以辨邪正詔下其章於是博士孫元卿袁燮國子正陳武皆罷司業汪逵入劄子辨之德秀以逵為狂言亦被斥秋七月御史中丞何淡上疏言紹興間諌臣陳公輔嘗言程頤王安石之學皆有尚同之弊高宗皇帝親灑宸翰有曰學者當以孔孟為師臣願陛下以高宗之言風勵天下使天下皆師孔孟有志於學者不必自相標榜使衆人得而指目亦不必以同門之故更相庇護是者從其為是非者從其為非朝廷亦惟是之從惟善之取而無彼此異同之别聽言而觀行因名而察實録其真而去其僞則人知勉勵無敢飾詐以求售士風純而國是定將必由此上是之詔榜于朝堂既而吏部郎官糜師旦復請考核真僞被遷左司員外郎又有張貴模者指論太極圖亦被賞擢何淡復上疏言在朝之臣大臣既熟知其邪迹然亦不敢白發以招報復之禍望明詔大臣去其所當去者二年二月以端明殿學士葉翥知貢舉翥與劉德秀奏言僞學之魁以匹夫竊人主之柄鼓動天下故文風未能丕變乞將語録之類盡行除毁故是科取士稍涉義理者悉皆黜落六經語孟中庸大學之書為世大禁淮西總領張釡上言邇者僞學盛行賴陛下聖明斥罷天下皆洗心滌慮不敢為前日之習願明詔在位之臣上下堅守勿變毋使僞言僞行乘間而入以壞既定之規模乃除釡尚書左司郎官八月申嚴道學之禁時中書舍人汪義端引唐李林甫故事以僞學之黨皆名士欲盡除之帝頗知其非乃詔臺諌給舍論奏不必更及舊事務在平正以副朕建中之意詔下韓托胄及其黨皆怒劉德秀遂與御史張伯垓姚愈等上疏言自今舊奸宿惡或滋長不悛臣等不言恐誤陛下之用人且俟其敗壞國事如前日而後言則徒有噬臍之悔願下此章播告中外令舊奸知朝廷紀綱尚在不致放肆從之自是托胄與其黨攻治之志愈急矣太常少卿胡紘上言比年以來僞學猖獗圖為不軌動搖上皇詆誣聖德幾至大亂賴二三大臣臺諌出死力而排之故元惡殞命羣邪屏跡自御筆有救偏建中之說或者誤認天意急於奉承倡為調停之議取前日僞學之姦黨次第用之以兾幸其他日不相報復往者建中靖國之事可以為戒遂詔僞學之黨宰執權住進擬大理司直邵褎然言三十年來僞學顯行場屋之權盡歸其黨乞詔大臣審察其所學詔僞學之黨勿除在內差遣已而言者又論僞學之禍乞鑒元祐調停之說杜其根原遂有詔監司帥守薦舉改官並於奏牘前聲說非僞學之人㑹鄉試漕司前期取家狀必令書以不是僞學字撫州推官柴中行獨申漕司云自幼習易讀程氏易傳未委是與不是僞學如以為僞不願考校士論壯之十二月削祕閣修撰朱熹官熹家居自以䝉纍朝知遇之恩且尚帶從臣職名義不容默乃草封事數萬言陳姦邪蔽主之禍子弟諸生更進迭諌以為必且賈禍熹不聽蔡元定請以蓍决之遇遁之同人熹默然取藁焚之遂六奏力辭職名詔仍充祕閣修撰時臺諌皆韓托胄所引洶洶爭欲以熹為竒貨然無敢先發者胡紘未逹時嘗謁熹於建安熹待學子惟脫粟飯遇紘不能異也紘不悅語人曰此非人情隻雞斗酒山中未為乏也及是為監察御史乃鋭然以擊熹自任物色無所得經年醖釀章疏乃成㑹改太常少卿不果有沈繼祖者為小官時嘗採托熹語孟之語以自售至是以追論程頤得為御史紘以疏草授之繼祖謂可立致富貴遂論熹剽竊張載程頤之緒餘寓以喫菜事魔之妖術簧鼓後進張浮駕誕私立品題收召四方無行義之徒以益其黨伍潛形匿迹如鬼如魅乞加少正卯之誅以為欺君罔世汚行盜名者之戒其徒蔡元定佐熹為妖乞編管别州詔熹落職罷祠竄元定于道州已而選人余嚞上書乞斬熹以絶僞學謝深甫抵其書子地獲免三年十一月知綿州王沇上疏乞置僞學之籍仍自今曾受僞學舉薦關升及刑法廉吏自代之人並令省部籍記姓名與閒慢差遣從之於是僞學逆黨得罪著籍者宰執則有趙汝愚留正周必大王藺等四人待制以上則有朱熹徐誼彭龜年陳傅良薛叔似章頴鄭湜樓鑰林大中黃由黃黼何異孫逢吉等十三人餘官則有劉光祖呂祖儉葉適楊芳項安世李􅌫沈有開曾三聘游仲鴻吳獵李祥楊簡趙汝讜趙汝談陳峴范仲黼汪逵孫元卿袁燮陳武田淡黃度張體仁蔡幼學黃灝周南吳柔勝王厚之孟浩趙鞏白炎震等三十一人武臣則有皇甫斌范仲壬張致遠等三人士人則有楊宏中周端朝張道林仲麟蔣傅徐範蔡元定呂祖泰等八人共五十九人四年五月諌議大夫姚愈復上言近世行險徼幸之徒倡為道學之名聾瞽愚俗權臣力主其說結為死黨陛下取其罪魁之顯然者止從竄免餘悉不問所以存全之意可謂至矣奈何習之深者怙惡不悛日懷怨望反以元祐黨籍自比臣願特降明詔播告天下使中外曉然知邪正之實庶姦僞之徒不至假借疑似以盜名欺世帝從之為下詔戒飭六年三月朱熹卒將葬右正言施康年言四方僞徒聚于信上欲送僞師之葬㑹聚之間非妄談時人短長則謬議時政得失乞下守臣約束從之嘉泰二年二月弛僞學黨禁時韓托胄已厭前事張孝伯謂之曰不弛黨禁恐後不免報復之禍托胄然之故有此令嘉定四年十二月著作郎李道傳上奏言孔孟既沒正學不明漢唐非無儒者然於聖門大學之道或語之而未近或近之而未真理未能盡窮義未能盡精施之於事未能盡得其當故千數百年之間雖有隨時以就功名之臣不過極其天資力分之所止而已治不如古職此之由至於本朝河洛之間大儒並出於是孔孟之學復明於世用雖未究功則已多近世儒者又得其說而推明之擇益精語益詳凡學者修已接物事君臨民之道本末精粗殆無餘藴誠使此學益行則人才衆多朝廷正而天下治矣往者權臣顧以此學為禁十數年間士氣日衰士論日卑士風日壞識者憂之今其禁雖除而獨未嘗明示天下以除之之說臣竊謂當世先務莫要於此今有人焉入則順於親出則信於友上則不欺其君下則不欺其民義不可進不肯茍進以易其終身之操義不可生不忍茍生以害其本心之德誠得此等人布滿中外平居可任緩急可恃豈非陛下所願哉如此等人豈皆天資知而行之非學不可然則學術成人才非今日最要之務乎臣願陛下特出明詔崇尚此學指言前日所禁之誤使天下曉然知聖意所在君臣上下同此一心感應之機捷於影響此詔一下必有振厲激昻以副陛下作成之意者臣聞學莫急於致知致知莫大於讀書書之當讀者莫出於聖人之經經之當先者莫要於大學論語孟子中庸之篇故侍講朱熹有論語孟子集注大學中庸章句或問學者傳之所謂擇之精而語之詳者於是乎在臣願陛下詔有司取是四書頒之太學使諸生以次誦習俟其通貫浹洽然後次第以及諸經務求所以教育天下人才為國家用臣聞紹興中從臣胡安國嘗欲有請於朝乞以邵雍程皓程頤張載四人春秋從祀孔子之廟淳熙中學官魏掞之亦言宜罷王安石父子勿祀而祀皓頤兄弟厥後雖詔罷安石之子雱而他未及行儒者相與論說謂宜推而上之以及二程之師周敦頥臣願陛下詔有司考安國掞之所嘗言者議而行之上以彰聖朝崇儒正學之意下以示學者所宗其所益甚大其所關甚重非特以補祀典之缺而已陛下不以臣言為迂誠能下除禁之詔頒四者之書定諸儒之祀三事既行人心興起當見天下之才日盛一日天下之治嵗加一嵗其或不然臣請伏妄言之罪㑹西府中有不喜道學者未及施行九年春正月潼川府路提㸃刑獄魏了翁狀奏臣竊見故虞部郎中周惇頥嘗為合州僉書判官州事不經其手吏不敢决茍下之民不肯從蜀之賢人君子莫不喜稱之其流風所漸迄今未泯士競講學民知向風春秋奉嘗有永勿替臣始到官嘗遣吏即其祠而用幣焉退復惟念是特惇頥所以施諸一方見諸行事之一二耳蓋自周衰孔孟氏沒更秦漢魏晉隋唐學者無所宗主支離泮渙莫適其歸醇質者滯於呫嗶訓詁俊爽者溺於記覽詞章言理則清虛寂滅之歸論事則功利智術之尚誣民惑世至於淪浹肌髓不可救藥惇頥獨奮乎百世之下窮探造化之賾建圖著書闡幽抉祕即斯人日用常行之際示學者窮理盡性之歸使誦其遺言者始得以曉然於洙泗之正傳而知世之所謂學非滯於俗師則淪於異端蓋有不足學者於是河南程皓程頤親得其傳而聖學益以大振雖三人於時皆不及大用而其嗣往聖開來哲發天理正人心使孔孟絶學獨盛於本朝而超出乎百代功用所繫治理所關誠為不小臣愚欲望聖慈先將惇頥特賜美諡其於表章風厲蓋非小補詔下太常定議十三年追諡周惇頥曰元程皓曰純程頥曰正從魏了翁任希夷之請也理宗寶慶三年春正月詔曰朕觀朱熹集注大學論語孟子中庸發揮聖賢藴奧有補治道朕方勵志講學緬懷典刑深用嘆慕可特贈熹太師追封信國公三月朱熹子工部侍郎朱在入對言人主學問之要帝曰先卿中庸序言之甚詳朕讀之不釋手恨不與之同時紹定二年九月改封朱熹徽國公用鄒兖例也淳祐元年春正月甲辰詔曰朕惟孔子之道自孟軻後不得其傳至我朝周惇頥張載程皓程頥真見實踐深探聖域千載絶學始有指歸中興以來又得朱熹精思明辨折衷融㑹使大學論孟中庸之書本末洞徹孔子之道益以大明於世朕每觀五臣論著啓沃良多今視學有日其令學官列諸從祀以副朕崇奬儒先之意尋以王安石謂天變不足畏祖宗不足法人言不足恤為萬世罪人豈宜從祀孔子其黜之丙午封周惇頥為汝南伯張載郿伯程皓河南伯程頤伊陽伯戊申視太學謁孔子遂御崇化堂命祭酒曹觱講禮記大學篇諸生推恩錫帛有差製道統十三贊就賜國子監宣示諸生復親書朱熹白鹿洞學規賜焉按宋世道學之傳自周惇頥始惇頥授之程皓及其弟頤而其學始盛同時張載邵雍與皓兄弟實相師友雖立言各成一家至澤於仁義道德不求同而自不能異程氏之門人則謝良佐游酢楊時尹焞最著時傳之羅從彥從彥傳之李侗朱熹受學於侗熹出而程氏所傳之學始發明無遺藴其與熹同時而志同道合者為張栻呂祖謙持論異者為陸九齡兄弟今自惇頥而下略採師友淵源所自以見一代道脈之大較云周惇頥字茂叔道州營道人自少信古好義以名節自砥礪奉已甚約饘粥或不給而亦曠然不以為意黃庭堅稱其人品甚高胸中灑落如光風霽月廉於取名而鋭於求志薄於徼福而厚於得民菲於奉身而燕及㷀婺矛牙陋於希世而尚友千古好讀書雅意林壑不為人事窘束世故拘牽不由師傳默契道體嘗著太極圖說明天理之根原究萬物之終始其說曰無極而太極太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉惟人也得其秀而最靈形既生矣神發知矣五性感動而善惡分萬事出矣聖人定之以中正仁義而主靜立人極焉故聖人與天地合其德日月合其明四時合其序鬼神合其吉凶君子修之吉小人悖之凶故曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義又曰原始反終故知死生之說大哉易也斯其至矣又著通書四十篇發明太極之藴序者謂其言約而道大文質而義精得孔孟之本原大有功於學者程皓程頤受業每令尋孔顔樂處所樂何事皓嘗曰自再見周茂叔後吟風弄月以歸有吾與㸃也之意侯師聖學於程頤未悟因見惇頥惇頥留與對榻夜談越三日乃還程頤驚異之曰非從周茂叔來耶其善開發人類此學者稱為濂溪先生程皓字伯淳河南人皓資禀既異而充養有道純粹如精金溫潤如良玉寬而有制和而不流胸懷洞然徹視無間極其德美非形容所可及自十五六時聞周茂叔論道遂厭科舉之學慨然有求道之志未知其要泛濫於諸家出入於老釋者幾十年返求之六經而後得之知盡性至命必本於孝弟窮神知化由通於禮樂辨異端似是之非開百代未明之惑秦漢而下未有臻斯理也謂孟子沒而聖學不傳以興起斯文為己任其言曰道之不明異端害之也昔之害近而易知今之害深而難見昔之惑人也乘其迷暗今之入人也因其髙明自謂之窮神知化而不足以開物成務言為無不周遍實則外於倫理窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道其卒也文彥博題其墓曰明道先生弟頥序之曰周公沒聖人之道不行孟軻死聖人之道不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千百年之後得不傳之道於遺經以興起斯文為己任辨異端闢邪說使聖人之道煥然復明於世蓋自孟子之後一人而已然學者於道不知所向則孰知斯人之為功不知所至則孰知斯名之稱情也哉程頤字正叔自幼非禮不動其為學之要曰涵養須用敬進學則在致知嘗作顔子好學論曰聖人之門其徒三千獨稱顔子為好學夫詩書六藝七十子非不習而通也然則顔子所好者何學也學以至聖人之道也聖人可學而至歟曰然學之道如何曰天地儲精得五行之秀者為人其本也貞而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀樂愛惡欲情既熾而益蕩其性鑿矣是故覺者約其情使合於中正其心養其性故曰性其情愚者則不知制之縱其情而至於邪僻牿其性而亡之故曰情其性凡學之道正其心養其性而已中正而誠則聖矣君子之學必先明諸心知所養然後力行以求其至所謂自明而誠也故學必盡其心盡其心則知其性知其性反而誠之聖人也故洪範曰思曰睿睿作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離于心造次必於是顛沛必於是出處語默必於是久而弗失則居之安動容周旋中禮而邪僻之心無自生矣故顔子所事則曰非禮勿視非禮勿聽非禮勿言非禮勿動仲尼稱之則曰得一善則拳拳服膺而勿失之矣又曰不遷怒不二過有不善未嘗不知知之未嘗復行也此其好之之篤學之之道也視聽言動皆禮矣所異於聖人者蓋聖人則不思而得不勉而中從容中道顔子則必思而後得必勉而後中故曰顔子之與聖人相去一息孟子曰充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神顔子之德可謂充實而有光輝矣所未至者守之也非化之也以其好學之心假之以年則不日而化矣故仲尼曰不幸短命死矣蓋傷其不得至於聖人也所謂化之者入於神而自然不思而得不勉而中之謂也孔子曰七十而從心所欲不踰矩是也或曰聖人生而知者也今謂可學而至豈有稽乎曰然孟子曰堯舜性之也湯武反之也性之者生而知之者也反之者學而知之者也後人不逹以為聖本生知非學可至而為學之道遂失不求諸已而求諸外以慱聞强記巧文麗詞為工榮華其言鮮有至於道者則今之學與顔子所好異矣頥所著惟易傳為成書尹焞謂頥踐履皆易作傳只是因而寫成其自序曰易變易也隨時變易以從道也其為書也廣大悉備將以順性命之理通幽明之故盡事物之情而示開物成務之道也聖人之憂患後世可謂至矣去古雖逺遺經尚存然而前儒失意以傳言後學誦言而忘味自秦而下蓋無傳矣豫生千餘載之後悼斯文之堙晦將俾後人沿流而求源此傳所以作也易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占吉凶消長之理進退存亡之道備於辭推詞考卦可以知變象與占在其中矣君子居則觀其象而玩其辭動則觀其變而玩其占得於辭不達其意者有矣未有不得於辭而能通其意者也至微者理也至著者象也體用一原顯微無間觀㑹通以行其典禮則辭無所不備故善學者求言必自近易於近者非知言者也豫所傳者辭也由辭以得意則在乎人焉游酢楊時從頤學一日頤坐而瞑目久之覺曰二子猶在此乎日暮矣姑就舍二子出門外雪深尺餘其師道尊嚴如此張載字子厚鳯翔人少孤無所不學喜談兵當康定用兵時慨然以功名自許上書謁范仲淹仲淹一見知其遠器欲成就之告之曰儒者自有名教何事於兵因勸讀中庸載讀其書雖愛之猶以為未足也又訪之釋老之書反求之六經嘉祐初見二程於京師共語道學渙然自信曰吾道自足何事旁求乃盡棄異學淳如也熙寧中被召以事辭歸築室南山下弊衣蔬食專精治學以知人而不知天求為賢人而不求為聖人自秦漢以來學者之大弊也故終日危坐一室左右簡編俯而讀仰而思有得則識之或中夜起坐取燭以書其志道精思未始須㬰息也嘗以定性之學問于程皓皓答書曰承諭定性未能不動猶纍於外物所謂定者動亦定靜亦定無將迎無內外茍以外物為外牽已而從之是以已性為有內外也且以性為隨物於外則當其在外時何者為在內是有意於絶外誘而不知性之無內外也既以內外為二本則又烏可遽語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應易曰貞吉悔亡憧憧往來朋從爾思茍規規於外誘之除將見滅於東而生於西也非惟日之不足顧其端無窮不可得而除也人之情各有所蔽故不能適道大率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟氏亦曰所惡於智者為其鑿也與其非外而是內不若內外之兩忘也兩忘則澄然無事矣無事則定定則明明則尚何應物之為纍哉聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不繫於心而繫於物也是則聖人豈不應於物哉烏得以從外者為非而更求在內者為是也今以自私用智之喜怒而視聖人喜怒之正為如何哉夫人之情易發而難制者惟怒為甚第能於怒時遽忘其怒而觀理之是非亦可見外誘之不足惡而於道亦思過半矣載得之大悅載所著有西銘正䝉而西銘最為一時儒者所服其言曰乾稱父坤稱母豫兹藐焉乃混然中處故天地之塞吾其體天地之帥吾其性民吾同胞物吾與也大君者吾父母宗子其大臣宗子之家相也尊髙年所以長其長慈孤弱所以幼其幼聖其合德賢其秀也凡天下疲癃殘疾惸獨鰥寡吾兄弟顛連而無告者也于時保之子之翼也樂且不憂純乎孝者也違曰悖德害仁曰賊濟惡者不才其踐形惟肖者也知化則善述其事窮神則善繼其志不愧屋漏為無忝存心養性為匪懈惡㫖酒崇伯子之顧養育英才頴封人之錫類不弛勞而底豫舜其功也無所逃而待烹申生其恭也體其受而歸全者參乎勇於從而順令者伯竒也富貴福澤將以厚吾之生也貧賤憂戚庸玉汝於成也存吾順事沒吾寧也楊時嘗問程頤曰西銘言體而不及用恐其流遂至於兼愛頤答曰西銘推理以存義廣前聖所未發與性善養氣之論同功豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分二本之弊私間而失仁無分之弊兼愛而無義分立而推理一以止私勝之流仁之方也無别而迷兼愛以至無父之極義之賊也子比而同之過矣且欲使人推而行之本為用也反謂不及不亦異乎邵雍字堯夫范陽人少篤學堅苦刻厲冬不爐夏不扇臥不就枕席者數年嘗以為學者之患在於好惡先成乎心而挾其私智以求於道則蔽於所好而不得其真故其求之至於四方萬里之逺天地隂陽屈伸消長之變無所不通而必折𠂻於聖人雖深於象數先見默識未嘗以自名也其學純一而不雜居之而安行之而成平易渾大不見圭角其自得深矣程皓初侍其父識雍論議終日退而嘆曰堯夫內聖外王之學也雍自著無名公傳曰無名公生于冀方老于豫方年十嵗求學于里人遂盡里人之情已之滓十去其二三矣年二十求學于鄉人遂盡鄉人之情已之滓十去其三四矣年三十求學于國人遂盡國人之情已之滓卞去其五六矣年四十求學于古今遂盡古今之情已之滓十去其八九矣五十求學于天地遂盡天地之情欲求已之滓無得而去矣始則里人疑其僻問于鄉人曰斯人善與人羣安得謂之僻既而鄉人疑其泛問于國人曰斯人不妄與人交安得謂之泛既而國人疑其陋問于四方之人曰斯人不器安得謂之陋既而四方之人又疑之質之于古今之人終始無可與同者又考之于天地天地不對當是時也四方之人迷亂不復得知因號為無名公無名者不可得而名也凡物有形則可器可器斯可名然則斯人無體乎曰有體有體而無迹者也斯人無用乎曰有用有用而無心者也夫有跡有心者斯可得而知也無跡無心者雖鬼神亦不可得而知不可得而名而况於人乎故其詩曰思慮未起鬼神莫知不由乎我更由乎誰能造萬物者天地也能造天地者太極也太極者其可得而知乎故强名之曰太極太極者其無名之謂乎謝良佐字顯道上蔡人初見程皓受學甚篤後又事程頤頤嘗指良佐謂朱公掞曰此人為切問近思之學或問良佐太虛無盡心有止安得合一曰心有止只為用若不用則何止問子莫不用否曰是聖人便不用當初曾發此語被伊川一語壞却二十年曾往見伊川伊川曰近日事如何對曰天下何思何慮伊川曰是則是有此理發得太早冉問當初發此語時如何曰見得是事經時無他念接物亦應得去問如此却何故被一語轉却曰當了須有不透處當初若不得他一語救拔便入禪家去矣伊川直是善鍛鍊人既說又却道恰好著工夫也游酢字定夫建陽人初以文學知名於時程頤一見謂其資可適道時程皓知扶溝縣兄弟方以倡明道學為己任設庠序聚邑人子弟教之召酢職學事酢欣然往從之得其微言於是盡棄其學學焉吕居仁曰定夫後更學禪居仁嘗以書問之答曰佛書所說世儒亦未深考往年嘗見伊川云吾之所攻者迹也然迹安從出哉要之此事須親至此地方能辨其同異不然難以口舌爭也尹焞字彥明洛陽人從程頤學頤教人專以敬以直內為本焞獨能力行之嘗言伊川教人只是專令用敬以直內若用此理則百事不敢輕為不敢妄作不愧屋漏矣習之既久自然有所得也往年先生自涪陵歸日往見之一日讀易至敬以直內處因問不習無不利時則更無堵當更無計較也耶先生深以為然且曰不易見得如此且更涵養不可輕說楊時字中立將樂人初舉進士得官聞二程之學即往從之程皓見時甚喜每言曰楊君最㑹得容易及歸送之出門謂坐客曰吾道南矣時歸閒居纍年沈浸經書推廣師說窮探力索務極其趣涵畜廣大而不敢輕自肆也學者稱為龜山先生羅從彥字仲素南劒人初為博羅主簿聞楊時得程氏之學慨然慕之及時為蕭山令從彥徒步往學見時三日即驚汗浹背曰不至是幾虛過一生矣既卒業歸築室山中絶意仕進學者稱為豫章先生從彥嘗與人論士行曰周孔之心使人明道學果能明道則周孔之心深自得之三代人才得周孔之心而明道者多故視死生去就如寒暑晝夜之移而忠義行之者易至漢唐徒以經術古文相尚而失周孔之心明道者寡故視死生去就如萬鈞九鼎之重而忠義行之者難又曰士之立朝要以正直忠厚為本正直則朝廷無過失忠厚則天下無嗟怨其議論醇正類此李侗字願中劒浦人初受學於羅從彥從彥令於靜中看喜怒哀樂未發前氣象而求所謂中者久之於天下之理該攝洞貫以次融釋各有條序退居山中謝絶世故凡四十年其接後學答問不倦嘗云學之道不在多言但默坐澄心體認天理自見學者稱為延平先生朱熹字元晦新安人父松與籍溪胡憲白水劉勉之屏山劉子翬三人者善松疾革命熹父事此三人且禀學焉子翬嘗告熹曰吾於易得入德之門所謂不遠復者吾三字符也既而熹復受學於李侗侗亦父友也熹言自見李先生為學始就平實乃知向者從事釋老之說皆非侗與人書曰元晦初從謙開善處下工夫來故皆就裏面體認今既論難見儒者路脈極能指其差誤之處自見羅先生來未有如此者且别無他事一味潛心於此初講學時頗為道理所縛今漸能融釋於日用處一意下工夫若於此漸熟則體用合矣此道理全在日用處熟若靜處有而動處無即非矣熹生平於書無所不讀於義理無所不究極而其綱領樞要則在中庸未發一語先後與張栻論之最詳其言曰人之一身知覺運用莫非心之所為則心者固所以主於身而無動靜語默之間者也然方其靜也事物未至思慮未萌而一性渾然道理全具其所謂中是乃心之所以為體而寂然不動者也及其動也事物交至思慮萌焉則七情迭用各有攸主其所謂和是乃心之所以為用感而遂通者也然性之靜也而不能不動情之動也而必有節焉是則心之所以寂然感通周流貫徹而體用未始相離者也然人有是心而或不仁則無以著此心之妙人雖欲仁而或不敬則無以致求仁之功蓋心主乎一身而無動靜語默之間是以君子之於敬亦無動靜語默而不用其力焉未發之前是敬也固已主乎存養之實已發之際是敬也又常行於省察之間方其存也思慮未萌而知覺不昧是則靜中之動復之所以見天地之心也及其發也事物紛糾而品節不差是則動中之靜艮之所以不獲其身不見其人也有以主乎靜中之動是以寂而未嘗不感有以察乎動中之靜是以感而未嘗不寂寂而常感感而常寂此心之所以周流貫徹而無一息之不仁也然則君子之所以致中和而天地位萬物育者在此而已蓋主於身而無動靜語默之間者心也仁則心之道而敬則心之真也此徹上徹下之道聖賢之本統明乎此則性情之中中和之妙可一言而盡矣熹門人黃幹狀熹行曰道之正統待人而後傳自周以來任傳道之責得統之正者不過數人而能使斯道章章較著者一二人而止耳由孔子而後曾子子思繼其微至孟子而始著由孟子而後周程張子繼其絶至先生而始著蓋千有餘年之間孔孟之徒所以推明是道者既已煨燼殘闕離析穿鑿蠧壞之後扶持植立厥功偉然未及百年踳駁尤甚先生出而自周以來聖賢相傳之道一旦豁然如日中天昭晰呈露起斯文於將墜覺來裔於無窮雖與天壤俱敝可也張栻字敬夫廣漢人栻頴悟夙成父浚愛之自幼學所教莫非仁義忠孝之實長從胡宏仁仲問程氏學宏一見知其大器即以孔門論仁親切之㫖告之栻退而思若有得焉以書質之宏宏喜曰聖門有人矣栻益自奮勵以古聖賢自期作希顔録一篇蚤夜觀省以自警策為人表裏洞然勇於從義無毫髮滯吝朱熹每言己之學乃銖積寸纍而成如敬夫則大本卓然先有見者也栻嘗有言曰學莫先於義利之辨義者本心之所當為而不能自己非有所為而為之者也一有所為而為則皆人欲非天理矣學者稱為南軒先生呂祖謙字伯恭婺州人其學本之家庭有中原文獻之傳長從汪應辰林之竒胡憲游而友張栻朱熹學以關洛為宗旁稽載籍心平氣和不立崖異少卞急一日誦孔子躬自厚而薄責於人之言忽覺平時忿􅓰渙然氷釋朱熹嘗言學如伯恭方是能變化氣質其所講畫將以開物成務既臥病而任重道逺之志不衰居家之政皆可以為後世法祖謙嘗與朱熹書曰學者須是專心致志絶利之原凝聚停畜方始收拾得上又與張栻書曰從前病痛良以嗜欲粗薄故却缺克治經歷之功思慮稍少故却缺操存澄定之力積畜未厚而發用太遽涵泳不足而談說有餘其自克治如此學者稱為東萊先生陸九淵字子靜金溪人少有異禀三四嵗時侍父賀行遇事物必致問一日忽問天地何所窮際父笑而不答遂深思至忘寢食嘗讀書至宇宙二字忽大省曰宇宙內事即已分內事已分內事即宇宙內事又曰宇宙便是吾心吾心即是宇宙千萬世之前有聖人出焉同此心同此理也千萬世之後有聖人出焉同此心同此理也東海有聖人出焉同此心同此理也西南北海有聖人出焉同此心同此理也初九淵之兄九韶嘗有書與朱熹論太極圖說非正曲加扶掖終為病根意謂不當於太極上更加無極二字熹答云不言無極則太極同於一物而不足以為萬化根本不言太極則無極淪於空寂而不能為萬化根本又曰無極只是無形太極只是有理九韶不以為然詆濂溪不已九淵乃復與熹書為申其辨略曰易之大傳曰形而上者謂之道又曰一隂一陽之謂道一隂一陽已是形而上者况太極乎極者中也言無極則是名無中也豈宜以無極字加太極之上無極二字出於老子聖人之書無有也熹答曰大傳既曰形而上者謂之道矣而又曰一隂一陽之謂道此豈真以隂陽為形而上者哉正所以見一隂一陽雖屬形氣然其所以一隂而一陽者是乃道體之所為也故謂道體之至極則謂之太極謂太極之流行則謂之道雖名二物實無兩體周子所以謂之無極者正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也今乃深詆無極之不然則是直以太極為有形狀有方所矣直以隂陽為形而上者則又昧於道器之分矣又於形而上者之上復有况太極乎之語則是又以道上别有一物為太極矣如老子復歸於無極乃無窮之義非若周子所言之意也九淵終不以熹言為是冉書辨之詞加憤厲熹答以為凡辨論亦須平心和氣反覆精詳務求實是乃有歸著如不能然但於匆遽急迫之中肆支蔓躁率之詞以逞其忿懟不平之氣則豈有君子長者之意乎如曰未然我日斯邁而月斯征各尊所聞各行所知無復可望於必同也熹又嘗言子靜兄弟氣象甚好其病却是盡廢講學而專務踐履却於踐履之中要人提撕省察悟得本心此為病之大者要其操持謹質表裏不二實有以過人者惜乎其自信太過規模窄狹不復取人之善將流於異學而不自知耳蔡元定字季通建陽人生而頴悟父發博覽羣書以程氏語録邵氏經世張氏正䝉授元定曰此孔孟正脈也元定涵泳其義既長辨析益精登西山絶頂於書無所不讀於事無所不究義理洞見大原圖書禮樂制度無不精妙著洪範解大衍詳說律呂新書行於世其論經世書曰元㑹運世之數大而不可見分釐絲毫之數小而不可察所可得而數者即嵗月日辰而知之也一世有三十嵗一月有三十日故嵗與日之數三十一嵗有十二月一日有十二辰故日與辰之數十二自嵗月日辰之數推而上之得元㑹運世之數推而下之得分釐絲毫之數三十與十二反覆相乘為三百六十故元㑹運世嵗月日辰八者之數皆三百六十以三百六十乘三百六十為十二萬九千六百故元有十二萬九千六百嵗㑹有十二萬九千六百月運有十二萬九千六百日世有十二萬九千六百辰嵗有十二萬九千六百分月有十二萬九千六百釐日有十二萬九千六百毫辰有十二萬九千六百絲皆天地之自然非假智營力索而天地之運日月之行氣朔之盈虛五星之伏見朓朒屈伸交食淺深之數莫不由此由漢以來以厯數名家者惟太初大衍耳太初以四千六百六十七嵗為元以八十一為分大衍之厯乃以一百六十三億七千四百五十九萬五千二百為元三千四十為分皆附㑹牽合以此求天地之數安得無差乎其竄道州也郡縣逮捕甚急元定色不為動與季子沉徒步就道熹與從游者百餘人餞别蕭寺中坐客興歎有泣下者熹微視元定不異平時因喟然曰友朋相愛之情季通不挫之志可謂兩得之矣衆謂宜緩行元定曰獲罪于天天可逆乎杖屨同其子沉行三千里腳為流血無幾微見于言面至舂陵逺近來學者日衆州士莫不趨席下以聽講說愛元定者謂宜謝生徒元定曰彼以學來何忍拒之若有禍患亦非閉門塞竇所能避也貽書訓諸子曰獨行勿愧影獨寢不愧衾勿以吾得罪故遂懈其志在道逾年卒宋史紀事本末卷二十一
