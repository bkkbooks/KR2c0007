body:
  text: 宋史紀事本末卷十六明馮琦原編陳邦瞻增輯張浚經略關陜髙宗建炎三年五月以張浚為川陜宣撫處置使帝問浚大計浚謂中興當自關陜始慮金人或先入陜窺蜀則東南不可保請身任陜蜀之事置幕府於秦州别遣大臣與韓世忠鎮淮東令吕頥浩扈蹕來武昌為趨陜之計復以張浚劉光世與秦州相首尾帝然之遂以浚為宣撫處置使聽便宜黜陟與沿江襄漢守臣議儲蓄以待臨幸初浚宣撫之議未决監登聞檢院汪若海曰天下者常山蛇勢也秦蜀為首東南為尾中原為脊今以東南為首安能起天下之脊哉將圗恢復必在川陜浚大悅遂決行季陵論任浚太専忤㫖落職與祠秋七月庚子張浚發建康冬十月壬辰張浚治兵於興元以圗中原浚上疏言漢中實形勢之地前控六路之師後據兩川之粟左通荆襄之財右出秦隴之馬號令中原必基於此謹積粟以待巡幸辛丑張浚以趙開為隨軍轉運使專總四川財賦開見浚曰蜀之民力盡矣錙銖不可加獨𣙜貨尚存贏餘而貪猾認為已有共相隱匿惟不恤怨詈斷而敢行庶可救一時之急浚鋭意興復委任不疑於是大變酒法即舊撲買坊場所置隔釀設官主之麯與釀具官悉自買聽釀户各以米赴官自釀斛輸錢三十頭子錢二十二其釀之多寡惟錢是視不限數也又於秦州置錢引務興州鼓鑄銅錢官賣銀絹聽民以錢引或銅錢買之凡民錢當入官者並聽用引折納官支出亦如之民以為便時浚荷重寄旬犒月賞期得士死力費用不資盡取辦於開開悉智慮於食貨算無遺䇿雖支費不可計而資財常有餘十二月甲申張浚承制拜曲端為威武大將軍宣撫處置司都統制初曲端欲斬王庶朝廷疑其叛浚以百口保之且與敵屢角欲仗其威聲遂有是拜軍士悅服浚又辟劉子羽參議軍事子羽薦涇原都監吳玠弟璘之才勇浚以玠為統制璘掌帳前親兵四年夏四月金羅索既陷陜州遂長驅入潼關曲端遣吳玠拒之於彭原而自擁兵邠州為援金人來攻玠擊敗之薩里罕懼而泣羅索整軍復戰玠軍敗績部將楊晟死之端退屯涇原金乘勝焚邠州玠怨端不為援大詬之由是二人有隙羅索以端全軍退去且入夏遂復還河東六月癸酉張浚罷其都統制曲端浚雖重用端然以人言浸潤不能無疑乃使張彬詣渭州察之彬至謂端曰今兵合財備羅索以孤軍深入吾境我合諸路攻之不難端曰彼將士精鋭且因糧於我我今反為客未可勝也若按兵據險時出偏師以擾其耕穫彼不得耕穫必取糧河東則我為主矣如此一二年彼必困敝乃可圖也萬一輕舉後憂方大彬還白浚浚不以為然及聞烏珠留江淮議出師撓之端曰平原廣野敵便於衝突而我軍未嘗習戰金人新造之勢難與爭鋒宜訓兵秣馬保疆而已後十年乃可浚積前疑遂以彭原之敗罷端兵柄再貶海州團練副使萬安軍安置秋七月金烏珠引兵趨陜西時張浚以金兵萃淮上懼其復擾東南謀牽制之欲出兵分道由同州鄜延以搗其虛烏珠聞之遂自六合引兵趨陜西金主亦以羅索專攻陜西所下城邑旋復拒守因其請益兵命鄂爾多往監其軍張浚遣兵復陜西軍州趙哲復鄜州吳玠復永興軍其餘州縣多迎降九月癸亥張浚聞烏珠將至檄召熙河劉錫秦鳳孫偓涇原劉錡環慶趙哲四經略及吳玠之兵合四十萬人馬七萬匹以錫為統帥迎敵決戰王彥諫曰陜西兵將上下之情未通若不利則五路俱失不若且屯利閬興洋以固根本敵入境則檄五路之兵來援萬一不捷未大失也浚不從劉子羽亦力言未可浚曰吾寧不知此顧東南事方急不得不為是爾吳玠郭浩皆曰敵鋒方鋭宜各守要害須其弊而乘之亦不從遂行次於富平縣劉鍚㑹諸將議戰玠曰兵以利動今地勢不利未見其可宜擇高阜據之使不可勝諸將皆曰我衆彼寡又前阻葦澤敵有騎不得施何用他徙己而羅索引兵驟至輿柴囊土籍淖平行進薄諸營錫等與之力戰劉錡身率將士薄敵陳殺獲頗多勝負未分而敵鐵騎直擊趙哲軍他將不及援哲離所部將校望見塵起遂驚遁諸將皆潰敵乘勝而進關陜大震浚時駐邠州督戰既敗退保秦州召趙哲斬之而安置劉錫於合州令諸將各還本路上書待罪自是關陜不可復論者咎浚之輕師失律十一月金人入德順軍張浚退保興州時輜重焚棄將士散亡惟親兵千餘自隨人情大沮或請徙治䕫州參軍事劉子羽叱之曰孺子可斬也四川全盛敵欲侵之久矣直以川口有鐵山棧道之險未敢遽窺耳今不堅守縱使深入而吾僻處䕫峽遂與關中聲援不相聞進退失據悔將何及今幸敵方肆掠未逼近郡宣司但當留駐興州外繫關中之望內安全蜀之心急遣官屬出關呼召諸將收集散亡分布隘險堅壁固壘觀釁而動庶幾可以補前愆耳浚然其言而諸參佐無敢行者子羽即請奉命乃單騎至秦州召諸亡將時諸將不知宣司所在及聞命大喜悉以其衆來㑹凡十餘萬人軍勢復振子羽因請遣吳玠聚兵扼險於鳯翔大散關東之和尚原以斷敵來路關師古等聚熙河兵於岷州大潭孫偓賈世方等聚涇原鳯翔兵於階成鳯三州以固蜀口金人知有備遂引去紹興元年三月金人破福津蹂同谷以迫興州浚遂退保閬州而以張深為四川制置使與劉子羽趨益昌王庶為利䕫制置使節制陜西諸路知興元府六月張浚以吳玠為陜西諸路都統制時關隴六路盡陷於金止餘階成岷鳯洮五郡及鳯翔之和尚原隴州之方山原而已八月丁卯張浚殺前威武大將軍曲端浚既敗於富平乃思端言召之還稍復其官徙閬州將復用之吳玠憾端因言端再起必不利於公王庶又從而間之玠復書曲端謀反四字於手以示浚庶又言端嘗作詩題柱曰不向關中興事業却來江上泛漁舟謂其指斥乘輿浚乃送端於恭州獄有武臣康隨者嘗以事忤端端鞭其背隨憾端入骨浚以隨提㸃䕫路刑獄端聞之曰吾其死矣呼天者數聲端有馬名鐵象日馳四百里至是連呼鐵象可惜者數聲乃赴逮既至隨令獄吏縶維之糊其口脅之以火端乾渴求飲與之酒九竅流血而死陜西士大夫莫不痛惜之軍士悵恨有叛去者未幾金人再戰於富平浚師詐張端旗以懼敵金羅索知端已死撫掌笑曰何紿我也師復敗二年五月張浚以劉子羽知興元府九月丙戌以王似為川陜宣撫處置副使張浚在關陜三年訓新集之兵當方張之敵以劉子羽為上賔任趙開為轉運擢吳玠為大將子羽慷慨有才略開善理財而玠每戰輒勝西北遺民歸附者衆故關陜雖失而全蜀安堵且以形勢牽制東南江淮亦賴以安朝廷疑浚殺趙哲曲端為無辜任子羽開玠為非是乃以似為副使浚始不安十二月甲辰召張浚知樞密院事浚聞王似來上疏求解兵柄且論似不可任吕頥浩不恱朱勝非又以宿憾日短浚故召之而以盧法原為川陜宣撫副使與王似同治司事四年三月乙丑張浚至臨安浚雖被召以劉子羽等軍敗祕其事未行王似盧法原亦未赴閬已而詔押似法原赴鎮浚及子羽王庶劉錫等俱赴行在初辛炳知潭州浚在陜以檄發兵炳不遣浚奏劾之至是炳為御史中丞率殿中侍御史常同等劾浚喪師失地跋扈不臣遂落職奉祠福州居住安置劉子羽於白州詔以王似為川陜宣撫使盧法原吳玠副之㑹烏珠攻關為吳玠所敗法原素與玠不睦玠因奏功訟法原不濟師上手詔詰問法原憂恚而卒八月戊子改命趙鼎都督川陜荆襄諸軍事鼎辭以非才帝曰四川全盛半天下之地盡以付卿黜陟專之可也鼎條奏便宜復為朱勝非所抑乃上疏言頃者陛下遣張浚出使川陜國勢百倍於今浚有補天浴日之功陛下有礪山帶河之誓君臣相信古今無二而終致物議以被竄逐夫喪師失地浚則有之然未至如言者之甚也大抵專黜陟之典受不御之權則小人不安其分謂爵賞可以茍求一不如意便生觖望是時蜀士至於醵金募人詣闕訟之以無為有何以自明故有志之士為國立事者每以浚為戒今臣無浚之功當此重責去朝廷逺恐好惡是非行復紛紛於聰明之下矣望憫臣孤忠使得展布四體少寬陛下西顧之憂又言臣所請兵不滿數千半皆老弱所齎金帛至微薦舉之人除命甫下彈墨己行臣日侍宸衷所陳己艱難況在萬里之外乎鼎旋以入相不果行吳玠兄弟保蜀高宗紹興元年冬十一月癸酉金烏珠冦和尚原吳玠及其弟璘大敗之玠自富平之敗收散卒保和尚原積粟繕兵列柵為死守計或謂玠宜退保漢中扼蜀口以安人心玠曰我保此敵决不敢越我而進是所以保蜀也玠在原上鳯翔民感其遺惠相與夜輸芻粟助玠玠償以銀帛民益喜輸者益多金人怒伏兵渭河邀殺之且令保伍連坐民冒禁如故金將摩哩自鳯翔烏嚕舍琿自階城出散關約日㑹和尚原烏嚕舍琿先期至陳北山索戰玠命諸將堅陳待之更戰迭休金人大敗遁去摩哩方攻箭筈關玠復遣將擊敗之兩軍終不得合金人自起海角狃於常勝及與玠戰輒敗憤甚謀必取玠於是烏珠㑹諸帥兵十餘萬造浮梁跨渭自寶雞結連珠營壘石為城夾澗與官軍相拒進薄和尚原玠與弟璘選徑弩命諸將分畨迭射號駐隊矢連發不絶繁如雨注敵稍却則以竒兵旁擊絶其糧道度其困且走設伏於神坌以待之敵至伏發遂大亂玠因進兵夜擊大敗之烏珠中二流矢僅以身免亟剃其鬚髯而遁初金人之至也玠與璘以散卒數千駐原上朝問隔絶人無固志有謀劫玠之兄弟北降者玠知之召諸將㰱血盟勉以忠義皆感泣願盡死力故能成功三年春正月乙丑金人陷金州時金人久窺蜀以吳璘駐兵和尚原扼其衝不得逞將出竒取之乃以叛將李彥琪駐秦州睨仙人關以綴吳玠河池之師復遊騎出熙河以綴關師古薩里罕自商於直搗上津攻金州王彥以三千人迎敵而敗焚積聚退保石泉薩里罕遂乘勝而進二月辛卯王彥引兵㑹吳玠於饒風關金人長驅趨洋漢劉子羽聞王彥敗亟命田晟守饒風關而遣人召吳玠入援玠自河池日夜馳三百里至饒風以黃柑遺敵曰大軍逺來聊用止渴薩里罕大驚以杖擊地曰爾來何速耶遂悉力仰攻一人先登二人擁後先者既死後者代攻玠軍弓弩亂發大石摧壓如是者六晝夜死者山積敵乃更募死士由間道自祖溪關入繞出玠後乘高以瞰饒風諸軍不支遂潰敵入洋州玠邀子羽去子羽不可而留玠固守定軍山玠難之遂退保興元之西縣子羽亦焚興元退保大安之三泉縣己亥薩里罕遂入興元至金牛鎮四川大震子羽從兵不滿三百與士卒取草芽木甲食之遺玠書訣别玠得書未有行意其愛將楊政大呼軍門曰節使不可負劉待制不然政輩亦舍節使去矣玠乃間道㑹子羽子羽留玠等守三泉玠曰關外蜀之門户不可輕棄復往守仙人關子羽以潭毒山形斗拔其上寬平有水乃築壁壘方成而金人已至距營十數里子羽據胡床坐壘口諸將泣告曰此非待制坐處子羽曰子羽今日死於此敵尋亦引去時張浚亦欲移守潼川子羽遺書言已在此金人必不南浚乃止金兵由斜谷北去子羽謀邀之於武休不及薩里罕既回鳯翔遣十人持書招子羽子羽皆斬之而縱其一還曰為我語敵欲來即來吾有死爾何可招也初子羽聞有金兵預徙梁洋之積及金人深入餽餉不繼殺馬及兩河所僉軍士以食而子羽玠復腹背要擊之死傷十五六疫癘且作乃引衆還子羽玠因出師掩其後金人墮溪死者不可勝計盡棄輜重而走餘兵不能自拔者悉降子羽遂還興元金人始謀本謂玠在西邊故涉險東來不虞玠馳至雖入三州而得不償失五月丙子王彥復金州金人遂棄均房己卯論金牛之功以吳玠為利州路階成鳯州制置使劉子羽為寶文閣直學士王彥為保大軍承宣使諸將佐第賞有差十一月乙亥金烏珠陷和尚原於是宣撫司分陜西之地自秦鳯至洋州吳玠主之屯仙人關金房至巴逹王彥主之屯通州文龍至威茂劉錡主之屯巴西洮岷至階成關師古主之屯武都四年三月辛亥吳玠吳璘與金烏珠戰於仙人關敗之先是璘守和尚原餽餉不繼玠慮金人必復深入且其地去蜀逺乃命璘别營壘於仙人關右之地名曰殺金平移兵守之至是烏珠薩里罕劉䕫帥步騎十萬破和尚原進攻仙人關自鐵山鑿崖開道循嶺東下玠以萬人守殺金平以當其衝璘自武階路入援先以書抵玠謂殺金平之地濶逺前陳散漫後陳阻隘宜益修第二隘示必死戰然後可以必勝玠從之急治第二隘璘冒圍轉戰七晝夜始得與玠㑹於仙人關敵首攻玠營玠擊走之又以雲梯攻壘壁楊政以撞竿碎其梯以長矛刺之諸將有請别擇地以守者璘拔刀畫地以示諸將曰死則死此退者斬金軍分為二烏珠陳於東韓常陳於西璘率鋭卒介其間左繞右縈隨急而後戰戰久璘軍少憊急屯第二隘金生兵踵至人被重鎧鐵鈎相連魚貫而上璘以駐隊矢疊射矢下如雨死者層積敵踐而登薩里罕駐馬四視曰吾得之矣翌日命攻西北樓姚仲登樓酣戰樓傾以帛為繩挽之復正金人用火攻樓仲以酒缶撲滅之玠急遣統領田晟以長刀大斧左右擊明炬四山震鼓動地明日大出兵統領王喜王武率鋭士分紫白旗入金營金陳亂奮擊射韓常中左目金人始宵遁玠遣統制張彥劫山寨王俊伏河池扼其歸路又敗之是役也烏珠以下皆携妻孥來劉䕫乃劉豫腹心本謂蜀可圖既不得逞度玠終不可犯乃還據鳯翔授甲士田為久留計自是不敢妄動矣五年春正月吳玠復秦州玠聞敵犯淮南遣吳璘楊政乘機牽制璘等出竒兵自天水至秦拔其城薩里罕聞秦被圍集諸道兵來援政復擊敗之六年八月癸卯四川都轉運使趙開罷時吳玠為宣撫副使專治戰守於財計不問盈虛一切以軍期趣辦於開數以餽餉不繼訴於朝開亦自劾老憊求去朝廷為之交解乃以席益為制置大使位宣撫副使上州軍兵馬並𨽻大使司邊防重事仍令宣撫司處置益至四川頗侵用軍期錢開復訴於朝又數增錢引而軍計猶不給朝廷以開益不協乃召開赴行在而以李逮代之自金人犯陜蜀開職饋餉軍用無乏其後計臣屢易於開經畫無敢變更然茶鹽𣙜酤竒零絹帛之征遂為蜀常賦則開所作俑也益尋以母喪亦去帝問胡交修孰可守蜀者交修以從子世將對遂以世將為四川安撫制置使九年春正月己亥以吳玠為四川宣撫使玠與金人對壘且十年常苦逺餉勞民屢汰冗員節浮費益治屯田帝以玠功高因和議成授玠開府儀同三司四川宣撫使陜西階成等州皆聽節制六月己巳吳玠卒玠用兵本孫吳務逺略不求近小利故能保必勝御下嚴而有恩雖身為大將卒伍最下者得以情達故士樂為之死選用將佐視勞能為髙下先後不以親故權貴撓之自富平之敗金人專意圗蜀微玠身當其衝無蜀久矣故西人思之立祠以祀秋七月乙巳以胡世將為四川宣撫副使世將至謂諸將曰世將不習騎射不習敵情朝廷所以遣來者襲國家故事以文臣為制將耳軍事一無改吳宣撫之規各推誠心共濟國事可也諸將皆服十年五月詔吳璘同節制陜西諸軍時金人復渝􅉀薩里罕入同州趨永興軍陜西州縣所至迎降遂進據鳯翔初關陜新復朝廷分軍屯熙秦鄜延諸路薩里罕既至鳯翔陜右諸軍皆隔在敵後逺近大震六月吳璘敗金人於扶風初胡世將在河池倉卒召諸將議時吳璘孫渥已在楊政田晟繼至諸將請少退清野以挫其鋒渥言河池不可守璘厲聲折之曰懦語沮軍可斬也璘請以百口保破敵世將壯之指所居帳曰世將誓死於此遂遣諸將分據渭南尋有詔世將移屯蜀口㑹金人犯石壁寨璘遣姚仲等破走之既而薩里罕使呼雅郎君以三千騎衝璘軍璘使統制李師顔以驍騎擊敗之敵先於扶風築城既敗入城拒守官軍攻拔其城獲三將及女真百七十七人薩里罕怒甚自戰百通坊仲力戰破之薩里罕還鳯翔由是金人不敢度隴分屯之軍得全師而還閏月薩里罕與吳璘楊政夾渭河而陳璘駐兵大蟲嶺薩里罕覘之曰善戰者立於不敗之地此難與爭乃引去趨邠州田晟遣將拒之於青溪嶺胡世將又遣王彥楊從儀分道而出屢戰敗之薩里罕還屯鳯翔既而復出攻涇州田晟據山為陳乘敵壁未定奮兵擊敗之奪其兵馬甚衆薩里罕走還鳯翔十一年九月丙申吳璘及金人戰於劉家灣大敗之癸亥受詔班師初吳璘進兵拔秦州金統軍胡盞與蘇卜實合兵五萬屯劉家圈璘請於胡世將擊之世將問䇿安出璘曰有新立疊陳法每戰以長鎗居前坐不得起次最強弓次強弩跪膝以俟次神臂弓約賊相搏至百步內則神臂先發七十步強弓併發次陳如之凡陳以拒馬為限鐵鈎相連俟其傷則更代代則以鼓為節騎兩翼以蔽於前陳成而騎退謂之疊陳世將善之諸將竊議曰吾軍其殱於此乎璘曰此古束伍令也軍法有之諸君不識耳得車戰遺意無出於此戰士心定則能持滿敵雖鋭不能當也遂進次劉家灣時和珍蘇卜實據險自固前臨峻嶺後控臘家城謂璘必不敢輕犯先一日璘㑹諸將問所以攻姚仲曰戰於山上則勝璘然之乃請戰敵皆笑夜半璘遣姚仲王彥銜枚渡河陟峻嶺截坡上約二將上嶺而後發火二將至嶺寂無人聲軍已畢列萬炬齊發敵駭愕曰吾事敗矣蘇卜實善謀和珍善戰二酋異議璘先以兵挑之和珍果出鏖戰璘以疊陳法更迭戰輕裘駐馬亟麾之士殊死鬬金人大敗降者萬人和珍走保臘家城璘圍而攻之城垂破朝廷方主和議以驛書詔班師時璘拔秦州其勢方張陜西河東首領爭來附而楊政拔隴州及破岐下諸屯郭浩復華州入陜州矣詔至璘即臘家城引兵還河池浩還延安政還鞏世將惟浩嘆而已三十一年五月乙未以吳璘為四川宣撫使王剛中同處置軍事時聞金主亮將敗盟故命璘為之備八月金西道行營圖克坦喀齊喀將兵扼大散關遊騎攻黃牛堡守將李彥堅告急人情洶洶制置使王剛中跨一馬馳二百里至吳璘營起璘於帳中責之曰大將與國誼同休戚臨敵安得高枕而卧璘大驚即馳至殺金平駐軍青野原益調內郡兵分道而進授以方略以援黃牛剛中又以蠟書抵張正彥濟師西師大集李彥堅以神臂弓射金師却之璘遣别將彭青至寶雞渭河夜劫橋頭寨破之又遣劉海復秦州彭青復隴州金師既退剛中倍道馳還謂其屬李燾曰將帥之力吾何有焉冬十月詔吳璘出兵漢中璘遂復商虢州三十二年二月金人犯虢州吳璘遣將楊從儀等攻之分兵守和尚原金人走寶雞璘遣兵復河源州及積石鎮戎軍遂復大散關時璘遣姚仲攻德順踰四旬不克璘以李師顔代之遣子挺節制軍馬挺與敵戰於瓦亭大敗之擒其將耶律紏堅等百三十七人金人悉兵趨德順璘自將往督師先壁於險且治夾河戰地按行諸屯斬不用命者先以數百騎嘗敵敵一鳴鼓鋭士空壁躍出突璘軍璘軍得先治地無不一當百至暮璘忽傳呼某將戰不力人益奮搏敵敵大敗遁入壁黎明師再出敵堅壁不動㑹大風雪金人拔營去凡八日而克璘入城市不改肆又遣嚴忠取環州遂還河池姚仲等又復蘭㑹熙鞏等州及永安軍十二月丙寅詔吳璘班師時金以重兵扼鳯翔爭吳璘新復十三州三軍璘亟馳德順以備之已而金札實結率師十萬來攻璘力戰拒之㑹史浩上言官軍西討東不可過寶雞北不可過德順若兵宿於外去川口逺則敵必襲之朝廷遂欲棄三路虞允文時為川陜宣諭使疏言恢復莫先於陜西陜西五路新復州郡又係於德順之存亡一旦棄之則窺蜀之路愈多西和階成利害至重不可不慮疏上罷允文知䕫州遂詔璘班師金人乘其後璘軍亡失者三萬三千部將數十人連營痛哭聲振原野於是秦鳯熙河永興三路新復十三州皆復為金取嶽飛規復中原秦檜害飛附高宗紹興六年六月嶽飛進屯襄陽時張浚視師江上㑹諸大帥獨稱韓世忠與飛可倚大事命飛屯襄陽以窺中原曰此君素志也飛遂移軍京西除宣撫副使置司襄陽命往武昌調軍秋七月嶽飛遣王貴等攻虢州下之獲糧十五萬石降者數萬人張浚曰飛措置甚大今已至伊洛則太行一帶山寨必有應者已而忠義社梁興等果歸之飛遣楊再興進兵至長水及僞齊李成孔彥舟連戰皆捷至蔡州克其城時僞齊屯唐州嶽飛遣王貴董先等攻破之飛因奏進取中原不許飛召貴等還七年夏四月嶽飛乞終喪遂還廬山張浚使張宗元監其軍先是飛自鄂入見拜太尉繼除宣撫使以王德酈瓊兵𨽻之帝詔德瓊曰聽飛號令如朕親行飛見帝數論恢復之略疏言金人所以立劉豫於河南蓋欲荼毒中原以中國攻中國彼得以休兵觀釁耳臣願陛下假臣月日提兵趨京洛據河陽陜府潼關以號召五路叛將叛將既還遣王師先進豫必棄汴而走河北京畿陜右可以盡復然後分兵濬滑經略兩河如此則逆豫成擒僞齊可滅社稷長久之計實在此舉帝曰有臣如此朕復何憂進止之機朕不中制復召至寢閣命之曰中興之事一以委卿飛方圖大舉㑹秦檜主和議忌之遂不以德瓊軍𨽻飛詔飛詣張浚議事時浚奏罷劉光世兵柄以其軍𨽻都督府因分為六軍謀置帥謂飛曰王德淮西軍所服浚欲以為都統而命吕祉以督府參謀領之飛曰德與酈瓊素不相下一日揠之在上則必爭吕尚書不習軍旅恐不足服衆浚曰張俊楊沂中何如飛曰張宣撫飛之舊帥也其人暴而寡謀尤瓊所不服沂中視德等耳亦豈能御此軍哉浚艴然曰固知非太尉不可飛曰都督以正問飛飛不敢不盡其愚豈以得軍為念哉飛既與浚忤即日上章乞解兵柄終喪服以張憲攝軍事步歸廬山浚怒奏言飛積慮專在併兵遂命張宗元權宣撫判官監其軍六月嶽飛入朝復還鎮帝纍詔趣飛還飛不得已趨朝待罪帝慰遣之及張宗元還言將和士鋭人懷忠孝皆飛訓養所致帝大悅飛至鎮奏言比者寢閣之命咸謂聖斷已堅何至今尚未决臣願提兵進討順天道因人心以曲直為老壯以逆順為強弱萬全之效可必錢塘僻在海隅非用武地願速都上游用漢光武故事親率六軍往來督戰庶將士知聖意所向人人用命不報八月以王德為淮西都統制酈瓊副之瓊與德素等夷不相下吕祉還朝德瓊列狀交訴於都督府及御史臺乃詔德還建康仍命吕祉往廬州節制之祉至廬州瓊又訟德祉諭曰若以君等為是則大相誑然張丞相喜人向前倘能立功雖大過亦濶略況小嫌耶當為諸公辨之保無他虞瓊等感泣事小定祉乃密奏乞罷瓊及統制靳賽兵權書吏漏語於瓊瓊令人遮祉所遣郵置盡得祉所言大怨怒㑹聞朝廷命楊沂中為淮西制置使劉錡為副召瓊赴行在瓊大懼遂謀叛諸將晨謁祉瓊䄂出文書示中軍張璟曰諸兵官有何罪張統制乃以如許事聞之朝廷耶祉大驚欲走不及為瓊所執璟及兵馬鈐轄喬仲福統制劉永衡皆死瓊遂率全軍四萬人渡淮降劉豫擁祉北去距淮三十里祉下馬立謂瓊曰劉豫逆賊我豈可見之衆逼祉上馬祉罵曰死則死於此又諭其衆曰劉豫逆臣爾軍中豈無英雄乃隨酈瓊去乎衆頗感動凡千餘人環立不行瓊恐搖動心急策馬先渡祉遂遇害事聞張浚始悔不用嶽飛之言飛乞進討瓊不許詔駐師江州為淮浙援八年二月嶽飛乞增兵不許九年春正月嶽飛在鄂州聞金將歸河南地上言金人不可信和好不可恃相臣謀國不臧恐貽後世譏秦檜銜之及赦書至鄂飛表謝寓和議不便之意有願定謀於全勝期收地於兩河唾手燕雲終欲復仇而報國矢心天地尚令稽首以稱藩之語檜益怒遂成仇隙和議成例加爵賞飛加開封儀同三司力辭言今日之事可危而不可安可憂而不可賀可訓兵飭士謹備不虞而不可論功行賞取笑敵人三詔不受帝溫言奬諭之飛乃受命㑹遣士㒟謁諸陵飛請以輕騎從灑掃實欲觀釁以伐謀又奏金人無事請和此必有肘腋之虞名以地歸我實寄之也檜白帝止其行十年五月嶽飛敗金人於京西時金人攻拱亳劉錡告急命飛馳援飛遣張憲姚政赴之帝賜札曰設施之方一以委卿朕不遙度飛乃遣王貴牛皋董先楊再興孟邦傑李寶等分布經略西京汝鄭穎昌陳曹光蔡諸郡又命梁興渡河糾合忠義社取河東北州縣又遣兵東援劉錡西援郭浩自以其軍長驅以闞中原將發密奏言先正國本以安人心然後不常厥居以示無忘復讐之意帝得奏大褒其忠授少保河南府路陜西河北路招討使尋改河南北諸路招討使未幾所遣諸將李寶牛皋等相繼敗金人於京西閏月嶽飛遣統制張憲擊金韓常於穎昌又復淮寧府郝晸復鄭州張應韓清復西京楊遇復南城軍喬握堅復趙州他將所至皆捷中原大振河南兵馬鈐轄李興聚兵應飛收復伊陽等八縣及汝州金河南尹李成棄城遁走詔興知河南府飛又使張應㑹興復永安軍秋七月嶽飛大軍在穎昌諸將分道出戰自以輕騎駐郾城兵勢甚鋭烏珠大懼㑹龍虎大王議以為諸帥易與獨飛不可當欲誘致其師併力一戰中外聞之皆懼詔飛審處自固飛曰金人技窮矣乃日出挑戰且罵之烏珠怒合龍虎大王蓋天大王及韓常之兵逼郾城飛遣子雲領騎兵直貫其陳戒之曰不勝先斬汝鏖戰數十合賊尸布野初烏珠有徑軍皆重鎧貫以韋索三人為聨號拐子馬官軍不能當是役也以萬五千騎來飛戒步卒以麻札刀入陳勿仰視第斫馬足拐子馬相連一馬仆二馬不能行官軍奮擊遂大破之烏珠大慟曰自海上起兵皆以此勝今已矣因復益兵而前飛自以四十騎突戰敗之烏珠憤甚合師十二萬次於臨穎楊再興以三百騎遇之於小商橋驟與之戰殺二千人及萬户撒八千户百人再興死獲其尸得箭鏃二升飛痛惜之張憲繼至復戰烏珠夜遁追奔十五里飛謂子雲曰賊屢敗必還攻穎昌汝宜速援王貴既而烏珠果至貴將遊奕雲將背嵬戰於城西雲以騎兵八百挺前決戰步兵張左右翼繼之殺烏珠壻夏金吾副統軍尼瑪哈索貝勒烏珠遁去梁興以飛命㑹太行忠義及兩河豪傑敗金人於垣曲又敗之於沁水遂復懷衛州斷金人山東河北之道金人大恐飛奏興等過河人心願歸朝廷金兵屢敗烏珠等皆令老少北去正中興之機飛進軍距汴京四十五里與烏珠對壘而陳遣驍將以背嵬五百奮擊大破之烏珠遁還汴京飛檄陵臺令行視諸陵葺治之先是飛遣梁興等布德意招結兩河豪傑山寨韋銓孫謀等斂兵固堡以待王師李通胡清李寶李興張恩孫琪等舉衆來歸金人動息山川險要一時皆得其實盡磁相開德澤潞晉絳汾隰之境皆期日興兵與官軍㑹其所揭旗以嶽為號父老百姓爭挽車牽牛載糗糧以饋義軍頂盆焚香迎候者充滿道路自燕以南金號令不行烏珠欲簽軍以抗飛河北無一人從者乃嘆曰自我起北方以來未有如今日之挫衄金師烏凌阿思謀素號桀黠亦不能制其下但諭之曰毋輕動俟嶽家軍來即降金統制王鎮統領崔慶將官李覬崔虎葉旺等皆率所部降以至禁衛龍虎大王下竒徹千户髙勇之屬皆密受飛旗榜自北方來降金將軍韓常欲以五萬衆內附飛大喜語其下曰直抵黃龍府與諸公痛飲耳方指日渡河而秦檜方欲畫淮以北棄之風臺臣請班師飛奏金人鋭氣沮喪盡棄輜重疾走渡河而我豪傑向風士卒用命時不再來機難輕失檜知飛志鋭不可回乃先請張俊楊沂中等歸而後言飛孤軍不可久留乞令班師一日奉十二金字牌飛憤惋泣下東向再拜曰十年之力廢於一旦飛班師民遮馬慟哭訴曰我等戴香盆運糧草以迎官軍金人悉知之相公去我輩無噍類矣飛亦悲泣取詔示之曰吾不得擅留哭聲震野飛留五日以待其徙從而南者如市亟奏以漢上六郡閒田處之方烏珠棄汴去有書生叩馬曰太子毋走嶽少保且退矣烏珠曰嶽少保以五百騎破吾十萬京城日夜望其來何謂可守書生曰自古未有權臣在內而大將能立功於外者嶽少保且不免況欲成功乎烏珠悟遂留飛既歸所得州縣旋復失之飛力請解兵柄不許既而自廬入覲帝問之飛拜謝而已十一年三月金烏珠韓常與龍虎大王合兵逼廬州帝趣嶽飛應援凡十七札飛奏金人傾國南來巢穴必虛若長驅京洛以搗之彼必奔命可坐而敝時飛方苦寒嗽力疾而行又恐帝急於退敵乃奏臣如搗虛勢必得利若以敵方在邇未暇逺圖欲乞親至蘄黃以議攻却帝大喜師至廬州金兵望風而遁飛還兵於舒以俟命烏珠破濠州張俊駐軍黃連鎮不敢進楊沂中遇伏而敗帝命飛救之金人聞飛至又遁時和議已決秦檜患飛異己乃密奏召三大將論功行賞韓世忠張俊既至飛獨後檜又用參政王次翁計俟之六七日既至授樞密副使飛固請還兵柄詔同俊往楚州措置邊防總韓世忠軍還駐鎮江初飛在諸將中年最少以列校拔起屢立顯功世忠俊不能平飛屈己下之而俊益忌飛淮西之役俊以前途糧乏訹飛飛不為止帝賜札褒諭有曰轉餉艱阻卿不復顧俊疑飛漏言還朝反倡言飛逗遛不進以乏餉為辭至視世忠軍俊知世忠忤檜欲與飛分其背嵬軍飛義不肯俊大不悅及同行楚州城俊欲修城為備飛曰當戮力以圖恢復豈可為退保計俊變色㑹世忠軍吏景著言二樞密若分世忠軍恐至生事檜捕著下大理獄將以扇搖誣世忠飛馳書告以檜意世忠見帝自明俊於是大憾飛倡言飛議棄山陽且密以飛報世忠事告檜檜大怒初檜逐趙鼎飛每對客歎息又以恢復為己任不肯附和議讀檜奏至德無常師主善為師之語惡其欺罔恚曰君臣大倫根於天性大臣而忍面謾其主耶烏珠遺檜書曰爾朝夕以和請而嶽飛方為河北圖必殺飛始可和檜亦以飛不死終梗和議已必及禍力謀殺之以諫議大夫万俟卨與飛有怨諷卨劾飛又諷中丞何鑄侍御史羅汝楫交章彈論大率謂今春金人攻淮西飛略至舒蘄而不進比與俊按兵淮上又欲棄山陽而不守飛纍請罷樞柄尋還兩鎮節充萬壽觀使奉朝請檜志未伸又誘張俊令劫王貴誘王俊誣告張憲謀還飛兵柄檜遣人捕飛父子證張憲事使者至飛笑曰皇天后土可表此心初命何鑄鞫之飛裂裳以背示鑄有盡忠報國四大字深入膚理既而閲實無左驗鑄明其無辜既命万俟卨卨誣飛與憲書令虛申探報以動朝廷雲與憲書令措置使飛還軍言其書已焚飛坐繫兩月無可證者或教卨以臺章所指淮西事為言卨喜白檜簿録飛家取當時御札藏之以滅迹取行軍時日雜定之傅㑹其獄嵗暮獄不成檜手書小紙付獄即報飛死時年三十九雲棄市籍家資徙家嶺南幕屬于鵬等從坐者六人初飛在獄大理寺丞李若朴何彥猷大理卿薛仁輔並言飛無罪卨俱劾去宗正卿士㒟請以百口保飛卨亦劾之竄死建州布衣劉允升上書訟飛寃下棘寺以死凡傅成其獄者皆遷轉有差獄之將上也韓世忠不平詣檜詰其實檜曰飛子雲與張憲書莫須有世忠曰莫須有三字何以服天下時洪皓在金國中蠟書馳奏以為金人所畏服惟飛至以父呼之金人聞其死酌酒相賀飛事母至孝母卒水漿不入口者三日家無姬侍吳玠素服飛飾名姝遺之飛曰主上宵旰豈大將安樂時耶却不受少豪飲帝戒之曰卿異時到河朔乃可飲遂絶不飲帝初為飛營第飛辭曰敵未滅何以家為或問天下何時太平飛曰文臣不愛錢武臣不惜死天下太平矣師每休舍課將士注坡跳壕皆重鎧習之子雲嘗注坡馬躓怒而鞭之曰前臨大敵亦如是耶卒有取民麻一縷以束芻者立斬以狥卒夜宿民間開門願納無敢入者軍號凍死不拆屋餓死不鹵掠卒有疾躬為調藥諸將逺戍遣妻問勞其家死事者哭之而育其孤或以子婚其女凡有犒賞均給軍吏秋毫不私善以少擊衆欲有所舉盡召諸統制與謀謀定而後戰故有勝無敗猝遇敵不動故敵為之語曰撼山易撼嶽家軍難張俊問用兵之術曰智仁信勇嚴闕一不可調軍食必蹙額曰東南民力竭矣好賢禮士覽經史雅歌投壺恂恂如書生然忠憤激烈議論持正不挫於人卒以此得禍史臣曰西漢而下若韓彭絳灌之為將代不乏人求其文武全器仁智並施如宋嶽飛者一代豈多見哉史稱關雲長通春秋左氏學然未嘗見其文章飛北伐軍至汴梁之朱仙鎮自為表答詔忠義之言流出肺腑真有諸葛孔明之風而卒死於秦檜之手蓋飛與檜勢不兩立使飛得志則金讐可復宋恥可雪檜得志則飛有死而已昔劉宋殺檀道濟下獄嗔目曰自壞爾萬里長城髙宗忍自棄其中原故忍殺飛鳴呼寃哉順昌柘皋之捷髙宗紹興十年二月以劉錡為東京副留守五月劉錡大敗金人於順昌初錡赴東京率所部王彥八字軍三萬七千及殿司卒三千自臨安泝江絶淮至渦口方食忽暴風拔坐帳錡曰此敵兆也主暴兵即下令兼程而進聞金人敗盟南下錡與將佐捨舟陸行先趨三百里至順昌城中諜報東京已降知府陳規見錡問計錡曰城中有糧則能與君共守規曰有米數萬斛錡曰可矣乃與規議斂兵入城為守禦計時八字軍以將駐於汴皆攜孥以行至是錡召諸將問計諸將皆曰金兵不可敵也請以精鋭為殿步騎遮老稚順流還江南錡曰吾本赴官留司今東京雖失幸全軍至此有城可守奈何棄之吾意已決敢言去者斬惟部將許清號夜義者奮曰太尉奉命副守汴京軍士扶攜老幼而來今避而走易耳然欲棄父母妻子則不忍欲與偕行則敵翼而攻何所逃之不如相與努力一戰於死中求生也議與錡合錡大喜鑿舟沈之示無去意置家寺中積薪於門戒守者曰脫有不利即焚吾家無辱敵手也分命諸將守諸門明斥堠募土人為間探於是軍士皆奮男子備戰守婦人礪刀劍爭呼躍曰平時人欺我八字軍今日當為國家破敵立功時守備一無可恃錡於城上躬自督厲取僞齊所造癡車以輪轅埋城上又撒民户扉周匝蔽之城外有民居數千家悉焚之凡六日粗畢而遊騎已涉潁河至城下遂圍城錡預於城下設伏擒敵將二人詰之云韓將軍營白沙窩距城三十里錡夜遣千餘人擊之連戰殺敵頗衆已而金三路都統葛王烏祿以兵三萬與龍虎大王合兵薄城下錡令開諸門金人疑不敢近初錡傅城築羊馬垣穴垣為門至是與清等蔽垣為陳金人縱矢皆自垣端軼著於城或止中垣上錡用破敵弓翼以神臂強弩自城上或垣門射敵無不中者敵稍却復以步兵邀擊溺河死者不可勝計破其鐵騎數千時順昌受圍已四日金兵益盛乃移寨於李村距城二十里錡遣驍將閻充募壯士五百夜斫其營是夕天欲雨電光四起見辮髮者輒殱之金兵退十五里錡復募百人往或請銜枚錡笑曰無以枚也命折竹為嘂如市井兒以為戲者人持一以為號直犯金營電所燭則皆奮擊電止則匿不動敵衆大亂百人者聞吹􅑧聲即聚金人益不能測終夜自戰積尸盈野退軍老婆灣烏珠在汴聞之即趣騎急行率十萬衆來援錡㑹諸將問計或言今已屢捷宜乘此勢具舟全軍而歸錡曰朝廷養兵十五年正為緩急之用況已挫敵鋒軍聲方振縱衆寡不侔當有進無退且敵營甚邇而烏珠又來吾軍一動彼躡其後則前功俱廢使敵侵軼兩淮震驚江浙則平生報國之志反成誤國之罪衆皆感動思奮曰惟太尉命錡募得曹成等二人諭之曰遣汝作間事成重賞第如我言敵必不殺汝今置汝綽路騎中遇敵則佯墜馬為敵所得敵帥問我何如人則曰太平邊帥子喜聲伎朝廷以兩國講和使守東京圖逸樂耳已而二人果遇敵被執烏珠問之對如前烏珠喜曰此城易破耳即置鵝車炮具不用明日錡登城望見二人來縋而上之乃敵械繫成等歸以文書一卷繫於械錡懼惑軍心立焚之烏珠至城下責諸將喪師皆曰南朝用兵非昔之比元帥臨城自見錡遣耿訓以書約戰烏珠怒曰劉錡何敢與我戰以吾力破汝城直用靴尖躍倒耳訓曰太尉非但請與太子戰且謂太子必不敢濟河請獻浮橋五所濟而大戰烏珠曰諾乃下令明日府治㑹食遲明錡果為五浮橋於潁河上且毒潁上流及草中戒軍士雖渴死無飲於河敵用長勝軍嚴陳以待諸酋各居一部衆請先擊韓將軍錡曰擊韓雖退烏珠精兵尚不可當法當先擊烏珠烏珠一動則餘無能為矣時天大暑敵逺來疲憊晝夜不解甲人馬饑渴食水草者輒病往往困乏錡士氣閒暇軍皆畨休方晨氣清涼按兵不動逮未申時敵力疲氣索忽遣數百人出西門接戰俄遣數千人出南門戒令勿喊但以鋭斧犯之統制官趙樽韓直身中數矢戰不肯已士殊死鬭入其陳刀斧亂下敵大敗是夕大雨平地水深尺餘明日烏珠拔營去錡遣兵追之死者數萬方大戰時烏珠被白袍乘甲馬以牙兵三千督戰兵皆重鎧甲號鐡浮圖戴鐵兜牟周匝綴長簷三人為伍貫以韋索每進一步即用拒馬擁之人進一步拒馬亦進退不可却官軍以鎗摽去其兜牟大斧斷其臂碎其首敵又以鐵騎分左右翼號拐子馬皆女真為之號長勝軍專以攻堅戰酣然後用之自用兵以來所向無前至是亦為錡軍所殺自辰至申敵敗錡以拒馬木障之少休城上鼓聲不絶乃出飯羮坐餉戰士如平時敵披靡不敢近食已撒拒馬木深入斫敵又大破之棄尸斃馬血肉枕藉車騎器甲積如山阜烏珠平日所恃以為強者十損七八至陳州數諸將之罪韓常以下皆鞭之遂還汴既而洪皓自金密奏順昌之捷金人震恐喪魄燕之重寶珍器悉徙而北意欲捐燕以南棄之故議者謂是時諸將協心分路追討則烏珠可擒汴京可復而王師亟還自失機㑹良可惜也十一年春正月乙卯金烏珠犯壽春初烏珠自敗後留屯京亳出入許鄭之間僉兩河軍與舊部凡十餘萬以謀再舉及聞秦檜召諸軍還遂舉兵攻陷壽春復渡淮陷廬州二月癸酉詔張俊楊沂中赴淮西時烏珠自合肥趨厯陽游騎至江張俊遣王德渡江德曰淮者江之蔽也棄淮不守是謂唇亡齒寒敵數千里逺來餉道決不繼及其未濟擊之可以奪氣若遲之使少安則淮非吾有即渡采石俊督軍繼之宿江中時淮已失守矣德曰明旦當㑹食厯陽已而夜拔和州晨迎俊入烏珠退屯昭關乙亥金人復來爭和州張俊敗之丙子王德敗金人於含山癸未王德田師中復含山及昭關甲申崔皋敗金人於舒城丁亥楊沂中劉錡大敗烏珠軍於柘皋初劉錡自太平渡江與張俊楊沂中㑹而廬州已陷錡乃與關師古據東關之險以遏敵引兵出清溪兩戰皆捷烏珠以柘皋地坦平利於用錡因駐師錡進兵與烏珠夾石梁河而陳河通巢湖廣二丈錡命曳薪疊橋須㬰而成遣甲士數隊踰橋卧槍而坐遣人㑹合張俊楊沂中之師翌日沂中及王德田師中張子蓋諸軍俱至惟俊後期錡與諸將分軍為三並進渡河以擊之師中欲俟俊至德曰事當機㑹復何待即與錡上馬先迎敵沂中繼之烏珠以鐵騎十餘萬分為兩隅夾道而陳德曰賊右陳堅我當先擊之麾軍渡河首犯其鋒一酋被甲躍馬而出德引弓一發斃之乘勝大呼馳擊諸軍鼓譟從之金人以拐子馬兩翼而進德率衆鏖戰沂中曰敵恃弓矢吾有以屈之使萬人持長斧如墻而進敵遂大敗德與錡等追之又敗之於東山敵望見驚曰此順昌旗幟也即走保紫金山是役也失將士九百人金人死者以萬計既而烏珠復親帥兵逆戰於店步沂中等又敗之乘勝逐北遂復廬州三月乙巳張俊楊沂中劉錡奉詔班師行才數里諜報金人攻濠州甚急俊乃復邀沂中錡還㑹於黃連埠同往援距濠六十里而濠南城已陷俊召諸將謀之沂中欲戰錡曰本來救濠今濠已失不若退師據險徐為後圖諸將皆曰善三帥鼎足而營或言敵兵已去錡謂俊曰敵得城遽退必有謀也宜嚴兵備之俊不聽且欲自以為功命錡無往而令沂中與王德將神勇步騎六萬直趨濠州列陳未定煙起城中金人伏騎萬餘分兩翼出沂中顧德曰何如德曰德小將安敢議事沂中以策麾軍曰那回諸軍以為令其走也遂潰而南無復紀律金人追之死者甚衆韓世忠率師至城下亦不利而退沂中遂入滁州俊軍入宣化錡軍入藕塘方食俊遽至曰敵兵已近奈何錡曰楊宣撫兵安在俊曰已失利還矣錡謂俊無恐請以步兵禦之宣撫試觀焉錡麾下皆曰兩大帥軍已軍我軍何苦獨戰錡曰順昌孤城旁無赤子之助吾提兵不滿二萬猶足取勝況今得地利又有鋭兵耶遂設三伏以待俄而俊謂錡曰諜者妄也戚方殿後之軍耳乃皆還鎮俊歸建康錡歸太平沂中歸臨安烏珠亦渡淮北去蓋自是三師不復出矣宋史紀事本末卷十六
