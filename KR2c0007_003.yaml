body:
  text: 宋史紀事本末卷三明馮琦原編陳邦瞻增輯太宗致治太平興國元年十二月己未詔羣臣論列者即時引對富弼曰太宗求治之切故詔羣臣論事欲面奏者即時引對此言路所以無壅也自後臣僚非差遣合上殿者不得對亦有朝臣乞上殿敷奏邊事踰月不得報邊事尚拘常例况他事乎二年春正月戊辰帝親試禮部舉人初太祖幸洛陽張齊賢以布衣獻䇿條陳十事內四説稱旨齊賢堅執其餘䇿皆善太祖怒出之及還語帝曰我幸西都惟得一張齊賢耳我不欲爵之以官異時可使輔爾為相也至是齊賢亦在選中有司誤置下第帝覽之故一榜盡賜進士及第又詔禮部閲其十五舉以上及諸科並賜出身召邢昺升殿講師比二卦又問以羣經發題帝嘉其精博擢九經及第又九經七人不中格特賜同三傳出身帝謂侍臣曰朕欲博求俊彥於科場中非敢望拔十得五止得一二亦可為致治之具矣辛未詔曰虞書考績爰及三年漢官奏課聿分九等應諸道州府曹掾及縣令簿尉先是吏部南曹給印紙厯子俾州縣長吏書其績用過僭秩滿有司詳視而差其殿最斯舊章也執事者其申明之毋或蔽欺以紊經制三年二月丙辰立崇文院凡古今書籍盡貯之六月癸未詔職官贓罪雖會赦不得敘著為令五年二月定差役法初太祖因前代之制以衙前主官物以里正戶長鄉書手課督賦稅以耆長弓手壯丁逐捕盜賊以承符人力手散從官給使令後有貧富隨時升降至是從京西轉運使程能請定諸州戶為九等上四等充役下五等免之六年二月詔曰朝廷申勸懲之道立經久之規應羣臣掌事外州悉給御前印紙所貴善惡無隱殿最必書俾因秩滿之時用行考績之典邇聞官吏頗紊綱條朋黨比周迭相容蔽米鹽細碎妄有指言蠧有巨而不章勞雖微而必録宜行戒諭用警因循自今應出使臣僚在任日勞績非尤異者不得批書曾有殿犯不得引匿其餘經常事不在批書之限九月左拾遺田錫上封事言軍國要機一朝廷大體四其一以議平漢之功駕馭戎臣為要機而大體之一乞修德以來逺宜罷交州兵其二言今諫官不聞廷爭給事中不聞封駁左右史不聞升陛紀言動御史不敢彈奏中書舍人未嘗訪以政事集賢院雖有書籍而無職官祕書省雖有職官而無圖籍願擇才任人使各司其局其三言尚書省諸曹茍簡非太平之制度宜修省寺以列職官其四言按獄官獄具皆有定式未聞以鐵為枷也昔唐太宗觀明堂圖見五臟皆麗於背遂禁鞭背減徒刑况隆平之時將措刑不用於法所無去之可也帝覽疏優詔褒答置京朝官差遣院舊制京朝官屬吏部國初以來皆中書至是詔京朝官奉使從政於外受代歸者並令中書舍人考校勞績品量材器以中書所下貟闕引對而授之謂之差遣院雍熙元年六月詔求直言知睦州田錫上疏言時久升平天下混一故左取右奉致陛下以功業自多然臨御九年四方雖寧而刑罰未甚措水旱未甚調陛下謂之太平誰敢不謂之太平陛下謂之至理誰敢不謂之至理又言宰相不得用人而委員外差遣近臣不專受責而求令録封章又言聽用太廣則條制必繁條制既繁則依從者少自今凡有奏陳宜令大臣議而行之毋使垂之空言示之寡信又言宰相若賢當信而用之非賢當擇而任之奈何置之為具臣而疑之若衆人也帝韙其論帝嘗語侍臣曰朕何如唐太宗參知政事李昉微誦白居易七德舞詞曰怨女三千放出宮死囚四百來歸獄帝聞之遽起曰朕不及朕不及卿言警朕矣二年秋七月詔諸道轉運使及長吏乘豐儲廩以防水旱端拱元年春正月乙亥親耕籍田五月辛酉詔就崇文院中堂建祕閣分三館書籍置其中以吏部侍郎李至兼祕書監帝謂至曰人君當淡然無欲勿使嗜好形見於外則姦邪無自入朕無他好但喜讀書多見古今成敗善者從之不善者改之如斯而已至每與同官觀書閣下帝必遣使賜宴且命三館學士皆預焉虞部郎中張佖建議復置左右史之職乃命梁周翰與李宗諤分領之周翰兼起居郎因上言自今御朝皇帝宣諭之言侍臣論列之事依舊中書修為時政記其樞密院事涉機密亦令本院編纂每月終送史館自餘封拜除改沿革制置之事悉條送以備編録仍令郎與舍人分直崇政殿以記言動别為起居注進御後降付史館起居注進御自周翰始內侍侯莫陳利用以幻術得幸驕恣不法趙普按其罪請誅之帝曰豈有萬乘之主不能庇一人乎普曰陛下不誅則亂天下法法可惜此一豎子何足惜哉帝不得已命誅之淳化元年十二月詔中外所上書疏及面奏制可者並下中書樞密三司申覆頒行帝謂宰相曰治國之道寬猛得中寬則政令不成猛則民無所措手足呂蒙正進曰老子稱治大國若烹小鮮夫魚擾之則亂近日內外上封事求更制度者甚衆望陛下漸行清淨之化上曰朕不欲塞人言路夫狂夫言而聖人擇焉亦古訓也趙昌言曰今朝廷無事邊境寧謐正當行好事之時上喜曰朕終日與卿等論此事何憂天下不治茍天下親民之官皆存此心則刑清訟息矣二年帝以旱蝗召近臣問以得失衆以天數對寇凖獨曰洪範天人之際應若影響大旱之證蓋刑有所不平也帝怒起入禁中頃之復召凖問不平狀凖曰願召二府至臣即言之二府入凖乃曰頃者祖吉王淮皆侮法受賕吉贓少乃伏誅淮以參政沔之弟盜主守財至千萬止杖之仍復其官非不平而何帝以問沔沔頓首謝於是切責沔而以凖可大用遂自樞密直學士拜樞密副使凖嘗奏事殿中語不合帝怒起凖輒引帝衣請復坐事決乃退帝嘉之曰朕得冦凖猶文皇之得魏徵也時王禹稱上言請自今庶官候謁宰相並須朝罷於政事堂樞密使預坐接見將以杜私請詔從之左正言謝泌疏駁曰伏覩明詔不許宰相樞密使見賔客是疑大臣以私也書曰任賢勿二去邪勿疑張説謂姚元崇外則疏而接物內則謹以事君此真大臣之體今天下至廣萬機至煩陛下以聰明寄輔臣自非接下何以悉知外事若令都堂候見則庶官請見咨事略無解衣之暇幸今世道清明朝廷無巧言之士方靣寡姑息之臣奈何疑執政為衰世之事乎帝覽奏即追還前詔仍以泌所上章付史館八月己卯置審刑院帝慮大理刑部吏舞文深刻乃置審刑院於禁中置詳議官六員凡獄上奏先達院印訖付大理刑部斷覆以聞乃下院詳議申覆裁決訖以付中書省行之其未允者宰相復以聞始命論決四年二月置審官院初帝慮中外官吏清濁混淆命官考課號磨勘院至是梁鼎上言曰虞書三載考績三考黜陟幽明三代以還率由此道唐有考功之司明考課之令下自簿尉上至宰臣皆歲計功過較定優劣故人思激勵績效著聞五代兵革相繼名存實亡且夫今之知州即古之刺史治狀顯著者朝廷不知方略蔑聞者任用如故大失勸懲之體寖成茍且之風是致水旱薦臻獄訟填溢欲望天下承平豈可得也望陛下特詔有司申明考績之法庶幾官得其人民受其賜於是改磨勘院為審官院掌審京朝官其幕職州縣官别置考課院主之營田之議太宗端拱二年春以陳恕樊知古為河北東西路招置營田使又詔知代州張齊賢制置河東諸州營田尋皆罷滄州節度副使何承矩上疏曰臣幼侍先臣關南征行熟知北邊道路川源之勢若於順安寨西開易河蒲口導水東注於海東西三百餘里南北五七十里資其陂澤築隄貯水為屯田可以遏敵騎之奔軼俟期歲間關南諸泊悉壅闐即播為稻田其緣邊州軍臨塘水者止留城守軍士不煩發兵廣戍收地利以實邊設險固以防塞春夏課農秋冬習武休息民力以助國經如此數年將見彼弱我強彼勞我逸此禦邊之要策也其順安軍以西抵西山百里許無水田處亦望選兵戍之簡其精鋭去其冗繆夫兵不患寡患驕慢而不精將不患怯患偏見而無謀若兵精將賢則四境可以高枕而無憂帝嘉納之屬霖雨為災典者多議其非便承矩引援漢魏至唐屯田故事以折衆論務在必行又言宜因積潦蓄為陂塘大作稻田以足食會滄州臨津令閩人黃懋上書言閩地惟種水田緣山導泉倍費功力今河北州軍多陂塘引水溉田省功易就三五年間公私必大獲其利詔承短按視還奏如懋言遂以承矩為制置河北沿邊屯田使懋為大理寺丞充判官發諸州鎮兵一萬八千人給其役凡雄莫霸州平戎順安等軍興堰六百里置斗門引淀水灌溉初年種稻值霜不成懋以晚稻九月熟河北霜早而地氣遲江東早稻七月即熟取其種課令種之是歲八月稻熟承矩載稻穗數車遣吏送闕下議者乃息而莞蒲蜃蛤之饒民賴其力度支判官陳堯叟等亦言漢魏晉唐於陳許鄧潁暨蔡宿亳至於夀春用水利墾田陳迹具在請選官大開屯田以通水利發江淮下軍散卒及募民充役給官錢市牛置耕具導溝瀆築防堰每屯十人人給一牛治田五十畝雖古制一夫百畝今且懇其半俟久而古制可復也畝約收三斛歲可收十五萬斛七州之間置二十屯可得三百萬斛因而益之數年可使倉廪充實省江淮漕運民田未闢官為種植公田未墾募民墾之歲登所取並如民間主客之例傅子曰陸田命懸於天人力雖修茍水旱不時則一年之功棄矣水田之制由人力人力茍修則地利可盡且蟲災之害亦少於陸田水田既修其利兼倍矣帝覽奏嘉之遣大理寺丞皇甫選光祿寺丞何亮按視經度然不果行至道二年直史館陳靖復上言先王之欲厚生民莫先於積榖而務農鹽鐵𣙜酤斯為末矣按天下土田除江淮湖湘兩浙隴蜀河東諸路地里敻逺雖加勸督未遽獲利今京畿周環二十二州幅圓數千里地之墾者十才二三稅之入者又十無五六復有匿里舍而稱逃亡棄耕農而事遊惰賦額歲減國用不充詔書纍下許民復業蠲其租調寬以歲時然鄉縣擾之每一户歸業則刺報所由朝耕尺寸之田暮入差徭之籍追胥責問繼踵而來雖蒙蠲其常租實無補於捐瘠况民之流徙始由貧困或避私債或逃公稅及既亡遁則鄉里檢其資財至於室廬什器桑棗材木咸計其直或里胥用以輸稅或債主取以償逋生計蕩然還無所詣以兹浮蕩絶意歸耕如授以間曠之田廣募遊惰誘之耕墾未計賦租許令别置版圖便宜從事酌民力豐寡農畝肥磽均配督課令其不倦其逃民歸業丁口授田煩碎之事並取大司農裁決耕桑之外令益樹雜木蔬果孽畜犬羊雞豚給授桑土濳擬井田營造室居使立保伍養生送死之具慶弔問遺之資並立條制候至三五年間生計成立即計户定征量田輸稅若民力不足官借糴錢或以市餱糧或以營耕具凡此給授委於司農比及秋成乃令償直依時價折納以其成數關白户部帝覽之喜詔靖條奏以聞靖又言逃民復業及浮客請佃者委農官勘驗以給授田土收附版籍州縣未得議其差役乏糧種耕牛者令司農以官錢給借其田制為三品以膏沃而無水旱之患者為上品雖沃壤而有水旱之患埆瘠而無水旱之慮者為中品既埆瘠復患於水旱者為下品上田人授百畝中田百五十畝下田二百畝並五年後收其租亦只計百畝十收其三一家有三丁者請加受田如丁數五丁者從三丁之制七丁者給五丁十丁給七丁至二十三十丁者以十丁為限若寬鄉田多即委農官裁度以賦之其室廬蔬韭及梨棗榆桞種藝之地每户十丁者給百五十畝七丁者百畝五丁者七十畝三丁者五十畝不及三丁者三十畝除桑功五年後計其租餘悉蠲其稅宰相吕端謂靖所立田制多改舊法又大費資用以其狀付有司詔鹽鐡使陳恕等共議請如靖奏乃以靖為京西勸農使按行陳許蔡潁襄鄧唐汝等州勸民墾田以大理寺丞皇甫選光祿寺丞何亮副之選亮上言功難成願罷其事帝志在勉農猶詔靖經度未幾三司以費官錢數多萬一水旱恐致散失事遂寢至道建儲太宗雍熙二年九月辛亥廢楚王元佐為庶人元佐帝長子少聰警貌類帝帝鍾愛之廷美遷房州元佐嘗力救及廷美死遂發狂疾至以小過操梃創傷侍人疾少間帝為赦天下會重九召諸王宴射苑中元佐以新瘥不預及諸王宴歸暮過元佐元佐恚曰若等侍上宴我獨不預是棄我也因發忿被酒夜縱火焚其宫帝大怒廢為庶人均州安置宋琪率百官三上表請留之京師帝許之行至黃山召還居於南宫淳化五年九月壬申以襄王元侃為開封尹進封夀王帝在位久儲二未立初馮拯等上疏言之帝怒斥之嶺南中外無敢復言者至是冦凖自青州召為左諫議大夫入見帝曰朕諸子孰可以付神器者凖曰陛下為天下擇君謀及婦人中官不可也謀及近臣不可也唯陛下擇所以副天下望者帝俯首久之屏左右曰襄王可乎凖曰知子莫若父聖意既以為可願即決定遂以元侃為開封尹封夀王元侃帝第三子吕中曰東漢李唐所以有女主宦官外戚之禍者以立太子之權盡出其手雖李固杜喬裴度鄭覃之徒不能正之凖之言真萬世法也至道元年八月壬辰詔立夀王元侃為皇太子更名恆大赦自唐天祐以來中國多故立儲之禮廢及百年至是始舉而行中外胥悅太子既立廟見還宫京師民擁道喜躍曰少年天子也帝聞之不懌召寇凖謂曰人心遽屬太子欲置我何地準再拜賀曰此社稷之福也帝悟入語后嬪宫中皆前慶帝喜復出延凖飲極醉而罷以李至李沆並兼太子賔客詔太子以師傅禮事之太子每見至沆必先拜至等上表不敢當詔答曰朕旁稽古訓肇建承華用選端良資於輔導藉卿宿望委以護調蓋將朂以謙沖故乃異其禮數勿飾當仁之讓副豫知子之心至等相率謝帝曰太子賢明仁孝國本固矣卿等可盡心規誨若動皆由禮則宜贊助事未有當必須力言至於禮樂詩書義有可禆益者皆卿等素習不假朕之言諭也三年二月辛丑帝不豫宣政使王繼恩忌太子英明隂與參知政事李昌齡知制誥胡旦等謀立楚王元佐三月癸巳帝崩年五十九時皇后令王繼恩召吕端端知有變即紿繼恩入書閣鎖閉之亟入宫后問曰宫車已晏駕立嗣以長順也今將如何端曰先帝立太子正為今日豈容更有異議后默然乃奉太子至福寧殿即位垂簾引見羣臣端平立殿下不拜請捲簾升殿審視然後降階率羣臣拜焉初帝欲以端為相或曰端為人糊塗帝曰端小事糊塗大事不糊塗決意用之時同列奏對多異議惟端罕所建明一日內札戒諭自今中書必經吕端參酌乃得聞奏五月甲戌討謀立楚王之罪貶李昌齡為忠武行軍司馬降王繼恩為右監門衛將軍均州安置胡旦除名長流潯州咸平諸臣言時務真宗咸平元年春正月翰林學士王禹稱上疏言五事一曰謹邊防通盟好使輦運之民有所休息方今北有契丹西有繼遷契丹雖不侵邊戍兵豈能減削繼遷既未歸命餽餉固難寢停關輔之民倒懸尤甚臣愚以為宜敕封疆之吏致書遼臣俾逹其主請尋舊好下詔赦繼遷罪復與夏臺彼必感恩內附且使天下知陛下屈己而為民也二曰減冗兵併冗吏使山澤之饒稍流於下當乾道開寶之時土地未廣財賦未豐然而擊河東備北鄙國用未足兵威亦強其義安在由所蓄之兵鋭而不衆所用之將專而不疑故也自後盡取東南數國又平河東土地財賦可謂廣且豐矣而兵威不振國用轉急其義安在由所蓄之兵冗而不盡鋭所用之將衆而不自專故也臣愚以為宜經制兵賦如開寶中則可高枕而治矣且開寶中設官至少臣本魯人占籍濟上未及第時一州止有刺史一人司户一人當時未嘗闕事自後有團練推官一人太平興國中增置通判副使判官推官而監酒𣙜稅算又增四員曹官之外更益司理問其租稅減於曩日也問其人民逃於昔時也一州既爾天下可知冗吏耗於上冗兵耗於下此所以盡取山澤之利而不能足也夫山澤之利與民共之自漢以來取為國用不可棄也然亦不可盡也只如茶法從古無稅唐元和中以用兵齊蔡始稅茶唐史稱是歲得錢四十萬貫今則數百萬矣民何以堪臣故曰減冗兵併冗吏使山澤之饒稍流於下者此也三曰艱難選舉使入官不濫古者鄉舉里選為官擇人士君子學行修於家然後薦之朝廷厯代雖有沿革未嘗逺去其道隋唐始設科試太祖之世每歲進士不過三十人經學五十人重以諸侯不得奏辟士大夫罕有資蔭故有終身不獲一第沒齒不獲一官者太宗育德王藩覩其如此臨御之後不求備以取人舍短用長拔十得五在位將逾二紀登第殆近萬人雖有俊傑之才亦有容易而得臣愚以為數百年之艱難故先帝濟之以泛取二十載之霈澤陛下宜糾之以舊章望以舉場還有司如故事至於吏部銓官亦非帝王躬親之事自來五品以下謂之旨授官今幕職州縣而已京官雖有選限多不施行臣愚以為宜以吏部還有司依格敕注擬可也四曰沙汰僧尼使疲民無耗夫古者惟有四民兵不在其數蓋古者井田之法農即兵也自秦以來戰士不服農業是四民之外又生一民故農益困然執干戈衛社稷理不可去漢明之後佛法流入中國度人修寺厯代增加不𧖟而衣不耕而食是五民之外又益一而為六矣假使天下有萬僧日食米一升歲用絹一匹是至儉也猶月費三千斛歲用萬縑何况五七萬輩哉不曰民蠧得乎臣愚以為國家度人衆矣造寺多矣計其費耗何啻億萬先朝不豫捨施又多佛如有靈豈不蒙福事佛無效斷可知矣願陛下深鑒治本亟行沙汰如以嗣位之初未欲驚駭此輩且可以二十載不度人修寺使自銷鑠亦救弊之一端也五曰親大臣逺小人使忠良蹇諤之士知進而不疑姦憸傾巧之徒知退而有懼夫君為元首臣為股肱言同體也得其人則勿疑非其人則不用凡議帝王之盛者豈不曰堯舜之時契作司徒咎繇作士伯夷典禮后夔典樂禹平水土益作虞官委任責成而堯有知人任賢之德雖然堯之道逺矣臣請以近事言之唐元和中憲宗嘗命裴洎銓品庶官洎曰天子擇宰相宰相擇諸司長官長官自擇僚屬則上下不疑而政成矣識者以洎為知言願陛下逺取帝堯近鑒唐室既得宰相用而不疑使宰相擇諸司長官長官自取僚屬則垂拱而治矣古者刑人不在君側語曰放鄭聲逺佞人是以周文王左右無可結襪者言皆賢也夫小人巧言令色先意希旨事必害正心惟忌賢非聖明不能深察舊制南班三品尚書方得升殿比來三班奉職或因遣使亦許升殿惑亂天聽無甚於此願陛下振舉綱紀尊嚴視聽在此時矣臣愚又以為今之所急在先議兵使衆寡得其宜措置得其道然後議吏使清濁殊塗品流不雜然後艱選舉以塞其源禁僧尼以去其耗自然國用足而王道行矣冬十月知代州桞開上言曰國家創業將四十年陛下紹二聖之祚精求至治若守舊規斯未盡善能立新法乃顯神機臣以益州稍靜望陛下選賢能以鎮之必須望重有威即羣小畏服又西鄙今雖歸朝他日未可必保茍有翻覆須得人制禦若以契丹比議為患更深何者契丹則君臣久定蕃漢久分縱萌南顧之心亦須自有思慮西鄙積恨未泯貪心不悛其下猖狂競謀凶惡侵漁未必知足姑息未能感恩望常預備之以良將守其要害以厚賜足其貪婪以撫慰來其情以寬假息其念多命人使西入甘涼厚結其心為我聲援如有動靜使其掩襲令彼有後顧之憂乃可制其輕動今甲兵雖衆不及太祖之時人人練習謀臣猛將則又懸殊是以比年西北屢遭侵擾養育則月費甚廣征戰則軍捷未聞誠願訓練禁戢使如往日行伍必求於勇敢指顧無縱於後先失律者悉誅獲功者必賞偏禆主將不威嚴者去之聽斷之暇親臨殿廷更召貔虎使其擊刺馳驟以彰神武之盛臣又以宰相樞密朝廷大臣委之必無疑用之必至當銓總僚屬評品職官內則主管百司外則分治四海今京朝官則别置審官供奉殿直則别立三班刑部不令詳斷别立審刑宣徽一司全同散地大臣不獲親信小臣乃謂至公至如銀臺一司舊屬樞密近年改制職掌甚多加倍置人事則依舊别無利害虛有變更臣欲望停審官三班復委中書樞密宣徽院銀臺司復歸樞密審刑院復歸刑部去其繁細省其頭目又京府大都萬方軌則望仍舊貫選委親賢今皇族宗子悉多成長但令優逸無以試材宜委之外藩擇文武忠直之士為左右贊弼之任又天下州縣官吏不均或冗長至多或歲年久闕欲望縣四千户以上選朝官知三千户以上選京官知省去主簿令縣尉兼領其事自餘通判監軍巡檢監臨使臣並酌量省減免虛費於利祿仍均濟於職官又人情貪競時態輕浮雖骨肉之至親臨勢利而多變同僚之內多或不和伺隙則致於傾危患難則全無相救仁義之風蕩然不復欲望明頒告諭各使改更庶厚化原永敦政本恭惟太祖神武太宗聖文光掩百王威加萬國無賢不用無事不知望陛下開豁聖懷如天如海可斷即斷合行即行愛惜忠直之臣體察姦諛之黨臣久塵著位寖荷恩寵辭狂理拙唯聖明恕之二年春正月舉入閣故事右司諫孫何上疏曰六卿分職邦家之大柄也有吏部辨考績而育人材有兵部簡車徒而治戎備有戶部正版圖而阜貨財有刑部謹紀律而誅暴強有禮部祀神祗而選賢俊有工部繕宫室而修隄防六職舉而天下之事備矣故周之會府漢之尚書立庶政之根本提百司之綱紀令僕率其屬丞即分其行二十四司粲焉星拱郎中員外判其曹主事令史承其事四海九州之大若網在綱唐之盛時亦不聞分别利權創使額而軍須取足及玄宗侈心既萌召發既廣租調不充於是蕭景楊釗始以地官判度支而宇文融為租調地稅使始開利孔以搆禍階至於肅代則有司之職盡廢而言利之臣攘臂於其間矣於是叛亂相仍經費不充迫於軍期切於國計用救當時之急卒以權宜裁之五代短促曾莫是思今國家三聖相承五兵不試太平之業垂統立制在此時也所宜三部使額還之六卿慎擇户部尚書一人專掌鹽鐵使事俾金部郎中員外郎判之又擇本行侍郎二人分掌度支户部使事各以本曹即中員外郎分判之則三使洎判官雖省猶不省也仍命左右司郎中員外總知帳目分勾稽違職守有常規程既定則進無掊克之慮退有詳練之名周官唐式可以復矣兹事非艱在陛下行之爾先是何嘗獻五議其一請擇儒臣有方略者統兵其二請世祿之家肄業太學寒俊之士州郡推薦而禁投贄自媒者其三請復制舉其四請行鄉飲酒禮其五請以能授官勿以恩慶例遷上覽而嘉之三年冬十月知黃州王禹稱上疏曰臣際會昌辰忝冒通籍凡有見聞皆合論奏然而言關災異事涉機宜茍非不諱之朝即恐犯時之忌今者不避逆耳用明匪躬臣本州去年十一月城南長圻村兩虎夜鬭一虎死食之殆半當時即欲密奏值鑾駕北征既非吉祥難聞行在臣但只隄防盜賊撫恤軍民而已又今年八月十三日十四日夜羣雞忽鳴至今時復夜鳴未止又十月十三日雷聲自西北起與盛夏無殊臣伏讀洪範五行傳及春秋災異史記天官書兩漢五行天文志以此詳校虎者毛蟲屬金金失其性則有毛蟲之妖又云虎相食者其歲當大飢雞者羽蟲屬火火失其性則有羽蟲之妖又云雞夜鳴主兵革昔人聞雞夜舞是矣雷者震也屬木木失其性則有冬雷之妖又云發雷之地飢饉此皆得於儒學不在禁書然事有數年而後應者亦有終不應者要在臣下無隱帝王盡知或修德以答天心或設備以防時難故詩曰畏天之怒不敢戲豫易曰觀乎天文以察時變只如咸平元年彗星出吕端等請臣作避位表臣具言星見虛危齊分請於青齊間設備以應天戒端等俱以為然不知自後作何措置臣緣不在司言之地不敢侵官去年敵騎犯邊果入齊地是天以文象告人人不自知備也端雖物故李沆以下皆見臣言今黃州有此災祥不能依前寢默雖妖不勝德終無纍於聖明而遇事敢言亦粗申於忠鯁今年禾小稔臣下無虞然恐應在它時即合先有制置伏望陛下恕臣拙直察臣愚衷令淮甸之間防飢荒之事假令災祥不驗猶勝臨事無備矣臣又念古之循吏政感神靈宋均猛虎渡江臣則有虎相食啖魯恭雉馴桑下臣則有羣雞夜鳴百里嵩甘雨隨車臣則有冬雷暴作此皆臣化人無狀布政失和合置常刑亦當自劾又慮他人陳奏臣則有昧蔽之愆上為之憮然契丹盟好真宗咸平二年冬十月契丹主隆緒大舉入侵時鎮定高陽關都部署傅潛擁步騎八萬餘畏懦閉營自守將校請戰者則醜言詈之朝廷間道遣使督潛出兵合擊潛不聽范廷召忿詬曰公恇怯乃不如一嫗鈐轄張昭允又屢勸之潛不得已乃分騎八千付廷召仍許出師為援廷召復求援於都部署康保裔保裔即領兵赴之遇敵於瀛州會暮約明日合戰而廷召潛遁保裔不之覺遲明敵圍之數重左右請易甲以遁保裔曰臨難毋茍免正吾效死之日也遂決戰數十合殺傷甚衆兵盡矢絶而援不至保裔死之契丹乘勝攻遂城城小無備衆情危懼守將楊延昭業之子也集衆登陴固守以俟援兵會天大寒汲水灌城上倐忽為冰堅滑不能登契丹兵乃引去掠祁趙邢洺州遂自德棣濟河掠淄齊詔聽邊民越拒馬河塞北市易知雄州何承矩上言曰緣邊戰棹司自淘河至泥姑海口屈曲九百餘里此天險也太宗置寨一十六鋪百二十五廷臣十一人戍卒三千餘部舟百艘往來巡警以屏姦詐則緩急之備大為要害今聽公私貿市則人馬交度深非便宜且寨鋪皆為虛設矣疏奏即停前詔十二月帝親禦契丹以李沆為東京留守甲寅駕發京師次陳橋戊午駐驆澶州辛酉宴從臣於行宫以王超等督先鋒示以陳圖俾識部分壬戌賜近臣甲胄弓劍幸浮橋登臨河亭賜澶州父老錦袍茶帛甲子次大名錢若水上疏曰孫武著書以伐謀為主漢高將將以用法為先伐謀者以將帥能料敵制勝也用法者以朝廷能賞罰不私也今溥潛領雄師數萬閉門不出坐視邊冦俘掠生民上孤委注之恩下挫鋭師之氣蓋潛輩不能制勝朝廷未能用法使然也軍法臨陳不用命者斬今若斬潛以徇然後擢如楊延朗楊嗣者五七人增其爵秩分授兵柄使將萬人間以強弩分路討除孰敢不用命哉敵人聞我將帥不用命退則有死豈獨思遁抑亦來歲不敢犯邊矣如此則可以坐清邊塞然後鑾路還京天威懾於四海矣臣嘗讀前史周世忠即位之始劉崇結契丹入侵契丹遣其將楊衮領騎兵數萬隨崇至高平當時懦將樊愛能何徽等臨敵不戰世宗大陳宴會斬愛能等拔偏將十餘人分兵擊太原劉崇聞之股栗不敢出即日遁去自是兵威大振其後收淮甸下秦鳳平關南特席捲爾以陛下之神武豈讓世宗乎此今日禦敵之竒䇿也若將來安邊之術請以近事言之太祖朝制置最得其宜止以郭進在邢州李漢超在關南何繼筠在鎮定賀惟忠在易州李謙溥在隰州姚內斌在慶州董遵誨在通逺軍王彥升在原州但授緑邊巡檢之名不加行營部署之號率皆十餘年不易其任立邊功者厚加賞賚其位皆不至觀察使蓋位不高則朝廷易制任不易則邊事盡知然後授以聖謀來則掩殺去則勿追所以十七年中北邊西蕃不敢犯塞以至屢使乞和此皆陛下之所知也茍能遵太祖故事慎擇名臣分理邊郡罷部署之號使不相統轄置巡檢之名俾遞相救應如此則出必擊敵入則守城不數年間可致邊烽罷警矣孫何上疏曰陛下嗣位以來訓師擇將可謂至多以高祖之大度兼蕭王之赤心神武冠於百王精兵倍於前代分閫仗鉞者固當以身先士卒為心賊遺君父為恥而列城相望堅壁自全手握強兵坐違成算遂使敵人得計邊騎肆行焚劫我郡縣係纍我黎庶陛下慮人神之忿怒憫河朔之生靈爰御六師親幸澶淵天聲一振敵騎四逃雖鎮定道路已通而德棣風塵未息此殆將帥或未得人邊奏或有壅閼鄰境不相救援糗糧須俟轉輸之所致也將帥者何或恃勇無謀或忌功玩敵但全城堡不恤人民邊奏者何護塞之臣固祿守位城池焚劫不以實聞老幼殺傷託言他盜不救援者何緣邊州縣城壘參錯如輔車唇齒之相依若頭目手足之相衛託稱兵少不出或待奏可乃行俟輦輸者何敵騎往還焱馳鳥逝嬴糧景從萬兩方行逮乎我來冦已遁去此四者當今急務擇將帥則莫若文武之內參用謀臣防壅閼則莫若凡奏邊防陛見廷問合救援則莫若督以軍令聽其便宜運糗糧則莫若輕齎疾驅角彼趫捷今大駕既駐鄴下契丹終不敢萌心南牧所慮薦食者惟東北無備之城繕完周防不可不慎且用兵之道尤貴豫防今契丹西畏大兵北無歸路急則奮擊愈不可制餘燼尚或復然奔潰亦宜預備大河津濟處處有之亦望量屯禁兵扼其要害則請和之使不日可待帝覽而嘉之及傅潛逗撓無功何又請斬潛以徇丁卯召見大名父老勞賜之聞康保裔死優詔賻恤贈侍中録其二子一孫召傅潛還流之房州三年春正月己卯朔駐驆大名府契丹知帝親征乃縱掠而去丁亥范廷召等追契丹於莫州斬首萬餘級盡獲所掠餘騎遁出境庚子帝至自大名帝時出手詔詢錢若水備禦北邉之術若水上疏曰臣讀前史論丐奴者多矣若漢婁敬樊噲季布賈誼朝錯主父偃徐樂王恢韓安國朱買臣董仲舒之所陳特和親征伐之二議唐李靖魏徴溫彥博郭正一狄仁傑之所及亦不過戰守之兩端晉桑維翰不背約之言出於微弱故相趙普請回軍之奏姑冀息民悉非逺謀臣所不取嚴尤謂自古禦戎無善䇿臣竊笑之守在四夷制勝以靜非上䇿而何臣聞唐魏博一鎮爾兵戎固不衆於今日而敵騎未嘗南牧者以幽薊為北門扼其險阻故也石晉割地之後由定武逹滄海千里受敵雖設二關鎮之以重兵莫可以禦故晉末度長河漢初復擾邊徼以周世宗之英武曾未能絶其犯中山窺上黨今御札詢備禦剪滅之術臣以為不得幽州未可剪滅也後唐莊宗在河北命周德威取幽州然後南向而爭天下蓋先有萬全之計使不能勝此善用兵者也夫戰守不同心將不能料敵重兵在外輕兵在內則今之所患也臣願陛下選智謀可以任邊郡者聽召壯士以為部曲而官為廪給之又募民為招收軍厚其糧賜蠲其租賦彼供輸兩地各有親屬則敵之動息得以知之如是同心將能料敵而在外者皆輕兵矣然無以統衆則不能用衆無以制勝則不能必勝故必擇大臣領近鎮提重兵以專閫外之事有警則督戰已事則班師既無舉兵之名又得馭兵之要三軍同力上下一心備禦之方舉在此矣若乃患民力之困則廣邊地之營田患戍卒之驕則嚴將帥之法令古語有之曰法不可移令不可違又曰功不勸謂之止善罪不懲謂之縱惡昔太祖用郭進守西山遣戍卒必戒之曰汝謹奉法我猶赦汝郭進殺汝矣其假借如此故郭進所至兵未嘗小衄臣願陛下推太祖所以待進之心而待諸將則法令不患不嚴勸懲不患不至矣帝善其議知雄州何承矩上言曰契丹輕而不整貪而無親勝不相讓敗不相救以馳騁為容儀以弋獵為耕釣櫛風沐雨不以為勞露宿草行不以為苦復恃騎戰之利故頻年犯塞臣聞兵有三陳日月風雲天陳也山陵水泉地陳也兵車士卒人陳也今用地陳而設險以水泉而作固建設陂塘綿亘滄海縱有敵騎安能折衝昨者契丹犯邊高陽一路東負海西抵順安士庶安居即屯田之利也今順安西至西山地雖數軍路才百里縱有丘陵岡阜亦多川瀆泉源因而廣之制為塘埭自可息邊患矣今緣邊守將多非其才不悅詩書不習禮樂不可守疆界制御無方動誤國家雖提貔虎之師莫遏蜂蟻之衆臣按兵法凡用兵之道校之以計而索其情謂將孰有能天地孰得法令孰行兵衆孰強士卒孰練賞罰孰明此料敵制勝之道也知此而用戰者必勝否則必敗夫惟無慮而易敵者必擒於人也伏望慎擇良吏出牧邊民厚之以俸祿使悅其心借之以威權使嚴其令然後深溝高壘秣馬厲兵為戰守之備修仁立德布政行惠廣安輯之道訓士卒闢田疇勸農耕畜芻粟以備凶年完長戟修徑弩謹烽燧繕保戍以防外患來則禦之去則備之如此則邊城按堵矣臣又聞古之明王安集吏民順俗而教簡募良材以備不虞齊桓晉文皆募兵以服鄰敵故強國之君必料其民有膽勇者聚為一卒樂進戰效力以顯忠勇者聚為一卒能踰高赴逺輕足善鬬者聚為一卒此二者兵之練鋭內出可以決圍外入可以屠城况小大異形強弱異勢險易異備卑身以事強小國之形也以蕃戎伐蕃戎中國之形也故陳湯統西域而郅支滅常惠用烏孫而邊鄙寧且聚膽勇樂戰輕生之徒古稱良䇿請試行之且邊鄙之人多負壯勇識外邦之情偽知山川之形勝望於邊郡置營召募不須品度人材止求少壯有武藝者萬人俟契丹有警令智勇將統而用之必顯成功乃中國之長算也又如𣙜場之設蓋先朝從權立制以惠契丹縱其渝信犯盟亦不之廢似全大體今緣邊𣙜場因其犯塞尋即停罷去歲以臣上計於雄州置場賣茶雖資貨並行而邊氓未有所濟乞延訪大臣議其可否或文武中有抗執獨議是必别有良謀請委之邊任使施方略責以成功茍空陳浮議上惑聖聰秪如靈州足為證驗况兹契丹又非夏州之比也四年冬十月契丹入侵以王顯為鎮定三路都部署禦之是月顯與契丹戰於遂城敗之戮二萬餘人契丹進次滿城而還六年夏四月契丹耶律諾衮蕭達蘭侵定州高陽關副都部署王繼忠與大將王超桑贊等帥兵赴之至康村與諾衮戰繼忠陳東偏為敵所乘斷餉道超贊皆畏縮退師繼忠獨與麾下躍馬馳赴服飾稍異契丹識之圍數十重士皆殊死戰且戰且行傍西山而北至白城力不能支遂被執帝聞之謂其已死優詔贈官繼忠見契丹主於炭山蕭太后知繼忠才賢授户部使景德元年八月以畢士安冦準同平章事初士安既拜參知政事入謝帝曰未也行且相卿因問誰可與卿同進者對曰冦準兼資忠義善斷大事臣所不如帝曰聞其好剛使氣對曰凖忘身殉國秉道疾邪故不為流俗所喜今中國之民雖蒙休德涵養而北兵不戢為邊境患若凖者正宜用帝曰然故有是命九月契丹大舉入侵時以敵軍深入中外震駭召羣臣問方略王欽若臨江人請幸金陵陳堯叟閬州人請幸成都帝以問凖凖曰不知誰為陛下畫此二䇿帝曰卿姑斷其可否勿問其人也凖曰臣欲得獻䇿之人斬以釁鼓然後北伐耳陛下神武將臣協和若大駕親征敵當自遁不然出竒以撓其謀堅守以老其師勞佚之勢我得勝算矣奈何棄廟社欲幸楚蜀所在人心奔潰敵乘勝深入天下可復保耶帝意乃決因問凖曰今敵騎馳突而天雄軍實為重鎮萬一陷沒則河朔皆敵地也孰可為守凖以王欽若薦且曰宜速召面諭授勑俾行欽若至未及有言凖遽曰主上親征非臣子辭難之日參政為國柄臣當體此意欽若驚懼不敢辭閏月乙亥以參知政事王欽若判天雄軍兼都部署契丹主隆緒同其母蕭氏遣其統軍順國王蕭達蘭攻威虜順安軍三路都部署擊敗之斬偏將獲其輜重又攻北平寨及保州復為州寨兵所敗達蘭與契丹主及其母合衆攻定州宋兵拒于唐河擊其遊騎契丹遂駐兵陽城淀號二十萬每縱遊騎剽掠小不利輒引去徜徉無鬬志冦凖聞之曰是狃我也請練師命將簡驍鋭據要害以備之是時故將王繼忠為契丹言和好之利契丹以為然遣李興以繼忠書及密表詣莫州部署石普議和普以聞於朝朝臣莫敢如何畢自安請羈縻之漸許其平帝曰敵悍如此恐不可保士安曰臣嘗得契丹降人言其雖深入屢挫不甚得志隂欲引去又恥無名且彼寧不畏人乘虛覆其巢穴此請殆不妄繼忠之奏臣請入之於是詔諭繼忠曰朕豈欲窮兵唯思息戰如許通和即當遣使己卯高繼祖率兵擊敗契丹於岢嵐軍李延渥又敗之於瀛州冬十月遣曹利用詣契丹軍時契丹數戰不利復令王繼忠附奏議和帝遣利用利用至軍蕭太后欲求關南地利用力拒之庚午帝親征車駕發京師以李繼隆石保吉為駕前排陳使是日司天言日抱珥黃氣充塞宜不戰而却癸酉駐驆常城縣甲戌寒甚左右進貂帽毳裘却之曰臣下皆苦寒朕安用此壬申契丹兵直犯前軍而陳未接戰蕭達蘭出按視地形李繼隆部將張環守牀子弩射殺之達蘭有機勇所領皆鋭兵既死敵大挫衄時王欽若在天雄軍閉門束手無䇿但修齋誦經而已唯魏能守安肅軍楊延朗守廣信軍二軍最切敵境而攻圍百戰不能下及敵退出境而延朗追躡轉戰未嘗敗衄故時人目二軍為銅梁門鐵遂城蓋由二將善守也以王旦為東京留守初帝親征以雍王元份留守旦等皆扈從至是元份以暴疾聞命旦馳還代之旦曰願宣冦準臣有所陳準至旦奏曰十日不捷何以處之帝默然良久曰立太子旦既至京直入禁中下令甚嚴人無知者丙子帝次澶州又有以金陵之謀告者帝意稍惑召冦準問之準曰陛下惟可進尺不可退寸河北諸軍日夜望鑾輿至士氣百倍若回輦數步則萬衆瓦解敵乘其後金陵亦不可得至也準出遇殿前都指揮使高瓊曰太尉受國厚恩今日有以報乎瓊曰願效死準復入瓊立庭下準曰陛下不以臣言為然盍試問瓊瓊即奏曰冦準言是準又曰機不可失宜趣駕帝乃發至澶州南城望見契丹軍勢甚盛衆請駐蹕冦準固請曰陛下不過河則人心益危敵氣未懾非所以取威決勝也且王超領徑兵屯中山以扼其吭李繼隆石保吉分大陳以扼其左右肘四方征鎮赴援者日至何疑而不進高瓊亦固以請即麾衛士進輦帝遂渡河御北城門樓召諸將撫慰逺近望見御蓋踴躍呼萬歲聲聞數十里會鄆城得契丹諜者縛至斬之契丹相視益布駭帝悉以軍事付準準承制專決號令明肅士卒畏悅己而契丹數千騎來薄城下詔士卒迎擊斬獲大半乃引去帝還行宫留準居北城上徐使人視準何為準方與知制誥楊億飲博歌謔歡呼帝喜曰準如是吾復何憂十二月庚辰契丹使韓杞持書與曹利用俱來請盟利用言契丹欲得關南地帝曰所言歸地事極無名若必邀求朕當決戰若欲貨財漢以玉帛賜單于有故事宜許之時準不欲賂以貨財且欲邀其稱臣及獻幽薊之地因畫䇿以進曰如此則可保百年無事不然數十年後戎且生心矣帝曰數十年後當有扞禦之者吾不忍生靈重困姑聽其和可也準尚未許會有譛準幸兵以自取重者準不得已乃許其成復遣曹利用如契丹軍議歲幣帝曰必不得已雖百萬亦可準聞之召利用至幄謂曰雖有敇旨汝所許過三十萬吾斬汝矣利用至契丹軍蕭太后謂利用曰晉卑我關南周世宗取之今宜見還也利用曰晉周事我朝不知若歲求金帛以佐軍尚不知帝意可否割地之請我不敢以聞契丹政事舍人高正始遽前曰我引衆以來圖復故地若止得金帛而歸吾愧吾國人矣利用曰子盍為契丹熟計使契丹用子言恐連兵結釁非國利也契丹猶覬關南遣其監門衛大將軍姚東之持書復議帝不許而去利用竟以銀十萬兩絹二十萬匹成約而還癸未帝幸李繼隆營命從官將校飲犒賜諸軍有差詔以將班師諭兩京甲申契丹使姚東之來獻御衣食物乙酉帝御行營南樓觀河遂宴從官及契丹使丙戌遣李繼昌使契丹定和戒諸將勿出兵邀其歸路甲午車駕發澶州乙未契丹使丁振以誓書來以兄禮事帝丁酉契丹兵出塞戊戌帝至自澶州辛丑録契丹誓書頒兩河諸州二年春正月庚戌朔以契丹講和大赦天下壬子放河北諸州強壯歸農罷諸路行營合鎮定兩路為一省北面部署鈐轄都監使臣二百九十餘員河北戍兵十之五緣邊三之一詔緣邊毋出境掠奪得契丹馬牛悉縱還之通互市茸城池招流亡廣儲蓄由是河北民得安業皆畢士安之謀也士安又請按邊要選守將以馬知節知定州楊延昭知保州李允則知雄州孫全照知鎮州他所擇任悉當其才是時以契丹修好有慶弔之使乃置國信司專主之領以宦者二月癸卯遣太子中允孫僅如契丹賀其太后生辰致書自稱南朝以契丹為北朝直史館王曾上言春秋時小國爵不過子今從其國號足矣何用對稱兩朝不聽秋七月歸幣於契丹自是歲以為常冬十月遣職方郎中韓國華如契丹賀正旦十一月契丹遣使來賀承天節十二月契丹使來賀明年正旦自是皆歲以為常大中祥符元年夏四月契丹遣使請歲幣外别假錢幣帝以問宰相王旦旦曰東封近彼以此探朝廷意耳帝曰何以答之旦曰止當以微物輕之乃於歲給三十萬物內各借三萬仍諭次年額內除之契丹得之大慙二年十二月甲辰契丹太后蕭氏卒蕭氏有機謀善馭大臣得其死力每入侵親被甲督戰及通好亦出其謀然性殘忍多殺戮與韓德讓通賜姓名耶律隆運拜大丞相封晉王未幾德讓亦死陪葬陵旁三年五月契丹伐回鶻破肅州六月契丹飢來市糴詔雄州糴粟二萬石賑之冬十月契丹使耶律寧來告伐高麗先是高麗康肇弒其主誦立誦兄詢而相之契丹主隆緒謂羣臣曰康肇弒君而立詢詬因而相之大逆也宜發兵問其罪蕭迪里以年荒未可隆緒不聽十一月契丹軍渡鴨緑江肇戰敗退保銅州契丹進兵擒之遂攻開京詢棄城走平州契丹焚開京宫室府庫而還自是用兵連歲始罷乾興元年二月帝崩契丹主隆緒集蕃漢大臣舉哀遣耶律僧隱等來吊祭置帝御筵建資福道場百日而罷命諸州軍不得作樂凡國中犯帝諱者悉改之仁宗天聖二年十二月契丹大閲聲言獵幽州朝廷患之帝以問二府衆請練兵以備不虞張知白曰契丹修好未逺今其舉者以上初政試觀朝廷耳豈可自生釁耶若終以為疑莫如因今河決發兵以防河為名彼亦不虞也未幾契丹果罷去七年八月契丹詳衮大延琳據遼陽反初遼東自神册附契丹無𣙜酤鹽麵之征馮延休韓紹勳相繼為户部使始以燕法繩之民不堪命會燕荐飢户部副使王嘉獻計造船使其民漕粟以賑之水路險艱多至覆沒鞭撲榜掠民怨思亂東京舍利軍詳衮大延琳因之為變遂囚留守蕭孝先殺韓紹勳王嘉等以快衆情僣號興遼契丹主聞亂徴諸道兵命南京留守蕭孝穆討平之九年六月契丹主隆緒卒子宗真立宗真宫人蕭訥木錦所生齊天后蕭氏無子取而養之愛同己出至是立焉訥木錦自立為皇太后聽政宗真改元景福號隆緒曰聖宗初隆緒遭母喪哀毁骨立羣臣請改元隆緒曰改元吉禮也居喪行吉禮乃不孝子也羣臣請以日易月以法古制曰吾契丹帝也寧違古制不為不孝之人至是疾革屬子宗真曰皇后事我四十年以其無子命汝為嗣我死汝子母切勿殺之且曰宋朝信誓當守而勿失及卒左右希訥木錦旨誣齊天后弟謀逆訥木錦令鞫治連及齊天后宗真聞之曰皇后侍先帝四十年撫育朕躬當為太后今不果反罪之可乎訥木錦曰此人若在恐為後患宗真曰皇后無子而老雖在無能為也訥木錦不從遷之上京後竟弒之秋七月丙午朔契丹來告哀帝遣龍圖閣待制孔道輔及王隨等充賀册及弔祭等使初道輔使契丹契丹燕使者優人以文宣王為戲道輔艴然徑出契丹使主客者邀還坐且令謝道輔正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也何謝為至是益加禮重景祐元年五月契丹太后蕭訥木錦隂召諸弟議欲立少子重元重元以其謀白於契丹主宗真宗真遂收太后符璽遷之慶州七括宫始親決國事立重元為皇太弟慶厯二年三月己巳契丹來求關南之地時契丹主漸長國內無事户口蕃息慨然有南侵之意會元昊反中國旰食欲乘釁取瓦橋關以南十縣地乃集羣臣議南院樞密使蕭惠曰兩國強弱聖慮所悉况宋人西征有年師老民疲陛下親帥六軍臨之其勝必矣北院樞密使蕭孝穆曰我先朝與宋和好無罪伐之其曲在我况勝負未可逆料願熟察之契丹主從惠言乃遣南院宣徽使蕭特默翰林學士劉六符來致書取故地且問興師伐夏及沿邊疏濬水澤增益兵戍之故特默至吕夷簡奏富弼為接伴使與中使迎勞之特默托疾不拜弼曰吾嘗使北病卧車中聞命輒起今中使至而子不拜何也特默等矍然起拜弼開懷與語特默感悅亦不復隱其情密以其主所欲得者告且曰可從從之不然以一事塞之弼具以聞帝唯許增歲幣或以宗室女嫁其子且令夷簡擇報聘者夷簡不悅弼因薦之集賢校理歐陽修引顔真卿使李希烈事請留之不報弼得命即入對叩頭曰主憂臣辱臣不敢愛其死帝為動色進弼樞密直學士弼辭曰國家有急義不憚勞奈何逆以官爵賂之夏四月富弼如契丹五月契丹聚兵幽薊聲言南下河北京東皆為邊備朝議請城洛陽吕夷簡曰此子囊城郢計也使契丹得渡河雖高城深池何可恃耶我聞契丹畏壯侮怯景德之役非乘輿濟河則未易服也宜建都大名示將親征以伐其謀帝從之戊午建大名府為北京即真宗駐蹕之所六月以王德用判定州兼三路都部署德用時教士卒習戰頃之士勇皆可用契丹遣人來覘或請捕之德用曰吾軍整而和使覘者得實以歸是屈人兵以不戰也明日大閲於郊下令具糗糧聽吾鼓視吾旗所向覘者歸告契丹謂漢兵將大至敵中始懼富弼至契丹見契丹主宗真言曰兩朝人主父子繼好垂四十年一旦求割地何也契丹主曰南朝違約塞鴈門增塘水治城隍籍民兵將以何為羣臣請舉兵而南吾謂不若遣使求地求而不獲舉兵未晚弼曰北朝忘章聖皇帝之大德乎澶淵之役茍從諸將言北兵無得脫者且北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故勸用兵者皆為身謀爾契丹主驚曰何謂也弼曰晉高祖欺天叛君末帝昏亂土宇狹小上下離叛故契丹全師獨克然所獲金幣充牣諸臣之家而壯士健馬物故大半今中國提封萬里精兵百萬法令修明上下一心北朝欲用兵能保其必勝乎就使其勝所亡士馬羣臣當之歟抑人主當之歟若通好不絶歲幣盡歸人主羣臣何利焉契丹主大悟首肯者久之弼又曰塞鴈門者備元昊也塘水始於何承矩事在通好前城隍皆修舊民兵亦補闕非違約也契丹主曰微卿言吾不知其詳雖然吾祖宗故地當見還也弼曰晉以盧龍賂契丹周世宗復取關南地皆異代事若各求地豈北朝之利哉既退劉六符曰吾主恥受金幣堅欲十縣何如弼曰本朝皇帝嘗言為祖宗守國豈敢妄以土地與人北朝所欲不過租賦爾朕不忍多殺兩朝赤子故屈己增幣以代之若必欲得地是志在敗盟假此為辭爾澶淵之盟天地鬼神實臨之北朝首發兵端過不在我天地鬼神其可欺乎六符謂其介曰南朝皇帝存心如此大善當共奏使兩主意通明日契丹主召弼同獵引弼馬自近謂曰得地則歡好可久弼反覆陳其不可狀且言北朝既以得地為榮南朝必以失地為辱兄弟之國豈可使一榮一辱哉獵罷六符曰吾主聞公榮辱之言意甚感悟今惟有結昏可議爾弼曰結昏易生嫌隙本朝長公主出降齎送不過十萬緍豈若歲幣無窮之利哉契丹主諭弼使還曰俟卿再至當擇一事受之卿其遂以誓書來弼還具以白帝癸亥帝復使弼持和親增幣二議及誓書往契丹且命受口傳之詞於政府既行次樂壽謂副使張茂實曰吾為使而不見國書脫書詞與口傳異吾事敗矣啓事果不同馳還都以晡時入見曰政府故為此以陷臣臣死不足惜如國事何帝以問晏殊殊曰吕夷簡決不為此誠恐誤爾弼曰晏殊姦邪黨夷簡以欺陛下遂易書而行九月富弼至契丹不復議昏專欲增幣且曰南朝既增我歲幣其遺我之辭當曰獻弼曰南朝為兄豈有兄獻於弟乎契丹主曰然則為納字弼曰亦不可契丹主曰南朝既以厚幣遺我是懼我矣於一字何有若我擁兵而南得無悔乎弼曰本朝兼愛南北之民故屈己增幣何名為懼或不得已而用兵則當以曲直為勝負非使臣之所知也契丹主曰卿勿固執古有之矣弼曰自古唯唐高祖借兵突厥當時贈遺或稱獻納其後頡利為太宗所擒豈復有此禮哉聲色俱厲契丹主知不可奪乃曰吾當自遣人議之乃留增幣誓書而使其北院樞密副使耶律仁先及劉六符持誓書與弼偕來且議獻納二字弼至入對曰二字臣以死拒之彼氣折矣可勿許也帝用晏殊議竟以納字許之於是歲增銀絹各十萬匹兩送至白溝仍遣知制誥梁適持誓書與仁先如契丹報之契丹亦遣使再致誓書來報撤兵自是通好如故李燾曰時契丹實惜盟好特為虛聲以動中國吕夷簡等乃許與過厚遂為無窮之害十一月以富弼為翰林學士辭不拜弼始受命使契丹聞一女卒再往聞一男生皆不顧得家書未嘗發輒焚之曰徒亂人意於是帝復申樞密直學士之命弼辭又除翰林學士弼懇辭曰增歲幣非臣本意特以方討元昊未暇與角故不敢以死爭敢受賞乎四年五月契丹伐黨項夏人救之契丹遂伐夏遣使來告師期冬十月契丹主宗真親將騎兵十萬出金肅城遣弟重元將騎兵七千出南路樞密使蕭惠將騎兵六萬出北路三路濟河長驅入夏境四百里不見敵據德勝寺南壁以待惠與元昊戰於賀蘭山北敗之元昊見契丹兵盛乃請和退師十里請收叛黨以獻且進方物契丹主遣樞密副使蕭格迓之而進軍次於河曲元昊親率黨項三部以待罪契丹命格詰其納叛背盟之故賜之酒許其自新惠以為大軍既集宜加伐不可許和契丹主猶豫未決元昊以未得成言又退師三十里以候凡三退將百里每退必赭其地契丹馬無所食因許和元昊乃遷延以老之度其馬飢士疲因縱兵急攻惠營敗之乘勝攻南壁契丹主大敗從數騎走得免元昊入樞密使蕭孝友寨執駙馬蕭呼圖克以去已而遣使歸其先所俘獲契丹亦遣所留夏使還之契丹主遂引兵還十一月契丹以雲州為西京雲州即雲中也契丹建為西京大同府於是契丹境內凡五京六州軍城百五十六縣二百九部族五千二屬國六十東至於海西至金山暨於流沙北至臚朐河南至白溝幅員萬里皇祐元年三月己未契丹遣使來告伐夏九月契丹北院樞密使蕭惠帥師自河南進以伐夏戰艦糧艘綿亘數百里既入敵境偵侯不逺鎧甲載於車軍士不得乘馬諸將請備不虞惠曰諒祚必自迎車駕何暇及我無故設備徒自敝耳契丹主既還惠師尚進未立營柵夏人奄至惠與麾下不及甲而走追者射之惠幾不得脫士卒死傷者不可勝計冬十月契丹復伐夏獲夏主諒祚之母於賀蘭以歸五年契丹及夏平至和二年夏四月己亥契丹遣使賀乾元節持本國三世畫像來求御容八月契丹主宗真卒廟號興宗子洪基立以大弟重元為大叔遣使來告哀宗真性佻侻嘗因夜宴自入樂隊又數變服入酒肆寺觀尤重浮屠法僧有正拜三公三師兼政事令者其臣馬保忠嘗勸以臣下無勳勞宜序進之宗真怫然怒曰若爾則是君不得專豈社稷之福邪自是欲有遷除必先厚賜近臣以絶其言遣知制誥劉敞使契丹弔祭敞入境契丹導之行自古北口至栁河回曲殆千里欲夸示險逺敞質譯人曰自松亭趨柳河甚徑且易不數日可抵中京何為故道此譯相顧駭愧曰實然但通好以來置驛如是不敢變也順州山中有異獸如馬而食虎豹契丹不能識問敞敞曰此所謂駁也為説其音聲形狀且誦山海經管子書曉之契丹益嘆服嘉祐二年九月契丹來聘遣翰林學士胡宿報之初契丹主宗真來求御容會卒乃已至是洪基復遣使來求欲成先志帝遣張升報聘諭使更致新主像契丹欲先得之曰在昔文成弟也弟先面兄於禮為順况今南朝乃伯父之尊當先致恭於是復使其臣蕭扈以洪基像來宿乃奉御容如契丹契丹主具儀仗迎謁及瞻視驚肅再拜謂左右曰我若生中國不過與之執鞭持蓋一都虞候耳八年六月契丹大叔重元反兵敗自殺英宗治平二年六月詔遣官與契丹定疆界三年春正月癸酉契丹復改國號曰遼神宗熙寧七年三月遼主以河東路沿邊增修戍壘起鋪舍侵入蔚應朔三州界內使林牙蕭禧來言乞行毁撤别立界至禧歸帝面諭以三州地界俟遣官與北朝官即境上議之遂遣太常少卿劉忱等如遼遼遣樞密副使蕭素會忱於代州境上詔下樞密院議且手詔判相州韓琦司空富弼判河南府文彥博判永興軍曾公亮條代北事宜以聞琦奏言臣觀近年朝廷舉事似不以大敵為恤彼見形生疑必謂我有復圖燕南之意故引先發制人之説造為釁端所以致疑其事有七高麗臣屬北方久絶朝貢乃因商舶誘之使來契丹知之必謂將以圖我一也強取吐蕃之地以建熙河契丹聞之必謂行將及我二也遍植榆柳於西山冀其成長以制蕃騎三也創團保甲四也河北諸州築城鑿池五也置都作院頒弓刀新式大作戰車六也置河北三十七將七也契丹素為敵國因事起疑不得不然臣嘗竊計始為陛下謀者必曰自祖宗以來因循茍且治國之本當先聚財積榖募兵於農則可以鞭笞四陲復唐故疆故散青苗錢為免役法置市易務次第取錢新制日下更改無常而監司督責以刻為明今農怨於畎畝商嘆於道路長吏不安其職陛下不盡知也夫欲攘斥四海以興太平而先使邦本困搖衆心離怨此則為陛下始謀者大誤也臣今為陛下計宜遣報使具言向來興作乃修備之常豈有他意疆土素定悉如舊境不可持此造端以隳纍世之好可疑之形如將官之類因而罷去益養民愛力選賢任能疏逺姦諛進用忠鯁使天下悅服邊備日充若其果自敗盟則可一振威武恢復故疆攄纍朝之宿憤矣弼彥博公亮亦皆有言大抵度上以敵為憂故深指時事云八年三月遼人復來議疆事劉忱等與蕭素會於大黃平三議不能決素初指蔚朔應三州分水嶺土壠為界及忱與之行視無土壠乃但云以分水嶺為界凡山皆有分水彼意至時可以罔取也相持久之至是遼主復遣蕭禧來致圖書以忱等遷延為言乃命韓縝代忱等與遼使議縝與禧爭辨或至夜分禧執分水嶺之説不變留館不肯辭曰必得請而後反帝不得已遣知制誥沈括報聘括詣樞密院閲故牘得頃歲所議疆地書指古長城為分界今所爭乃黃嵬山相逺三十餘里表論之帝喜愕謂括曰兩府不究本末幾誤國事命以畫圖示禧禧議始屈乃賜括白金千兩使行括至遼遼相楊益戒與議不能屈謾曰數里之地不忍而輕絶好乎括曰師直為壯曲為老今北朝棄先君之大信以威用其民非我朝之不利也凡六會竟不可奪遂舍黃嵬而以天池請括乃還在道圖其山川險易迂直風俗淳龎人情向背為使契丹圖上之帝問張方平以祖宗禦戎之策孰長方平曰太祖不勤逺略如夏州李彛興靈武馮暉河西折御卿皆因其酋豪許以世襲故邊圉無事董遵誨捍環州郭進守西山李漢超保關南皆十餘年優其祿賜寬其文法而少遣兵諸將財力豐而威令行間諜詳審吏士用命賊所入輒先知併力禦之戰無不克故以十五萬人獲百萬之用終太祖之世邊鄙不聳天下安樂及太宗平并又欲逺取燕薊自是歲有契丹之虞曹彬劉延謙傅潛等數十戰各亡士卒十餘萬又內徙李彛興馮暉之族致繼遷之變二邊皆擾而朝廷始旰食矣真宗之初趙德用納欵及澶淵之克遂與契丹盟至今人不識兵革所謂盛德大業祖宗之事大略如此亦可以鑒矣近歲邊臣建開拓之議皆行險徼幸之人欲以天下安危試之一擲事成則身蒙其利不成則陛下任其患不可聽也時契丹遣泛使蕭禧上問遼意安在方平曰遼自與中國通好安於豢養吏士驕惰實不用兵昔蕭英劉六符來仁宗命二府置酒殿廬英頗泄其情六符變色目之英歸竟以此得罪今禧黠知故事令大臣與議無屈帝尊與彼交上曰朕以慶厯講和之後中國不為善後之備欲修輯為應兵耳方平曰應兵禍之已成者也消變於未成善之善者也秋七月戊子詔韓縝如河東割地以卑遼遼使爭議疆事不決帝問於王安石安石勸帝曰將欲取之必姑與之於是詔分水嶺為界蕭禧乃去至是遣天章閣待制韓縝如河東割新疆與之凡東西失地七百里遂為異日興兵之端十二月遼主洪基殺其后蕭氏時北院樞密使耶律伊遜專政勢傾一國而忌后明敏誣后與伶官趙惟一私通遂族誅惟一而賜后自盡十年十一月遼主洪基殺其太子濬濬蕭后之子也伊遜既譛殺蕭后謀搆濬以罪隂令護衛耶律察喇誣告都宫使耶律徹爾及和囉噶等謀廢洪基而立濬遼主信之誅徹爾等廢濬為庶人徙於上京伊遜夜遣力士殺濬以卒聞元豐三年春正月遼出耶律伊遜於興中府伊遜又欲害太子濬之子延禧因言宋衛王科爾斡之子淳可為儲嗣羣臣畏伊遜莫敢言北院宣徽使蕭烏納伊勒必蕭托輝諫曰舍嫡不立是以國與人也遼主猶豫不決會獵於黑山見扈從官屬多隨伊遜後始惡其專遂改伊遜知南院大王事伊遜入謝遼主即日出之興中府其黨多黜遂封延禧為梁王設旗鼓伊喇六人以護衛之時延禧生六年矣建中靖國元年遼主洪基卒孫延禧立是為天祚帝事見後宋史紀事本末卷三
