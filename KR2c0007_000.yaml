front:
  text: 欽定四庫全書史部三
  hash: sha256:d3308b50e4253ae4cf1fd11436c8c98b0055b2094c71ac585b2b478dae009fce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2c0007_WYG_000-1a, image: WYG0353/WYG0353-0001a.png}
body:
  text: 宋史紀事本末紀事本末類提要臣等謹案宋史紀事本末二十八卷明陳邦瞻撰邦瞻字徳逺高安人萬厯戊戌進士官至兵部侍郎事蹟具明史本傳初禮部侍郎臨胊馮琦欲仿通鑑紀事本末例論次宋事分類相比以續袁樞之書未就而没御史南昌劉曰梧得其遺稿因屬邦瞻増訂成編大抵本於琦者十之三出於邦瞻者十之七自太祖代周迄文謝之死凡分一百九目於一代興廢治亂之跡梗概畧具𡊮樞義例最為賅博其鎔鑄貫串亦極精密邦瞻能墨守不變故詮叙頗有條理諸史之中宋史最為蕪穢不似資治通鑑本有脈絡可尋此書部别區分使一一就緒其書雖亞於樞其尋繹之功乃視樞為倍矣惟是書中紀事既兼及遼金兩朝當時南北分疆不能統一自當稱宋遼金三史紀事方於體例無乖乃專用宋史標名殊涉偏見至元史紀事本末邦瞻已别有成書此内如䝉古諸帝之立䝉古立國之制諸篇皆專紀元初事實即應析歸元紀之中使其首尾相接乃以臨安未破一概列在宋編尤失於限斷此外因仍宋史之舊舛訛疎漏未及訂正者亦所不免然於記載冘襍之内實有披榛得路之功讀通鑑者可無𡊮樞之書讀宋史者不可無此一編也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀宋史紀事本末原序宋史紀事本末者論次宋事而比之以續袁氏通鑑之編者也先是宗伯馮公欲為是書而未就侍御斗陽劉先生得其遺稿若干帙以視京兆徐公徐公以授門下沈生俾讐正之因共屬不佞續成焉凡不佞所増輯幾十七大都則侍御之指而宗伯之志也編成宜有叙叙曰史自紀傳而外益以編年代有全書尚矣事不改於前詞無増於舊臚列而彚屬之以為討論者徑斯於述作之體不已末乎而非然也善乎楊氏之言曰提事之微以先於其明搴事之成以後於其萌其情匿而泄其故悉而約是述本末者㫖也而不佞於宋事尤重有慨焉夫史者徵往而訓來考世而定治者也五帝三王之事既已若存若亡而漢唐之盛智名勇功獨為誦説者所艷慕然而未暇考其世已宇宙風氣其變之大者有三鴻荒一變而為唐虞以至於周七國為極再變而為漢以至於唐五季為極宋其三變而吾未覩其極也變未極則治不得不相為因今國家之制民間之俗官司之所行儒者之所守有一不與宋近者乎非慕宋而樂趨之而勢固然已舟行乎水而不得不視風以為南北治出乎人而不得不視世以為上下故周而上持世者式道德漢而下持世者式功力皆其會也逮於宋則仁義禮樂之風既逺而機權詐力之用亦窮藝祖太宗覩其然故舉一世之治而繩之於格律舉一世之才而納之於凖繩規矩循循焉守文應令雍容顧盼而世已治大抵宋三百年間其家法嚴故吕武之變不生於肘腋其國體順故莽卓之禍不作於朝廷吏以仁為治而蒼鷹乳虎之暴無所施於郡國人以法相守而椎埋結駟之俠無所容於閭巷其制世定俗蓋有漢唐之所不能臻者獨其弱勢宜矯而煩議當黜事權惡其過奪而文法惡其太拘要以矯枉而得於正則善矣非必如東西南北之不相為而寒暑晝夜之必相代也故曰世變未極則治不得不相為因善因者鑒其所以得與其所以失有微有明有成有萌有先有後則是編者夫亦足以觀矣余故不揣而叙之俾論世之君子於茲得有考焉萬厯乙巳仲春南京吏部稽勲清吏司郎中髙安陳邦瞻書
